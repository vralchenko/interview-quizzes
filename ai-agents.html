{ category: "Embeddings", question: { en: "What are vector embeddings?", de: "Was sind Vektor-Embeddings?", ru: "Что такое векторные эмбеддинги?", uk: "Що таке векторні ембеддінги?" }, options: { en: ["HTML embed tags used for embedding media content like videos and interactive elements into web pages", "Dense numerical representations of text (or other data) in high-dimensional space that capture semantic meaning", "Database foreign key constraints that establish referential relationships between related data tables", "Binary encoding schemes for converting individual characters into fixed-length bit representations"], de: ["HTML-Embed-Tags zum Einbetten von Medieninhalten wie Videos und interaktiven Elementen in Webseiten", "Dichte numerische Darstellungen von Text (oder anderen Daten) im hochdimensionalen Raum, die semantische Bedeutung erfassen", "Datenbank-Fremdschlüssel-Constraints, die referenzielle Beziehungen zwischen Datentabellen herstellen", "Binäre Kodierungsschemata zur Konvertierung einzelner Zeichen in Bitdarstellungen fester Länge"], ru: ["HTML-теги embed для встраивания медиаконтента, такого как видео и интерактивные элементы, на веб-страницы", "Плотные числовые представления текста (или других данных) в многомерном пространстве, отражающие семантический смысл", "Ограничения внешних ключей базы данных для установления ссылочных связей между таблицами данных", "Схемы двоичного кодирования для преобразования отдельных символов в битовые представления фиксированной длины"], uk: ["HTML-теги embed для вбудовування медіаконтенту, такого як відео та інтерактивні елементи, у веб-сторінки", "Щільні числові представлення тексту (або інших даних) у багатовимірному просторі, що відображають семантичний зміст", "Обмеження зовнішніх ключів бази даних для встановлення посилальних зв'язків між таблицями даних", "Схеми двійкового кодування для перетворення окремих символів у бітові представлення фіксованої довжини"] }, correctIndex: 1, explanation: { en: "Embedding models (e.g., OpenAI's text-embedding-3, sentence-transformers) convert text into dense vectors (e.g., 768 or 1536 dimensions). Similar meanings map to nearby points in vector space, enabling semantic search.", de: "Embedding-Modelle konvertieren Text in dichte Vektoren. Ähnliche Bedeutungen werden auf nahe Punkte im Vektorraum abgebildet, was semantische Suche ermöglicht.", ru: "Модели эмбеддингов преобразуют текст в плотные векторы (напр., 768 или 1536 измерений). Похожие значения отображаются в близкие точки векторного пространства, что позволяет вести семантический поиск.", uk: "Моделі ембеддінгів перетворюють текст у щільні вектори (напр., 768 або 1536 вимірів). Подібні значення відображаються у близькі точки векторного простору, що дозволяє вести семантичний пошук." } },
{ category: "Embeddings", question: { en: "What is cosine similarity used for in vector search?", de: "Wofür wird Kosinus-Ähnlichkeit bei der Vektorsuche verwendet?", ru: "Для чего используется косинусное сходство в векторном поиске?", uk: "Для чого використовується косинусна подібність у векторному пошуку?" }, options: { en: ["Measuring the Euclidean length or magnitude of a single vector in the embedding space", "Measuring the angle between two vectors to determine how semantically similar they are", "Counting the total number of dimensions present in a vector embedding representation", "Sorting vectors alphabetically based on the text content they originally represent"], de: ["Messung der euklidischen Länge oder Magnitude eines einzelnen Vektors im Einbettungsraum", "Messen des Winkels zwischen zwei Vektoren, um zu bestimmen, wie semantisch ähnlich sie sind", "Zählung der Gesamtanzahl der Dimensionen in einer Vektor-Einbettungsrepräsentation", "Alphabetische Sortierung von Vektoren basierend auf dem ursprünglich repräsentierten Textinhalt"], ru: ["Измерение евклидовой длины или величины одного вектора в пространстве эмбеддингов", "Измерение угла между двумя векторами для определения их семантического сходства", "Подсчёт общего количества измерений, присутствующих в представлении векторного эмбеддинга", "Сортировка векторов по алфавиту на основе текстового содержания, которое они изначально представляют"], uk: ["Вимірювання евклідової довжини або величини одного вектора у просторі ембеддінгів", "Вимірювання кута між двома векторами для визначення їх семантичної подібності", "Підрахунок загальної кількості вимірів, присутніх у представленні векторного ембеддінгу", "Сортування векторів за алфавітом на основі текстового вмісту, який вони спочатку представляють"] }, correctIndex: 1, explanation: { en: "Cosine similarity ranges from -1 to 1. A value of 1 means identical direction (same meaning), 0 means orthogonal (unrelated). It's preferred over Euclidean distance because it's magnitude-invariant.", de: "Kosinus-Ähnlichkeit reicht von -1 bis 1. Wert 1 bedeutet gleiche Richtung (gleiche Bedeutung), 0 bedeutet orthogonal (unverwandt). Bevorzugt gegenüber euklidischer Distanz, da größeninvariant.", ru: "Косинусное сходство варьируется от -1 до 1. Значение 1 означает одинаковое направление (одинаковый смысл), 0 — ортогональность (несвязанность). Предпочтительнее евклидова расстояния, так как инвариантно к масштабу.", uk: "Косинусна подібність варіюється від -1 до 1. Значення 1 означає однаковий напрямок (однаковий зміст), 0 — ортогональність (непов'язаність). Переважніше за евклідову відстань, бо інваріантна до масштабу." } },
{ category: "Embeddings", question: { en: "What is a vector database?", de: "Was ist eine Vektordatenbank?", ru: "Что такое векторная база данных?", uk: "Що таке векторна база даних?" }, options: { en: ["A regular SQL relational database with additional B-tree indexing optimizations for structured query performance", "A database optimized for storing, indexing, and querying high-dimensional vector embeddings using approximate nearest neighbor (ANN) search", "A NoSQL document store designed for storing unstructured JSON documents with flexible schema validation", "A graph database optimized for traversing and querying complex entity relationships and connections"], de: ["Eine reguläre relationale SQL-Datenbank mit zusätzlichen B-Tree-Indexoptimierungen für strukturierte Abfragen", "Eine Datenbank, optimiert für Speicherung, Indexierung und Abfrage hochdimensionaler Vektor-Embeddings mittels approximativer Nächster-Nachbar-(ANN-)Suche", "Ein NoSQL-Dokumentenspeicher für unstrukturierte JSON-Dokumente mit flexibler Schema-Validierung", "Eine Graphdatenbank, optimiert für das Traversieren und Abfragen komplexer Entitätsbeziehungen"], ru: ["Обычная реляционная SQL-база данных с дополнительными B-tree оптимизациями индексации для структурированных запросов", "База данных, оптимизированная для хранения, индексации и поиска многомерных векторных эмбеддингов с помощью приближённого поиска ближайших соседей (ANN)", "NoSQL-хранилище документов для хранения неструктурированных JSON-документов с гибкой валидацией схемы", "Графовая база данных, оптимизированная для обхода и запросов сложных связей между сущностями"], uk: ["Звичайна реляційна SQL-база даних з додатковими B-tree оптимізаціями індексації для структурованих запитів", "База даних, оптимізована для зберігання, індексації та пошуку багатовимірних векторних ембеддінгів за допомогою наближеного пошуку найближчих сусідів (ANN)", "NoSQL-сховище документів для зберігання неструктурованих JSON-документів з гнучкою валідацією схеми", "Графова база даних, оптимізована для обходу та запитів складних зв'язків між сутностями та з'єднань"] }, correctIndex: 1, explanation: { en: "Vector databases (Pinecone, Weaviate, Qdrant, Milvus, pgvector) use ANN algorithms (HNSW, IVF) for fast similarity search over millions of vectors. They're the backbone of RAG retrieval systems.", de: "Vektordatenbanken (Pinecone, Weaviate, Qdrant, Milvus, pgvector) nutzen ANN-Algorithmen (HNSW, IVF) für schnelle Ähnlichkeitssuche über Millionen von Vektoren. Sie sind das Rückgrat von RAG-Retrieval-Systemen.", ru: "Векторные БД (Pinecone, Weaviate, Qdrant, Milvus, pgvector) используют ANN-алгоритмы (HNSW, IVF) для быстрого поиска по сходству среди миллионов векторов. Они — основа систем извлечения в RAG.", uk: "Векторні БД (Pinecone, Weaviate, Qdrant, Milvus, pgvector) використовують ANN-алгоритми (HNSW, IVF) для швидкого пошуку за подібністю серед мільйонів векторів. Вони — основа систем витягування в RAG." } },
{ category: "Embeddings", question: { en: "What is a 'reranker' in a RAG pipeline?", de: "Was ist ein 'Reranker' in einer RAG-Pipeline?", ru: "Что такое 'reranker' в RAG-пайплайне?", uk: "Що таке 'reranker' у RAG-пайплайні?" }, options: { en: ["A tool that sorts and reorders search results alphabetically based on document titles and metadata fields", "A cross-encoder model that rescores retrieved documents by relevance to the query, improving retrieval precision", "A method to reorder and rearrange model layers during inference to optimize computational efficiency", "An algorithm that identifies and removes duplicate or near-duplicate results from the retrieval output"], de: ["Ein Tool, das Suchergebnisse alphabetisch nach Dokumenttiteln und Metadatenfeldern sortiert und neu ordnet", "Ein Cross-Encoder-Modell, das abgerufene Dokumente nach Relevanz zur Abfrage neu bewertet und die Retrieval-Präzision verbessert", "Eine Methode zur Neuanordnung von Modellschichten während der Inferenz zur Optimierung der Recheneffizienz", "Ein Algorithmus zur Identifizierung und Entfernung doppelter Ergebnisse aus der Abrufausgabe"], ru: ["Инструмент для сортировки и переупорядочивания результатов поиска по алфавиту на основе заголовков и метаданных", "Модель cross-encoder, переоценивающая извлечённые документы по релевантности к запросу, улучшая точность поиска", "Метод переупорядочивания и перестановки слоёв модели во время инференса для оптимизации эффективности", "Алгоритм для идентификации и удаления дублирующихся или почти дублирующихся результатов из выдачи"], uk: ["Інструмент для сортування та переупорядкування результатів пошуку за алфавітом на основі заголовків та метаданих", "Модель cross-encoder, що переоцінює витягнуті документи за релевантністю до запиту, покращуючи точність пошуку", "Метод переупорядкування та перестановки шарів моделі під час інференсу для оптимізації обчислювальної ефективності", "Алгоритм для ідентифікації та видалення дублюючих або майже дублюючих результатів із видачі пошуку"] }, correctIndex: 1, explanation: { en: "A two-stage retrieval: first, fast bi-encoder retrieves candidates (top-100), then a slower but more accurate cross-encoder reranker scores query-document pairs jointly to select the best top-5/top-10.", de: "Zweistufiges Retrieval: erst schneller Bi-Encoder (Top-100), dann langsamerer aber genauerer Cross-Encoder-Reranker für die besten Top-5/Top-10.", ru: "Двухэтапный поиск: сначала быстрый bi-encoder извлекает кандидатов (top-100), затем более медленный, но точный cross-encoder reranker оценивает пары запрос-документ для выбора лучших top-5/top-10.", uk: "Двоетапний пошук: спочатку швидкий bi-encoder витягує кандидатів (top-100), потім повільніший, але точніший cross-encoder reranker оцінює пари запит-документ для вибору найкращих top-5/top-10." } },
{ category: "Inference", question: { en: "What is model quantization?", de: "Was ist Modell-Quantisierung?", ru: "Что такое квантизация модели?", uk: "Що таке квантизація моделі?" }, options: { en: ["Splitting a model's layers across multiple machines using distributed tensor and pipeline parallelism techniques", "Reducing the numerical precision of model weights (e.g., FP32 to INT8/INT4) to decrease memory usage and speed up inference", "Increasing the total number of model parameters and adding more layers to improve overall accuracy and quality", "A data preprocessing technique that normalizes and scales input features before feeding them to the model"], de: ["Aufteilung der Modellschichten auf mehrere Maschinen mittels verteilter Tensor- und Pipeline-Parallelismus-Techniken", "Reduzierung der numerischen Präzision von Modellgewichten (z.B. FP32 zu INT8/INT4) zur Verringerung des Speicherverbrauchs und Beschleunigung der Inferenz", "Erhöhung der Gesamtparameterzahl und Hinzufügen weiterer Schichten zur Verbesserung von Genauigkeit und Qualität", "Eine Datenvorverarbeitungstechnik, die Eingabemerkmale vor der Modellverarbeitung normalisiert und skaliert"], ru: ["Разделение слоёв модели между несколькими машинами с помощью распределённого тензорного и конвейерного параллелизма", "Снижение числовой точности весов модели (напр., FP32 до INT8/INT4) для уменьшения использования памяти и ускорения инференса", "Увеличение общего числа параметров модели и добавление слоёв для улучшения общей точности и качества", "Техника предобработки данных для нормализации и масштабирования входных признаков перед подачей в модель"], uk: ["Розділення шарів моделі між кількома машинами за допомогою розподіленого тензорного та конвеєрного паралелізму", "Зниження числової точності ваг моделі (напр., FP32 до INT8/INT4) для зменшення використання пам'яті та прискорення інференсу", "Збільшення загальної кількості параметрів моделі та додавання шарів для покращення загальної точності та якості", "Техніка попередньої обробки даних для нормалізації та масштабування вхідних ознак перед подачею в модель"] }, correctIndex: 1, explanation: { en: "Quantization trades minor accuracy for major efficiency gains. GPTQ, AWQ, and GGUF are popular formats. A 70B model in 4-bit quantization can fit in ~35GB VRAM instead of ~140GB in FP32.", de: "Quantisierung tauscht geringe Genauigkeit gegen große Effizienzgewinne. GPTQ, AWQ und GGUF sind populäre Formate. Ein 70B-Modell in 4-Bit passt in ~35GB VRAM statt ~140GB in FP32.", ru: "Квантизация меняет незначительную точность на значительный выигрыш в эффективности. GPTQ, AWQ и GGUF — популярные форматы. 70B-модель в 4-бит квантизации помещается в ~35GB VRAM вместо ~140GB в FP32.", uk: "Квантизація міняє незначну точність на значний виграш в ефективності. GPTQ, AWQ та GGUF — популярні формати. 70B-модель у 4-біт квантизації вміщується у ~35GB VRAM замість ~140GB у FP32." } },
{ category: "Inference", question: { en: "What is KV-cache in transformer inference?", de: "Was ist KV-Cache bei der Transformer-Inferenz?", ru: "Что такое KV-cache в инференсе трансформеров?", uk: "Що таке KV-cache в інференсі трансформерів?" }, options: { en: ["A disk-based cache system for storing and loading model weight files to reduce download times on startup", "Caching previously computed key-value pairs in attention layers to avoid recomputation during autoregressive generation", "A key-value database used for persistently storing inference results and API response data for later retrieval", "A CPU-level hardware cache optimization that speeds up arithmetic operations during matrix multiplications"], de: ["Ein festplattenbasiertes Cache-System zum Speichern und Laden von Modellgewichtsdateien zur Reduzierung der Startzeiten", "Zwischenspeichern zuvor berechneter Key-Value-Paare in Attention-Schichten, um Neuberechnungen während der autoregressiven Generierung zu vermeiden", "Eine Key-Value-Datenbank zur persistenten Speicherung von Inferenzergebnissen und API-Antwortdaten", "Eine CPU-Hardware-Cache-Optimierung zur Beschleunigung arithmetischer Operationen bei Matrixmultiplikationen"], ru: ["Дисковая система кеширования для хранения и загрузки файлов весов модели для сокращения времени запуска", "Кэширование ранее вычисленных пар ключ-значение в слоях внимания для избежания повторных вычислений при авторегрессивной генерации", "Ключ-значение база данных для постоянного хранения результатов инференса и данных ответов API для извлечения", "Оптимизация аппаратного кеша CPU для ускорения арифметических операций при матричных умножениях"], uk: ["Дискова система кешування для зберігання та завантаження файлів ваг моделі для скорочення часу запуску", "Кешування раніше обчислених пар ключ-значення у шарах уваги для уникнення повторних обчислень при авторегресивній генерації", "Ключ-значення база даних для постійного зберігання результатів інференсу та даних відповідей API", "Оптимізація апаратного кешу CPU для прискорення арифметичних операцій при матричних множеннях"] }, correctIndex: 1, explanation: { en: "During generation, each new token needs to attend to all previous tokens. KV-cache stores their key/value projections so they're computed only once. This is why long contexts consume significant GPU memory.", de: "Während der Generierung muss jedes neue Token alle vorherigen Tokens beachten. KV-Cache speichert deren Key/Value-Projektionen, damit sie nur einmal berechnet werden.", ru: "При генерации каждый новый токен должен обращаться ко всем предыдущим. KV-cache хранит их key/value проекции, чтобы они вычислялись только один раз. Поэтому длинные контексты потребляют много GPU-памяти.", uk: "При генерації кожен новий токен повинен звертатися до всіх попередніх. KV-cache зберігає їх key/value проекції, щоб вони обчислювалися лише один раз. Тому довгі контексти споживають багато GPU-пам'яті." } },
{ category: "Inference", question: { en: "What is 'speculative decoding'?", de: "Was ist 'Speculative Decoding'?", ru: "Что такое 'speculative decoding' (спекулятивное декодирование)?", uk: "Що таке 'speculative decoding' (спекулятивне декодування)?" }, options: { en: ["Random token selection from the full vocabulary distribution without considering probability rankings at each step", "Using a smaller draft model to propose multiple tokens, then verifying them in parallel with the larger model to speed up inference", "A training method that uses speculative gradient estimation techniques for faster model convergence", "Decoding tokens in reverse order from the end of the sequence to the beginning for improved output coherence"], de: ["Zufällige Token-Auswahl aus der Gesamtvokabularverteilung ohne Berücksichtigung der Wahrscheinlichkeitsränge", "Verwendung eines kleineren Draft-Modells, das mehrere Tokens vorschlägt, die dann parallel vom größeren Modell verifiziert werden, um die Inferenz zu beschleunigen", "Eine Trainingsmethode mit spekulativen Gradientenschätzungstechniken für schnellere Modellkonvergenz", "Dekodierung von Tokens in umgekehrter Reihenfolge vom Sequenzende zum Anfang für verbesserte Kohärenz"], ru: ["Случайный выбор токенов из полного распределения словаря без учёта ранжирования вероятностей на каждом шаге", "Использование меньшей модели-черновика для предложения нескольких токенов с последующей параллельной проверкой большей моделью для ускорения инференса", "Метод обучения со спекулятивной оценкой градиентов для более быстрой сходимости модели при файн-тьюнинге", "Декодирование токенов в обратном порядке от конца последовательности к началу для улучшения связности выхода"], uk: ["Випадковий вибір токенів з повного розподілу словника без урахування ранжування ймовірностей на кожному кроці", "Використання меншої моделі-чернетки для пропонування кількох токенів з подальшою паралельною перевіркою більшою моделлю для прискорення інференсу", "Метод навчання зі спекулятивною оцінкою градієнтів для швидшої збіжності моделі під час файн-тьюнінгу", "Декодування токенів у зворотному порядку від кінця послідовності до початку для покращення зв'язності виходу"] }, correctIndex: 1, explanation: { en: "Speculative decoding uses a fast draft model to generate candidate tokens, then the target model verifies them all at once (single forward pass). Accepted tokens are kept, rejected ones are regenerated. This can achieve 2-3x speedup.", de: "Speculative Decoding nutzt ein schnelles Draft-Modell für Kandidaten-Tokens, das Zielmodell verifiziert alle auf einmal. Kann 2-3x Beschleunigung erreichen.", ru: "Speculative decoding использует быструю модель-черновик для генерации кандидатов-токенов, затем целевая модель проверяет их все за один проход. Принятые токены сохраняются, отвергнутые перегенерируются. Ускорение в 2-3 раза.", uk: "Speculative decoding використовує швидку модель-чернетку для генерації кандидатів-токенів, потім цільова модель перевіряє їх усі за один прохід. Прийняті токени зберігаються, відхилені перегенеруються. Прискорення у 2-3 рази." } },
{ category: "Inference", question: { en: "What is 'continuous batching' in LLM serving?", de: "Was ist 'Continuous Batching' beim LLM-Serving?", ru: "Что такое 'continuous batching' в обслуживании LLM?", uk: "Що таке 'continuous batching' в обслуговуванні LLM?" }, options: { en: ["Processing only one request at a time in strict sequential order to ensure consistent output quality", "Dynamically adding new requests to a running batch as existing requests complete, maximizing GPU utilization", "Batching and grouping training data samples into fixed-size epochs for standard model training procedures", "Splitting a model's computation across multiple batch partitions to distribute the inference workload evenly"], de: ["Verarbeitung nur einer Anfrage gleichzeitig in strikt sequenzieller Reihenfolge zur Sicherung konsistenter Qualität", "Dynamisches Hinzufügen neuer Anfragen zu einem laufenden Batch, wenn bestehende Anfragen abgeschlossen sind, um die GPU-Auslastung zu maximieren", "Batchung und Gruppierung von Trainingsdaten in Epochen fester Größe für Standard-Modelltraining", "Aufteilung der Modellberechnung auf mehrere Batch-Partitionen zur gleichmäßigen Verteilung der Inferenzlast"], ru: ["Обработка только одного запроса за раз в строгом последовательном порядке для обеспечения стабильного качества", "Динамическое добавление новых запросов в работающий батч по мере завершения существующих, максимизируя утилизацию GPU", "Группировка обучающих данных в пакеты фиксированного размера для стандартных процедур обучения модели", "Разделение вычислений модели по нескольким пакетным разделам для равномерного распределения нагрузки инференса"], uk: ["Обробка лише одного запиту за раз у строгому послідовному порядку для забезпечення стабільної якості виходу", "Динамічне додавання нових запитів у працюючий батч у міру завершення існуючих, максимізуючи утилізацію GPU", "Групування навчальних даних у пакети фіксованого розміру для стандартних процедур навчання моделі", "Розділення обчислень моделі по кількох пакетних розділах для рівномірного розподілу навантаження інференсу"] }, correctIndex: 1, explanation: { en: "Unlike static batching (wait for all to finish), continuous batching (used in vLLM, TGI) inserts new requests as slots free up. This dramatically improves throughput and reduces latency for LLM inference servers.", de: "Im Gegensatz zu statischem Batching fügt Continuous Batching (vLLM, TGI) neue Anfragen ein, sobald Slots frei werden. Dies verbessert Durchsatz und reduziert Latenz erheblich.", ru: "В отличие от статического батчинга, continuous batching (используется в vLLM, TGI) вставляет новые запросы по мере освобождения слотов. Это значительно улучшает пропускную способность и снижает задержки серверов инференса LLM.", uk: "На відміну від статичного батчінгу, continuous batching (використовується у vLLM, TGI) вставляє нові запити у міру звільнення слотів. Це значно покращує пропускну здатність та знижує затримки серверів інференсу LLM." } },
{ category: "Multi-Agent", question: { en: "What is a multi-agent system in AI?", de: "Was ist ein Multi-Agenten-System in der KI?", ru: "Что такое мультиагентная система в ИИ?", uk: "Що таке мультиагентна система в ШІ?" }, options: { en: ["Running a single agent instance on multiple distributed servers for horizontal scaling and redundancy", "Multiple AI agents collaborating, delegating tasks, or debating to accomplish complex goals", "A model architecture with multiple specialized output heads that generate different types of predictions", "An ensemble of different model architectures combined to improve prediction accuracy through voting"], de: ["Ausführung einer einzelnen Agenteninstanz auf mehreren verteilten Servern für horizontale Skalierung", "Mehrere KI-Agenten, die zusammenarbeiten, Aufgaben delegieren oder debattieren, um komplexe Ziele zu erreichen", "Eine Modellarchitektur mit mehreren spezialisierten Ausgabeköpfen für verschiedene Vorhersagetypen", "Ein Ensemble verschiedener Modellarchitekturen zur Verbesserung der Vorhersagegenauigkeit durch Abstimmung"], ru: ["Запуск одного экземпляра агента на нескольких серверах для горизонтального масштабирования и отказоустойчивости", "Несколько ИИ-агентов, сотрудничающих, делегирующих задачи или дебатирующих для достижения сложных целей", "Архитектура модели с несколькими специализированными выходными головами для разных типов предсказаний", "Ансамбль различных архитектур моделей, объединённых для улучшения точности предсказаний через голосование"], uk: ["Запуск одного екземпляра агента на кількох розподілених серверах для горизонтального масштабування", "Кілька ШІ-агентів, що співпрацюють, делегують задачі або дебатують для досягнення складних цілей", "Архітектура моделі з кількома спеціалізованими вихідними головами для різних типів передбачень", "Ансамбль різних архітектур моделей, об'єднаних для покращення точності передбачень через голосування"] }, correctIndex: 1, explanation: { en: "Multi-agent systems decompose complex problems. Agents can have specialized roles (researcher, coder, reviewer), different tools, or different models. They communicate via messages and can check each other's work.", de: "Multi-Agenten-Systeme zerlegen komplexe Probleme. Agenten können spezialisierte Rollen haben und über Nachrichten kommunizieren.", ru: "Мультиагентные системы декомпозируют сложные задачи. Агенты могут иметь специализированные роли (исследователь, программист, ревьюер), разные инструменты или модели. Они общаются через сообщения и могут проверять работу друг друга.", uk: "Мультиагентні системи декомпозують складні задачі. Агенти можуть мати спеціалізовані ролі (дослідник, програміст, рев'юер), різні інструменти або моделі. Вони спілкуються через повідомлення та можуть перевіряти роботу одне одного." } },
{ category: "Multi-Agent", question: { en: "What is the 'orchestrator' pattern in multi-agent systems?", de: "Was ist das 'Orchestrator'-Muster in Multi-Agenten-Systemen?", ru: "Что такое паттерн 'оркестратор' в мультиагентных системах?", uk: "Що таке патерн 'оркестратор' у мультиагентних системах?" }, options: { en: ["All agents work independently in complete isolation without any communication, coordination, or shared context", "A central agent that plans the task, delegates sub-tasks to specialized agents, and aggregates their results", "A musical AI system that composes, arranges, and generates orchestral scores using neural network synthesis", "A distributed training pattern that synchronizes gradient updates across multiple GPU nodes in a cluster"], de: ["Alle Agenten arbeiten unabhängig in völliger Isolation ohne Kommunikation, Koordination oder gemeinsamen Kontext", "Ein zentraler Agent, der die Aufgabe plant, Teilaufgaben an spezialisierte Agenten delegiert und deren Ergebnisse aggregiert", "Ein musikalisches KI-System, das Orchesterpartituren mit neuronaler Netzwerksynthese komponiert und arrangiert", "Ein verteiltes Trainingsmuster, das Gradienten-Updates über mehrere GPU-Knoten in einem Cluster synchronisiert"], ru: ["Все агенты работают независимо в полной изоляции без коммуникации, координации или общего контекста", "Центральный агент, планирующий задачу, делегирующий подзадачи специализированным агентам и агрегирующий их результаты", "Музыкальная ИИ-система, которая сочиняет и аранжирует оркестровые партитуры с помощью нейросинтеза", "Паттерн распределённого обучения для синхронизации обновлений градиентов между несколькими GPU-узлами в кластере"], uk: ["Всі агенти працюють незалежно у повній ізоляції без комунікації, координації або спільного контексту", "Центральний агент, що планує задачу, делегує підзадачі спеціалізованим агентам та агрегує їх результати", "Музична ШІ-система, що створює та аранжує оркестрові партитури за допомогою нейромережевого синтезу", "Патерн розподіленого навчання для синхронізації оновлень градієнтів між кількома GPU-вузлами в кластері"] }, correctIndex: 1, explanation: { en: "The orchestrator acts like a project manager. It understands the full task, breaks it down, assigns parts to specialist agents (coder, researcher, tester), collects results, and synthesizes the final output.", de: "Der Orchestrator agiert wie ein Projektmanager. Er versteht die Aufgabe, teilt sie auf, weist Teile spezialisierten Agenten zu und synthetisiert die finale Ausgabe.", ru: "Оркестратор действует как проект-менеджер. Он понимает всю задачу, разбивает её, назначает части специализированным агентам (кодер, исследователь, тестер), собирает результаты и синтезирует финальный вывод.", uk: "Оркестратор діє як проект-менеджер. Він розуміє всю задачу, розбиває її, призначає частини спеціалізованим агентам (кодер, дослідник, тестер), збирає результати та синтезує фінальний вивід." } },
{ category: "Multi-Agent", question: { en: "What is the 'debate' pattern in multi-agent AI?", de: "Was ist das 'Debate'-Muster in Multi-Agenten-KI?", ru: "Что такое паттерн 'дебаты' в мультиагентном ИИ?", uk: "Що таке патерн 'дебати' у мультиагентному ШІ?" }, options: { en: ["Multiple agents competing for shared GPU resources and memory allocation in a distributed inference cluster", "Multiple agents argue different positions or perspectives on a problem, with a judge agent evaluating the arguments to reach a better conclusion", "A voting-based system where multiple models cast votes to choose the best prediction from candidate outputs", "Training adversarial models against each other in a GAN-like setup to improve discriminative capabilities"], de: ["Mehrere Agenten konkurrieren um gemeinsame GPU-Ressourcen und Speicherzuweisung in einem verteilten Inferenzcluster", "Mehrere Agenten argumentieren verschiedene Positionen zu einem Problem, wobei ein Richter-Agent die Argumente bewertet, um zu einer besseren Schlussfolgerung zu gelangen", "Ein abstimmungsbasiertes System, bei dem mehrere Modelle für die beste Vorhersage aus Kandidatenausgaben stimmen", "Training adversarialer Modelle gegeneinander in einem GAN-ähnlichen Setup zur Verbesserung der Diskriminierung"], ru: ["Несколько агентов, конкурирующих за общие GPU-ресурсы и распределение памяти в кластере инференса", "Несколько агентов отстаивают разные позиции по проблеме, а агент-судья оценивает аргументы для достижения лучшего вывода", "Система голосования, где несколько моделей голосуют за лучшее предсказание из кандидатных выходов", "Обучение состязательных моделей друг против друга в GAN-подобной установке для улучшения дискриминативности"], uk: ["Кілька агентів, що конкурують за спільні GPU-ресурси та розподіл пам'яті в розподіленому кластері інференсу", "Кілька агентів відстоюють різні позиції щодо проблеми, а агент-суддя оцінює аргументи для досягнення кращого висновку", "Система голосування, де кілька моделей голосують за найкраще передбачення з кандидатних виходів", "Навчання змагальних моделей одна проти одної в GAN-подібній установці для покращення дискримінативності"] }, correctIndex: 1, explanation: { en: "The debate pattern improves answer quality through adversarial reasoning. Different agents challenge each other's arguments, exposing flaws and forcing stronger justifications. Research shows this reduces errors.", de: "Das Debate-Muster verbessert die Antwortqualität durch adversariales Reasoning. Verschiedene Agenten hinterfragen gegenseitig ihre Argumente.", ru: "Паттерн дебатов улучшает качество ответов через состязательное рассуждение. Разные агенты оспаривают аргументы друг друга, выявляя слабости и заставляя давать более сильные обоснования.", uk: "Патерн дебатів покращує якість відповідей через змагальне міркування. Різні агенти оскаржують аргументи одне одного, виявляючи слабкості та змушуючи давати сильніші обґрунтування." } },
{ category: "Agents", question: { en: "What is 'reflection' in AI agents?", de: "Was ist 'Reflexion' bei KI-Agenten?", ru: "Что такое 'рефлексия' в ИИ-агентах?", uk: "Що таке 'рефлексія' в ШІ-агентах?" }, options: { en: ["Mirroring and adapting to the user's language style, tone, and communication preferences in responses", "The agent evaluates its own outputs, identifies errors or improvements, and self-corrects before delivering the final response", "Reflecting and echoing raw data back to the original sender without any processing or transformation", "A debugging and diagnostic technique for neural networks that traces activation patterns through layers"], de: ["Spiegelung und Anpassung an den Sprachstil, Ton und die Kommunikationspräferenzen des Benutzers", "Der Agent bewertet seine eigenen Ausgaben, identifiziert Fehler oder Verbesserungen und korrigiert sich selbst, bevor er die endgültige Antwort liefert", "Zurückspiegeln und Echo von Rohdaten an den ursprünglichen Absender ohne Verarbeitung oder Transformation", "Eine Debug- und Diagnosetechnik für neuronale Netzwerke, die Aktivierungsmuster durch Schichten verfolgt"], ru: ["Зеркальное отражение и адаптация к языковому стилю, тону и коммуникационным предпочтениям пользователя", "Агент оценивает собственные выходные данные, выявляет ошибки или возможности улучшения и самокорректируется перед выдачей финального ответа", "Отражение и возврат необработанных данных обратно отправителю без какой-либо обработки или трансформации", "Техника отладки и диагностики нейронных сетей, отслеживающая паттерны активаций через слои"], uk: ["Дзеркальне відображення та адаптація до мовного стилю, тону та комунікаційних уподобань користувача", "Агент оцінює власні вихідні дані, виявляє помилки або можливості покращення та самокоригується перед видачею фінальної відповіді", "Відображення та повернення необроблених даних назад відправнику без будь-якої обробки чи трансформації", "Техніка відлагодження та діагностики нейронних мереж, що відстежує патерни активацій через шари"] }, correctIndex: 1, explanation: { en: "Reflection agents generate an initial output, then critique it (sometimes with a separate 'critic' prompt), identify weaknesses, and produce a refined version. This iterative self-improvement mimics human review processes.", de: "Reflexions-Agenten erzeugen eine erste Ausgabe, kritisieren sie dann, identifizieren Schwächen und produzieren eine verbesserte Version. Iterative Selbstverbesserung.", ru: "Рефлексивные агенты генерируют начальный вывод, затем критикуют его (иногда отдельным промптом 'критика'), выявляют слабости и создают улучшенную версию. Итеративное самосовершенствование имитирует процесс человеческого ревью.", uk: "Рефлексивні агенти генерують початковий вивід, потім критикують його (іноді окремим промптом 'критика'), виявляють слабкості та створюють покращену версію. Ітеративне самовдосконалення імітує процес людського рев'ю." } },
{ category: "Agents", question: { en: "What is the difference between 'reactive' and 'proactive' AI agents?", de: "Was ist der Unterschied zwischen 'reaktiven' und 'proaktiven' KI-Agenten?", ru: "В чём разница между 'реактивными' и 'проактивными' ИИ-агентами?", uk: "У чому різниця між 'реактивними' та 'проактивними' ШІ-агентами?" }, options: { en: ["Reactive agents provide faster response times with lower latency, while proactive agents deliver more accurate outputs", "Reactive agents respond to stimuli/queries; proactive agents anticipate needs, plan ahead, and initiate actions toward goals", "Reactive agents run exclusively on GPU hardware, while proactive agents run exclusively on CPU infrastructure", "There is no meaningful architectural or behavioral difference between reactive and proactive agent implementations"], de: ["Reaktive Agenten bieten schnellere Antwortzeiten mit niedrigerer Latenz, proaktive liefern genauere Ausgaben", "Reaktive Agenten reagieren auf Stimuli/Anfragen; proaktive Agenten antizipieren Bedürfnisse, planen voraus und initiieren Aktionen", "Reaktive Agenten laufen ausschließlich auf GPU-Hardware, proaktive ausschließlich auf CPU-Infrastruktur", "Es gibt keinen bedeutsamen architektonischen oder verhaltensmäßigen Unterschied zwischen beiden Agententypen"], ru: ["Реактивные агенты обеспечивают более быстрое время отклика с меньшей задержкой, проактивные дают более точные выходы", "Реактивные агенты отвечают на стимулы/запросы; проактивные предвидят потребности, планируют наперёд и инициируют действия к целям", "Реактивные агенты работают исключительно на GPU-оборудовании, проактивные — исключительно на CPU-инфраструктуре", "Между реактивными и проактивными реализациями агентов нет значимой архитектурной или поведенческой разницы"], uk: ["Реактивні агенти забезпечують швидший час відгуку з меншою затримкою, проактивні дають більш точні виходи", "Реактивні агенти відповідають на стимули/запити; проактивні передбачають потреби, планують наперед та ініціюють дії до цілей", "Реактивні агенти працюють виключно на GPU-обладнанні, проактивні — виключно на CPU-інфраструктурі", "Між реактивними та проактивними реалізаціями агентів немає значущої архітектурної чи поведінкової різниці"] }, correctIndex: 1, explanation: { en: "Reactive agents are stimulus-response (chatbots). Proactive agents maintain goals, monitor conditions, and take initiative — e.g., an agent that notices a failing CI pipeline and proactively opens a fix PR.", de: "Reaktive Agenten sind Stimulus-Antwort (Chatbots). Proaktive Agenten haben Ziele, überwachen Bedingungen und ergreifen Initiative — z.B. ein Agent, der eine fehlende CI-Pipeline bemerkt und proaktiv einen Fix-PR öffnet.", ru: "Реактивные агенты — стимул-реакция (чатботы). Проактивные агенты поддерживают цели, мониторят условия и проявляют инициативу — напр., агент замечает падающий CI-пайплайн и проактивно открывает PR с исправлением.", uk: "Реактивні агенти — стимул-реакція (чатботи). Проактивні агенти підтримують цілі, моніторять умови та проявляють ініціативу — напр., агент помічає падаючий CI-пайплайн і проактивно відкриває PR з виправленням." } },
{ category: "Agents", question: { en: "What is 'planning' in the context of AI agents?", de: "Was ist 'Planung' im Kontext von KI-Agenten?", ru: "Что такое 'планирование' в контексте ИИ-агентов?", uk: "Що таке 'планування' у контексті ШІ-агентів?" }, options: { en: ["Scheduling and allocating GPU resources across a cluster to optimize compute utilization during inference", "Breaking down a complex task into a sequence of steps before execution, often with the ability to revise the plan", "A model training schedule that defines learning rate warmup, decay, and checkpoint saving intervals", "Allocating and managing memory for inference buffers, KV-cache, and model weight storage on the device"], de: ["Planung und Zuweisung von GPU-Ressourcen über einen Cluster zur Optimierung der Rechenauslastung bei Inferenz", "Zerlegung einer komplexen Aufgabe in eine Abfolge von Schritten vor der Ausführung, oft mit der Möglichkeit, den Plan zu überarbeiten", "Ein Modell-Trainingsplan, der Lernraten-Warmup, Abklingen und Checkpoint-Speicherintervalle definiert", "Zuweisung und Verwaltung von Speicher für Inferenzpuffer, KV-Cache und Modellgewichtsspeicherung"], ru: ["Планирование и распределение GPU-ресурсов в кластере для оптимизации вычислительной утилизации при инференсе", "Разбиение сложной задачи на последовательность шагов перед выполнением, часто с возможностью пересмотра плана", "Расписание обучения модели, определяющее прогрев скорости обучения, затухание и интервалы сохранения чекпоинтов", "Выделение и управление памятью для инференсных буферов, KV-кеша и хранения весов модели на устройстве"], uk: ["Планування та розподіл GPU-ресурсів у кластері для оптимізації обчислювальної утилізації під час інференсу", "Розбиття складної задачі на послідовність кроків перед виконанням, часто з можливістю перегляду плану", "Розклад навчання моделі, що визначає прогрів швидкості навчання, згасання та інтервали збереження чекпоінтів", "Виділення та керування пам'яттю для інференсних буферів, KV-кешу та зберігання ваг моделі на пристрої"] }, correctIndex: 1, explanation: { en: "Planning agents create task decompositions before acting. They may use techniques like task graphs, tree-of-thought, or iterative refinement. Good planning reduces wasted tool calls and improves task completion rates.", de: "Planungsagenten erstellen Aufgabenzerlegungen vor dem Handeln. Sie nutzen Techniken wie Aufgabengraphen, Tree-of-Thought oder iterative Verfeinerung.", ru: "Планирующие агенты создают декомпозицию задач перед действием. Они могут использовать техники вроде графов задач, tree-of-thought или итеративного уточнения. Хорошее планирование сокращает бесполезные вызовы инструментов.", uk: "Плануючі агенти створюють декомпозицію задач перед дією. Вони можуть використовувати техніки на кшталт графів задач, tree-of-thought або ітеративного уточнення. Добре планування скорочує марні виклики інструментів." } },
{ category: "Agents", question: { en: "What is MCP (Model Context Protocol)?", de: "Was ist MCP (Model Context Protocol)?", ru: "Что такое MCP (Model Context Protocol)?", uk: "Що таке MCP (Model Context Protocol)?" }, options: { en: ["A model compression protocol that reduces weight precision and prunes layers for efficient deployment", "An open standard for connecting AI models to external tools and data sources through a unified interface", "A multi-core processing protocol that distributes inference workloads across CPU cores for parallelism", "A model checkpointing format used to save and restore training state across distributed training runs"], de: ["Ein Modellkompressionsprotokoll, das Gewichtspräzision reduziert und Schichten für effizientes Deployment beschneidet", "Ein offener Standard zur Verbindung von KI-Modellen mit externen Tools und Datenquellen über eine einheitliche Schnittstelle", "Ein Multi-Core-Verarbeitungsprotokoll, das Inferenz-Workloads über CPU-Kerne für Parallelismus verteilt", "Ein Modell-Checkpointing-Format zum Speichern und Wiederherstellen des Trainingszustands über verteilte Läufe"], ru: ["Протокол сжатия модели, снижающий точность весов и обрезающий слои для эффективного развёртывания", "Открытый стандарт для подключения ИИ-моделей к внешним инструментам и источникам данных через унифицированный интерфейс", "Протокол многоядерной обработки, распределяющий нагрузки инференса по ядрам CPU для параллелизма", "Формат чекпоинтинга модели для сохранения и восстановления состояния обучения в распределённых запусках"], uk: ["Протокол стиснення моделі, що знижує точність ваг та обрізає шари для ефективного розгортання", "Відкритий стандарт для підключення ШІ-моделей до зовнішніх інструментів та джерел даних через уніфікований інтерфейс", "Протокол багатоядерної обробки, що розподіляє навантаження інференсу по ядрах CPU для паралелізму", "Формат чекпоінтингу моделі для збереження та відновлення стану навчання у розподілених запусках"] }, correctIndex: 1, explanation: { en: "MCP (by Anthropic) standardizes how AI applications connect to data sources and tools. It defines a client-server protocol where MCP servers expose tools, resources, and prompts that any MCP-compatible client can use.", de: "MCP (von Anthropic) standardisiert, wie KI-Anwendungen sich mit Datenquellen und Tools verbinden. Es definiert ein Client-Server-Protokoll, bei dem MCP-Server Tools und Ressourcen bereitstellen.", ru: "MCP (от Anthropic) стандартизирует подключение ИИ-приложений к источникам данных и инструментам. Определяет клиент-серверный протокол, где MCP-серверы предоставляют инструменты, ресурсы и промпты, которые может использовать любой MCP-совместимый клиент.", uk: "MCP (від Anthropic) стандартизує підключення ШІ-застосунків до джерел даних та інструментів. Визначає клієнт-серверний протокол, де MCP-сервери надають інструменти, ресурси та промпти, які може використовувати будь-який MCP-сумісний клієнт." } },
{ category: "Multi-Agent", question: { en: "What is 'handoff' between agents?", de: "Was ist ein 'Handoff' zwischen Agenten?", ru: "Что такое 'handoff' (передача) между агентами?", uk: "Що таке 'handoff' (передача) між агентами?" }, options: { en: ["Shutting down all running agents simultaneously and releasing their allocated resources and connections", "Transferring control and context from one agent to another agent that is better suited for the current sub-task", "Sharing GPU memory segments between agents through inter-process communication and shared memory buffers", "A load balancing technique that distributes incoming requests evenly across multiple agent instances"], de: ["Gleichzeitiges Herunterfahren aller laufenden Agenten und Freigabe ihrer zugewiesenen Ressourcen und Verbindungen", "Übertragung von Kontrolle und Kontext von einem Agenten an einen anderen, der für die aktuelle Teilaufgabe besser geeignet ist", "Teilen von GPU-Speichersegmenten zwischen Agenten durch Interprozesskommunikation und gemeinsame Speicherpuffer", "Eine Load-Balancing-Technik, die eingehende Anfragen gleichmäßig auf mehrere Agenteninstanzen verteilt"], ru: ["Одновременное завершение работы всех агентов и освобождение их выделенных ресурсов и соединений", "Передача управления и контекста от одного агента другому, который лучше подходит для текущей подзадачи", "Совместное использование сегментов GPU-памяти между агентами через межпроцессное взаимодействие и буферы", "Техника балансировки нагрузки для равномерного распределения входящих запросов между экземплярами агентов"], uk: ["Одночасне завершення роботи всіх агентів та звільнення їхніх виділених ресурсів та з'єднань", "Передача управління та контексту від одного агента іншому, який краще підходить для поточної підзадачі", "Спільне використання сегментів GPU-пам'яті між агентами через міжпроцесну взаємодію та буфери пам'яті", "Техніка балансування навантаження для рівномірного розподілу вхідних запитів між екземплярами агентів"] }, correctIndex: 1, explanation: { en: "Handoffs enable specialization. A triage agent might hand off to a billing agent or technical support agent based on the user's query. The receiving agent gets relevant context to continue the conversation seamlessly.", de: "Handoffs ermöglichen Spezialisierung. Ein Triage-Agent kann je nach Benutzeranfrage an einen Abrechnungs- oder Supportagenten übergeben.", ru: "Handoffs обеспечивают специализацию. Агент-триаж может передать управление биллинг-агенту или агенту техподдержки в зависимости от запроса пользователя. Принимающий агент получает релевантный контекст для бесшовного продолжения.", uk: "Handoffs забезпечують спеціалізацію. Агент-тріаж може передати управління білінг-агенту або агенту техпідтримки залежно від запиту користувача. Приймаючий агент отримує релевантний контекст для безшовного продовження." } },
{ category: "LLM", question: { en: "What is 'context length extrapolation'?", de: "Was ist 'Context Length Extrapolation'?", ru: "Что такое 'экстраполяция длины контекста'?", uk: "Що таке 'екстраполяція довжини контексту'?" }, options: { en: ["Adding more diverse training data and examples to expand the model's knowledge coverage and capabilities", "Techniques to allow models to handle longer sequences than they were trained on, such as RoPE scaling or ALiBi", "Reducing the context window size through truncation to lower memory usage and improve inference speed", "A data augmentation method that generates paraphrased versions of training examples to increase diversity"], de: ["Hinzufügen vielfältigerer Trainingsdaten und Beispiele zur Erweiterung der Wissensabdeckung des Modells", "Techniken, die Modellen erlauben, längere Sequenzen zu verarbeiten als trainiert, z.B. RoPE-Skalierung oder ALiBi", "Reduzierung der Kontextfenstergröße durch Trunkierung zur Senkung des Speicherverbrauchs und Beschleunigung", "Eine Datenaugmentierungsmethode, die paraphrasierte Versionen von Trainingsbeispielen generiert"], ru: ["Добавление более разнообразных обучающих данных и примеров для расширения охвата знаний и возможностей модели", "Техники, позволяющие моделям обрабатывать более длинные последовательности, чем при обучении, например RoPE scaling или ALiBi", "Уменьшение размера контекстного окна через усечение для снижения потребления памяти и ускорения инференса", "Метод аугментации данных, генерирующий перефразированные версии обучающих примеров для увеличения разнообразия"], uk: ["Додавання різноманітніших навчальних даних та прикладів для розширення охоплення знань та можливостей моделі", "Техніки, що дозволяють моделям обробляти довші послідовності, ніж при навчанні, наприклад RoPE scaling або ALiBi", "Зменшення розміру контекстного вікна через обрізання для зниження споживання пам'яті та прискорення інференсу", "Метод аугментації даних, що генерує перефразовані версії навчальних прикладів для збільшення різноманітності"] }, correctIndex: 1, explanation: { en: "Positional encoding techniques like RoPE (Rotary Position Embedding) can be scaled to extend context length. YaRN, NTK-aware scaling, and ALiBi enable models trained on 4K context to work with 32K+ tokens.", de: "Positionelle Kodierungstechniken wie RoPE können skaliert werden. YaRN, NTK-aware Scaling und ALiBi ermöglichen Modellen, die auf 4K trainiert wurden, mit 32K+ Tokens zu arbeiten.", ru: "Техники позиционного кодирования, такие как RoPE, могут быть масштабированы для расширения контекста. YaRN, NTK-aware scaling и ALiBi позволяют моделям, обученным на 4K контексте, работать с 32K+ токенами.", uk: "Техніки позиційного кодування, такі як RoPE, можуть бути масштабовані для розширення контексту. YaRN, NTK-aware scaling та ALiBi дозволяють моделям, навченим на 4K контексті, працювати з 32K+ токенами." } },
{ category: "RAG", question: { en: "What is 'agentic RAG'?", de: "Was ist 'Agentic RAG'?", ru: "Что такое 'агентный RAG' (agentic RAG)?", uk: "Що таке 'агентний RAG' (agentic RAG)?" }, options: { en: ["A RAG implementation that operates entirely without a vector database, using only the model's parametric knowledge", "A RAG system where an AI agent dynamically decides what to retrieve, how to query, and when to search again based on intermediate results", "Using standalone AI agents as a complete replacement for RAG pipelines, eliminating the need for retrieval entirely", "A RAG system with a fixed predefined query pipeline that executes the same retrieval steps for every input"], de: ["Eine RAG-Implementierung, die vollständig ohne Vektordatenbank arbeitet und nur das parametrische Wissen nutzt", "Ein RAG-System, bei dem ein KI-Agent dynamisch entscheidet, was abgerufen werden soll, wie abgefragt wird und wann basierend auf Zwischenergebnissen erneut gesucht wird", "Verwendung eigenständiger KI-Agenten als vollständiger Ersatz für RAG-Pipelines, ohne jeglichen Abrufbedarf", "Ein RAG-System mit einer festen vordefinierten Abfrage-Pipeline, die für jede Eingabe dieselben Schritte ausführt"], ru: ["Реализация RAG, работающая полностью без векторной базы данных, используя только параметрические знания модели", "Система RAG, где ИИ-агент динамически решает, что извлекать, как формировать запрос и когда искать снова на основе промежуточных результатов", "Использование автономных ИИ-агентов как полной замены RAG-пайплайнов, полностью устраняя потребность в извлечении", "RAG-система с фиксированным предопределённым конвейером запросов, выполняющим одинаковые шаги для каждого входа"], uk: ["Реалізація RAG, що працює повністю без векторної бази даних, використовуючи лише параметричні знання моделі", "Система RAG, де ШІ-агент динамічно вирішує, що витягувати, як формувати запит і коли шукати знову на основі проміжних результатів", "Використання автономних ШІ-агентів як повної заміни RAG-пайплайнів, повністю усуваючи потребу у витягуванні", "RAG-система з фіксованим попередньо визначеним конвеєром запитів, що виконує однакові кроки для кожного входу"] }, correctIndex: 1, explanation: { en: "Unlike naive RAG (single query → retrieve → generate), agentic RAG uses an agent that can reformulate queries, search multiple sources, evaluate retrieval quality, and iterate until it has sufficient information.", de: "Im Gegensatz zu naivem RAG nutzt Agentic RAG einen Agenten, der Abfragen umformulieren, mehrere Quellen durchsuchen und iterieren kann, bis genügend Informationen vorliegen.", ru: "В отличие от наивного RAG (один запрос → извлечение → генерация), агентный RAG использует агента, который может переформулировать запросы, искать в нескольких источниках, оценивать качество извлечения и итерировать до получения достаточной информации.", uk: "На відміну від наївного RAG (один запит → витягування → генерація), агентний RAG використовує агента, який може переформульовувати запити, шукати в кількох джерелах, оцінювати якість витягування та ітерувати до отримання достатньої інформації." } },
{ category: "Embeddings", question: { en: "What is the difference between bi-encoder and cross-encoder models?", de: "Was ist der Unterschied zwischen Bi-Encoder- und Cross-Encoder-Modellen?", ru: "В чём разница между bi-encoder и cross-encoder моделями?", uk: "У чому різниця між bi-encoder та cross-encoder моделями?" }, options: { en: ["Both architectures produce identical results with the same accuracy, differing only in implementation details", "Bi-encoders encode query and document independently (fast, scalable); cross-encoders process them jointly (slower, more accurate)", "Bi-encoders are a more recent innovation developed after cross-encoders as an improved architecture replacement", "Cross-encoders process queries and documents independently, making them significantly faster than bi-encoders"], de: ["Beide Architekturen liefern identische Ergebnisse mit gleicher Genauigkeit und unterscheiden sich nur in Details", "Bi-Encoder kodieren Abfrage und Dokument unabhängig (schnell, skalierbar); Cross-Encoder verarbeiten sie gemeinsam (langsamer, genauer)", "Bi-Encoder sind eine neuere Innovation, die nach Cross-Encodern als verbesserte Architektur entwickelt wurden", "Cross-Encoder verarbeiten Queries und Dokumente unabhängig, wodurch sie deutlich schneller als Bi-Encoder sind"], ru: ["Обе архитектуры дают идентичные результаты с одинаковой точностью, различаясь только деталями реализации", "Bi-encoder кодируют запрос и документ независимо (быстро, масштабируемо); cross-encoder обрабатывают их совместно (медленнее, точнее)", "Би-энкодеры — более поздняя инновация, разработанная после кросс-энкодеров как улучшенная замена архитектуры", "Кросс-энкодеры обрабатывают запросы и документы независимо, что делает их значительно быстрее би-энкодеров"], uk: ["Обидві архітектури дають ідентичні результати з однаковою точністю, відрізняючись лише деталями реалізації", "Bi-encoder кодують запит і документ незалежно (швидко, масштабовано); cross-encoder обробляють їх спільно (повільніше, точніше)", "Бі-енкодери — більш пізня інновація, розроблена після крос-енкодерів як покращена заміна архітектури", "Крос-енкодери обробляють запити та документи незалежно, що робить їх значно швидшими за бі-енкодери"] }, correctIndex: 1, explanation: { en: "Bi-encoders (e.g., sentence-transformers) are used for retrieval — they pre-compute document embeddings for fast search. Cross-encoders score query-document pairs together and are used for reranking the top results.", de: "Bi-Encoder werden für Retrieval verwendet — sie berechnen Dokument-Embeddings vorab. Cross-Encoder bewerten Query-Dokument-Paare gemeinsam und werden zum Reranking verwendet.", ru: "Bi-encoder (напр., sentence-transformers) используются для поиска — они предварительно вычисляют эмбеддинги документов. Cross-encoder оценивают пары запрос-документ совместно и используются для переранжирования топ-результатов.", uk: "Bi-encoder (напр., sentence-transformers) використовуються для пошуку — вони попередньо обчислюють ембеддінги документів. Cross-encoder оцінюють пари запит-документ спільно та використовуються для переранжування топ-результатів." } },
{ category: "Multi-Agent", question: { en: "What are the key challenges of multi-agent systems?", de: "Was sind die Hauptherausforderungen von Multi-Agenten-Systemen?", ru: "Каковы основные проблемы мультиагентных систем?", uk: "Які основні проблеми мультиагентних систем?" }, options: { en: ["Multi-agent systems are always significantly slower than single agents regardless of task complexity or parallelism", "Coordination overhead, error propagation between agents, context management, and increased cost/latency", "Multi-agent systems are exclusively compatible with GPT-4 and cannot function with any other language model", "Multi-agent systems require quantum computing hardware and cannot be deployed on classical computing infrastructure"], de: ["Multi-Agenten-Systeme sind immer deutlich langsamer als Einzelagenten, unabhängig von Aufgabenkomplexität", "Koordinationsaufwand, Fehlerpropagation zwischen Agenten, Kontextverwaltung und erhöhte Kosten/Latenz", "Multi-Agenten-Systeme sind ausschließlich mit GPT-4 kompatibel und funktionieren mit keinem anderen Sprachmodell", "Multi-Agenten-Systeme benötigen Quantencomputing-Hardware und können nicht auf klassischer Infrastruktur betrieben werden"], ru: ["Мультиагентные системы всегда значительно медленнее одиночных агентов независимо от сложности задачи", "Накладные расходы на координацию, распространение ошибок между агентами, управление контекстом и увеличенные затраты/задержки", "Мультиагентные системы совместимы исключительно с GPT-4 и не могут работать с любой другой языковой моделью", "Мультиагентные системы требуют квантового вычислительного оборудования и не могут работать на классической инфраструктуре"], uk: ["Мультиагентні системи завжди значно повільніші за одиночних агентів незалежно від складності задачі", "Накладні витрати на координацію, поширення помилок між агентами, управління контекстом та збільшені витрати/затримки", "Мультиагентні системи сумісні виключно з GPT-4 і не можуть працювати з будь-якою іншою мовною моделлю", "Мультиагентні системи потребують квантового обчислювального обладнання і не можуть працювати на класичній інфраструктурі"] }, correctIndex: 1, explanation: { en: "Multi-agent systems add complexity: agents may misunderstand each other, errors compound across agents, managing shared context is hard, and each agent call adds latency and cost. Use them only when task complexity justifies the overhead.", de: "Multi-Agenten-Systeme erhöhen die Komplexität: Agenten können einander missverstehen, Fehler kaskadieren, und jeder Agentenaufruf erhöht Latenz und Kosten.", ru: "Мультиагентные системы добавляют сложность: агенты могут неправильно понимать друг друга, ошибки каскадируются, управление общим контекстом сложно, каждый вызов агента добавляет задержку и стоимость. Используйте их только когда сложность задачи оправдывает накладные расходы.", uk: "Мультиагентні системи додають складність: агенти можуть неправильно розуміти одне одного, помилки каскадуються, управління спільним контекстом складне, кожен виклик агента додає затримку та вартість. Використовуйте їх лише коли складність задачі виправдовує накладні витрати." } },
{ category: "CLAUDE_CODE", question: { en: "What is the CLAUDE.md file used for in Claude Code?", de: "Wof\u00fcr wird die CLAUDE.md-Datei in Claude Code verwendet?", ru: "\u0414\u043b\u044f \u0447\u0435\u0433\u043e \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u0444\u0430\u0439\u043b CLAUDE.md \u0432 Claude Code?", uk: "\u0414\u043b\u044f \u0447\u043e\u0433\u043e \u0432\u0438\u043a\u043e\u0440\u0438\u0441\u0442\u043e\u0432\u0443\u0454\u0442\u044c\u0441\u044f \u0444\u0430\u0439\u043b CLAUDE.md \u0443 Claude Code?" }, options: { en: ["Storing API keys and authentication tokens securely", "Providing project-specific instructions and context to the agent", "Defining CI/CD pipeline configuration for deployments", "Logging all conversation history for future reference"], de: ["Sichere Speicherung von API-Schl\u00fcsseln und Token", "Bereitstellung projektspezifischer Anweisungen f\u00fcr den Agenten", "Definition der CI/CD-Pipeline-Konfiguration", "Protokollierung des Gespr\u00e4chsverlaufs zur Referenz"], ru: ["\u0425\u0440\u0430\u043d\u0435\u043d\u0438\u0435 API-\u043a\u043b\u044e\u0447\u0435\u0439 \u0438 \u0442\u043e\u043a\u0435\u043d\u043e\u0432 \u0430\u0443\u0442\u0435\u043d\u0442\u0438\u0444\u0438\u043a\u0430\u0446\u0438\u0438", "\u041f\u0440\u0435\u0434\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0430\u0433\u0435\u043d\u0442\u0443 \u0438\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u0439 \u0438 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0430 \u043f\u0440\u043e\u0435\u043a\u0442\u0430", "\u041e\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u0438 CI/CD-\u043f\u0430\u0439\u043f\u043b\u0430\u0439\u043d\u0430", "\u0416\u0443\u0440\u043d\u0430\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0438\u0441\u0442\u043e\u0440\u0438\u0438 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0434\u043b\u044f \u0441\u043f\u0440\u0430\u0432\u043a\u0438"], uk: ["\u0417\u0431\u0435\u0440\u0456\u0433\u0430\u043d\u043d\u044f API-\u043a\u043b\u044e\u0447\u0456\u0432 \u0442\u0430 \u0442\u043e\u043a\u0435\u043d\u0456\u0432 \u0430\u0443\u0442\u0435\u043d\u0442\u0438\u0444\u0456\u043a\u0430\u0446\u0456\u0457", "\u041d\u0430\u0434\u0430\u043d\u043d\u044f \u0430\u0433\u0435\u043d\u0442\u0443 \u0456\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0456\u0439 \u0442\u0430 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0443 \u043f\u0440\u043e\u0435\u043a\u0442\u0443", "\u0412\u0438\u0437\u043d\u0430\u0447\u0435\u043d\u043d\u044f \u043a\u043e\u043d\u0444\u0456\u0433\u0443\u0440\u0430\u0446\u0456\u0457 CI/CD-\u043f\u0430\u0439\u043f\u043b\u0430\u0439\u043d\u0443", "\u0416\u0443\u0440\u043d\u0430\u043b\u044e\u0432\u0430\u043d\u043d\u044f \u0456\u0441\u0442\u043e\u0440\u0456\u0457 \u0440\u043e\u0437\u043c\u043e\u0432 \u0434\u043b\u044f \u0434\u043e\u0432\u0456\u0434\u043a\u0438"] }, correctIndex: 1, explanation: { en: "CLAUDE.md files store project-specific instructions, coding conventions, and context that Claude Code reads automatically. They can exist at project, user, or workspace level to guide the agent's behavior.", de: "CLAUDE.md-Dateien speichern projektspezifische Anweisungen und Kontext, die Claude Code automatisch liest. Sie k\u00f6nnen auf Projekt-, Benutzer- oder Workspace-Ebene existieren.", ru: "\u0424\u0430\u0439\u043b\u044b CLAUDE.md \u0445\u0440\u0430\u043d\u044f\u0442 \u0438\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u0438, \u0441\u043e\u0433\u043b\u0430\u0448\u0435\u043d\u0438\u044f \u0438 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442 \u043f\u0440\u043e\u0435\u043a\u0442\u0430, \u043a\u043e\u0442\u043e\u0440\u044b\u0435 Claude Code \u0447\u0438\u0442\u0430\u0435\u0442 \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438. \u041e\u043d\u0438 \u043c\u043e\u0433\u0443\u0442 \u0431\u044b\u0442\u044c \u043d\u0430 \u0443\u0440\u043e\u0432\u043d\u0435 \u043f\u0440\u043e\u0435\u043a\u0442\u0430, \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044f \u0438\u043b\u0438 \u0440\u0430\u0431\u043e\u0447\u0435\u0433\u043e \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0430.", uk: "\u0424\u0430\u0439\u043b\u0438 CLAUDE.md \u0437\u0431\u0435\u0440\u0456\u0433\u0430\u044e\u0442\u044c \u0456\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0456\u0457, \u0443\u0433\u043e\u0434\u0438 \u0442\u0430 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442, \u044f\u043a\u0456 Claude Code \u0447\u0438\u0442\u0430\u0454 \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u043d\u043e. \u0412\u043e\u043d\u0438 \u043c\u043e\u0436\u0443\u0442\u044c \u0456\u0441\u043d\u0443\u0432\u0430\u0442\u0438 \u043d\u0430 \u0440\u0456\u0432\u043d\u0456 \u043f\u0440\u043e\u0435\u043a\u0442\u0443, \u043a\u043e\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0430 \u0430\u0431\u043e \u0440\u043e\u0431\u043e\u0447\u043e\u0433\u043e \u043f\u0440\u043e\u0441\u0442\u043e\u0440\u0443." } },
{ category: "CLAUDE_CODE", question: { en: "What are hooks in Claude Code used for?", de: "Wof\u00fcr werden Hooks in Claude Code verwendet?", ru: "\u0414\u043b\u044f \u0447\u0435\u0433\u043e \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044e\u0442\u0441\u044f \u0445\u0443\u043a\u0438 \u0432 Claude Code?", uk: "\u0414\u043b\u044f \u0447\u043e\u0433\u043e \u0432\u0438\u043a\u043e\u0440\u0438\u0441\u0442\u043e\u0432\u0443\u044e\u0442\u044c\u0441\u044f \u0445\u0443\u043a\u0438 \u0432 Claude Code?" }, options: { en: ["Running user-defined shell commands at specific lifecycle events", "Connecting to external Git repositories for version control", "Managing API rate limits and request throttling for the agent", "Providing a graphical interface for configuring preferences"], de: ["Ausf\u00fchren benutzerdefinierter Shell-Befehle bei Lifecycle-Events", "Verbindung zu externen Git-Repositories f\u00fcr Versionskontrolle", "Verwaltung von API-Ratenlimits und Anfragedrosselung", "Bereitstellung einer grafischen Konfigurationsoberfl\u00e4che"], ru: ["\u0417\u0430\u043f\u0443\u0441\u043a \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0445 shell-\u043a\u043e\u043c\u0430\u043d\u0434 \u043d\u0430 \u044d\u0442\u0430\u043f\u0430\u0445 \u0436\u0438\u0437\u043d\u0435\u043d\u043d\u043e\u0433\u043e \u0446\u0438\u043a\u043b\u0430", "\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 \u043a \u0432\u043d\u0435\u0448\u043d\u0438\u043c Git-\u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0438\u044f\u043c \u0434\u043b\u044f \u0432\u0435\u0440\u0441\u0438\u043e\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f", "\u0423\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043b\u0438\u043c\u0438\u0442\u0430\u043c\u0438 API-\u0437\u0430\u043f\u0440\u043e\u0441\u043e\u0432 \u0438 \u0434\u0440\u043e\u0441\u0441\u0435\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435\u043c", "\u041f\u0440\u0435\u0434\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0433\u0440\u0430\u0444\u0438\u0447\u0435\u0441\u043a\u043e\u0433\u043e \u0438\u043d\u0442\u0435\u0440\u0444\u0435\u0439\u0441\u0430 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043a"], uk: ["\u0417\u0430\u043f\u0443\u0441\u043a \u043a\u043e\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0446\u044c\u043a\u0438\u0445 shell-\u043a\u043e\u043c\u0430\u043d\u0434 \u043d\u0430 \u0435\u0442\u0430\u043f\u0430\u0445 \u0436\u0438\u0442\u0442\u0454\u0432\u043e\u0433\u043e \u0446\u0438\u043a\u043b\u0443", "\u041f\u0456\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u043d\u044f \u0434\u043e \u0437\u043e\u0432\u043d\u0456\u0448\u043d\u0456\u0445 Git-\u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0456\u0457\u0432 \u0434\u043b\u044f \u0432\u0435\u0440\u0441\u0456\u043e\u043d\u0443\u0432\u0430\u043d\u043d\u044f", "\u0423\u043f\u0440\u0430\u0432\u043b\u0456\u043d\u043d\u044f \u043b\u0456\u043c\u0456\u0442\u0430\u043c\u0438 API-\u0437\u0430\u043f\u0438\u0442\u0456\u0432 \u0442\u0430 \u0434\u0440\u043e\u0441\u0435\u043b\u044e\u0432\u0430\u043d\u043d\u044f\u043c", "\u041d\u0430\u0434\u0430\u043d\u043d\u044f \u0433\u0440\u0430\u0444\u0456\u0447\u043d\u043e\u0433\u043e \u0456\u043d\u0442\u0435\u0440\u0444\u0435\u0439\u0441\u0443 \u043d\u0430\u043b\u0430\u0448\u0442\u0443\u0432\u0430\u043d\u044c"] }, correctIndex: 0, explanation: { en: "Hooks let you run custom shell commands at lifecycle events like PreToolUse, PostToolUse, and Notification. They enable automation such as auto-formatting code after edits or running linters before commits.", de: "Hooks erm\u00f6glichen das Ausf\u00fchren benutzerdefinierter Shell-Befehle bei Events wie PreToolUse, PostToolUse und Notification f\u00fcr Automatisierung wie Auto-Formatierung.", ru: "\u0425\u0443\u043a\u0438 \u043f\u043e\u0437\u0432\u043e\u043b\u044f\u044e\u0442 \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u0442\u044c shell-\u043a\u043e\u043c\u0430\u043d\u0434\u044b \u043d\u0430 \u044d\u0442\u0430\u043f\u0430\u0445 PreToolUse, PostToolUse \u0438 Notification, \u043d\u0430\u043f\u0440\u0438\u043c\u0435\u0440 \u0434\u043b\u044f \u0430\u0432\u0442\u043e\u0444\u043e\u0440\u043c\u0430\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u043a\u043e\u0434\u0430 \u043f\u043e\u0441\u043b\u0435 \u043f\u0440\u0430\u0432\u043e\u043a.", uk: "\u0425\u0443\u043a\u0438 \u0434\u043e\u0437\u0432\u043e\u043b\u044f\u044e\u0442\u044c \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u0442\u0438 shell-\u043a\u043e\u043c\u0430\u043d\u0434\u0438 \u043d\u0430 \u0435\u0442\u0430\u043f\u0430\u0445 PreToolUse, PostToolUse \u0442\u0430 Notification, \u043d\u0430\u043f\u0440\u0438\u043a\u043b\u0430\u0434 \u0434\u043b\u044f \u0430\u0432\u0442\u043e\u0444\u043e\u0440\u043c\u0430\u0442\u0443\u0432\u0430\u043d\u043d\u044f \u043a\u043e\u0434\u0443 \u043f\u0456\u0441\u043b\u044f \u043f\u0440\u0430\u0432\u043e\u043a." } },
{ category: "CLAUDE_CODE", question: { en: "What are MCP servers in the context of Claude Code?", de: "Was sind MCP-Server im Kontext von Claude Code?", ru: "\u0427\u0442\u043e \u0442\u0430\u043a\u043e\u0435 MCP-\u0441\u0435\u0440\u0432\u0435\u0440\u044b \u0432 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0435 Claude Code?", uk: "\u0429\u043e \u0442\u0430\u043a\u0435 MCP-\u0441\u0435\u0440\u0432\u0435\u0440\u0438 \u0432 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0456 Claude Code?" }, options: { en: ["Dedicated cloud instances for running Claude in production", "External tool providers using the Model Context Protocol", "Internal caching servers for storing model weight files", "Monitoring dashboards that track agent token usage"], de: ["Dedizierte Cloud-Instanzen f\u00fcr Claude in Produktion", "Externe Tool-Anbieter \u00fcber das Model Context Protocol", "Interne Caching-Server f\u00fcr Modellgewichtsdateien", "Monitoring-Dashboards zur Verfolgung der Token-Nutzung"], ru: ["\u0412\u044b\u0434\u0435\u043b\u0435\u043d\u043d\u044b\u0435 \u043e\u0431\u043b\u0430\u0447\u043d\u044b\u0435 \u0438\u043d\u0441\u0442\u0430\u043d\u0441\u044b \u0434\u043b\u044f Claude \u0432 \u043f\u0440\u043e\u0434\u0430\u043a\u0448\u0435\u043d\u0435", "\u0412\u043d\u0435\u0448\u043d\u0438\u0435 \u043f\u043e\u0441\u0442\u0430\u0432\u0449\u0438\u043a\u0438 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u043e\u0432 \u0447\u0435\u0440\u0435\u0437 Model Context Protocol", "\u0412\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0438\u0435 \u043a\u044d\u0448-\u0441\u0435\u0440\u0432\u0435\u0440\u044b \u0434\u043b\u044f \u0445\u0440\u0430\u043d\u0435\u043d\u0438\u044f \u0432\u0435\u0441\u043e\u0432 \u043c\u043e\u0434\u0435\u043b\u0438", "\u041f\u0430\u043d\u0435\u043b\u0438 \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433\u0430 \u0434\u043b\u044f \u043e\u0442\u0441\u043b\u0435\u0436\u0438\u0432\u0430\u043d\u0438\u044f \u0442\u043e\u043a\u0435\u043d\u043e\u0432"], uk: ["\u0412\u0438\u0434\u0456\u043b\u0435\u043d\u0456 \u0445\u043c\u0430\u0440\u043d\u0456 \u0456\u043d\u0441\u0442\u0430\u043d\u0441\u0438 \u0434\u043b\u044f Claude \u0432 \u043f\u0440\u043e\u0434\u0430\u043a\u0448\u0435\u043d\u0456", "\u0417\u043e\u0432\u043d\u0456\u0448\u043d\u0456 \u043f\u043e\u0441\u0442\u0430\u0447\u0430\u043b\u044c\u043d\u0438\u043a\u0438 \u0456\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u0456\u0432 \u0447\u0435\u0440\u0435\u0437 Model Context Protocol", "\u0412\u043d\u0443\u0442\u0440\u0456\u0448\u043d\u0456 \u043a\u0435\u0448-\u0441\u0435\u0440\u0432\u0435\u0440\u0438 \u0434\u043b\u044f \u0437\u0431\u0435\u0440\u0456\u0433\u0430\u043d\u043d\u044f \u0432\u0430\u0433 \u043c\u043e\u0434\u0435\u043b\u0456", "\u041f\u0430\u043d\u0435\u043b\u0456 \u043c\u043e\u043d\u0456\u0442\u043e\u0440\u0438\u043d\u0433\u0443 \u0434\u043b\u044f \u0432\u0456\u0434\u0441\u0442\u0435\u0436\u0435\u043d\u043d\u044f \u0442\u043e\u043a\u0435\u043d\u0456\u0432"] }, correctIndex: 1, explanation: { en: "MCP (Model Context Protocol) servers let Claude Code connect to external tools and data sources like databases, Slack, or custom APIs through a standardized protocol, extending the agent's capabilities.", de: "MCP-Server (Model Context Protocol) erm\u00f6glichen Claude Code die Verbindung zu externen Tools und Datenquellen wie Datenbanken, Slack oder APIs \u00fcber ein standardisiertes Protokoll.", ru: "MCP-\u0441\u0435\u0440\u0432\u0435\u0440\u044b (Model Context Protocol) \u043f\u043e\u0437\u0432\u043e\u043b\u044f\u044e\u0442 Claude Code \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0430\u0442\u044c\u0441\u044f \u043a \u0432\u043d\u0435\u0448\u043d\u0438\u043c \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u0430\u043c \u0438 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0430\u043c \u0434\u0430\u043d\u043d\u044b\u0445 \u0447\u0435\u0440\u0435\u0437 \u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u043d\u0 { category: "CLAUDE_CODE", question: { en: "What happens when Claude Code's context window fills up during a long task?", de: "Was passiert, wenn das Kontextfenster von Claude Code bei einer langen Aufgabe voll wird?", ru: "\u0427\u0442\u043e \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442, \u043a\u043e\u0433\u0434\u0430 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u043d\u043e\u0435 \u043e\u043a\u043d\u043e Claude Code \u0437\u0430\u043f\u043e\u043b\u043d\u044f\u0435\u0442\u0441\u044f?", uk: "\u0429\u043e \u0432\u0456\u0434\u0431\u0443\u0432\u0430\u0454\u0442\u044c\u0441\u044f, \u043a\u043e\u043b\u0438 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u043d\u0435 \u0432\u0456\u043a\u043d\u043e Claude Code \u0437\u0430\u043f\u043e\u0432\u043d\u044e\u0454\u0442\u044c\u0441\u044f?" }, options: { en: ["The session terminates and all progress is lost", "It auto-compacts by summarizing and continues working", "It switches to a model with a larger context window", "It pauses and waits for user to clear the history"], de: ["Die Sitzung wird beendet und Fortschritt geht verloren", "Es komprimiert durch Zusammenfassung und arbeitet weiter", "Es wechselt zu einem Modell mit gr\u00f6\u00dferem Kontext", "Es pausiert und wartet auf manuelle Verlaufsl\u00f6schung"], ru: ["\u0421\u0435\u0441\u0441\u0438\u044f \u0437\u0430\u0432\u0435\u0440\u0448\u0430\u0435\u0442\u0441\u044f \u0438 \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441 \u0442\u0435\u0440\u044f\u0435\u0442\u0441\u044f", "\u0410\u0433\u0435\u043d\u0442 \u0441\u0436\u0438\u043c\u0430\u0435\u0442 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440 \u0440\u0435\u0437\u044e\u043c\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435\u043c \u0438 \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442", "\u041f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0430\u0435\u0442\u0441\u044f \u043d\u0430 \u043c\u043e\u0434\u0435\u043b\u044c \u0441 \u0431\u043e\u043b\u044c\u0448\u0438\u043c \u043a\u043e\u043d\u0442\u0435\u043
