{ category: "LLM", question: { en: "What does 'token' refer to in the context of LLMs?", de: "Was bedeutet 'Token' im Kontext von LLMs?", ru: "Что такое 'токен' в контексте LLM?", uk: "Що таке 'токен' у контексті LLM?" }, options: { en: ["A complete word delimited by whitespace in the input text", "A subword unit the model processes as input/output", "A sentence boundary marker used to separate text segments", "An API authentication key used to authorize model requests"], de: ["Ein vollständiges durch Leerzeichen getrenntes Wort im Eingabetext", "Eine Subwort-Einheit, die das Modell als Ein-/Ausgabe verarbeitet", "Ein Satzgrenzmarker zur Segmentierung des Eingabetextes", "Ein API-Authentifizierungsschlüssel zur Autorisierung von Modellanfragen"], ru: ["Полное слово, разделённое пробелами во входном тексте модели", "Субсловная единица, которую модель обрабатывает как вход/выход", "Маркер границы предложения для сегментации входного текста", "Ключ аутентификации API для авторизации запросов к модели"], uk: ["Повне слово, розділене пробілами у вхідному тексті моделі", "Субсловна одиниця, яку модель обробляє як вхід/вихід", "Маркер межі речення для сегментації вхідного тексту", "Ключ автентифікації API для авторизації запитів до моделі"] }, correctIndex: 1, explanation: { en: "Tokens are subword units produced by tokenizers (e.g., BPE). A word may be split into multiple tokens. This affects vocabulary size, cost, and how the model processes text.", de: "Tokens sind Subwort-Einheiten, die von Tokenizern (z.B. BPE) erzeugt werden. Ein Wort kann in mehrere Tokens aufgeteilt werden. Dies beeinflusst Vokabulargröße, Kosten und Textverarbeitung.", ru: "Токены — субсловные единицы, создаваемые токенизаторами (напр., BPE). Слово может быть разбито на несколько токенов. Это влияет на размер словаря, стоимость и обработку текста моделью.", uk: "Токени — субсловні одиниці, створювані токенізаторами (напр., BPE). Слово може бути розбите на кілька токенів. Це впливає на розмір словника, вартість і обробку тексту моделлю." } },
{ category: "LLM", question: { en: "What is the 'context window' of an LLM?", de: "Was ist das 'Kontextfenster' eines LLM?", ru: "Что такое 'контекстное окно' LLM?", uk: "Що таке 'контекстне вікно' LLM?" }, options: { en: ["The total size of the dataset used during the pretraining phase", "The maximum number of tokens the model can process in a single pass", "The number of transformer layers stacked in the model architecture", "The amount of GPU VRAM allocated for running inference workloads"], de: ["Die Gesamtgröße des in der Vortrainingsphase verwendeten Datensatzes", "Die maximale Anzahl von Tokens, die das Modell in einem Durchgang verarbeiten kann", "Die Anzahl der gestapelten Transformer-Schichten in der Modellarchitektur", "Der zugewiesene GPU-VRAM für die Ausführung von Inferenz-Workloads"], ru: ["Общий размер набора данных, использованного в фазе предобучения модели", "Максимальное количество токенов, которое модель может обработать за один проход", "Количество слоёв трансформера, уложенных в архитектуре модели", "Объём GPU VRAM, выделенный для выполнения рабочих нагрузок инференса"], uk: ["Загальний розмір набору даних, використаного у фазі попереднього навчання", "Максимальна кількість токенів, яку модель може обробити за один прохід", "Кількість шарів трансформера, складених в архітектурі моделі", "Обсяг GPU VRAM, виділений для виконання робочих навантажень інференсу"] }, correctIndex: 1, explanation: { en: "The context window defines how many tokens (input + output) the model can handle at once. Modern models range from 4K to 200K+ tokens. Exceeding it causes information loss.", de: "Das Kontextfenster definiert, wie viele Tokens (Eingabe + Ausgabe) das Modell gleichzeitig verarbeiten kann. Moderne Modelle reichen von 4K bis 200K+ Tokens.", ru: "Контекстное окно определяет, сколько токенов (вход + выход) модель может обработать одновременно. Современные модели поддерживают от 4K до 200K+ токенов.", uk: "Контекстне вікно визначає, скільки токенів (вхід + вихід) модель може обробити одночасно. Сучасні моделі підтримують від 4K до 200K+ токенів." } },
{ category: "LLM", question: { en: "What does the 'temperature' parameter control in LLM generation?", de: "Was steuert der 'Temperature'-Parameter bei der LLM-Generierung?", ru: "Что контролирует параметр 'temperature' при генерации LLM?", uk: "Що контролює параметр 'temperature' при генерації LLM?" }, options: { en: ["The learning rate and convergence speed used during model training and backpropagation", "The randomness/creativity of the output — higher values produce more diverse responses", "The maximum number of tokens the model is allowed to generate in a single response", "The total count of unique tokens stored in the model's vocabulary and tokenizer"], de: ["Die Lernrate und Konvergenzgeschwindigkeit beim Modelltraining und der Backpropagation", "Die Zufälligkeit/Kreativität der Ausgabe — höhere Werte erzeugen vielfältigere Antworten", "Die maximale Anzahl an Tokens, die das Modell in einer Antwort generieren darf", "Die Gesamtzahl einzigartiger Tokens im Vokabular und Tokenizer des Modells"], ru: ["Скорость обучения и скорость сходимости при тренировке модели и обратном распространении", "Случайность/креативность вывода — более высокие значения дают более разнообразные ответы", "Максимальное количество токенов, которое модель может сгенерировать в одном ответе", "Общее количество уникальных токенов, хранящихся в словаре и токенизаторе модели"], uk: ["Швидкість навчання та швидкість збіжності під час тренування моделі та зворотного поширення", "Випадковість/креативність виводу — вищі значення дають більш різноманітні відповіді", "Максимальна кількість токенів, яку модель може згенерувати в одній відповіді", "Загальна кількість унікальних токенів, що зберігаються у словнику та токенізаторі моделі"] }, correctIndex: 1, explanation: { en: "Temperature scales the logits before softmax. T=0 makes output deterministic (greedy), T>1 increases randomness. It's crucial for controlling the creativity vs. accuracy tradeoff.", de: "Temperature skaliert die Logits vor Softmax. T=0 macht die Ausgabe deterministisch (greedy), T>1 erhöht die Zufälligkeit. Entscheidend für den Kompromiss zwischen Kreativität und Genauigkeit.", ru: "Temperature масштабирует логиты перед softmax. T=0 делает вывод детерминированным (greedy), T>1 увеличивает случайность. Критически важен для баланса креативности и точности.", uk: "Temperature масштабує логіти перед softmax. T=0 робить вивід детермінованим (greedy), T>1 збільшує випадковість. Критично важливий для балансу креативності та точності." } },
{ category: "LLM", question: { en: "What is the difference between encoder and decoder transformer architectures?", de: "Was ist der Unterschied zwischen Encoder- und Decoder-Transformer-Architekturen?", ru: "В чём разница между архитектурами encoder и decoder трансформеров?", uk: "У чому різниця між архітектурами encoder та decoder трансформерів?" }, options: { en: ["Encoders are optimized for faster throughput and lower latency, while decoders prioritize higher output accuracy", "Encoders process input bidirectionally (e.g., BERT); decoders generate text autoregressively (e.g., GPT)", "Encoders are designed exclusively for text processing, while decoders are specialized for image generation tasks", "There is no meaningful architectural difference — both process input and generate output in the same way"], de: ["Encoder sind auf schnelleren Durchsatz und niedrigere Latenz optimiert, Decoder priorisieren höhere Ausgabegenauigkeit", "Encoder verarbeiten Eingaben bidirektional (z.B. BERT); Decoder generieren Text autoregressiv (z.B. GPT)", "Encoder sind ausschließlich für Textverarbeitung konzipiert, Decoder sind auf Bildgenerierung spezialisiert", "Es gibt keinen bedeutsamen architektonischen Unterschied — beide verarbeiten Ein- und Ausgabe auf gleiche Weise"], ru: ["Энкодеры оптимизированы для более высокой пропускной способности и низкой задержки, декодеры приоритизируют точность", "Энкодеры обрабатывают вход двунаправленно (напр., BERT); декодеры генерируют текст авторегрессивно (напр., GPT)", "Энкодеры предназначены исключительно для обработки текста, декодеры специализируются на генерации изображений", "Между ними нет значимой архитектурной разницы — оба обрабатывают вход и генерируют выход одинаково"], uk: ["Енкодери оптимізовані для вищої пропускної здатності та низької затримки, декодери пріоритизують точність виходу", "Енкодери обробляють вхід двонаправлено (напр., BERT); декодери генерують текст авторегресивно (напр., GPT)", "Енкодери призначені виключно для обробки тексту, декодери спеціалізуються на генерації зображень", "Між ними немає значущої архітектурної різниці — обидва обробляють вхід і генерують вихід однаково"] }, correctIndex: 1, explanation: { en: "Encoder models (BERT) see all tokens at once — great for classification and embeddings. Decoder models (GPT) predict the next token sequentially — designed for text generation.", de: "Encoder-Modelle (BERT) sehen alle Tokens gleichzeitig — ideal für Klassifikation und Embeddings. Decoder-Modelle (GPT) sagen das nächste Token sequenziell vorher — für Textgenerierung konzipiert.", ru: "Модели-энкодеры (BERT) видят все токены сразу — подходят для классификации и эмбеддингов. Модели-декодеры (GPT) предсказывают следующий токен последовательно — предназначены для генерации текста.", uk: "Моделі-енкодери (BERT) бачать всі токени одразу — підходять для класифікації та ембеддінгів. Моделі-декодери (GPT) передбачають наступний токен послідовно — призначені для генерації тексту." } },
{ category: "LLM", question: { en: "What is 'top-p' (nucleus) sampling?", de: "Was ist 'Top-p' (Nucleus) Sampling?", ru: "Что такое 'top-p' (nucleus) семплирование?", uk: "Що таке 'top-p' (nucleus) семплювання?" }, options: { en: ["Selecting only the single highest-probability token prediction at each generation step", "Sampling from the smallest set of tokens whose cumulative probability exceeds p", "Picking a random token uniformly from the full vocabulary regardless of probability scores", "A training optimization technique that adjusts learning rates based on token frequency"], de: ["Auswahl nur der einzelnen Token-Vorhersage mit der höchsten Wahrscheinlichkeit bei jedem Schritt", "Aus der kleinsten Menge von Tokens samplen, deren kumulative Wahrscheinlichkeit p übersteigt", "Zufällige gleichmäßige Auswahl eines Tokens aus dem gesamten Vokabular unabhängig von Wahrscheinlichkeiten", "Eine Trainingsoptimierungstechnik, die Lernraten basierend auf Token-Häufigkeit anpasst"], ru: ["Выбор только одного токена с наивысшей вероятностью на каждом шаге генерации", "Семплирование из наименьшего набора токенов, чья суммарная вероятность превышает p", "Случайный равномерный выбор токена из полного словаря независимо от оценок вероятности", "Техника оптимизации обучения, настраивающая скорости обучения на основе частоты токенов"], uk: ["Вибір лише одного токена з найвищою ймовірністю на кожному кроці генерації", "Семплювання з найменшого набору токенів, чия сумарна ймовірність перевищує p", "Випадковий рівномірний вибір токена з повного словника незалежно від оцінок ймовірності", "Техніка оптимізації навчання, що налаштовує швидкості навчання на основі частоти токенів"] }, correctIndex: 1, explanation: { en: "Top-p dynamically adjusts the candidate pool. With p=0.9, only tokens comprising the top 90% probability mass are considered. This prevents unlikely tokens while maintaining diversity.", de: "Top-p passt den Kandidatenpool dynamisch an. Mit p=0.9 werden nur Tokens berücksichtigt, die 90% der Wahrscheinlichkeitsmasse ausmachen.", ru: "Top-p динамически регулирует набор кандидатов. При p=0.9 рассматриваются только токены, составляющие 90% вероятностной массы. Это предотвращает маловероятные токены, сохраняя разнообразие.", uk: "Top-p динамічно регулює набір кандидатів. При p=0.9 розглядаються лише токени, що становлять 90% ймовірнісної маси. Це запобігає малоймовірним токенам, зберігаючи різноманітність." } },
{ category: "Agents", question: { en: "What is the ReAct pattern in AI agents?", de: "Was ist das ReAct-Muster bei KI-Agenten?", ru: "Что такое паттерн ReAct в ИИ-агентах?", uk: "Що таке патерн ReAct в ШІ-агентах?" }, options: { en: ["A JavaScript-based front-end framework designed for building interactive AI-powered user interfaces", "A pattern where the agent Reasons about the task, Acts using tools, and Observes the result in a loop", "A reactive programming model that uses event streams and observables to handle asynchronous data flows", "A distributed training method that accelerates model convergence through parallel gradient computation"], de: ["Ein JavaScript-basiertes Frontend-Framework zum Erstellen interaktiver KI-gestützter Benutzeroberflächen", "Ein Muster, bei dem der Agent über die Aufgabe nachdenkt, mit Tools handelt und das Ergebnis in einer Schleife beobachtet", "Ein reaktives Programmiermodell mit Event-Streams und Observables für asynchrone Datenflüsse", "Eine verteilte Trainingsmethode, die Modellkonvergenz durch parallele Gradientenberechnung beschleunigt"], ru: ["JavaScript-фреймворк для создания интерактивных пользовательских интерфейсов с поддержкой ИИ", "Паттерн, где агент рассуждает о задаче, действует с помощью инструментов и наблюдает результат в цикле", "Модель реактивного программирования с потоками событий и наблюдателями для асинхронных данных", "Метод распределённого обучения, ускоряющий сходимость модели через параллельное вычисление градиентов"], uk: ["JavaScript-фреймворк для створення інтерактивних користувацьких інтерфейсів з підтримкою ШІ", "Патерн, де агент міркує про задачу, діє за допомогою інструментів та спостерігає результат у циклі", "Модель реактивного програмування з потоками подій та спостерігачами для асинхронних даних", "Метод розподіленого навчання, що прискорює збіжність моделі через паралельне обчислення градієнтів"] }, correctIndex: 1, explanation: { en: "ReAct (Reasoning + Acting) interleaves chain-of-thought reasoning with tool actions. The agent thinks about what to do, executes an action, observes the result, and repeats until the task is done.", de: "ReAct (Reasoning + Acting) verschränkt Chain-of-Thought-Reasoning mit Tool-Aktionen. Der Agent denkt, führt eine Aktion aus, beobachtet das Ergebnis und wiederholt dies.", ru: "ReAct (Reasoning + Acting) чередует рассуждения (chain-of-thought) с действиями через инструменты. Агент думает, выполняет действие, наблюдает результат и повторяет до завершения задачи.", uk: "ReAct (Reasoning + Acting) чергує міркування (chain-of-thought) з діями через інструменти. Агент думає, виконує дію, спостерігає результат і повторює до завершення задачі." } },
{ category: "Agents", question: { en: "What is 'tool use' (function calling) in the context of AI agents?", de: "Was ist 'Tool Use' (Function Calling) im Kontext von KI-Agenten?", ru: "Что такое 'использование инструментов' (function calling) в контексте ИИ-агентов?", uk: "Що таке 'використання інструментів' (function calling) у контексті ШІ-агентів?" }, options: { en: ["The model's internal matrix multiplication and attention computation process during forward passes", "A structured way for models to output JSON specifying which external function to call with what arguments", "A supervised fine-tuning method that trains the model specifically on API and tool documentation", "An API rate limiting and request throttling mechanism that controls tool execution frequency"], de: ["Der interne Matrixmultiplikations- und Attention-Berechnungsprozess des Modells bei Forward-Passes", "Eine strukturierte Möglichkeit für Modelle, JSON auszugeben, das angibt, welche externe Funktion mit welchen Argumenten aufgerufen werden soll", "Eine überwachte Feinabstimmungsmethode, die das Modell speziell auf API- und Tool-Dokumentation trainiert", "Ein API-Ratenbegrenzungs- und Anfragedrosselungsmechanismus zur Steuerung der Tool-Ausführungshäufigkeit"], ru: ["Внутренний процесс умножения матриц и вычисления внимания модели при прямых проходах", "Структурированный способ для модели выводить JSON с указанием, какую внешнюю функцию вызвать и с какими аргументами", "Метод дообучения с учителем, тренирующий модель специально на документации API и инструментов", "Механизм ограничения частоты API-запросов и дросселирования, контролирующий частоту выполнения"], uk: ["Внутрішній процес множення матриць та обчислення уваги моделі під час прямих проходів", "Структурований спосіб для моделі виводити JSON із зазначенням, яку зовнішню функцію викликати і з якими аргументами", "Метод донавчання з учителем, що тренує модель спеціально на документації API та інструментів", "Механізм обмеження частоти API-запитів та дроселювання, що контролює частоту виконання"] }, correctIndex: 1, explanation: { en: "Function calling allows the LLM to generate structured output (typically JSON) describing a tool invocation. The runtime then executes the function and feeds the result back to the model.", de: "Function Calling ermöglicht es dem LLM, strukturierte Ausgaben (typischerweise JSON) zu erzeugen, die einen Tool-Aufruf beschreiben. Die Laufzeit führt dann die Funktion aus und gibt das Ergebnis an das Modell zurück.", ru: "Function calling позволяет LLM генерировать структурированный вывод (обычно JSON), описывающий вызов инструмента. Среда выполнения затем исполняет функцию и передаёт результат обратно модели.", uk: "Function calling дозволяє LLM генерувати структурований вивід (зазвичай JSON), що описує виклик інструменту. Середовище виконання потім виконує функцію і передає результат назад моделі." } },
{ category: "Agents", question: { en: "What is the main advantage of an AI agent over a single LLM API call?", de: "Was ist der Hauptvorteil eines KI-Agenten gegenüber einem einzelnen LLM-API-Aufruf?", ru: "В чём главное преимущество ИИ-агента перед одиночным вызовом LLM API?", uk: "У чому головна перевага ШІ-агента перед одиночним викликом LLM API?" }, options: { en: ["Agents always provide faster response times due to parallel execution of multiple inference calls", "Agents can plan, use tools, iterate on results, and handle multi-step tasks autonomously", "Agents consume significantly fewer tokens per request, reducing overall API costs substantially", "Agents operate entirely without a language model, relying instead on deterministic rule-based logic"], de: ["Agenten liefern immer schnellere Antwortzeiten durch parallele Ausführung mehrerer Inferenzaufrufe", "Agenten können planen, Tools nutzen, Ergebnisse iterieren und mehrstufige Aufgaben autonom erledigen", "Agenten verbrauchen deutlich weniger Tokens pro Anfrage und reduzieren die API-Gesamtkosten erheblich", "Agenten arbeiten vollständig ohne Sprachmodell und nutzen stattdessen deterministische regelbasierte Logik"], ru: ["Агенты всегда обеспечивают более быстрое время отклика благодаря параллельному выполнению вызовов", "Агенты могут планировать, использовать инструменты, итерировать результаты и автономно решать многошаговые задачи", "Агенты потребляют значительно меньше токенов на запрос, существенно снижая общие затраты на API", "Агенты работают полностью без языковой модели, опираясь на детерминированную логику правил"], uk: ["Агенти завжди забезпечують швидший час відгуку завдяки паралельному виконанню викликів інференсу", "Агенти можуть планувати, використовувати інструменти, ітерувати результати й автономно розв'язувати багатокрокові задачі", "Агенти споживають значно менше токенів на запит, суттєво знижуючи загальні витрати на API", "Агенти працюють повністю без мовної моделі, спираючись на детерміновану логіку правил"] }, correctIndex: 1, explanation: { en: "Unlike a single prompt-response, agents maintain a loop: they reason, act, observe, and repeat. This enables complex workflows like code debugging, research tasks, and multi-step problem solving.", de: "Im Gegensatz zu einer einzelnen Prompt-Antwort halten Agenten eine Schleife aufrecht: Sie denken, handeln, beobachten und wiederholen. Dies ermöglicht komplexe Workflows.", ru: "В отличие от одиночного запрос-ответ, агенты поддерживают цикл: рассуждают, действуют, наблюдают и повторяют. Это позволяет решать сложные задачи — отладку кода, исследования, многошаговое решение проблем.", uk: "На відміну від одиночного запит-відповідь, агенти підтримують цикл: міркують, діють, спостерігають і повторюють. Це дозволяє розв'язувати складні задачі — налагодження коду, дослідження, багатокрокове вирішення проблем." } },
{ category: "Agents", question: { en: "What role does 'memory' play in AI agents?", de: "Welche Rolle spielt 'Speicher' bei KI-Agenten?", ru: "Какую роль играет 'память' в ИИ-агентах?", uk: "Яку роль відіграє 'пам'ять' у ШІ-агентах?" }, options: { en: ["It exclusively refers to GPU VRAM allocation and memory bandwidth used during model inference processes", "It allows agents to retain context, recall past interactions, and build on previous results across turns", "It is the persistent storage system that holds the model's trained weight parameters and architecture", "It is used solely for caching API responses to reduce latency and avoid redundant external service calls"], de: ["Es bezieht sich ausschließlich auf GPU-VRAM-Zuweisung und Speicherbandbreite bei Modellinferenzprozessen", "Es ermöglicht Agenten, Kontext zu behalten, vergangene Interaktionen abzurufen und auf früheren Ergebnissen aufzubauen", "Es ist das persistente Speichersystem für die trainierten Gewichtsparameter und Architektur des Modells", "Es wird ausschließlich zum Caching von API-Antworten verwendet, um Latenz zu reduzieren und redundante Aufrufe zu vermeiden"], ru: ["Это относится исключительно к выделению GPU VRAM и пропускной способности памяти при инференсе модели", "Позволяет агентам сохранять контекст, вспоминать прошлые взаимодействия и опираться на предыдущие результаты между ходами", "Это система постоянного хранения обученных весовых параметров и архитектуры модели", "Используется исключительно для кэширования ответов API для снижения задержки и избежания избыточных вызовов"], uk: ["Це стосується виключно виділення GPU VRAM та пропускної здатності пам'яті під час інференсу моделі", "Дозволяє агентам зберігати контекст, згадувати минулі взаємодії та спиратися на попередні результати між ходами", "Це система постійного зберігання навчених вагових параметрів та архітектури моделі", "Використовується виключно для кешування відповідей API для зниження затримки та уникнення зайвих викликів"] }, correctIndex: 1, explanation: { en: "Agent memory systems include short-term (conversation context), long-term (vector stores, databases), and working memory (scratchpads). This enables continuity and learning across interactions.", de: "Agenten-Speichersysteme umfassen Kurzzeit- (Gesprächskontext), Langzeit- (Vektorspeicher, Datenbanken) und Arbeitsspeicher (Notizblöcke). Dies ermöglicht Kontinuität über Interaktionen hinweg.", ru: "Системы памяти агентов включают краткосрочную (контекст разговора), долгосрочную (векторные хранилища, БД) и рабочую (блокноты). Это обеспечивает непрерывность и обучение между взаимодействиями.", uk: "Системи пам'яті агентів включають короткострокову (контекст розмови), довгострокову (векторні сховища, БД) та робочу (блокноти). Це забезпечує безперервність та навчання між взаємодіями." } },
{ category: "RAG", question: { en: "What is Retrieval-Augmented Generation (RAG)?", de: "Was ist Retrieval-Augmented Generation (RAG)?", ru: "Что такое Retrieval-Augmented Generation (RAG)?", uk: "Що таке Retrieval-Augmented Generation (RAG)?" }, options: { en: ["A model training technique that uses retrieval data to improve the pretraining loss function directly", "Combining document retrieval from a knowledge base with LLM generation to produce grounded answers", "A specialized type of neural network layer that combines attention heads with external memory modules", "A method to compress and quantize model weights using retrieval-based pruning and distillation"], de: ["Eine Modelltrainingstechnik, die Abrufdaten nutzt, um die Vortrainings-Verlustfunktion direkt zu verbessern", "Kombination von Dokumentenabfrage aus einer Wissensbasis mit LLM-Generierung für fundierte Antworten", "Eine spezialisierte neuronale Netzwerkschicht, die Attention-Heads mit externen Speichermodulen kombiniert", "Eine Methode zur Komprimierung und Quantisierung von Modellgewichten durch abrufbasiertes Pruning und Destillation"], ru: ["Техника обучения модели, использующая данные извлечения для улучшения функции потерь предобучения", "Комбинирование поиска документов из базы знаний с генерацией LLM для получения обоснованных ответов", "Специализированный слой нейронной сети, объединяющий головы внимания с модулями внешней памяти", "Метод сжатия и квантизации весов модели с использованием прунинга и дистилляции на основе извлечения"], uk: ["Техніка навчання моделі, що використовує дані витягування для покращення функції втрат попереднього навчання", "Комбінування пошуку документів із бази знань з генерацією LLM для отримання обґрунтованих відповідей", "Спеціалізований шар нейронної мережі, що поєднує голови уваги з модулями зовнішньої пам'яті", "Метод стиснення та квантизації ваг моделі з використанням прунінгу та дистиляції на основі витягування"] }, correctIndex: 1, explanation: { en: "RAG retrieves relevant documents from an external knowledge base, includes them in the prompt context, and lets the LLM generate answers grounded in that information. This reduces hallucinations and keeps information up-to-date.", de: "RAG ruft relevante Dokumente aus einer externen Wissensbasis ab, fügt sie in den Prompt-Kontext ein und lässt das LLM Antworten generieren, die auf diesen Informationen basieren.", ru: "RAG извлекает релевантные документы из внешней базы знаний, включает их в контекст промпта и позволяет LLM генерировать ответы, основанные на этой информации. Это снижает галлюцинации и поддерживает актуальность.", uk: "RAG витягує релевантні документи із зовнішньої бази знань, включає їх у контекст промпту і дозволяє LLM генерувати відповіді, що ґрунтуються на цій інформації. Це знижує галюцинації та підтримує актуальність." } },
{ category: "RAG", question: { en: "What is the main advantage of RAG over fine-tuning for domain-specific knowledge?", de: "Was ist der Hauptvorteil von RAG gegenüber Fine-tuning für domänenspezifisches Wissen?", ru: "В чём главное преимущество RAG перед файн-тьюнингом для доменных знаний?", uk: "У чому головна перевага RAG перед файн-тьюнінгом для доменних знань?" }, options: { en: ["RAG consistently produces more accurate and reliable answers than any fine-tuning approach", "RAG can use up-to-date information without retraining the model", "RAG operates without any external data sources, using only the model's internal parameters", "RAG reduces the model's parameter count, resulting in a smaller and faster architecture"], de: ["RAG liefert durchgehend genauere und zuverlässigere Antworten als jeder Feinabstimmungsansatz", "RAG kann aktuelle Informationen verwenden, ohne das Modell neu zu trainieren", "RAG arbeitet ohne externe Datenquellen und nutzt nur die internen Parameter des Modells", "RAG reduziert die Parameteranzahl des Modells und führt zu einer kleineren, schnelleren Architektur"], ru: ["RAG стабильно даёт более точные и надёжные ответы, чем любой подход файн-тьюнинга", "RAG может использовать актуальную информацию без переобучения модели", "RAG работает без каких-либо внешних источников данных, используя только внутренние параметры модели", "RAG уменьшает количество параметров модели, создавая более компактную и быструю архитектуру"], uk: ["RAG стабільно дає точніші та надійніші відповіді, ніж будь-який підхід файн-тьюнінгу", "RAG може використовувати актуальну інформацію без перенавчання моделі", "RAG працює без будь-яких зовнішніх джерел даних, використовуючи лише внутрішні параметри моделі", "RAG зменшує кількість параметрів моделі, створюючи більш компактну та швидку архітектуру"] }, correctIndex: 1, explanation: { en: "RAG separates knowledge from the model. You can update documents anytime without expensive retraining. Fine-tuning bakes knowledge into weights, which becomes stale and is costly to update.", de: "RAG trennt Wissen vom Modell. Dokumente können jederzeit aktualisiert werden, ohne teures Neutraining. Fine-tuning speichert Wissen in Gewichten, die veralten.", ru: "RAG отделяет знания от модели. Документы можно обновлять в любое время без дорогостоящего переобучения. Файн-тьюнинг записывает знания в веса, которые устаревают.", uk: "RAG відділяє знання від моделі. Документи можна оновлювати будь-коли без дорогого перенавчання. Файн-тьюнінг записує знання у ваги, які застарівають." } },
{ category: "RAG", question: { en: "What is 'chunking' in the context of RAG pipelines?", de: "Was ist 'Chunking' im Kontext von RAG-Pipelines?", ru: "Что такое 'чанкинг' (chunking) в контексте RAG-пайплайнов?", uk: "Що таке 'чанкінг' (chunking) у контексті RAG-пайплайнів?" }, options: { en: ["Compressing the model weights into smaller quantized parts for more efficient memory usage", "Splitting documents into smaller, overlapping segments for embedding and retrieval", "Grouping multiple concurrent API calls into batches to optimize throughput and reduce latency", "Dividing the model's layers across multiple GPUs using tensor parallelism for distributed inference"], de: ["Komprimierung der Modellgewichte in kleinere quantisierte Teile für effizientere Speichernutzung", "Aufteilen von Dokumenten in kleinere, überlappende Segmente für Embedding und Retrieval", "Gruppierung mehrerer gleichzeitiger API-Aufrufe in Batches zur Optimierung von Durchsatz und Latenz", "Verteilung der Modellschichten auf mehrere GPUs mittels Tensor-Parallelismus für verteilte Inferenz"], ru: ["Сжатие весов модели в меньшие квантизированные части для более эффективного использования памяти", "Разделение документов на небольшие перекрывающиеся сегменты для эмбеддинга и поиска", "Группировка нескольких параллельных API-вызовов в пакеты для оптимизации пропускной способности", "Распределение слоёв модели по нескольким GPU с помощью тензорного параллелизма для инференса"], uk: ["Стиснення ваг моделі у менші квантизовані частини для більш ефективного використання пам'яті", "Розділення документів на невеликі сегменти з перекриттям для ембеддінгу та пошуку", "Групування кількох паралельних API-викликів у пакети для оптимізації пропускної здатності та затримки", "Розподіл шарів моделі по кількох GPU за допомогою тензорного паралелізму для розподіленого інференсу"] }, correctIndex: 1, explanation: { en: "Documents are split into chunks (typically 200-1000 tokens) with overlap. Each chunk is embedded and stored in a vector database. Chunk size affects retrieval precision — too large loses focus, too small loses context.", de: "Dokumente werden in Chunks (typisch 200-1000 Tokens) mit Überlappung aufgeteilt. Jeder Chunk wird eingebettet und in einer Vektordatenbank gespeichert.", ru: "Документы разделяются на чанки (обычно 200-1000 токенов) с перекрытием. Каждый чанк эмбеддится и сохраняется в векторной БД. Размер чанка влияет на точность поиска.", uk: "Документи розділяються на чанки (зазвичай 200-1000 токенів) з перекриттям. Кожен чанк ембеддиться і зберігається у векторній БД. Розмір чанка впливає на точність пошуку." } },
{ category: "RAG", question: { en: "What is 'hybrid search' in a RAG pipeline?", de: "Was ist 'Hybridsuche' in einer RAG-Pipeline?", ru: "Что такое 'гибридный поиск' в RAG-пайплайне?", uk: "Що таке 'гібридний пошук' у RAG-пайплайні?" }, options: { en: ["Using two different LLM models in parallel to cross-validate and compare retrieval results", "Combining semantic (vector) search with keyword (BM25) search for better retrieval", "Searching both cloud-hosted and local on-premise databases simultaneously for redundancy", "Using both CPU and GPU hardware concurrently to accelerate the vector search computation"], de: ["Verwendung zweier verschiedener LLM-Modelle parallel zur Kreuzvalidierung von Abrufergebnissen", "Kombination von semantischer (Vektor-)Suche mit Schlüsselwort-(BM25-)Suche für besseres Retrieval", "Gleichzeitige Suche in Cloud-gehosteten und lokalen On-Premise-Datenbanken für Redundanz", "Gleichzeitige Nutzung von CPU- und GPU-Hardware zur Beschleunigung der Vektorsuchberechnung"], ru: ["Использование двух разных LLM-моделей параллельно для перекрёстной валидации результатов извлечения", "Комбинирование семантического (векторного) поиска с ключевым (BM25) для лучшего извлечения", "Одновременный поиск в облачных и локальных базах данных для обеспечения отказоустойчивости", "Одновременное использование CPU и GPU для ускорения вычислений векторного поиска"], uk: ["Використання двох різних LLM-моделей паралельно для перехресної валідації результатів витягування", "Комбінування семантичного (векторного) пошуку з ключовим (BM25) для кращого витягування", "Одночасний пошук у хмарних та локальних базах даних для забезпечення відмовостійкості", "Одночасне використання CPU та GPU для прискорення обчислень векторного пошуку"] }, correctIndex: 1, explanation: { en: "Hybrid search merges vector similarity (captures meaning) with keyword matching (captures exact terms). This handles cases where semantic search misses specific names, IDs, or technical terms.", de: "Hybridsuche verbindet Vektorähnlichkeit (erfasst Bedeutung) mit Schlüsselwortabgleich (erfasst exakte Begriffe). Dies behandelt Fälle, in denen semantische Suche spezifische Namen oder Begriffe verfehlt.", ru: "Гибридный поиск объединяет векторное сходство (улавливает смысл) с ключевым поиском (улавливает точные термины). Это покрывает случаи, когда семантический поиск пропускает конкретные имена, ID или технические термины.", uk: "Гібридний пошук об'єднує векторну подібність (вловлює зміст) з ключовим пошуком (вловлює точні терміни). Це покриває випадки, коли семантичний пошук пропускає конкретні імена, ID або технічні терміни." } },
{ category: "RAG", question: { en: "What is the 'lost in the middle' problem in LLMs?", de: "Was ist das 'Lost in the Middle'-Problem bei LLMs?", ru: "Что такое проблема 'lost in the middle' в LLM?", uk: "Що таке проблема 'lost in the middle' в LLM?" }, options: { en: ["Models gradually forget and lose access to their pretraining data as inference time increases over sessions", "LLMs pay less attention to information placed in the middle of long contexts, focusing more on the beginning and end", "Models consistently lose accuracy when processing medium-length inputs between 512 and 2048 tokens", "A tokenization error that occurs when characters in the middle of words are incorrectly split by BPE"], de: ["Modelle vergessen schrittweise ihre Vortrainingsdaten, wenn die Inferenzzeit über Sitzungen hinweg zunimmt", "LLMs beachten Informationen in der Mitte langer Kontexte weniger und fokussieren sich mehr auf Anfang und Ende", "Modelle verlieren konstant an Genauigkeit bei mittellangen Eingaben zwischen 512 und 2048 Tokens", "Ein Tokenisierungsfehler, bei dem Zeichen in der Wortmitte durch BPE falsch aufgeteilt werden"], ru: ["Модели постепенно теряют доступ к данным предобучения по мере увеличения времени инференса", "LLM уделяют меньше внимания информации в середине длинных контекстов, фокусируясь на начале и конце", "Модели стабильно теряют точность при обработке входов средней длины от 512 до 2048 токенов", "Ошибка токенизации, при которой символы в середине слов неправильно разбиваются алгоритмом BPE"], uk: ["Моделі поступово втрачають доступ до даних попереднього навчання зі збільшенням часу інференсу", "LLM приділяють менше уваги інформації в середині довгих контекстів, фокусуючись на початку та кінці", "Моделі стабільно втрачають точність при обробці входів середньої довжини від 512 до 2048 токенів", "Помилка токенізації, при якій символи в середині слів неправильно розбиваються алгоритмом BPE"] }, correctIndex: 1, explanation: { en: "Research shows LLMs have a U-shaped attention pattern — they recall information at the beginning and end of the context much better than in the middle. This is important for RAG chunk ordering.", de: "Forschung zeigt, dass LLMs ein U-förmiges Aufmerksamkeitsmuster haben — sie erinnern Informationen am Anfang und Ende des Kontexts viel besser als in der Mitte.", ru: "Исследования показывают, что LLM имеют U-образный паттерн внимания — они лучше запоминают информацию в начале и конце контекста, чем в середине. Это важно для порядка чанков в RAG.", uk: "Дослідження показують, що LLM мають U-подібний патерн уваги — вони краще запам'ятовують інформацію на початку та в кінці контексту, ніж у середині. Це важливо для порядку чанків у RAG." } },
{ category: "Prompting", question: { en: "What is 'few-shot prompting'?", de: "Was ist 'Few-shot Prompting'?", ru: "Что такое 'few-shot prompting'?", uk: "Що таке 'few-shot prompting'?" }, options: { en: ["Training the model from scratch on a very small labeled dataset with minimal compute resources", "Providing a few input-output examples in the prompt to guide the model's behavior", "Using a small parameter-count model for inference to reduce latency and computational overhead", "Making only a limited number of API calls per session to stay within rate limits and budget"], de: ["Training des Modells von Grund auf mit einem sehr kleinen gelabelten Datensatz und minimalen Rechenressourcen", "Bereitstellung einiger Eingabe-Ausgabe-Beispiele im Prompt, um das Verhalten des Modells zu steuern", "Verwendung eines Modells mit wenigen Parametern für Inferenz zur Reduzierung von Latenz und Rechenaufwand", "Beschränkung auf wenige API-Aufrufe pro Sitzung zur Einhaltung von Ratenlimits und Budget"], ru: ["Обучение модели с нуля на очень малом размеченном наборе данных с минимальными вычислительными ресурсами", "Предоставление нескольких примеров вход-выход в промпте для направления поведения модели", "Использование модели с малым числом параметров для инференса для снижения задержки и нагрузки", "Выполнение только ограниченного количества API-вызовов за сессию для соблюдения лимитов и бюджета"], uk: ["Навчання моделі з нуля на дуже малому розміченому наборі даних з мінімальними обчислювальними ресурсами", "Надання кількох прикладів вхід-вихід у промпті для спрямування поведінки моделі", "Використання моделі з малою кількістю параметрів для інференсу для зниження затримки та навантаження", "Виконання лише обмеженої кількості API-викликів за сесію для дотримання лімітів та бюджету"] }, correctIndex: 1, explanation: { en: "Few-shot prompting includes examples of desired input-output pairs directly in the prompt. The model learns the pattern from examples without any weight updates — this is in-context learning.", de: "Few-shot Prompting enthält Beispiele gewünschter Ein-/Ausgabepaare direkt im Prompt. Das Modell lernt das Muster aus Beispielen ohne Gewichtsänderungen — In-Context Learning.", ru: "Few-shot prompting включает примеры желаемых пар вход-выход прямо в промпт. Модель учится паттерну из примеров без обновления весов — это обучение в контексте (in-context learning).", uk: "Few-shot prompting включає приклади бажаних пар вхід-вихід прямо у промпт. Модель вчиться патерну з прикладів без оновлення ваг — це навчання в контексті (in-context learning)." } },
{ category: "Prompting", question: { en: "What is 'chain-of-thought' (CoT) prompting?", de: "Was ist 'Chain-of-Thought' (CoT) Prompting?", ru: "Что такое 'chain-of-thought' (CoT) промптинг?", uk: "Що таке 'chain-of-thought' (CoT) промптинг?" }, options: { en: ["Chaining multiple sequential LLM calls together through an orchestration pipeline", "Asking the model to reason step-by-step before giving the final answer", "A method to persist and link prompts across independent user sessions over time", "Training the model exclusively on sequential and time-series data for forecasting"], de: ["Verkettung mehrerer sequenzieller LLM-Aufrufe durch eine Orchestrierungspipeline", "Das Modell bitten, schrittweise zu denken, bevor es die endgültige Antwort gibt", "Eine Methode zum Persistieren und Verknüpfen von Prompts über unabhängige Sitzungen hinweg", "Training des Modells ausschließlich auf sequenziellen und Zeitreihendaten für Prognosen"], ru: ["Объединение нескольких последовательных вызовов LLM через оркестрационный пайплайн", "Просьба к модели рассуждать пошагово перед выдачей финального ответа", "Метод сохранения и связывания промптов между независимыми сессиями пользователя", "Обучение модели исключительно на последовательных и временных рядах данных для прогнозов"], uk: ["Об'єднання кількох послідовних викликів LLM через оркестраційний пайплайн", "Прохання до моделі міркувати покроково перед видачею фінальної відповіді", "Метод збереження та зв'язування промптів між незалежними сесіями користувача", "Навчання моделі виключно на послідовних та часових рядах даних для прогнозування"] }, correctIndex: 1, explanation: { en: "CoT prompting elicits intermediate reasoning steps. Adding 'Let's think step by step' or showing worked examples dramatically improves performance on math, logic, and complex reasoning tasks.", de: "CoT-Prompting erzeugt Zwischenschritte im Denkprozess. 'Lass uns Schritt für Schritt denken' verbessert die Leistung bei Mathematik, Logik und komplexem Schlussfolgern erheblich.", ru: "CoT-промптинг побуждает модель к промежуточным шагам рассуждения. Добавление 'Давай подумаем пошагово' или показ разобранных примеров значительно улучшает результаты в математике, логике и сложных рассуждениях.", uk: "CoT-промптинг спонукає модель до проміжних кроків міркування. Додавання 'Давай подумаємо покроково' або показ розібраних прикладів значно покращує результати в математиці, логіці та складних міркуваннях." } },
{ category: "Prompting", question: { en: "What is a 'system prompt' and why is it important?", de: "Was ist ein 'System Prompt' und warum ist er wichtig?", ru: "Что такое 'системный промпт' и почему он важен?", uk: "Що таке 'системний промпт' і чому він важливий?" }, options: { en: ["A prompt used exclusively during the pretraining phase to guide the model's initial weight initialization", "Instructions that set the model's behavior, persona, and constraints before user interaction", "The first message a user sends to initiate a conversation with the model in a chat interface", "An internal operating system command that manages GPU allocation and memory for the inference engine"], de: ["Ein Prompt, der ausschließlich während des Vortrainings zur Steuerung der Gewichtsinitialisierung verwendet wird", "Anweisungen, die das Verhalten, die Persona und die Einschränkungen des Modells vor der Benutzerinteraktion festlegen", "Die erste Nachricht, die ein Benutzer sendet, um eine Konversation mit dem Modell zu starten", "Ein interner Betriebssystembefehl zur Verwaltung der GPU-Zuweisung und des Speichers für die Inferenz-Engine"], ru: ["Промпт, используемый исключительно на этапе предобучения для управления инициализацией весов модели", "Инструкции, задающие поведение, персону и ограничения модели перед взаимодействием с пользователем", "Первое сообщение, которое пользователь отправляет для начала диалога с моделью в чат-интерфейсе", "Внутренняя команда операционной системы для управления распределением GPU и памяти движка инференса"], uk: ["Промпт, що використовується виключно на етапі попереднього навчання для керування ініціалізацією ваг моделі", "Інструкції, що задають поведінку, персону та обмеження моделі перед взаємодією з користувачем", "Перше повідомлення, яке користувач надсилає для початку діалогу з моделлю у чат-інтерфейсі", "Внутрішня команда операційної системи для керування розподілом GPU та пам'яті рушія інференсу"] }, correctIndex: 1, explanation: { en: "System prompts define the model's role, rules, output format, and safety constraints. They're processed before user messages and significantly shape the model's behavior throughout the conversation.", de: "System Prompts definieren die Rolle, Regeln, das Ausgabeformat und die Sicherheitsbeschränkungen des Modells. Sie werden vor Benutzernachrichten verarbeitet und prägen das Verhalten erheblich.", ru: "Системные промпты определяют роль модели, правила, формат вывода и ограничения безопасности. Они обрабатываются перед сообщениями пользователя и значительно определяют поведение модели.", uk: "Системні промпти визначають роль моделі, правила, формат виводу та обмеження безпеки. Вони обробляються перед повідомленнями користувача і значно визначають поведінку моделі." } },
{ category: "Prompting", question: { en: "What does 'grounding' mean in the context of LLM responses?", de: "Was bedeutet 'Grounding' im Kontext von LLM-Antworten?", ru: "Что означает 'grounding' (заземление) в контексте ответов LLM?", uk: "Що означає 'grounding' (заземлення) у контексті відповідей LLM?" }, options: { en: ["Connecting the model to the internet through a live API gateway for real-time data retrieval", "Anchoring model responses to specific provided facts, documents, or data to reduce hallucinations", "Resetting the model's internal hidden state and attention cache between successive inference calls", "Training the model on ground-truth labeled data with supervised cross-entropy loss optimization"], de: ["Verbindung des Modells mit dem Internet über ein Live-API-Gateway für Echtzeit-Datenabruf", "Modell-Antworten an spezifische bereitgestellte Fakten, Dokumente oder Daten verankern, um Halluzinationen zu reduzieren", "Zurücksetzen des internen Hidden-State und Attention-Cache des Modells zwischen Inferenzaufrufen", "Training des Modells auf Ground-Truth-gelabelten Daten mit überwachter Kreuzentropie-Verlustoptimierung"], ru: ["Подключение модели к интернету через API-шлюз для получения данных в реальном времени", "Привязка ответов модели к конкретным предоставленным фактам, документам или данным для снижения галлюцинаций", "Сброс внутреннего скрытого состояния и кэша внимания модели между последовательными вызовами инференса", "Обучение модели на данных с разметкой ground-truth с оптимизацией перекрёстной энтропии с учителем"], uk: ["Підключення моделі до інтернету через API-шлюз для отримання даних у реальному часі", "Прив'язка відповідей моделі до конкретних наданих фактів, документів або даних для зниження галюцинацій", "Скидання внутрішнього прихованого стану та кешу уваги моделі між послідовними викликами інференсу", "Навчання моделі на даних з розміткою ground-truth з оптимізацією перехресної ентропії з учителем"] }, correctIndex: 1, explanation: { en: "Grounding means constraining the model to answer based on provided evidence rather than its parametric knowledge. RAG, citations, and source attribution are all grounding techniques.", de: "Grounding bedeutet, das Modell darauf zu beschränken, basierend auf bereitgestellten Beweisen zu antworten, anstatt auf parametrischem Wissen. RAG, Zitate und Quellenangaben sind Grounding-Techniken.", ru: "Grounding означает ограничение модели ответами на основе предоставленных доказательств, а не параметрических знаний. RAG, цитирование и указание источников — всё это техники grounding.", uk: "Grounding означає обмеження моделі відповідями на основі наданих доказів, а не параметричних знань. RAG, цитування та зазначення джерел — все це техніки grounding." } },
{ category: "Prompting", question: { en: "What is 'structured output' prompting?", de: "Was ist 'Structured Output' Prompting?", ru: "Что такое промптинг для 'структурированного вывода'?", uk: "Що таке промптинг для 'структурованого виводу'?" }, options: { en: ["Formatting source code with proper indentation, syntax highlighting, and consistent style guidelines", "Instructing the model to respond in a specific format like JSON, XML, or a defined schema", "A supervised training method specifically designed for multi-class classification tasks with labels", "A way to organize and arrange model layers in a structured hierarchical neural network topology"], de: ["Formatierung von Quellcode mit korrekter Einrückung, Syntaxhervorhebung und konsistenten Stilrichtlinien", "Das Modell anweisen, in einem bestimmten Format wie JSON, XML oder einem definierten Schema zu antworten", "Eine überwachte Trainingsmethode für Multi-Klassen-Klassifikationsaufgaben mit Labels", "Eine Methode zur Organisation von Modellschichten in einer strukturierten hierarchischen Topologie"], ru: ["Форматирование исходного кода с правильными отступами, подсветкой синтаксиса и стилевыми рекомендациями", "Указание модели отвечать в определённом формате — JSON, XML или по заданной схеме", "Метод обучения с учителем, разработанный специально для задач многоклассовой классификации с метками", "Способ организации и расположения слоёв модели в структурированной иерархической топологии сети"], uk: ["Форматування вихідного коду з правильними відступами, підсвіткою синтаксису та стильовими рекомендаціями", "Вказівка моделі відповідати у визначеному форматі — JSON, XML або за заданою схемою", "Метод навчання з учителем, розроблений спеціально для задач багатокласової класифікації з мітками", "Спосіб організації та розташування шарів моделі в структурованій ієрархічній топології мережі"] }, correctIndex: 1, explanation: { en: "Structured output ensures reliable parsing of model responses. Modern APIs support JSON mode and schema enforcement, which is critical for tool calling, data extraction, and automation pipelines.", de: "Structured Output gewährleistet zuverlässiges Parsen von Modellantworten. Moderne APIs unterstützen JSON-Modus und Schema-Durchsetzung, was für Tool Calling und Automatisierung entscheidend ist.", ru: "Структурированный вывод обеспечивает надёжный парсинг ответов модели. Современные API поддерживают JSON-режим и валидацию по схеме, что критично для function calling, извлечения данных и автоматизации.", uk: "Структурований вивід забезпечує надійний парсинг відповідей моделі. Сучасні API підтримують JSON-режим та валідацію за схемою, що критично для function calling, витягування даних та автоматизації." } },
{ category: "Fine-tuning", question: { en: "What is LoRA (Low-Rank Adaptation)?", de: "Was ist LoRA (Low-Rank Adaptation)?", ru: "Что такое LoRA (Low-Rank Adaptation)?", uk: "Що таке LoRA (Low-Rank Adaptation)?" }, options: { en: ["A fundamentally new LLM architecture designed to replace the standard transformer model entirely", "An efficient fine-tuning method that trains small adapter matrices instead of all model weights", "A data augmentation technique that generates synthetic training examples to expand the dataset", "A model compression algorithm that prunes redundant neurons and reduces the network's parameter count"], de: ["Eine grundlegend neue LLM-Architektur, die das Standard-Transformer-Modell vollständig ersetzen soll", "Eine effiziente Fine-tuning-Methode, die kleine Adapter-Matrizen trainiert statt aller Modellgewichte", "Eine Datenaugmentierungstechnik, die synthetische Trainingsbeispiele zur Datensatzerweiterung generiert", "Ein Modellkompressionsalgorithmus, der redundante Neuronen beschneidet und die Parameterzahl reduziert"], ru: ["Принципиально новая архитектура LLM, разработанная для полной замены стандартной модели трансформера", "Эффективный метод файн-тьюнинга, обучающий небольшие адаптерные матрицы вместо всех весов модели", "Техника аугментации данных, генерирующая синтетические обучающие примеры для расширения датасета", "Алгоритм сжатия модели, обрезающий избыточные нейроны и уменьшающий количество параметров сети"], uk: ["Принципово нова архітектура LLM, розроблена для повної заміни стандартної моделі трансформера", "Ефективний метод файн-тьюнінгу, що навчає невеликі адаптерні матриці замість усіх ваг моделі", "Техніка аугментації даних, що генерує синтетичні навчальні приклади для розширення датасету", "Алгоритм стиснення моделі, що обрізає надлишкові нейрони та зменшує кількість параметрів мережі"] }, correctIndex: 1, explanation: { en: "LoRA freezes the original weights and injects small trainable low-rank matrices into transformer layers. This reduces trainable parameters by 10-100x, making fine-tuning feasible on consumer GPUs.", de: "LoRA friert die ursprünglichen Gewichte ein und injiziert kleine trainierbare Low-Rank-Matrizen in Transformer-Schichten. Dies reduziert die trainierbaren Parameter um das 10-100-fache.", ru: "LoRA замораживает исходные веса и внедряет небольшие обучаемые low-rank матрицы в слои трансформера. Это сокращает обучаемые параметры в 10-100 раз, делая файн-тьюнинг возможным на потребительских GPU.", uk: "LoRA заморожує вихідні ваги та впроваджує невеликі навчальні low-rank матриці у шари трансформера. Це скорочує навчальні параметри у 10-100 разів, роблячи файн-тьюнінг можливим на споживчих GPU." } },
{ category: "Fine-tuning", question: { en: "What is RLHF (Reinforcement Learning from Human Feedback)?", de: "Was ist RLHF (Reinforcement Learning from Human Feedback)?", ru: "Что такое RLHF (обучение с подкреплением на основе обратной связи от человека)?", uk: "Що таке RLHF (навчання з підкріпленням на основі зворотного зв'язку від людини)?" }, options: { en: ["A standard supervised training method that uses labeled input-output pairs with cross-entropy loss optimization", "A technique that uses human preference data to train a reward model, then uses RL to align the LLM with those preferences", "A data filtering and cleaning technique that removes low-quality examples from the pretraining dataset", "A method for data labeling that uses automated heuristics to generate annotations without human involvement"], de: ["Eine überwachte Standardtrainingsmethode mit gelabelten Ein-Ausgabe-Paaren und Kreuzentropie-Verlustoptimierung", "Eine Technik, die menschliche Präferenzdaten nutzt, um ein Belohnungsmodell zu trainieren, und dann RL verwendet, um das LLM an diese Präferenzen anzupassen", "Eine Datenfilter- und Bereinigungstechnik, die minderwertige Beispiele aus dem Vortrainingsdatensatz entfernt", "Eine Methode zur Datenlabeling mit automatisierten Heuristiken zur Annotation ohne menschliche Beteiligung"], ru: ["Стандартный метод обучения с учителем на размеченных парах вход-выход с оптимизацией перекрёстной энтропии", "Техника, использующая данные о предпочтениях человека для обучения модели вознаграждения, затем RL для выравнивания LLM с этими предпочтениями", "Техника фильтрации и очистки данных для удаления некачественных примеров из набора предобучения", "Метод разметки данных с использованием автоматических эвристик для генерации аннотаций без участия человека"], uk: ["Стандартний метод навчання з учителем на розмічених парах вхід-вихід з оптимізацією перехресної ентропії", "Техніка, що використовує дані про переваги людини для навчання моделі винагороди, потім RL для вирівнювання LLM з цими перевагами", "Техніка фільтрації та очищення даних для видалення неякісних прикладів з набору попереднього навчання", "Метод розмітки даних з використанням автоматичних евристик для генерації анотацій без участі людини"] }, correctIndex: 1, explanation: { en: "RLHF involves: 1) collecting human rankings of model outputs, 2) training a reward model on these preferences, 3) using PPO or similar RL to optimize the LLM against the reward model. This is how ChatGPT was aligned.", de: "RLHF umfasst: 1) Sammeln menschlicher Rankings von Modell-Ausgaben, 2) Trainieren eines Reward-Modells, 3) Verwenden von PPO oder ähnlichem RL zur Optimierung des LLM gegen das Reward-Modell.", ru: "RLHF включает: 1) сбор человеческих рейтингов ответов модели, 2) обучение модели вознаграждения на этих предпочтениях, 3) использование PPO или аналогичного RL для оптимизации LLM относительно модели вознаграждения. Так был выровнен ChatGPT.", uk: "RLHF включає: 1) збір людських рейтингів відповідей моделі, 2) навчання моделі винагороди на цих перевагах, 3) використання PPO або аналогічного RL для оптимізації LLM відносно моделі винагороди. Так був вирівняний ChatGPT." } },
{ category: "Fine-tuning", question: { en: "What is DPO (Direct Preference Optimization)?", de: "Was ist DPO (Direct Preference Optimization)?", ru: "Что такое DPO (Direct Preference Optimization)?", uk: "Що таке DPO (Direct Preference Optimization)?" }, options: { en: ["A database query optimization technique that uses indexing strategies to speed up vector search operations", "A simpler alternative to RLHF that directly optimizes the policy on preference pairs without training a separate reward model", "A method to optimize the token probability distribution during decoding using temperature scaling adjustments", "A GPU memory management technique that dynamically allocates and deallocates VRAM during model inference"], de: ["Eine Datenbankabfrage-Optimierungstechnik mit Indexierungsstrategien zur Beschleunigung von Vektorsuchoperationen", "Eine einfachere Alternative zu RLHF, die die Policy direkt auf Präferenzpaaren optimiert, ohne ein separates Belohnungsmodell zu trainieren", "Eine Methode zur Optimierung der Token-Wahrscheinlichkeitsverteilung beim Decoding mittels Temperatur-Skalierung", "Eine GPU-Speicherverwaltungstechnik, die VRAM während der Modellinferenz dynamisch zuweist und freigibt"], ru: ["Техника оптимизации запросов к базе данных с использованием стратегий индексации для ускорения векторного поиска", "Более простая альтернатива RLHF, напрямую оптимизирующая политику на парах предпочтений без обучения отдельной модели вознаграждения", "Метод оптимизации распределения вероятностей токенов при декодировании с помощью масштабирования температуры", "Техника управления GPU-памятью, динамически выделяющая и освобождающая VRAM во время инференса модели"], uk: ["Техніка оптимізації запитів до бази даних з використанням стратегій індексації для прискорення векторного пошуку", "Простіша альтернатива RLHF, що напряму оптимізує політику на парах переваг без навчання окремої моделі винагороди", "Метод оптимізації розподілу ймовірностей токенів при декодуванні за допомогою масштабування температури", "Техніка керування GPU-пам'яттю, що динамічно виділяє та звільняє VRAM під час інференсу моделі"] }, correctIndex: 1, explanation: { en: "DPO eliminates the reward model training step. It directly uses preference pairs (chosen vs rejected) to optimize the language model, making alignment simpler and more stable than RLHF+PPO.", de: "DPO eliminiert den Schritt des Reward-Modell-Trainings. Es nutzt Präferenzpaare (gewählt vs abgelehnt) direkt, um das Sprachmodell zu optimieren — einfacher und stabiler als RLHF+PPO.", ru: "DPO устраняет этап обучения модели вознаграждения. Напрямую использует пары предпочтений (выбранный vs отклонённый) для оптимизации языковой модели — проще и стабильнее, чем RLHF+PPO.", uk: "DPO усуває етап навчання моделі винагороди. Напряму використовує пари переваг (обраний vs відхилений) для оптимізації мовної моделі — простіше та стабільніше, ніж RLHF+PPO." } },
{ category: "Fine-tuning", question: { en: "What is 'instruction tuning' and how does it differ from pretraining?", de: "Was ist 'Instruction Tuning' und wie unterscheidet es sich vom Pretraining?", ru: "Что такое 'instruction tuning' и чем он отличается от предобучения?", uk: "Що таке 'instruction tuning' і чим він відрізняється від передньавчання?" }, options: { en: ["It is fundamentally the same process as pretraining but runs faster due to smaller batch sizes and fewer epochs", "Fine-tuning a base model on instruction-response pairs so it follows instructions rather than just completing text", "It is a technique that only works with encoder-based models like BERT and cannot be applied to decoder models", "A way to reduce model size by pruning unused parameters and layers from the pretrained base architecture"], de: ["Es ist grundsätzlich derselbe Prozess wie Vortraining, läuft aber schneller durch kleinere Batchgrößen und weniger Epochen", "Fine-tuning eines Basismodells auf Anweisungs-Antwort-Paaren, damit es Anweisungen befolgt statt nur Text zu vervollständigen", "Eine Technik, die nur mit Encoder-Modellen wie BERT funktioniert und nicht auf Decoder-Modelle anwendbar ist", "Eine Methode zur Modellverkleinerung durch Beschneidung ungenutzter Parameter und Schichten der Basisarchitektur"], ru: ["Это тот же процесс, что и предобучение, но быстрее за счёт меньшего размера батча и меньшего числа эпох", "Файн-тьюнинг базовой модели на парах инструкция-ответ, чтобы она следовала инструкциям, а не просто дополняла текст", "Техника, которая работает только с моделями на основе энкодеров типа BERT и не применима к декодерным моделям", "Способ уменьшения размера модели путём обрезки неиспользуемых параметров и слоёв базовой архитектуры"], uk: ["Це той самий процес, що й попереднє навчання, але швидший завдяки меншому розміру батчу та менше епох", "Файн-тьюнінг базової моделі на парах інструкція-відповідь, щоб вона слідувала інструкціям, а не просто доповнювала текст", "Техніка, яка працює лише з моделями на основі енкодерів типу BERT і не застосовна до декодерних моделей", "Спосіб зменшення розміру моделі шляхом обрізки невикористаних параметрів та шарів базової архітектури"] }, correctIndex: 1, explanation: { en: "Base models are trained to predict next tokens. Instruction tuning (SFT) teaches them to follow user instructions by training on curated instruction-response datasets. This is the step between pretraining and RLHF.", de: "Basismodelle werden trainiert, nächste Tokens vorherzusagen. Instruction Tuning (SFT) lehrt sie, Benutzeranweisungen zu befolgen. Dies ist der Schritt zwischen Pretraining und RLHF.", ru: "Базовые модели обучены предсказывать следующие токены. Instruction tuning (SFT) учит их следовать инструкциям пользователя, обучая на курированных датасетах инструкция-ответ. Это шаг между предобучением и RLHF.", uk: "Базові моделі навчені передбачати наступні токени. Instruction tuning (SFT) вчить їх слідувати інструкціям користувача, навчаючи на курованих датасетах інструкція-відповідь. Це крок між передньавчанням та RLHF." } },
{ category: "Fine-tuning", question: { en: "When should you choose fine-tuning over RAG?", de: "Wann sollte man Fine-tuning statt RAG wählen?", ru: "Когда следует выбирать файн-тьюнинг вместо RAG?", uk: "Коли слід обирати файн-тьюнінг замість RAG?" }, options: { en: ["Always choose fine-tuning over RAG — fine-tuning is universally better for all use cases and data scenarios", "When you need to change the model's style, tone, or reasoning patterns rather than inject new factual knowledge", "When you have only a very small amount of training data, making fine-tuning the most data-efficient approach", "When you need to access real-time up-to-date information from live databases and external API services"], de: ["Immer Fine-tuning wählen — Fine-tuning ist universell besser für alle Anwendungsfälle und Datenszenarien", "Wenn Sie den Stil, Ton oder die Denkmuster des Modells ändern müssen, statt neues Faktenwissen einzufügen", "Wenn man nur sehr wenige Trainingsdaten hat, was Fine-tuning zum dateneffizientesten Ansatz macht", "Wenn man Echtzeit-Informationen aus Live-Datenbanken und externen API-Diensten abrufen muss"], ru: ["Всегда выбирайте файн-тьюнинг — он универсально лучше для всех сценариев использования и данных", "Когда нужно изменить стиль, тон или паттерны рассуждения модели, а не внедрить новые фактические знания", "Когда у вас очень малое количество обучающих данных, что делает файн-тьюнинг самым эффективным подходом", "Когда нужен доступ к актуальной информации в реальном времени из баз данных и внешних API-сервисов"], uk: ["Завжди обирайте файн-тьюнінг — він універсально кращий для всіх сценаріїв використання та даних", "Коли потрібно змінити стиль, тон або патерни міркування моделі, а не впровадити нові фактичні знання", "Коли у вас дуже мала кількість навчальних даних, що робить файн-тьюнінг найефективнішим підходом", "Коли потрібен доступ до актуальної інформації в реальному часі з баз даних та зовнішніх API-сервісів"] }, correctIndex: 1, explanation: { en: "Fine-tuning is best for teaching behavior, format, and style. RAG is best for dynamic factual knowledge. Use fine-tuning to change HOW the model responds; use RAG to change WHAT it knows.", de: "Fine-tuning eignet sich am besten für Verhalten, Format und Stil. RAG eignet sich für dynamisches Faktenwissen. Fine-tuning ändert WIE das Modell antwortet; RAG ändert WAS es weiß.", ru: "Файн-тьюнинг лучше для обучения поведению, формату и стилю. RAG лучше для динамических фактических знаний. Файн-тьюнинг меняет КАК модель отвечает; RAG меняет ЧТО она знает.", uk: "Файн-тьюнінг кращий для навчання поведінці, формату та стилю. RAG кращий для динамічних фактичних знань. Файн-тьюнінг змінює ЯК модель відповідає; RAG змінює ЩО вона знає." } },
{ category: "Safety", question: { en: "What is a 'hallucination' in the context of LLMs?", de: "Was ist eine 'Halluzination' im Kontext von LLMs?", ru: "Что такое 'галлюцинация' в контексте LLM?", uk: "Що таке 'галюцинація' у контексті LLM?" }, options: { en: ["A visual artifact or distortion that appears in AI-generated images due to model architecture limitations", "When the model generates plausible-sounding but factually incorrect or fabricated information", "An error in the tokenizer that incorrectly splits or merges subword units during text preprocessing", "A hardware malfunction during inference caused by GPU overheating or memory corruption issues"], de: ["Ein visuelles Artefakt oder eine Verzerrung in KI-generierten Bildern durch Modellarchitekturbeschränkungen", "Wenn das Modell plausibel klingende, aber faktisch falsche oder erfundene Informationen erzeugt", "Ein Fehler im Tokenizer, der Subwort-Einheiten bei der Textvorverarbeitung falsch teilt oder zusammenführt", "Eine Hardwarefehlfunktion während der Inferenz durch GPU-Überhitzung oder Speicherbeschädigungsprobleme"], ru: ["Визуальный артефакт или искажение в изображениях, сгенерированных ИИ, из-за ограничений архитектуры", "Когда модель генерирует правдоподобно звучащую, но фактически неверную или выдуманную информацию", "Ошибка в токенизаторе, неправильно разделяющая или объединяющая субсловные единицы при обработке текста", "Аппаратный сбой во время инференса, вызванный перегревом GPU или проблемами повреждения памяти"], uk: ["Візуальний артефакт або спотворення в зображеннях, згенерованих ШІ, через обмеження архітектури моделі", "Коли модель генерує правдоподібно звучну, але фактично невірну або вигадану інформацію", "Помилка в токенізаторі, що неправильно розділяє або об'єднує субсловні одиниці при обробці тексту", "Апаратний збій під час інференсу, спричинений перегрівом GPU або проблемами пошкодження пам'яті"] }, correctIndex: 1, explanation: { en: "Hallucinations occur because LLMs are trained to produce fluent text, not to verify truth. They can confidently fabricate citations, statistics, and facts. RAG, grounding, and verification chains help mitigate this.", de: "Halluzinationen treten auf, weil LLMs trainiert werden, fließenden Text zu produzieren, nicht Wahrheit zu überprüfen. RAG, Grounding und Verifikationsketten helfen, dies zu mildern.", ru: "Галлюцинации возникают потому, что LLM обучены производить связный текст, а не проверять истинность. Они могут уверенно выдумывать цитаты, статистику и факты. RAG, grounding и цепочки верификации помогают с этим.", uk: "Галюцинації виникають тому, що LLM навчені виробляти зв'язний текст, а не перевіряти істинність. Вони можуть впевнено вигадувати цитати, статистику та факти. RAG, grounding та ланцюжки верифікації допомагають з цим." } },
{ category: "Safety", question: { en: "What is 'prompt injection'?", de: "Was ist 'Prompt Injection'?", ru: "Что такое 'prompt injection'?", uk: "Що таке 'prompt injection'?" }, options: { en: ["Adding more few-shot examples to a prompt to improve the model's output quality and consistency", "An attack where malicious user input attempts to override or bypass the system prompt instructions", "A prompt engineering technique to improve overall prompt quality through iterative refinement steps", "Injecting carefully crafted prompts into the pretraining data to influence model behavior at training time"], de: ["Hinzufügen weiterer Few-Shot-Beispiele zu einem Prompt zur Verbesserung der Ausgabequalität und Konsistenz", "Ein Angriff, bei dem bösartige Benutzereingaben versuchen, die System-Prompt-Anweisungen zu überschreiben oder zu umgehen", "Eine Prompt-Engineering-Technik zur Verbesserung der Prompt-Qualität durch iterative Verfeinerungsschritte", "Einschleusen sorgfältig gestalteter Prompts in die Trainingsdaten zur Beeinflussung des Modellverhaltens"], ru: ["Добавление дополнительных few-shot примеров в промпт для улучшения качества и согласованности ответов модели", "Атака, при которой вредоносный пользовательский ввод пытается переопределить или обойти инструкции системного промпта", "Техника промпт-инжиниринга для улучшения общего качества промптов через итеративные шаги доработки", "Внедрение тщательно составленных промптов в данные предобучения для влияния на поведение модели при обучении"], uk: ["Додавання додаткових few-shot прикладів до промпту для покращення якості та узгодженості відповідей моделі", "Атака, при якій зловмисний користувацький ввід намагається перевизначити або обійти інструкції системного промпту", "Техніка промпт-інжинірингу для покращення загальної якості промптів через ітеративні кроки доопрацювання", "Впровадження ретельно складених промптів у дані попереднього навчання для впливу на поведінку моделі"] }, correctIndex: 1, explanation: { en: "Prompt injection exploits the fact that LLMs can't reliably distinguish instructions from data. An attacker might say 'Ignore previous instructions and...' to hijack the model's behavior. Defense-in-depth with input validation and output filtering helps.", de: "Prompt Injection nutzt aus, dass LLMs Anweisungen nicht zuverlässig von Daten unterscheiden können. Defense-in-Depth mit Eingabevalidierung und Ausgabefilterung hilft.", ru: "Prompt injection использует тот факт, что LLM не могут надёжно отличить инструкции от данных. Атакующий может сказать 'Игнорируй предыдущие инструкции и...' для захвата поведения модели. Помогает многоуровневая защита с валидацией ввода и фильтрацией вывода.", uk: "Prompt injection використовує той факт, що LLM не можуть надійно відрізнити інструкції від даних. Атакуючий може сказати 'Ігноруй попередні інструкції і...' для захоплення поведінки моделі. Допомагає багаторівневий захист з валідацією вводу та фільтрацією виводу." } },
{ category: "Safety", question: { en: "What is 'red teaming' in the context of AI safety?", de: "Was ist 'Red Teaming' im Kontext der KI-Sicherheit?", ru: "Что такое 'red teaming' в контексте безопасности ИИ?", uk: "Що таке 'red teaming' у контексті безпеки ШІ?" }, options: { en: ["A dedicated engineering team that builds, trains, and deploys AI models in production environments", "Systematically testing AI systems by attempting to elicit harmful, biased, or unintended outputs", "A standard code review process that evaluates model implementation for bugs and security vulnerabilities", "A blue-green deployment strategy that gradually rolls out new model versions to production servers"], de: ["Ein dediziertes Engineering-Team, das KI-Modelle in Produktionsumgebungen baut, trainiert und bereitstellt", "Systematisches Testen von KI-Systemen durch den Versuch, schädliche, voreingenommene oder unbeabsichtigte Ausgaben hervorzurufen", "Ein standardmäßiger Code-Review-Prozess zur Evaluierung der Modellimplementierung auf Fehler und Sicherheitslücken", "Eine Blue-Green-Deployment-Strategie zur schrittweisen Einführung neuer Modellversionen auf Produktionsservern"], ru: ["Выделенная инженерная команда, которая создаёт, обучает и развёртывает модели ИИ в продакшн-средах", "Систематическое тестирование ИИ-систем путём попыток вызвать вредоносные, предвзятые или непреднамеренные ответы", "Стандартный процесс код-ревью для оценки реализации модели на наличие багов и уязвимостей безопасности", "Стратегия blue-green деплоя для постепенного развёртывания новых версий модели на продакшн-серверах"], uk: ["Виділена інженерна команда, яка створює, навчає та розгортає моделі ШІ у продакшн-середовищах", "Систематичне тестування ШІ-систем шляхом спроб викликати шкідливі, упереджені або ненавмисні відповіді", "Стандартний процес код-рев'ю для оцінки реалізації моделі на наявність багів та вразливостей безпеки", "Стратегія blue-green деплою для поступового розгортання нових версій моделі на продакшн-серверах"] }, correctIndex: 1, explanation: { en: "Red teaming involves adversarial testing where experts try to break the AI system. It uncovers vulnerabilities like jailbreaks, bias, and harmful outputs before deployment. Essential for responsible AI release.", de: "Red Teaming umfasst adversariales Testen, bei dem Experten versuchen, das KI-System zu brechen. Es deckt Schwachstellen wie Jailbreaks, Voreingenommenheit und schädliche Ausgaben vor dem Deployment auf.", ru: "Red teaming включает состязательное тестирование, где эксперты пытаются сломать ИИ-систему. Выявляет уязвимости — джейлбрейки, предвзятость, вредоносные ответы — до развёртывания. Необходим для ответственного выпуска ИИ.", uk: "Red teaming включає змагальне тестування, де експерти намагаються зламати ШІ-систему. Виявляє вразливості — джейлбрейки, упередженість, шкідливі відповіді — до розгортання. Необхідний для відповідального випуску ШІ." } },
{ category: "Safety", question: { en: "What is 'alignment' in AI?", de: "Was ist 'Alignment' in der KI?", ru: "Что такое 'alignment' (выравнивание) в ИИ?", uk: "Що таке 'alignment' (вирівнювання) в ШІ?" }, options: { en: ["Formatting and adjusting the text alignment settings (left, center, right) in generated document outputs", "Ensuring AI systems behave in accordance with human values, intentions, and safety requirements", "Aligning and synchronizing model layers across distributed hardware for better parallel processing performance", "Synchronizing multiple GPU devices to ensure consistent gradient computation during distributed training"], de: ["Formatierung und Anpassung der Textausrichtung (links, zentriert, rechts) in generierten Dokumentausgaben", "Sicherstellen, dass KI-Systeme im Einklang mit menschlichen Werten, Absichten und Sicherheitsanforderungen handeln", "Ausrichtung und Synchronisierung von Modellschichten über verteilte Hardware für bessere Parallelverarbeitung", "Synchronisierung mehrerer GPU-Geräte zur Sicherstellung konsistenter Gradientenberechnung beim verteilten Training"], ru: ["Форматирование и настройка выравнивания текста (лево, центр, право) в генерируемых документах", "Обеспечение поведения ИИ-систем в соответствии с человеческими ценностями, намерениями и требованиями безопасности", "Выравнивание и синхронизация слоёв модели на распределённом оборудовании для параллельной обработки", "Синхронизация нескольких GPU-устройств для согласованного вычисления градиентов при распределённом обучении"], uk: ["Форматування та налаштування вирівнювання тексту (ліво, центр, право) у генерованих документах", "Забезпечення поведінки ШІ-систем відповідно до людських цінностей, намірів та вимог безпеки", "Вирівнювання та синхронізація шарів моделі на розподіленому обладнанні для паралельної обробки", "Синхронізація кількох GPU-пристроїв для узгодженого обчислення градієнтів при розподіленому навчанні"] }, correctIndex: 1, explanation: { en: "AI alignment is one of the field's biggest challenges. Techniques include RLHF, DPO, constitutional AI, and red teaming. The goal is making AI helpful, harmless, and honest while avoiding unintended behaviors.", de: "KI-Alignment ist eine der größten Herausforderungen des Feldes. Techniken umfassen RLHF, DPO, Constitutional AI und Red Teaming. Ziel: KI hilfreich, harmlos und ehrlich machen.", ru: "Alignment ИИ — одна из крупнейших проблем области. Техники включают RLHF, DPO, constitutional AI и red teaming. Цель — сделать ИИ полезным, безвредным и честным, избегая непреднамеренного поведения.", uk: "Alignment ШІ — одна з найбільших проблем галузі. Техніки включають RLHF, DPO, constitutional AI та red teaming. Мета — зробити ШІ корисним, нешкідливим та чесним, уникаючи ненавмисної поведінки." } },
{ category: "Safety", question: { en: "What is a 'guardrail' in AI systems?", de: "Was ist eine 'Guardrail' in KI-Systemen?", ru: "Что такое 'guardrail' (ограждение) в ИИ-системах?", uk: "Що таке 'guardrail' (огородження) в ШІ-системах?" }, options: { en: ["Physical protection systems and environmental controls installed to safeguard data center server hardware", "Filters, rules, or secondary models that prevent the AI from generating harmful, off-topic, or policy-violating content", "A machine learning regularization technique such as dropout or L2 penalty to prevent model overfitting", "An API rate limiter that throttles the number of requests per minute to prevent server overload"], de: ["Physische Schutzsysteme und Umgebungskontrollen zum Schutz der Rechenzentrumsserver-Hardware", "Filter, Regeln oder sekundäre Modelle, die verhindern, dass die KI schädliche, themenfremde oder richtlinienwidrige Inhalte erzeugt", "Eine ML-Regularisierungstechnik wie Dropout oder L2-Strafe zur Verhinderung von Modellüberanpassung", "Ein API-Ratenbegrenzer, der die Anfragen pro Minute drosselt, um Serverüberlastung zu vermeiden"], ru: ["Физические системы защиты и контроля среды для обеспечения безопасности серверного оборудования ЦОД", "Фильтры, правила или вторичные модели, предотвращающие генерацию ИИ вредного, нерелевантного или нарушающего политику контента", "Техника регуляризации ML, такая как dropout или L2-штраф, для предотвращения переобучения модели", "Ограничитель скорости API, дросселирующий количество запросов в минуту для предотвращения перегрузки сервера"], uk: ["Фізичні системи захисту та контролю середовища для забезпечення безпеки серверного обладнання ЦОД", "Фільтри, правила або вторинні моделі, що запобігають генерації ШІ шкідливого, нерелевантного або порушуючого політику контенту", "Техніка регуляризації ML, така як dropout або L2-штраф, для запобігання перенавчанню моделі", "Обмежувач швидкості API, що дроселює кількість запитів на хвилину для запобігання перевантаженню сервера"] }, correctIndex: 1, explanation: { en: "Guardrails include input classifiers, output validators, content filters, and topic boundaries. They act as safety layers around the LLM. Examples: blocking PII, enforcing topic scope, preventing jailbreak attempts.", de: "Guardrails umfassen Eingabeklassifikatoren, Ausgabevalidatoren, Inhaltsfilter und Themengrenzen. Sie fungieren als Sicherheitsschichten um das LLM.", ru: "Guardrails включают классификаторы ввода, валидаторы вывода, фильтры контента и тематические границы. Они действуют как слои безопасности вокруг LLM. Примеры: блокировка PII, ограничение темы, предотвращение джейлбрейков.", uk: "Guardrails включають класифікатори вводу, валідатори виводу, фільтри контенту та тематичні межі. Вони діють як шари безпеки навколо LLM. Приклади: блокування PII, обмеження теми, запобігання джейлбрейкам." } },
