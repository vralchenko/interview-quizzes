8\u0440\u0443\u0435\u0442 \u043f\u0440\u0435\u0434\u044b\u0434\u0443\u0449\u0438\u0439 \u0434\u0438\u0430\u043b\u043e\u0433 \u0438 \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442 \u0440\u0430\u0431\u043e\u0442\u0443, \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u044f \u043a\u043b\u044e\u0447\u0435\u0432\u043e\u0439 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442.", uk: "Claude Code \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u043d\u043e \u0441\u0442\u0438\u0441\u043a\u0430\u0454 \u0440\u043e\u0437\u043c\u043e\u0432\u0443, \u043a\u043e\u043b\u0438 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442 \u043c\u0430\u0439\u0436\u0435 \u0437\u0430\u043f\u043e\u0432\u043d\u0435\u043d\u0438\u0439. \u0412\u0456\u043d \u0440\u0435\u0437\u044e\u043c\u0443\u0454 \u043f\u043e\u043f\u0435\u0440\u0435\u0434\u043d\u044e \u0440\u043e\u0437\u043c\u043e\u0432\u0443 \u0456 \u043f\u0440\u043e\u0434\u043e\u0432\u0436\u0443\u0454 \u0440\u043e\u0431\u043e\u0442\u0443, \u0437\u0431\u0435\u0440\u0456\u0433\u0430\u044e\u0447\u0438 \u043a\u043b\u044e\u0447\u043e\u0432\u0438\u0439 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442." } },
{ category: "CLAUDE_CODE", question: { en: "What are the permission modes available in Claude Code?", de: "Welche Berechtigungsmodi gibt es in Claude Code?", ru: "\u041a\u0430\u043a\u0438\u0435 \u0440\u0435\u0436\u0438\u043c\u044b \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0439 \u0434\u043e\u0441\u0442\u0443\u043f\u043d\u044b \u0432 Claude Code?", uk: "\u042f\u043a\u0456 \u0440\u0435\u0436\u0438\u043c\u0438 \u0434\u043e\u0437\u0432\u043e\u043b\u0456\u0432 \u0434\u043e\u0441\u0442\u0443\u043f\u043d\u0456 \u0432 Claude Code?" }, options: { en: ["Read-only and administrator modes for team workflows", "Sandbox mode and production mode for deployment types", "Guest mode for visitors and owner mode for repo admins", "Default, yolo (auto-approve), and custom allowlists"], de: ["Nur-Lese- und Administratormodus f\u00fcr Teamarbeit", "Sandbox- und Produktionsmodus f\u00fcr Deployment-Typen", "Gastmodus f\u00fcr Besucher und Eigent\u00fcmermodus", "Standard-, Yolo- (Auto-Genehmigung) und Allowlists"], ru: ["\u0420\u0435\u0436\u0438\u043c\u044b \u0447\u0442\u0435\u043d\u0438\u044f \u0438 \u0430\u0434\u043c\u0438\u043d\u0438\u0441\u0442\u0440\u0430\u0442\u043e\u0440\u0430 \u0434\u043b\u044f \u043a\u043e\u043c\u0430\u043d\u0434", "\u041f\u0435\u0441\u043e\u0447\u043d\u0438\u0446\u0430 \u0438 \u043f\u0440\u043e\u0434\u0430\u043a\u0448\u0435\u043d \u0434\u043b\u044f \u0442\u0438\u043f\u043e\u0432 \u0440\u0430\u0437\u0432\u0451\u0440\u0442\u044b\u0432\u0430\u043d\u0438\u044f", "\u0413\u043e\u0441\u0442\u0435\u0432\u043e\u0439 \u0440\u0435\u0436\u0438\u043c \u0438 \u0440\u0435\u0436\u0438\u043c \u0432\u043b\u0430\u0434\u0435\u043b\u044c\u0446\u0430 \u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0438\u044f", "\u0421\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u044b\u0439, yolo (\u0430\u0432\u0442\u043e-\u043e\u0434\u043e\u0431\u0440\u0435\u043d\u0438\u0435) \u0438 \u0441\u043f\u0438\u0441\u043a\u0438 \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0439"], uk: ["\u0420\u0435\u0436\u0438\u043c\u0438 \u0447\u0438\u0442\u0430\u043d\u043d\u044f \u0442\u0430 \u0430\u0434\u043c\u0456\u043d\u0456\u0441\u0442\u0440\u0430\u0442\u043e\u0440\u0430 \u0434\u043b\u044f \u043a\u043e\u043c\u0430\u043d\u0434", "\u041f\u0456\u0441\u043e\u0447\u043d\u0438\u0446\u044f \u0442\u0430 \u043f\u0440\u043e\u0434\u0430\u043a\u0448\u0435\u043d \u0434\u043b\u044f \u0442\u0438\u043f\u0456\u0432 \u0440\u043e\u0437\u0433\u043e\u0440\u0442\u0430\u043d\u043d\u044f", "\u0413\u043e\u0441\u0442\u044c\u043e\u0432\u0438\u0439 \u0440\u0435\u0436\u0438\u043c \u0456 \u0440\u0435\u0436\u0438\u043c \u0432\u043b\u0430\u0441\u043d\u0438\u043a\u0430 \u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0456\u044e", "\u0421\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u0438\u0439, yolo (\u0430\u0432\u0442\u043e-\u0441\u0445\u0432\u0430\u043b\u0435\u043d\u043d\u044f) \u0442\u0430 \u0441\u043f\u0438\u0441\u043a\u0438 \u0434\u043e\u0437\u0432\u043e\u043b\u0456\u0432"] }, correctIndex: 3, explanation: { en: "Claude Code offers a default interactive mode that asks permission for risky actions, a 'yolo' mode (--dangerously-skip-permissions) that auto-approves everything, and customizable allowlists to pre-approve specific tools.", de: "Claude Code bietet einen interaktiven Standardmodus, einen Yolo-Modus (--dangerously-skip-permissions) und anpassbare Allowlists f\u00fcr bestimmte Tools.", ru: "Claude Code \u043f\u0440\u0435\u0434\u043b\u0430\u0433\u0430\u0435\u0442 \u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u044b\u0439 \u0438\u043d\u0442\u0435\u0440\u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0440\u0435\u0436\u0438\u043c, yolo-\u0440\u0435\u0436\u0438\u043c (--dangerously-skip-permissions) \u0438 \u043d\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0435\u043c\u044b\u0435 \u0441\u043f\u0438\u0441\u043a\u0438 \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u0439 \u0434\u043b\u044f \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0451\u043d\u043d\u044b\u0445 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u043e\u0432.", uk: "Claude Code \u043f\u0440\u043e\u043f\u043e\u043d\u0443\u0454 \u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u0438\u0439 \u0456\u043d\u0442\u0435\u0440\u0430\u043a\u0442\u0438\u0432\u043d\u0438\u0439 \u0440\u0435\u0436\u0438\u043c, yolo-\u0440\u0435\u0436\u0438\u043c (--dangerously-skip-permissions) \u0442\u0430 \u043d\u0430\u043b\u0430\u0448\u0442\u043e\u0432\u0443\u0432\u0430\u043d\u0456 \u0441\u043f\u0438\u0441\u043a\u0438 \u0434\u043e\u0437\u0432\u043e\u043b\u0456\u0432 \u0434\u043b\u044f \u043f\u0435\u0432\u043d\u0438\u0445 \u0456\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u0456\u0432." } },
{ category: "ANTIGRAVITY", question: { en: "What happens when you type 'import antigravity' in a Python interpreter?", de: "Was passiert, wenn man 'import antigravity' im Python-Interpreter eingibt?", ru: "\u0427\u0442\u043e \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442 \u043f\u0440\u0438 \u0432\u0432\u043e\u0434\u0435 'import antigravity' \u0432 Python?", uk: "\u0429\u043e \u0432\u0456\u0434\u0431\u0443\u0432\u0430\u0454\u0442\u044c\u0441\u044f \u043f\u0440\u0438 \u0432\u0432\u0435\u0434\u0435\u043d\u043d\u0456 'import antigravity' \u0432 Python?" }, options: { en: ["It raises an ImportError since the module does not exist", "It opens a specific xkcd comic in the default web browser", "It prints a random antigravity-themed joke to the console", "It starts a simple physics simulation in the terminal window"], de: ["Es wird ein ImportError ausgel\u00f6st, da das Modul nicht existiert", "Es \u00f6ffnet einen bestimmten xkcd-Comic im Standardbrowser", "Es gibt einen zuf\u00e4lligen Antigravitations-Witz in der Konsole aus", "Es startet eine einfache Physiksimulation im Terminalfenster"], ru: ["\u0412\u044b\u0437\u044b\u0432\u0430\u0435\u0442 ImportError, \u0442\u0430\u043a \u043a\u0430\u043a \u043c\u043e\u0434\u0443\u043b\u044f \u043d\u0435 \u0441\u0443\u0449\u0435\u0441\u0442\u0432\u0443\u0435\u0442", "\u041e\u0442\u043a\u0440\u044b\u0432\u0430\u0435\u0442 \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u044b\u0439 \u043a\u043e\u043c\u0438\u043a\u0441 xkcd \u0432 \u0431\u0440\u0430\u0443\u0437\u0435\u0440\u0435 \u043f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e", "\u0412\u044b\u0432\u043e\u0434\u0438\u0442 \u0441\u043b\u0443\u0447\u0430\u0439\u043d\u0443\u044e \u0448\u0443\u0442\u043a\u0443 \u043f\u0440\u043e \u0430\u043d\u0442\u0438\u0433\u0440\u0430\u0432\u0438\u0442\u0430\u0446\u0438\u044e \u0432 \u043a\u043e\u043d\u0441\u043e\u043b\u044c", "\u0417\u0430\u043f\u0443\u0441\u043a\u0430\u0435\u0442 \u043f\u0440\u043e\u0441\u0442\u0443\u044e \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0443\u044e \u0441\u0438\u043c\u0443\u043b\u044f\u0446\u0438\u044e \u0432 \u0442\u0435\u0440\u043c\u0438\u043d\u0430\u043b\u0435"], uk: ["\u0412\u0438\u043a\u043b\u0438\u043a\u0430\u0454 ImportError, \u0431\u043e \u043c\u043e\u0434\u0443\u043b\u044f \u043d\u0435 \u0456\u0441\u043d\u0443\u0454", "\u0412\u0456\u0434\u043a\u0440\u0438\u0432\u0430\u0454 \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u0438\u0439 \u043a\u043e\u043c\u0456\u043a\u0441 xkcd \u0443 \u0431\u0440\u0430\u0443\u0437\u0435\u0440\u0456 \u0437\u0430 \u0437\u0430\u043c\u043e\u0432\u0447\u0443\u0432\u0430\u043d\u043d\u044f\u043c", "\u0412\u0438\u0432\u043e\u0434\u0438\u0442\u044c \u0432\u0438\u043f\u0430\u0434\u043a\u043e\u0432\u0438\u0439 \u0436\u0430\u0440\u0442 \u043f\u0440\u043e \u0430\u043d\u0442\u0438\u0433\u0440\u0430\u0432\u0456\u0442\u0430\u0446\u0456\u044e \u0432 \u043a\u043e\u043d\u0441\u043e\u043b\u044c", "\u0417\u0430\u043f\u0443\u0441\u043a\u0430\u0454 \u043f\u0440\u043e\u0441\u0442\u0443 \u0444\u0456\u0437\u0438\u0447\u043d\u0443 \u0441\u0438\u043c\u0443\u043b\u044f\u0446\u0456\u044e \u0432 \u0442\u0435\u0440\u043c\u0456\u043d\u0430\u043b\u0456"] }, correctIndex: 1, explanation: { en: "The 'antigravity' module is a Python Easter egg that opens xkcd comic #353 in your browser. The comic shows a character flying after discovering Python, referencing the joke that Python makes you fly.", de: "Das Modul 'antigravity' ist ein Python-Easter-Egg, das den xkcd-Comic #353 im Browser \u00f6ffnet. Der Comic zeigt eine Figur, die nach dem Entdecken von Python fliegt.", ru: "\u041c\u043e\u0434\u0443\u043b\u044c 'antigravity' \u2014 \u044d\u0442\u043e \u043f\u0430\u0441\u0445\u0430\u043b\u043a\u0430 Python, \u043a\u043e\u0442\u043e\u0440\u0430\u044f \u043e\u0442\u043a\u0440\u044b\u0432\u0430\u0435\u0442 \u043a\u043e\u043c\u0438\u043a\u0441 xkcd #353 \u0432 \u0431\u0440\u0430\u0443\u0437\u0435\u0440\u0435. \u041a\u043e\u043c\u0438\u043a\u0441 \u043f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436\u0430, \u043b\u0435\u0442\u0430\u044e\u0449\u0435\u0433\u043e \u043f\u043e\u0441\u043b\u0435 \u043e\u0442\u043a\u0440\u044b\u0442\u0438\u044f Python.", uk: "\u041c\u043e\u0434\u0443\u043b\u044c 'antigravity' \u2014 \u0446\u0435 \u043f\u0430\u0441\u0445\u0430\u043b\u043a\u0430 Python, \u044f\u043a\u0430 \u0432\u0456\u0434\u043a\u0440\u0438\u0432\u0430\u0454 \u043a\u043e\u043c\u0456\u043a\u0441 xkcd #353 \u0443 \u0431\u0440\u0430\u0443\u0437\u0435\u0440\u0456. \u041a\u043e\u043c\u0456\u043a\u0441 \u043f\u043e\u043a\u0430\u0437\u0443\u0454 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436\u0430, \u0449\u043e \u043b\u0456\u0442\u0430\u0454 \u043f\u0456\u0441\u043b\u044f \u0432\u0456\u0434\u043a\u0440\u0438\u0442\u0442\u044f Python." } },
{ category: "ANTIGRAVITY", question: { en: "What happens when you search 'do a barrel roll' on Google?", de: "Was passiert, wenn man 'do a barrel roll' bei Google sucht?", ru: "\u0427\u0442\u043e \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442 \u043f\u0440\u0438 \u043f\u043e\u0438\u0441\u043a\u0435 'do a barrel roll' \u0432 Google?", uk: "\u0429\u043e \u0432\u0456\u0434\u0431\u0443\u0432\u0430\u0454\u0442\u044c\u0441\u044f \u043f\u0440\u0438 \u043f\u043e\u0448\u0443\u043a\u0443 'do a barrel roll' \u0432 Google?" }, options: { en: ["A small airplane animation flies across the search results", "Google displays a Wikipedia article about barrel roll aerobatics", "The entire search results page rotates 360 degrees on screen", "It redirects you to a retro arcade game in a new browser tab"], de: ["Eine kleine Flugzeuganimation fliegt \u00fcber die Ergebnisse", "Google zeigt einen Wikipedia-Artikel \u00fcber Barrel-Roll-Kunstflug", "Die gesamte Suchergebnisseite dreht sich 360 Grad auf dem Bildschirm", "Es leitet zu einem Retro-Arcade-Spiel in einem neuen Tab weiter"], ru: ["\u041c\u0430\u043b\u0435\u043d\u044c\u043a\u0438\u0439 \u0441\u0430\u043c\u043e\u043b\u0451\u0442 \u043f\u0440\u043e\u043b\u0435\u0442\u0430\u0435\u0442 \u043d\u0430\u0434 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0430\u043c\u0438 \u043f\u043e\u0438\u0441\u043a\u0430", "Google \u043f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u0441\u0442\u0430\u0442\u044c\u044e \u0412\u0438\u043a\u0438\u043f\u0435\u0434\u0438\u0438 \u043e \u0431\u043e\u0447\u043a\u0435 \u0432 \u0430\u044d\u0440\u043e\u0431\u0430\u0442\u0438\u043a\u0435", "\u0412\u0441\u044f \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0430 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u043e\u0432 \u043f\u043e\u0432\u043e\u0440\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044f \u043d\u0430 360 \u0433\u0440\u0430\u0434\u0443\u0441\u043e\u0432", "\u041f\u0435\u0440\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u044f\u0435\u0442 \u0432 \u0440\u0435\u0442\u0440\u043e-\u0430\u0440\u043a\u0430\u0434\u043d\u0443\u044e \u0438\u0433\u0440\u0443 \u0432 \u043d\u043e\u0432\u043e\u0439 \u0432\u043a\u043b\u0430\u0434\u043a\u0435"], uk: ["\u041c\u0430\u043b\u0435\u043d\u044c\u043a\u0438\u0439 \u043b\u0456\u0442\u0430\u043a \u043f\u0440\u043e\u043b\u0456\u0442\u0430\u0454 \u043d\u0430\u0434 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0430\u043c\u0438 \u043f\u043e\u0448\u0443\u043a\u0443", "Google \u043f\u043e\u043a\u0430\u0437\u0443\u0454 \u0441\u0442\u0430\u0442\u0442\u044e \u0412\u0456\u043a\u0456\u043f\u0435\u0434\u0456\u0457 \u043f\u0440\u043e \u0431\u043e\u0447\u043a\u0443 \u0432 \u0430\u0435\u0440\u043e\u0431\u0430\u0442\u0438\u0446\u0456", "\u0412\u0441\u044f \u0441\u0442\u043e\u0440\u0456\u043d\u043a\u0430 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0456\u0432 \u043e\u0431\u0435\u0440\u0442\u0430\u0454\u0442\u044c\u0441\u044f \u043d\u0430 360 \u0433\u0440\u0430\u0434\u0443\u0441\u0456\u0432", "\u041f\u0435\u0440\u0435\u043d\u0430\u043f\u0440\u0430\u0432\u043b\u044f\u0454 \u0434\u043e \u0440\u0435\u0442\u0440\u043e-\u0430\u0440\u043a\u0430\u0434\u043d\u043e\u0457 \u0433\u0440\u0438 \u0432 \u043d\u043e\u0432\u0456\u0439 \u0432\u043a\u043b\u0430\u0434\u0446\u0456"] }, correctIndex: 2, explanation: { en: "Searching 'do a barrel roll' on Google triggers a CSS animation that rotates the entire page 360 degrees. This Easter egg references the Star Fox video game series where Peppy Hare famously says the line.", de: "Die Suche nach 'do a barrel roll' l\u00f6st eine CSS-Animation aus, die die gesamte Seite um 360 Grad dreht \u2014 eine Referenz an das Star-Fox-Videospiel.", ru: "\u041f\u043e\u0438\u0441\u043a 'do a barrel roll' \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u0435\u0442 CSS-\u0430\u043d\u0438\u043c\u0430\u0446\u0438\u044e, \u0432\u0440\u0430\u0449\u0430\u044e\u0449\u0443\u044e \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u043d\u0430 360 \u0433\u0440\u0430\u0434\u0443\u0441\u043e\u0432 \u2014 \u043e\u0442\u0441\u044b\u043b\u043a\u0430 \u043a \u0438\u0433\u0440\u0435 Star Fox, \u0433\u0434\u0435 \u041f\u0435\u043f\u043f\u0438 \u0425\u044d\u0439\u0440 \u043f\u0440\u043e\u0438\u0437\u043d\u043e\u0441\u0438\u0442 \u044d\u0442\u0443 \u0444\u0440\u0430\u0437\u0443.", uk: "\u041f\u043e\u0448\u0443\u043a 'do a barrel roll' \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u0454 CSS-\u0430\u043d\u0456\u043c\u0430\u0446\u0456\u044e, \u0449\u043e \u043e\u0431\u0435\u0440\u0442\u0430\u0454 \u0441\u0442\u043e\u0440\u0456\u043d\u043a\u0443 \u043d\u0430 360 \u0433\u0440\u0430\u0434\u0443\u0441\u0456\u0432 \u2014 \u043f\u043e\u0441\u0438\u043b\u0430\u043d\u043d\u044f \u043d\u0430 \u0433\u0440\u0443 Star Fox, \u0434\u0435 \u041f\u0435\u043f\u043f\u0456 \u0425\u0435\u0439\u0440 \u0432\u0438\u043c\u043e\u0432\u043b\u044f\u0454 \u0446\u044e \u0444\u0440\u0430\u0437\u0443." } },

\u043b\u044f\u0446\u0456\u0457 \u043a\u043e\u0434\u0443", "xkcd #327 \u2014 'Exploits of a Mom' \u043f\u0440\u043e SQL-\u0456\u043d\u2019\u0454\u043a\u0446\u0456\u0457", "xkcd #353 \u2014 'Python' \u043f\u0440\u043e \u043f\u043e\u043b\u0456\u0442 \u043f\u0456\u0441\u043b\u044f \u0432\u0456\u0434\u043a\u0440\u0438\u0442\u0442\u044f Python", "xkcd #378 \u2014 'Real Programmers' \u043f\u0440\u043e \u0432\u043f\u043e\u0434\u043e\u0431\u0430\u043d\u043d\u044f \u0440\u0435\u0434\u0430\u043a\u0442\u043e\u0440\u0456\u0432"] }, correctIndex: 2, explanation: { en: "Python's antigravity module opens xkcd comic #353 titled 'Python', where a character discovers that Python gives them the power to fly, illustrating how easy and powerful the language is.", de: "Das antigravity-Modul \u00f6ffnet xkcd #353 'Python', wo eine Figur entdeckt, dass Python ihr die F\u00e4higkeit zum Fliegen gibt \u2014 eine Metapher f\u00fcr die Einfachheit der Sprache.", ru: "\u041c\u043e\u0434\u0443\u043b\u044c antigravity \u043e\u0442\u043a\u0440\u044b\u0432\u0430\u0435\u0442 xkcd #353 'Python', \u0433\u0434\u0435 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436 \u043e\u0431\u043d\u0430\u0440\u0443\u0436\u0438\u0432\u0430\u0435\u0442, \u0447\u0442\u043e Python \u0434\u0430\u0451\u0442 \u0435\u043c\u0443 \u0441\u043f\u043e\u0441\u043e\u0431\u043d\u043e\u0441\u0442\u044c \u043b\u0435\u0442\u0430\u0442\u044c \u2014 \u043c\u0435\u0442\u0430\u0444\u043e\u0440\u0430 \u043f\u0440\u043e\u0441\u0442\u043e\u0442\u044b \u044f\u0437\u044b\u043a\u0430.", uk: "\u041c\u043e\u0434\u0443\u043b\u044c antigravity \u0432\u0456\u0434\u043a\u0440\u0438\u0432\u0430\u0454 xkcd #353 'Python', \u0434\u0435 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436 \u0432\u0438\u044f\u0432\u043b\u044f\u0454, \u0449\u043e Python \u0434\u0430\u0454 \u0439\u043e\u043c\u0443 \u0437\u0434\u0430\u0442\u043d\u0456\u0441\u0442\u044c \u043b\u0456\u0442\u0430\u0442\u0438 \u2014 \u043c\u0435\u0442\u0430\u0444\u043e\u0440\u0430 \u043f\u0440\u043e\u0 { category: "ANTIGRAVITY", question: { en: "What does the Google Gravity experiment do when you visit it?", de: "Was macht das Google-Gravity-Experiment, wenn man es besucht?", ru: "\u0427\u0442\u043e \u0434\u0435\u043b\u0430\u0435\u0442 \u044d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442 Google Gravity \u043f\u0440\u0438 \u043f\u043e\u0441\u0435\u0449\u0435\u043d\u0438\u0438?", uk: "\u0429\u043e \u0440\u043e\u0431\u0438\u0442\u044c \u0435\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442 Google Gravity \u043f\u0440\u0438 \u0432\u0456\u0434\u0432\u0456\u0434\u0443\u0432\u0430\u043d\u043d\u0456?" }, options: { en: ["It displays search results in reverse chronological order", "It changes the Google logo to show astronauts in zero gravity", "All page elements fall to the bottom simulating real gravity", "It flips the entire page upside down with an inverted layout"], de: ["Suchergebnisse werden in umgekehrter Reihenfolge angezeigt", "Das Google-Logo zeigt Astronauten in Schwerelosigkeit", "Alle Seitenelemente fallen nach unten und simulieren Gravitation", "Die gesamte Seite wird auf den Kopf gestellt und invertiert"], ru: ["\u041f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b \u043f\u043e\u0438\u0441\u043a\u0430 \u0432 \u043e\u0431\u0440\u0430\u0442\u043d\u043e\u043c \u043f\u043e\u0440\u044f\u0434\u043a\u0435", "\u041c\u0435\u043d\u044f\u0435\u0442 \u043b\u043e\u0433\u043e\u0442\u0438\u043f Google \u043d\u0430 \u043a\u043e\u0441\u043c\u043e\u043d\u0430\u0432\u0442\u043e\u0432 \u0432 \u043d\u0435\u0432\u0435\u0441\u043e\u043c\u043e\u0441\u0442\u0438", "\u0412\u0441\u0435 \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u044b \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u044b \u043f\u0430\u0434\u0430\u044e\u0442 \u0432\u043d\u0438\u0437, \u0438\u043c\u0438\u0442\u0438\u0440\u0443\u044f \u0433\u0440\u0430\u0432\u0438\u0442\u0430\u0446\u0438\u044e", "\u041f\u0435\u0440\u0435\u0432\u043e\u0440\u0430\u0447\u0438\u0432\u0430\u0435\u0442 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u0432\u0432\u0435\u0440\u0445 \u043d\u043e\u0433\u0430\u043c\u0438 \u0441 \u0438\u043d\u0432\u0435\u0440\u0441\u0438\u0435\u0439"], uk: ["\u041f\u043e\u043a\u0430\u0437\u0443\u0454 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438 \u043f\u043e\u0448\u0443\u043a\u0443 \u0443 \u0437\u0432\u043e\u0440\u043e\u0442\u043d\u043e\u043c\u0443 \u043f\u043e\u0440\u044f\u0434\u043a\u0443", "\u0417\u043c\u0456\u043d\u044e\u0454 \u043b\u043e\u0433\u043e\u0442\u0438\u043f Google \u043d\u0430 \u043a\u043e\u0441\u043c\u043e\u043d\u0430\u0432\u0442\u0456\u0432 \u0443 \u043d\u0435\u0432\u0430\u0433\u043e\u043c\u043e\u0441\u0442\u0456", "\u0423\u0441\u0456 \u0435\u043b\u0435\u043c\u0435\u043d\u0442\u0438 \u0441\u0442\u043e\u0440\u0456\u043d\u043a\u0438 \u043f\u0430\u0434\u0430\u044e\u0442\u044c \u0432\u043d\u0438\u0437, \u0456\u043c\u0456\u0442\u0443\u044e\u0447\u0438 \u0433\u0440\u0430\u0432\u0456\u0442\u0430\u0446\u0456\u044e", "\u041f\u0435\u0440\u0435\u0432\u0435\u0440\u0442\u0430\u0454 \u0441\u0442\u043e\u0440\u0456\u043d\u043a\u0443 \u0434\u043e\u0433\u043e\u0440\u0438 \u043d\u043e\u0433\u0430\u043c\u0438 \u0437 \u0456\u043d\u0432\u0435\u0440\u0441\u0456\u0454\u044e"] }, correctIndex: 2, explanation: { en: "Google Gravity is a Chrome experiment where all Google homepage elements (logo, search bar, buttons) fall to the bottom of the screen using physics simulation. You can throw elements around with your mouse.", de: "Google Gravity ist ein Chrome-Experiment, bei dem alle Elemente der Google-Startseite mithilfe von Physiksimulation nach unten fallen. Man kann Elemente mit der Maus herumwerfen.", ru: "Google Gravity \u2014 \u044d\u0442\u043e Chrome-\u044d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442, \u0433\u0434\u0435 \u0432\u0441\u0435 \u044d\u043b\u0435\u043c\u0435\u043d\u0442\u044b \u0433\u043b\u0430\u0432\u043d\u043e\u0439 \u0441\u0442\u0440\u0430\u043d\u0 { category: "ANTIGRAVITY", question: { en: "What hidden function does Python's antigravity module contain besides opening xkcd?", de: "Welche versteckte Funktion enth\u00e4lt Pythons antigravity-Modul neben dem \u00d6ffnen von xkcd?", ru: "\u041a\u0430\u043a\u0443\u044e \u0441\u043a\u0440\u044b\u0442\u0443\u044e \u0444\u0443\u043d\u043a\u0446\u0438\u044e \u0441\u043e\u0434\u0435\u0440\u0436\u0438\u0442 \u043c\u043e\u0434\u0443\u043b\u044c antigravity \u043f\u043e\u043c\u0438\u043c\u043e xkcd?", uk: "\u042f\u043a\u0443 \u043f\u0440\u0438\u0445\u043e\u0432\u0430\u043d\u0443 \u0444\u0443\u043d\u043a\u0446\u0456\u044e \u043c\u0456\u0441\u0442\u0438\u0442\u044c \u043c\u043e\u0434\u0443\u043b\u044c antigravity \u043e\u043a\u0440\u0456\u043c xkcd?" }, options: { en: ["A function that generates random Python code snippets", "A geohashing function implementing the xkcd geohashing algorithm", "A function that displays Python version history in ASCII art", "A miniature text-based adventure game hidden in the module"], de: ["Eine Funktion, die zuf\u00e4llige Python-Codeschnipsel generiert", "Eine Geohashing-Funktion nach dem xkcd-Geohashing-Algorithmus", "Eine Funktion, die Python-Versionshistorie in ASCII-Art zeigt", "Ein textbasiertes Miniabenteuer, versteckt im Modul-Quellcode"], ru: ["\u0424\u0443\u043d\u043a\u0446\u0438\u044f \u0433\u0435\u043d\u0435\u0440\u0430\u0446\u0438\u0438 \u0441\u043b\u0443\u0447\u0430\u0439\u043d\u044b\u0445 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442\u043e\u0432 \u043a\u043e\u0434\u0430 \u043d\u0430 Python", "\u0424\u0443\u043d\u043a\u0446\u0438\u044f \u0433\u0435\u043e\u0445\u0435\u0448\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u043f\u043e \u0430\u043b\u0433\u043e\u0440\u0438\u0442\u043c\u0443 xkcd geohash", "\u0424\u0443\u043d\u043a\u0446\u0438\u044f \u043e\u0442\u043e\u0431\u0440\u0430\u0436\u0435\u043d\u0438\u044f \u0438\u0441\u0442\u043e\u0440\u0438\u0438 \u0432\u0435\u0440\u0441\u0438\u0439 Python \u0432 ASCII", "\u0422\u0435\u0
