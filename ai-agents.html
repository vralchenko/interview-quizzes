{ category: "Multi-Agent", question: { en: "What is the 'debate' pattern in multi-agent AI?", de: "Was ist das 'Debate'-Muster in Multi-Agenten-KI?", ru: "Что такое паттерн 'дебаты' в мультиагентном ИИ?", uk: "Що таке патерн 'дебати' у мультиагентному ШІ?" }, options: { en: ["Agents competing for GPU resources", "Multiple agents argue different positions or perspectives on a problem, with a judge agent evaluating the arguments to reach a better conclusion", "A voting system for choosing the best model", "Training models against each other"], de: ["Agenten konkurrieren um GPU-Ressourcen", "Mehrere Agenten argumentieren verschiedene Positionen zu einem Problem, wobei ein Richter-Agent die Argumente bewertet, um zu einer besseren Schlussfolgerung zu gelangen", "Ein Abstimmungssystem zur Wahl des besten Modells", "Modelle gegeneinander trainieren"], ru: ["Агенты соревнуются за ресурсы GPU", "Несколько агентов отстаивают разные позиции по проблеме, а агент-судья оценивает аргументы для достижения лучшего вывода", "Система голосования за лучшую модель", "Обучение моделей друг против друга"], uk: ["Агенти змагаються за ресурси GPU", "Кілька агентів відстоюють різні позиції щодо проблеми, а агент-суддя оцінює аргументи для досягнення кращого висновку", "Система голосування за найкращу модель", "Навчання моделей одна проти одної"] }, correctIndex: 1, explanation: { en: "The debate pattern improves answer quality through adversarial reasoning. Different agents challenge each other's arguments, exposing flaws and forcing stronger justifications. Research shows this reduces errors.", de: "Das Debate-Muster verbessert die Antwortqualität durch adversariales Reasoning. Verschiedene Agenten hinterfragen gegenseitig ihre Argumente.", ru: "Паттерн дебатов улучшает качество ответов через состязательное рассуждение. Разные агенты оспаривают аргументы друг друга, выявляя слабости и заставляя давать более сильные обоснования.", uk: "Патерн дебатів покращує якість відповідей через змагальне міркування. Різні агенти оскаржують аргументи одне одного, виявляючи слабкості та змушуючи давати сильніші обґрунтування." } },
{ category: "Agents", question: { en: "What is 'reflection' in AI agents?", de: "Was ist 'Reflexion' bei KI-Agenten?", ru: "Что такое 'рефлексия' в ИИ-агентах?", uk: "Що таке 'рефлексія' в ШІ-агентах?" }, options: { en: ["Mirroring the user's language style", "The agent evaluates its own outputs, identifies errors or improvements, and self-corrects before delivering the final response", "Reflecting data back to the sender", "A debugging technique for neural networks"], de: ["Spiegelung des Sprachstils des Benutzers", "Der Agent bewertet seine eigenen Ausgaben, identifiziert Fehler oder Verbesserungen und korrigiert sich selbst, bevor er die endgültige Antwort liefert", "Daten zum Absender zurücksenden", "Eine Debugging-Technik für neuronale Netze"], ru: ["Зеркальное отражение стиля речи пользователя", "Агент оценивает собственные выходные данные, выявляет ошибки или возможности улучшения и самокорректируется перед выдачей финального ответа", "Отражение данных обратно отправителю", "Техника отладки нейронных сетей"], uk: ["Дзеркальне відображення стилю мовлення користувача", "Агент оцінює власні вихідні дані, виявляє помилки або можливості покращення та самокоригується перед видачею фінальної відповіді", "Відображення даних назад відправнику", "Техніка налагодження нейронних мереж"] }, correctIndex: 1, explanation: { en: "Reflection agents generate an initial output, then critique it (sometimes with a separate 'critic' prompt), identify weaknesses, and produce a refined version. This iterative self-improvement mimics human review processes.", de: "Reflexions-Agenten erzeugen eine erste Ausgabe, kritisieren sie dann, identifizieren Schwächen und produzieren eine verbesserte Version. Iterative Selbstverbesserung.", ru: "Рефлексивные агенты генерируют начальный вывод, затем критикуют его (иногда отдельным промптом 'критика'), выявляют слабости и создают улучшенную версию. Итеративное самосовершенствование имитирует процесс человеческого ревью.", uk: "Рефлексивні агенти генерують початковий вивід, потім критикують його (іноді окремим промптом 'критика'), виявляють слабкості та створюють покращену версію. Ітеративне самовдосконалення імітує процес людського рев'ю." } },
{ category: "Agents", question: { en: "What is the difference between 'reactive' and 'proactive' AI agents?", de: "Was ist der Unterschied zwischen 'reaktiven' und 'proaktiven' KI-Agenten?", ru: "В чём разница между 'реактивными' и 'проактивными' ИИ-агентами?", uk: "У чому різниця між 'реактивними' та 'проактивними' ШІ-агентами?" }, options: { en: ["Reactive are faster, proactive are more accurate", "Reactive agents respond to stimuli/queries; proactive agents anticipate needs, plan ahead, and initiate actions toward goals", "Reactive use GPUs, proactive use CPUs", "There is no meaningful difference"], de: ["Reaktive sind schneller, proaktive sind genauer", "Reaktive Agenten reagieren auf Stimuli/Anfragen; proaktive Agenten antizipieren Bedürfnisse, planen voraus und initiieren Aktionen", "Reaktive nutzen GPUs, proaktive nutzen CPUs", "Es gibt keinen wesentlichen Unterschied"], ru: ["Реактивные быстрее, проактивные точнее", "Реактивные агенты отвечают на стимулы/запросы; проактивные предвидят потребности, планируют наперёд и инициируют действия к целям", "Реактивные используют GPU, проактивные — CPU", "Существенной разницы нет"], uk: ["Реактивні швидші, проактивні точніші", "Реактивні агенти відповідають на стимули/запити; проактивні передбачають потреби, планують наперед та ініціюють дії до цілей", "Реактивні використовують GPU, проактивні — CPU", "Суттєвої різниці немає"] }, correctIndex: 1, explanation: { en: "Reactive agents are stimulus-response (chatbots). Proactive agents maintain goals, monitor conditions, and take initiative — e.g., an agent that notices a failing CI pipeline and proactively opens a fix PR.", de: "Reaktive Agenten sind Stimulus-Antwort (Chatbots). Proaktive Agenten haben Ziele, überwachen Bedingungen und ergreifen Initiative — z.B. ein Agent, der eine fehlende CI-Pipeline bemerkt und proaktiv einen Fix-PR öffnet.", ru: "Реактивные агенты — стимул-реакция (чатботы). Проактивные агенты поддерживают цели, мониторят условия и проявляют инициативу — напр., агент замечает падающий CI-пайплайн и проактивно открывает PR с исправлением.", uk: "Реактивні агенти — стимул-реакція (чатботи). Проактивні агенти підтримують цілі, моніторять умови та проявляють ініціативу — напр., агент помічає падаючий CI-пайплайн і проактивно відкриває PR з виправленням." } },
{ category: "Agents", question: { en: "What is 'planning' in the context of AI agents?", de: "Was ist 'Planung' im Kontext von KI-Agenten?", ru: "Что такое 'планирование' в контексте ИИ-агентов?", uk: "Що таке 'планування' у контексті ШІ-агентів?" }, options: { en: ["Scheduling GPU resources", "Breaking down a complex task into a sequence of steps before execution, often with the ability to revise the plan", "A model training schedule", "Allocating memory for inference"], de: ["Planung von GPU-Ressourcen", "Zerlegung einer komplexen Aufgabe in eine Abfolge von Schritten vor der Ausführung, oft mit der Möglichkeit, den Plan zu überarbeiten", "Ein Modell-Trainingsplan", "Speicherzuweisung für Inferenz"], ru: ["Планирование ресурсов GPU", "Разбиение сложной задачи на последовательность шагов перед выполнением, часто с возможностью пересмотра плана", "Расписание обучения модели", "Выделение памяти для инференса"], uk: ["Планування ресурсів GPU", "Розбиття складної задачі на послідовність кроків перед виконанням, часто з можливістю перегляду плану", "Розклад навчання моделі", "Виділення пам'яті для інференсу"] }, correctIndex: 1, explanation: { en: "Planning agents create task decompositions before acting. They may use techniques like task graphs, tree-of-thought, or iterative refinement. Good planning reduces wasted tool calls and improves task completion rates.", de: "Planungsagenten erstellen Aufgabenzerlegungen vor dem Handeln. Sie nutzen Techniken wie Aufgabengraphen, Tree-of-Thought oder iterative Verfeinerung.", ru: "Планирующие агенты создают декомпозицию задач перед действием. Они могут использовать техники вроде графов задач, tree-of-thought или итеративного уточнения. Хорошее планирование сокращает бесполезные вызовы инструментов.", uk: "Плануючі агенти створюють декомпозицію задач перед дією. Вони можуть використовувати техніки на кшталт графів задач, tree-of-thought або ітеративного уточнення. Добре планування скорочує марні виклики інструментів." } },
{ category: "Agents", question: { en: "What is MCP (Model Context Protocol)?", de: "Was ist MCP (Model Context Protocol)?", ru: "Что такое MCP (Model Context Protocol)?", uk: "Що таке MCP (Model Context Protocol)?" }, options: { en: ["A model compression protocol", "An open standard for connecting AI models to external tools and data sources through a unified interface", "A multi-core processing protocol", "A model checkpointing format"], de: ["Ein Modellkomprimierungsprotokoll", "Ein offener Standard zur Verbindung von KI-Modellen mit externen Tools und Datenquellen über eine einheitliche Schnittstelle", "Ein Multi-Core-Verarbeitungsprotokoll", "Ein Modell-Checkpointing-Format"], ru: ["Протокол сжатия модели", "Открытый стандарт для подключения ИИ-моделей к внешним инструментам и источникам данных через унифицированный интерфейс", "Протокол многоядерной обработки", "Формат чекпоинтинга модели"], uk: ["Протокол стиснення моделі", "Відкритий стандарт для підключення ШІ-моделей до зовнішніх інструментів та джерел даних через уніфікований інтерфейс", "Протокол багатоядерної обробки", "Формат чекпоінтингу моделі"] }, correctIndex: 1, explanation: { en: "MCP (by Anthropic) standardizes how AI applications connect to data sources and tools. It defines a client-server protocol where MCP servers expose tools, resources, and prompts that any MCP-compatible client can use.", de: "MCP (von Anthropic) standardisiert, wie KI-Anwendungen sich mit Datenquellen und Tools verbinden. Es definiert ein Client-Server-Protokoll, bei dem MCP-Server Tools und Ressourcen bereitstellen.", ru: "MCP (от Anthropic) стандартизирует подключение ИИ-приложений к источникам данных и инструментам. Определяет клиент-серверный протокол, где MCP-серверы предоставляют инструменты, ресурсы и промпты, которые может использовать любой MCP-совместимый клиент.", uk: "MCP (від Anthropic) стандартизує підключення ШІ-застосунків до джерел даних та інструментів. Визначає клієнт-серверний протокол, де MCP-сервери надають інструменти, ресурси та промпти, які може використовувати будь-який MCP-сумісний клієнт." } },
{ category: "Multi-Agent", question: { en: "What is 'handoff' between agents?", de: "Was ist ein 'Handoff' zwischen Agenten?", ru: "Что такое 'handoff' (передача) между агентами?", uk: "Що таке 'handoff' (передача) між агентами?" }, options: { en: ["Shutting down all agents", "Transferring control and context from one agent to another agent that is better suited for the current sub-task", "Sharing GPU memory between agents", "A load balancing technique"], de: ["Alle Agenten herunterfahren", "Übertragung von Kontrolle und Kontext von einem Agenten an einen anderen, der für die aktuelle Teilaufgabe besser geeignet ist", "Teilen von GPU-Speicher zwischen Agenten", "Eine Lastverteilungstechnik"], ru: ["Выключение всех агентов", "Передача управления и контекста от одного агента другому, который лучше подходит для текущей подзадачи", "Разделение GPU-памяти между агентами", "Техника балансировки нагрузки"], uk: ["Вимкнення всіх агентів", "Передача управління та контексту від одного агента іншому, який краще підходить для поточної підзадачі", "Поділ GPU-пам'яті між агентами", "Техніка балансування навантаження"] }, correctIndex: 1, explanation: { en: "Handoffs enable specialization. A triage agent might hand off to a billing agent or technical support agent based on the user's query. The receiving agent gets relevant context to continue the conversation seamlessly.", de: "Handoffs ermöglichen Spezialisierung. Ein Triage-Agent kann je nach Benutzeranfrage an einen Abrechnungs- oder Supportagenten übergeben.", ru: "Handoffs обеспечивают специализацию. Агент-триаж может передать управление биллинг-агенту или агенту техподдержки в зависимости от запроса пользователя. Принимающий агент получает релевантный контекст для бесшовного продолжения.", uk: "Handoffs забезпечують спеціалізацію. Агент-тріаж може передати управління білінг-агенту або агенту техпідтримки залежно від запиту користувача. Приймаючий агент отримує релевантний контекст для безшовного продовження." } },
{ category: "LLM", question: { en: "What is 'context length extrapolation'?", de: "Was ist 'Context Length Extrapolation'?", ru: "Что такое 'экстраполяция длины контекста'?", uk: "Що таке 'екстраполяція довжини контексту'?" }, options: { en: ["Adding more training data", "Techniques to allow models to handle longer sequences than they were trained on, such as RoPE scaling or ALiBi", "Reducing the context window size", "A data augmentation method"], de: ["Mehr Trainingsdaten hinzufügen", "Techniken, die Modellen erlauben, längere Sequenzen zu verarbeiten als trainiert, z.B. RoPE-Skalierung oder ALiBi", "Reduzierung der Kontextfenstergröße", "Eine Datenaugmentierungsmethode"], ru: ["Добавление обучающих данных", "Техники, позволяющие моделям обрабатывать более длинные последовательности, чем при обучении, например RoPE scaling или ALiBi", "Уменьшение размера контекстного окна", "Метод аугментации данных"], uk: ["Додавання навчальних даних", "Техніки, що дозволяють моделям обробляти довші послідовності, ніж при навчанні, наприклад RoPE scaling або ALiBi", "Зменшення розміру контекстного вікна", "Метод аугментації даних"] }, correctIndex: 1, explanation: { en: "Positional encoding techniques like RoPE (Rotary Position Embedding) can be scaled to extend context length. YaRN, NTK-aware scaling, and ALiBi enable models trained on 4K context to work with 32K+ tokens.", de: "Positionelle Kodierungstechniken wie RoPE können skaliert werden. YaRN, NTK-aware Scaling und ALiBi ermöglichen Modellen, die auf 4K trainiert wurden, mit 32K+ Tokens zu arbeiten.", ru: "Техники позиционного кодирования, такие как RoPE, могут быть масштабированы для расширения контекста. YaRN, NTK-aware scaling и ALiBi позволяют моделям, обученным на 4K контексте, работать с 32K+ токенами.", uk: "Техніки позиційного кодування, такі як RoPE, можуть бути масштабовані для розширення контексту. YaRN, NTK-aware scaling та ALiBi дозволяють моделям, навченим на 4K контексті, працювати з 32K+ токенами." } },
{ category: "RAG", question: { en: "What is 'agentic RAG'?", de: "Was ist 'Agentic RAG'?", ru: "Что такое 'агентный RAG' (agentic RAG)?", uk: "Що таке 'агентний RAG' (agentic RAG)?" }, options: { en: ["RAG without a database", "A RAG system where an AI agent dynamically decides what to retrieve, how to query, and when to search again based on intermediate results", "Using agents instead of RAG", "RAG with a fixed query pipeline"], de: ["RAG ohne Datenbank", "Ein RAG-System, bei dem ein KI-Agent dynamisch entscheidet, was abgerufen werden soll, wie abgefragt wird und wann basierend auf Zwischenergebnissen erneut gesucht wird", "Verwendung von Agenten anstelle von RAG", "RAG mit einer festen Abfragepipeline"], ru: ["RAG без базы данных", "Система RAG, где ИИ-агент динамически решает, что извлекать, как формировать запрос и когда искать снова на основе промежуточных результатов", "Использование агентов вместо RAG", "RAG с фиксированным пайплайном запросов"], uk: ["RAG без бази даних", "Система RAG, де ШІ-агент динамічно вирішує, що витягувати, як формувати запит і коли шукати знову на основі проміжних результатів", "Використання агентів замість RAG", "RAG з фіксованим пайплайном запитів"] }, correctIndex: 1, explanation: { en: "Unlike naive RAG (single query → retrieve → generate), agentic RAG uses an agent that can reformulate queries, search multiple sources, evaluate retrieval quality, and iterate until it has sufficient information.", de: "Im Gegensatz zu naivem RAG nutzt Agentic RAG einen Agenten, der Abfragen umformulieren, mehrere Quellen durchsuchen und iterieren kann, bis genügend Informationen vorliegen.", ru: "В отличие от наивного RAG (один запрос → извлечение → генерация), агентный RAG использует агента, который может переформулировать запросы, искать в нескольких источниках, оценивать качество извлечения и итерировать до получения достаточной информации.", uk: "На відміну від наївного RAG (один запит → витягування → генерація), агентний RAG використовує агента, який може переформульовувати запити, шукати в кількох джерелах, оцінювати якість витягування та ітерувати до отримання достатньої інформації." } },
{ category: "Embeddings", question: { en: "What is the difference between bi-encoder and cross-encoder models?", de: "Was ist der Unterschied zwischen Bi-Encoder- und Cross-Encoder-Modellen?", ru: "В чём разница между bi-encoder и cross-encoder моделями?", uk: "У чому різниця між bi-encoder та cross-encoder моделями?" }, options: { en: ["They produce the same results", "Bi-encoders encode query and document independently (fast, scalable); cross-encoders process them jointly (slower, more accurate)", "Bi-encoders are newer than cross-encoders", "Cross-encoders are faster than bi-encoders"], de: ["Sie liefern die gleichen Ergebnisse", "Bi-Encoder kodieren Abfrage und Dokument unabhängig (schnell, skalierbar); Cross-Encoder verarbeiten sie gemeinsam (langsamer, genauer)", "Bi-Encoder sind neuer als Cross-Encoder", "Cross-Encoder sind schneller als Bi-Encoder"], ru: ["Они дают одинаковые результаты", "Bi-encoder кодируют запрос и документ независимо (быстро, масштабируемо); cross-encoder обрабатывают их совместно (медленнее, точнее)", "Bi-encoder новее cross-encoder", "Cross-encoder быстрее bi-encoder"], uk: ["Вони дають однакові результати", "Bi-encoder кодують запит і документ незалежно (швидко, масштабовано); cross-encoder обробляють їх спільно (повільніше, точніше)", "Bi-encoder новіші за cross-encoder", "Cross-encoder швидші за bi-encoder"] }, correctIndex: 1, explanation: { en: "Bi-encoders (e.g., sentence-transformers) are used for retrieval — they pre-compute document embeddings for fast search. Cross-encoders score query-document pairs together and are used for reranking the top results.", de: "Bi-Encoder werden für Retrieval verwendet — sie berechnen Dokument-Embeddings vorab. Cross-Encoder bewerten Query-Dokument-Paare gemeinsam und werden zum Reranking verwendet.", ru: "Bi-encoder (напр., sentence-transformers) используются для поиска — они предварительно вычисляют эмбеддинги документов. Cross-encoder оценивают пары запрос-документ совместно и используются для переранжирования топ-результатов.", uk: "Bi-encoder (напр., sentence-transformers) використовуються для пошуку — вони попередньо обчислюють ембеддінги документів. Cross-encoder оцінюють пари запит-документ спільно та використовуються для переранжування топ-результатів." } },
{ category: "Multi-Agent", question: { en: "What are the key challenges of multi-agent systems?", de: "Was sind die Hauptherausforderungen von Multi-Agenten-Systemen?", ru: "Каковы основные проблемы мультиагентных систем?", uk: "Які основні проблеми мультиагентних систем?" }, options: { en: ["They are always slower than single agents", "Coordination overhead, error propagation between agents, context management, and increased cost/latency", "They only work with GPT-4", "They require quantum computing"], de: ["Sie sind immer langsamer als einzelne Agenten", "Koordinationsaufwand, Fehlerpropagation zwischen Agenten, Kontextverwaltung und erhöhte Kosten/Latenz", "Sie funktionieren nur mit GPT-4", "Sie erfordern Quantencomputing"], ru: ["Они всегда медленнее одиночных агентов", "Накладные расходы на координацию, распространение ошибок между агентами, управление контекстом и увеличенные затраты/задержки", "Они работают только с GPT-4", "Они требуют квантовых вычислений"], uk: ["Вони завжди повільніші за одиночних агентів", "Накладні витрати на координацію, поширення помилок між агентами, управління контекстом та збільшені витрати/затримки", "Вони працюють лише з GPT-4", "Вони потребують квантових обчислень"] }, correctIndex: 1, explanation: { en: "Multi-agent systems add complexity: agents may misunderstand each other, errors compound across agents, managing shared context is hard, and each agent call adds latency and cost. Use them only when task complexity justifies the overhead.", de: "Multi-Agenten-Systeme erhöhen die Komplexität: Agenten können einander missverstehen, Fehler kaskadieren, und jeder Agentenaufruf erhöht Latenz und Kosten.", ru: "Мультиагентные системы добавляют сложность: агенты могут неправильно понимать друг друга, ошибки каскадируются, управление общим контекстом сложно, каждый вызов агента добавляет задержку и стоимость. Используйте их только когда сложность задачи оправдывает накладные расходы.", uk: "Мультиагентні системи додають складність: агенти можуть неправильно розуміти одне одного, помилки каскадуються, управління спільним контекстом складне, кожен виклик агента додає затримку та вартість. Використовуйте їх лише коли складність задачі виправдовує накладні витрати." } },
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20, currentShuffledIdx = [];
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); if (quizArea.style.display === 'block') { retranslateQuestion(); updateScoreboard(); } }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function retranslateQuestion() {
    const q = selectedQuestions[currentQuestionIndex]; if (!q) return;
    const lang = currentLang, t = ui[lang];
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const card = quizContainer.querySelector('.card'); if (!card) return;
    card.querySelector('.question-text').innerHTML = qText.replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const btns = card.querySelectorAll('.option-btn');
    currentShuffledIdx.forEach((origI, btnI) => { if (btns[btnI]) btns[btnI].innerHTML = (opts[origI] || '').replace(/</g,"&lt;").replace(/>/g,"&gt;"); });
    const explEl = document.getElementById(`expl-${currentQuestionIndex}`);
    if (explEl) explEl.innerHTML = `<strong>${t.explanation}</strong> ${expl}`;
    const nextBtn = document.getElementById(`next-${currentQuestionIndex}`);
    if (nextBtn) nextBtn.textContent = t.next;
}

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    currentShuffledIdx = idx;
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
    <script src="layout.js"></script>
</body>
</html>
