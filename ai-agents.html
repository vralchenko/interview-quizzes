{ category: "LLM", question: { en: "What does 'token' refer to in the context of LLMs?", de: "Was bedeutet 'Token' im Kontext von LLMs?", ru: "Что такое 'токен' в контексте LLM?", uk: "Що таке 'токен' у контексті LLM?" }, options: { en: ["A complete word", "A subword unit the model processes as input/output", "A sentence boundary marker", "An API authentication key"], de: ["Ein vollständiges Wort", "Eine Subwort-Einheit, die das Modell als Ein-/Ausgabe verarbeitet", "Ein Satzgrenzmarker", "Ein API-Authentifizierungsschlüssel"], ru: ["Полное слово", "Субсловная единица, которую модель обрабатывает как вход/выход", "Маркер границы предложения", "Ключ аутентификации API"], uk: ["Повне слово", "Субсловна одиниця, яку модель обробляє як вхід/вихід", "Маркер межі речення", "Ключ автентифікації API"] }, correctIndex: 1, explanation: { en: "Tokens are subword units produced by tokenizers (e.g., BPE). A word may be split into multiple tokens. This affects vocabulary size, cost, and how the model processes text.", de: "Tokens sind Subwort-Einheiten, die von Tokenizern (z.B. BPE) erzeugt werden. Ein Wort kann in mehrere Tokens aufgeteilt werden. Dies beeinflusst Vokabulargröße, Kosten und Textverarbeitung.", ru: "Токены — субсловные единицы, создаваемые токенизаторами (напр., BPE). Слово может быть разбито на несколько токенов. Это влияет на размер словаря, стоимость и обработку текста моделью.", uk: "Токени — субсловні одиниці, створювані токенізаторами (напр., BPE). Слово може бути розбите на кілька токенів. Це впливає на розмір словника, вартість і обробку тексту моделлю." } },
{ category: "LLM", question: { en: "What is the 'context window' of an LLM?", de: "Was ist das 'Kontextfenster' eines LLM?", ru: "Что такое 'контекстное окно' LLM?", uk: "Що таке 'контекстне вікно' LLM?" }, options: { en: ["The training dataset size", "The maximum number of tokens the model can process in a single pass", "The number of layers in the model", "The GPU memory available for inference"], de: ["Die Größe des Trainingsdatensatzes", "Die maximale Anzahl von Tokens, die das Modell in einem Durchgang verarbeiten kann", "Die Anzahl der Schichten im Modell", "Der verfügbare GPU-Speicher für Inferenz"], ru: ["Размер обучающего набора данных", "Максимальное количество токенов, которое модель может обработать за один проход", "Количество слоёв в модели", "Объём GPU-памяти для инференса"], uk: ["Розмір навчального набору даних", "Максимальна кількість токенів, яку модель може обробити за один прохід", "Кількість шарів у моделі", "Обсяг GPU-пам'яті для інференсу"] }, correctIndex: 1, explanation: { en: "The context window defines how many tokens (input + output) the model can handle at once. Modern models range from 4K to 200K+ tokens. Exceeding it causes information loss.", de: "Das Kontextfenster definiert, wie viele Tokens (Eingabe + Ausgabe) das Modell gleichzeitig verarbeiten kann. Moderne Modelle reichen von 4K bis 200K+ Tokens.", ru: "Контекстное окно определяет, сколько токенов (вход + выход) модель может обработать одновременно. Современные модели поддерживают от 4K до 200K+ токенов.", uk: "Контекстне вікно визначає, скільки токенів (вхід + вихід) модель може обробити одночасно. Сучасні моделі підтримують від 4K до 200K+ токенів." } },
{ category: "LLM", question: { en: "What does the 'temperature' parameter control in LLM generation?", de: "Was steuert der 'Temperature'-Parameter bei der LLM-Generierung?", ru: "Что контролирует параметр 'temperature' при генерации LLM?", uk: "Що контролює параметр 'temperature' при генерації LLM?" }, options: { en: ["The model's training speed", "The randomness/creativity of the output — higher values produce more diverse responses", "The maximum output length", "The number of tokens in the vocabulary"], de: ["Die Trainingsgeschwindigkeit des Modells", "Die Zufälligkeit/Kreativität der Ausgabe — höhere Werte erzeugen vielfältigere Antworten", "Die maximale Ausgabelänge", "Die Anzahl der Tokens im Vokabular"], ru: ["Скорость обучения модели", "Случайность/креативность вывода — более высокие значения дают более разнообразные ответы", "Максимальную длину вывода", "Количество токенов в словаре"], uk: ["Швидкість навчання моделі", "Випадковість/креативність виводу — вищі значення дають більш різноманітні відповіді", "Максимальну довжину виводу", "Кількість токенів у словнику"] }, correctIndex: 1, explanation: { en: "Temperature scales the logits before softmax. T=0 makes output deterministic (greedy), T>1 increases randomness. It's crucial for controlling the creativity vs. accuracy tradeoff.", de: "Temperature skaliert die Logits vor Softmax. T=0 macht die Ausgabe deterministisch (greedy), T>1 erhöht die Zufälligkeit. Entscheidend für den Kompromiss zwischen Kreativität und Genauigkeit.", ru: "Temperature масштабирует логиты перед softmax. T=0 делает вывод детерминированным (greedy), T>1 увеличивает случайность. Критически важен для баланса креативности и точности.", uk: "Temperature масштабує логіти перед softmax. T=0 робить вивід детермінованим (greedy), T>1 збільшує випадковість. Критично важливий для балансу креативності та точності." } },
{ category: "LLM", question: { en: "What is the difference between encoder and decoder transformer architectures?", de: "Was ist der Unterschied zwischen Encoder- und Decoder-Transformer-Architekturen?", ru: "В чём разница между архитектурами encoder и decoder трансформеров?", uk: "У чому різниця між архітектурами encoder та decoder трансформерів?" }, options: { en: ["Encoders are faster, decoders are more accurate", "Encoders process input bidirectionally (e.g., BERT); decoders generate text autoregressively (e.g., GPT)", "Encoders work with text, decoders with images", "There is no meaningful difference"], de: ["Encoder sind schneller, Decoder sind genauer", "Encoder verarbeiten Eingaben bidirektional (z.B. BERT); Decoder generieren Text autoregressiv (z.B. GPT)", "Encoder arbeiten mit Text, Decoder mit Bildern", "Es gibt keinen wesentlichen Unterschied"], ru: ["Энкодеры быстрее, декодеры точнее", "Энкодеры обрабатывают вход двунаправленно (напр., BERT); декодеры генерируют текст авторегрессивно (напр., GPT)", "Энкодеры работают с текстом, декодеры с изображениями", "Существенной разницы нет"], uk: ["Енкодери швидші, декодери точніші", "Енкодери обробляють вхід двонаправлено (напр., BERT); декодери генерують текст авторегресивно (напр., GPT)", "Енкодери працюють з текстом, декодери з зображеннями", "Суттєвої різниці немає"] }, correctIndex: 1, explanation: { en: "Encoder models (BERT) see all tokens at once — great for classification and embeddings. Decoder models (GPT) predict the next token sequentially — designed for text generation.", de: "Encoder-Modelle (BERT) sehen alle Tokens gleichzeitig — ideal für Klassifikation und Embeddings. Decoder-Modelle (GPT) sagen das nächste Token sequenziell vorher — für Textgenerierung konzipiert.", ru: "Модели-энкодеры (BERT) видят все токены сразу — подходят для классификации и эмбеддингов. Модели-декодеры (GPT) предсказывают следующий токен последовательно — предназначены для генерации текста.", uk: "Моделі-енкодери (BERT) бачать всі токени одразу — підходять для класифікації та ембеддінгів. Моделі-декодери (GPT) передбачають наступний токен послідовно — призначені для генерації тексту." } },
{ category: "LLM", question: { en: "What is 'top-p' (nucleus) sampling?", de: "Was ist 'Top-p' (Nucleus) Sampling?", ru: "Что такое 'top-p' (nucleus) семплирование?", uk: "Що таке 'top-p' (nucleus) семплювання?" }, options: { en: ["Selecting only the top prediction", "Sampling from the smallest set of tokens whose cumulative probability exceeds p", "Picking a random token from the full vocabulary", "A training optimization technique"], de: ["Nur die Top-Vorhersage auswählen", "Aus der kleinsten Menge von Tokens samplen, deren kumulative Wahrscheinlichkeit p übersteigt", "Ein zufälliges Token aus dem gesamten Vokabular wählen", "Eine Trainingsoptimierungstechnik"], ru: ["Выбор только лучшего предсказания", "Семплирование из наименьшего набора токенов, чья суммарная вероятность превышает p", "Выбор случайного токена из всего словаря", "Техника оптимизации обучения"], uk: ["Вибір лише найкращого передбачення", "Семплювання з найменшого набору токенів, чия сумарна ймовірність перевищує p", "Вибір випадкового токена з усього словника", "Техніка оптимізації навчання"] }, correctIndex: 1, explanation: { en: "Top-p dynamically adjusts the candidate pool. With p=0.9, only tokens comprising the top 90% probability mass are considered. This prevents unlikely tokens while maintaining diversity.", de: "Top-p passt den Kandidatenpool dynamisch an. Mit p=0.9 werden nur Tokens berücksichtigt, die 90% der Wahrscheinlichkeitsmasse ausmachen.", ru: "Top-p динамически регулирует набор кандидатов. При p=0.9 рассматриваются только токены, составляющие 90% вероятностной массы. Это предотвращает маловероятные токены, сохраняя разнообразие.", uk: "Top-p динамічно регулює набір кандидатів. При p=0.9 розглядаються лише токени, що становлять 90% ймовірнісної маси. Це запобігає малоймовірним токенам, зберігаючи різноманітність." } },
{ category: "Agents", question: { en: "What is the ReAct pattern in AI agents?", de: "Was ist das ReAct-Muster bei KI-Agenten?", ru: "Что такое паттерн ReAct в ИИ-агентах?", uk: "Що таке патерн ReAct в ШІ-агентах?" }, options: { en: ["A JavaScript framework for AI", "A pattern where the agent Reasons about the task, Acts using tools, and Observes the result in a loop", "A reactive programming model", "A method for training models faster"], de: ["Ein JavaScript-Framework für KI", "Ein Muster, bei dem der Agent über die Aufgabe nachdenkt, mit Tools handelt und das Ergebnis in einer Schleife beobachtet", "Ein reaktives Programmiermodell", "Eine Methode zum schnelleren Trainieren von Modellen"], ru: ["JavaScript-фреймворк для ИИ", "Паттерн, где агент рассуждает о задаче, действует с помощью инструментов и наблюдает результат в цикле", "Модель реактивного программирования", "Метод более быстрого обучения моделей"], uk: ["JavaScript-фреймворк для ШІ", "Патерн, де агент міркує про задачу, діє за допомогою інструментів та спостерігає результат у циклі", "Модель реактивного програмування", "Метод швидшого навчання моделей"] }, correctIndex: 1, explanation: { en: "ReAct (Reasoning + Acting) interleaves chain-of-thought reasoning with tool actions. The agent thinks about what to do, executes an action, observes the result, and repeats until the task is done.", de: "ReAct (Reasoning + Acting) verschränkt Chain-of-Thought-Reasoning mit Tool-Aktionen. Der Agent denkt, führt eine Aktion aus, beobachtet das Ergebnis und wiederholt dies.", ru: "ReAct (Reasoning + Acting) чередует рассуждения (chain-of-thought) с действиями через инструменты. Агент думает, выполняет действие, наблюдает результат и повторяет до завершения задачи.", uk: "ReAct (Reasoning + Acting) чергує міркування (chain-of-thought) з діями через інструменти. Агент думає, виконує дію, спостерігає результат і повторює до завершення задачі." } },
{ category: "Agents", question: { en: "What is 'tool use' (function calling) in the context of AI agents?", de: "Was ist 'Tool Use' (Function Calling) im Kontext von KI-Agenten?", ru: "Что такое 'использование инструментов' (function calling) в контексте ИИ-агентов?", uk: "Що таке 'використання інструментів' (function calling) у контексті ШІ-агентів?" }, options: { en: ["The model's internal computation process", "A structured way for models to output JSON specifying which external function to call with what arguments", "A method to train the model on tool documentation", "An API rate limiting mechanism"], de: ["Der interne Berechnungsprozess des Modells", "Eine strukturierte Möglichkeit für Modelle, JSON auszugeben, das angibt, welche externe Funktion mit welchen Argumenten aufgerufen werden soll", "Eine Methode zum Trainieren des Modells auf Tool-Dokumentation", "Ein API-Ratenbegrenzungsmechanismus"], ru: ["Внутренний вычислительный процесс модели", "Структурированный способ для модели выводить JSON с указанием, какую внешнюю функцию вызвать и с какими аргументами", "Метод обучения модели на документации инструментов", "Механизм ограничения частоты запросов API"], uk: ["Внутрішній обчислювальний процес моделі", "Структурований спосіб для моделі виводити JSON із зазначенням, яку зовнішню функцію викликати і з якими аргументами", "Метод навчання моделі на документації інструментів", "Механізм обмеження частоти запитів API"] }, correctIndex: 1, explanation: { en: "Function calling allows the LLM to generate structured output (typically JSON) describing a tool invocation. The runtime then executes the function and feeds the result back to the model.", de: "Function Calling ermöglicht es dem LLM, strukturierte Ausgaben (typischerweise JSON) zu erzeugen, die einen Tool-Aufruf beschreiben. Die Laufzeit führt dann die Funktion aus und gibt das Ergebnis an das Modell zurück.", ru: "Function calling позволяет LLM генерировать структурированный вывод (обычно JSON), описывающий вызов инструмента. Среда выполнения затем исполняет функцию и передаёт результат обратно модели.", uk: "Function calling дозволяє LLM генерувати структурований вивід (зазвичай JSON), що описує виклик інструменту. Середовище виконання потім виконує функцію і передає результат назад моделі." } },
{ category: "Agents", question: { en: "What is the main advantage of an AI agent over a single LLM API call?", de: "Was ist der Hauptvorteil eines KI-Agenten gegenüber einem einzelnen LLM-API-Aufruf?", ru: "В чём главное преимущество ИИ-агента перед одиночным вызовом LLM API?", uk: "У чому головна перевага ШІ-агента перед одиночним викликом LLM API?" }, options: { en: ["Agents are always faster", "Agents can plan, use tools, iterate on results, and handle multi-step tasks autonomously", "Agents cost less per token", "Agents don't need a language model"], de: ["Agenten sind immer schneller", "Agenten können planen, Tools nutzen, Ergebnisse iterieren und mehrstufige Aufgaben autonom erledigen", "Agenten kosten weniger pro Token", "Agenten brauchen kein Sprachmodell"], ru: ["Агенты всегда быстрее", "Агенты могут планировать, использовать инструменты, итерировать результаты и автономно решать многошаговые задачи", "Агенты дешевле за токен", "Агентам не нужна языковая модель"], uk: ["Агенти завжди швидші", "Агенти можуть планувати, використовувати інструменти, ітерувати результати й автономно розв'язувати багатокрокові задачі", "Агенти дешевші за токен", "Агентам не потрібна мовна модель"] }, correctIndex: 1, explanation: { en: "Unlike a single prompt-response, agents maintain a loop: they reason, act, observe, and repeat. This enables complex workflows like code debugging, research tasks, and multi-step problem solving.", de: "Im Gegensatz zu einer einzelnen Prompt-Antwort halten Agenten eine Schleife aufrecht: Sie denken, handeln, beobachten und wiederholen. Dies ermöglicht komplexe Workflows.", ru: "В отличие от одиночного запрос-ответ, агенты поддерживают цикл: рассуждают, действуют, наблюдают и повторяют. Это позволяет решать сложные задачи — отладку кода, исследования, многошаговое решение проблем.", uk: "На відміну від одиночного запит-відповідь, агенти підтримують цикл: міркують, діють, спостерігають і повторюють. Це дозволяє розв'язувати складні задачі — налагодження коду, дослідження, багатокрокове вирішення проблем." } },
{ category: "Agents", question: { en: "What role does 'memory' play in AI agents?", de: "Welche Rolle spielt 'Speicher' bei KI-Agenten?", ru: "Какую роль играет 'память' в ИИ-агентах?", uk: "Яку роль відіграє 'пам'ять' у ШІ-агентах?" }, options: { en: ["It only refers to GPU RAM", "It allows agents to retain context, recall past interactions, and build on previous results across turns", "It stores the model weights", "It is used only for caching API responses"], de: ["Es bezieht sich nur auf GPU-RAM", "Es ermöglicht Agenten, Kontext zu behalten, vergangene Interaktionen abzurufen und auf früheren Ergebnissen aufzubauen", "Es speichert die Modellgewichte", "Es wird nur zum Caching von API-Antworten verwendet"], ru: ["Это только GPU RAM", "Позволяет агентам сохранять контекст, вспоминать прошлые взаимодействия и опираться на предыдущие результаты между ходами", "Хранит веса модели", "Используется только для кеширования ответов API"], uk: ["Це лише GPU RAM", "Дозволяє агентам зберігати контекст, згадувати минулі взаємодії та спиратися на попередні результати між ходами", "Зберігає ваги моделі", "Використовується лише для кешування відповідей API"] }, correctIndex: 1, explanation: { en: "Agent memory systems include short-term (conversation context), long-term (vector stores, databases), and working memory (scratchpads). This enables continuity and learning across interactions.", de: "Agenten-Speichersysteme umfassen Kurzzeit- (Gesprächskontext), Langzeit- (Vektorspeicher, Datenbanken) und Arbeitsspeicher (Notizblöcke). Dies ermöglicht Kontinuität über Interaktionen hinweg.", ru: "Системы памяти агентов включают краткосрочную (контекст разговора), долгосрочную (векторные хранилища, БД) и рабочую (блокноты). Это обеспечивает непрерывность и обучение между взаимодействиями.", uk: "Системи пам'яті агентів включають короткострокову (контекст розмови), довгострокову (векторні сховища, БД) та робочу (блокноти). Це забезпечує безперервність та навчання між взаємодіями." } },
{ category: "RAG", question: { en: "What is Retrieval-Augmented Generation (RAG)?", de: "Was ist Retrieval-Augmented Generation (RAG)?", ru: "Что такое Retrieval-Augmented Generation (RAG)?", uk: "Що таке Retrieval-Augmented Generation (RAG)?" }, options: { en: ["A model training technique", "Combining document retrieval from a knowledge base with LLM generation to produce grounded answers", "A type of neural network layer", "A method to compress model weights"], de: ["Eine Modelltrainingstechnik", "Kombination von Dokumentenabfrage aus einer Wissensbasis mit LLM-Generierung für fundierte Antworten", "Ein Typ neuronaler Netzwerkschicht", "Eine Methode zur Komprimierung von Modellgewichten"], ru: ["Техника обучения модели", "Комбинирование поиска документов из базы знаний с генерацией LLM для получения обоснованных ответов", "Тип слоя нейронной сети", "Метод сжатия весов модели"], uk: ["Техніка навчання моделі", "Комбінування пошуку документів із бази знань з генерацією LLM для отримання обґрунтованих відповідей", "Тип шару нейронної мережі", "Метод стиснення ваг моделі"] }, correctIndex: 1, explanation: { en: "RAG retrieves relevant documents from an external knowledge base, includes them in the prompt context, and lets the LLM generate answers grounded in that information. This reduces hallucinations and keeps information up-to-date.", de: "RAG ruft relevante Dokumente aus einer externen Wissensbasis ab, fügt sie in den Prompt-Kontext ein und lässt das LLM Antworten generieren, die auf diesen Informationen basieren.", ru: "RAG извлекает релевантные документы из внешней базы знаний, включает их в контекст промпта и позволяет LLM генерировать ответы, основанные на этой информации. Это снижает галлюцинации и поддерживает актуальность.", uk: "RAG витягує релевантні документи із зовнішньої бази знань, включає їх у контекст промпту і дозволяє LLM генерувати відповіді, що ґрунтуються на цій інформації. Це знижує галюцинації та підтримує актуальність." } },
{ category: "RAG", question: { en: "What is the main advantage of RAG over fine-tuning for domain-specific knowledge?", de: "Was ist der Hauptvorteil von RAG gegenüber Fine-tuning für domänenspezifisches Wissen?", ru: "В чём главное преимущество RAG перед файн-тьюнингом для доменных знаний?", uk: "У чому головна перевага RAG перед файн-тьюнінгом для доменних знань?" }, options: { en: ["RAG is always more accurate", "RAG can use up-to-date information without retraining the model", "RAG requires no external data", "RAG makes the model smaller"], de: ["RAG ist immer genauer", "RAG kann aktuelle Informationen verwenden, ohne das Modell neu zu trainieren", "RAG benötigt keine externen Daten", "RAG macht das Modell kleiner"], ru: ["RAG всегда точнее", "RAG может использовать актуальную информацию без переобучения модели", "RAG не требует внешних данных", "RAG уменьшает размер модели"], uk: ["RAG завжди точніший", "RAG може використовувати актуальну інформацію без перенавчання моделі", "RAG не потребує зовнішніх даних", "RAG зменшує розмір моделі"] }, correctIndex: 1, explanation: { en: "RAG separates knowledge from the model. You can update documents anytime without expensive retraining. Fine-tuning bakes knowledge into weights, which becomes stale and is costly to update.", de: "RAG trennt Wissen vom Modell. Dokumente können jederzeit aktualisiert werden, ohne teures Neutraining. Fine-tuning speichert Wissen in Gewichten, die veralten.", ru: "RAG отделяет знания от модели. Документы можно обновлять в любое время без дорогостоящего переобучения. Файн-тьюнинг записывает знания в веса, которые устаревают.", uk: "RAG відділяє знання від моделі. Документи можна оновлювати будь-коли без дорогого перенавчання. Файн-тьюнінг записує знання у ваги, які застарівають." } },
{ category: "RAG", question: { en: "What is 'chunking' in the context of RAG pipelines?", de: "Was ist 'Chunking' im Kontext von RAG-Pipelines?", ru: "Что такое 'чанкинг' (chunking) в контексте RAG-пайплайнов?", uk: "Що таке 'чанкінг' (chunking) у контексті RAG-пайплайнів?" }, options: { en: ["Compressing the model into smaller parts", "Splitting documents into smaller, overlapping segments for embedding and retrieval", "Grouping API calls into batches", "Dividing the model across multiple GPUs"], de: ["Komprimierung des Modells in kleinere Teile", "Aufteilen von Dokumenten in kleinere, überlappende Segmente für Embedding und Retrieval", "Gruppierung von API-Aufrufen in Batches", "Verteilung des Modells auf mehrere GPUs"], ru: ["Сжатие модели на меньшие части", "Разделение документов на небольшие перекрывающиеся сегменты для эмбеддинга и поиска", "Группировка API-вызовов в пакеты", "Распределение модели по нескольким GPU"], uk: ["Стиснення моделі на менші частини", "Розділення документів на невеликі сегменти з перекриттям для ембеддінгу та пошуку", "Групування API-викликів у пакети", "Розподіл моделі між кількома GPU"] }, correctIndex: 1, explanation: { en: "Documents are split into chunks (typically 200-1000 tokens) with overlap. Each chunk is embedded and stored in a vector database. Chunk size affects retrieval precision — too large loses focus, too small loses context.", de: "Dokumente werden in Chunks (typisch 200-1000 Tokens) mit Überlappung aufgeteilt. Jeder Chunk wird eingebettet und in einer Vektordatenbank gespeichert.", ru: "Документы разделяются на чанки (обычно 200-1000 токенов) с перекрытием. Каждый чанк эмбеддится и сохраняется в векторной БД. Размер чанка влияет на точность поиска.", uk: "Документи розділяються на чанки (зазвичай 200-1000 токенів) з перекриттям. Кожен чанк ембеддиться і зберігається у векторній БД. Розмір чанка впливає на точність пошуку." } },
{ category: "RAG", question: { en: "What is 'hybrid search' in a RAG pipeline?", de: "Was ist 'Hybridsuche' in einer RAG-Pipeline?", ru: "Что такое 'гибридный поиск' в RAG-пайплайне?", uk: "Що таке 'гібридний пошук' у RAG-пайплайні?" }, options: { en: ["Using two different LLMs", "Combining semantic (vector) search with keyword (BM25) search for better retrieval", "Searching both cloud and local databases", "Using both CPU and GPU for search"], de: ["Verwendung von zwei verschiedenen LLMs", "Kombination von semantischer (Vektor-)Suche mit Schlüsselwort-(BM25-)Suche für besseres Retrieval", "Suche in Cloud- und lokalen Datenbanken", "Verwendung von CPU und GPU für die Suche"], ru: ["Использование двух разных LLM", "Комбинирование семантического (векторного) поиска с ключевым (BM25) для лучшего извлечения", "Поиск в облачных и локальных базах данных", "Использование CPU и GPU для поиска"], uk: ["Використання двох різних LLM", "Комбінування семантичного (векторного) пошуку з ключовим (BM25) для кращого витягування", "Пошук у хмарних та локальних базах даних", "Використання CPU та GPU для пошуку"] }, correctIndex: 1, explanation: { en: "Hybrid search merges vector similarity (captures meaning) with keyword matching (captures exact terms). This handles cases where semantic search misses specific names, IDs, or technical terms.", de: "Hybridsuche verbindet Vektorähnlichkeit (erfasst Bedeutung) mit Schlüsselwortabgleich (erfasst exakte Begriffe). Dies behandelt Fälle, in denen semantische Suche spezifische Namen oder Begriffe verfehlt.", ru: "Гибридный поиск объединяет векторное сходство (улавливает смысл) с ключевым поиском (улавливает точные термины). Это покрывает случаи, когда семантический поиск пропускает конкретные имена, ID или технические термины.", uk: "Гібридний пошук об'єднує векторну подібність (вловлює зміст) з ключовим пошуком (вловлює точні терміни). Це покриває випадки, коли семантичний пошук пропускає конкретні імена, ID або технічні терміни." } },
{ category: "RAG", question: { en: "What is the 'lost in the middle' problem in LLMs?", de: "Was ist das 'Lost in the Middle'-Problem bei LLMs?", ru: "Что такое проблема 'lost in the middle' в LLM?", uk: "Що таке проблема 'lost in the middle' в LLM?" }, options: { en: ["Models forget their training data", "LLMs pay less attention to information placed in the middle of long contexts, focusing more on the beginning and end", "Models lose accuracy with medium-length inputs", "A tokenization error with middle characters"], de: ["Modelle vergessen ihre Trainingsdaten", "LLMs beachten Informationen in der Mitte langer Kontexte weniger und fokussieren sich mehr auf Anfang und Ende", "Modelle verlieren Genauigkeit bei mittellangen Eingaben", "Ein Tokenisierungsfehler bei mittleren Zeichen"], ru: ["Модели забывают обучающие данные", "LLM уделяют меньше внимания информации в середине длинных контекстов, фокусируясь на начале и конце", "Модели теряют точность при средней длине ввода", "Ошибка токенизации средних символов"], uk: ["Моделі забувають навчальні дані", "LLM приділяють менше уваги інформації в середині довгих контекстів, фокусуючись на початку та кінці", "Моделі втрачають точність при середній довжині вводу", "Помилка токенізації середніх символів"] }, correctIndex: 1, explanation: { en: "Research shows LLMs have a U-shaped attention pattern — they recall information at the beginning and end of the context much better than in the middle. This is important for RAG chunk ordering.", de: "Forschung zeigt, dass LLMs ein U-förmiges Aufmerksamkeitsmuster haben — sie erinnern Informationen am Anfang und Ende des Kontexts viel besser als in der Mitte.", ru: "Исследования показывают, что LLM имеют U-образный паттерн внимания — они лучше запоминают информацию в начале и конце контекста, чем в середине. Это важно для порядка чанков в RAG.", uk: "Дослідження показують, що LLM мають U-подібний патерн уваги — вони краще запам'ятовують інформацію на початку та в кінці контексту, ніж у середині. Це важливо для порядку чанків у RAG." } },
{ category: "Prompting", question: { en: "What is 'few-shot prompting'?", de: "Was ist 'Few-shot Prompting'?", ru: "Что такое 'few-shot prompting'?", uk: "Що таке 'few-shot prompting'?" }, options: { en: ["Training with very little data", "Providing a few input-output examples in the prompt to guide the model's behavior", "Using a small model for inference", "Making only a few API calls"], de: ["Training mit sehr wenigen Daten", "Bereitstellung einiger Eingabe-Ausgabe-Beispiele im Prompt, um das Verhalten des Modells zu steuern", "Verwendung eines kleinen Modells für Inferenz", "Nur wenige API-Aufrufe machen"], ru: ["Обучение на очень малых данных", "Предоставление нескольких примеров вход-выход в промпте для направления поведения модели", "Использование маленькой модели для инференса", "Выполнение нескольких вызовов API"], uk: ["Навчання на дуже малих даних", "Надання кількох прикладів вхід-вихід у промпті для спрямування поведінки моделі", "Використання малої моделі для інференсу", "Виконання кількох викликів API"] }, correctIndex: 1, explanation: { en: "Few-shot prompting includes examples of desired input-output pairs directly in the prompt. The model learns the pattern from examples without any weight updates — this is in-context learning.", de: "Few-shot Prompting enthält Beispiele gewünschter Ein-/Ausgabepaare direkt im Prompt. Das Modell lernt das Muster aus Beispielen ohne Gewichtsänderungen — In-Context Learning.", ru: "Few-shot prompting включает примеры желаемых пар вход-выход прямо в промпт. Модель учится паттерну из примеров без обновления весов — это обучение в контексте (in-context learning).", uk: "Few-shot prompting включає приклади бажаних пар вхід-вихід прямо у промпт. Модель вчиться патерну з прикладів без оновлення ваг — це навчання в контексті (in-context learning)." } },
{ category: "Prompting", question: { en: "What is 'chain-of-thought' (CoT) prompting?", de: "Was ist 'Chain-of-Thought' (CoT) Prompting?", ru: "Что такое 'chain-of-thought' (CoT) промптинг?", uk: "Що таке 'chain-of-thought' (CoT) промптинг?" }, options: { en: ["Chaining multiple LLM calls together", "Asking the model to reason step-by-step before giving the final answer", "A method to link prompts across sessions", "Training the model on sequential data"], de: ["Verkettung mehrerer LLM-Aufrufe", "Das Modell bitten, schrittweise zu denken, bevor es die endgültige Antwort gibt", "Eine Methode zur Verknüpfung von Prompts über Sitzungen hinweg", "Training des Modells auf sequenziellen Daten"], ru: ["Цепочка нескольких вызовов LLM", "Просьба к модели рассуждать пошагово перед выдачей финального ответа", "Метод связывания промптов между сессиями", "Обучение модели на последовательных данных"], uk: ["Ланцюжок кількох викликів LLM", "Прохання до моделі міркувати покроково перед видачею фінальної відповіді", "Метод зв'язування промптів між сесіями", "Навчання моделі на послідовних даних"] }, correctIndex: 1, explanation: { en: "CoT prompting elicits intermediate reasoning steps. Adding 'Let's think step by step' or showing worked examples dramatically improves performance on math, logic, and complex reasoning tasks.", de: "CoT-Prompting erzeugt Zwischenschritte im Denkprozess. 'Lass uns Schritt für Schritt denken' verbessert die Leistung bei Mathematik, Logik und komplexem Schlussfolgern erheblich.", ru: "CoT-промптинг побуждает модель к промежуточным шагам рассуждения. Добавление 'Давай подумаем пошагово' или показ разобранных примеров значительно улучшает результаты в математике, логике и сложных рассуждениях.", uk: "CoT-промптинг спонукає модель до проміжних кроків міркування. Додавання 'Давай подумаємо покроково' або показ розібраних прикладів значно покращує результати в математиці, логіці та складних міркуваннях." } },
{ category: "Prompting", question: { en: "What is a 'system prompt' and why is it important?", de: "Was ist ein 'System Prompt' und warum ist er wichtig?", ru: "Что такое 'системный промпт' и почему он важен?", uk: "Що таке 'системний промпт' і чому він важливий?" }, options: { en: ["A prompt used only during training", "Instructions that set the model's behavior, persona, and constraints before user interaction", "The first message a user sends", "An internal operating system command"], de: ["Ein Prompt, der nur während des Trainings verwendet wird", "Anweisungen, die das Verhalten, die Persona und die Einschränkungen des Modells vor der Benutzerinteraktion festlegen", "Die erste Nachricht, die ein Benutzer sendet", "Ein interner Betriebssystembefehl"], ru: ["Промпт, используемый только при обучении", "Инструкции, задающие поведение, персону и ограничения модели перед взаимодействием с пользователем", "Первое сообщение пользователя", "Внутренняя команда операционной системы"], uk: ["Промпт, що використовується лише під час навчання", "Інструкції, що задають поведінку, персону та обмеження моделі перед взаємодією з користувачем", "Перше повідомлення користувача", "Внутрішня команда операційної системи"] }, correctIndex: 1, explanation: { en: "System prompts define the model's role, rules, output format, and safety constraints. They're processed before user messages and significantly shape the model's behavior throughout the conversation.", de: "System Prompts definieren die Rolle, Regeln, das Ausgabeformat und die Sicherheitsbeschränkungen des Modells. Sie werden vor Benutzernachrichten verarbeitet und prägen das Verhalten erheblich.", ru: "Системные промпты определяют роль модели, правила, формат вывода и ограничения безопасности. Они обрабатываются перед сообщениями пользователя и значительно определяют поведение модели.", uk: "Системні промпти визначають роль моделі, правила, формат виводу та обмеження безпеки. Вони обробляються перед повідомленнями користувача і значно визначають поведінку моделі." } },
{ category: "Prompting", question: { en: "What does 'grounding' mean in the context of LLM responses?", de: "Was bedeutet 'Grounding' im Kontext von LLM-Antworten?", ru: "Что означает 'grounding' (заземление) в контексте ответов LLM?", uk: "Що означає 'grounding' (заземлення) у контексті відповідей LLM?" }, options: { en: ["Connecting the model to the internet", "Anchoring model responses to specific provided facts, documents, or data to reduce hallucinations", "Resetting the model's state", "Training the model on ground-truth labels"], de: ["Das Modell mit dem Internet verbinden", "Modell-Antworten an spezifische bereitgestellte Fakten, Dokumente oder Daten verankern, um Halluzinationen zu reduzieren", "Den Zustand des Modells zurücksetzen", "Das Modell auf Ground-Truth-Labels trainieren"], ru: ["Подключение модели к интернету", "Привязка ответов модели к конкретным предоставленным фактам, документам или данным для снижения галлюцинаций", "Сброс состояния модели", "Обучение модели на эталонных метках"], uk: ["Підключення моделі до інтернету", "Прив'язка відповідей моделі до конкретних наданих фактів, документів або даних для зниження галюцинацій", "Скидання стану моделі", "Навчання моделі на еталонних мітках"] }, correctIndex: 1, explanation: { en: "Grounding means constraining the model to answer based on provided evidence rather than its parametric knowledge. RAG, citations, and source attribution are all grounding techniques.", de: "Grounding bedeutet, das Modell darauf zu beschränken, basierend auf bereitgestellten Beweisen zu antworten, anstatt auf parametrischem Wissen. RAG, Zitate und Quellenangaben sind Grounding-Techniken.", ru: "Grounding означает ограничение модели ответами на основе предоставленных доказательств, а не параметрических знаний. RAG, цитирование и указание источников — всё это техники grounding.", uk: "Grounding означає обмеження моделі відповідями на основі наданих доказів, а не параметричних знань. RAG, цитування та зазначення джерел — все це техніки grounding." } },
{ category: "Prompting", question: { en: "What is 'structured output' prompting?", de: "Was ist 'Structured Output' Prompting?", ru: "Что такое промптинг для 'структурированного вывода'?", uk: "Що таке промптинг для 'структурованого виводу'?" }, options: { en: ["Formatting code with proper indentation", "Instructing the model to respond in a specific format like JSON, XML, or a defined schema", "A training method for classification tasks", "A way to organize model layers"], de: ["Code mit korrekter Einrückung formatieren", "Das Modell anweisen, in einem bestimmten Format wie JSON, XML oder einem definierten Schema zu antworten", "Eine Trainingsmethode für Klassifikationsaufgaben", "Eine Möglichkeit, Modellschichten zu organisieren"], ru: ["Форматирование кода с правильными отступами", "Указание модели отвечать в определённом формате — JSON, XML или по заданной схеме", "Метод обучения для задач классификации", "Способ организации слоёв модели"], uk: ["Форматування коду з правильними відступами", "Вказівка моделі відповідати у визначеному форматі — JSON, XML або за заданою схемою", "Метод навчання для задач класифікації", "Спосіб організації шарів моделі"] }, correctIndex: 1, explanation: { en: "Structured output ensures reliable parsing of model responses. Modern APIs support JSON mode and schema enforcement, which is critical for tool calling, data extraction, and automation pipelines.", de: "Structured Output gewährleistet zuverlässiges Parsen von Modellantworten. Moderne APIs unterstützen JSON-Modus und Schema-Durchsetzung, was für Tool Calling und Automatisierung entscheidend ist.", ru: "Структурированный вывод обеспечивает надёжный парсинг ответов модели. Современные API поддерживают JSON-режим и валидацию по схеме, что критично для function calling, извлечения данных и автоматизации.", uk: "Структурований вивід забезпечує надійний парсинг відповідей моделі. Сучасні API підтримують JSON-режим та валідацію за схемою, що критично для function calling, витягування даних та автоматизації." } },
{ category: "Fine-tuning", question: { en: "What is LoRA (Low-Rank Adaptation)?", de: "Was ist LoRA (Low-Rank Adaptation)?", ru: "Что такое LoRA (Low-Rank Adaptation)?", uk: "Що таке LoRA (Low-Rank Adaptation)?" }, options: { en: ["A new LLM architecture", "An efficient fine-tuning method that trains small adapter matrices instead of all model weights", "A data augmentation technique", "A model compression algorithm"], de: ["Eine neue LLM-Architektur", "Eine effiziente Fine-tuning-Methode, die kleine Adapter-Matrizen trainiert statt aller Modellgewichte", "Eine Datenaugmentierungstechnik", "Ein Modellkomprimierungsalgorithmus"], ru: ["Новая архитектура LLM", "Эффективный метод файн-тьюнинга, обучающий небольшие адаптерные матрицы вместо всех весов модели", "Техника аугментации данных", "Алгоритм сжатия модели"], uk: ["Нова архітектура LLM", "Ефективний метод файн-тьюнінгу, що навчає невеликі адаптерні матриці замість усіх ваг моделі", "Техніка аугментації даних", "Алгоритм стиснення моделі"] }, correctIndex: 1, explanation: { en: "LoRA freezes the original weights and injects small trainable low-rank matrices into transformer layers. This reduces trainable parameters by 10-100x, making fine-tuning feasible on consumer GPUs.", de: "LoRA friert die ursprünglichen Gewichte ein und injiziert kleine trainierbare Low-Rank-Matrizen in Transformer-Schichten. Dies reduziert die trainierbaren Parameter um das 10-100-fache.", ru: "LoRA замораживает исходные веса и внедряет небольшие обучаемые low-rank матрицы в слои трансформера. Это сокращает обучаемые параметры в 10-100 раз, делая файн-тьюнинг возможным на потребительских GPU.", uk: "LoRA заморожує вихідні ваги та впроваджує невеликі навчальні low-rank матриці у шари трансформера. Це скорочує навчальні параметри у 10-100 разів, роблячи файн-тьюнінг можливим на споживчих GPU." } },
{ category: "Fine-tuning", question: { en: "What is RLHF (Reinforcement Learning from Human Feedback)?", de: "Was ist RLHF (Reinforcement Learning from Human Feedback)?", ru: "Что такое RLHF (обучение с подкреплением на основе обратной связи от человека)?", uk: "Що таке RLHF (навчання з підкріпленням на основі зворотного зв'язку від людини)?" }, options: { en: ["A supervised training method", "A technique that uses human preference data to train a reward model, then uses RL to align the LLM with those preferences", "A way to filter training data", "A method for data labeling"], de: ["Eine überwachte Trainingsmethode", "Eine Technik, die menschliche Präferenzdaten nutzt, um ein Belohnungsmodell zu trainieren, und dann RL verwendet, um das LLM an diese Präferenzen anzupassen", "Eine Methode zum Filtern von Trainingsdaten", "Eine Methode zur Datenkennzeichnung"], ru: ["Метод обучения с учителем", "Техника, использующая данные о предпочтениях человека для обучения модели вознаграждения, затем RL для выравнивания LLM с этими предпочтениями", "Способ фильтрации обучающих данных", "Метод разметки данных"], uk: ["Метод навчання з учителем", "Техніка, що використовує дані про переваги людини для навчання моделі винагороди, потім RL для вирівнювання LLM з цими перевагами", "Спосіб фільтрації навчальних даних", "Метод розмітки даних"] }, correctIndex: 1, explanation: { en: "RLHF involves: 1) collecting human rankings of model outputs, 2) training a reward model on these preferences, 3) using PPO or similar RL to optimize the LLM against the reward model. This is how ChatGPT was aligned.", de: "RLHF umfasst: 1) Sammeln menschlicher Rankings von Modell-Ausgaben, 2) Trainieren eines Reward-Modells, 3) Verwenden von PPO oder ähnlichem RL zur Optimierung des LLM gegen das Reward-Modell.", ru: "RLHF включает: 1) сбор человеческих рейтингов ответов модели, 2) обучение модели вознаграждения на этих предпочтениях, 3) использование PPO или аналогичного RL для оптимизации LLM относительно модели вознаграждения. Так был выровнен ChatGPT.", uk: "RLHF включає: 1) збір людських рейтингів відповідей моделі, 2) навчання моделі винагороди на цих перевагах, 3) використання PPO або аналогічного RL для оптимізації LLM відносно моделі винагороди. Так був вирівняний ChatGPT." } },
{ category: "Fine-tuning", question: { en: "What is DPO (Direct Preference Optimization)?", de: "Was ist DPO (Direct Preference Optimization)?", ru: "Что такое DPO (Direct Preference Optimization)?", uk: "Що таке DPO (Direct Preference Optimization)?" }, options: { en: ["A database query optimization", "A simpler alternative to RLHF that directly optimizes the policy on preference pairs without training a separate reward model", "A method to optimize token distribution", "A GPU memory management technique"], de: ["Eine Datenbankabfrageoptimierung", "Eine einfachere Alternative zu RLHF, die die Policy direkt auf Präferenzpaaren optimiert, ohne ein separates Belohnungsmodell zu trainieren", "Eine Methode zur Optimierung der Token-Verteilung", "Eine GPU-Speicherverwaltungstechnik"], ru: ["Оптимизация запросов к базе данных", "Более простая альтернатива RLHF, напрямую оптимизирующая политику на парах предпочтений без обучения отдельной модели вознаграждения", "Метод оптимизации распределения токенов", "Техника управления GPU-памятью"], uk: ["Оптимізація запитів до бази даних", "Простіша альтернатива RLHF, що напряму оптимізує політику на парах переваг без навчання окремої моделі винагороди", "Метод оптимізації розподілу токенів", "Техніка управління GPU-пам'яттю"] }, correctIndex: 1, explanation: { en: "DPO eliminates the reward model training step. It directly uses preference pairs (chosen vs rejected) to optimize the language model, making alignment simpler and more stable than RLHF+PPO.", de: "DPO eliminiert den Schritt des Reward-Modell-Trainings. Es nutzt Präferenzpaare (gewählt vs abgelehnt) direkt, um das Sprachmodell zu optimieren — einfacher und stabiler als RLHF+PPO.", ru: "DPO устраняет этап обучения модели вознаграждения. Напрямую использует пары предпочтений (выбранный vs отклонённый) для оптимизации языковой модели — проще и стабильнее, чем RLHF+PPO.", uk: "DPO усуває етап навчання моделі винагороди. Напряму використовує пари переваг (обраний vs відхилений) для оптимізації мовної моделі — простіше та стабільніше, ніж RLHF+PPO." } },
{ category: "Fine-tuning", question: { en: "What is 'instruction tuning' and how does it differ from pretraining?", de: "Was ist 'Instruction Tuning' und wie unterscheidet es sich vom Pretraining?", ru: "Что такое 'instruction tuning' и чем он отличается от предобучения?", uk: "Що таке 'instruction tuning' і чим він відрізняється від передньавчання?" }, options: { en: ["It's the same as pretraining but faster", "Fine-tuning a base model on instruction-response pairs so it follows instructions rather than just completing text", "It only works with encoder models", "A way to reduce model size"], de: ["Es ist dasselbe wie Pretraining, aber schneller", "Fine-tuning eines Basismodells auf Anweisungs-Antwort-Paaren, damit es Anweisungen befolgt statt nur Text zu vervollständigen", "Es funktioniert nur mit Encoder-Modellen", "Eine Methode zur Reduzierung der Modellgröße"], ru: ["То же самое, что предобучение, но быстрее", "Файн-тьюнинг базовой модели на парах инструкция-ответ, чтобы она следовала инструкциям, а не просто дополняла текст", "Работает только с моделями-энкодерами", "Способ уменьшения размера модели"], uk: ["Те саме, що передньавчання, але швидше", "Файн-тьюнінг базової моделі на парах інструкція-відповідь, щоб вона слідувала інструкціям, а не просто доповнювала текст", "Працює лише з моделями-енкодерами", "Спосіб зменшення розміру моделі"] }, correctIndex: 1, explanation: { en: "Base models are trained to predict next tokens. Instruction tuning (SFT) teaches them to follow user instructions by training on curated instruction-response datasets. This is the step between pretraining and RLHF.", de: "Basismodelle werden trainiert, nächste Tokens vorherzusagen. Instruction Tuning (SFT) lehrt sie, Benutzeranweisungen zu befolgen. Dies ist der Schritt zwischen Pretraining und RLHF.", ru: "Базовые модели обучены предсказывать следующие токены. Instruction tuning (SFT) учит их следовать инструкциям пользователя, обучая на курированных датасетах инструкция-ответ. Это шаг между предобучением и RLHF.", uk: "Базові моделі навчені передбачати наступні токени. Instruction tuning (SFT) вчить їх слідувати інструкціям користувача, навчаючи на курованих датасетах інструкція-відповідь. Це крок між передньавчанням та RLHF." } },
{ category: "Fine-tuning", question: { en: "When should you choose fine-tuning over RAG?", de: "Wann sollte man Fine-tuning statt RAG wählen?", ru: "Когда следует выбирать файн-тьюнинг вместо RAG?", uk: "Коли слід обирати файн-тьюнінг замість RAG?" }, options: { en: ["Always — fine-tuning is always better", "When you need to change the model's style, tone, or reasoning patterns rather than inject new factual knowledge", "When you have very little training data", "When you need real-time information"], de: ["Immer — Fine-tuning ist immer besser", "Wenn Sie den Stil, Ton oder die Denkmuster des Modells ändern müssen, statt neues Faktenwissen einzufügen", "Wenn Sie sehr wenige Trainingsdaten haben", "Wenn Sie Echtzeitinformationen benötigen"], ru: ["Всегда — файн-тьюнинг всегда лучше", "Когда нужно изменить стиль, тон или паттерны рассуждения модели, а не внедрить новые фактические знания", "Когда очень мало обучающих данных", "Когда нужна информация в реальном времени"], uk: ["Завжди — файн-тьюнінг завжди кращий", "Коли потрібно змінити стиль, тон або патерни міркування моделі, а не впровадити нові фактичні знання", "Коли дуже мало навчальних даних", "Коли потрібна інформація в реальному часі"] }, correctIndex: 1, explanation: { en: "Fine-tuning is best for teaching behavior, format, and style. RAG is best for dynamic factual knowledge. Use fine-tuning to change HOW the model responds; use RAG to change WHAT it knows.", de: "Fine-tuning eignet sich am besten für Verhalten, Format und Stil. RAG eignet sich für dynamisches Faktenwissen. Fine-tuning ändert WIE das Modell antwortet; RAG ändert WAS es weiß.", ru: "Файн-тьюнинг лучше для обучения поведению, формату и стилю. RAG лучше для динамических фактических знаний. Файн-тьюнинг меняет КАК модель отвечает; RAG меняет ЧТО она знает.", uk: "Файн-тьюнінг кращий для навчання поведінці, формату та стилю. RAG кращий для динамічних фактичних знань. Файн-тьюнінг змінює ЯК модель відповідає; RAG змінює ЩО вона знає." } },
{ category: "Safety", question: { en: "What is a 'hallucination' in the context of LLMs?", de: "Was ist eine 'Halluzination' im Kontext von LLMs?", ru: "Что такое 'галлюцинация' в контексте LLM?", uk: "Що таке 'галюцинація' у контексті LLM?" }, options: { en: ["A visual artifact in generated images", "When the model generates plausible-sounding but factually incorrect or fabricated information", "An error in the tokenizer", "A hardware malfunction during inference"], de: ["Ein visuelles Artefakt in generierten Bildern", "Wenn das Modell plausibel klingende, aber faktisch falsche oder erfundene Informationen erzeugt", "Ein Fehler im Tokenizer", "Eine Hardwarefehlfunktion während der Inferenz"], ru: ["Визуальный артефакт в сгенерированных изображениях", "Когда модель генерирует правдоподобно звучащую, но фактически неверную или выдуманную информацию", "Ошибка в токенизаторе", "Аппаратная неисправность при инференсе"], uk: ["Візуальний артефакт у згенерованих зображеннях", "Коли модель генерує правдоподібно звучну, але фактично невірну або вигадану інформацію", "Помилка в токенізаторі", "Апаратна несправність при інференсі"] }, correctIndex: 1, explanation: { en: "Hallucinations occur because LLMs are trained to produce fluent text, not to verify truth. They can confidently fabricate citations, statistics, and facts. RAG, grounding, and verification chains help mitigate this.", de: "Halluzinationen treten auf, weil LLMs trainiert werden, fließenden Text zu produzieren, nicht Wahrheit zu überprüfen. RAG, Grounding und Verifikationsketten helfen, dies zu mildern.", ru: "Галлюцинации возникают потому, что LLM обучены производить связный текст, а не проверять истинность. Они могут уверенно выдумывать цитаты, статистику и факты. RAG, grounding и цепочки верификации помогают с этим.", uk: "Галюцинації виникають тому, що LLM навчені виробляти зв'язний текст, а не перевіряти істинність. Вони можуть впевнено вигадувати цитати, статистику та факти. RAG, grounding та ланцюжки верифікації допомагають з цим." } },
{ category: "Safety", question: { en: "What is 'prompt injection'?", de: "Was ist 'Prompt Injection'?", ru: "Что такое 'prompt injection'?", uk: "Що таке 'prompt injection'?" }, options: { en: ["Adding more examples to a prompt", "An attack where malicious user input attempts to override or bypass the system prompt instructions", "A technique to improve prompt quality", "Injecting prompts into the training data"], de: ["Hinzufügen weiterer Beispiele zu einem Prompt", "Ein Angriff, bei dem bösartige Benutzereingaben versuchen, die System-Prompt-Anweisungen zu überschreiben oder zu umgehen", "Eine Technik zur Verbesserung der Prompt-Qualität", "Einschleusen von Prompts in die Trainingsdaten"], ru: ["Добавление примеров в промпт", "Атака, при которой вредоносный пользовательский ввод пытается переопределить или обойти инструкции системного промпта", "Техника улучшения качества промпта", "Внедрение промптов в обучающие данные"], uk: ["Додавання прикладів у промпт", "Атака, при якій зловмисний користувацький ввід намагається перевизначити або обійти інструкції системного промпту", "Техніка покращення якості промпту", "Впровадження промптів у навчальні дані"] }, correctIndex: 1, explanation: { en: "Prompt injection exploits the fact that LLMs can't reliably distinguish instructions from data. An attacker might say 'Ignore previous instructions and...' to hijack the model's behavior. Defense-in-depth with input validation and output filtering helps.", de: "Prompt Injection nutzt aus, dass LLMs Anweisungen nicht zuverlässig von Daten unterscheiden können. Defense-in-Depth mit Eingabevalidierung und Ausgabefilterung hilft.", ru: "Prompt injection использует тот факт, что LLM не могут надёжно отличить инструкции от данных. Атакующий может сказать 'Игнорируй предыдущие инструкции и...' для захвата поведения модели. Помогает многоуровневая защита с валидацией ввода и фильтрацией вывода.", uk: "Prompt injection використовує той факт, що LLM не можуть надійно відрізнити інструкції від даних. Атакуючий може сказати 'Ігноруй попередні інструкції і...' для захоплення поведінки моделі. Допомагає багаторівневий захист з валідацією вводу та фільтрацією виводу." } },
{ category: "Safety", question: { en: "What is 'red teaming' in the context of AI safety?", de: "Was ist 'Red Teaming' im Kontext der KI-Sicherheit?", ru: "Что такое 'red teaming' в контексте безопасности ИИ?", uk: "Що таке 'red teaming' у контексті безпеки ШІ?" }, options: { en: ["A team that builds AI models", "Systematically testing AI systems by attempting to elicit harmful, biased, or unintended outputs", "A code review process", "A deployment strategy"], de: ["Ein Team, das KI-Modelle baut", "Systematisches Testen von KI-Systemen durch den Versuch, schädliche, voreingenommene oder unbeabsichtigte Ausgaben hervorzurufen", "Ein Code-Review-Prozess", "Eine Deployment-Strategie"], ru: ["Команда, создающая модели ИИ", "Систематическое тестирование ИИ-систем путём попыток вызвать вредоносные, предвзятые или непреднамеренные ответы", "Процесс ревью кода", "Стратегия деплоя"], uk: ["Команда, що створює моделі ШІ", "Систематичне тестування ШІ-систем шляхом спроб викликати шкідливі, упереджені або ненавмисні відповіді", "Процес ревью коду", "Стратегія деплою"] }, correctIndex: 1, explanation: { en: "Red teaming involves adversarial testing where experts try to break the AI system. It uncovers vulnerabilities like jailbreaks, bias, and harmful outputs before deployment. Essential for responsible AI release.", de: "Red Teaming umfasst adversariales Testen, bei dem Experten versuchen, das KI-System zu brechen. Es deckt Schwachstellen wie Jailbreaks, Voreingenommenheit und schädliche Ausgaben vor dem Deployment auf.", ru: "Red teaming включает состязательное тестирование, где эксперты пытаются сломать ИИ-систему. Выявляет уязвимости — джейлбрейки, предвзятость, вредоносные ответы — до развёртывания. Необходим для ответственного выпуска ИИ.", uk: "Red teaming включає змагальне тестування, де експерти намагаються зламати ШІ-систему. Виявляє вразливості — джейлбрейки, упередженість, шкідливі відповіді — до розгортання. Необхідний для відповідального випуску ШІ." } },
{ category: "Safety", question: { en: "What is 'alignment' in AI?", de: "Was ist 'Alignment' in der KI?", ru: "Что такое 'alignment' (выравнивание) в ИИ?", uk: "Що таке 'alignment' (вирівнювання) в ШІ?" }, options: { en: ["Formatting text alignment (left, center, right)", "Ensuring AI systems behave in accordance with human values, intentions, and safety requirements", "Aligning model layers for better performance", "Synchronizing multiple GPUs"], de: ["Textausrichtung formatieren (links, zentriert, rechts)", "Sicherstellen, dass KI-Systeme im Einklang mit menschlichen Werten, Absichten und Sicherheitsanforderungen handeln", "Ausrichten von Modellschichten für bessere Leistung", "Synchronisierung mehrerer GPUs"], ru: ["Форматирование выравнивания текста", "Обеспечение поведения ИИ-систем в соответствии с человеческими ценностями, намерениями и требованиями безопасности", "Выравнивание слоёв модели для лучшей производительности", "Синхронизация нескольких GPU"], uk: ["Форматування вирівнювання тексту", "Забезпечення поведінки ШІ-систем відповідно до людських цінностей, намірів та вимог безпеки", "Вирівнювання шарів моделі для кращої продуктивності", "Синхронізація кількох GPU"] }, correctIndex: 1, explanation: { en: "AI alignment is one of the field's biggest challenges. Techniques include RLHF, DPO, constitutional AI, and red teaming. The goal is making AI helpful, harmless, and honest while avoiding unintended behaviors.", de: "KI-Alignment ist eine der größten Herausforderungen des Feldes. Techniken umfassen RLHF, DPO, Constitutional AI und Red Teaming. Ziel: KI hilfreich, harmlos und ehrlich machen.", ru: "Alignment ИИ — одна из крупнейших проблем области. Техники включают RLHF, DPO, constitutional AI и red teaming. Цель — сделать ИИ полезным, безвредным и честным, избегая непреднамеренного поведения.", uk: "Alignment ШІ — одна з найбільших проблем галузі. Техніки включають RLHF, DPO, constitutional AI та red teaming. Мета — зробити ШІ корисним, нешкідливим та чесним, уникаючи ненавмисної поведінки." } },
{ category: "Safety", question: { en: "What is a 'guardrail' in AI systems?", de: "Was ist eine 'Guardrail' in KI-Systemen?", ru: "Что такое 'guardrail' (ограждение) в ИИ-системах?", uk: "Що таке 'guardrail' (огородження) в ШІ-системах?" }, options: { en: ["Physical protection for server hardware", "Filters, rules, or secondary models that prevent the AI from generating harmful, off-topic, or policy-violating content", "A machine learning regularization technique", "An API rate limiter"], de: ["Physischer Schutz für Server-Hardware", "Filter, Regeln oder sekundäre Modelle, die verhindern, dass die KI schädliche, themenfremde oder richtlinienwidrige Inhalte erzeugt", "Eine Machine-Learning-Regularisierungstechnik", "Ein API-Ratenbegrenzer"], ru: ["Физическая защита серверного оборудования", "Фильтры, правила или вторичные модели, предотвращающие генерацию ИИ вредного, нерелевантного или нарушающего политику контента", "Техника регуляризации машинного обучения", "Ограничитель частоты запросов API"], uk: ["Фізичний захист серверного обладнання", "Фільтри, правила або вторинні моделі, що запобігають генерації ШІ шкідливого, нерелевантного або порушуючого політику контенту", "Техніка регуляризації машинного навчання", "Обмежувач частоти запитів API"] }, correctIndex: 1, explanation: { en: "Guardrails include input classifiers, output validators, content filters, and topic boundaries. They act as safety layers around the LLM. Examples: blocking PII, enforcing topic scope, preventing jailbreak attempts.", de: "Guardrails umfassen Eingabeklassifikatoren, Ausgabevalidatoren, Inhaltsfilter und Themengrenzen. Sie fungieren als Sicherheitsschichten um das LLM.", ru: "Guardrails включают классификаторы ввода, валидаторы вывода, фильтры контента и тематические границы. Они действуют как слои безопасности вокруг LLM. Примеры: блокировка PII, ограничение темы, предотвращение джейлбрейков.", uk: "Guardrails включають класифікатори вводу, валідатори виводу, фільтри контенту та тематичні межі. Вони діють як шари безпеки навколо LLM. Приклади: блокування PII, обмеження теми, запобігання джейлбрейкам." } },
{ category: "Embeddings", question: { en: "What are vector embeddings?", de: "Was sind Vektor-Embeddings?", ru: "Что такое векторные эмбеддинги?", uk: "Що таке векторні ембеддінги?" }, options: { en: ["HTML embed tags for media", "Dense numerical representations of text (or other data) in high-dimensional space that capture semantic meaning", "Database foreign keys", "Binary encoding of characters"], de: ["HTML-Embed-Tags für Medien", "Dichte numerische Darstellungen von Text (oder anderen Daten) im hochdimensionalen Raum, die semantische Bedeutung erfassen", "Datenbank-Fremdschlüssel", "Binäre Zeichenkodierung"], ru: ["HTML-теги для встраивания медиа", "Плотные числовые представления текста (или других данных) в многомерном пространстве, отражающие семантический смысл", "Внешние ключи базы данных", "Бинарное кодирование символов"], uk: ["HTML-теги для вбудовування медіа", "Щільні числові представлення тексту (або інших даних) у багатовимірному просторі, що відображають семантичний зміст", "Зовнішні ключі бази даних", "Бінарне кодування символів"] }, correctIndex: 1, explanation: { en: "Embedding models (e.g., OpenAI's text-embedding-3, sentence-transformers) convert text into dense vectors (e.g., 768 or 1536 dimensions). Similar meanings map to nearby points in vector space, enabling semantic search.", de: "Embedding-Modelle konvertieren Text in dichte Vektoren. Ähnliche Bedeutungen werden auf nahe Punkte im Vektorraum abgebildet, was semantische Suche ermöglicht.", ru: "Модели эмбеддингов преобразуют текст в плотные векторы (напр., 768 или 1536 измерений). Похожие значения отображаются в близкие точки векторного пространства, что позволяет вести семантический поиск.", uk: "Моделі ембеддінгів перетворюють текст у щільні вектори (напр., 768 або 1536 вимірів). Подібні значення відображаються у близькі точки векторного простору, що дозволяє вести семантичний пошук." } },
{ category: "Embeddings", question: { en: "What is cosine similarity used for in vector search?", de: "Wofür wird Kosinus-Ähnlichkeit bei der Vektorsuche verwendet?", ru: "Для чего используется косинусное сходство в векторном поиске?", uk: "Для чого використовується косинусна подібність у векторному пошуку?" }, options: { en: ["Measuring vector length", "Measuring the angle between two vectors to determine how semantically similar they are", "Counting dimensions in a vector", "Sorting vectors alphabetically"], de: ["Messen der Vektorlänge", "Messen des Winkels zwischen zwei Vektoren, um zu bestimmen, wie semantisch ähnlich sie sind", "Zählen der Dimensionen in einem Vektor", "Alphabetisches Sortieren von Vektoren"], ru: ["Измерение длины вектора", "Измерение угла между двумя векторами для определения их семантического сходства", "Подсчёт измерений вектора", "Сортировка векторов по алфавиту"], uk: ["Вимірювання довжини вектора", "Вимірювання кута між двома векторами для визначення їх семантичної подібності", "Підрахунок вимірів вектора", "Сортування векторів за алфавітом"] }, correctIndex: 1, explanation: { en: "Cosine similarity ranges from -1 to 1. A value of 1 means identical direction (same meaning), 0 means orthogonal (unrelated). It's preferred over Euclidean distance because it's magnitude-invariant.", de: "Kosinus-Ähnlichkeit reicht von -1 bis 1. Wert 1 bedeutet gleiche Richtung (gleiche Bedeutung), 0 bedeutet orthogonal (unverwandt). Bevorzugt gegenüber euklidischer Distanz, da größeninvariant.", ru: "Косинусное сходство варьируется от -1 до 1. Значение 1 означает одинаковое направление (одинаковый смысл), 0 — ортогональность (несвязанность). Предпочтительнее евклидова расстояния, так как инвариантно к масштабу.", uk: "Косинусна подібність варіюється від -1 до 1. Значення 1 означає однаковий напрямок (однаковий зміст), 0 — ортогональність (непов'язаність). Переважніше за евклідову відстань, бо інваріантна до масштабу." } },
{ category: "Embeddings", question: { en: "What is a vector database?", de: "Was ist eine Vektordatenbank?", ru: "Что такое векторная база данных?", uk: "Що таке векторна база даних?" }, options: { en: ["A regular SQL database with indexing", "A database optimized for storing, indexing, and querying high-dimensional vector embeddings using approximate nearest neighbor (ANN) search", "A NoSQL document store", "A graph database for relationships"], de: ["Eine reguläre SQL-Datenbank mit Indexierung", "Eine Datenbank, optimiert für Speicherung, Indexierung und Abfrage hochdimensionaler Vektor-Embeddings mittels approximativer Nächster-Nachbar-(ANN-)Suche", "Ein NoSQL-Dokumentenspeicher", "Eine Graphdatenbank für Beziehungen"], ru: ["Обычная SQL-база данных с индексацией", "База данных, оптимизированная для хранения, индексации и поиска многомерных векторных эмбеддингов с помощью приближённого поиска ближайших соседей (ANN)", "NoSQL-документное хранилище", "Графовая база данных для связей"], uk: ["Звичайна SQL-база даних з індексацією", "База даних, оптимізована для зберігання, індексації та пошуку багатовимірних векторних ембеддінгів за допомогою наближеного пошуку найближчих сусідів (ANN)", "NoSQL-документне сховище", "Графова база даних для зв'язків"] }, correctIndex: 1, explanation: { en: "Vector databases (Pinecone, Weaviate, Qdrant, Milvus, pgvector) use ANN algorithms (HNSW, IVF) for fast similarity search over millions of vectors. They're the backbone of RAG retrieval systems.", de: "Vektordatenbanken (Pinecone, Weaviate, Qdrant, Milvus, pgvector) nutzen ANN-Algorithmen (HNSW, IVF) für schnelle Ähnlichkeitssuche über Millionen von Vektoren. Sie sind das Rückgrat von RAG-Retrieval-Systemen.", ru: "Векторные БД (Pinecone, Weaviate, Qdrant, Milvus, pgvector) используют ANN-алгоритмы (HNSW, IVF) для быстрого поиска по сходству среди миллионов векторов. Они — основа систем извлечения в RAG.", uk: "Векторні БД (Pinecone, Weaviate, Qdrant, Milvus, pgvector) використовують ANN-алгоритми (HNSW, IVF) для швидкого пошуку за подібністю серед мільйонів векторів. Вони — основа систем витягування в RAG." } },
{ category: "Embeddings", question: { en: "What is a 'reranker' in a RAG pipeline?", de: "Was ist ein 'Reranker' in einer RAG-Pipeline?", ru: "Что такое 'reranker' в RAG-пайплайне?", uk: "Що таке 'reranker' у RAG-пайплайні?" }, options: { en: ["A tool that sorts search results alphabetically", "A cross-encoder model that rescores retrieved documents by relevance to the query, improving retrieval precision", "A method to reorder model layers", "An algorithm that removes duplicate results"], de: ["Ein Tool, das Suchergebnisse alphabetisch sortiert", "Ein Cross-Encoder-Modell, das abgerufene Dokumente nach Relevanz zur Abfrage neu bewertet und die Retrieval-Präzision verbessert", "Eine Methode zur Neuordnung von Modellschichten", "Ein Algorithmus, der doppelte Ergebnisse entfernt"], ru: ["Инструмент сортировки результатов по алфавиту", "Модель cross-encoder, переоценивающая извлечённые документы по релевантности к запросу, улучшая точность поиска", "Метод переупорядочивания слоёв модели", "Алгоритм удаления дубликатов"], uk: ["Інструмент сортування результатів за алфавітом", "Модель cross-encoder, що переоцінює витягнуті документи за релевантністю до запиту, покращуючи точність пошуку", "Метод переупорядкування шарів моделі", "Алгоритм видалення дублікатів"] }, correctIndex: 1, explanation: { en: "A two-stage retrieval: first, fast bi-encoder retrieves candidates (top-100), then a slower but more accurate cross-encoder reranker scores query-document pairs jointly to select the best top-5/top-10.", de: "Zweistufiges Retrieval: erst schneller Bi-Encoder (Top-100), dann langsamerer aber genauerer Cross-Encoder-Reranker für die besten Top-5/Top-10.", ru: "Двухэтапный поиск: сначала быстрый bi-encoder извлекает кандидатов (top-100), затем более медленный, но точный cross-encoder reranker оценивает пары запрос-документ для выбора лучших top-5/top-10.", uk: "Двоетапний пошук: спочатку швидкий bi-encoder витягує кандидатів (top-100), потім повільніший, але точніший cross-encoder reranker оцінює пари запит-документ для вибору найкращих top-5/top-10." } },
{ category: "Inference", question: { en: "What is model quantization?", de: "Was ist Modell-Quantisierung?", ru: "Что такое квантизация модели?", uk: "Що таке квантизація моделі?" }, options: { en: ["Splitting a model across multiple machines", "Reducing the numerical precision of model weights (e.g., FP32 to INT8/INT4) to decrease memory usage and speed up inference", "Increasing model parameters for better accuracy", "A data preprocessing technique"], de: ["Aufteilung eines Modells auf mehrere Maschinen", "Reduzierung der numerischen Präzision von Modellgewichten (z.B. FP32 zu INT8/INT4) zur Verringerung des Speicherverbrauchs und Beschleunigung der Inferenz", "Erhöhung der Modellparameter für bessere Genauigkeit", "Eine Datenvorverarbeitungstechnik"], ru: ["Разделение модели на несколько машин", "Снижение числовой точности весов модели (напр., FP32 до INT8/INT4) для уменьшения использования памяти и ускорения инференса", "Увеличение параметров модели для лучшей точности", "Техника предобработки данных"], uk: ["Розділення моделі на кілька машин", "Зниження числової точності ваг моделі (напр., FP32 до INT8/INT4) для зменшення використання пам'яті та прискорення інференсу", "Збільшення параметрів моделі для кращої точності", "Техніка передобробки даних"] }, correctIndex: 1, explanation: { en: "Quantization trades minor accuracy for major efficiency gains. GPTQ, AWQ, and GGUF are popular formats. A 70B model in 4-bit quantization can fit in ~35GB VRAM instead of ~140GB in FP32.", de: "Quantisierung tauscht geringe Genauigkeit gegen große Effizienzgewinne. GPTQ, AWQ und GGUF sind populäre Formate. Ein 70B-Modell in 4-Bit passt in ~35GB VRAM statt ~140GB in FP32.", ru: "Квантизация меняет незначительную точность на значительный выигрыш в эффективности. GPTQ, AWQ и GGUF — популярные форматы. 70B-модель в 4-бит квантизации помещается в ~35GB VRAM вместо ~140GB в FP32.", uk: "Квантизація міняє незначну точність на значний виграш в ефективності. GPTQ, AWQ та GGUF — популярні формати. 70B-модель у 4-біт квантизації вміщується у ~35GB VRAM замість ~140GB у FP32." } },
{ category: "Inference", question: { en: "What is KV-cache in transformer inference?", de: "Was ist KV-Cache bei der Transformer-Inferenz?", ru: "Что такое KV-cache в инференсе трансформеров?", uk: "Що таке KV-cache в інференсі трансформерів?" }, options: { en: ["A disk cache for model weights", "Caching previously computed key-value pairs in attention layers to avoid recomputation during autoregressive generation", "A key-value database for storing results", "A CPU cache optimization"], de: ["Ein Disk-Cache für Modellgewichte", "Zwischenspeichern zuvor berechneter Key-Value-Paare in Attention-Schichten, um Neuberechnungen während der autoregressiven Generierung zu vermeiden", "Eine Key-Value-Datenbank zum Speichern von Ergebnissen", "Eine CPU-Cache-Optimierung"], ru: ["Дисковый кэш для весов модели", "Кэширование ранее вычисленных пар ключ-значение в слоях внимания для избежания повторных вычислений при авторегрессивной генерации", "Key-value база данных для хранения результатов", "Оптимизация кэша CPU"], uk: ["Дисковий кеш для ваг моделі", "Кешування раніше обчислених пар ключ-значення у шарах уваги для уникнення повторних обчислень при авторегресивній генерації", "Key-value база даних для зберігання результатів", "Оптимізація кешу CPU"] }, correctIndex: 1, explanation: { en: "During generation, each new token needs to attend to all previous tokens. KV-cache stores their key/value projections so they're computed only once. This is why long contexts consume significant GPU memory.", de: "Während der Generierung muss jedes neue Token alle vorherigen Tokens beachten. KV-Cache speichert deren Key/Value-Projektionen, damit sie nur einmal berechnet werden.", ru: "При генерации каждый новый токен должен обращаться ко всем предыдущим. KV-cache хранит их key/value проекции, чтобы они вычислялись только один раз. Поэтому длинные контексты потребляют много GPU-памяти.", uk: "При генерації кожен новий токен повинен звертатися до всіх попередніх. KV-cache зберігає їх key/value проекції, щоб вони обчислювалися лише один раз. Тому довгі контексти споживають багато GPU-пам'яті." } },
{ category: "Inference", question: { en: "What is 'speculative decoding'?", de: "Was ist 'Speculative Decoding'?", ru: "Что такое 'speculative decoding' (спекулятивное декодирование)?", uk: "Що таке 'speculative decoding' (спекулятивне декодування)?" }, options: { en: ["Random token selection", "Using a smaller draft model to propose multiple tokens, then verifying them in parallel with the larger model to speed up inference", "A training method for faster convergence", "Decoding tokens in reverse order"], de: ["Zufällige Token-Auswahl", "Verwendung eines kleineren Draft-Modells, das mehrere Tokens vorschlägt, die dann parallel vom größeren Modell verifiziert werden, um die Inferenz zu beschleunigen", "Eine Trainingsmethode für schnellere Konvergenz", "Dekodierung von Tokens in umgekehrter Reihenfolge"], ru: ["Случайный выбор токенов", "Использование меньшей модели-черновика для предложения нескольких токенов с последующей параллельной проверкой большей моделью для ускорения инференса", "Метод обучения для быстрой сходимости", "Декодирование токенов в обратном порядке"], uk: ["Випадковий вибір токенів", "Використання меншої моделі-чернетки для пропонування кількох токенів з подальшою паралельною перевіркою більшою моделлю для прискорення інференсу", "Метод навчання для швидкої збіжності", "Декодування токенів у зворотному порядку"] }, correctIndex: 1, explanation: { en: "Speculative decoding uses a fast draft model to generate candidate tokens, then the target model verifies them all at once (single forward pass). Accepted tokens are kept, rejected ones are regenerated. This can achieve 2-3x speedup.", de: "Speculative Decoding nutzt ein schnelles Draft-Modell für Kandidaten-Tokens, das Zielmodell verifiziert alle auf einmal. Kann 2-3x Beschleunigung erreichen.", ru: "Speculative decoding использует быструю модель-черновик для генерации кандидатов-токенов, затем целевая модель проверяет их все за один проход. Принятые токены сохраняются, отвергнутые перегенерируются. Ускорение в 2-3 раза.", uk: "Speculative decoding використовує швидку модель-чернетку для генерації кандидатів-токенів, потім цільова модель перевіряє їх усі за один прохід. Прийняті токени зберігаються, відхилені перегенеруються. Прискорення у 2-3 рази." } },
{ category: "Inference", question: { en: "What is 'continuous batching' in LLM serving?", de: "Was ist 'Continuous Batching' beim LLM-Serving?", ru: "Что такое 'continuous batching' в обслуживании LLM?", uk: "Що таке 'continuous batching' в обслуговуванні LLM?" }, options: { en: ["Processing one request at a time", "Dynamically adding new requests to a running batch as existing requests complete, maximizing GPU utilization", "Batching training data into epochs", "Splitting a model across batches"], de: ["Verarbeitung einer Anfrage nach der anderen", "Dynamisches Hinzufügen neuer Anfragen zu einem laufenden Batch, wenn bestehende Anfragen abgeschlossen sind, um die GPU-Auslastung zu maximieren", "Batchweise Aufteilung von Trainingsdaten in Epochen", "Aufteilung eines Modells auf Batches"], ru: ["Обработка одного запроса за раз", "Динамическое добавление новых запросов в работающий батч по мере завершения существующих, максимизируя утилизацию GPU", "Пакетирование обучающих данных в эпохи", "Разделение модели по батчам"], uk: ["Обробка одного запиту за раз", "Динамічне додавання нових запитів у працюючий батч у міру завершення існуючих, максимізуючи утилізацію GPU", "Пакетування навчальних даних в епохи", "Розділення моделі за батчами"] }, correctIndex: 1, explanation: { en: "Unlike static batching (wait for all to finish), continuous batching (used in vLLM, TGI) inserts new requests as slots free up. This dramatically improves throughput and reduces latency for LLM inference servers.", de: "Im Gegensatz zu statischem Batching fügt Continuous Batching (vLLM, TGI) neue Anfragen ein, sobald Slots frei werden. Dies verbessert Durchsatz und reduziert Latenz erheblich.", ru: "В отличие от статического батчинга, continuous batching (используется в vLLM, TGI) вставляет новые запросы по мере освобождения слотов. Это значительно улучшает пропускную способность и снижает задержки серверов инференса LLM.", uk: "На відміну від статичного батчінгу, continuous batching (використовується у vLLM, TGI) вставляє нові запити у міру звільнення слотів. Це значно покращує пропускну здатність та знижує затримки серверів інференсу LLM." } },
{ category: "Multi-Agent", question: { en: "What is a multi-agent system in AI?", de: "Was ist ein Multi-Agenten-System in der KI?", ru: "Что такое мультиагентная система в ИИ?", uk: "Що таке мультиагентна система в ШІ?" }, options: { en: ["Running one agent on multiple servers", "Multiple AI agents collaborating, delegating tasks, or debating to accomplish complex goals", "A model with multiple output heads", "An ensemble of different model architectures"], de: ["Einen Agenten auf mehreren Servern ausführen", "Mehrere KI-Agenten, die zusammenarbeiten, Aufgaben delegieren oder debattieren, um komplexe Ziele zu erreichen", "Ein Modell mit mehreren Ausgabeköpfen", "Ein Ensemble verschiedener Modellarchitekturen"], ru: ["Запуск одного агента на нескольких серверах", "Несколько ИИ-агентов, сотрудничающих, делегирующих задачи или дебатирующих для достижения сложных целей", "Модель с несколькими выходными головами", "Ансамбль разных архитектур моделей"], uk: ["Запуск одного агента на кількох серверах", "Кілька ШІ-агентів, що співпрацюють, делегують задачі або дебатують для досягнення складних цілей", "Модель з кількома вихідними головами", "Ансамбль різних архітектур моделей"] }, correctIndex: 1, explanation: { en: "Multi-agent systems decompose complex problems. Agents can have specialized roles (researcher, coder, reviewer), different tools, or different models. They communicate via messages and can check each other's work.", de: "Multi-Agenten-Systeme zerlegen komplexe Probleme. Agenten können spezialisierte Rollen haben und über Nachrichten kommunizieren.", ru: "Мультиагентные системы декомпозируют сложные задачи. Агенты могут иметь специализированные роли (исследователь, программист, ревьюер), разные инструменты или модели. Они общаются через сообщения и могут проверять работу друг друга.", uk: "Мультиагентні системи декомпозують складні задачі. Агенти можуть мати спеціалізовані ролі (дослідник, програміст, рев'юер), різні інструменти або моделі. Вони спілкуються через повідомлення та можуть перевіряти роботу одне одного." } },
{ category: "Multi-Agent", question: { en: "What is the 'orchestrator' pattern in multi-agent systems?", de: "Was ist das 'Orchestrator'-Muster in Multi-Agenten-Systemen?", ru: "Что такое паттерн 'оркестратор' в мультиагентных системах?", uk: "Що таке патерн 'оркестратор' у мультиагентних системах?" }, options: { en: ["All agents work independently", "A central agent that plans the task, delegates sub-tasks to specialized agents, and aggregates their results", "A musical AI system", "A pattern for distributed training"], de: ["Alle Agenten arbeiten unabhängig", "Ein zentraler Agent, der die Aufgabe plant, Teilaufgaben an spezialisierte Agenten delegiert und deren Ergebnisse aggregiert", "Ein musikalisches KI-System", "Ein Muster für verteiltes Training"], ru: ["Все агенты работают независимо", "Центральный агент, планирующий задачу, делегирующий подзадачи специализированным агентам и агрегирующий их результаты", "Музыкальная ИИ-система", "Паттерн для распределённого обучения"], uk: ["Всі агенти працюють незалежно", "Центральний агент, що планує задачу, делегує підзадачі спеціалізованим агентам та агрегує їх результати", "Музична ШІ-система", "Патерн для розподіленого навчання"] }, correctIndex: 1, explanation: { en: "The orchestrator acts like a project manager. It understands the full task, breaks it down, assigns parts to specialist agents (coder, researcher, tester), collects results, and synthesizes the final output.", de: "Der Orchestrator agiert wie ein Projektmanager. Er versteht die Aufgabe, teilt sie auf, weist Teile spezialisierten Agenten zu und synthetisiert die finale Ausgabe.", ru: "Оркестратор действует как проект-менеджер. Он понимает всю задачу, разбивает её, назначает части специализированным агентам (кодер, исследователь, тестер), собирает результаты и синтезирует финальный вывод.", uk: "Оркестратор діє як проект-менеджер. Він розуміє всю задачу, розбиває її, призначає частини спеціалізованим агентам (кодер, дослідник, тестер), збирає результати та синтезує фінальний вивід." } },
