{ category: "Engineering Culture", question: { en: "What makes a good code review?", de: "Was macht ein gutes Code-Review aus?", ru: "Что делает код-ревью хорошим?", uk: "Що робить код-рев'ю хорошим?" }, options: { en: ["Finding as many issues as possible.", "It's respectful, focuses on correctness/readability/maintainability, explains the WHY, has reasonable turnaround time, and is a learning opportunity.", "Approving everything quickly.", "Only senior developers should review code."], de: ["So viele Probleme wie möglich finden.", "Es ist respektvoll, fokussiert auf Korrektheit/Lesbarkeit/Wartbarkeit, erklärt das WARUM, hat angemessene Bearbeitungszeit und ist eine Lernmöglichkeit.", "Alles schnell genehmigen.", "Nur Senior-Entwickler sollten Code reviewen."], ru: ["Найти как можно больше проблем.", "Уважительное, фокусируется на корректности/читаемости/поддерживаемости, объясняет ПОЧЕМУ, имеет разумное время отклика и является возможностью для обучения.", "Одобрять всё быстро.", "Только старшие разработчики должны ревьюить код."], uk: ["Знайти якомога більше проблем.", "Поважне, фокусується на коректності/читабельності/підтримуваності, пояснює ЧОМУ, має розумний час відгуку і є можливістю для навчання.", "Схвалювати все швидко.", "Лише старші розробники мають рев'юїти код."] }, correctIndex: 1, explanation: { en: "Good: 'Consider using a guard clause here to reduce nesting.' Bad: 'This is wrong.' Reviews should be educational and timely.", de: "Gut: 'Erwäge eine Guard Clause, um Verschachtelung zu reduzieren.' Schlecht: 'Das ist falsch.' Reviews sollten lehrreich und zeitnah sein.", ru: "Хорошо: «Рассмотрите guard clause для уменьшения вложенности.» Плохо: «Это неправильно.» Ревью должны быть обучающими и своевременными.", uk: "Добре: «Розгляньте guard clause для зменшення вкладеності.» Погано: «Це неправильно.» Рев'ю мають бути навчальними та своєчасними." } },
{ category: "Engineering Culture", question: { en: "What is the Bus Factor?", de: "Was ist der Bus-Faktor?", ru: "Что такое Bus Factor?", uk: "Що таке Bus Factor?" }, options: { en: ["Number of buses near the office.", "The number of team members who would need to leave before the project stalls — measures knowledge concentration risk.", "A transportation planning metric.", "The maximum team size for Scrum."], de: ["Anzahl der Busse in der Nähe des Büros.", "Die Anzahl der Teammitglieder, die ausfallen müssten, damit das Projekt stockt — misst das Risiko der Wissenskonzentration.", "Eine Verkehrsplanungsmetrik.", "Die maximale Teamgrösse für Scrum."], ru: ["Количество автобусов у офиса.", "Количество участников команды, которые должны уйти, прежде чем проект остановится — измеряет риск концентрации знаний.", "Метрика транспортного планирования.", "Максимальный размер команды для Scrum."], uk: ["Кількість автобусів біля офісу.", "Кількість учасників команди, які мають піти, перш ніж проєкт зупиниться — вимірює ризик концентрації знань.", "Метрика транспортного планування.", "Максимальний розмір команди для Scrum."] }, correctIndex: 1, explanation: { en: "If only one person understands the payment system, bus factor = 1. Fix: pair programming, documentation, knowledge sharing.", de: "Wenn nur eine Person das Zahlungssystem versteht, Bus-Faktor = 1. Lösung: Pair Programming, Dokumentation, Wissensaustausch.", ru: "Если только один человек понимает платёжную систему, bus factor = 1. Решение: парное программирование, документация, обмен знаниями.", uk: "Якщо лише одна людина розуміє платіжну систему, bus factor = 1. Рішення: парне програмування, документація, обмін знаннями." } },
{ category: "Engineering Culture", question: { en: "What is the difference between a Spike and a regular story?", de: "Was ist der Unterschied zwischen einem Spike und einer regulären Story?", ru: "В чём разница между Spike и обычной историей?", uk: "В чому різниця між Spike та звичайною історією?" }, options: { en: ["Spikes are bugs, stories are features.", "A Spike is a time-boxed research task to reduce uncertainty — it produces knowledge, not shippable code.", "Spikes are unestimated stories.", "There is no difference."], de: ["Spikes sind Bugs, Stories sind Features.", "Ein Spike ist eine zeitlich begrenzte Forschungsaufgabe zur Reduzierung von Unsicherheit — er produziert Wissen, keinen auslieferbaren Code.", "Spikes sind ungeschätzte Stories.", "Es gibt keinen Unterschied."], ru: ["Spike — это баги, истории — фичи.", "Spike — это ограниченная по времени исследовательская задача для снижения неопределённости — она производит знания, а не готовый к поставке код.", "Spike — это неоценённые истории.", "Разницы нет."], uk: ["Spike — це баги, історії — фічі.", "Spike — це обмежена в часі дослідницька задача для зниження невизначеності — вона виробляє знання, а не готовий до поставки код.", "Spike — це неоцінені історії.", "Різниці немає."] }, correctIndex: 1, explanation: { en: "Before committing to a 3-sprint epic, spend 2 days on a spike to investigate feasibility.", de: "Bevor man sich auf ein 3-Sprint-Epic festlegt, 2 Tage für einen Spike zur Machbarkeitsprüfung einplanen.", ru: "Прежде чем коммититься на 3-спринтовый эпик, потратьте 2 дня на spike для исследования осуществимости.", uk: "Перш ніж комітитися на 3-спринтовий епік, витратьте 2 дні на spike для дослідження здійсненності." } },
{ category: "Engineering Culture", question: { en: "What is Trunk-Based Development?", de: "Was ist Trunk-Based Development?", ru: "Что такое Trunk-Based Development?", uk: "Що таке Trunk-Based Development?" }, options: { en: ["Developing on tree-themed branches.", "All developers commit to a single main branch frequently using short-lived feature branches. Reduces merge conflicts and enables continuous integration.", "A Git flow with many long-lived branches.", "Developing without version control."], de: ["Entwicklung auf baumthematischen Branches.", "Alle Entwickler committen häufig in einen einzigen Main-Branch mit kurzlebigen Feature-Branches. Reduziert Merge-Konflikte und ermöglicht Continuous Integration.", "Ein Git-Flow mit vielen langlebigen Branches.", "Entwicklung ohne Versionskontrolle."], ru: ["Разработка на ветках с древесной тематикой.", "Все разработчики часто коммитят в единую main-ветку, используя короткоживущие feature-ветки. Уменьшает merge-конфликты и обеспечивает непрерывную интеграцию.", "Git flow с множеством долгоживущих веток.", "Разработка без системы контроля версий."], uk: ["Розробка на гілках з деревною тематикою.", "Всі розробники часто комітять в єдину main-гілку, використовуючи короткоживучі feature-гілки. Зменшує merge-конфлікти та забезпечує безперервну інтеграцію.", "Git flow з безліччю довгоживучих гілок.", "Розробка без системи контролю версій."] }, correctIndex: 1, explanation: { en: "Long-lived feature branches diverge from main, causing painful merges. Trunk-based: small commits to main multiple times/day. Use feature flags for incomplete work.", de: "Langlebige Feature-Branches divergieren vom Main und verursachen schmerzhafte Merges. Trunk-basiert: kleine Commits in Main mehrmals täglich. Feature Flags für unfertige Arbeit.", ru: "Долгоживущие feature-ветки расходятся с main, вызывая болезненные merge. Trunk-based: маленькие коммиты в main несколько раз в день. Feature flags для незавершённой работы.", uk: "Довгоживучі feature-гілки розходяться з main, спричиняючи болісні merge. Trunk-based: маленькі коміти в main кілька разів на день. Feature flags для незавершеної роботи." } },
{ category: "Engineering Culture", question: { en: "What are Architecture Decision Records (ADRs)?", de: "Was sind Architecture Decision Records (ADRs)?", ru: "Что такое Architecture Decision Records (ADR)?", uk: "Що таке Architecture Decision Records (ADR)?" }, options: { en: ["Database records of deployed architectures.", "Lightweight documents capturing architectural decisions: context, decision made, alternatives considered, and rationale — preventing repeated debates.", "Auto-generated architecture diagrams.", "Records kept by the architecture team only."], de: ["Datenbankeinträge deployter Architekturen.", "Leichtgewichtige Dokumente, die Architekturentscheidungen festhalten: Kontext, getroffene Entscheidung, betrachtete Alternativen und Begründung — verhindert wiederholte Debatten.", "Automatisch generierte Architekturdiagramme.", "Aufzeichnungen nur für das Architekturteam."], ru: ["Записи в базе данных о развёрнутых архитектурах.", "Лёгкие документы, фиксирующие архитектурные решения: контекст, принятое решение, рассмотренные альтернативы и обоснование — предотвращают повторные дебаты.", "Автоматически генерируемые архитектурные диаграммы.", "Записи только для команды архитекторов."], uk: ["Записи в базі даних про розгорнуті архітектури.", "Легкі документи, що фіксують архітектурні рішення: контекст, прийняте рішення, розглянуті альтернативи та обґрунтування — запобігають повторним дебатам.", "Автоматично згенеровані архітектурні діаграми.", "Записи лише для команди архітекторів."] }, correctIndex: 1, explanation: { en: "ADR template: 'Status: Accepted. Context: We need a message broker. Decision: Use RabbitMQ. Alternatives: Kafka (overkill), SQS (vendor lock-in).'", de: "ADR-Vorlage: 'Status: Akzeptiert. Kontext: Wir brauchen einen Message Broker. Entscheidung: RabbitMQ. Alternativen: Kafka (übertrieben), SQS (Vendor Lock-in).'", ru: "Шаблон ADR: «Статус: Принято. Контекст: Нужен message broker. Решение: RabbitMQ. Альтернативы: Kafka (избыточно), SQS (vendor lock-in).»", uk: "Шаблон ADR: «Статус: Прийнято. Контекст: Потрібен message broker. Рішення: RabbitMQ. Альтернативи: Kafka (надмірно), SQS (vendor lock-in).»" } },
// ===== WORKPLACE SCENARIOS =====
{ category: "Workplace", question: { en: "You've identified a critical bug in production on Friday evening. What do you do?", de: "Du hast am Freitagabend einen kritischen Bug in Produktion entdeckt. Was tust du?", ru: "Вы обнаружили критический баг в продакшене в пятницу вечером. Что делать?", uk: "Ви виявили критичний баг у продакшені в п'ятницю ввечері. Що робити?" }, options: { en: ["Wait until Monday.", "Assess the impact: if users are affected, follow the incident response process immediately. Communicate, apply a hotfix or rollback.", "Push a quick fix without testing.", "Email the manager and go home."], de: ["Bis Montag warten.", "Auswirkung bewerten: wenn Nutzer betroffen sind, sofort den Incident-Response-Prozess folgen. Kommunizieren, Hotfix oder Rollback anwenden.", "Einen schnellen Fix ohne Tests pushen.", "Dem Manager mailen und nach Hause gehen."], ru: ["Подождать до понедельника.", "Оценить влияние: если пользователи затронуты, немедленно следовать процессу реагирования на инциденты. Коммуницировать, применить хотфикс или откат.", "Запушить быстрый фикс без тестов.", "Написать менеджеру и уйти домой."], uk: ["Почекати до понеділка.", "Оцінити вплив: якщо користувачі постраждали, негайно слідувати процесу реагування на інциденти. Комунікувати, застосувати хотфікс або відкат.", "Запушити швидкий фікс без тестів.", "Написати менеджеру і піти додому."] }, correctIndex: 1, explanation: { en: "Triage first: how many users affected? Is data being corrupted? Severity determines response.", de: "Zuerst Triage: Wie viele Nutzer betroffen? Werden Daten beschädigt? Die Schwere bestimmt die Reaktion.", ru: "Сначала триаж: сколько пользователей затронуто? Повреждаются ли данные? Серьёзность определяет реакцию.", uk: "Спершу тріаж: скільки користувачів постраждало? Чи пошкоджуються дані? Серйозність визначає реакцію." } },
{ category: "Workplace", question: { en: "You're asked to estimate a feature but don't have enough information. What should you do?", de: "Du sollst ein Feature schätzen, hast aber nicht genug Informationen. Was tust du?", ru: "Вас просят оценить фичу, но информации недостаточно. Что делать?", uk: "Вас просять оцінити фічу, але інформації недостатньо. Що робити?" }, options: { en: ["Give a rough guess to show confidence.", "Be transparent: 'I need to investigate X and Y before I can give a reliable estimate. Can we do a 2-day spike?'", "Refuse to estimate until everything is clear.", "Triple your gut estimate to be safe."], de: ["Eine grobe Schätzung geben, um Selbstvertrauen zu zeigen.", "Transparent sein: 'Ich muss X und Y untersuchen, bevor ich eine zuverlässige Schätzung abgeben kann. Können wir einen 2-Tage-Spike machen?'", "Die Schätzung verweigern, bis alles klar ist.", "Die Bauchschätzung verdreifachen, um sicher zu gehen."], ru: ["Дать грубую прикидку, чтобы показать уверенность.", "Быть прозрачным: «Мне нужно исследовать X и Y, прежде чем дать надёжную оценку. Можем провести 2-дневный spike?»", "Отказаться оценивать, пока всё не прояснится.", "Утроить интуитивную оценку для подстраховки."], uk: ["Дати грубу прикидку, щоб показати впевненість.", "Бути прозорим: «Мені потрібно дослідити X та Y, перш ніж дати надійну оцінку. Чи можемо провести 2-денний spike?»", "Відмовитися оцінювати, поки все не прояснится.", "Утроїти інтуїтивну оцінку для підстраховки."] }, correctIndex: 1, explanation: { en: "Honesty > false precision. A range estimate with assumptions is far more useful than a confident but wrong single number.", de: "Ehrlichkeit > falsche Präzision. Eine Bereichsschätzung mit Annahmen ist weitaus nützlicher als eine selbstbewusste aber falsche Einzelzahl.", ru: "Честность > ложная точность. Оценка диапазоном с допущениями гораздо полезнее, чем уверенное, но неверное число.", uk: "Чесність > хибна точність. Оцінка діапазоном з припущеннями набагато корисніша, ніж впевнене, але невірне число." } },
{ category: "Workplace", question: { en: "A stakeholder asks you to skip testing to meet a deadline. How do you respond?", de: "Ein Stakeholder bittet dich, Tests auszulassen, um eine Deadline einzuhalten. Wie reagierst du?", ru: "Стейкхолдер просит вас пропустить тестирование ради дедлайна. Как ответить?", uk: "Стейкхолдер просить вас пропустити тестування заради дедлайну. Як відповісти?" }, options: { en: ["Agree — the deadline is more important.", "Explain the risk with data: 'Skipping tests means higher chance of production bugs. Can we reduce scope instead?'", "Refuse without explanation.", "Skip tests but don't tell anyone."], de: ["Zustimmen — die Deadline ist wichtiger.", "Das Risiko mit Daten erklären: 'Tests auslassen bedeutet höheres Risiko für Produktionsfehler. Können wir stattdessen den Scope reduzieren?'", "Ohne Erklärung ablehnen.", "Tests auslassen, ohne jemandem zu sagen."], ru: ["Согласиться — дедлайн важнее.", "Объяснить риск с данными: «Пропуск тестов означает более высокую вероятность багов в продакшене. Можем ли мы вместо этого сократить скоуп?»", "Отказать без объяснений.", "Пропустить тесты, но никому не говорить."], uk: ["Погодитися — дедлайн важливіший.", "Пояснити ризик з даними: «Пропуск тестів означає вищу ймовірність багів у продакшені. Чи можемо ми натомість скоротити скоуп?»", "Відмовити без пояснень.", "Пропустити тести, але нікому не казати."] }, correctIndex: 1, explanation: { en: "Frame it as risk management. Show the cost of bugs. Offer alternatives: reduce scope, phased delivery, or extend deadline.", de: "Als Risikomanagement formulieren. Die Kosten von Bugs zeigen. Alternativen anbieten: Scope reduzieren, phasenweise Lieferung oder Deadline verlängern.", ru: "Подайте как управление рисками. Покажите стоимость багов. Предложите альтернативы: сократить скоуп, поэтапная поставка или сдвиг дедлайна.", uk: "Подайте як управління ризиками. Покажіть вартість багів. Запропонуйте альтернативи: скоротити скоуп, поетапна поставка або зсув дедлайну." } },
{ category: "Workplace", question: { en: "You inherited a legacy codebase with no tests and no documentation. What's your first step?", de: "Du hast eine Legacy-Codebasis ohne Tests und ohne Dokumentation geerbt. Was ist dein erster Schritt?", ru: "Вы унаследовали legacy-кодовую базу без тестов и документации. Каков первый шаг?", uk: "Ви успадкували legacy-кодову базу без тестів та документації. Який перший крок?" }, options: { en: ["Rewrite everything from scratch.", "Understand the system first: talk to people who know it, trace key user flows, add characterization tests, then improve incrementally.", "Immediately add TypeScript and React.", "Refuse to work on it."], de: ["Alles von Grund auf neu schreiben.", "Zuerst das System verstehen: mit Leuten sprechen, die es kennen, zentrale User Flows nachverfolgen, Characterization Tests hinzufügen, dann inkrementell verbessern.", "Sofort TypeScript und React hinzufügen.", "Die Arbeit daran ablehnen."], ru: ["Переписать всё с нуля.", "Сначала понять систему: поговорить с людьми, которые её знают, проследить ключевые пользовательские потоки, добавить характеризационные тесты, затем улучшать итеративно.", "Немедленно добавить TypeScript и React.", "Отказаться работать с ней."], uk: ["Переписати все з нуля.", "Спершу зрозуміти систему: поговорити з людьми, які її знають, прослідкувати ключові користувацькі потоки, додати характеризаційні тести, потім покращувати ітеративно.", "Негайно додати TypeScript і React.", "Відмовитися працювати з нею."] }, correctIndex: 1, explanation: { en: "The Strangler Fig approach: don't rewrite, evolve. Add tests around the parts you need to change. Each change leaves the codebase slightly better.", de: "Der Strangler-Fig-Ansatz: nicht neu schreiben, weiterentwickeln. Tests um die zu ändernden Teile hinzufügen. Jede Änderung macht die Codebasis etwas besser.", ru: "Подход Strangler Fig: не переписывайте, эволюционируйте. Добавляйте тесты вокруг изменяемых частей. Каждое изменение делает кодовую базу чуть лучше.", uk: "Підхід Strangler Fig: не переписуйте, еволюціонуйте. Додавайте тести навколо частин, що змінюються. Кожна зміна робить кодову базу трохи кращою." } },
{ category: "Workplace", question: { en: "How do you onboard effectively to a new team?", de: "Wie onboardest du dich effektiv in ein neues Team?", ru: "Как эффективно влиться в новую команду?", uk: "Як ефективно влитися в нову команду?" }, options: { en: ["Wait for someone to assign you tasks.", "Read existing docs and codebase, pick up a small bug, ask questions early, schedule 1:1s with team members to understand the architecture and team dynamics.", "Immediately propose architectural changes.", "Only focus on your assigned tickets."], de: ["Warten, bis jemand Aufgaben zuweist.", "Vorhandene Docs und Codebasis lesen, einen kleinen Bug übernehmen, früh Fragen stellen, 1:1s mit Teammitgliedern planen, um Architektur und Teamdynamik zu verstehen.", "Sofort Architekturänderungen vorschlagen.", "Sich nur auf zugewiesene Tickets konzentrieren."], ru: ["Ждать, пока кто-то назначит задачи.", "Читать существующую документацию и код, взять маленький баг, рано задавать вопросы, запланировать 1:1 с членами команды для понимания архитектуры и динамики.", "Сразу предлагать архитектурные изменения.", "Фокусироваться только на назначенных тикетах."], uk: ["Чекати, поки хтось призначить задачі.", "Читати існуючу документацію та код, взяти маленький баг, рано ставити запитання, запланувати 1:1 з членами команди для розуміння архітектури та динаміки.", "Одразу пропонувати архітектурні зміни.", "Фокусуватися лише на призначених тікетах."] }, correctIndex: 1, explanation: { en: "First 2 weeks: listen more than talk. Fix a small bug to learn the CI/CD pipeline and coding style. Build relationships with 1:1s.", de: "Erste 2 Wochen: mehr zuhören als reden. Einen kleinen Bug fixen, um CI/CD-Pipeline und Coding-Style kennenzulernen. Beziehungen durch 1:1s aufbauen.", ru: "Первые 2 недели: больше слушайте, чем говорите. Исправьте маленький баг, чтобы изучить CI/CD-пайплайн и стиль кодирования. Стройте отношения через 1:1.", uk: "Перші 2 тижні: більше слухайте, ніж говоріть. Виправте маленький баг, щоб вивчити CI/CD-пайплайн та стиль кодування. Будуйте стосунки через 1:1." } },
{ category: "Workplace", question: { en: "How do you handle a situation where you're blocked by another team?", de: "Wie gehst du mit einer Situation um, in der du von einem anderen Team blockiert wirst?", ru: "Как справляться с ситуацией, когда вас блокирует другая команда?", uk: "Як справлятися з ситуацією, коли вас блокує інша команда?" }, options: { en: ["Wait silently until they respond.", "Escalate constructively: communicate the blocker clearly, explain the business impact, propose alternatives (workaround, mock the dependency), escalate to managers only if needed.", "Do their work for them.", "Complain in the public Slack channel."], de: ["Still warten, bis sie antworten.", "Konstruktiv eskalieren: den Blocker klar kommunizieren, den Business Impact erklären, Alternativen vorschlagen (Workaround, Dependency mocken), nur bei Bedarf an Manager eskalieren.", "Ihre Arbeit für sie erledigen.", "Im öffentlichen Slack-Channel beschweren."], ru: ["Молча ждать ответа.", "Конструктивно эскалировать: чётко сообщить о блокере, объяснить бизнес-влияние, предложить альтернативы (обходной путь, замокать зависимость), эскалировать к менеджерам только при необходимости.", "Сделать их работу за них.", "Пожаловаться в публичном канале Slack."], uk: ["Мовчки чекати відповіді.", "Конструктивно ескалювати: чітко повідомити про блокер, пояснити бізнес-вплив, запропонувати альтернативи (обхідний шлях, замокати залежність), ескалювати до менеджерів лише за потреби.", "Зробити їхню роботу за них.", "Поскаржитися в публічному каналі Slack."] }, correctIndex: 1, explanation: { en: "'Hi Team X, we're blocked on API endpoint Y, needed by Friday. Can we sync today? Alternatively, we can mock it.' Clear, solution-oriented, deadline-aware.", de: "'Hi Team X, wir sind bei API-Endpoint Y blockiert, benötigt bis Freitag. Können wir heute synchronisieren? Alternativ können wir es mocken.' Klar, lösungsorientiert, deadline-bewusst.", ru: "«Привет, команда X, мы заблокированы по API-эндпоинту Y, нужен к пятнице. Можем синхронизироваться сегодня? Как альтернатива — можем замокать.» Чётко, ориентировано на решение, с учётом дедлайна.", uk: "«Привіт, команда X, ми заблоковані по API-ендпоінту Y, потрібен до п'ятниці. Можемо синхронізуватися сьогодні? Як альтернатива — можемо замокати.» Чітко, орієнтовано на рішення, з урахуванням дедлайну." } }
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
</body>
</html>
