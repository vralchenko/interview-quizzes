{ category: "Scrum", question: { en: "What are the three pillars of Scrum?", de: "Was sind die drei Säulen von Scrum?", ru: "Каковы три столпа Scrum?", uk: "Які три стовпи Scrum?" }, options: { en: ["Planning, Execution, Delivery.", "Transparency, Inspection, Adaptation — enabling empirical process control through visibility, frequent checks, and course-correction.", "Speed, Quality, Cost.", "Backlog, Sprint, Retrospective."], de: ["Planung, Ausführung, Lieferung.", "Transparenz, Überprüfung, Anpassung — ermöglicht empirische Prozesskontrolle durch Sichtbarkeit, häufige Prüfungen und Kurskorrektur.", "Geschwindigkeit, Qualität, Kosten.", "Backlog, Sprint, Retrospektive."], ru: ["Планирование, выполнение, доставка.", "Прозрачность, инспекция, адаптация — обеспечивают эмпирический контроль процесса через видимость, частые проверки и корректировку курса.", "Скорость, качество, стоимость.", "Бэклог, спринт, ретроспектива."], uk: ["Планування, виконання, доставка.", "Прозорість, інспекція, адаптація — забезпечують емпіричний контроль процесу через видимість, часті перевірки та коригування курсу.", "Швидкість, якість, вартість.", "Бекллог, спринт, ретроспектива."] }, correctIndex: 1, explanation: { en: "Scrum is empirical: you can't plan everything upfront. Transparency (everyone sees the work), Inspection (regular checkpoints), Adaptation (adjust based on findings).", de: "Scrum ist empirisch: Man kann nicht alles im Voraus planen. Transparenz (jeder sieht die Arbeit), Überprüfung (regelmässige Checkpoints), Anpassung (Korrekturen basierend auf Erkenntnissen).", ru: "Scrum — эмпирический подход: нельзя всё спланировать заранее. Прозрачность (все видят работу), инспекция (регулярные проверки), адаптация (корректировка на основе выводов).", uk: "Scrum — емпіричний підхід: неможливо все спланувати наперед. Прозорість (усі бачать роботу), інспекція (регулярні перевірки), адаптація (коригування на основі висновків)." } },
{ category: "Scrum", question: { en: "What is the role of the Scrum Master?", de: "Welche Rolle hat der Scrum Master?", ru: "Какова роль Scrum Master?", uk: "Яка роль Scrum Master?" }, options: { en: ["The project manager who assigns tasks.", "A servant-leader who removes impediments, facilitates ceremonies, protects the team from distractions, and coaches the team on Scrum practices.", "The most senior developer.", "The person who writes user stories."], de: ["Der Projektmanager, der Aufgaben zuweist.", "Ein Servant Leader, der Hindernisse beseitigt, Zeremonien moderiert, das Team vor Ablenkungen schützt und in Scrum-Praktiken coacht.", "Der erfahrenste Entwickler.", "Die Person, die User Stories schreibt."], ru: ["Менеджер проекта, который назначает задачи.", "Слуга-лидер, который устраняет препятствия, фасилитирует церемонии, защищает команду от отвлечений и обучает практикам Scrum.", "Самый опытный разработчик.", "Человек, который пишет пользовательские истории."], uk: ["Менеджер проєкту, який призначає завдання.", "Слуга-лідер, який усуває перешкоди, фасилітує церемонії, захищає команду від відволікань і навчає практикам Scrum.", "Найдосвідченіший розробник.", "Людина, яка пише користувацькі історії."] }, correctIndex: 1, explanation: { en: "The Scrum Master doesn't manage people or assign work. They ensure the Scrum process works, remove blockers, and shield the team from scope creep mid-sprint.", de: "Der Scrum Master verwaltet keine Personen und weist keine Arbeit zu. Er stellt sicher, dass der Scrum-Prozess funktioniert, beseitigt Blocker und schützt das Team vor Scope Creep.", ru: "Scrum Master не управляет людьми и не назначает работу. Он обеспечивает работу процесса Scrum, устраняет блокеры и защищает команду от расползания скоупа.", uk: "Scrum Master не керує людьми і не призначає роботу. Він забезпечує роботу процесу Scrum, усуває блокери та захищає команду від розповзання скоупу." } },

{ category: "Scrum", question: { en: "What happens during Sprint Planning?", de: "Was passiert beim Sprint Planning?", ru: "Что происходит на Sprint Planning?", uk: "Що відбувається на Sprint Planning?" }, options: { en: ["The team plans the entire project roadmap.", "The team selects items from the Product Backlog they can complete in the sprint, defines a Sprint Goal, and breaks items into tasks.", "The Scrum Master assigns tasks to developers.", "Only the PO and Scrum Master attend."], de: ["Das Team plant die gesamte Projekt-Roadmap.", "Das Team wählt Elemente aus dem Product Backlog, die im Sprint abgeschlossen werden können, definiert ein Sprint-Ziel und zerlegt Elemente in Aufgaben.", "Der Scrum Master weist Entwicklern Aufgaben zu.", "Nur PO und Scrum Master nehmen teil."], ru: ["Команда планирует всю дорожную карту проекта.", "Команда выбирает элементы из Product Backlog, которые может завершить за спринт, определяет Sprint Goal и разбивает элементы на задачи.", "Scrum Master назначает задачи разработчикам.", "Участвуют только PO и Scrum Master."], uk: ["Команда планує всю дорожню карту проєкту.", "Команда обирає елементи з Product Backlog, які може завершити за спринт, визначає Sprint Goal і розбиває елементи на задачі.", "Scrum Master призначає завдання розробникам.", "Беруть участь лише PO та Scrum Master."] }, correctIndex: 1, explanation: { en: "The team PULLS work — nobody pushes it. They assess capacity, discuss stories, ask the PO clarifying questions, and commit to a Sprint Goal.", de: "Das Team ZIEHT Arbeit — niemand drückt sie. Sie bewerten Kapazität, besprechen Stories, stellen dem PO klärende Fragen und verpflichten sich zu einem Sprint-Ziel.", ru: "Команда ТЯНЕТ работу — никто не навязывает. Оценивают ёмкость, обсуждают истории, задают PO уточняющие вопросы и берут обязательство по Sprint Goal.", uk: "Команда ТЯГНЕ роботу — ніхто не нав'язує. Оцінюють ємність, обговорюють історії, ставлять PO уточнювальні запитання і беруть зобов'язання щодо Sprint Goal." } },
{ category: "Scrum", question: { en: "What is the purpose of the Daily Standup?", de: "Was ist der Zweck des Daily Standups?", ru: "Какова цель Daily Standup?", uk: "Яка мета Daily Standup?" }, options: { en: ["A status report for management.", "A 15-minute sync where each team member shares: what they did yesterday, what they'll do today, and any blockers — to coordinate and surface impediments early.", "A code review session.", "A meeting to re-estimate stories."], de: ["Ein Statusbericht für das Management.", "Ein 15-minütiges Sync, bei dem jedes Teammitglied teilt: was gestern getan wurde, was heute geplant ist und welche Blocker es gibt — um früh zu koordinieren.", "Eine Code-Review-Sitzung.", "Ein Meeting zur Neuschätzung von Stories."], ru: ["Отчёт о статусе для руководства.", "15-минутная синхронизация, где каждый участник делится: что сделал вчера, что планирует сегодня и какие есть блокеры — для координации и раннего выявления проблем.", "Сессия код-ревью.", "Встреча для переоценки историй."], uk: ["Звіт про статус для керівництва.", "15-хвилинна синхронізація, де кожен учасник ділиться: що зробив учора, що планує сьогодні і які є блокери — для координації та раннього виявлення проблем.", "Сесія код-рев'ю.", "Зустріч для переоцінки історій."] }, correctIndex: 1, explanation: { en: "It's FOR the team, not for management. Focus on blockers — the Scrum Master acts on them. Not a detailed status report — keep it brief.", de: "Es ist FÜR das Team, nicht für das Management. Fokus auf Blocker — der Scrum Master kümmert sich darum. Kein detaillierter Statusbericht — kurz halten.", ru: "Это ДЛЯ команды, не для руководства. Фокус на блокерах — Scrum Master реагирует на них. Не детальный отчёт — кратко.", uk: "Це ДЛЯ команди, не для керівництва. Фокус на блокерах — Scrum Master реагує на них. Не детальний звіт — коротко." } },
{ category: "Scrum", question: { en: "What is a Sprint Retrospective?", de: "Was ist eine Sprint-Retrospektive?", ru: "Что такое Sprint Retrospective?", uk: "Що таке Sprint Retrospective?" }, options: { en: ["A meeting to blame people for failures.", "A ceremony at the end of each sprint where the team reflects on what went well, what didn't, and agrees on concrete improvements for the next sprint.", "A demo for stakeholders.", "A backlog grooming session."], de: ["Ein Meeting, um Schuldige zu finden.", "Eine Zeremonie am Ende jedes Sprints, in der das Team reflektiert, was gut lief, was nicht, und konkrete Verbesserungen für den nächsten Sprint vereinbart.", "Eine Demo für Stakeholder.", "Eine Backlog-Grooming-Sitzung."], ru: ["Встреча для поиска виновных.", "Церемония в конце каждого спринта, где команда анализирует, что прошло хорошо, что нет, и договаривается о конкретных улучшениях на следующий спринт.", "Демо для стейкхолдеров.", "Сессия груминга бэклога."], uk: ["Зустріч для пошуку винних.", "Церемонія наприкінці кожного спринту, де команда аналізує, що пройшло добре, що ні, і домовляється про конкретні покращення на наступний спринт.", "Демо для стейкхолдерів.", "Сесія грумінгу бекллогу."] }, correctIndex: 1, explanation: { en: "The retro is about continuous improvement. Action items, not complaints.", de: "Die Retro dient der kontinuierlichen Verbesserung. Aktionspunkte, keine Beschwerden.", ru: "Ретро — это про непрерывное улучшение. Конкретные действия, а не жалобы.", uk: "Ретро — це про безперервне покращення. Конкретні дії, а не скарги." } },
{ category: "Scrum", question: { en: "What is the Definition of Done (DoD)?", de: "Was ist die Definition of Done (DoD)?", ru: "Что такое Definition of Done (DoD)?", uk: "Що таке Definition of Done (DoD)?" }, options: { en: ["When the PO says it's done.", "A shared checklist that every Product Backlog Item must satisfy before it's considered complete — e.g., code reviewed, tests passing, deployed to staging, documentation updated.", "When the developer finishes coding.", "When QA finds zero bugs."], de: ["Wenn der PO sagt, es ist fertig.", "Eine gemeinsame Checkliste, die jedes Product-Backlog-Element erfüllen muss — z.B. Code reviewed, Tests bestanden, auf Staging deployed, Dokumentation aktualisiert.", "Wenn der Entwickler fertig programmiert hat.", "Wenn QA null Bugs findet."], ru: ["Когда PO говорит, что готово.", "Общий чеклист, которому должен соответствовать каждый элемент Product Backlog — например, код проревьюен, тесты пройдены, задеплоено на staging, документация обновлена.", "Когда разработчик закончил писать код.", "Когда QA не находит багов."], uk: ["Коли PO каже, що готово.", "Спільний чекліст, якому має відповідати кожен елемент Product Backlog — наприклад, код прорев'юєно, тести пройдені, задеплоєно на staging, документацію оновлено.", "Коли розробник закінчив писати код.", "Коли QA не знаходить багів."] }, correctIndex: 1, explanation: { en: "DoD prevents 'it works on my machine' syndrome. Common items: unit tests, code reviewed, CI green, acceptance criteria met, deployed to staging.", de: "DoD verhindert das 'Es funktioniert auf meinem Rechner'-Syndrom. Typische Punkte: Unit-Tests, Code-Review, CI grün, Akzeptanzkriterien erfüllt, auf Staging deployed.", ru: "DoD предотвращает синдром «у меня на машине работает». Типичные пункты: юнит-тесты, код-ревью, CI зелёный, критерии приёмки выполнены, задеплоено на staging.", uk: "DoD запобігає синдрому «у мене на машині працює». Типові пункти: юніт-тести, код-рев'ю, CI зелений, критерії приймання виконані, задеплоєно на staging." } },
{ category: "Scrum", question: { en: "What is the Sprint Review (Demo)?", de: "Was ist das Sprint Review (Demo)?", ru: "Что такое Sprint Review (Demo)?", uk: "Що таке Sprint Review (Demo)?" }, options: { en: ["The same as the Retrospective.", "A meeting where the team demonstrates completed work to stakeholders, gathers feedback, and the PO updates the backlog based on what was learned.", "A technical design review.", "A meeting only for developers."], de: ["Dasselbe wie die Retrospektive.", "Ein Meeting, bei dem das Team fertige Arbeit den Stakeholdern vorführt, Feedback sammelt und der PO das Backlog basierend auf den Erkenntnissen aktualisiert.", "Ein technisches Design-Review.", "Ein Meeting nur für Entwickler."], ru: ["То же самое, что ретроспектива.", "Встреча, на которой команда демонстрирует выполненную работу стейкхолдерам, собирает обратную связь, а PO обновляет бэклог на основе полученных знаний.", "Техническое ревью дизайна.", "Встреча только для разработчиков."], uk: ["Те саме, що ретроспектива.", "Зустріч, на якій команда демонструє виконану роботу стейкхолдерам, збирає зворотний зв'язок, а PO оновлює бекллог на основі отриманих знань.", "Технічне рев'ю дизайну.", "Зустріч лише для розробників."] }, correctIndex: 1, explanation: { en: "Stakeholders see WORKING software, not slides. Feedback loops: 'Can you add filtering?' — PO adds it to the backlog.", de: "Stakeholder sehen FUNKTIONIERENDE Software, keine Folien. Feedback-Schleifen: 'Können Sie Filterung hinzufügen?' — PO fügt es dem Backlog hinzu.", ru: "Стейкхолдеры видят РАБОТАЮЩИЙ софт, а не слайды. Обратная связь: «Можно добавить фильтрацию?» — PO добавляет в бэклог.", uk: "Стейкхолдери бачать ПРАЦЮЮЧИЙ софт, а не слайди. Зворотний зв'язок: «Чи можна додати фільтрацію?» — PO додає до бекллогу." } },
{ category: "Scrum", question: { en: "What is a Sprint Goal and why is it important?", de: "Was ist ein Sprint-Ziel und warum ist es wichtig?", ru: "Что такое Sprint Goal и почему он важен?", uk: "Що таке Sprint Goal і чому він важливий?" }, options: { en: ["A numeric velocity target.", "A concise objective that gives the sprint a coherent purpose and helps the team decide trade-offs when they can't complete all planned items.", "The number of story points planned.", "A goal set by management for the team."], de: ["Ein numerisches Velocity-Ziel.", "Ein prägnantes Ziel, das dem Sprint einen kohärenten Zweck gibt und dem Team hilft, Trade-offs zu entscheiden, wenn nicht alle geplanten Punkte abgeschlossen werden können.", "Die Anzahl geplanter Story Points.", "Ein von der Geschäftsleitung gesetztes Ziel."], ru: ["Числовая цель по velocity.", "Краткая цель, которая придаёт спринту смысл и помогает команде принимать компромиссы, когда невозможно завершить все запланированные элементы.", "Количество запланированных story points.", "Цель, установленная руководством для команды."], uk: ["Числова ціль по velocity.", "Стисла ціль, яка надає спринту сенс і допомагає команді приймати компроміси, коли неможливо завершити всі заплановані елементи.", "Кількість запланованих story points.", "Ціль, встановлена керівництвом для команди."] }, correctIndex: 1, explanation: { en: "If the team runs out of time, they can drop lower-priority stories but still deliver the Sprint Goal. Focus over checklist.", de: "Wenn die Zeit knapp wird, kann das Team weniger wichtige Stories weglassen, aber dennoch das Sprint-Ziel liefern. Fokus statt Checkliste.", ru: "Если время заканчивается, команда может отбросить менее приоритетные истории, но всё равно достичь Sprint Goal. Фокус важнее чеклиста.", uk: "Якщо час закінчується, команда може відкинути менш пріоритетні історії, але все одно досягти Sprint Goal. Фокус важливіший за чекліст." } },
{ category: "Scrum", question: { en: "What is Backlog Refinement (Grooming)?", de: "Was ist Backlog Refinement (Grooming)?", ru: "Что такое Backlog Refinement (Grooming)?", uk: "Що таке Backlog Refinement (Grooming)?" }, options: { en: ["Cleaning up old Jira tickets.", "An ongoing activity where the team reviews upcoming backlog items, adds details, estimates, splits large stories, and ensures items are ready for future sprints.", "A ceremony that happens only once per release.", "Deleting completed stories."], de: ["Alte Jira-Tickets aufräumen.", "Eine laufende Aktivität, bei der das Team anstehende Backlog-Elemente überprüft, Details hinzufügt, schätzt, grosse Stories aufteilt und sicherstellt, dass Elemente für zukünftige Sprints bereit sind.", "Eine Zeremonie, die nur einmal pro Release stattfindet.", "Abgeschlossene Stories löschen."], ru: ["Чистка старых тикетов в Jira.", "Непрерывная активность, где команда просматривает предстоящие элементы бэклога, добавляет детали, оценивает, разбивает крупные истории и убеждается, что элементы готовы к будущим спринтам.", "Церемония, проходящая только раз за релиз.", "Удаление завершённых историй."], uk: ["Чистка старих тікетів у Jira.", "Безперервна активність, де команда переглядає майбутні елементи бекллогу, додає деталі, оцінює, розбиває великі історії та переконується, що елементи готові до майбутніх спринтів.", "Церемонія, що відбувається лише раз за реліз.", "Видалення завершених історій."] }, correctIndex: 1, explanation: { en: "Typically 1-2 hours per week. The team asks questions, the PO clarifies acceptance criteria, large stories get split. Goal: top of backlog is always sprint-ready.", de: "Typischerweise 1-2 Stunden pro Woche. Das Team stellt Fragen, der PO klärt Akzeptanzkriterien, grosse Stories werden aufgeteilt. Ziel: Das obere Backlog ist immer sprint-bereit.", ru: "Обычно 1-2 часа в неделю. Команда задаёт вопросы, PO уточняет критерии приёмки, крупные истории разбиваются. Цель: верх бэклога всегда готов к спринту.", uk: "Зазвичай 1-2 години на тиждень. Команда ставить запитання, PO уточнює критерії приймання, великі історії розбиваються. Ціль: верх бекллогу завжди готовий до спринту." } },
// ===== KANBAN =====
{ category: "Kanban", question: { en: "What is the core principle that differentiates Kanban from Scrum?", de: "Was ist das Kernprinzip, das Kanban von Scrum unterscheidet?", ru: "Какой ключевой принцип отличает Kanban от Scrum?", uk: "Який ключовий принцип відрізняє Kanban від Scrum?" }, options: { en: ["Kanban doesn't have a board.", "Kanban focuses on continuous flow with WIP (Work-In-Progress) limits instead of fixed-length sprints. Work is pulled when capacity is available.", "Kanban has no roles.", "Kanban doesn't allow estimation."], de: ["Kanban hat kein Board.", "Kanban konzentriert sich auf kontinuierlichen Fluss mit WIP-Limits (Work-In-Progress) statt fester Sprint-Längen. Arbeit wird gezogen, wenn Kapazität verfügbar ist.", "Kanban hat keine Rollen.", "Kanban erlaubt keine Schätzung."], ru: ["В Kanban нет доски.", "Kanban фокусируется на непрерывном потоке с WIP-лимитами (Work-In-Progress) вместо спринтов фиксированной длины. Работа вытягивается при наличии ёмкости.", "В Kanban нет ролей.", "Kanban не допускает оценку."], uk: ["У Kanban немає дошки.", "Kanban фокусується на безперервному потоці з WIP-лімітами (Work-In-Progress) замість спринтів фіксованої довжини. Робота витягується за наявності ємності.", "У Kanban немає ролей.", "Kanban не допускає оцінювання."] }, correctIndex: 1, explanation: { en: "Scrum: time-boxed sprints with committed scope. Kanban: continuous flow, no sprints. The key mechanism is WIP limits.", de: "Scrum: zeitlich begrenzte Sprints mit festgelegtem Scope. Kanban: kontinuierlicher Fluss, keine Sprints. Der Schlüsselmechanismus sind WIP-Limits.", ru: "Scrum: спринты с фиксированным скоупом. Kanban: непрерывный поток, без спринтов. Ключевой механизм — WIP-лимиты.", uk: "Scrum: спринти з фіксованим скоупом. Kanban: безперервний потік, без спринтів. Ключовий механізм — WIP-ліміти." } },
{ category: "Kanban", question: { en: "What are WIP (Work-In-Progress) limits and why do they matter?", de: "Was sind WIP-Limits (Work-In-Progress) und warum sind sie wichtig?", ru: "Что такое WIP-лимиты (Work-In-Progress) и почему они важны?", uk: "Що таке WIP-ліміти (Work-In-Progress) і чому вони важливі?" }, options: { en: ["Limits on working hours per week.", "Maximum number of items allowed in each workflow stage — they prevent overload, reduce context switching, expose bottlenecks, and improve flow efficiency.", "Limits on the number of team members.", "Maximum story point count per column."], de: ["Begrenzung der Arbeitsstunden pro Woche.", "Maximale Anzahl von Elementen in jeder Workflow-Phase — sie verhindern Überlastung, reduzieren Kontextwechsel, decken Engpässe auf und verbessern die Flusseffizienz.", "Begrenzung der Teamgrösse.", "Maximale Story-Point-Anzahl pro Spalte."], ru: ["Ограничение рабочих часов в неделю.", "Максимальное количество элементов на каждом этапе workflow — предотвращают перегрузку, уменьшают переключение контекста, выявляют узкие места и улучшают эффективность потока.", "Ограничение количества участников команды.", "Максимальное количество story points на колонку."], uk: ["Обмеження робочих годин на тиждень.", "Максимальна кількість елементів на кожному етапі workflow — запобігають перевантаженню, зменшують перемикання контексту, виявляють вузькі місця та покращують ефективність потоку.", "Обмеження кількості учасників команди.", "Максимальна кількість story points на колонку."] }, correctIndex: 1, explanation: { en: "If 'Code Review' has WIP limit 2 and both slots are full, nobody can push new items there. This signals: 'Stop starting, start finishing.'", de: "Wenn 'Code Review' ein WIP-Limit von 2 hat und beide Plätze belegt sind, kann niemand neue Elemente hinzufügen. Signal: 'Hör auf anzufangen, fang an fertigzumachen.'", ru: "Если «Code Review» имеет WIP-лимит 2 и оба слота заняты, никто не может добавить новые элементы. Сигнал: «Прекрати начинать, начни заканчивать».", uk: "Якщо «Code Review» має WIP-ліміт 2 і обидва слоти зайняті, ніхто не може додати нові елементи. Сигнал: «Припини починати, почни завершувати»." } },
{ category: "Kanban", question: { en: "What is Lead Time vs Cycle Time?", de: "Was ist Lead Time vs Cycle Time?", ru: "Чем отличается Lead Time от Cycle Time?", uk: "Чим відрізняється Lead Time від Cycle Time?" }, options: { en: ["They're the same metric.", "Lead Time: from request created to delivered (includes waiting). Cycle Time: from work started to delivered (active work only). Cycle Time is always <= Lead Time.", "Lead Time is for managers, Cycle Time for developers.", "Lead Time is per sprint, Cycle Time is per release."], de: ["Sie sind dieselbe Metrik.", "Lead Time: von Anfrage erstellt bis geliefert (inkl. Wartezeit). Cycle Time: von Arbeitsbeginn bis geliefert (nur aktive Arbeit). Cycle Time ist immer <= Lead Time.", "Lead Time ist für Manager, Cycle Time für Entwickler.", "Lead Time ist pro Sprint, Cycle Time pro Release."], ru: ["Это одна и та же метрика.", "Lead Time: от создания запроса до доставки (включая ожидание). Cycle Time: от начала работы до доставки (только активная работа). Cycle Time всегда <= Lead Time.", "Lead Time для менеджеров, Cycle Time для разработчиков.", "Lead Time на спринт, Cycle Time на релиз."], uk: ["Це одна і та сама метрика.", "Lead Time: від створення запиту до доставки (включаючи очікування). Cycle Time: від початку роботи до доставки (лише активна робота). Cycle Time завжди <= Lead Time.", "Lead Time для менеджерів, Cycle Time для розробників.", "Lead Time на спринт, Cycle Time на реліз."] }, correctIndex: 1, explanation: { en: "Customer creates ticket (Lead Time starts) → sits in backlog 5 days → dev picks it up (Cycle Time starts) → delivered in 3 days. Lead Time = 8 days, Cycle Time = 3 days.", de: "Kunde erstellt Ticket (Lead Time startet) → 5 Tage im Backlog → Entwickler beginnt (Cycle Time startet) → in 3 Tagen geliefert. Lead Time = 8 Tage, Cycle Time = 3 Tage.", ru: "Заказчик создаёт тикет (Lead Time стартует) → лежит в бэклоге 5 дней → разработчик берёт (Cycle Time стартует) → доставлен за 3 дня. Lead Time = 8 дней, Cycle Time = 3 дня.", uk: "Замовник створює тікет (Lead Time стартує) → лежить у бекллозі 5 днів → розробник бере (Cycle Time стартує) → доставлений за 3 дні. Lead Time = 8 днів, Cycle Time = 3 дні." } },
{ category: "Kanban", question: { en: "What does a Cumulative Flow Diagram (CFD) show?", de: "Was zeigt ein Cumulative Flow Diagram (CFD)?", ru: "Что показывает Cumulative Flow Diagram (CFD)?", uk: "Що показує Cumulative Flow Diagram (CFD)?" }, options: { en: ["Individual developer performance.", "The number of items in each workflow stage over time — widening bands indicate bottlenecks, flat lines indicate blocked flow.", "Sprint burndown progress.", "Code complexity trends."], de: ["Individuelle Entwicklerleistung.", "Die Anzahl der Elemente in jeder Workflow-Phase im Zeitverlauf — breiter werdende Bänder zeigen Engpässe, flache Linien zeigen blockierten Fluss.", "Sprint-Burndown-Fortschritt.", "Code-Komplexitäts-Trends."], ru: ["Производительность отдельного разработчика.", "Количество элементов на каждом этапе workflow во времени — расширяющиеся полосы указывают на узкие места, плоские линии — на заблокированный поток.", "Прогресс Sprint Burndown.", "Тренды сложности кода."], uk: ["Продуктивність окремого розробника.", "Кількість елементів на кожному етапі workflow у часі — смуги, що розширюються, вказують на вузькі місця, плоскі лінії — на заблокований потік.", "Прогрес Sprint Burndown.", "Тренди складності коду."] }, correctIndex: 1, explanation: { en: "If the 'Testing' band keeps widening, work is piling up there — you need more QA capacity or automated tests.", de: "Wenn das 'Testing'-Band immer breiter wird, staut sich dort Arbeit — mehr QA-Kapazität oder automatisierte Tests werden benötigt.", ru: "Если полоса «Testing» постоянно расширяется, работа накапливается — нужно больше QA-ёмкости или автотестов.", uk: "Якщо смуга «Testing» постійно розширюється, робота накопичується — потрібно більше QA-ємності або автотестів." } },
{ category: "Kanban", question: { en: "When should a team use Kanban instead of Scrum?", de: "Wann sollte ein Team Kanban statt Scrum verwenden?", ru: "Когда команде следует использовать Kanban вместо Scrum?", uk: "Коли команді варто використовувати Kanban замість Scrum?" }, options: { en: ["Always — Kanban is strictly better.", "When work is unpredictable (support, ops, maintenance), priorities change frequently, and fixed sprints don't make sense.", "Only for non-software teams.", "When the team has fewer than 3 people."], de: ["Immer — Kanban ist strikt besser.", "Wenn die Arbeit unvorhersehbar ist (Support, Ops, Wartung), Prioritäten sich häufig ändern und feste Sprints keinen Sinn ergeben.", "Nur für Nicht-Software-Teams.", "Wenn das Team weniger als 3 Personen hat."], ru: ["Всегда — Kanban строго лучше.", "Когда работа непредсказуема (поддержка, ops, обслуживание), приоритеты часто меняются и фиксированные спринты не имеют смысла.", "Только для не-софтверных команд.", "Когда в команде менее 3 человек."], uk: ["Завжди — Kanban строго кращий.", "Коли робота непередбачувана (підтримка, ops, обслуговування), пріоритети часто змінюються і фіксовані спринти не мають сенсу.", "Лише для не-софтверних команд.", "Коли в команді менше 3 осіб."] }, correctIndex: 1, explanation: { en: "Support team: tickets arrive randomly, priorities shift daily. Fixed 2-week sprints would be constantly disrupted. Kanban's continuous flow handles this naturally.", de: "Support-Team: Tickets kommen zufällig, Prioritäten ändern sich täglich. Feste 2-Wochen-Sprints wären ständig gestört. Kanbans kontinuierlicher Fluss bewältigt das natürlich.", ru: "Команда поддержки: тикеты приходят случайно, приоритеты меняются ежедневно. Фиксированные 2-недельные спринты постоянно нарушались бы. Непрерывный поток Kanban справляется с этим естественно.", uk: "Команда підтримки: тікети приходять випадково, пріоритети змінюються щодня. Фіксовані 2-тижневі спринти постійно порушувалися б. Безперервний потік Kanban справляється з цим природно." } },
// ===== AGILE METRICS =====
{ category: "Metrics", question: { en: "What is Velocity in Scrum?", de: "Was ist Velocity in Scrum?", ru: "Что такое Velocity в Scrum?", uk: "Що таке Velocity в Scrum?" }, options: { en: ["How fast developers type code.", "The average number of story points a team completes per sprint — used for sprint planning and forecasting, NOT for comparing teams or measuring performance.", "Lines of code per day.", "Number of deployments per week."], de: ["Wie schnell Entwickler Code tippen.", "Die durchschnittliche Anzahl von Story Points, die ein Team pro Sprint abschliesst — zur Sprintplanung und Vorhersage, NICHT zum Vergleich von Teams oder Leistungsmessung.", "Codezeilen pro Tag.", "Anzahl der Deployments pro Woche."], ru: ["Как быстро разработчики печатают код.", "Среднее количество story points, которое команда завершает за спринт — для планирования спринтов и прогнозирования, НЕ для сравнения команд или измерения производительности.", "Строк кода в день.", "Количество деплоев в неделю."], uk: ["Як швидко розробники друкують код.", "Середня кількість story points, яку команда завершує за спринт — для планування спринтів та прогнозування, НЕ для порівняння команд чи вимірювання продуктивності.", "Рядків коду на день.", "Кількість деплоїв на тиждень."] }, correctIndex: 1, explanation: { en: "Velocity is a PLANNING tool, not a performance metric. Comparing velocities across teams is meaningless — points are relative.", de: "Velocity ist ein PLANUNGSTOOL, keine Leistungsmetrik. Velocity-Vergleiche zwischen Teams sind bedeutungslos — Punkte sind relativ.", ru: "Velocity — инструмент ПЛАНИРОВАНИЯ, а не метрика производительности. Сравнение velocity между командами бессмысленно — очки относительны.", uk: "Velocity — інструмент ПЛАНУВАННЯ, а не метрика продуктивності. Порівняння velocity між командами безглузде — очки відносні." } },
{ category: "Metrics", question: { en: "Why is using Velocity as a performance metric dangerous?", de: "Warum ist die Nutzung von Velocity als Leistungsmetrik gefährlich?", ru: "Почему использование Velocity как метрики производительности опасно?", uk: "Чому використання Velocity як метрики продуктивності небезпечне?" }, options: { en: ["Velocity is too inaccurate.", "Teams inflate story point estimates to appear productive, destroying the metric's usefulness for planning. It incentivizes gaming instead of delivering value.", "Velocity doesn't account for code quality.", "It only measures individual performance."], de: ["Velocity ist zu ungenau.", "Teams blähen Story-Point-Schätzungen auf, um produktiv zu wirken, und zerstören so den Nutzen der Metrik für die Planung. Es fördert Gaming statt Wertlieferung.", "Velocity berücksichtigt keine Codequalität.", "Es misst nur individuelle Leistung."], ru: ["Velocity слишком неточна.", "Команды завышают оценки в story points, чтобы выглядеть продуктивными, разрушая полезность метрики для планирования. Это стимулирует манипуляции вместо создания ценности.", "Velocity не учитывает качество кода.", "Она измеряет только индивидуальную производительность."], uk: ["Velocity надто неточна.", "Команди завищують оцінки в story points, щоб виглядати продуктивними, руйнуючи корисність метрики для планування. Це стимулює маніпуляції замість створення цінності.", "Velocity не враховує якість коду.", "Вона вимірює лише індивідуальну продуктивність."] }, correctIndex: 1, explanation: { en: "Goodhart's Law: when a measure becomes a target, it ceases to be a good measure.", de: "Goodharts Gesetz: Wenn ein Mass zum Ziel wird, hört es auf, ein gutes Mass zu sein.", ru: "Закон Гудхарта: когда мера становится целью, она перестаёт быть хорошей мерой.", uk: "Закон Гудхарта: коли міра стає ціллю, вона перестає бути хорошою мірою." } },
{ category: "Metrics", question: { en: "What is a Burndown Chart?", de: "Was ist ein Burndown Chart?", ru: "Что такое Burndown Chart?", uk: "Що таке Burndown Chart?" }, options: { en: ["A chart showing team burnout levels.", "A graph showing remaining work (story points or tasks) vs. time in a sprint. The ideal line goes from total points to zero. Deviations show if the team is on track.", "A chart of completed features over time.", "A financial cost tracking chart."], de: ["Ein Diagramm, das Team-Burnout-Level zeigt.", "Ein Graph, der verbleibende Arbeit (Story Points oder Aufgaben) vs. Zeit im Sprint zeigt. Die ideale Linie geht von der Gesamtpunktzahl auf null. Abweichungen zeigen, ob das Team auf Kurs ist.", "Ein Diagramm abgeschlossener Features über die Zeit.", "Ein Diagramm zur Kostenverfolgung."], ru: ["Диаграмма, показывающая уровень выгорания команды.", "График, показывающий оставшуюся работу (story points или задачи) относительно времени в спринте. Идеальная линия идёт от общего числа очков к нулю. Отклонения показывают, идёт ли команда по плану.", "Диаграмма завершённых фич за время.", "Диаграмма отслеживания финансовых затрат."], uk: ["Діаграма, що показує рівень вигоряння команди.", "Графік, що показує роботу, яка залишилася (story points або задачі), відносно часу в спринті. Ідеальна лінія йде від загальної кількості очків до нуля. Відхилення показують, чи команда за планом.", "Діаграма завершених фіч за час.", "Діаграма відстеження фінансових витрат."] }, correctIndex: 1, explanation: { en: "If the actual line is above the ideal line: behind schedule. Below: ahead. Flat sections: blocked work.", de: "Wenn die tatsächliche Linie über der idealen liegt: hinter dem Zeitplan. Darunter: voraus. Flache Abschnitte: blockierte Arbeit.", ru: "Если фактическая линия выше идеальной: отставание от графика. Ниже: опережение. Плоские участки: заблокированная работа.", uk: "Якщо фактична лінія вище ідеальної: відставання від графіку. Нижче: випередження. Плоскі ділянки: заблокована робота." } },
{ category: "Metrics", question: { en: "What are DORA metrics?", de: "Was sind DORA-Metriken?", ru: "Что такое метрики DORA?", uk: "Що таке метрики DORA?" }, options: { en: ["Metrics for the Dora the Explorer app.", "Four key DevOps metrics: Deployment Frequency, Lead Time for Changes, Change Failure Rate, and Mean Time to Recovery (MTTR) — measuring software delivery performance.", "Database Operation Rate Analysis.", "Developer Output and Resource Allocation."], de: ["Metriken für die Dora-the-Explorer-App.", "Vier zentrale DevOps-Metriken: Deployment-Häufigkeit, Lead Time für Änderungen, Change Failure Rate und Mean Time to Recovery (MTTR) — messen die Software-Delivery-Performance.", "Database Operation Rate Analysis.", "Developer Output and Resource Allocation."], ru: ["Метрики для приложения «Даша-путешественница».", "Четыре ключевые метрики DevOps: частота деплоев, Lead Time для изменений, Change Failure Rate и Mean Time to Recovery (MTTR) — измеряют производительность доставки ПО.", "Database Operation Rate Analysis.", "Developer Output and Resource Allocation."], uk: ["Метрики для додатку «Даша-мандрівниця».", "Чотири ключові метрики DevOps: частота деплоїв, Lead Time для змін, Change Failure Rate та Mean Time to Recovery (MTTR) — вимірюють продуктивність доставки ПЗ.", "Database Operation Rate Analysis.", "Developer Output and Resource Allocation."] }, correctIndex: 1, explanation: { en: "Elite teams: deploy multiple times/day, lead time < 1 hour, change failure rate < 15%, MTTR < 1 hour.", de: "Elite-Teams: mehrere Deployments/Tag, Lead Time < 1 Stunde, Change Failure Rate < 15%, MTTR < 1 Stunde.", ru: "Элитные команды: деплоят несколько раз в день, lead time < 1 час, change failure rate < 15%, MTTR < 1 час.", uk: "Елітні команди: деплоять кілька разів на день, lead time < 1 година, change failure rate < 15%, MTTR < 1 година." } },
{ category: "Metrics", question: { en: "What does Mean Time to Recovery (MTTR) measure?", de: "Was misst die Mean Time to Recovery (MTTR)?", ru: "Что измеряет Mean Time to Recovery (MTTR)?", uk: "Що вимірює Mean Time to Recovery (MTTR)?" }, options: { en: ["Average time to respond to emails.", "The average time from a production incident being detected to the service being fully restored — a key indicator of operational resilience.", "Time to recover deleted files.", "Average time between deployments."], de: ["Durchschnittliche Antwortzeit für E-Mails.", "Die durchschnittliche Zeit von der Erkennung eines Produktionsvorfalls bis zur vollständigen Wiederherstellung des Dienstes — ein wichtiger Indikator für operationelle Resilienz.", "Zeit zur Wiederherstellung gelöschter Dateien.", "Durchschnittliche Zeit zwischen Deployments."], ru: ["Среднее время ответа на email.", "Среднее время от обнаружения инцидента в продакшене до полного восстановления сервиса — ключевой показатель операционной устойчивости.", "Время восстановления удалённых файлов.", "Среднее время между деплоями."], uk: ["Середній час відповіді на email.", "Середній час від виявлення інциденту в продакшені до повного відновлення сервісу — ключовий показник операційної стійкості.", "Час відновлення видалених файлів.", "Середній час між деплоями."] }, correctIndex: 1, explanation: { en: "Low MTTR means the team can detect, diagnose, and fix production issues quickly. Improved by: good monitoring, runbooks, feature flags.", de: "Niedriger MTTR bedeutet, dass das Team Produktionsprobleme schnell erkennen, diagnostizieren und beheben kann. Verbessert durch: gutes Monitoring, Runbooks, Feature Flags.", ru: "Низкий MTTR означает, что команда быстро обнаруживает, диагностирует и исправляет проблемы в продакшене. Улучшается через: хороший мониторинг, runbooks, feature flags.", uk: "Низький MTTR означає, що команда швидко виявляє, діагностує та виправляє проблеми в продакшені. Покращується через: хороший моніторинг, runbooks, feature flags." } },
{ category: "Metrics", question: { en: "What is Throughput as a Kanban metric?", de: "Was ist Throughput als Kanban-Metrik?", ru: "Что такое Throughput как метрика Kanban?", uk: "Що таке Throughput як метрика Kanban?" }, options: { en: ["Network bandwidth.", "The number of work items completed per unit of time (e.g., 12 tickets per week) — a direct measure of team delivery capacity.", "CPU processing speed.", "The number of standups per week."], de: ["Netzwerkbandbreite.", "Die Anzahl abgeschlossener Arbeitselemente pro Zeiteinheit (z.B. 12 Tickets pro Woche) — ein direktes Mass für die Lieferkapazität des Teams.", "CPU-Verarbeitungsgeschwindigkeit.", "Anzahl der Standups pro Woche."], ru: ["Пропускная способность сети.", "Количество завершённых рабочих элементов за единицу времени (напр., 12 тикетов в неделю) — прямая мера производительности команды.", "Скорость обработки CPU.", "Количество стендапов в неделю."], uk: ["Пропускна здатність мережі.", "Кількість завершених робочих елементів за одиницю часу (напр., 12 тікетів на тиждень) — пряма міра продуктивності команди.", "Швидкість обробки CPU.", "Кількість стендапів на тиждень."] }, correctIndex: 1, explanation: { en: "Unlike velocity (which depends on estimates), throughput counts actual completed items. Simple, objective forecasting.", de: "Im Gegensatz zu Velocity (die von Schätzungen abhängt) zählt Throughput tatsächlich abgeschlossene Elemente. Einfache, objektive Vorhersage.", ru: "В отличие от velocity (которая зависит от оценок), throughput считает фактически завершённые элементы. Простое, объективное прогнозирование.", uk: "На відміну від velocity (яка залежить від оцінок), throughput рахує фактично завершені елементи. Просте, об'єктивне прогнозування." } },
// ===== ESTIMATION =====
{ category: "Estimation", question: { en: "What is Planning Poker and why is it effective?", de: "Was ist Planning Poker und warum ist es effektiv?", ru: "Что такое Planning Poker и почему он эффективен?", uk: "Що таке Planning Poker і чому він ефективний?" }, options: { en: ["A gambling game for developers.", "A consensus-based estimation technique where team members independently reveal estimates simultaneously, discuss differences, and converge — preventing anchoring bias.", "A sprint planning board game.", "A risk assessment tool."], de: ["Ein Glücksspiel für Entwickler.", "Eine konsensbasierte Schätztechnik, bei der Teammitglieder unabhängig und gleichzeitig Schätzungen aufdecken, Unterschiede diskutieren und konvergieren — verhindert Ankerbias.", "Ein Sprint-Planungs-Brettspiel.", "Ein Risikobewertungstool."], ru: ["Азартная игра для разработчиков.", "Техника оценки на основе консенсуса: участники независимо и одновременно раскрывают оценки, обсуждают расхождения и сходятся — предотвращает эффект якоря.", "Настольная игра для планирования спринта.", "Инструмент оценки рисков."], uk: ["Азартна гра для розробників.", "Техніка оцінювання на основі консенсусу: учасники незалежно та одночасно розкривають оцінки, обговорюють розбіжності та сходяться — запобігає ефекту якоря.", "Настільна гра для планування спринту.", "Інструмент оцінки ризиків."] }, correctIndex: 1, explanation: { en: "Simultaneous reveal prevents the loudest voice from anchoring everyone's estimate. Discussion reveals hidden risks.", de: "Gleichzeitiges Aufdecken verhindert, dass die lauteste Stimme alle Schätzungen verankert. Diskussion deckt versteckte Risiken auf.", ru: "Одновременное раскрытие не позволяет самому громкому голосу якорить оценки остальных. Обсуждение выявляет скрытые риски.", uk: "Одночасне розкриття не дозволяє найгучнішому голосу якорити оцінки інших. Обговорення виявляє приховані ризики." } },
{ category: "Estimation", question: { en: "Why use the Fibonacci sequence (1, 2, 3, 5, 8, 13, 21) for story points?", de: "Warum die Fibonacci-Folge (1, 2, 3, 5, 8, 13, 21) für Story Points verwenden?", ru: "Почему для story points используют последовательность Фибоначчи (1, 2, 3, 5, 8, 13, 21)?", uk: "Чому для story points використовують послідовність Фібоначчі (1, 2, 3, 5, 8, 13, 21)?" }, options: { en: ["Because Fibonacci numbers are mathematically superior.", "The increasing gaps reflect the growing uncertainty in larger tasks — the difference between 5 and 8 is intentionally vague because precision at that scale is impossible.", "It's required by the Scrum Guide.", "It makes the math easier for velocity."], de: ["Weil Fibonacci-Zahlen mathematisch überlegen sind.", "Die wachsenden Abstände spiegeln die zunehmende Unsicherheit bei grösseren Aufgaben wider — der Unterschied zwischen 5 und 8 ist absichtlich vage, da Präzision in dieser Grössenordnung unmöglich ist.", "Es wird vom Scrum Guide verlangt.", "Es vereinfacht die Velocity-Berechnung."], ru: ["Потому что числа Фибоначчи математически превосходны.", "Растущие промежутки отражают возрастающую неопределённость в больших задачах — разница между 5 и 8 намеренно размыта, потому что точность в таком масштабе невозможна.", "Это требование Scrum Guide.", "Это упрощает расчёт velocity."], uk: ["Тому що числа Фібоначчі математично кращі.", "Зростаючі проміжки відображають зростаючу невизначеність у великих задачах — різниця між 5 і 8 навмисно розмита, бо точність у такому масштабі неможлива.", "Це вимога Scrum Guide.", "Це спрощує розрахунок velocity."] }, correctIndex: 1, explanation: { en: "Can you really distinguish a '6-point' story from a '7-point'? No. Fibonacci forces you to choose: is it closer to 5 or 8? If bigger than 13, split it.", de: "Kann man wirklich eine '6-Punkte'-Story von einer '7-Punkte'-Story unterscheiden? Nein. Fibonacci zwingt zur Entscheidung: näher an 5 oder 8? Grösser als 13? Aufteilen.", ru: "Можете ли вы отличить историю на «6 очков» от «7 очков»? Нет. Фибоначчи заставляет выбирать: ближе к 5 или к 8? Больше 13 — разбейте.", uk: "Чи можете ви відрізнити історію на «6 очків» від «7 очків»? Ні. Фібоначчі змушує обирати: ближче до 5 чи до 8? Більше 13 — розбийте." } },
{ category: "Estimation", question: { en: "What does '#NoEstimates' advocate?", de: "Was befürwortet '#NoEstimates'?", ru: "Что продвигает движение '#NoEstimates'?", uk: "Що просуває рух '#NoEstimates'?" }, options: { en: ["Never planning anything.", "Instead of spending time estimating, use historical throughput data to forecast delivery — count items completed per week and project future timelines probabilistically.", "Only estimating in hours.", "Letting the PO estimate everything."], de: ["Niemals etwas planen.", "Anstatt Zeit mit Schätzungen zu verbringen, historische Throughput-Daten zur Liefervorhersage nutzen — abgeschlossene Items pro Woche zählen und zukünftige Zeitpläne probabilistisch projizieren.", "Nur in Stunden schätzen.", "Den PO alles schätzen lassen."], ru: ["Никогда ничего не планировать.", "Вместо траты времени на оценку использовать исторические данные throughput для прогнозирования — считать завершённые элементы в неделю и проецировать будущие сроки вероятностно.", "Оценивать только в часах.", "Позволить PO оценивать всё."], uk: ["Ніколи нічого не планувати.", "Замість витрачання часу на оцінку використовувати історичні дані throughput для прогнозування — рахувати завершені елементи на тиждень і проєктувати майбутні терміни ймовірнісно.", "Оцінювати лише в годинах.", "Дозволити PO оцінювати все."] }, correctIndex: 1, explanation: { en: "If the team consistently delivers 8 stories/sprint regardless of point size, you don't need points. Use Monte Carlo simulation for forecasting.", de: "Wenn das Team konstant 8 Stories/Sprint liefert unabhängig von der Punktgrösse, braucht man keine Punkte. Monte-Carlo-Simulation zur Vorhersage nutzen.", ru: "Если команда стабильно завершает 8 историй за спринт независимо от размера в очках, очки не нужны. Используйте Monte Carlo для прогнозирования.", uk: "Якщо команда стабільно завершує 8 історій за спринт незалежно від розміру в очках, очки не потрібні. Використовуйте Monte Carlo для прогнозування." } },
{ category: "Estimation", question: { en: "What is T-shirt sizing (S, M, L, XL) used for?", de: "Wofür wird T-Shirt-Sizing (S, M, L, XL) verwendet?", ru: "Для чего используется оценка по размеру футболок (S, M, L, XL)?", uk: "Для чого використовується оцінка за розміром футболок (S, M, L, XL)?" }, options: { en: ["Ordering team shirts.", "Quick, rough relative estimation for roadmap planning — less precise than story points but faster for triaging large backlogs.", "Categorizing bug severity.", "Measuring code file sizes."], de: ["Team-Shirts bestellen.", "Schnelle, grobe relative Schätzung für Roadmap-Planung — weniger präzise als Story Points, aber schneller für die Triage grosser Backlogs.", "Kategorisierung der Bug-Schwere.", "Messung von Code-Dateigrössen."], ru: ["Заказ командных футболок.", "Быстрая, грубая относительная оценка для планирования дорожной карты — менее точная, чем story points, но быстрее для триажа больших бэклогов.", "Категоризация серьёзности багов.", "Измерение размеров файлов кода."], uk: ["Замовлення командних футболок.", "Швидка, груба відносна оцінка для планування дорожньої карти — менш точна, ніж story points, але швидша для тріажу великих бекллогів.", "Категоризація серйозності багів.", "Вимірювання розмірів файлів коду."] }, correctIndex: 1, explanation: { en: "In a roadmap session with 50 items: 'Is this S, M, L, or XL?' takes seconds per item. Save detailed estimation for items entering the sprint.", de: "In einer Roadmap-Sitzung mit 50 Elementen: 'Ist das S, M, L oder XL?' dauert Sekunden pro Element. Detaillierte Schätzung für Sprint-Elemente aufheben.", ru: "На сессии с дорожной картой из 50 элементов: «Это S, M, L или XL?» занимает секунды на элемент. Детальную оценку оставьте для элементов, входящих в спринт.", uk: "На сесії з дорожньою картою з 50 елементів: «Це S, M, L чи XL?» займає секунди на елемент. Детальну оцінку залиште для елементів, що входять у спринт." } },
// ===== CONFLICT RESOLUTION =====
{ category: "Conflict Resolution", question: { en: "A teammate consistently pushes code without tests, causing regressions. What's the best approach?", de: "Ein Teammitglied pusht konsequent Code ohne Tests, was zu Regressionen führt. Was ist der beste Ansatz?", ru: "Коллега постоянно пушит код без тестов, что вызывает регрессии. Какой подход лучше?", uk: "Колега постійно пушить код без тестів, що спричиняє регресії. Який підхід кращий?" }, options: { en: ["Complain about them to the manager.", "Have a private, respectful 1:1 conversation focused on the impact. Suggest pairing on a TDD session.", "Publicly call them out in standup.", "Silently write tests for their code."], de: ["Sich beim Manager beschweren.", "Ein privates, respektvolles 1:1-Gespräch führen, das sich auf die Auswirkungen konzentriert. Eine gemeinsame TDD-Session vorschlagen.", "Sie öffentlich im Standup blossstellen.", "Still Tests für ihren Code schreiben."], ru: ["Пожаловаться менеджеру.", "Провести приватную, уважительную беседу 1:1, сосредоточенную на последствиях. Предложить совместную TDD-сессию.", "Публично указать на это на стендапе.", "Молча писать тесты за них."], uk: ["Поскаржитися менеджеру.", "Провести приватну, поважну бесіду 1:1, зосереджену на наслідках. Запропонувати спільну TDD-сесію.", "Публічно вказати на це на стендапі.", "Мовчки писати тести за них."] }, correctIndex: 1, explanation: { en: "Focus on behavior and impact, not the person. Private first — public shaming destroys trust. Offer to help, not judge.", de: "Fokus auf Verhalten und Auswirkung, nicht auf die Person. Zuerst privat — öffentliches Beschämen zerstört Vertrauen. Hilfe anbieten, nicht urteilen.", ru: "Фокус на поведении и последствиях, не на человеке. Сначала приватно — публичный позор разрушает доверие. Предложить помощь, а не осуждать.", uk: "Фокус на поведінці та наслідках, не на людині. Спершу приватно — публічний сором руйнує довіру. Запропонувати допомогу, а не засуджувати." } },
{ category: "Conflict Resolution", question: { en: "Two senior developers disagree on architectural approach. How should the team resolve it?", de: "Zwei Senior-Entwickler sind sich über den Architekturansatz uneinig. Wie sollte das Team es lösen?", ru: "Два старших разработчика не согласны по архитектурному подходу. Как команде решить это?", uk: "Два старші розробники не погоджуються щодо архітектурного підходу. Як команді вирішити це?" }, options: { en: ["The most senior person decides.", "Facilitate a structured technical discussion: each presents pros/cons with data. Use ADRs to document the decision and rationale. Time-box the debate.", "Let them argue until one gives up.", "Ask management to decide."], de: ["Die erfahrenste Person entscheidet.", "Eine strukturierte technische Diskussion moderieren: jeder präsentiert Vor-/Nachteile mit Daten. ADRs zur Dokumentation der Entscheidung nutzen. Debatte zeitlich begrenzen.", "Sie streiten lassen, bis einer aufgibt.", "Das Management entscheiden lassen."], ru: ["Решает самый старший.", "Организовать структурированную техническую дискуссию: каждый представляет плюсы/минусы с данными. Использовать ADR для документирования решения. Ограничить дебаты по времени.", "Пусть спорят, пока один не сдастся.", "Попросить руководство решить."], uk: ["Вирішує найстарший.", "Організувати структуровану технічну дискусію: кожен представляє плюси/мінуси з даними. Використовувати ADR для документування рішення. Обмежити дебати в часі.", "Нехай сперечаються, поки один не здасться.", "Попросити керівництво вирішити."] }, correctIndex: 1, explanation: { en: "Data over opinions. ADRs capture WHY a decision was made, preventing the same debate in 6 months.", de: "Daten über Meinungen. ADRs erfassen WARUM eine Entscheidung getroffen wurde und verhindern dieselbe Debatte in 6 Monaten.", ru: "Данные важнее мнений. ADR фиксируют ПОЧЕМУ было принято решение, предотвращая ту же дискуссию через 6 месяцев.", uk: "Дані важливіші за думки. ADR фіксують ЧОМУ було прийнято рішення, запобігаючи тій самій дискусії через 6 місяців." } },
{ category: "Conflict Resolution", question: { en: "A code review turns heated — the reviewer leaves harsh comments. What should you do?", de: "Ein Code-Review wird hitzig — der Reviewer hinterlässt harte Kommentare. Was solltest du tun?", ru: "Код-ревью становится напряжённым — ревьюер оставляет резкие комментарии. Что делать?", uk: "Код-рев'ю стає напруженим — рев'юер залишає різкі коментарі. Що робити?" }, options: { en: ["Respond with equally harsh criticism.", "Address it calmly: 'I'd appreciate more specific and constructive feedback.' Escalate to the team lead if the pattern continues.", "Delete their comments and merge.", "Stop doing code reviews."], de: ["Mit ebenso harter Kritik antworten.", "Ruhig ansprechen: 'Ich würde spezifischeres und konstruktiveres Feedback schätzen.' Bei Wiederholung an den Team Lead eskalieren.", "Kommentare löschen und mergen.", "Code Reviews einstellen."], ru: ["Ответить такой же резкой критикой.", "Спокойно обратиться: «Буду признателен за более конкретную и конструктивную обратную связь». Если паттерн продолжается — эскалировать к тимлиду.", "Удалить комментарии и смёрджить.", "Перестать делать код-ревью."], uk: ["Відповісти такою ж різкою критикою.", "Спокійно звернутися: «Буду вдячний за більш конкретний і конструктивний зворотний зв'язок». Якщо патерн продовжується — ескалювати до тімліда.", "Видалити коментарі та змерджити.", "Припинити код-рев'ю."] }, correctIndex: 1, explanation: { en: "Code reviews should critique CODE, not PEOPLE. Establish team review guidelines.", de: "Code Reviews sollten CODE kritisieren, nicht MENSCHEN. Team-Review-Richtlinien etablieren.", ru: "Код-ревью должно критиковать КОД, а не ЛЮДЕЙ. Установите командные правила ревью.", uk: "Код-рев'ю має критикувати КОД, а не ЛЮДЕЙ. Встановіть командні правила рев'ю." } },
{ category: "Conflict Resolution", question: { en: "The PO keeps adding scope mid-sprint. How should the team handle this?", de: "Der PO fügt ständig Scope mitten im Sprint hinzu. Wie sollte das Team damit umgehen?", ru: "PO постоянно добавляет скоуп посреди спринта. Как команде с этим справиться?", uk: "PO постійно додає скоуп посеред спринту. Як команді з цим впоратися?" }, options: { en: ["Accept all changes to keep the PO happy.", "In the Retrospective, raise the issue with data: show how mid-sprint changes caused missed Sprint Goals. Agree on a scope change policy.", "Refuse all changes during the sprint.", "The Scrum Master should yell at the PO."], de: ["Alle Änderungen akzeptieren, um den PO zufrieden zu stellen.", "In der Retrospektive das Problem mit Daten ansprechen: zeigen, wie Änderungen im Sprint zu verfehlten Sprint-Zielen führten. Eine Scope-Change-Policy vereinbaren.", "Alle Änderungen während des Sprints ablehnen.", "Der Scrum Master sollte den PO anschreien."], ru: ["Принимать все изменения, чтобы PO был доволен.", "На ретроспективе поднять проблему с данными: показать, как изменения в спринте привели к невыполнению Sprint Goal. Договориться о политике изменения скоупа.", "Отказываться от всех изменений во время спринта.", "Scrum Master должен накричать на PO."], uk: ["Приймати всі зміни, щоб PO був задоволений.", "На ретроспективі підняти проблему з даними: показати, як зміни в спринті призвели до невиконання Sprint Goal. Домовитися про політику зміни скоупу.", "Відмовлятися від усіх змін під час спринту.", "Scrum Master має накричати на PO."] }, correctIndex: 1, explanation: { en: "Use data, not emotions. If something is truly urgent: 'Which existing item should we drop to make room?'", de: "Daten nutzen, nicht Emotionen. Wenn etwas wirklich dringend ist: 'Welches bestehende Element sollen wir streichen?'", ru: "Используйте данные, а не эмоции. Если что-то действительно срочно: «Какой существующий элемент убрать, чтобы освободить место?»", uk: "Використовуйте дані, а не емоції. Якщо щось дійсно терміново: «Який існуючий елемент прибрати, щоб звільнити місце?»" } },
{ category: "Conflict Resolution", question: { en: "You disagree with a technical decision your team lead made. What do you do?", de: "Du bist mit einer technischen Entscheidung deines Team Leads nicht einverstanden. Was tust du?", ru: "Вы не согласны с техническим решением вашего тимлида. Что делать?", uk: "Ви не погоджуєтесь з технічним рішенням вашого тімліда. Що робити?" }, options: { en: ["Silently comply and resent it.", "Disagree and commit: voice your concerns clearly with reasoning, but if the lead decides otherwise, support the decision and give it your best effort.", "Refuse to implement it.", "Go over their head to the manager."], de: ["Still gehorchen und groll hegen.", "Disagree and Commit: Bedenken klar mit Begründung äussern, aber wenn der Lead anders entscheidet, die Entscheidung unterstützen und das Beste geben.", "Die Umsetzung verweigern.", "Über ihren Kopf hinweg zum Manager gehen."], ru: ["Молча подчиниться и затаить обиду.", "Disagree and Commit: чётко озвучить опасения с аргументами, но если лид решит иначе — поддержать решение и отдать максимум.", "Отказаться реализовывать.", "Обратиться через голову к менеджеру."], uk: ["Мовчки підкоритися і затаїти образу.", "Disagree and Commit: чітко озвучити занепокоєння з аргументами, але якщо лід вирішить інакше — підтримати рішення і віддати максимум.", "Відмовитися реалізовувати.", "Звернутися через голову до менеджера."] }, correctIndex: 1, explanation: { en: "Amazon's 'Disagree and Commit' principle. Express your view, but don't sabotage or say 'I told you so' later.", de: "Amazons 'Disagree and Commit'-Prinzip. Meinung äussern, aber nicht sabotieren oder später 'Ich hab's ja gesagt' sagen.", ru: "Принцип Amazon «Disagree and Commit». Выскажите мнение, но не саботируйте и не говорите «я же говорил» потом.", uk: "Принцип Amazon «Disagree and Commit». Висловіть думку, але не саботуйте і не кажіть «я ж казав» потім." } },
{ category: "Conflict Resolution", question: { en: "A junior developer is struggling and slowing the team down. What's the best response?", de: "Ein Junior-Entwickler hat Schwierigkeiten und bremst das Team. Was ist die beste Reaktion?", ru: "Джуниор-разработчик испытывает трудности и замедляет команду. Какая лучшая реакция?", uk: "Джуніор-розробник має труднощі та сповільнює команду. Яка найкраща реакція?" }, options: { en: ["Assign them to easier tasks permanently.", "Invest in their growth: pair programming, focused code reviews with teaching, clear documentation, and gradually increasing complexity.", "Report them to HR.", "Do their work for them."], de: ["Ihnen dauerhaft einfachere Aufgaben zuweisen.", "In ihr Wachstum investieren: Pair Programming, fokussierte Code Reviews mit Lehre, klare Dokumentation und schrittweise steigende Komplexität.", "Sie bei HR melden.", "Ihre Arbeit für sie erledigen."], ru: ["Навсегда назначать им более простые задачи.", "Инвестировать в их рост: парное программирование, код-ревью с обучением, понятная документация и постепенное усложнение задач.", "Доложить в HR.", "Делать их работу за них."], uk: ["Назавжди призначати їм простіші задачі.", "Інвестувати в їхнє зростання: парне програмування, код-рев'ю з навчанням, зрозуміла документація та поступове ускладнення задач.", "Доповісти в HR.", "Робити їхню роботу за них."] }, correctIndex: 1, explanation: { en: "Senior developers who mentor juniors multiply team output long-term. 30 minutes of pairing now saves hours of debugging later.", de: "Senior-Entwickler, die Junioren mentoren, multiplizieren langfristig den Team-Output. 30 Minuten Pairing jetzt spart Stunden Debugging später.", ru: "Старшие разработчики, менторящие джуниоров, умножают результат команды в долгосрочной перспективе. 30 минут пэйринга сейчас экономят часы дебаггинга потом.", uk: "Старші розробники, які менторять джуніорів, примножують результат команди в довгостроковій перспективі. 30 хвилин пейрінгу зараз заощаджують години дебагінгу потім." } },
{ category: "Conflict Resolution", question: { en: "Your team's velocity has dropped for 3 consecutive sprints. What should you investigate?", de: "Die Velocity deines Teams ist 3 Sprints in Folge gesunken. Was solltest du untersuchen?", ru: "Velocity вашей команды падает 3 спринта подряд. Что исследовать?", uk: "Velocity вашої команди падає 3 спринти поспіль. Що досліджувати?" }, options: { en: ["Blame the weakest developer.", "Use the Retrospective to explore root causes: increased tech debt? Unclear requirements? Context switching? Team morale? Address systemic issues.", "Force overtime to catch up.", "Increase story point estimates to hide the drop."], de: ["Den schwächsten Entwickler beschuldigen.", "Die Retrospektive nutzen, um Ursachen zu erforschen: mehr Tech Debt? Unklare Anforderungen? Kontextwechsel? Teammoral? Systemische Probleme angehen.", "Überstunden erzwingen.", "Story-Point-Schätzungen erhöhen, um den Rückgang zu verstecken."], ru: ["Обвинить самого слабого разработчика.", "Использовать ретроспективу для исследования причин: вырос техдолг? Нечёткие требования? Переключение контекста? Мораль команды? Решать системные проблемы.", "Заставить работать сверхурочно.", "Повысить оценки в story points, чтобы скрыть падение."], uk: ["Звинуватити найслабшого розробника.", "Використати ретроспективу для дослідження причин: зріс техборг? Нечіткі вимоги? Перемикання контексту? Мораль команди? Вирішувати системні проблеми.", "Змусити працювати понаднормово.", "Підвищити оцінки в story points, щоб приховати падіння."] }, correctIndex: 1, explanation: { en: "Velocity drops signal systemic problems. Fix the system, don't pressure individuals.", de: "Velocity-Rückgänge signalisieren systemische Probleme. Das System reparieren, nicht Einzelne unter Druck setzen.", ru: "Падение velocity сигнализирует о системных проблемах. Чините систему, а не давите на отдельных людей.", uk: "Падіння velocity сигналізує про системні проблеми. Лагодьте систему, а не тисніть на окремих людей." } },
// ===== BEHAVIORAL / STAR =====
{ category: "Behavioral", question: { en: "What is the STAR method for answering behavioral interview questions?", de: "Was ist die STAR-Methode für Behavioral-Interview-Fragen?", ru: "Что такое метод STAR для ответов на поведенческие вопросы?", uk: "Що таке метод STAR для відповідей на поведінкові запитання?" }, options: { en: ["A rating system for answers.", "Situation (context), Task (your responsibility), Action (what YOU did specifically), Result (measurable outcome) — a structured framework for clear, impactful answers.", "A prioritization framework.", "A conflict resolution technique."], de: ["Ein Bewertungssystem für Antworten.", "Situation (Kontext), Task (deine Verantwortung), Action (was DU konkret getan hast), Result (messbares Ergebnis) — ein strukturiertes Framework für klare, wirkungsvolle Antworten.", "Ein Priorisierungs-Framework.", "Eine Konfliktlösungstechnik."], ru: ["Система оценки ответов.", "Situation (контекст), Task (ваша ответственность), Action (что конкретно ВЫ сделали), Result (измеримый результат) — структурированный фреймворк для чётких, убедительных ответов.", "Фреймворк приоритизации.", "Техника решения конфликтов."], uk: ["Система оцінки відповідей.", "Situation (контекст), Task (ваша відповідальність), Action (що конкретно ВИ зробили), Result (вимірюваний результат) — структурований фреймворк для чітких, переконливих відповідей.", "Фреймворк пріоритизації.", "Техніка вирішення конфліктів."] }, correctIndex: 1, explanation: { en: "STAR: 'On Project X (S), I needed to align two teams (T), I organized a joint workshop (A), which reduced miscommunication by 60% (R).'", de: "STAR: 'Bei Projekt X (S) musste ich zwei Teams abstimmen (T), ich organisierte einen gemeinsamen Workshop (A), was Misskommunikation um 60% reduzierte (R).'", ru: "STAR: «В проекте X (S) мне нужно было синхронизировать две команды (T), я организовал совместный воркшоп (A), что снизило недопонимание на 60% (R)».", uk: "STAR: «У проєкті X (S) мені потрібно було синхронізувати дві команди (T), я організував спільний воркшоп (A), що знизило непорозуміння на 60% (R)»." } },
{ category: "Behavioral", question: { en: "'Tell me about a time you had to meet a tight deadline.' What's the strongest answer structure?", de: "'Erzählen Sie von einer Situation mit einer engen Deadline.' Was ist die beste Antwortstruktur?", ru: "«Расскажите о ситуации с жёстким дедлайном.» Какая структура ответа лучше?", uk: "«Розкажіть про ситуацію з жорстким дедлайном.» Яка структура відповіді краща?" }, options: { en: ["'I always meet deadlines because I'm hardworking.'", "Describe a specific situation, what you prioritized and what you cut, how you communicated with stakeholders, and the measurable outcome.", "'I stayed up all night coding until it was done.'", "'I've never missed a deadline in my career.'"], de: ["'Ich halte immer Deadlines ein, weil ich fleissig bin.'", "Eine spezifische Situation beschreiben: was priorisiert und gestrichen wurde, wie mit Stakeholdern kommuniziert wurde, und das messbare Ergebnis.", "'Ich habe die ganze Nacht durchprogrammiert.'", "'Ich habe in meiner Karriere nie eine Deadline verpasst.'"], ru: ["«Я всегда укладываюсь в дедлайны, потому что трудолюбив.»", "Описать конкретную ситуацию: что приоритизировали и что отсекли, как общались со стейкхолдерами, и измеримый результат.", "«Я просидел всю ночь за кодом, пока не закончил.»", "«Я никогда не пропускал дедлайны.»"], uk: ["«Я завжди вкладаюсь у дедлайни, бо працьовитий.»", "Описати конкретну ситуацію: що пріоритизували і що відсікли, як спілкувалися зі стейкхолдерами, і вимірюваний результат.", "«Я просидів усю ніч за кодом, поки не закінчив.»", "«Я ніколи не пропускав дедлайнів.»"] }, correctIndex: 1, explanation: { en: "Show problem-solving: 'Deadline moved up 2 weeks. I identified core features vs nice-to-haves, proposed a phased delivery, we shipped MVP on time.'", de: "Problemlösung zeigen: 'Deadline 2 Wochen vorgezogen. Ich identifizierte Kernfeatures vs Nice-to-haves, schlug phasenweise Lieferung vor, MVP pünktlich geliefert.'", ru: "Покажите решение проблем: «Дедлайн сдвинулся на 2 недели раньше. Я выделил ключевые фичи vs nice-to-have, предложил поэтапную поставку, MVP доставили вовремя».", uk: "Покажіть вирішення проблем: «Дедлайн зсунувся на 2 тижні раніше. Я виділив ключові фічі vs nice-to-have, запропонував поетапну поставку, MVP доставили вчасно»." } },
{ category: "Behavioral", question: { en: "'Describe a time you made a mistake at work.' What is the interviewer really evaluating?", de: "'Beschreiben Sie einen Fehler bei der Arbeit.' Was bewertet der Interviewer wirklich?", ru: "«Опишите ошибку на работе.» Что на самом деле оценивает интервьюер?", uk: "«Опишіть помилку на роботі.» Що насправді оцінює інтерв'юер?" }, options: { en: ["Whether you're perfect.", "Your self-awareness, accountability, ability to learn from failure, and whether you took concrete steps to prevent it from happening again.", "How many bugs you've shipped.", "Whether you'll admit to being incompetent."], de: ["Ob du perfekt bist.", "Deine Selbstreflexion, Verantwortungsbewusstsein, Lernfähigkeit aus Fehlern und ob du konkrete Schritte unternommen hast, um Wiederholung zu verhindern.", "Wie viele Bugs du verursacht hast.", "Ob du Inkompetenz eingestehst."], ru: ["Идеальны ли вы.", "Вашу самоосознанность, ответственность, способность учиться на ошибках и приняли ли вы конкретные шаги для предотвращения повторения.", "Сколько багов вы допустили.", "Признаете ли вы свою некомпетентность."], uk: ["Чи ідеальні ви.", "Вашу самоусвідомленість, відповідальність, здатність вчитися на помилках і чи вжили ви конкретних кроків для запобігання повторенню.", "Скільки багів ви допустили.", "Чи визнаєте ви свою некомпетентність."] }, correctIndex: 1, explanation: { en: "Best answer: own the mistake, explain what you learned, describe what you changed.", de: "Beste Antwort: Fehler eingestehen, erklären was man gelernt hat, beschreiben was man geändert hat.", ru: "Лучший ответ: признать ошибку, объяснить, чему научились, описать, что изменили.", uk: "Найкраща відповідь: визнати помилку, пояснити, чого навчилися, описати, що змінили." } },
{ category: "Behavioral", question: { en: "'How do you handle disagreements with your manager?' What's the best approach to answer?", de: "'Wie gehst du mit Meinungsverschiedenheiten mit deinem Manager um?'", ru: "«Как вы справляетесь с разногласиями с менеджером?»", uk: "«Як ви справляєтесь з розбіжностями з менеджером?»" }, options: { en: ["'I always agree with my manager.'", "Show that you advocate professionally with data, but ultimately respect the decision. Give a real example.", "'I go to their manager if I disagree.'", "'I avoid confrontation entirely.'"], de: ["'Ich stimme meinem Manager immer zu.'", "Zeigen, dass man professionell mit Daten argumentiert, aber letztlich die Entscheidung respektiert. Ein echtes Beispiel geben.", "'Ich gehe zu deren Manager, wenn ich nicht einverstanden bin.'", "'Ich vermeide Konfrontation komplett.'"], ru: ["«Я всегда согласен с менеджером.»", "Показать, что вы профессионально аргументируете с данными, но в итоге уважаете решение. Привести реальный пример.", "«Я обращаюсь к их руководителю, если не согласен.»", "«Я полностью избегаю конфронтации.»"], uk: ["«Я завжди погоджуюсь з менеджером.»", "Показати, що ви професійно аргументуєте з даними, але зрештою поважаєте рішення. Навести реальний приклад.", "«Я звертаюсь до їхнього керівника, якщо не згоден.»", "«Я повністю уникаю конфронтації.»"] }, correctIndex: 1, explanation: { en: "Companies want people who think independently but aren't combative.", de: "Unternehmen wollen Leute, die unabhängig denken, aber nicht konfrontativ sind.", ru: "Компании хотят людей, которые думают самостоятельно, но не конфликтны.", uk: "Компанії хочуть людей, які думають самостійно, але не конфліктні." } },
{ category: "Behavioral", question: { en: "'Tell me about a time you worked with a difficult team member.' What should you emphasize?", de: "'Erzählen Sie von der Zusammenarbeit mit einem schwierigen Teammitglied.' Was betonen?", ru: "«Расскажите о работе со сложным коллегой.» Что подчеркнуть?", uk: "«Розкажіть про роботу зі складним колегою.» Що підкреслити?" }, options: { en: ["How you got them fired.", "Empathy, communication, and finding common ground. Show you adapted your approach and focused on the shared goal.", "How you avoided them entirely.", "How you complained to management."], de: ["Wie man sie entlassen hat.", "Empathie, Kommunikation und Gemeinsamkeiten finden. Zeigen, dass man den Ansatz angepasst hat und sich auf das gemeinsame Ziel konzentrierte.", "Wie man sie komplett gemieden hat.", "Wie man sich beim Management beschwert hat."], ru: ["Как вы добились их увольнения.", "Эмпатию, коммуникацию и поиск общего языка. Показать, что адаптировали подход и сосредоточились на общей цели.", "Как вы полностью их избегали.", "Как вы жаловались руководству."], uk: ["Як ви домоглися їхнього звільнення.", "Емпатію, комунікацію та пошук спільної мови. Показати, що адаптували підхід і зосередилися на спільній цілі.", "Як ви повністю їх уникали.", "Як ви скаржилися керівництву."] }, correctIndex: 1, explanation: { en: "'I had coffee with them 1:1, learned they were stressed about a deadline. We agreed on norms, and collaboration improved.'", de: "'Ich hatte ein 1:1-Kaffee mit ihnen, erfuhr, dass sie wegen einer Deadline gestresst waren. Wir vereinbarten Normen und die Zusammenarbeit verbesserte sich.'", ru: "«Я поговорил с ними за кофе 1:1, узнал, что они в стрессе из-за дедлайна. Мы договорились о правилах, и сотрудничество улучшилось.»", uk: "«Я поговорив з ними за кавою 1:1, дізнався, що вони в стресі через дедлайн. Ми домовились про правила, і співпраця покращилась.»" } },
{ category: "Behavioral", question: { en: "What does 'Tell me about yourself' really mean in an interview?", de: "Was bedeutet 'Erzählen Sie über sich' wirklich im Interview?", ru: "Что на самом деле означает «Расскажите о себе» на собеседовании?", uk: "Що насправді означає «Розкажіть про себе» на співбесіді?" }, options: { en: ["Recite your entire CV chronologically.", "Give a 2-minute career narrative connecting your experience to THIS role — highlight relevant skills, key achievements, and why you're excited about this opportunity.", "Share personal hobbies and interests.", "Describe your education in detail."], de: ["Den gesamten Lebenslauf chronologisch aufsagen.", "Eine 2-minütige Karriere-Erzählung geben, die deine Erfahrung mit DIESER Rolle verbindet — relevante Skills, Schlüsselerfolge und warum dich diese Gelegenheit begeistert.", "Persönliche Hobbys und Interessen teilen.", "Die Ausbildung im Detail beschreiben."], ru: ["Хронологически пересказать всё резюме.", "Дать 2-минутный рассказ о карьере, связывающий опыт с ЭТОЙ ролью — выделить релевантные навыки, ключевые достижения и почему вас привлекает эта возможность.", "Рассказать о личных хобби и интересах.", "Подробно описать образование."], uk: ["Хронологічно переказати все резюме.", "Дати 2-хвилинну розповідь про кар'єру, що пов'язує досвід з ЦІЄЮ роллю — виділити релевантні навички, ключові досягнення і чому вас приваблює ця можливість.", "Розповісти про особисті хобі та інтереси.", "Детально описати освіту."] }, correctIndex: 1, explanation: { en: "Formula: 'I'm a [role] with [X years] in [key areas]. At [Company], I [achievement]. I'm excited about this role because [connection].'", de: "Formel: 'Ich bin [Rolle] mit [X Jahren] in [Bereichen]. Bei [Firma] habe ich [Erfolg]. Mich begeistert diese Rolle, weil [Verbindung].'", ru: "Формула: «Я [роль] с [X лет] опыта в [областях]. В [компании] я [достижение]. Меня привлекает эта роль, потому что [связь].»", uk: "Формула: «Я [роль] з [X років] досвіду в [областях]. У [компанії] я [досягнення]. Мене приваблює ця роль, тому що [зв'язок].»" } },
// ===== ENGINEERING CULTURE =====
{ category: "Engineering Culture", question: { en: "What is a Blameless Postmortem?", de: "Was ist ein Blameless Postmortem?", ru: "Что такое Blameless Postmortem?", uk: "Що таке Blameless Postmortem?" }, options: { en: ["A meeting where nobody is held accountable.", "An incident review focused on systemic causes and process improvements rather than blaming individuals — creating psychological safety.", "An automated incident report.", "A postmortem without a timeline."], de: ["Ein Meeting, bei dem niemand zur Rechenschaft gezogen wird.", "Eine Incident-Review, die sich auf systemische Ursachen und Prozessverbesserungen konzentriert statt Einzelne zu beschuldigen — schafft psychologische Sicherheit.", "Ein automatisierter Incident-Report.", "Ein Postmortem ohne Zeitlinie."], ru: ["Встреча, где никого не привлекают к ответственности.", "Разбор инцидента, сфокусированный на системных причинах и улучшении процессов, а не на обвинении людей — создаёт психологическую безопасность.", "Автоматизированный отчёт об инциденте.", "Постмортем без хронологии."], uk: ["Зустріч, де нікого не притягають до відповідальності.", "Розбір інциденту, зфокусований на системних причинах та покращенні процесів, а не на звинуваченні людей — створює психологічну безпеку.", "Автоматизований звіт про інцидент.", "Постмортем без хронології."] }, correctIndex: 1, explanation: { en: "If people fear blame, they hide mistakes. Focus on systems, not people.", de: "Wenn Menschen Schuldzuweisungen fürchten, verstecken sie Fehler. Fokus auf Systeme, nicht Menschen.", ru: "Если люди боятся обвинений, они прячут ошибки. Фокус на системах, а не на людях.", uk: "Якщо люди бояться звинувачень, вони ховають помилки. Фокус на системах, а не на людях." } },
{ category: "Engineering Culture", question: { en: "What is Psychological Safety in a team context?", de: "Was ist Psychologische Sicherheit im Teamkontext?", ru: "Что такое психологическая безопасность в контексте команды?", uk: "Що таке психологічна безпека в контексті команди?" }, options: { en: ["Physical workplace safety regulations.", "Team members feel safe to take risks, ask questions, admit mistakes, and challenge ideas without fear of punishment — the #1 factor in high-performing teams (Google's Project Aristotle).", "Having a therapist on the team.", "Avoiding all conflict."], de: ["Physische Arbeitsplatz-Sicherheitsvorschriften.", "Teammitglieder fühlen sich sicher, Risiken einzugehen, Fragen zu stellen, Fehler einzugestehen und Ideen herauszufordern — der #1-Faktor in Hochleistungsteams (Googles Project Aristotle).", "Einen Therapeuten im Team haben.", "Alle Konflikte vermeiden."], ru: ["Нормы физической безопасности на рабочем месте.", "Участники команды чувствуют себя в безопасности рисковать, задавать вопросы, признавать ошибки и оспаривать идеи — фактор №1 высокоэффективных команд (Project Aristotle Google).", "Наличие терапевта в команде.", "Избегание любых конфликтов."], uk: ["Норми фізичної безпеки на робочому місці.", "Учасники команди відчувають себе в безпеці ризикувати, ставити запитання, визнавати помилки та оспорювати ідеї — фактор №1 високоефективних команд (Project Aristotle Google).", "Наявність терапевта в команді.", "Уникнення будь-яких конфліктів."] }, correctIndex: 1, explanation: { en: "Google's research: the best teams are the ones where everyone feels safe to speak up.", de: "Googles Forschung: Die besten Teams sind die, in denen sich jeder sicher fühlt, sich zu äussern.", ru: "Исследование Google: лучшие команды — те, где каждый чувствует себя в безопасности высказываться.", uk: "Дослідження Google: найкращі команди — ті, де кожен почувається в безпеці висловлюватися." } },
{ category: "Engineering Culture", question: { en: "What is Technical Debt and how should a team manage it?", de: "Was ist Technical Debt und wie sollte ein Team damit umgehen?", ru: "Что такое технический долг и как команде им управлять?", uk: "Що таке технічний борг і як команді ним керувати?" }, options: { en: ["Money owed for software licenses.", "Shortcuts and suboptimal code that speed up short-term delivery but slow future development. Manage by: making it visible, allocating sprint capacity, and tracking in the backlog.", "Bugs found in production.", "Using outdated frameworks."], de: ["Geld, das für Softwarelizenzen geschuldet wird.", "Abkürzungen und suboptimaler Code, die kurzfristige Lieferung beschleunigen, aber zukünftige Entwicklung verlangsamen. Verwalten durch: Sichtbarmachen, Sprint-Kapazität zuweisen, im Backlog tracken.", "Bugs in der Produktion.", "Veraltete Frameworks verwenden."], ru: ["Деньги за лицензии на ПО.", "Ярлыки и неоптимальный код, ускоряющие краткосрочную поставку, но замедляющие будущую разработку. Управлять: делать видимым, выделять ёмкость спринта, отслеживать в бэклоге.", "Баги в продакшене.", "Использование устаревших фреймворков."], uk: ["Гроші за ліцензії на ПЗ.", "Ярлики та неоптимальний код, що прискорюють короткострокову поставку, але сповільнюють майбутню розробку. Керувати: робити видимим, виділяти ємність спринту, відстежувати в бекллозі.", "Баги в продакшені.", "Використання застарілих фреймворків."] }, correctIndex: 1, explanation: { en: "Best practice: dedicate 15-20% of sprint capacity to tech debt. Make it visible to the PO with impact data.", de: "Best Practice: 15-20% der Sprint-Kapazität für Tech Debt reservieren. Dem PO mit Impact-Daten sichtbar machen.", ru: "Лучшая практика: выделять 15-20% ёмкости спринта на техдолг. Сделать видимым для PO с данными о влиянии.", uk: "Найкраща практика: виділяти 15-20% ємності спринту на техборг. Зробити видимим для PO з даними про вплив." } },
