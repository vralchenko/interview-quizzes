{ category: "Domain Layer", question: { en: "In Clean Architecture, what belongs in the Domain layer?", de: "Was gehört in Clean Architecture in den Domain Layer?", ru: "Что входит в Domain Layer в Clean Architecture?", uk: "Що входить до Domain Layer у Clean Architecture?" }, options: { en: ["Controllers and middleware.", "Entities, Value Objects, Domain Events, and business rule exceptions.", "EF Core DbContext and migrations.", "React components and API routes."], de: ["Controller und Middleware.", "Entities, Value Objects, Domain Events und Geschäftsregel-Exceptions.", "EF Core DbContext und Migrationen.", "React-Komponenten und API-Routen."], ru: ["Контроллеры и middleware.", "Entities, Value Objects, Domain Events и исключения бизнес-правил.", "EF Core DbContext и миграции.", "React-компоненты и API-маршруты."], uk: ["Контролери та middleware.", "Entities, Value Objects, Domain Events та винятки бізнес-правил.", "EF Core DbContext та міграції.", "React-компоненти та API-маршрути."] }, correctIndex: 1, explanation: { en: "The Domain layer is the innermost circle. It contains pure business logic with zero dependencies on frameworks, databases, or UI.", de: "Der Domain Layer ist der innerste Kreis. Er enthält reine Geschäftslogik ohne Abhängigkeiten von Frameworks, Datenbanken oder UI.", ru: "Domain Layer — это самый внутренний круг. Он содержит чистую бизнес-логику без зависимостей от фреймворков, баз данных или UI.", uk: "Domain Layer — це найвнутрішнє коло. Він містить чисту бізнес-логіку без залежностей від фреймворків, баз даних чи UI." } },
{ category: "Domain Layer", question: { en: "Why should the Domain layer have zero external dependencies?", de: "Warum sollte der Domain Layer keine externen Abhängigkeiten haben?", ru: "Почему Domain Layer не должен иметь внешних зависимостей?", uk: "Чому Domain Layer не повинен мати зовнішніх залежностей?" }, options: { en: ["To reduce NuGet package count.", "So business rules remain testable, portable, and immune to infrastructure changes (DB, framework, cloud provider).", "Because .NET doesn't allow references in class libraries.", "Domain layer classes are too small for dependencies."], de: ["Um die Anzahl der NuGet-Pakete zu reduzieren.", "Damit Geschäftsregeln testbar, portabel und immun gegen Infrastrukturänderungen bleiben (DB, Framework, Cloud-Anbieter).", "Weil .NET keine Referenzen in Klassenbibliotheken erlaubt.", "Domain-Layer-Klassen sind zu klein für Abhängigkeiten."], ru: ["Чтобы уменьшить количество NuGet-пакетов.", "Чтобы бизнес-правила оставались тестируемыми, портируемыми и независимыми от изменений инфраструктуры (БД, фреймворк, облачный провайдер).", "Потому что .NET не позволяет ссылки в библиотеках классов.", "Классы Domain Layer слишком малы для зависимостей."], uk: ["Щоб зменшити кількість NuGet-пакетів.", "Щоб бізнес-правила залишалися тестованими, портованими та незалежними від змін інфраструктури (БД, фреймворк, хмарний провайдер).", "Тому що .NET не дозволяє посилання в бібліотеках класів.", "Класи Domain Layer занадто малі для залежностей."] }, correctIndex: 1, explanation: { en: "If your domain logic depends on EF Core, changing to Dapper or a different DB requires rewriting business rules. Zero dependencies = maximum portability.", de: "Wenn die Domänenlogik von EF Core abhängt, erfordert ein Wechsel zu Dapper oder einer anderen DB das Umschreiben von Geschäftsregeln. Null Abhängigkeiten = maximale Portabilität.", ru: "Если доменная логика зависит от EF Core, переход на Dapper или другую БД потребует переписывания бизнес-правил. Ноль зависимостей = максимальная портируемость.", uk: "Якщо доменна логіка залежить від EF Core, перехід на Dapper або іншу БД потребує переписування бізнес-правил. Нуль залежностей = максимальна портованість." } },
{ category: "Domain Layer", question: { en: "What is a Value Object in DDD?", de: "Was ist ein Value Object in DDD?", ru: "Что такое Value Object в DDD?", uk: "Що таке Value Object у DDD?" }, options: { en: ["An object with a primary key in the database.", "An immutable object defined entirely by its attributes, with no identity (e.g., Money, Address, DateRange).", "A DTO used for API responses.", "A singleton service."], de: ["Ein Objekt mit einem Primärschlüssel in der Datenbank.", "Ein unveränderliches Objekt, das vollständig durch seine Attribute definiert ist, ohne Identität (z.B. Money, Address, DateRange).", "Ein DTO für API-Antworten.", "Ein Singleton-Service."], ru: ["Объект с первичным ключом в базе данных.", "Неизменяемый объект, полностью определяемый своими атрибутами, без идентичности (например, Money, Address, DateRange).", "DTO для API-ответов.", "Singleton-сервис."], uk: ["Об'єкт з первинним ключем у базі даних.", "Незмінний об'єкт, повністю визначений своїми атрибутами, без ідентичності (наприклад, Money, Address, DateRange).", "DTO для API-відповідей.", "Singleton-сервіс."] }, correctIndex: 1, explanation: { en: "Two Money objects with amount=100 and currency=USD are equal regardless of their memory reference. They have no Id — only their values matter.", de: "Zwei Money-Objekte mit amount=100 und currency=USD sind gleich, unabhängig von ihrer Speicherreferenz. Sie haben keine Id — nur ihre Werte zählen.", ru: "Два объекта Money с amount=100 и currency=USD равны независимо от ссылки в памяти. У них нет Id — важны только их значения.", uk: "Два об'єкти Money з amount=100 та currency=USD рівні незалежно від посилання в пам'яті. Вони не мають Id — важливі лише їхні значення." } },

 не має ідентичності — його визначають лише значення." } },
{ category: "Domain Layer", question: { en: "What is an Aggregate Root?", de: "Was ist ein Aggregate Root?", ru: "Что такое Aggregate Root?", uk: "Що таке Aggregate Root?" }, options: { en: ["The root namespace of the Domain project.", "The single entry point entity that guards consistency boundaries for a cluster of related entities and value objects.", "The base class for all entities.", "The database table with the most rows."], de: ["Der Root-Namespace des Domain-Projekts.", "Die einzige Einstiegspunkt-Entity, die Konsistenzgrenzen für eine Gruppe verwandter Entities und Value Objects bewacht.", "Die Basisklasse für alle Entities.", "Die Datenbanktabelle mit den meisten Zeilen."], ru: ["Корневое пространство имён доменного проекта.", "Единственная точка входа — Entity, которая охраняет границы согласованности для группы связанных Entities и Value Objects.", "Базовый класс для всех Entities.", "Таблица базы данных с наибольшим количеством строк."], uk: ["Кореневий простір імен доменного проєкту.", "Єдина точка входу — Entity, яка охороняє межі узгодженості для групи пов'язаних Entities та Value Objects.", "Базовий клас для всіх Entities.", "Таблиця бази даних з найбільшою кількістю рядків."] }, correctIndex: 1, explanation: { en: "External code can only modify child entities through the Aggregate Root. E.g., Order is the root; OrderLines can only be added/removed via Order methods.", de: "Externer Code kann Kind-Entities nur über den Aggregate Root ändern. Z.B. ist Order der Root; OrderLines können nur über Order-Methoden hinzugefügt/entfernt werden.", ru: "Внешний код может изменять дочерние Entity только через Aggregate Root. Например, Order — корень; OrderLines можно добавлять/удалять только через методы Order.", uk: "Зовнішній код може змінювати дочірні Entity лише через Aggregate Root. Наприклад, Order — корінь; OrderLines можна додавати/видаляти лише через методи Order." } },
{ category: "Domain Layer", question: { en: "Why should Domain Entities encapsulate their invariants?", de: "Warum sollten Domain Entities ihre Invarianten kapseln?", ru: "Почему Domain Entities должны инкапсулировать свои инварианты?", uk: "Чому Domain Entities повинні інкапсулювати свої інваріанти?" }, options: { en: ["For better JSON serialization.", "To ensure business rules are enforced in one place, preventing invalid state regardless of how the entity is used.", "Because EF Core requires it.", "To reduce the number of unit tests."], de: ["Für bessere JSON-Serialisierung.", "Um sicherzustellen, dass Geschäftsregeln an einer Stelle durchgesetzt werden und ungültige Zustände verhindert werden, unabhängig davon, wie die Entity verwendet wird.", "Weil EF Core es erfordert.", "Um die Anzahl der Unit-Tests zu reduzieren."], ru: ["Для лучшей JSON-сериализации.", "Чтобы бизнес-правила применялись в одном месте, предотвращая недопустимое состояние независимо от того, как используется Entity.", "Потому что EF Core этого требует.", "Чтобы уменьшить количество юнит-тестов."], uk: ["Для кращої JSON-серіалізації.", "Щоб бізнес-правила застосовувалися в одному місці, запобігаючи недопустимому стану незалежно від того, як використовується Entity.", "Тому що EF Core цього вимагає.", "Щоб зменшити кількість юніт-тестів."] }, correctIndex: 1, explanation: { en: "If Order.AddItem() validates stock and calculates totals, no controller or service can bypass those rules. The entity protects its own consistency.", de: "Wenn Order.AddItem() Bestand prüft und Summen berechnet, kann kein Controller oder Service diese Regeln umgehen. Die Entity schützt ihre eigene Konsistenz.", ru: "Если Order.AddItem() проверяет наличие и рассчитывает итоги, ни один контроллер или сервис не может обойти эти правила. Entity защищает собственную согласованность.", uk: "Якщо Order.AddItem() перевіряє наявність і розраховує підсумки, жоден контролер чи сервіс не може обійти ці правила. Entity захищає власну узгодженість." } },
{ category: "Domain Layer", question: { en: "What are Domain Events?", de: "Was sind Domain Events?", ru: "Что такое Domain Events?", uk: "Що таке Domain Events?" }, options: { en: ["JavaScript browser events.", "Notifications that something meaningful happened in the domain (e.g., OrderPlaced, PaymentReceived) that other parts of the system can react to.", "EF Core change tracking events.", "Azure Event Grid messages."], de: ["JavaScript-Browser-Events.", "Benachrichtigungen, dass etwas Bedeutendes in der Domäne passiert ist (z.B. OrderPlaced, PaymentReceived), auf das andere Systemteile reagieren können.", "EF Core Change-Tracking-Events.", "Azure Event Grid-Nachrichten."], ru: ["JavaScript-события браузера.", "Уведомления о том, что в домене произошло что-то значимое (например, OrderPlaced, PaymentReceived), на что могут реагировать другие части системы.", "События отслеживания изменений EF Core.", "Сообщения Azure Event Grid."], uk: ["JavaScript-події браузера.", "Сповіщення про те, що в домені сталося щось значуще (наприклад, OrderPlaced, PaymentReceived), на що можуть реагувати інші частини системи.", "Події відстеження змін EF Core.", "Повідомлення Azure Event Grid."] }, correctIndex: 1, explanation: { en: "Domain Events decouple the domain from side effects. When OrderPlaced fires, handlers can send emails, update inventory, etc. — without the Order knowing.", de: "Domain Events entkoppeln die Domäne von Seiteneffekten. Wenn OrderPlaced ausgelöst wird, können Handler E-Mails senden, Bestand aktualisieren usw. — ohne dass die Order davon weiss.", ru: "Domain Events отделяют домен от побочных эффектов. Когда срабатывает OrderPlaced, обработчики могут отправлять письма, обновлять запасы и т.д. — без ведома Order.", uk: "Domain Events відокремлюють домен від побічних ефектів. Коли спрацьовує OrderPlaced, обробники можуть надсилати листи, оновлювати запаси тощо — без відома Order." } },
{ category: "Domain Layer", question: { en: "Should the Domain layer reference MediatR?", de: "Sollte der Domain Layer MediatR referenzieren?", ru: "Должен ли Domain Layer ссылаться на MediatR?", uk: "Чи повинен Domain Layer посилатися на MediatR?" }, options: { en: ["Yes — MediatR is essential for domain events.", "Ideally no. The Domain defines event interfaces/marker types. MediatR is an infrastructure concern wired in the Application or Infrastructure layer.", "MediatR must be in every layer.", "Only if using CQRS."], de: ["Ja — MediatR ist für Domain Events unverzichtbar.", "Idealerweise nein. Die Domäne definiert Event-Interfaces/Marker-Typen. MediatR ist ein Infrastruktur-Aspekt, der im Application oder Infrastructure Layer verdrahtet wird.", "MediatR muss in jeder Schicht sein.", "Nur bei Verwendung von CQRS."], ru: ["Да — MediatR необходим для Domain Events.", "В идеале нет. Домен определяет интерфейсы событий/маркерные типы. MediatR — это инфраструктурная забота, подключаемая в Application или Infrastructure Layer.", "MediatR должен быть в каждом слое.", "Только при использовании CQRS."], uk: ["Так — MediatR необхідний для Domain Events.", "В ідеалі ні. Домен визначає інтерфейси подій/маркерні типи. MediatR — це інфраструктурна турбота, що підключається в Application або Infrastructure Layer.", "MediatR повинен бути в кожному шарі.", "Лише при використанні CQRS."] }, correctIndex: 1, explanation: { en: "The Domain can define INotification markers. The actual dispatching via MediatR is wired outside the Domain to keep it framework-free.", de: "Die Domäne kann INotification-Marker definieren. Das eigentliche Dispatching über MediatR wird ausserhalb der Domäne verdrahtet, um sie Framework-frei zu halten.", ru: "Домен может определять маркеры INotification. Фактическая диспетчеризация через MediatR подключается вне домена, чтобы сохранить его свободным от фреймворков.", uk: "Домен може визначати маркери INotification. Фактична диспетчеризація через MediatR підключається поза доменом, щоб зберегти його вільним від фреймворків." } },
{ category: "Domain Layer", question: { en: "What is a Domain Service?", de: "Was ist ein Domain Service?", ru: "Что такое Domain Service?", uk: "Що таке Domain Service?" }, options: { en: ["An ASP.NET Core background service.", "A stateless service containing business logic that doesn't naturally belong to a single Entity or Value Object.", "A REST API service.", "A database migration service."], de: ["Ein ASP.NET Core Background Service.", "Ein zustandsloser Service mit Geschäftslogik, die nicht natürlich zu einer einzelnen Entity oder einem Value Object gehört.", "Ein REST-API-Service.", "Ein Datenbank-Migrations-Service."], ru: ["Фоновый сервис ASP.NET Core.", "Сервис без состояния, содержащий бизнес-логику, которая не принадлежит естественно одной Entity или Value Object.", "REST API-сервис.", "Сервис миграции базы данных."], uk: ["Фоновий сервіс ASP.NET Core.", "Сервіс без стану, що містить бізнес-логіку, яка не належить природно одній Entity або Value Object.", "REST API-сервіс.", "Сервіс міграції бази даних."] }, correctIndex: 1, explanation: { en: "E.g., TransferMoneyService that coordinates between two Account entities. The logic spans multiple aggregates and doesn't belong in either one.", de: "Z.B. TransferMoneyService, der zwischen zwei Account-Entities koordiniert. Die Logik erstreckt sich über mehrere Aggregates und gehört in keines davon.", ru: "Например, TransferMoneyService, координирующий две Entity Account. Логика охватывает несколько агрегатов и не принадлежит ни одному из них.", uk: "Наприклад, TransferMoneyService, що координує дві Entity Account. Логіка охоплює кілька агрегатів і не належить жодному з них." } },
{ category: "Domain Layer", question: { en: "How should domain validation errors be communicated?", de: "Wie sollten Domänen-Validierungsfehler kommuniziert werden?", ru: "Как должны сообщаться ошибки валидации домена?", uk: "Як повинні повідомлятися помилки валідації домену?" }, options: { en: ["Return HTTP 400 from the entity.", "Throw specific domain exceptions (e.g., InsufficientFundsException) or use a Result<T> pattern — never HTTP concepts.", "Log them and continue silently.", "Write them to the database error table."], de: ["HTTP 400 von der Entity zurückgeben.", "Spezifische Domain-Exceptions werfen (z.B. InsufficientFundsException) oder ein Result<T>-Muster verwenden — niemals HTTP-Konzepte.", "Sie protokollieren und stillschweigend fortfahren.", "Sie in die Datenbank-Fehlertabelle schreiben."], ru: ["Вернуть HTTP 400 из Entity.", "Выбрасывать специфические доменные исключения (например, InsufficientFundsException) или использовать паттерн Result<T> — никогда HTTP-концепции.", "Логировать и продолжать молча.", "Записывать в таблицу ошибок базы данных."], uk: ["Повернути HTTP 400 з Entity.", "Викидати специфічні доменні винятки (наприклад, InsufficientFundsException) або використовувати патерн Result<T> — ніколи HTTP-концепції.", "Логувати і продовжувати мовчки.", "Записувати в таблицю помилок бази даних."] }, correctIndex: 1, explanation: { en: "The Domain doesn't know about HTTP. It communicates failures through exceptions or Result types that the Application layer translates to HTTP responses.", de: "Die Domäne kennt HTTP nicht. Sie kommuniziert Fehler über Exceptions oder Result-Typen, die der Application Layer in HTTP-Antworten übersetzt.", ru: "Домен не знает о HTTP. Он сообщает об ошибках через исключения или типы Result, которые Application Layer переводит в HTTP-ответы.", uk: "Домен не знає про HTTP. Він повідомляє про помилки через винятки або типи Result, які Application Layer переводить у HTTP-відповіді." } },
// ===== APPLICATION LAYER =====
{ category: "Application Layer", question: { en: "What is the role of the Application layer in Clean Architecture?", de: "Welche Rolle spielt der Application Layer in Clean Architecture?", ru: "Какова роль Application Layer в Clean Architecture?", uk: "Яка роль Application Layer у Clean Architecture?" }, options: { en: ["To render HTML views.", "To orchestrate use cases — coordinate Domain entities, call repositories, and define application-specific business rules.", "To configure the database connection string.", "To define CSS styles for the frontend."], de: ["HTML-Views rendern.", "Use Cases orchestrieren — Domain Entities koordinieren, Repositories aufrufen und anwendungsspezifische Geschäftsregeln definieren.", "Den Datenbank-Connection-String konfigurieren.", "CSS-Stile für das Frontend definieren."], ru: ["Рендерить HTML-представления.", "Оркестрировать сценарии использования — координировать Domain Entities, вызывать репозитории и определять бизнес-правила приложения.", "Настраивать строку подключения к базе данных.", "Определять CSS-стили для фронтенда."], uk: ["Рендерити HTML-представлення.", "Оркеструвати сценарії використання — координувати Domain Entities, викликати репозиторії та визначати бізнес-правила застосунку.", "Налаштовувати рядок підключення до бази даних.", "Визначати CSS-стилі для фронтенду."] }, correctIndex: 1, explanation: { en: "The Application layer contains use case handlers (Commands/Queries). It orchestrates but delegates business logic to Domain entities.", de: "Der Application Layer enthält Use-Case-Handler (Commands/Queries). Er orchestriert, delegiert aber Geschäftslogik an Domain Entities.", ru: "Application Layer содержит обработчики сценариев (Commands/Queries). Он оркестрирует, но делегирует бизнес-логику Domain Entities.", uk: "Application Layer містить обробники сценаріїв (Commands/Queries). Він оркеструє, але делегує бізнес-логіку Domain Entities." } },
{ category: "Application Layer", question: { en: "What belongs in the Application layer?", de: "Was gehört in den Application Layer?", ru: "Что входит в Application Layer?", uk: "Що входить до Application Layer?" }, options: { en: ["EF Core DbContext.", "Use case handlers, DTOs, validation rules, interface definitions for repositories and external services.", "Controllers and Razor views.", "Docker configuration files."], de: ["EF Core DbContext.", "Use-Case-Handler, DTOs, Validierungsregeln, Interface-Definitionen für Repositories und externe Services.", "Controller und Razor Views.", "Docker-Konfigurationsdateien."], ru: ["EF Core DbContext.", "Обработчики сценариев, DTO, правила валидации, определения интерфейсов для репозиториев и внешних сервисов.", "Контроллеры и Razor-представления.", "Файлы конфигурации Docker."], uk: ["EF Core DbContext.", "Обробники сценаріїв, DTO, правила валідації, визначення інтерфейсів для репозиторіїв та зовнішніх сервісів.", "Контролери та Razor-представлення.", "Файли конфігурації Docker."] }, correctIndex: 1, explanation: { en: "The Application layer defines WHAT the system does (use cases) and WHAT it needs (interfaces), not HOW things are implemented.", de: "Der Application Layer definiert, WAS das System tut (Use Cases) und WAS es braucht (Interfaces), nicht WIE Dinge implementiert werden.", ru: "Application Layer определяет, ЧТО делает система (сценарии) и ЧТО ей нужно (интерфейсы), а не КАК вещи реализованы.", uk: "Application Layer визначає, ЩО робить система (сценарії) та ЩО їй потрібно (інтерфейси), а не ЯК речі реалізовані." } },
{ category: "Application Layer", question: { en: "Why does the Application layer define repository interfaces but not implement them?", de: "Warum definiert der Application Layer Repository-Interfaces, implementiert sie aber nicht?", ru: "Почему Application Layer определяет интерфейсы репозиториев, но не реализует их?", uk: "Чому Application Layer визначає інтерфейси репозиторіїв, але не реалізує їх?" }, options: { en: ["Because it's lazy.", "Dependency Inversion: the Application layer declares what it needs (IOrderRepository). Infrastructure provides the implementation (EfOrderRepository).", "Interfaces are only for testing.", "Because EF Core doesn't support interfaces."], de: ["Weil er faul ist.", "Dependency Inversion: Der Application Layer deklariert, was er braucht (IOrderRepository). Infrastructure liefert die Implementierung (EfOrderRepository).", "Interfaces sind nur zum Testen.", "Weil EF Core keine Interfaces unterstützt."], ru: ["Потому что он ленивый.", "Dependency Inversion: Application Layer объявляет, что ему нужно (IOrderRepository). Infrastructure предоставляет реализацию (EfOrderRepository).", "Интерфейсы только для тестирования.", "Потому что EF Core не поддерживает интерфейсы."], uk: ["Тому що він лінивий.", "Dependency Inversion: Application Layer оголошує, що йому потрібно (IOrderRepository). Infrastructure надає реалізацію (EfOrderRepository).", "Інтерфейси лише для тестування.", "Тому що EF Core не підтримує інтерфейси."] }, correctIndex: 1, explanation: { en: "This is DIP in action. The Application layer depends on abstractions it owns. Infrastructure depends on the Application layer, not the other way around.", de: "Das ist DIP in Aktion. Der Application Layer hängt von Abstraktionen ab, die er besitzt. Infrastructure hängt vom Application Layer ab, nicht umgekehrt.", ru: "Это DIP в действии. Application Layer зависит от абстракций, которыми владеет. Infrastructure зависит от Application Layer, а не наоборот.", uk: "Це DIP в дії. Application Layer залежить від абстракцій, якими володіє. Infrastructure залежить від Application Layer, а не навпаки." } },
{ category: "Application Layer", question: { en: "What is a Command in CQRS?", de: "Was ist ein Command in CQRS?", ru: "Что такое Command в CQRS?", uk: "Що таке Command у CQRS?" }, options: { en: ["A SQL INSERT statement.", "An object representing an intent to change state (e.g., CreateOrderCommand), handled by a CommandHandler.", "A CLI terminal command.", "A GET request to the API."], de: ["Ein SQL-INSERT-Statement.", "Ein Objekt, das eine Absicht zur Zustandsänderung darstellt (z.B. CreateOrderCommand), verarbeitet von einem CommandHandler.", "Ein CLI-Terminalbefehl.", "Ein GET-Request an die API."], ru: ["SQL-оператор INSERT.", "Объект, представляющий намерение изменить состояние (например, CreateOrderCommand), обрабатываемый CommandHandler.", "Команда CLI-терминала.", "GET-запрос к API."], uk: ["SQL-оператор INSERT.", "Об'єкт, що представляє намір змінити стан (наприклад, CreateOrderCommand), оброблюваний CommandHandler.", "Команда CLI-терміналу.", "GET-запит до API."] }, correctIndex: 1, explanation: { en: "Commands are imperative: 'Create this order.' They return void or a simple result. They modify state and trigger side effects.", de: "Commands sind imperativ: 'Erstelle diese Bestellung.' Sie geben void oder ein einfaches Ergebnis zurück. Sie ändern den Zustand und lösen Seiteneffekte aus.", ru: "Commands императивны: «Создай этот заказ». Они возвращают void или простой результат. Они изменяют состояние и вызывают побочные эффекты.", uk: "Commands імперативні: «Створи це замовлення». Вони повертають void або простий результат. Вони змінюють стан і викликають побічні ефекти." } },
{ category: "Application Layer", question: { en: "What is a Query in CQRS?", de: "Was ist eine Query in CQRS?", ru: "Что такое Query в CQRS?", uk: "Що таке Query у CQRS?" }, options: { en: ["A SQL SELECT statement.", "An object representing a request for data (e.g., GetOrderByIdQuery), handled by a QueryHandler. It never modifies state.", "An HTTP POST request.", "A domain event."], de: ["Ein SQL-SELECT-Statement.", "Ein Objekt, das eine Datenanfrage darstellt (z.B. GetOrderByIdQuery), verarbeitet von einem QueryHandler. Es ändert niemals den Zustand.", "Ein HTTP-POST-Request.", "Ein Domain Event."], ru: ["SQL-оператор SELECT.", "Объект, представляющий запрос данных (например, GetOrderByIdQuery), обрабатываемый QueryHandler. Он никогда не изменяет состояние.", "HTTP POST-запрос.", "Domain Event."], uk: ["SQL-оператор SELECT.", "Об'єкт, що представляє запит даних (наприклад, GetOrderByIdQuery), оброблюваний QueryHandler. Він ніколи не змінює стан.", "HTTP POST-запит.", "Domain Event."] }, correctIndex: 1, explanation: { en: "Queries are read-only. GetOrderByIdQuery returns OrderDto. The handler must not have side effects — no writes, no emails, no state changes.", de: "Queries sind schreibgeschützt. GetOrderByIdQuery gibt OrderDto zurück. Der Handler darf keine Seiteneffekte haben — keine Schreibvorgänge, keine E-Mails, keine Zustandsänderungen.", ru: "Queries доступны только для чтения. GetOrderByIdQuery возвращает OrderDto. Обработчик не должен иметь побочных эффектов — никаких записей, писем, изменений состояния.", uk: "Queries доступні лише для читання. GetOrderByIdQuery повертає OrderDto. Обробник не повинен мати побічних ефектів — жодних записів, листів, змін стану." } },
{ category: "Application Layer", question: { en: "Should Commands return data?", de: "Sollten Commands Daten zurückgeben?", ru: "Должны ли Commands возвращать данные?", uk: "Чи повинні Commands повертати дані?" }, options: { en: ["Always return the full entity.", "Ideally minimal — return the created entity's ID or a success/failure Result, not the full object.", "Never — commands must return void.", "Return the entire database state."], de: ["Immer die vollständige Entity zurückgeben.", "Idealerweise minimal — die ID der erstellten Entity oder ein Erfolgs-/Fehler-Result zurückgeben, nicht das vollständige Objekt.", "Niemals — Commands müssen void zurückgeben.", "Den gesamten Datenbankzustand zurückgeben."], ru: ["Всегда возвращать полную Entity.", "В идеале минимально — вернуть ID созданной Entity или Result успеха/неудачи, а не полный объект.", "Никогда — Commands должны возвращать void.", "Возвращать всё состояние базы данных."], uk: ["Завжди повертати повну Entity.", "В ідеалі мінімально — повернути ID створеної Entity або Result успіху/невдачі, а не повний об'єкт.", "Ніколи — Commands повинні повертати void.", "Повертати весь стан бази даних."] }, correctIndex: 1, explanation: { en: "Returning just the Id lets the client fetch the full object via a Query if needed. This keeps the write path simple and the read path optimized.", de: "Nur die Id zurückzugeben ermöglicht dem Client, das vollständige Objekt bei Bedarf über eine Query abzurufen. Das hält den Schreibpfad einfach und den Lesepfad optimiert.", ru: "Возврат только Id позволяет клиенту при необходимости получить полный объект через Query. Это сохраняет путь записи простым, а путь чтения оптимизированным.", uk: "Повернення лише Id дозволяє клієнту за потреби отримати повний об'єкт через Query. Це зберігає шлях запису простим, а шлях читання оптимізованим." } },
{ category: "Application Layer", question: { en: "What role does MediatR play in the Application layer?", de: "Welche Rolle spielt MediatR im Application Layer?", ru: "Какую роль играет MediatR в Application Layer?", uk: "Яку роль відіграє MediatR в Application Layer?" }, options: { en: ["It replaces Entity Framework.", "It dispatches Commands and Queries to their handlers, decoupling the sender (Controller) from the handler (Use Case).", "It's only used for logging.", "It manages database transactions."], de: ["Es ersetzt Entity Framework.", "Es dispatcht Commands und Queries an ihre Handler und entkoppelt den Sender (Controller) vom Handler (Use Case).", "Es wird nur für Logging verwendet.", "Es verwaltet Datenbanktransaktionen."], ru: ["Он заменяет Entity Framework.", "Он диспетчеризирует Commands и Queries к их обработчикам, отделяя отправителя (Controller) от обработчика (Use Case).", "Он используется только для логирования.", "Он управляет транзакциями базы данных."], uk: ["Він замінює Entity Framework.", "Він диспетчеризує Commands та Queries до їхніх обробників, відокремлюючи відправника (Controller) від обробника (Use Case).", "Він використовується лише для логування.", "Він керує транзакціями бази даних."] }, correctIndex: 1, explanation: { en: "The Controller sends a CreateOrderCommand via MediatR. MediatR finds and invokes the correct handler. The Controller doesn't know which class handles it.", de: "Der Controller sendet ein CreateOrderCommand über MediatR. MediatR findet und ruft den richtigen Handler auf. Der Controller weiss nicht, welche Klasse es verarbeitet.", ru: "Controller отправляет CreateOrderCommand через MediatR. MediatR находит и вызывает правильный обработчик. Controller не знает, какой класс обрабатывает запрос.", uk: "Controller надсилає CreateOrderCommand через MediatR. MediatR знаходить і викликає правильний обробник. Controller не знає, який клас обробляє запит." } },
{ category: "Application Layer", question: { en: "What is a Pipeline Behavior in MediatR?", de: "Was ist ein Pipeline Behavior in MediatR?", ru: "Что такое Pipeline Behavior в MediatR?", uk: "Що таке Pipeline Behavior в MediatR?" }, options: { en: ["A CSS animation.", "Cross-cutting middleware that wraps every Command/Query — used for validation, logging, transactions, and caching.", "A Git branching strategy.", "A CI/CD deployment stage."], de: ["Eine CSS-Animation.", "Querschnitts-Middleware, die jeden Command/Query umschliesst — für Validierung, Logging, Transaktionen und Caching.", "Eine Git-Branching-Strategie.", "Eine CI/CD-Deployment-Stufe."], ru: ["CSS-анимация.", "Сквозное middleware, оборачивающее каждый Command/Query — для валидации, логирования, транзакций и кэширования.", "Стратегия ветвления Git.", "Этап CI/CD-деплоя."], uk: ["CSS-анімація.", "Наскрізне middleware, що обгортає кожен Command/Query — для валідації, логування, транзакцій та кешування.", "Стратегія гілкування Git.", "Етап CI/CD-деплою."] }, correctIndex: 1, explanation: { en: "E.g., a ValidationBehavior runs FluentValidation before every handler. A TransactionBehavior wraps handlers in a DB transaction. AOP without magic.", de: "Z.B. führt ein ValidationBehavior FluentValidation vor jedem Handler aus. Ein TransactionBehavior umschliesst Handler in einer DB-Transaktion. AOP ohne Magie.", ru: "Например, ValidationBehavior запускает FluentValidation перед каждым обработчиком. TransactionBehavior оборачивает обработчики в транзакцию БД. AOP без магии.", uk: "Наприклад, ValidationBehavior запускає FluentValidation перед кожним обробником. TransactionBehavior обгортає обробники в транзакцію БД. AOP без магії." } },
{ category: "Application Layer", question: { en: "How should the Application layer handle mapping between Domain entities and DTOs?", de: "Wie sollte der Application Layer das Mapping zwischen Domain Entities und DTOs handhaben?", ru: "Как Application Layer должен обрабатывать маппинг между Domain Entities и DTO?", uk: "Як Application Layer повинен обробляти маппінг між Domain Entities та DTO?" }, options: { en: ["Entities should directly serialize to JSON.", "Use a mapping layer (AutoMapper, Mapster, or manual mapping) within the Application layer to translate between Domain models and DTOs.", "The database should return DTOs directly.", "The frontend should map entities itself."], de: ["Entities sollten direkt nach JSON serialisiert werden.", "Eine Mapping-Schicht (AutoMapper, Mapster oder manuelles Mapping) im Application Layer verwenden, um zwischen Domain-Modellen und DTOs zu übersetzen.", "Die Datenbank sollte DTOs direkt zurückgeben.", "Das Frontend sollte Entities selbst mappen."], ru: ["Entities должны напрямую сериализоваться в JSON.", "Использовать слой маппинга (AutoMapper, Mapster или ручной маппинг) в Application Layer для преобразования между Domain-моделями и DTO.", "База данных должна возвращать DTO напрямую.", "Фронтенд должен маппить Entity сам."], uk: ["Entities повинні напряму серіалізуватися в JSON.", "Використовувати шар маппінгу (AutoMapper, Mapster або ручний маппінг) в Application Layer для перетворення між Domain-моделями та DTO.", "База даних повинна повертати DTO напряму.", "Фронтенд повинен маппити Entity сам."] }, correctIndex: 1, explanation: { en: "Domain entities shouldn't be exposed to the outside world. The Application layer maps them to DTOs that hide internal structure and prevent over-posting.", de: "Domain Entities sollten nicht nach aussen exponiert werden. Der Application Layer mappt sie auf DTOs, die die interne Struktur verbergen und Over-Posting verhindern.", ru: "Domain Entities не должны быть доступны внешнему миру. Application Layer маппит их в DTO, скрывающие внутреннюю структуру и предотвращающие over-posting.", uk: "Domain Entities не повинні бути доступні зовнішньому світу. Application Layer маппить їх у DTO, що приховують внутрішню структуру та запобігають over-posting." } },
{ category: "Application Layer", question: { en: "Should the Application layer know about HTTP, controllers, or authentication?", de: "Sollte der Application Layer etwas über HTTP, Controller oder Authentifizierung wissen?", ru: "Должен ли Application Layer знать о HTTP, контроллерах или аутентификации?", uk: "Чи повинен Application Layer знати про HTTP, контролери або автентифікацію?" }, options: { en: ["Yes — it needs to check user roles.", "No — it receives plain Commands/Queries with user context passed as parameters. HTTP is a Presentation concern.", "Only for authentication.", "Only for authorization."], de: ["Ja — er muss Benutzerrollen prüfen.", "Nein — er empfängt einfache Commands/Queries mit Benutzerkontext als Parameter. HTTP ist ein Presentation-Aspekt.", "Nur für Authentifizierung.", "Nur für Autorisierung."], ru: ["Да — ему нужно проверять роли пользователей.", "Нет — он получает простые Commands/Queries с контекстом пользователя в параметрах. HTTP — забота Presentation.", "Только для аутентификации.", "Только для авторизации."], uk: ["Так — йому потрібно перевіряти ролі користувачів.", "Ні — він отримує прості Commands/Queries з контекстом користувача в параметрах. HTTP — турбота Presentation.", "Лише для автентифікації.", "Лише для авторизації."] }, correctIndex: 1, explanation: { en: "The Application layer is transport-agnostic. The same CreateOrderHandler works whether called from an API controller, a message queue consumer, or a CLI tool.", de: "Der Application Layer ist transportagnostisch. Derselbe CreateOrderHandler funktioniert, egal ob er von einem API-Controller, einem Message-Queue-Consumer oder einem CLI-Tool aufgerufen wird.", ru: "Application Layer не зависит от транспорта. Один и тот же CreateOrderHandler работает при вызове из API-контроллера, потребителя очереди сообщений или CLI-инструмента.", uk: "Application Layer не залежить від транспорту. Той самий CreateOrderHandler працює при виклику з API-контролера, споживача черги повідомлень або CLI-інструменту." } },
// ===== INFRASTRUCTURE LAYER =====
{ category: "Infrastructure", question: { en: "What belongs in the Infrastructure layer?", de: "Was gehört in den Infrastructure Layer?", ru: "Что входит в Infrastructure Layer?", uk: "Що входить до Infrastructure Layer?" }, options: { en: ["Business rules and domain entities.", "Concrete implementations: EF Core DbContext, repository implementations, email services, file storage, external API clients.", "Controllers and Razor views.", "Unit test projects."], de: ["Geschäftsregeln und Domain Entities.", "Konkrete Implementierungen: EF Core DbContext, Repository-Implementierungen, E-Mail-Services, Dateispeicher, externe API-Clients.", "Controller und Razor Views.", "Unit-Test-Projekte."], ru: ["Бизнес-правила и Domain Entities.", "Конкретные реализации: EF Core DbContext, реализации репозиториев, сервисы электронной почты, хранилище файлов, клиенты внешних API.", "Контроллеры и Razor-представления.", "Проекты юнит-тестов."], uk: ["Бізнес-правила та Domain Entities.", "Конкретні реалізації: EF Core DbContext, реалізації репозиторіїв, сервіси електронної пошти, сховище файлів, клієнти зовнішніх API.", "Контролери та Razor-представлення.", "Проєкти юніт-тестів."] }, correctIndex: 1, explanation: { en: "Infrastructure provides the HOW: how data is stored (EF Core), how emails are sent (SMTP), how files are stored (Azure Blob). It implements Application layer interfaces.", de: "Infrastructure liefert das WIE: wie Daten gespeichert werden (EF Core), wie E-Mails gesendet werden (SMTP), wie Dateien gespeichert werden (Azure Blob). Er implementiert Application-Layer-Interfaces.", ru: "Infrastructure обеспечивает КАК: как хранятся данные (EF Core), как отправляются письма (SMTP), как хранятся файлы (Azure Blob). Он реализует интерфейсы Application Layer.", uk: "Infrastructure забезпечує ЯК: як зберігаються дані (EF Core), як надсилаються листи (SMTP), як зберігаються файли (Azure Blob). Він реалізує інтерфейси Application Layer." } },
{ category: "Infrastructure", question: { en: "In Clean Architecture, which direction do dependencies point for Infrastructure?", de: "In welche Richtung zeigen die Abhängigkeiten für Infrastructure in Clean Architecture?", ru: "В каком направлении указывают зависимости для Infrastructure в Clean Architecture?", uk: "В якому напрямку вказують залежності для Infrastructure в Clean Architecture?" }, options: { en: ["Infrastructure depends on nothing.", "Infrastructure depends inward — it references Application and Domain layers, never the other way around.", "Domain depends on Infrastructure.", "All layers depend on Infrastructure."], de: ["Infrastructure hängt von nichts ab.", "Infrastructure hängt nach innen ab — es referenziert Application und Domain Layer, niemals umgekehrt.", "Domain hängt von Infrastructure ab.", "Alle Schichten hängen von Infrastructure ab."], ru: ["Infrastructure ни от чего не зависит.", "Infrastructure зависит внутрь — он ссылается на Application и Domain Layer, никогда наоборот.", "Domain зависит от Infrastructure.", "Все слои зависят от Infrastructure."], uk: ["Infrastructure ні від чого не залежить.", "Infrastructure залежить всередину — він посилається на Application та Domain Layer, ніколи навпаки.", "Domain залежить від Infrastructure.", "Усі шари залежать від Infrastructure."] }, correctIndex: 1, explanation: { en: "The Dependency Rule: outer layers depend on inner layers. Infrastructure (outer) implements interfaces defined in Application (inner).", de: "Die Dependency Rule: äussere Schichten hängen von inneren ab. Infrastructure (aussen) implementiert Interfaces, die im Application Layer (innen) definiert sind.", ru: "Dependency Rule: внешние слои зависят от внутренних. Infrastructure (внешний) реализует интерфейсы, определённые в Application (внутреннем).", uk: "Dependency Rule: зовнішні шари залежать від внутрішніх. Infrastructure (зовнішній) реалізує інтерфейси, визначені в Application (внутрішньому)." } },
{ category: "Infrastructure", question: { en: "Where should EF Core entity configurations (Fluent API) live?", de: "Wo sollten EF Core Entity-Konfigurationen (Fluent API) leben?", ru: "Где должны находиться конфигурации Entity в EF Core (Fluent API)?", uk: "Де повинні знаходитися конфігурації Entity в EF Core (Fluent API)?" }, options: { en: ["In the Domain layer next to entities.", "In the Infrastructure layer — they're persistence concerns, not business rules.", "In the Application layer.", "In the Presentation layer's Program.cs."], de: ["Im Domain Layer neben den Entities.", "Im Infrastructure Layer — sie sind Persistenz-Aspekte, keine Geschäftsregeln.", "Im Application Layer.", "In der Program.cs des Presentation Layers."], ru: ["В Domain Layer рядом с Entity.", "В Infrastructure Layer — это забота о персистентности, а не бизнес-правила.", "В Application Layer.", "В Program.cs слоя Presentation."], uk: ["У Domain Layer поряд з Entity.", "В Infrastructure Layer — це турбота про персистентність, а не бізнес-правила.", "В Application Layer.", "У Program.cs шару Presentation."] }, correctIndex: 1, explanation: { en: "How an entity maps to a database table (column names, indexes, relationships) is an infrastructure detail. The Domain entity shouldn't know about persistence.", de: "Wie eine Entity auf eine Datenbanktabelle abgebildet wird (Spaltennamen, Indizes, Beziehungen) ist ein Infrastrukturdetail. Die Domain Entity sollte nichts über Persistenz wissen.", ru: "Как Entity отображается на таблицу базы данных (имена столбцов, индексы, связи) — инфраструктурная деталь. Domain Entity не должна знать о персистентности.", uk: "Як Entity відображається на таблицю бази даних (назви стовпців, індекси, зв'язки) — інфраструктурна деталь. Domain Entity не повинна знати про персистентність." } },
{ category: "Infrastructure", question: { en: "How do you handle database migrations in Clean Architecture?", de: "Wie geht man mit Datenbankmigrationen in Clean Architecture um?", ru: "Как обрабатывать миграции базы данных в Clean Architecture?", uk: "Як обробляти міграції бази даних у Clean Architecture?" }, options: { en: ["Run them from the Domain project.", "Migrations are an Infrastructure concern. They live in the Infrastructure project and are applied during CI/CD, not at app startup.", "The Application layer generates migrations.", "Controllers trigger migrations on each request."], de: ["Sie vom Domain-Projekt aus ausführen.", "Migrationen sind ein Infrastructure-Aspekt. Sie leben im Infrastructure-Projekt und werden während CI/CD angewendet, nicht beim App-Start.", "Der Application Layer generiert Migrationen.", "Controller lösen Migrationen bei jedem Request aus."], ru: ["Запускать из доменного проекта.", "Миграции — забота Infrastructure. Они живут в проекте Infrastructure и применяются в CI/CD, а не при запуске приложения.", "Application Layer генерирует миграции.", "Контроллеры запускают миграции при каждом запросе."], uk: ["Запускати з доменного проєкту.", "Міграції — турбота Infrastructure. Вони живуть у проєкті Infrastructure і застосовуються під час CI/CD, а не при запуску застосунку.", "Application Layer генерує міграції.", "Контролери запускають міграції при кожному запиті."] }, correctIndex: 1, explanation: { en: "Migrations = persistence detail = Infrastructure. Running them at startup risks race conditions in multi-pod deployments. Apply them in the deployment pipeline.", de: "Migrationen = Persistenzdetail = Infrastructure. Sie beim Start auszuführen riskiert Race Conditions bei Multi-Pod-Deployments. Wende sie in der Deployment-Pipeline an.", ru: "Миграции = деталь персистентности = Infrastructure. Запуск при старте рискует вызвать race conditions в multi-pod деплоях. Применяйте их в пайплайне деплоя.", uk: "Міграції = деталь персистентності = Infrastructure. Запуск при старті ризикує викликати race conditions у multi-pod деплоях. Застосовуйте їх у пайплайні деплою." } },
{ category: "Infrastructure", question: { en: "Should Infrastructure layer services have business logic?", de: "Sollten Infrastructure-Layer-Services Geschäftslogik enthalten?", ru: "Должны ли сервисы Infrastructure Layer содержать бизнес-логику?", uk: "Чи повинні сервіси Infrastructure Layer містити бізнес-логіку?" }, options: { en: ["Yes — they're the most concrete layer.", "No — Infrastructure implements technical concerns only. Business logic stays in Domain and Application layers.", "Only validation logic.", "Only error handling logic."], de: ["Ja — sie sind die konkreteste Schicht.", "Nein — Infrastructure implementiert nur technische Belange. Geschäftslogik bleibt in Domain und Application Layers.", "Nur Validierungslogik.", "Nur Fehlerbehandlungslogik."], ru: ["Да — это самый конкретный слой.", "Нет — Infrastructure реализует только технические задачи. Бизнес-логика остаётся в Domain и Application Layers.", "Только логику валидации.", "Только логику обработки ошибок."], uk: ["Так — це найконкретніший шар.", "Ні — Infrastructure реалізує лише технічні задачі. Бізнес-логіка залишається в Domain та Application Layers.", "Лише логіку валідації.", "Лише логіку обробки помилок."] }, correctIndex: 1, explanation: { en: "A SendGridEmailService should know how to send emails via SendGrid API, not whether a user deserves a welcome email. That decision belongs in the Application/Domain.", de: "Ein SendGridEmailService sollte wissen, wie E-Mails über die SendGrid-API gesendet werden, nicht ob ein Benutzer eine Willkommens-E-Mail verdient. Diese Entscheidung gehört in Application/Domain.", ru: "SendGridEmailService должен знать, как отправлять письма через SendGrid API, а не заслуживает ли пользователь приветственного письма. Это решение принадлежит Application/Domain.", uk: "SendGridEmailService повинен знати, як надсилати листи через SendGrid API, а не чи заслуговує користувач на вітальний лист. Це рішення належить Application/Domain." } },
{ category: "Infrastructure", question: { en: "How do you test Infrastructure layer code?", de: "Wie testet man Infrastructure-Layer-Code?", ru: "Как тестировать код Infrastructure Layer?", uk: "Як тестувати код Infrastructure Layer?" }, options: { en: ["You don't — it's untestable.", "Integration tests with real or in-memory databases, TestContainers, or WireMock for external APIs.", "Only unit tests with mocks.", "Manual testing in production."], de: ["Gar nicht — es ist untestbar.", "Integrationstests mit realen oder In-Memory-Datenbanken, TestContainers oder WireMock für externe APIs.", "Nur Unit-Tests mit Mocks.", "Manuelles Testen in Produktion."], ru: ["Никак — он нетестируемый.", "Интеграционные тесты с реальными или in-memory базами данных, TestContainers или WireMock для внешних API.", "Только юнит-тесты с моками.", "Ручное тестирование в продакшене."], uk: ["Ніяк — він нетестований.", "Інтеграційні тести з реальними або in-memory базами даних, TestContainers або WireMock для зовнішніх API.", "Лише юніт-тести з моками.", "Ручне тестування в продакшені."] }, correctIndex: 1, explanation: { en: "Infrastructure code talks to real systems. Integration tests with TestContainers (real Postgres in Docker) or WebApplicationFactory are the right approach.", de: "Infrastructure-Code kommuniziert mit realen Systemen. Integrationstests mit TestContainers (echtes Postgres in Docker) oder WebApplicationFactory sind der richtige Ansatz.", ru: "Код Infrastructure взаимодействует с реальными системами. Интеграционные тесты с TestContainers (настоящий Postgres в Docker) или WebApplicationFactory — правильный подход.", uk: "Код Infrastructure взаємодіє з реальними системами. Інтеграційні тести з TestContainers (справжній Postgres у Docker) або WebApplicationFactory — правильний підхід." } },
{ category: "Infrastructure", question: { en: "What is the Repository pattern's role in Infrastructure?", de: "Welche Rolle spielt das Repository-Pattern in Infrastructure?", ru: "Какова роль паттерна Repository в Infrastructure?", uk: "Яка роль патерну Repository в Infrastructure?" }, options: { en: ["Repositories define business rules.", "Repositories encapsulate data access logic, providing a collection-like interface to the Application layer while hiding persistence details.", "Repositories replace the need for a database.", "Repositories are only for testing."], de: ["Repositories definieren Geschäftsregeln.", "Repositories kapseln Datenzugriffslogik, bieten dem Application Layer eine sammlungsähnliche Schnittstelle und verbergen Persistenzdetails.", "Repositories ersetzen die Notwendigkeit einer Datenbank.", "Repositories sind nur zum Testen."], ru: ["Репозитории определяют бизнес-правила.", "Репозитории инкапсулируют логику доступа к данным, предоставляя Application Layer интерфейс, подобный коллекции, и скрывая детали персистентности.", "Репозитории заменяют необходимость в базе данных.", "Репозитории только для тестирования."], uk: ["Репозиторії визначають бізнес-правила.", "Репозиторії інкапсулюють логіку доступу до даних, надаючи Application Layer інтерфейс, подібний до колекції, та приховуючи деталі персистентності.", "Репозиторії замінюють потребу в базі даних.", "Репозиторії лише для тестування."] }, correctIndex: 1, explanation: { en: "IOrderRepository.GetByIdAsync(id) is defined in Application. EfOrderRepository in Infrastructure implements it using DbContext, hiding EF Core from use cases.", de: "IOrderRepository.GetByIdAsync(id) ist im Application Layer definiert. EfOrderRepository in Infrastructure implementiert es mit DbContext und verbirgt EF Core vor Use Cases.", ru: "IOrderRepository.GetByIdAsync(id) определён в Application. EfOrderRepository в Infrastructure реализует его с помощью DbContext, скрывая EF Core от сценариев использования.", uk: "IOrderRepository.GetByIdAsync(id) визначений в Application. EfOrderRepository в Infrastructure реалізує його за допомогою DbContext, приховуючи EF Core від сценаріїв використання." } },
{ category: "Infrastructure", question: { en: "How should external API integrations be structured in Clean Architecture?", de: "Wie sollten externe API-Integrationen in Clean Architecture strukturiert werden?", ru: "Как структурировать интеграции с внешними API в Clean Architecture?", uk: "Як структурувати інтеграції із зовнішніми API в Clean Architecture?" }, options: { en: ["Call external APIs directly from controllers.", "Define an interface in Application (e.g., IPaymentGateway), implement it in Infrastructure (e.g., StripePaymentGateway).", "Put all API calls in the Domain layer.", "Use a single HttpClient for all APIs."], de: ["Externe APIs direkt von Controllern aufrufen.", "Ein Interface im Application Layer definieren (z.B. IPaymentGateway), im Infrastructure Layer implementieren (z.B. StripePaymentGateway).", "Alle API-Aufrufe in den Domain Layer legen.", "Einen einzigen HttpClient für alle APIs verwenden."], ru: ["Вызывать внешние API прямо из контроллеров.", "Определить интерфейс в Application (например, IPaymentGateway), реализовать в Infrastructure (например, StripePaymentGateway).", "Разместить все API-вызовы в Domain Layer.", "Использовать один HttpClient для всех API."], uk: ["Викликати зовнішні API прямо з контролерів.", "Визначити інтерфейс в Application (наприклад, IPaymentGateway), реалізувати в Infrastructure (наприклад, StripePaymentGateway).", "Розмістити всі API-виклики в Domain Layer.", "Використовувати один HttpClient для всіх API."] }, correctIndex: 1, explanation: { en: "The Application layer defines what it needs (IPaymentGateway.ChargeAsync). Infrastructure handles the HTTP details of calling Stripe. Swapping to PayPal = new implementation.", de: "Der Application Layer definiert, was er braucht (IPaymentGateway.ChargeAsync). Infrastructure handhabt die HTTP-Details des Stripe-Aufrufs. Wechsel zu PayPal = neue Implementierung.", ru: "Application Layer определяет, что ему нужно (IPaymentGateway.ChargeAsync). Infrastructure обрабатывает HTTP-детали вызова Stripe. Переход на PayPal = новая реализация.", uk: "Application Layer визначає, що йому потрібно (IPaymentGateway.ChargeAsync). Infrastructure обробляє HTTP-деталі виклику Stripe. Перехід на PayPal = нова реалізація." } },
{ category: "Infrastructure", question: { en: "Where does caching implementation belong?", de: "Wohin gehört die Caching-Implementierung?", ru: "Где должна находиться реализация кэширования?", uk: "Де повинна знаходитися реалізація кешування?" }, options: { en: ["Domain layer.", "Infrastructure layer — caching is a technical optimization. The Application layer may define an ICacheService interface.", "Presentation layer.", "In the database stored procedures."], de: ["Domain Layer.", "Infrastructure Layer — Caching ist eine technische Optimierung. Der Application Layer kann ein ICacheService-Interface definieren.", "Presentation Layer.", "In den gespeicherten Datenbankprozeduren."], ru: ["Domain Layer.", "Infrastructure Layer — кэширование является технической оптимизацией. Application Layer может определить интерфейс ICacheService.", "Presentation Layer.", "В хранимых процедурах базы данных."], uk: ["Domain Layer.", "Infrastructure Layer — кешування є технічною оптимізацією. Application Layer може визначити інтерфейс ICacheService.", "Presentation Layer.", "У збережених процедурах бази даних."] }, correctIndex: 1, explanation: { en: "Redis/MemoryCache usage is an infrastructure detail. The Application layer might use ICacheService without knowing if it's Redis, Memcached, or in-memory.", de: "Redis/MemoryCache-Nutzung ist ein Infrastrukturdetail. Der Application Layer könnte ICacheService verwenden, ohne zu wissen, ob es Redis, Memcached oder In-Memory ist.", ru: "Использование Redis/MemoryCache — инфраструктурная деталь. Application Layer может использовать ICacheService, не зная, Redis это, Memcached или in-memory.", uk: "Використання Redis/MemoryCache — інфраструктурна деталь. Application Layer може використовувати ICacheService, не знаючи, Redis це, Memcached чи in-memory." } },
{ category: "Infrastructure", question: { en: "How do you register Infrastructure services in ASP.NET Core DI?", de: "Wie registriert man Infrastructure-Services in ASP.NET Core DI?", ru: "Как зарегистрировать сервисы Infrastructure в ASP.NET Core DI?", uk: "Як зареєструвати сервіси Infrastructure в ASP.NET Core DI?" }, options: { en: ["Directly in each controller.", "Create an AddInfrastructure() extension method in the Infrastructure project, called from Program.cs.", "The Domain layer registers them.", "Services auto-register via reflection."], de: ["Direkt in jedem Controller.", "Eine AddInfrastructure()-Erweiterungsmethode im Infrastructure-Projekt erstellen, aufgerufen aus Program.cs.", "Der Domain Layer registriert sie.", "Services registrieren sich automatisch über Reflection."], ru: ["Напрямую в каждом контроллере.", "Создать метод расширения AddInfrastructure() в проекте Infrastructure, вызываемый из Program.cs.", "Domain Layer регистрирует их.", "Сервисы авторегистрируются через рефлексию."], uk: ["Напряму в кожному контролері.", "Створити метод розширення AddInfrastructure() в проєкті Infrastructure, що викликається з Program.cs.", "Domain Layer реєструє їх.", "Сервіси авторегіструються через рефлексію."] }, correctIndex: 1, explanation: { en: "Infrastructure exposes a clean extension method (services.AddInfrastructure(config)) that wires up DbContext, repositories, and external services.", de: "Infrastructure exponiert eine saubere Erweiterungsmethode (services.AddInfrastructure(config)), die DbContext, Repositories und externe Services verdrahtet.", ru: "Infrastructure предоставляет чистый метод расширения (services.AddInfrastructure(config)), подключающий DbContext, репозитории и внешние сервисы.", uk: "Infrastructure надає чистий метод розширення (services.AddInfrastructure(config)), що підключає DbContext, репозиторії та зовнішні сервіси." } },
// ===== PRESENTATION LAYER =====
{ category: "Presentation", question: { en: "What is the Presentation layer's role in Clean Architecture?", de: "Welche Rolle spielt der Presentation Layer in Clean Architecture?", ru: "Какова роль Presentation Layer в Clean Architecture?", uk: "Яка роль Presentation Layer у Clean Architecture?" }, options: { en: ["It contains the core business logic.", "It handles HTTP concerns: controllers, request/response mapping, authentication middleware, and API documentation.", "It manages database connections.", "It defines domain entities."], de: ["Er enthält die Kern-Geschäftslogik.", "Er behandelt HTTP-Belange: Controller, Request/Response-Mapping, Authentifizierungs-Middleware und API-Dokumentation.", "Er verwaltet Datenbankverbindungen.", "Er definiert Domain Entities."], ru: ["Он содержит основную бизнес-логику.", "Он обрабатывает HTTP-задачи: контроллеры, маппинг запросов/ответов, middleware аутентификации и документацию API.", "Он управляет подключениями к базе данных.", "Он определяет Domain Entities."], uk: ["Він містить основну бізнес-логіку.", "Він обробляє HTTP-задачі: контролери, маппінг запитів/відповідей, middleware автентифікації та документацію API.", "Він керує підключеннями до бази даних.", "Він визначає Domain Entities."] }, correctIndex: 1, explanation: { en: "The Presentation layer adapts the Application layer to a specific delivery mechanism (REST API, GraphQL, gRPC, CLI). It's the outermost circle.", de: "Der Presentation Layer adaptiert den Application Layer an einen spezifischen Auslieferungsmechanismus (REST API, GraphQL, gRPC, CLI). Er ist der äusserste Kreis.", ru: "Presentation Layer адаптирует Application Layer к конкретному механизму доставки (REST API, GraphQL, gRPC, CLI). Это самый внешний круг.", uk: "Presentation Layer адаптує Application Layer до конкретного механізму доставки (REST API, GraphQL, gRPC, CLI). Це найзовнішніше коло." } },
{ category: "Presentation", question: { en: "Should controllers contain business logic?", de: "Sollten Controller Geschäftslogik enthalten?", ru: "Должны ли контроллеры содержать бизнес-логику?", uk: "Чи повинні контролери містити бізнес-логіку?" }, options: { en: ["Yes — controllers are the brain of the application.", "No — controllers should be thin. They receive requests, dispatch Commands/Queries, and return responses.", "Only validation logic.", "Only error handling."], de: ["Ja — Controller sind das Gehirn der Anwendung.", "Nein — Controller sollten dünn sein. Sie empfangen Requests, dispatchen Commands/Queries und geben Responses zurück.", "Nur Validierungslogik.", "Nur Fehlerbehandlung."], ru: ["Да — контроллеры — это мозг приложения.", "Нет — контроллеры должны быть тонкими. Они принимают запросы, отправляют Commands/Queries и возвращают ответы.", "Только логику валидации.", "Только обработку ошибок."], uk: ["Так — контролери — це мозок застосунку.", "Ні — контролери повинні бути тонкими. Вони приймають запити, відправляють Commands/Queries і повертають відповіді.", "Лише логіку валідації.", "Лише обробку помилок."] }, correctIndex: 1, explanation: { en: "A thin controller: parse request -> send Command/Query via MediatR -> map result to HTTP response. That's it. All logic lives in handlers.", de: "Ein dünner Controller: Request parsen -> Command/Query über MediatR senden -> Ergebnis auf HTTP-Response mappen. Das ist alles. Alle Logik lebt in Handlern.", ru: "Тонкий контроллер: разобрать запрос -> отправить Command/Query через MediatR -> преобразовать результат в HTTP-ответ. Вот и всё. Вся логика живёт в обработчиках.", uk: "Тонкий контролер: розібрати запит -> надіслати Command/Query через MediatR -> перетворити результат у HTTP-відповідь. Ось і все. Вся логіка живе в обробниках." } },
{ category: "Presentation", question: { en: "How should API controllers handle validation errors from the Application layer?", de: "Wie sollten API-Controller Validierungsfehler vom Application Layer behandeln?", ru: "Как API-контроллеры должны обрабатывать ошибки валидации от Application Layer?", uk: "Як API-контролери повинні обробляти помилки валідації від Application Layer?" }, options: { en: ["Catch all exceptions and return 500.", "Map domain/application exceptions to appropriate HTTP status codes (400 for validation, 404 for not found, 409 for conflicts).", "Let exceptions bubble up unhandled.", "Return 200 with an error message in the body."], de: ["Alle Exceptions abfangen und 500 zurückgeben.", "Domain/Application-Exceptions auf passende HTTP-Statuscodes abbilden (400 für Validierung, 404 für nicht gefunden, 409 für Konflikte).", "Exceptions unbehandelt durchlassen.", "200 mit einer Fehlermeldung im Body zurückgeben."], ru: ["Перехватывать все исключения и возвращать 500.", "Маппить доменные/прикладные исключения на соответствующие HTTP-коды (400 для валидации, 404 для не найдено, 409 для конфликтов).", "Позволить исключениям всплывать необработанными.", "Возвращать 200 с сообщением об ошибке в теле."], uk: ["Перехоплювати всі винятки і повертати 500.", "Маппити доменні/прикладні винятки на відповідні HTTP-коди (400 для валідації, 404 для не знайдено, 409 для конфліктів).", "Дозволити виняткам спливати необробленими.", "Повертати 200 з повідомленням про помилку в тілі."] }, correctIndex: 1, explanation: { en: "A global exception handler middleware or ProblemDetails maps ValidationException -> 400, NotFoundException -> 404, etc.", de: "Eine globale Exception-Handler-Middleware oder ProblemDetails mappt ValidationException -> 400, NotFoundException -> 404 usw.", ru: "Глобальный middleware обработки исключений или ProblemDetails маппит ValidationException -> 400, NotFoundException -> 404 и т.д.", uk: "Глобальний middleware обробки винятків або ProblemDetails маппить ValidationException -> 400, NotFoundException -> 404 тощо." } },
{ category: "Presentation", question: { en: "What is the benefit of using Minimal APIs vs Controllers in Clean Architecture?", de: "Was ist der Vorteil von Minimal APIs gegenüber Controllern in Clean Architecture?", ru: "В чём преимущество Minimal APIs перед контроллерами в Clean Architecture?", uk: "У чому перевага Minimal APIs перед контролерами в Clean Architecture?" }, options: { en: ["Minimal APIs are always better.", "Both work. With CQRS/MediatR, endpoints are already thin, so Minimal APIs reduce boilerplate while Controllers provide more structure.", "Controllers are deprecated in .NET 8.", "Minimal APIs can't use dependency injection."], de: ["Minimal APIs sind immer besser.", "Beide funktionieren. Mit CQRS/MediatR sind Endpoints bereits dünn, sodass Minimal APIs Boilerplate reduzieren, während Controller mehr Struktur bieten.", "Controller sind in .NET 8 veraltet.", "Minimal APIs können keine Dependency Injection verwenden."], ru: ["Minimal APIs всегда лучше.", "Оба подхода работают. С CQRS/MediatR эндпоинты уже тонкие, поэтому Minimal APIs уменьшают шаблонный код, а контроллеры дают больше структуры.", "Контроллеры устарели в .NET 8.", "Minimal APIs не могут использовать dependency injection."], uk: ["Minimal APIs завжди кращі.", "Обидва підходи працюють. З CQRS/MediatR ендпоінти вже тонкі, тому Minimal APIs зменшують шаблонний код, а контролери дають більше структури.", "Контролери застаріли в .NET 8.", "Minimal APIs не можуть використовувати dependency injection."] }, correctIndex: 1, explanation: { en: "When handlers contain all logic, endpoints just dispatch. Minimal APIs shine here: app.MapPost('/orders', (cmd, mediator) => mediator.Send(cmd)).", de: "Wenn Handler alle Logik enthalten, dispatchen Endpoints nur. Minimal APIs glänzen hier: app.MapPost('/orders', (cmd, mediator) => mediator.Send(cmd)).", ru: "Когда обработчики содержат всю логику, эндпоинты просто диспетчеризируют. Minimal APIs блистают здесь: app.MapPost('/orders', (cmd, mediator) => mediator.Send(cmd)).", uk: "Коли обробники містять всю логіку, ендпоінти просто диспетчеризують. Minimal APIs блискають тут: app.MapPost('/orders', (cmd, mediator) => mediator.Send(cmd))." } },
{ category: "Presentation", question: { en: "Should the Presentation layer reference the Domain layer directly?", de: "Sollte der Presentation Layer direkt auf den Domain Layer verweisen?", ru: "Должен ли Presentation Layer напрямую ссылаться на Domain Layer?", uk: "Чи повинен Presentation Layer напряму посилатися на Domain Layer?" }, options: { en: ["Yes — it needs to return domain entities as JSON.", "Minimally. It should primarily work with Application layer DTOs. Direct domain entity exposure leaks internal structure.", "Never under any circumstances.", "Only for reading, never for writing."], de: ["Ja — er muss Domain Entities als JSON zurückgeben.", "Minimal. Er sollte hauptsächlich mit Application-Layer-DTOs arbeiten. Direkte Domain-Entity-Exponierung legt die interne Struktur offen.", "Niemals unter keinen Umständen.", "Nur zum Lesen, nie zum Schreiben."], ru: ["Да — ему нужно возвращать Domain Entities как JSON.", "Минимально. Он должен работать преимущественно с DTO Application Layer. Прямое раскрытие Domain Entity выдаёт внутреннюю структуру.", "Никогда ни при каких обстоятельствах.", "Только для чтения, никогда для записи."], uk: ["Так — йому потрібно повертати Domain Entities як JSON.", "Мінімально. Він повинен працювати переважно з DTO Application Layer. Пряме розкриття Domain Entity виставляє внутрішню структуру.", "Ніколи за жодних обставин.", "Лише для читання, ніколи для запису."] }, correctIndex: 1, explanation: { en: "The Presentation layer sends Commands/Queries to the Application layer and receives DTOs back. Exposing Domain entities couples the API contract to internal models.", de: "Der Presentation Layer sendet Commands/Queries an den Application Layer und erhält DTOs zurück. Die Exponierung von Domain Entities koppelt den API-Vertrag an interne Modelle.", ru: "Presentation Layer отправляет Commands/Queries в Application Layer и получает DTO обратно. Раскрытие Domain Entities связывает API-контракт с внутренними моделями.", uk: "Presentation Layer надсилає Commands/Queries до Application Layer і отримує DTO назад. Розкриття Domain Entities зв'язує API-контракт із внутрішніми моделями." } },
// ===== CQRS & PATTERNS =====
{ category: "CQRS", question: { en: "What is the main benefit of separating Commands and Queries?", de: "Was ist der Hauptvorteil der Trennung von Commands und Queries?", ru: "В чём главное преимущество разделения Commands и Queries?", uk: "У чому головна перевага розділення Commands та Queries?" }, options: { en: ["It doubles the number of classes.", "Read and write models can be independently optimized, scaled, and maintained.", "It's required by Entity Framework.", "Queries are faster than commands."], de: ["Es verdoppelt die Anzahl der Klassen.", "Lese- und Schreibmodelle können unabhängig optimiert, skaliert und gewartet werden.", "Es wird von Entity Framework verlangt.", "Queries sind schneller als Commands."], ru: ["Это удваивает количество классов.", "Модели чтения и записи можно независимо оптимизировать, масштабировать и поддерживать.", "Это требование Entity Framework.", "Queries быстрее, чем Commands."], uk: ["Це подвоює кількість класів.", "Моделі читання та запису можна незалежно оптимізувати, масштабувати та підтримувати.", "Це вимога Entity Framework.", "Queries швидші за Commands."] }, correctIndex: 1, explanation: { en: "Reads might use Dapper with denormalized views for speed. Writes might use rich domain models with validation. Separate concerns = independent optimization.", de: "Lesen könnte Dapper mit denormalisierten Views für Geschwindigkeit verwenden. Schreiben könnte reiche Domain-Modelle mit Validierung verwenden. Getrennte Belange = unabhängige Optimierung.", ru: "Чтение может использовать Dapper с денормализованными представлениями для скорости. Запись может использовать богатые доменные модели с валидацией. Разделение забот = независимая оптимизация.", uk: "Читання може використовувати Dapper з денормалізованими представленнями для швидкості. Запис може використовувати багаті доменні моделі з валідацією. Розділення турбот = незалежна оптимізація." } },
{ category: "CQRS", question: { en: "Do you always need separate read and write databases for CQRS?", de: "Braucht man für CQRS immer getrennte Lese- und Schreibdatenbanken?", ru: "Всегда ли нужны отдельные базы данных для чтения и записи при CQRS?", uk: "Чи завжди потрібні окремі бази даних для читання та запису при CQRS?" }, options: { en: ["Yes — CQRS requires two databases.", "No — CQRS is about separating the code paths. You can use one database with different query strategies for reads vs writes.", "Only with Event Sourcing.", "Only in microservices."], de: ["Ja — CQRS erfordert zwei Datenbanken.", "Nein — CQRS geht um die Trennung der Code-Pfade. Man kann eine Datenbank mit verschiedenen Abfragestrategien für Lesen und Schreiben verwenden.", "Nur mit Event Sourcing.", "Nur in Microservices."], ru: ["Да — CQRS требует две базы данных.", "Нет — CQRS — это разделение путей кода. Можно использовать одну базу данных с разными стратегиями запросов для чтения и записи.", "Только с Event Sourcing.", "Только в микросервисах."], uk: ["Так — CQRS вимагає дві бази даних.", "Ні — CQRS — це розділення шляхів коду. Можна використовувати одну базу даних з різними стратегіями запитів для читання та запису.", "Лише з Event Sourcing.", "Лише в мікросервісах."] }, correctIndex: 1, explanation: { en: "CQRS at its simplest means different classes for reading and writing. Separate databases are an optional optimization for extreme scale.", de: "CQRS in seiner einfachsten Form bedeutet verschiedene Klassen für Lesen und Schreiben. Getrennte Datenbanken sind eine optionale Optimierung für extreme Skalierung.", ru: "CQRS в простейшем виде означает разные классы для чтения и записи. Отдельные базы данных — необязательная оптимизация для экстремального масштаба.", uk: "CQRS у найпростішому вигляді означає різні класи для читання та запису. Окремі бази даних — необов'язкова оптимізація для екстремального масштабу." } },
{ category: "CQRS", question: { en: "How does CQRS relate to Event Sourcing?", de: "Wie hängt CQRS mit Event Sourcing zusammen?", ru: "Как CQRS соотносится с Event Sourcing?", uk: "Як CQRS співвідноситься з Event Sourcing?" }, options: { en: ["They're the same thing.", "They're complementary but independent. CQRS separates reads/writes. Event Sourcing stores state as events. They often pair well together.", "Event Sourcing replaces CQRS.", "CQRS requires Event Sourcing."], de: ["Sie sind dasselbe.", "Sie sind komplementär, aber unabhängig. CQRS trennt Lesen/Schreiben. Event Sourcing speichert Zustand als Events. Sie passen oft gut zusammen.", "Event Sourcing ersetzt CQRS.", "CQRS erfordert Event Sourcing."], ru: ["Это одно и то же.", "Они взаимодополняющие, но независимые. CQRS разделяет чтение/запись. Event Sourcing хранит состояние как события. Они часто хорошо сочетаются.", "Event Sourcing заменяет CQRS.", "CQRS требует Event Sourcing."], uk: ["Це одне й те саме.", "Вони взаємодоповнюючі, але незалежні. CQRS розділяє читання/запис. Event Sourcing зберігає стан як події. Вони часто добре поєднуються.", "Event Sourcing замінює CQRS.", "CQRS вимагає Event Sourcing."] }, correctIndex: 1, explanation: { en: "Event Sourcing makes the write model append-only events. CQRS provides a separate read model (projection) built from those events for fast querying.", de: "Event Sourcing macht das Schreibmodell zu Append-Only-Events. CQRS bietet ein separates Lesemodell (Projektion), das aus diesen Events für schnelle Abfragen aufgebaut wird.", ru: "Event Sourcing делает модель записи append-only событиями. CQRS предоставляет отдельную модель чтения (проекцию), построенную из этих событий для быстрых запросов.", uk: "Event Sourcing робить модель запису append-only подіями. CQRS надає окрему модель читання (проєкцію), побудовану з цих подій для швидких запитів." } },
{ category: "CQRS", question: { en: "What is eventual consistency in the context of CQRS with separate databases?", de: "Was ist Eventual Consistency im Kontext von CQRS mit getrennten Datenbanken?", ru: "Что такое eventual consistency в контексте CQRS с отдельными базами данных?", uk: "Що таке eventual consistency в контексті CQRS з окремими базами даних?" }, options: { en: ["Data is always consistent.", "After a write, the read model may be briefly out of date until the projection is updated, which is acceptable in many scenarios.", "The system is never consistent.", "Eventual consistency means data loss."], de: ["Daten sind immer konsistent.", "Nach einem Schreibvorgang kann das Lesemodell kurzzeitig veraltet sein, bis die Projektion aktualisiert wird, was in vielen Szenarien akzeptabel ist.", "Das System ist nie konsistent.", "Eventual Consistency bedeutet Datenverlust."], ru: ["Данные всегда согласованы.", "После записи модель чтения может кратковременно устареть, пока проекция не обновится, что допустимо во многих сценариях.", "Система никогда не согласована.", "Eventual Consistency означает потерю данных."], uk: ["Дані завжди узгоджені.", "Після запису модель читання може короткочасно застаріти, поки проєкція не оновиться, що допустимо в багатьох сценаріях.", "Система ніколи не узгоджена.", "Eventual Consistency означає втрату даних."] }, correctIndex: 1, explanation: { en: "When a command updates the write DB, an event updates the read DB asynchronously. There's a small window where reads show stale data — often milliseconds.", de: "Wenn ein Command die Schreib-DB aktualisiert, aktualisiert ein Event die Lese-DB asynchron. Es gibt ein kleines Zeitfenster mit veralteten Daten — oft Millisekunden.", ru: "Когда Command обновляет БД записи, событие обновляет БД чтения асинхронно. Есть небольшое окно с устаревшими данными — часто миллисекунды.", uk: "Коли Command оновлює БД запису, подія оновлює БД читання асинхронно. Є невелике вікно з застарілими даними — часто мілісекунди." } },
{ category: "DDD", question: { en: "What is a Bounded Context?", de: "Was ist ein Bounded Context?", ru: "Что такое Bounded Context?", uk: "Що таке Bounded Context?" }, options: { en: ["A database schema boundary.", "A logical boundary where a particular domain model applies. Different contexts may have different meanings for the same term.", "A C# namespace.", "A Docker container boundary."], de: ["Eine Datenbankschema-Grenze.", "Eine logische Grenze, in der ein bestimmtes Domänenmodell gilt. Verschiedene Kontexte können unterschiedliche Bedeutungen für denselben Begriff haben.", "Ein C#-Namespace.", "Eine Docker-Container-Grenze."], ru: ["Граница схемы базы данных.", "Логическая граница, где применяется определённая доменная модель. Разные контексты могут иметь разные значения одного и того же термина.", "Пространство имён C#.", "Граница Docker-контейнера."], uk: ["Межа схеми бази даних.", "Логічна межа, де застосовується певна доменна модель. Різні контексти можуть мати різні значення одного й того ж терміну.", "Простір імен C#.", "Межа Docker-контейнера."] }, correctIndex: 1, explanation: { en: "'Customer' in Sales context has orders and payment info. 'Customer' in Shipping context has addresses and delivery preferences. Same word, different models.", de: "'Kunde' im Sales-Kontext hat Bestellungen und Zahlungsinformationen. 'Kunde' im Shipping-Kontext hat Adressen und Lieferpräferenzen. Gleiches Wort, verschiedene Modelle.", ru: "«Customer» в контексте Sales имеет заказы и платёжную информацию. «Customer» в контексте Shipping имеет адреса и предпочтения доставки. Одно слово, разные модели.", uk: "«Customer» в контексті Sales має замовлення та платіжну інформацію. «Customer» в контексті Shipping має адреси та уподобання доставки. Одне слово, різні моделі." } },
{ category: "DDD", question: { en: "How do Bounded Contexts communicate in Clean Architecture?", de: "Wie kommunizieren Bounded Contexts in Clean Architecture?", ru: "Как Bounded Contexts взаимодействуют в Clean Architecture?", uk: "Як Bounded Contexts взаємодіють у Clean Architecture?" }, options: { en: ["Direct database sharing.", "Through well-defined contracts: domain events, message queues, or anti-corruption layers that translate between contexts.", "Shared entity classes.", "By referencing each other's DbContexts."], de: ["Direkter Datenbankzugriff.", "Über klar definierte Verträge: Domain Events, Message Queues oder Anti-Corruption Layer, die zwischen Kontexten übersetzen.", "Gemeinsame Entity-Klassen.", "Durch Referenzierung der DbContexts des anderen."], ru: ["Прямое разделение базы данных.", "Через чётко определённые контракты: Domain Events, очереди сообщений или Anti-Corruption Layer, переводящие между контекстами.", "Общие классы Entity.", "Через ссылки на DbContext друг друга."], uk: ["Пряме розділення бази даних.", "Через чітко визначені контракти: Domain Events, черги повідомлень або Anti-Corruption Layer, що перекладають між контекстами.", "Спільні класи Entity.", "Через посилання на DbContext один одного."] }, correctIndex: 1, explanation: { en: "An Anti-Corruption Layer translates between contexts. OrderPlaced event in Sales context becomes IncomingShipmentRequest in Shipping context.", de: "Ein Anti-Corruption Layer übersetzt zwischen Kontexten. OrderPlaced-Event im Sales-Kontext wird zu IncomingShipmentRequest im Shipping-Kontext.", ru: "Anti-Corruption Layer переводит между контекстами. Событие OrderPlaced в контексте Sales становится IncomingShipmentRequest в контексте Shipping.", uk: "Anti-Corruption Layer перекладає між контекстами. Подія OrderPlaced в контексті Sales стає IncomingShipmentRequest в контексті Shipping." } },
{ category: "DDD", question: { en: "What is an Anti-Corruption Layer?", de: "Was ist ein Anti-Corruption Layer?", ru: "Что такое Anti-Corruption Layer?", uk: "Що таке Anti-Corruption Layer?" }, options: { en: ["A firewall configuration.", "A translation layer that prevents one bounded context's model from leaking into another, preserving each context's purity.", "A middleware that blocks SQL injection.", "An ORM mapping layer."], de: ["Eine Firewall-Konfiguration.", "Eine Übersetzungsschicht, die verhindert, dass das Modell eines Bounded Context in einen anderen einfliesst, und die Reinheit jedes Kontexts bewahrt.", "Eine Middleware, die SQL Injection blockiert.", "Eine ORM-Mapping-Schicht."], ru: ["Конфигурация файрвола.", "Слой трансляции, предотвращающий утечку модели одного Bounded Context в другой, сохраняя чистоту каждого контекста.", "Middleware, блокирующее SQL-инъекции.", "Слой ORM-маппинга."], uk: ["Конфігурація файрвола.", "Шар трансляції, що запобігає витіканню моделі одного Bounded Context в інший, зберігаючи чистоту кожного контексту.", "Middleware, що блокує SQL-ін'єкції.", "Шар ORM-маппінгу."] }, correctIndex: 1, explanation: { en: "When integrating with a legacy system, the ACL translates legacy data models into your clean domain models, preventing corruption of your domain.", de: "Bei der Integration mit einem Legacy-System übersetzt der ACL Legacy-Datenmodelle in saubere Domain-Modelle und verhindert die Korruption der Domäne.", ru: "При интеграции с legacy-системой ACL переводит legacy-модели данных в ваши чистые доменные модели, предотвращая повреждение домена.", uk: "При інтеграції з legacy-системою ACL перекладає legacy-моделі даних у ваші чисті доменні моделі, запобігаючи пошкодженню домену." } },
// ===== PROJECT STRUCTURE & TESTING =====
