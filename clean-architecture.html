{ category: "Project Structure", question: { en: "What is the typical .NET solution structure for Clean Architecture?", de: "Wie sieht die typische .NET-Lösungsstruktur für Clean Architecture aus?", ru: "Какова типичная структура .NET-решения для Clean Architecture?", uk: "Яка типова структура .NET-рішення для Clean Architecture?" }, options: { en: ["One big project with folders.", "Separate projects: Domain, Application, Infrastructure, Presentation (API), plus test projects.", "Just Controllers and Models folders.", "Microservices in separate repositories."], de: ["Ein grosses Projekt mit Ordnern.", "Separate Projekte: Domain, Application, Infrastructure, Presentation (API), plus Testprojekte.", "Nur Controller- und Models-Ordner.", "Microservices in separaten Repositories."], ru: ["Один большой проект с папками.", "Отдельные проекты: Domain, Application, Infrastructure, Presentation (API), плюс тестовые проекты.", "Просто папки Controllers и Models.", "Микросервисы в отдельных репозиториях."], uk: ["Один великий проєкт з папками.", "Окремі проєкти: Domain, Application, Infrastructure, Presentation (API), плюс тестові проєкти.", "Просто папки Controllers та Models.", "Мікросервіси в окремих репозиторіях."] }, correctIndex: 1, explanation: { en: "Separate projects enforce dependency rules at compile time. Domain.csproj has no project references. Application references only Domain. Infrastructure references Application.", de: "Separate Projekte erzwingen Dependency Rules zur Kompilierzeit. Domain.csproj hat keine Projektreferenzen. Application referenziert nur Domain. Infrastructure referenziert Application.", ru: "Отдельные проекты обеспечивают правила зависимостей на этапе компиляции. Domain.csproj не имеет ссылок на проекты. Application ссылается только на Domain. Infrastructure ссылается на Application.", uk: "Окремі проєкти забезпечують правила залежностей на етапі компіляції. Domain.csproj не має посилань на проєкти. Application посилається лише на Domain. Infrastructure посилається на Application." } },
{ category: "Project Structure", question: { en: "Why use separate .csproj files for each layer?", de: "Warum separate .csproj-Dateien für jede Schicht verwenden?", ru: "Зачем использовать отдельные файлы .csproj для каждого слоя?", uk: "Навіщо використовувати окремі файли .csproj для кожного шару?" }, options: { en: ["To increase build time.", "The compiler enforces dependency rules: if Domain.csproj doesn't reference Infrastructure.csproj, no developer can accidentally violate the dependency rule.", "It's a Microsoft requirement.", "For NuGet package management only."], de: ["Um die Build-Zeit zu erhöhen.", "Der Compiler erzwingt Dependency Rules: Wenn Domain.csproj Infrastructure.csproj nicht referenziert, kann kein Entwickler versehentlich die Dependency Rule verletzen.", "Es ist eine Microsoft-Anforderung.", "Nur für NuGet-Paketverwaltung."], ru: ["Чтобы увеличить время сборки.", "Компилятор обеспечивает правила зависимостей: если Domain.csproj не ссылается на Infrastructure.csproj, ни один разработчик не может случайно нарушить правило зависимостей.", "Это требование Microsoft.", "Только для управления NuGet-пакетами."], uk: ["Щоб збільшити час збірки.", "Компілятор забезпечує правила залежностей: якщо Domain.csproj не посилається на Infrastructure.csproj, жоден розробник не може випадково порушити правило залежностей.", "Це вимога Microsoft.", "Лише для управління NuGet-пакетами."] }, correctIndex: 1, explanation: { en: "Project references are one-directional. This turns architectural rules into compiler errors — the strongest form of enforcement.", de: "Projektreferenzen sind unidirektional. Dies macht architektonische Regeln zu Kompilierfehlern — die stärkste Form der Durchsetzung.", ru: "Ссылки проектов однонаправлены. Это превращает архитектурные правила в ошибки компиляции — самая строгая форма обеспечения.", uk: "Посилання проєктів однонаправлені. Це перетворює архітектурні правила на помилки компіляції — найстрогіша форма забезпечення." } },
{ category: "Testing", question: { en: "How do you unit test the Application layer?", de: "Wie führt man Unit-Tests für den Application Layer durch?", ru: "Как проводить юнит-тестирование Application Layer?", uk: "Як проводити юніт-тестування Application Layer?" }, options: { en: ["You don't — only test controllers.", "Mock the repository interfaces and external service interfaces, then test CommandHandlers and QueryHandlers in isolation.", "Use Selenium browser tests.", "Only integration tests are valid."], de: ["Gar nicht — nur Controller testen.", "Repository-Interfaces und externe Service-Interfaces mocken, dann CommandHandlers und QueryHandlers isoliert testen.", "Selenium-Browser-Tests verwenden.", "Nur Integrationstests sind gültig."], ru: ["Никак — тестируйте только контроллеры.", "Мокировать интерфейсы репозиториев и внешних сервисов, затем тестировать CommandHandlers и QueryHandlers изолированно.", "Использовать Selenium-тесты в браузере.", "Только интеграционные тесты валидны."], uk: ["Ніяк — тестуйте лише контролери.", "Мокувати інтерфейси репозиторіїв та зовнішніх сервісів, потім тестувати CommandHandlers та QueryHandlers ізольовано.", "Використовувати Selenium-тести у браузері.", "Лише інтеграційні тести валідні."] }, correctIndex: 1, explanation: { en: "Because the Application layer depends on interfaces (DIP), you mock them. Test: given this command and these mocked dependencies, verify the expected behavior.", de: "Da der Application Layer von Interfaces abhängt (DIP), mockt man diese. Test: Bei diesem Command und diesen gemockten Abhängigkeiten das erwartete Verhalten verifizieren.", ru: "Поскольку Application Layer зависит от интерфейсов (DIP), их мокируют. Тест: при данной команде и данных замоканных зависимостях проверить ожидаемое поведение.", uk: "Оскільки Application Layer залежить від інтерфейсів (DIP), їх мокують. Тест: при даній команді та даних замоканих залежностях перевірити очікувану поведінку." } },
{ category: "Testing", question: { en: "How do you test Domain layer entities?", de: "Wie testet man Domain-Layer-Entities?", ru: "Как тестировать Entity в Domain Layer?", uk: "Як тестувати Entity в Domain Layer?" }, options: { en: ["With integration tests against the database.", "Pure unit tests with no mocks needed — domain entities have no external dependencies.", "With Postman API tests.", "Domain entities don't need testing."], de: ["Mit Integrationstests gegen die Datenbank.", "Reine Unit-Tests ohne Mocks — Domain Entities haben keine externen Abhängigkeiten.", "Mit Postman-API-Tests.", "Domain Entities müssen nicht getestet werden."], ru: ["Интеграционными тестами с базой данных.", "Чистые юнит-тесты без моков — Domain Entities не имеют внешних зависимостей.", "Postman API-тестами.", "Domain Entities не нуждаются в тестировании."], uk: ["Інтеграційними тестами з базою даних.", "Чисті юніт-тести без моків — Domain Entities не мають зовнішніх залежностей.", "Postman API-тестами.", "Domain Entities не потребують тестування."] }, correctIndex: 1, explanation: { en: "Domain entities are pure C# with zero dependencies. Test them directly: new Order() -> order.AddItem(item) -> Assert.Equal(expectedTotal, order.Total).", de: "Domain Entities sind reines C# ohne Abhängigkeiten. Direkt testen: new Order() -> order.AddItem(item) -> Assert.Equal(expectedTotal, order.Total).", ru: "Domain Entities — чистый C# без зависимостей. Тестируйте напрямую: new Order() -> order.AddItem(item) -> Assert.Equal(expectedTotal, order.Total).", uk: "Domain Entities — чистий C# без залежностей. Тестуйте напряму: new Order() -> order.AddItem(item) -> Assert.Equal(expectedTotal, order.Total)." } },
{ category: "Testing", question: { en: "What is the Testing Pyramid in Clean Architecture?", de: "Was ist die Testpyramide in Clean Architecture?", ru: "Что такое Пирамида тестирования в Clean Architecture?", uk: "Що таке Піраміда тестування у Clean Architecture?" }, options: { en: ["A pyramid-shaped test file.", "Many fast unit tests (Domain + Application), fewer integration tests (Infrastructure), and very few end-to-end tests (full API).", "Equal numbers of all test types.", "Only integration tests matter."], de: ["Eine pyramidenförmige Testdatei.", "Viele schnelle Unit-Tests (Domain + Application), weniger Integrationstests (Infrastructure) und sehr wenige End-to-End-Tests (vollständige API).", "Gleiche Anzahl aller Testtypen.", "Nur Integrationstests sind wichtig."], ru: ["Файл теста в форме пирамиды.", "Много быстрых юнит-тестов (Domain + Application), меньше интеграционных тестов (Infrastructure) и очень мало end-to-end-тестов (полный API).", "Одинаковое количество всех типов тестов.", "Важны только интеграционные тесты."], uk: ["Файл тесту у формі піраміди.", "Багато швидких юніт-тестів (Domain + Application), менше інтеграційних тестів (Infrastructure) і дуже мало end-to-end-тестів (повний API).", "Однакова кількість усіх типів тестів.", "Важливі лише інтеграційні тести."] }, correctIndex: 1, explanation: { en: "Unit tests are fast and catch logic errors. Integration tests verify infrastructure works. E2E tests verify the full flow. More units, fewer E2E.", de: "Unit-Tests sind schnell und finden Logikfehler. Integrationstests verifizieren, dass die Infrastruktur funktioniert. E2E-Tests prüfen den vollständigen Ablauf. Mehr Units, weniger E2E.", ru: "Юнит-тесты быстры и ловят ошибки логики. Интеграционные тесты проверяют работу инфраструктуры. E2E-тесты проверяют полный поток. Больше юнитов, меньше E2E.", uk: "Юніт-тести швидкі та ловлять помилки логіки. Інтеграційні тести перевіряють роботу інфраструктури. E2E-тести перевіряють повний потік. Більше юнітів, менше E2E." } },
// ===== ADVANCED TOPICS =====
{ category: "Advanced", question: { en: "What is the Specification pattern and how does it relate to Clean Architecture?", de: "Was ist das Specification-Pattern und wie hängt es mit Clean Architecture zusammen?", ru: "Что такое паттерн Specification и как он связан с Clean Architecture?", uk: "Що таке патерн Specification і як він пов'язаний з Clean Architecture?" }, options: { en: ["It's a documentation standard.", "A pattern where business query rules are encapsulated in the Domain layer as reusable Specification objects, keeping query logic out of repositories.", "It's another name for the Repository pattern.", "It defines API specifications like OpenAPI."], de: ["Es ist ein Dokumentationsstandard.", "Ein Pattern, bei dem geschäftliche Abfrageregeln als wiederverwendbare Specification-Objekte im Domain Layer gekapselt werden, wodurch Abfragelogik aus Repositories herausgehalten wird.", "Es ist ein anderer Name für das Repository-Pattern.", "Es definiert API-Spezifikationen wie OpenAPI."], ru: ["Это стандарт документации.", "Паттерн, где бизнес-правила запросов инкапсулируются в Domain Layer как переиспользуемые Specification-объекты, сохраняя логику запросов вне репозиториев.", "Другое название паттерна Repository.", "Он определяет спецификации API, такие как OpenAPI."], uk: ["Це стандарт документації.", "Патерн, де бізнес-правила запитів інкапсулюються в Domain Layer як перевикористовувані Specification-об'єкти, зберігаючи логіку запитів поза репозиторіями.", "Інша назва патерну Repository.", "Він визначає специфікації API, такі як OpenAPI."] }, correctIndex: 1, explanation: { en: "Instead of repository.GetActiveOrdersForCustomer(id), you pass a specification: repository.List(new ActiveOrdersForCustomerSpec(id)). The rule lives in the Domain.", de: "Anstatt repository.GetActiveOrdersForCustomer(id) übergibt man eine Specification: repository.List(new ActiveOrdersForCustomerSpec(id)). Die Regel lebt in der Domäne.", ru: "Вместо repository.GetActiveOrdersForCustomer(id) передаётся спецификация: repository.List(new ActiveOrdersForCustomerSpec(id)). Правило живёт в домене.", uk: "Замість repository.GetActiveOrdersForCustomer(id) передається специфікація: repository.List(new ActiveOrdersForCustomerSpec(id)). Правило живе в домені." } },
{ category: "Advanced", question: { en: "How does Clean Architecture handle cross-cutting concerns like logging?", de: "Wie geht Clean Architecture mit querschnittlichen Belangen wie Logging um?", ru: "Как Clean Architecture обрабатывает сквозные задачи, такие как логирование?", uk: "Як Clean Architecture обробляє наскрізні задачі, такі як логування?" }, options: { en: ["Add logging to every method manually.", "Use decorators, middleware, or MediatR pipeline behaviors to add logging transparently without polluting business logic.", "Logging violates Clean Architecture.", "Only log in the Infrastructure layer."], de: ["Logging manuell zu jeder Methode hinzufügen.", "Decorators, Middleware oder MediatR Pipeline Behaviors verwenden, um Logging transparent hinzuzufügen, ohne Geschäftslogik zu verschmutzen.", "Logging verletzt Clean Architecture.", "Nur im Infrastructure Layer loggen."], ru: ["Добавлять логирование в каждый метод вручную.", "Использовать декораторы, middleware или MediatR Pipeline Behaviors для прозрачного добавления логирования без загрязнения бизнес-логики.", "Логирование нарушает Clean Architecture.", "Логировать только в Infrastructure Layer."], uk: ["Додавати логування до кожного методу вручну.", "Використовувати декоратори, middleware або MediatR Pipeline Behaviors для прозорого додавання логування без забруднення бізнес-логіки.", "Логування порушує Clean Architecture.", "Логувати лише в Infrastructure Layer."] }, correctIndex: 1, explanation: { en: "A LoggingBehavior<TRequest, TResponse> in MediatR logs every command/query automatically. Business code never calls ILogger directly.", de: "Ein LoggingBehavior<TRequest, TResponse> in MediatR loggt jeden Command/Query automatisch. Geschäftscode ruft niemals ILogger direkt auf.", ru: "LoggingBehavior<TRequest, TResponse> в MediatR автоматически логирует каждый Command/Query. Бизнес-код никогда не вызывает ILogger напрямую.", uk: "LoggingBehavior<TRequest, TResponse> в MediatR автоматично логує кожен Command/Query. Бізнес-код ніколи не викликає ILogger напряму." } },
{ category: "Advanced", question: { en: "What is the Outbox pattern?", de: "Was ist das Outbox-Pattern?", ru: "Что такое паттерн Outbox?", uk: "Що таке патерн Outbox?" }, options: { en: ["A pattern for email delivery.", "A pattern ensuring domain events and database changes are atomically consistent — events are stored in an outbox table within the same transaction.", "A UI component pattern.", "A Git branching strategy."], de: ["Ein Pattern für E-Mail-Zustellung.", "Ein Pattern, das sicherstellt, dass Domain Events und Datenbankänderungen atomar konsistent sind — Events werden in einer Outbox-Tabelle innerhalb derselben Transaktion gespeichert.", "Ein UI-Komponenten-Pattern.", "Eine Git-Branching-Strategie."], ru: ["Паттерн доставки электронной почты.", "Паттерн, обеспечивающий атомарную согласованность Domain Events и изменений базы данных — события сохраняются в таблице outbox в той же транзакции.", "Паттерн UI-компонентов.", "Стратегия ветвления Git."], uk: ["Патерн доставки електронної пошти.", "Патерн, що забезпечує атомарну узгодженість Domain Events та змін бази даних — події зберігаються в таблиці outbox у тій самій транзакції.", "Патерн UI-компонентів.", "Стратегія гілкування Git."] }, correctIndex: 1, explanation: { en: "Without Outbox: save order + publish event. If publish fails, the order exists but no event fires. With Outbox: both are in one DB transaction; a background job dispatches events.", de: "Ohne Outbox: Bestellung speichern + Event publizieren. Wenn das Publizieren fehlschlägt, existiert die Bestellung, aber kein Event wird ausgelöst. Mit Outbox: beides in einer DB-Transaktion; ein Background-Job dispatcht Events.", ru: "Без Outbox: сохранить заказ + опубликовать событие. Если публикация не удастся, заказ существует, но событие не срабатывает. С Outbox: оба действия в одной транзакции БД; фоновое задание рассылает события.", uk: "Без Outbox: зберегти замовлення + опублікувати подію. Якщо публікація не вдасться, замовлення існує, але подія не спрацьовує. З Outbox: обидві дії в одній транзакції БД; фонове завдання розсилає події." } },
{ category: "Advanced", question: { en: "Should you use Clean Architecture for every project?", de: "Sollte man Clean Architecture für jedes Projekt verwenden?", ru: "Стоит ли использовать Clean Architecture для каждого проекта?", uk: "Чи варто використовувати Clean Architecture для кожного проєкту?" }, options: { en: ["Yes — always.", "No — it's best for complex domains with significant business logic. Simple CRUD apps may be over-engineered by it.", "Only for microservices.", "Only for projects with more than 10 developers."], de: ["Ja — immer.", "Nein — es eignet sich am besten für komplexe Domänen mit signifikanter Geschäftslogik. Einfache CRUD-Apps können damit überentwickelt werden.", "Nur für Microservices.", "Nur für Projekte mit mehr als 10 Entwicklern."], ru: ["Да — всегда.", "Нет — лучше всего подходит для сложных доменов со значительной бизнес-логикой. Простые CRUD-приложения могут быть переусложнены.", "Только для микросервисов.", "Только для проектов с более чем 10 разработчиками."], uk: ["Так — завжди.", "Ні — найкраще підходить для складних доменів зі значною бізнес-логікою. Прості CRUD-застосунки можуть бути переускладнені.", "Лише для мікросервісів.", "Лише для проєктів з більш ніж 10 розробниками."] }, correctIndex: 1, explanation: { en: "Clean Architecture adds layers and complexity. A simple API with CRUD operations doesn't need 4 projects. Match the architecture to the problem's complexity.", de: "Clean Architecture fügt Schichten und Komplexität hinzu. Eine einfache API mit CRUD-Operationen braucht keine 4 Projekte. Die Architektur an die Problemkomplexität anpassen.", ru: "Clean Architecture добавляет слои и сложность. Простому API с CRUD-операциями не нужно 4 проекта. Подбирайте архитектуру под сложность задачи.", uk: "Clean Architecture додає шари та складність. Простому API з CRUD-операціями не потрібно 4 проєкти. Підбирайте архітектуру під складність задачі." } },
{ category: "Advanced", question: { en: "How do you handle file uploads in Clean Architecture?", de: "Wie geht man mit Datei-Uploads in Clean Architecture um?", ru: "Как обрабатывать загрузку файлов в Clean Architecture?", uk: "Як обробляти завантаження файлів у Clean Architecture?" }, options: { en: ["Save files directly in the controller.", "Controller receives the file -> passes a Stream/byte[] in a Command -> Application handler calls IFileStorage -> Infrastructure implements with Azure Blob/S3.", "Store files in the Domain entity.", "Base64 encode files in the database."], de: ["Dateien direkt im Controller speichern.", "Controller empfängt die Datei -> übergibt einen Stream/byte[] in einem Command -> Application-Handler ruft IFileStorage auf -> Infrastructure implementiert mit Azure Blob/S3.", "Dateien in der Domain Entity speichern.", "Dateien Base64-kodiert in der Datenbank speichern."], ru: ["Сохранять файлы прямо в контроллере.", "Controller получает файл -> передаёт Stream/byte[] в Command -> обработчик Application вызывает IFileStorage -> Infrastructure реализует с Azure Blob/S3.", "Хранить файлы в Domain Entity.", "Кодировать файлы в Base64 в базе данных."], uk: ["Зберігати файли прямо в контролері.", "Controller отримує файл -> передає Stream/byte[] в Command -> обробник Application викликає IFileStorage -> Infrastructure реалізує з Azure Blob/S3.", "Зберігати файли в Domain Entity.", "Кодувати файли в Base64 в базі даних."] }, correctIndex: 1, explanation: { en: "The Application layer defines IFileStorage. Infrastructure implements it. The Domain only stores a file reference (URL/path), not the file itself.", de: "Der Application Layer definiert IFileStorage. Infrastructure implementiert es. Die Domäne speichert nur eine Dateireferenz (URL/Pfad), nicht die Datei selbst.", ru: "Application Layer определяет IFileStorage. Infrastructure реализует его. Домен хранит только ссылку на файл (URL/путь), а не сам файл.", uk: "Application Layer визначає IFileStorage. Infrastructure реалізує його. Домен зберігає лише посилання на файл (URL/шлях), а не сам файл." } },
{ category: "Advanced", question: { en: "What is the difference between Clean Architecture and Hexagonal (Ports & Adapters)?", de: "Was ist der Unterschied zwischen Clean Architecture und Hexagonal (Ports & Adapters)?", ru: "В чём разница между Clean Architecture и Hexagonal (Ports & Adapters)?", uk: "У чому різниця між Clean Architecture та Hexagonal (Ports & Adapters)?" }, options: { en: ["They're completely different architectures.", "They share the same core idea (dependency inversion, domain at center) but differ in terminology: Ports = interfaces, Adapters = implementations.", "Hexagonal is outdated.", "Clean Architecture doesn't use interfaces."], de: ["Sie sind völlig verschiedene Architekturen.", "Sie teilen dieselbe Kernidee (Dependency Inversion, Domäne im Zentrum), unterscheiden sich aber in der Terminologie: Ports = Interfaces, Adapters = Implementierungen.", "Hexagonal ist veraltet.", "Clean Architecture verwendet keine Interfaces."], ru: ["Это совершенно разные архитектуры.", "Они разделяют одну основную идею (инверсия зависимостей, домен в центре), но отличаются терминологией: Ports = интерфейсы, Adapters = реализации.", "Hexagonal устарела.", "Clean Architecture не использует интерфейсы."], uk: ["Це абсолютно різні архітектури.", "Вони розділяють одну основну ідею (інверсія залежностей, домен у центрі), але відрізняються термінологією: Ports = інтерфейси, Adapters = реалізації.", "Hexagonal застаріла.", "Clean Architecture не використовує інтерфейси."] }, correctIndex: 1, explanation: { en: "Clean Architecture (Uncle Bob) and Hexagonal (Alistair Cockburn) are conceptual siblings. Ports = Application interfaces. Adapters = Infrastructure implementations.", de: "Clean Architecture (Uncle Bob) und Hexagonal (Alistair Cockburn) sind konzeptionelle Geschwister. Ports = Application-Interfaces. Adapters = Infrastructure-Implementierungen.", ru: "Clean Architecture (Uncle Bob) и Hexagonal (Alistair Cockburn) — концептуальные родственники. Ports = интерфейсы Application. Adapters = реализации Infrastructure.", uk: "Clean Architecture (Uncle Bob) та Hexagonal (Alistair Cockburn) — концептуальні родичі. Ports = інтерфейси Application. Adapters = реалізації Infrastructure." } },
{ category: "Advanced", question: { en: "How does Clean Architecture handle background jobs?", de: "Wie geht Clean Architecture mit Hintergrundjobs um?", ru: "Как Clean Architecture обрабатывает фоновые задачи?", uk: "Як Clean Architecture обробляє фонові задачі?" }, options: { en: ["Background jobs run in the Domain layer.", "Background jobs are Infrastructure concerns. They call Application layer handlers (Commands/Queries) like any other entry point.", "Background jobs violate Clean Architecture.", "They run directly against the database."], de: ["Hintergrundjobs laufen im Domain Layer.", "Hintergrundjobs sind Infrastructure-Aspekte. Sie rufen Application-Layer-Handler (Commands/Queries) wie jeden anderen Einstiegspunkt auf.", "Hintergrundjobs verletzen Clean Architecture.", "Sie laufen direkt gegen die Datenbank."], ru: ["Фоновые задачи выполняются в Domain Layer.", "Фоновые задачи — забота Infrastructure. Они вызывают обработчики Application Layer (Commands/Queries) как любую другую точку входа.", "Фоновые задачи нарушают Clean Architecture.", "Они работают напрямую с базой данных."], uk: ["Фонові задачі виконуються в Domain Layer.", "Фонові задачі — турбота Infrastructure. Вони викликають обробники Application Layer (Commands/Queries) як будь-яку іншу точку входу.", "Фонові задачі порушують Clean Architecture.", "Вони працюють напряму з базою даних."] }, correctIndex: 1, explanation: { en: "Hangfire/Quartz lives in Infrastructure. A scheduled job dispatches ProcessExpiredOrdersCommand via MediatR — same flow as an API controller.", de: "Hangfire/Quartz lebt in Infrastructure. Ein geplanter Job dispatcht ProcessExpiredOrdersCommand über MediatR — derselbe Flow wie ein API-Controller.", ru: "Hangfire/Quartz живёт в Infrastructure. Запланированное задание отправляет ProcessExpiredOrdersCommand через MediatR — тот же поток, что и API-контроллер.", uk: "Hangfire/Quartz живе в Infrastructure. Заплановане завдання відправляє ProcessExpiredOrdersCommand через MediatR — той самий потік, що й API-контролер." } },
{ category: "Advanced", question: { en: "What is the role of a SharedKernel in DDD/Clean Architecture?", de: "Welche Rolle spielt ein SharedKernel in DDD/Clean Architecture?", ru: "Какова роль SharedKernel в DDD/Clean Architecture?", uk: "Яка роль SharedKernel у DDD/Clean Architecture?" }, options: { en: ["A shared database.", "A small, carefully managed library containing common Value Objects, base classes, and interfaces shared across multiple Bounded Contexts.", "The .NET runtime.", "A shared Docker volume."], de: ["Eine gemeinsame Datenbank.", "Eine kleine, sorgfältig verwaltete Bibliothek mit gemeinsamen Value Objects, Basisklassen und Interfaces, die über mehrere Bounded Contexts geteilt werden.", "Die .NET-Laufzeit.", "Ein gemeinsames Docker-Volume."], ru: ["Общая база данных.", "Небольшая, тщательно управляемая библиотека, содержащая общие Value Objects, базовые классы и интерфейсы, разделяемые между несколькими Bounded Contexts.", "Среда выполнения .NET.", "Общий Docker-том."], uk: ["Спільна база даних.", "Невелика, ретельно керована бібліотека, що містить спільні Value Objects, базові класи та інтерфейси, що розділяються між кількома Bounded Contexts.", "Середовище виконання .NET.", "Спільний Docker-том."] }, correctIndex: 1, explanation: { en: "SharedKernel contains things like AuditableEntity, Result<T>, and common Value Objects (Money, Email). It must be kept minimal and stable.", de: "SharedKernel enthält Dinge wie AuditableEntity, Result<T> und gemeinsame Value Objects (Money, Email). Es muss minimal und stabil gehalten werden.", ru: "SharedKernel содержит такие вещи, как AuditableEntity, Result<T> и общие Value Objects (Money, Email). Он должен быть минимальным и стабильным.", uk: "SharedKernel містить такі речі, як AuditableEntity, Result<T> та спільні Value Objects (Money, Email). Він повинен бути мінімальним та стабільним." } },

 Layer не знают о разрешении тенантов. Infrastructure предоставляет текущий ID тенанта, а EF Core Global Query Filters обеспечивают изоляцию данных.", uk: "Domain/Application Layer не знають про розв'язання тенантів. Infrastructure надає поточний ID тенанта, а EF Core Global Query Filters забезпечують ізоляцію даних." } }

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
</body>
</html>
