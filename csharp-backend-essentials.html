{ category: "String Interpolation", question: { en: "How do you include a literal curly brace { in an interpolated string?", de: "Wie f\u00fcgt man eine literale geschweifte Klammer { in einen interpolierten String ein?", ru: "Как включить литеральную фигурную скобку { в интерполированную строку?", uk: "Як включити літеральну фігурну дужку { в інтерпольований рядок?" }, options: { en: ["You cannot use braces in interpolated strings.", "By doubling it: $\"Value is {{x}}\" outputs \"Value is {x}\".", "By escaping it with backslash: $\"Value is \\{x\\}\".", "By using string.Format instead."], de: ["Man kann keine geschweiften Klammern in interpolierten Strings verwenden.", "Durch Verdopplung: $\"Value is {{x}}\" gibt \"Value is {x}\" aus.", "Durch Escaping mit Backslash: $\"Value is \\{x\\}\".", "Durch Verwendung von string.Format stattdessen."], ru: ["Нельзя использовать фигурные скобки в интерполированных строках.", "Удвоив их: $\"Value is {{x}}\" выводит \"Value is {x}\".", "Экранировав обратным слэшем: $\"Value is \\{x\\}\".", "Используя string.Format вместо этого."], uk: ["Не можна використовувати фігурні дужки в інтерпольованих рядках.", "Подвоївши їх: $\"Value is {{x}}\" виводить \"Value is {x}\".", "Екранувавши зворотним слешем: $\"Value is \\{x\\}\".", "Використовуючи string.Format замість цього."] }, correctIndex: 1, explanation: { en: "Double braces {{ and }} are the escape sequence for literal braces in both interpolated strings and string.Format.", de: "Doppelte Klammern {{ und }} sind die Escape-Sequenz f\u00fcr literale Klammern in interpolierten Strings und string.Format.", ru: "Двойные скобки {{ и }} — это escape-последовательность для литеральных скобок как в интерполированных строках, так и в string.Format.", uk: "Подвійні дужки {{ та }} — це escape-послідовність для літеральних дужок як в інтерпольованих рядках, так і в string.Format." } },
{ category: "HTTP Methods", question: { en: "What does the HTTP DELETE method do and is it idempotent?", de: "Was macht die HTTP-DELETE-Methode und ist sie idempotent?", ru: "Что делает HTTP-метод DELETE и является ли он идемпотентным?", uk: "Що робить HTTP-метод DELETE і чи є він ідемпотентним?" }, options: { en: ["Deletes a resource; not idempotent — each call deletes another resource.", "Deletes a resource; yes, idempotent — deleting the same resource twice has the same end result.", "Marks a resource as archived; not idempotent.", "Removes all resources in a collection; idempotent."], de: ["L\u00f6scht eine Ressource; nicht idempotent — jeder Aufruf l\u00f6scht eine weitere Ressource.", "L\u00f6scht eine Ressource; ja, idempotent — zweimaliges L\u00f6schen derselben Ressource hat dasselbe Endergebnis.", "Markiert eine Ressource als archiviert; nicht idempotent.", "Entfernt alle Ressourcen in einer Sammlung; idempotent."], ru: ["Удаляет ресурс; не идемпотентен — каждый вызов удаляет другой ресурс.", "Удаляет ресурс; да, идемпотентен — удаление одного и того же ресурса дважды даёт тот же результат.", "Помечает ресурс как архивный; не идемпотентен.", "Удаляет все ресурсы коллекции; идемпотентен."], uk: ["Видаляє ресурс; не ідемпотентний — кожен виклик видаляє інший ресурс.", "Видаляє ресурс; так, ідемпотентний — видалення одного й того самого ресурсу двічі дає той самий результат.", "Позначає ресурс як архівний; не ідемпотентний.", "Видаляє всі ресурси колекції; ідемпотентний."] }, correctIndex: 1, explanation: { en: "DELETE is idempotent: deleting an already-deleted resource returns 404, but the system state is the same — the resource is gone.", de: "DELETE ist idempotent: Das L\u00f6schen einer bereits gel\u00f6schten Ressource gibt 404 zur\u00fcck, aber der Systemzustand ist derselbe — die Ressource ist weg.", ru: "DELETE идемпотентен: удаление уже удалённого ресурса возвращает 404, но состояние системы то же — ресурс отсутствует.", uk: "DELETE ідемпотентний: видалення вже видаленого ресурсу повертає 404, але стан системи той самий — ресурс відсутній." } },
{ category: "HTTP Methods", question: { en: "What is the purpose of the HTTP OPTIONS method?", de: "Was ist der Zweck der HTTP-OPTIONS-Methode?", ru: "Для чего нужен HTTP-метод OPTIONS?", uk: "Для чого потрібний HTTP-метод OPTIONS?" }, options: { en: ["To update resource settings.", "To discover which HTTP methods and headers the server supports for a given URL (used in CORS preflight).", "To retrieve resource metadata without the body.", "To establish a WebSocket connection."], de: ["Um Ressourceneinstellungen zu aktualisieren.", "Um herauszufinden, welche HTTP-Methoden und Header der Server f\u00fcr eine bestimmte URL unterst\u00fctzt (verwendet im CORS-Preflight).", "Um Ressourcen-Metadaten ohne Body abzurufen.", "Um eine WebSocket-Verbindung herzustellen."], ru: ["Для обновления настроек ресурса.", "Для выяснения, какие HTTP-методы и заголовки поддерживает сервер для данного URL (используется в CORS preflight).", "Для получения метаданных ресурса без тела.", "Для установки WebSocket-соединения."], uk: ["Для оновлення налаштувань ресурсу.", "Для з'ясування, які HTTP-методи та заголовки підтримує сервер для даного URL (використовується у CORS preflight).", "Для отримання метаданих ресурсу без тіла.", "Для встановлення WebSocket-з'єднання."] }, correctIndex: 1, explanation: { en: "OPTIONS is used by browsers for CORS preflight requests to check if the actual request (e.g., PUT with custom headers) is allowed by the server.", de: "OPTIONS wird von Browsern f\u00fcr CORS-Preflight-Anfragen verwendet, um zu pr\u00fcfen, ob die eigentliche Anfrage (z.B. PUT mit benutzerdefinierten Headern) vom Server erlaubt ist.", ru: "OPTIONS используется браузерами для CORS preflight-запросов, чтобы проверить, разрешён ли сервером фактический запрос (например, PUT с пользовательскими заголовками).", uk: "OPTIONS використовується браузерами для CORS preflight-запитів, щоб перевірити, чи дозволений сервером фактичний запит (наприклад, PUT з користувацькими заголовками)." } },
{ category: "Exception Handling", question: { en: "What is the finally block used for in C#?", de: "Wof\u00fcr wird der finally-Block in C# verwendet?", ru: "Для чего используется блок finally в C#?", uk: "Для чого використовується блок finally у C#?" }, options: { en: ["To handle exceptions that were not caught.", "To execute cleanup code that runs regardless of whether an exception was thrown or not.", "To retry the operation that failed.", "To log the exception to a file."], de: ["Um Ausnahmen zu behandeln, die nicht gefangen wurden.", "Um Bereinigungscode auszuf\u00fchren, der unabh\u00e4ngig davon l\u00e4uft, ob eine Ausnahme geworfen wurde oder nicht.", "Um die fehlgeschlagene Operation erneut zu versuchen.", "Um die Ausnahme in eine Datei zu loggen."], ru: ["Для обработки исключений, которые не были перехвачены.", "Для выполнения кода очистки, который выполняется независимо от того, было ли выброшено исключение.", "Для повторной попытки неудачной операции.", "Для записи исключения в файл."], uk: ["Для обробки винятків, які не були перехоплені.", "Для виконання коду очищення, який виконується незалежно від того, чи був кинутий виняток.", "Для повторної спроби невдалої операції.", "Для запису винятку у файл."] }, correctIndex: 1, explanation: { en: "finally always executes — whether the try block succeeded, threw an exception, or even if a return statement was hit. Ideal for disposing resources, closing connections.", de: "finally wird immer ausgef\u00fchrt — ob der Try-Block erfolgreich war, eine Ausnahme geworfen hat oder sogar eine Return-Anweisung erreicht wurde. Ideal zum Freigeben von Ressourcen, Schliessen von Verbindungen.", ru: "finally всегда выполняется — независимо от того, был ли try-блок успешен, выбросил исключение или даже встретил return. Идеален для освобождения ресурсов, закрытия соединений.", uk: "finally завжди виконується — незалежно від того, чи був try-блок успішним, кинув виняток або навіть зустрів return. Ідеальний для звільнення ресурсів, закриття з'єднань." } },
{ category: "REST vs RPC", question: { en: "What are HATEOAS links in REST APIs?", de: "Was sind HATEOAS-Links in REST-APIs?", ru: "Что такое HATEOAS-ссылки в REST API?", uk: "Що таке HATEOAS-посилання у REST API?" }, options: { en: ["Authentication tokens embedded in URLs.", "Hypermedia links in responses that tell the client what actions are available next, making the API self-discoverable.", "Links to API documentation.", "Redirect URLs for load balancing."], de: ["Authentifizierungstoken, die in URLs eingebettet sind.", "Hypermedia-Links in Antworten, die dem Client mitteilen, welche Aktionen als n\u00e4chstes verf\u00fcgbar sind, und die API selbstentdeckbar machen.", "Links zur API-Dokumentation.", "Weiterleitungs-URLs f\u00fcr Lastverteilung."], ru: ["Токены аутентификации, встроенные в URL.", "Гипермедиа-ссылки в ответах, которые сообщают клиенту, какие действия доступны далее, делая API самодокументируемым.", "Ссылки на документацию API.", "URL перенаправления для балансировки нагрузки."], uk: ["Токени автентифікації, вбудовані в URL.", "Гіпермедіа-посилання у відповідях, які повідомляють клієнту, які дії доступні далі, роблячи API самодокументованим.", "Посилання на документацію API.", "URL перенаправлення для балансування навантаження."] }, correctIndex: 1, explanation: { en: "HATEOAS (Hypermedia as the Engine of Application State) includes links like {\"next\": \"/orders?page=2\"} so clients navigate the API dynamically without hardcoded URLs.", de: "HATEOAS (Hypermedia as the Engine of Application State) enth\u00e4lt Links wie {\"next\": \"/orders?page=2\"}, damit Clients die API dynamisch navigieren, ohne fest codierte URLs.", ru: "HATEOAS (Hypermedia as the Engine of Application State) включает ссылки вроде {\"next\": \"/orders?page=2\"}, чтобы клиенты навигировали по API динамически без жёстко заданных URL.", uk: "HATEOAS (Hypermedia as the Engine of Application State) включає посилання на кшталт {\"next\": \"/orders?page=2\"}, щоб клієнти навігували API динамічно без жорстко заданих URL." } },
{ category: "Event Sourcing", question: { en: "What is a projection in event sourcing?", de: "Was ist eine Projektion im Event Sourcing?", ru: "Что такое проекция в event sourcing?", uk: "Що таке проєкція в event sourcing?" }, options: { en: ["A way to predict future events.", "A process that reads events and builds a read-optimized view (read model) from them.", "A backup of the event store.", "A method to filter invalid events."], de: ["Eine M\u00f6glichkeit, zuk\u00fcnftige Events vorherzusagen.", "Ein Prozess, der Events liest und daraus eine leseoptimierte Sicht (Read Model) aufbaut.", "Ein Backup des Event Stores.", "Eine Methode zum Filtern ung\u00fcltiger Events."], ru: ["Способ предсказать будущие события.", "Процесс, который читает события и строит из них оптимизированное для чтения представление (read model).", "Резервная копия хранилища событий.", "Метод фильтрации невалидных событий."], uk: ["Спосіб передбачити майбутні події.", "Процес, який читає події та будує з них оптимізоване для читання представлення (read model).", "Резервна копія сховища подій.", "Метод фільтрації невалідних подій."] }, correctIndex: 1, explanation: { en: "Projections transform the event log into denormalized read models (e.g., a flat SQL table or Elasticsearch index) optimized for specific queries.", de: "Projektionen transformieren das Event-Log in denormalisierte Lesemodelle (z.B. eine flache SQL-Tabelle oder Elasticsearch-Index), die f\u00fcr spezifische Abfragen optimiert sind.", ru: "Проекции преобразуют лог событий в денормализованные модели чтения (например, плоскую SQL-таблицу или индекс Elasticsearch), оптимизированные для конкретных запросов.", uk: "Проєкції перетворюють лог подій у денормалізовані моделі читання (наприклад, плоску SQL-таблицю або індекс Elasticsearch), оптимізовані для конкретних запитів." } },
{ category: "Message Bus", question: { en: "What is the difference between RabbitMQ and Apache Kafka?", de: "Was ist der Unterschied zwischen RabbitMQ und Apache Kafka?", ru: "В чём разница между RabbitMQ и Apache Kafka?", uk: "У чому різниця між RabbitMQ та Apache Kafka?" }, options: { en: ["They are identical message brokers.", "RabbitMQ is a traditional message broker (push, delete after consume); Kafka is a distributed log (pull, retain messages for replay).", "Kafka only works with Java, RabbitMQ with .NET.", "RabbitMQ is for queues only, Kafka is for topics only."], de: ["Sie sind identische Message Broker.", "RabbitMQ ist ein traditioneller Message Broker (Push, nach Verbrauch l\u00f6schen); Kafka ist ein verteiltes Log (Pull, Nachrichten f\u00fcr Replay aufbewahren).", "Kafka funktioniert nur mit Java, RabbitMQ mit .NET.", "RabbitMQ ist nur f\u00fcr Queues, Kafka nur f\u00fcr Topics."], ru: ["Это идентичные брокеры сообщений.", "RabbitMQ — традиционный брокер (push, удаление после потребления); Kafka — распределённый лог (pull, сохранение сообщений для replay).", "Kafka работает только с Java, RabbitMQ с .NET.", "RabbitMQ только для очередей, Kafka только для топиков."], uk: ["Це ідентичні брокери повідомлень.", "RabbitMQ — традиційний брокер (push, видалення після споживання); Kafka — розподілений лог (pull, збереження повідомлень для replay).", "Kafka працює тільки з Java, RabbitMQ з .NET.", "RabbitMQ тільки для черг, Kafka тільки для топіків."] }, correctIndex: 1, explanation: { en: "RabbitMQ delivers and removes messages. Kafka appends to an immutable log — consumers track their offset and can replay. Kafka excels at high-throughput event streaming.", de: "RabbitMQ liefert und entfernt Nachrichten. Kafka h\u00e4ngt an ein unver\u00e4nderliches Log an — Consumer verfolgen ihren Offset und k\u00f6nnen replayed. Kafka gl\u00e4nzt beim High-Throughput Event-Streaming.", ru: "RabbitMQ доставляет и удаляет сообщения. Kafka добавляет в неизменяемый лог — потребители отслеживают свой offset и могут replay. Kafka отлично подходит для высоконагруженного стриминга событий.", uk: "RabbitMQ доставляє та видаляє повідомлення. Kafka додає у незмінний лог — споживачі відстежують свій offset та можуть replay. Kafka чудово підходить для високонавантаженого стримінгу подій." } },
{ category: "HTTP Methods", question: { en: "What is content negotiation in REST APIs?", de: "Was ist Content Negotiation in REST-APIs?", ru: "Что такое согласование контента в REST API?", uk: "Що таке узгодження контенту у REST API?" }, options: { en: ["Compressing the response body.", "The process where the client specifies desired format via Accept header (e.g., application/json, application/xml) and the server responds accordingly.", "Authenticating the client before serving content.", "Selecting which endpoint to call."], de: ["Das Komprimieren des Antwortk\u00f6rpers.", "Der Prozess, bei dem der Client das gew\u00fcnschte Format \u00fcber den Accept-Header angibt (z.B. application/json, application/xml) und der Server entsprechend antwortet.", "Die Authentifizierung des Clients vor der Bereitstellung von Inhalten.", "Die Auswahl, welcher Endpunkt aufgerufen werden soll."], ru: ["Сжатие тела ответа.", "Процесс, при котором клиент указывает желаемый формат через заголовок Accept (например, application/json, application/xml), а сервер отвечает соответственно.", "Аутентификация клиента перед выдачей контента.", "Выбор, какой endpoint вызвать."], uk: ["Стиснення тіла відповіді.", "Процес, при якому клієнт вказує бажаний формат через заголовок Accept (наприклад, application/json, application/xml), а сервер відповідає відповідно.", "Автентифікація клієнта перед видачею контенту.", "Вибір, який endpoint викликати."] }, correctIndex: 1, explanation: { en: "The Accept header lets a single endpoint serve multiple formats. The server checks the header and serializes the response as JSON, XML, or other formats accordingly.", de: "Der Accept-Header erm\u00f6glicht einem einzelnen Endpunkt, mehrere Formate bereitzustellen. Der Server pr\u00fcft den Header und serialisiert die Antwort als JSON, XML oder andere Formate.", ru: "Заголовок Accept позволяет одному endpoint обслуживать несколько форматов. Сервер проверяет заголовок и сериализует ответ в JSON, XML или другие форматы.", uk: "Заголовок Accept дозволяє одному endpoint обслуговувати кілька форматів. Сервер перевіряє заголовок і серіалізує відповідь у JSON, XML або інші формати." } },
{ category: "Exception Handling", question: { en: "What is the IDisposable pattern and how does 'using' relate to exception handling?", de: "Was ist das IDisposable-Pattern und wie h\u00e4ngt 'using' mit der Ausnahmebehandlung zusammen?", ru: "Что такое паттерн IDisposable и как 'using' связан с обработкой исключений?", uk: "Що таке патерн IDisposable і як 'using' пов'язаний з обробкою винятків?" }, options: { en: ["using blocks prevent all exceptions from being thrown.", "The 'using' statement ensures Dispose() is called even if an exception occurs, equivalent to try-finally.", "IDisposable is only for database connections.", "using replaces try-catch blocks entirely."], de: ["Using-Bl\u00f6cke verhindern, dass Ausnahmen geworfen werden.", "Die 'using'-Anweisung stellt sicher, dass Dispose() auch bei einer Ausnahme aufgerufen wird, \u00e4quivalent zu try-finally.", "IDisposable ist nur f\u00fcr Datenbankverbindungen.", "Using ersetzt Try-Catch-Bl\u00f6cke vollst\u00e4ndig."], ru: ["Блоки using предотвращают выброс всех исключений.", "Оператор 'using' гарантирует вызов Dispose() даже при возникновении исключения, эквивалентно try-finally.", "IDisposable только для подключений к базе данных.", "using полностью заменяет блоки try-catch."], uk: ["Блоки using запобігають викиданню всіх винятків.", "Оператор 'using' гарантує виклик Dispose() навіть при виникненні винятку, еквівалентно try-finally.", "IDisposable тільки для підключень до бази даних.", "using повністю замінює блоки try-catch."] }, correctIndex: 1, explanation: { en: "The 'using' statement compiles to try-finally, ensuring Dispose() is always called. This properly releases unmanaged resources (files, connections, streams) even when exceptions occur.", de: "Die 'using'-Anweisung kompiliert zu try-finally und stellt sicher, dass Dispose() immer aufgerufen wird. Dies gibt nicht verwaltete Ressourcen (Dateien, Verbindungen, Streams) auch bei Ausnahmen ordnungsgem\u00e4ss frei.", ru: "Оператор 'using' компилируется в try-finally, гарантируя, что Dispose() всегда вызывается. Это правильно освобождает неуправляемые ресурсы (файлы, соединения, потоки) даже при исключениях.", uk: "Оператор 'using' компілюється у try-finally, гарантуючи, що Dispose() завжди викликається. Це правильно звільняє некеровані ресурси (файли, з'єднання, потоки) навіть при винятках." } },
{ category: "Event Sourcing", question: { en: "How do you handle schema evolution in event sourcing?", de: "Wie geht man mit Schema-Evolution beim Event Sourcing um?", ru: "Как обрабатывать эволюцию схемы в event sourcing?", uk: "Як обробляти еволюцію схеми в event sourcing?" }, options: { en: ["Delete old events and recreate them.", "Use event versioning (e.g., OrderCreatedV1, V2) and upcasters that transform old events to the new format on read.", "Schema changes are not possible with event sourcing.", "Migrate all events to the new schema in a batch job."], de: ["Alte Events l\u00f6schen und neu erstellen.", "Event-Versionierung verwenden (z.B. OrderCreatedV1, V2) und Upcaster, die alte Events beim Lesen in das neue Format transformieren.", "Schema-\u00c4nderungen sind mit Event Sourcing nicht m\u00f6glich.", "Alle Events in einem Batch-Job zum neuen Schema migrieren."], ru: ["Удалить старые события и создать заново.", "Использовать версионирование событий (например, OrderCreatedV1, V2) и upcasters, которые преобразуют старые события в новый формат при чтении.", "Изменение схемы невозможно с event sourcing.", "Мигрировать все события в новую схему пакетным заданием."], uk: ["Видалити старі події та створити заново.", "Використовувати версіонування подій (наприклад, OrderCreatedV1, V2) та upcasters, які перетворюють старі події у новий формат при читанні.", "Зміна схеми неможлива з event sourcing.", "Мігрувати всі події у нову схему пакетним завданням."] }, correctIndex: 1, explanation: { en: "Events are immutable — you never change stored events. Instead, version them and use upcasters to transparently convert old formats when replaying.", de: "Events sind unver\u00e4nderlich — gespeicherte Events werden nie ge\u00e4ndert. Stattdessen versioniert man sie und verwendet Upcaster, um alte Formate beim Abspielen transparent zu konvertieren.", ru: "События неизменяемы — сохранённые события никогда не изменяются. Вместо этого версионируйте их и используйте upcasters для прозрачного преобразования старых форматов при воспроизведении.", uk: "Події незмінні — збережені події ніколи не змінюються. Замість цього версіонуйте їх та використовуйте upcasters для прозорого перетворення старих форматів при відтворенні." } },
{ category: "Message Bus", question: { en: "What is message idempotency and why is it important?", de: "Was ist Nachrichten-Idempotenz und warum ist sie wichtig?", ru: "Что такое идемпотентность сообщений и почему это важно?", uk: "Що таке ідемпотентність повідомлень і чому це важливо?" }, options: { en: ["It means messages are delivered exactly once.", "Processing the same message multiple times produces the same result — critical because message buses guarantee at-least-once delivery, not exactly-once.", "It means messages cannot be duplicated.", "It's a compression algorithm for messages."], de: ["Es bedeutet, dass Nachrichten genau einmal zugestellt werden.", "Die mehrfache Verarbeitung derselben Nachricht erzeugt dasselbe Ergebnis — entscheidend, weil Message Buses mindestens-einmal-Zustellung garantieren, nicht genau-einmal.", "Es bedeutet, dass Nachrichten nicht dupliziert werden k\u00f6nnen.", "Es ist ein Komprimierungsalgorithmus f\u00fcr Nachrichten."], ru: ["Это значит, что сообщения доставляются ровно один раз.", "Обработка одного и того же сообщения несколько раз даёт тот же результат — критично, потому что message bus гарантируют at-least-once доставку, а не exactly-once.", "Это значит, что сообщения не могут быть дублированы.", "Это алгоритм сжатия сообщений."], uk: ["Це означає, що повідомлення доставляються рівно один раз.", "Обробка одного й того самого повідомлення кілька разів дає той самий результат — критично, тому що message bus гарантують at-least-once доставку, а не exactly-once.", "Це означає, що повідомлення не можуть бути дубльовані.", "Це алгоритм стиснення повідомлень."] }, correctIndex: 1, explanation: { en: "Network failures can cause duplicate deliveries. Consumers must handle this by tracking processed message IDs or using idempotent operations (e.g., upsert instead of insert).", de: "Netzwerkfehler k\u00f6nnen doppelte Zustellungen verursachen. Consumer m\u00fcssen dies handhaben, indem sie verarbeitete Nachrichten-IDs verfolgen oder idempotente Operationen verwenden (z.B. Upsert statt Insert).", ru: "Сетевые сбои могут вызвать дублирование доставки. Потребители должны обрабатывать это, отслеживая ID обработанных сообщений или используя идемпотентные операции (например, upsert вместо insert).", uk: "Мережеві збої можуть спричинити дублювання доставки. Споживачі повинні обробляти це, відстежуючи ID оброблених повідомлень або використовуючи ідемпотентні операції (наприклад, upsert замість insert)." } },
{ category: "REST vs RPC", question: { en: "What HTTP status code range indicates client errors?", de: "Welcher HTTP-Statuscode-Bereich zeigt Client-Fehler an?", ru: "Какой диапазон HTTP-кодов указывает на ошибки клиента?", uk: "Який діапазон HTTP-кодів вказує на помилки клієнта?" }, options: { en: ["1xx", "3xx", "4xx (e.g., 400 Bad Request, 401 Unauthorized, 404 Not Found)", "5xx"], de: ["1xx", "3xx", "4xx (z.B. 400 Bad Request, 401 Unauthorized, 404 Not Found)", "5xx"], ru: ["1xx", "3xx", "4xx (например, 400 Bad Request, 401 Unauthorized, 404 Not Found)", "5xx"], uk: ["1xx", "3xx", "4xx (наприклад, 400 Bad Request, 401 Unauthorized, 404 Not Found)", "5xx"] }, correctIndex: 2, explanation: { en: "4xx codes indicate the client sent an invalid request. 400 = malformed, 401 = not authenticated, 403 = forbidden, 404 = not found, 409 = conflict, 422 = unprocessable entity.", de: "4xx-Codes zeigen an, dass der Client eine ung\u00fcltige Anfrage gesendet hat. 400 = fehlerhaft, 401 = nicht authentifiziert, 403 = verboten, 404 = nicht gefunden, 409 = Konflikt, 422 = nicht verarbeitbare Entit\u00e4t.", ru: "Коды 4xx указывают, что клиент отправил невалидный запрос. 400 = некорректный, 401 = не аутентифицирован, 403 = запрещено, 404 = не найден, 409 = конфликт, 422 = необрабатываемая сущность.", uk: "Коди 4xx вказують, що клієнт надіслав невалідний запит. 400 = некоректний, 401 = не автентифікований, 403 = заборонено, 404 = не знайдено, 409 = конфлікт, 422 = необроблювана сутність." } },
{ category: "String Interpolation", question: { en: "What is raw string literals in C# 11 and how do they relate to interpolation?", de: "Was sind Raw-String-Literale in C# 11 und wie h\u00e4ngen sie mit Interpolation zusammen?", ru: "Что такое raw string literals в C# 11 и как они связаны с интерполяцией?", uk: "Що таке raw string literals у C# 11 і як вони пов'язані з інтерполяцією?" }, options: { en: ["They disable string interpolation entirely.", "Triple-quoted strings (\"\"\"...\"\"\") that don't need escaping; combine with $ for interpolation and use $$ to require {{}} for expressions.", "They are only for multiline strings without variables.", "They convert strings to byte arrays."], de: ["Sie deaktivieren String-Interpolation vollst\u00e4ndig.", "Dreifach-zitierte Strings (\"\"\"...\"\"\"), die kein Escaping brauchen; kombiniere mit $ f\u00fcr Interpolation und verwende $$ um {{}} f\u00fcr Ausdr\u00fccke zu erfordern.", "Sie sind nur f\u00fcr mehrzeilige Strings ohne Variablen.", "Sie konvertieren Strings in Byte-Arrays."], ru: ["Они полностью отключают интерполяцию строк.", "Строки в тройных кавычках (\"\"\"...\"\"\"), не требующие экранирования; комбинируются с $ для интерполяции, а $$ требует {{}} для выражений.", "Они только для многострочных строк без переменных.", "Они конвертируют строки в массивы байтов."], uk: ["Вони повністю вимикають інтерполяцію рядків.", "Рядки у потрійних лапках (\"\"\"...\"\"\"), що не потребують екранування; комбінуються з $ для інтерполяції, а $$ вимагає {{}} для виразів.", "Вони тільки для багаторядкових рядків без змінних.", "Вони конвертують рядки у масиви байтів."] }, correctIndex: 1, explanation: { en: "C# 11 raw strings use \"\"\" delimiters and don't need escape sequences. Adding $ enables interpolation; $$ means you use {{ }} for interpolated expressions, keeping single { literal.", de: "C# 11 Raw-Strings verwenden \"\"\"-Begrenzer und brauchen keine Escape-Sequenzen. Hinzuf\u00fcgen von $ aktiviert Interpolation; $$ bedeutet, dass {{ }} f\u00fcr interpolierte Ausdr\u00fccke verwendet werden und einzelne { literal bleiben.", ru: "Raw-строки C# 11 используют разделители \"\"\" и не требуют escape-последовательностей. Добавление $ включает интерполяцию; $$ означает использование {{ }} для интерполируемых выражений, оставляя одинарную { литеральной.", uk: "Raw-рядки C# 11 використовують розділювачі \"\"\" і не потребують escape-послідовностей. Додавання $ вмикає інтерполяцію; $$ означає використання {{ }} для інтерпольованих виразів, залишаючи одинарну { літеральною." } },
{ category: "Saga Pattern", question: { en: "What is the difference between choreography-based and orchestration-based sagas?", de: "Was ist der Unterschied zwischen choreografie-basierten und orchestrierungs-basierten Sagas?", ru: "В чём разница между хореографическими и оркестрационными сагами?", uk: "У чому різниця між хореографічними та оркестраційними сагами?" }, options: { en: ["They are the same pattern.", "Choreography: services react to events independently (decentralized). Orchestration: a central coordinator directs each step.", "Choreography requires a message bus, orchestration does not.", "Orchestration is only for monoliths."], de: ["Sie sind dasselbe Pattern.", "Choreografie: Services reagieren unabh\u00e4ngig auf Events (dezentral). Orchestrierung: ein zentraler Koordinator leitet jeden Schritt.", "Choreografie erfordert einen Message Bus, Orchestrierung nicht.", "Orchestrierung ist nur f\u00fcr Monolithen."], ru: ["Это один и тот же паттерн.", "Хореография: сервисы реагируют на события независимо (децентрализованно). Оркестрация: центральный координатор управляет каждым шагом.", "Хореография требует message bus, оркестрация — нет.", "Оркестрация только для монолитов."], uk: ["Це один і той самий патерн.", "Хореографія: сервіси реагують на події незалежно (децентралізовано). Оркестрація: центральний координатор керує кожним кроком.", "Хореографія вимагає message bus, оркестрація — ні.", "Оркестрація тільки для монолітів."] }, correctIndex: 1, explanation: { en: "Choreography = no central authority, services publish events and others react. Orchestration = a saga orchestrator (state machine) tells each service what to do. Orchestration is easier to debug.", de: "Choreografie = keine zentrale Autorit\u00e4t, Services ver\u00f6ffentlichen Events und andere reagieren. Orchestrierung = ein Saga-Orchestrator (Zustandsmaschine) sagt jedem Service, was zu tun ist. Orchestrierung ist einfacher zu debuggen.", ru: "Хореография = нет центрального управления, сервисы публикуют события, другие реагируют. Оркестрация = оркестратор саги (конечный автомат) говорит каждому сервису, что делать. Оркестрацию проще отлаживать.", uk: "Хореографія = немає центрального управління, сервіси публікують події, інші реагують. Оркестрація = оркестратор саги (скінченний автомат) каже кожному сервісу, що робити. Оркестрацію простіше відлагоджувати." } },
{ category: "HTTP Methods", question: { en: "What is the HEAD method used for?", de: "Wof\u00fcr wird die HEAD-Methode verwendet?", ru: "Для чего используется метод HEAD?", uk: "Для чого використовується метод HEAD?" }, options: { en: ["To create a new resource.", "To retrieve only the response headers (same as GET but without the body) — useful for checking if a resource exists or its size.", "To update the headers of a resource.", "To delete the headers from a response."], de: ["Um eine neue Ressource zu erstellen.", "Um nur die Antwort-Header abzurufen (wie GET, aber ohne Body) — n\u00fctzlich, um zu pr\u00fcfen, ob eine Ressource existiert oder ihre Gr\u00f6sse.", "Um die Header einer Ressource zu aktualisieren.", "Um die Header aus einer Antwort zu l\u00f6schen."], ru: ["Для создания нового ресурса.", "Для получения только заголовков ответа (как GET, но без тела) — полезно для проверки существования ресурса или его размера.", "Для обновления заголовков ресурса.", "Для удаления заголовков из ответа."], uk: ["Для створення нового ресурсу.", "Для отримання тільки заголовків відповіді (як GET, але без тіла) — корисно для перевірки існування ресурсу або його розміру.", "Для оновлення заголовків ресурсу.", "Для видалення заголовків з відповіді."] }, correctIndex: 1, explanation: { en: "HEAD is identical to GET but returns only headers. Use it to check Content-Length before downloading a large file, or to verify a URL exists (returns 200 vs 404).", de: "HEAD ist identisch mit GET, gibt aber nur Header zur\u00fcck. Verwende es, um Content-Length vor dem Download einer grossen Datei zu pr\u00fcfen oder um zu verifizieren, ob eine URL existiert (200 vs 404).", ru: "HEAD идентичен GET, но возвращает только заголовки. Используйте для проверки Content-Length перед загрузкой большого файла или для проверки существования URL (200 vs 404).", uk: "HEAD ідентичний GET, але повертає тільки заголовки. Використовуйте для перевірки Content-Length перед завантаженням великого файлу або для перевірки існування URL (200 vs 404)." } },
{ category: "Message Bus", question: { en: "What is backpressure in messaging systems?", de: "Was ist Backpressure in Messaging-Systemen?", ru: "Что такое backpressure в системах обмена сообщениями?", uk: "Що таке backpressure у системах обміну повідомленнями?" }, options: { en: ["A way to compress messages.", "A mechanism where consumers signal producers to slow down when they cannot keep up with the message rate.", "A technique to prioritize urgent messages.", "A method to encrypt message payloads."], de: ["Eine M\u00f6glichkeit, Nachrichten zu komprimieren.", "Ein Mechanismus, bei dem Consumer den Produzenten signalisieren, langsamer zu werden, wenn sie mit der Nachrichtenrate nicht mithalten k\u00f6nnen.", "Eine Technik zur Priorisierung dringender Nachrichten.", "Eine Methode zur Verschl\u00fcsselung von Nachrichteninhalten."], ru: ["Способ сжатия сообщений.", "Механизм, при котором потребители сигнализируют производителям замедлиться, когда не успевают обрабатывать поток сообщений.", "Техника приоритизации срочных сообщений.", "Метод шифрования содержимого сообщений."], uk: ["Спосіб стиснення повідомлень.", "Механізм, при якому споживачі сигналізують виробникам сповільнитися, коли не встигають обробляти потік повідомлень.", "Техніка пріоритизації термінових повідомлень.", "Метод шифрування вмісту повідомлень."] }, correctIndex: 1, explanation: { en: "Without backpressure, a fast producer can overwhelm a slow consumer, causing OOM or message loss. Kafka handles this naturally via consumer pull; RabbitMQ uses prefetch count.", de: "Ohne Backpressure kann ein schneller Produzent einen langsamen Consumer \u00fcberw\u00e4ltigen, was OOM oder Nachrichtenverlust verursacht. Kafka handhabt dies nat\u00fcrlich \u00fcber Consumer-Pull; RabbitMQ verwendet Prefetch-Count.", ru: "Без backpressure быстрый производитель может перегрузить медленного потребителя, вызывая OOM или потерю сообщений. Kafka решает это естественно через pull потребителя; RabbitMQ использует prefetch count.", uk: "Без backpressure швидкий виробник може перевантажити повільного споживача, спричиняючи OOM або втрату повідомлень. Kafka вирішує це природно через pull споживача; RabbitMQ використовує prefetch count." } },
{ category: "Event Sourcing", question: { en: "What is an aggregate in the context of event sourcing and DDD?", de: "Was ist ein Aggregat im Kontext von Event Sourcing und DDD?", ru: "Что такое агрегат в контексте event sourcing и DDD?", uk: "Що таке агрегат у контексті event sourcing та DDD?" }, options: { en: ["A database table that aggregates data.", "A cluster of domain objects treated as a single unit for data changes, with one root entity that controls access and ensures consistency.", "A type of message bus that aggregates events.", "A caching layer for frequently accessed data."], de: ["Eine Datenbanktabelle, die Daten aggregiert.", "Ein Cluster von Dom\u00e4nenobjekten, die als einzelne Einheit f\u00fcr Daten\u00e4nderungen behandelt werden, mit einer Root-Entit\u00e4t, die den Zugriff kontrolliert und Konsistenz gew\u00e4hrleistet.", "Ein Typ von Message Bus, der Events aggregiert.", "Eine Caching-Schicht f\u00fcr h\u00e4ufig abgerufene Daten."], ru: ["Таблица базы данных, агрегирующая данные.", "Кластер доменных объектов, рассматриваемых как единое целое для изменения данных, с одной корневой сущностью, контролирующей доступ и обеспечивающей согласованность.", "Тип message bus, агрегирующий события.", "Кэширующий слой для часто запрашиваемых данных."], uk: ["Таблиця бази даних, що агрегує дані.", "Кластер доменних об'єктів, що розглядаються як єдине ціле для зміни даних, з одною кореневою сутністю, що контролює доступ та забезпечує узгодженість.", "Тип message bus, що агрегує події.", "Кешуючий шар для часто запитуваних даних."] }, correctIndex: 1, explanation: { en: "In DDD, an aggregate is a consistency boundary. In event sourcing, each aggregate has its own event stream. Commands target a specific aggregate, which validates and emits events.", de: "In DDD ist ein Aggregat eine Konsistenzgrenze. Im Event Sourcing hat jedes Aggregat seinen eigenen Event-Stream. Befehle zielen auf ein spezifisches Aggregat, das validiert und Events emittiert.", ru: "В DDD агрегат — это граница согласованности. В event sourcing у каждого агрегата свой поток событий. Команды направляются на конкретный агрегат, который валидирует и эмитит события.", uk: "У DDD агрегат — це межа узгодженості. В event sourcing у кожного агрегату свій потік подій. Команди направляються на конкретний агрегат, який валідує та емітить події." } },
{ category: "Exception Handling", question: { en: "What is a global exception handler in ASP.NET Core and why use it?", de: "Was ist ein globaler Exception-Handler in ASP.NET Core und warum verwendet man ihn?", ru: "Что такое глобальный обработчик исключений в ASP.NET Core и зачем он нужен?", uk: "Що таке глобальний обробник винятків у ASP.NET Core і навіщо він потрібний?" }, options: { en: ["A try-catch in every controller action.", "Middleware (UseExceptionHandler) or IExceptionHandler that catches unhandled exceptions, logs them, and returns a consistent error response.", "A database trigger that logs errors.", "A JavaScript error handler in the browser."], de: ["Ein Try-Catch in jeder Controller-Aktion.", "Middleware (UseExceptionHandler) oder IExceptionHandler, die unbehandelte Ausnahmen f\u00e4ngt, loggt und eine konsistente Fehlerantwort zur\u00fcckgibt.", "Ein Datenbank-Trigger, der Fehler loggt.", "Ein JavaScript-Error-Handler im Browser."], ru: ["try-catch в каждом действии контроллера.", "Middleware (UseExceptionHandler) или IExceptionHandler, который перехватывает необработанные исключения, логирует их и возвращает согласованный ответ об ошибке.", "Триггер базы данных, логирующий ошибки.", "JavaScript-обработчик ошибок в браузере."], uk: ["try-catch у кожній дії контролера.", "Middleware (UseExceptionHandler) або IExceptionHandler, який перехоплює необроблені винятки, логує їх та повертає узгоджену відповідь про помилку.", "Тригер бази даних, що логує помилки.", "JavaScript-обробник помилок у браузері."] }, correctIndex: 1, explanation: { en: "A global exception handler acts as a safety net. Instead of try-catch in every action, unhandled exceptions bubble up to middleware which logs the error and returns a standardized Problem Details response.", de: "Ein globaler Exception-Handler fungiert als Sicherheitsnetz. Anstatt Try-Catch in jeder Aktion, sprudeln unbehandelte Ausnahmen zur Middleware hoch, die den Fehler loggt und eine standardisierte Problem-Details-Antwort zur\u00fcckgibt.", ru: "Глобальный обработчик исключений — это страховочная сеть. Вместо try-catch в каждом действии, необработанные исключения всплывают до middleware, которое логирует ошибку и возвращает стандартизированный ответ Problem Details.", uk: "Глобальний обробник винятків — це страхувальна сітка. Замість try-catch у кожній дії, необроблені винятки спливають до middleware, яке логує помилку та повертає стандартизовану відповідь Problem Details." } },
{ category: "REST vs RPC", question: { en: "What is API versioning and what are the common approaches?", de: "Was ist API-Versionierung und welche g\u00e4ngigen Ans\u00e4tze gibt es?", ru: "Что такое версионирование API и какие основные подходы существуют?", uk: "Що таке версіонування API і які основні підходи існують?" }, options: { en: ["APIs should never change, so versioning is unnecessary.", "Strategies include URL path (/api/v2/users), query string (?version=2), or custom header (Api-Version: 2) to allow evolving APIs without breaking existing clients.", "Versioning means creating a separate server for each version.", "API versioning only applies to GraphQL."], de: ["APIs sollten sich nie \u00e4ndern, daher ist Versionierung unn\u00f6tig.", "Strategien umfassen URL-Pfad (/api/v2/users), Query-String (?version=2) oder Custom-Header (Api-Version: 2), um APIs weiterzuentwickeln, ohne bestehende Clients zu brechen.", "Versionierung bedeutet, f\u00fcr jede Version einen separaten Server zu erstellen.", "API-Versionierung gilt nur f\u00fcr GraphQL."], ru: ["API никогда не должны меняться, поэтому версионирование не нужно.", "Стратегии включают путь URL (/api/v2/users), строку запроса (?version=2) или пользовательский заголовок (Api-Version: 2) для развития API без нарушения работы существующих клиентов.", "Версионирование означает создание отдельного сервера для каждой версии.", "Версионирование API применимо только к GraphQL."], uk: ["API ніколи не повинні змінюватися, тому версіонування не потрібне.", "Стратегії включають шлях URL (/api/v2/users), рядок запиту (?version=2) або користувацький заголовок (Api-Version: 2) для розвитку API без порушення роботи існуючих клієнтів.", "Версіонування означає створення окремого сервера для кожної версії.", "Версіонування API застосовне тільки до GraphQL."] }, correctIndex: 1, explanation: { en: "URL versioning is the most common and explicit. Header versioning keeps URLs clean. Query string versioning is easy but less discoverable. Choose based on your API consumers.", de: "URL-Versionierung ist am h\u00e4ufigsten und explizitesten. Header-Versionierung h\u00e4lt URLs sauber. Query-String-Versionierung ist einfach, aber weniger auffindbar. W\u00e4hle basierend auf deinen API-Konsumenten.", ru: "Версионирование через URL наиболее распространённое и явное. Через заголовки — сохраняет чистые URL. Через строку запроса — просто, но менее обнаруживаемо. Выбирайте исходя из ваших потребителей API.", uk: "Версіонування через URL найпоширеніше та явне. Через заголовки — зберігає чисті URL. Через рядок запиту — просто, але менш виявлюване. Обирайте виходячи з ваших споживачів API." } },
{ category: "Idempotency", question: { en: "How can you make a POST request idempotent?", de: "Wie kann man eine POST-Anfrage idempotent machen?", ru: "Как сделать POST-запрос идемпотентным?", uk: "Як зробити POST-запит ідемпотентним?" }, options: { en: ["POST cannot be made idempotent.", "By including an Idempotency-Key header — the server checks if this key was already processed and returns the cached response.", "By sending the request twice.", "By using HTTPS instead of HTTP."], de: ["POST kann nicht idempotent gemacht werden.", "Durch Einbeziehung eines Idempotency-Key-Headers — der Server pr\u00fcft, ob dieser Schl\u00fcssel bereits verarbeitet wurde, und gibt die gecachte Antwort zur\u00fcck.", "Durch zweimaliges Senden der Anfrage.", "Durch Verwendung von HTTPS statt HTTP."], ru: ["POST нельзя сделать идемпотентным.", "Включив заголовок Idempotency-Key — сервер проверяет, был ли этот ключ уже обработан, и возвращает кэшированный ответ.", "Отправив запрос дважды.", "Используя HTTPS вместо HTTP."], uk: ["POST не можна зробити ідемпотентним.", "Включивши заголовок Idempotency-Key — сервер перевіряє, чи був цей ключ вже оброблений, та повертає кешовану відповідь.", "Надіславши запит двічі.", "Використовуючи HTTPS замість HTTP."] }, correctIndex: 1, explanation: { en: "Stripe, PayPal, and other APIs use Idempotency-Key headers. The client generates a unique key per operation; the server stores the result and returns it on retries instead of processing again.", de: "Stripe, PayPal und andere APIs verwenden Idempotency-Key-Header. Der Client generiert einen eindeutigen Schl\u00fcssel pro Operation; der Server speichert das Ergebnis und gibt es bei Wiederholungen zur\u00fcck, anstatt erneut zu verarbeiten.", ru: "Stripe, PayPal и другие API используют заголовок Idempotency-Key. Клиент генерирует уникальный ключ для каждой операции; сервер сохраняет результат и возвращает его при повторах вместо повторной обработки.", uk: "Stripe, PayPal та інші API використовують заголовок Idempotency-Key. Клієнт генерує унікальний ключ для кожної операції; сервер зберігає результат та повертає його при повторах замість повторної обробки." } },
];

// ─── Engine (same as other quizzes) ────────────────────────────────────────
let currentLang = localStorage.getItem('quizLang') || 'en';
let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); renderUI(); }

function renderUI() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = '&#8592; ' + t.allQuizzes.replace(/^.*?\s/, '');
    document.getElementById('nav-restart').innerHTML = '&#8635; ' + t.restart.replace(/^.*?\s/, '');
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
    if (selectedQuestions.length > 0) showQuestion();
}

function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function startQuiz(count) {
    selectedQuestions = shuffle([...allQuestions]).slice(0, count);
    currentQuestionIndex = 0; score = 0;
    document.getElementById('setup-card').classList.remove('active');
    document.getElementById('quiz-area').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const lang = currentLang;
    const t = ui[lang];
    const q = selectedQuestions[currentQuestionIndex];
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const explText = q.explanation[lang] || q.explanation.en;
    document.getElementById('q-counter').textContent = `${t.question} ${currentQuestionIndex + 1} ${t.of} ${selectedQuestions.length}`;
    document.getElementById('score-tracker').textContent = `${t.score}: ${score}/${currentQuestionIndex}`;
    document.getElementById('progress').style.width = `${((currentQuestionIndex) / selectedQuestions.length) * 100}%`;
    const container = document.getElementById('quiz-container');
    container.innerHTML = `
        <div class="card active">
            <div class="category-badge">${q.category}</div>
            <div class="question-text">${qText}</div>
            <div class="options">${opts.map((o, i) => `<button class="option-btn" onclick="answer(${i})">${o}</button>`).join('')}</div>
            <div class="explanation" id="explanation"><strong>${t.explanation}</strong> ${explText}</div>
            <div class="controls"><button class="next-btn" id="next-btn" onclick="nextQuestion()">${currentQuestionIndex < selectedQuestions.length - 1 ? t.next : t.complete}</button></div>
        </div>`;
}

function answer(idx) {
    const q = selectedQuestions[currentQuestionIndex];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((b, i) => { b.disabled = true; if (i === q.correctIndex) b.classList.add('correct'); });
    if (idx === q.correctIndex) { score++; } else { btns[idx].classList.add('wrong'); }
    document.getElementById('explanation').classList.add('show');
    document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex >= selectedQuestions.length) { showResults(); return; }
    showQuestion();
}

function showResults() {
    const t = ui[currentLang];
    document.getElementById('quiz-area').style.display = 'none';
    const pct = Math.round((score / selectedQuestions.length) * 100);
    let feedback = pct >= 80 ? t.feedbackHigh : pct >= 50 ? t.feedbackMid : t.feedbackLow;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('final-score-text').textContent = `${score}/${selectedQuestions.length} (${pct}%)`;
    document.getElementById('feedback-text').textContent = feedback;
    document.getElementById('results-card').classList.add('active');
}

renderUI();
</script>
</body>
</html>
