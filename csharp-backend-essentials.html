{ category: "REST vs RPC", question: { en: "What is the main conceptual difference between REST and RPC?", de: "Was ist der Hauptunterschied zwischen REST und RPC?", ru: "В чём основное концептуальное различие между REST и RPC?", uk: "У чому основна концептуальна різниця між REST та RPC?" }, options: { en: ["REST uses XML, RPC uses JSON.", "REST is resource-oriented (nouns), RPC is action-oriented (verbs).", "REST is only for web browsers, RPC is for servers.", "REST requires authentication, RPC does not."], de: ["REST verwendet XML, RPC verwendet JSON.", "REST ist ressourcenorientiert (Substantive), RPC ist aktionsorientiert (Verben).", "REST ist nur f\u00fcr Webbrowser, RPC ist f\u00fcr Server.", "REST erfordert Authentifizierung, RPC nicht."], ru: ["REST использует XML, RPC использует JSON.", "REST ориентирован на ресурсы (существительные), RPC — на действия (глаголы).", "REST только для браузеров, RPC — для серверов.", "REST требует аутентификацию, RPC — нет."], uk: ["REST використовує XML, RPC використовує JSON.", "REST орієнтований на ресурси (іменники), RPC — на дії (дієслова).", "REST тільки для браузерів, RPC — для серверів.", "REST вимагає автентифікацію, RPC — ні."] }, correctIndex: 1, explanation: { en: "REST models APIs around resources (GET /users/123), while RPC models them around actions (call GetUser(123)). REST uses HTTP verbs semantically; RPC typically sends everything via POST.", de: "REST modelliert APIs um Ressourcen (GET /users/123), w\u00e4hrend RPC sie um Aktionen modelliert (call GetUser(123)). REST verwendet HTTP-Verben semantisch; RPC sendet typischerweise alles \u00fcber POST.", ru: "REST моделирует API вокруг ресурсов (GET /users/123), а RPC — вокруг действий (call GetUser(123)). REST использует HTTP-глаголы семантически; RPC обычно отправляет всё через POST.", uk: "REST моделює API навколо ресурсів (GET /users/123), а RPC — навколо дій (call GetUser(123)). REST використовує HTTP-дієслова семантично; RPC зазвичай надсилає все через POST." } },
{ category: "REST vs RPC", question: { en: "What transport and serialization does gRPC typically use?", de: "Welchen Transport und welche Serialisierung verwendet gRPC typischerweise?", ru: "Какой транспорт и сериализацию обычно использует gRPC?", uk: "Який транспорт і серіалізацію зазвичай використовує gRPC?" }, options: { en: ["HTTP/1.1 with JSON.", "HTTP/2 with Protocol Buffers (protobuf).", "WebSockets with MessagePack.", "TCP with XML."], de: ["HTTP/1.1 mit JSON.", "HTTP/2 mit Protocol Buffers (protobuf).", "WebSockets mit MessagePack.", "TCP mit XML."], ru: ["HTTP/1.1 с JSON.", "HTTP/2 с Protocol Buffers (protobuf).", "WebSockets с MessagePack.", "TCP с XML."], uk: ["HTTP/1.1 з JSON.", "HTTP/2 з Protocol Buffers (protobuf).", "WebSockets з MessagePack.", "TCP з XML."] }, correctIndex: 1, explanation: { en: "gRPC uses HTTP/2 for multiplexed streams and Protocol Buffers for compact binary serialization, making it much faster than REST+JSON for service-to-service communication.", de: "gRPC verwendet HTTP/2 f\u00fcr gemultiplexte Streams und Protocol Buffers f\u00fcr kompakte bin\u00e4re Serialisierung, was es f\u00fcr Service-zu-Service-Kommunikation viel schneller als REST+JSON macht.", ru: "gRPC использует HTTP/2 для мультиплексированных потоков и Protocol Buffers для компактной бинарной сериализации, что делает его значительно быстрее REST+JSON для межсервисного взаимодействия.", uk: "gRPC використовує HTTP/2 для мультиплексованих потоків і Protocol Buffers для компактної бінарної серіалізації, що робить його значно швидшим за REST+JSON для міжсервісної взаємодії." } },
{ category: "REST vs RPC", question: { en: "When is REST a better choice than gRPC?", de: "Wann ist REST eine bessere Wahl als gRPC?", ru: "Когда REST — лучший выбор, чем gRPC?", uk: "Коли REST — кращий вибір, ніж gRPC?" }, options: { en: ["When maximum performance is the only concern.", "For public APIs consumed by browsers and third-party clients, where caching and discoverability matter.", "When you need bidirectional streaming.", "When working with microservices behind a firewall."], de: ["Wenn maximale Performance die einzige Sorge ist.", "F\u00fcr \u00f6ffentliche APIs, die von Browsern und Drittanbieter-Clients genutzt werden, wo Caching und Auffindbarkeit wichtig sind.", "Wenn man bidirektionales Streaming braucht.", "Bei der Arbeit mit Microservices hinter einer Firewall."], ru: ["Когда максимальная производительность — единственная забота.", "Для публичных API, потребляемых браузерами и сторонними клиентами, где важны кэширование и обнаруживаемость.", "Когда нужен двунаправленный стриминг.", "При работе с микросервисами за файрволом."], uk: ["Коли максимальна продуктивність — єдина турбота.", "Для публічних API, що споживаються браузерами та сторонніми клієнтами, де важливі кешування та виявлюваність.", "Коли потрібен двонаправлений стримінг.", "При роботі з мікросервісами за файрволом."] }, correctIndex: 1, explanation: { en: "REST is ideal for public-facing APIs: it leverages HTTP caching, is universally supported by browsers, and uses human-readable JSON. gRPC excels in internal service-to-service communication.", de: "REST ist ideal f\u00fcr \u00f6ffentliche APIs: es nutzt HTTP-Caching, wird universell von Browsern unterst\u00fctzt und verwendet menschenlesbares JSON. gRPC gl\u00e4nzt bei interner Service-zu-Service-Kommunikation.", ru: "REST идеален для публичных API: он использует HTTP-кэширование, поддерживается всеми браузерами и использует читаемый JSON. gRPC отлично подходит для внутреннего межсервисного взаимодействия.", uk: "REST ідеальний для публічних API: він використовує HTTP-кешування, підтримується усіма браузерами та використовує читабельний JSON. gRPC чудово підходить для внутрішньої міжсервісної взаємодії." } },
{ category: "REST vs RPC", question: { en: "Which constraint is fundamental to REST but not to RPC?", de: "Welche Einschr\u00e4nkung ist fundamental f\u00fcr REST, aber nicht f\u00fcr RPC?", ru: "Какое ограничение фундаментально для REST, но не для RPC?", uk: "Яке обмеження фундаментальне для REST, але не для RPC?" }, options: { en: ["Binary serialization.", "Statelessness — each request must contain all information needed to process it.", "A single endpoint for all operations.", "Mandatory use of SSL/TLS."], de: ["Bin\u00e4re Serialisierung.", "Zustandslosigkeit — jede Anfrage muss alle Informationen enthalten, die zu ihrer Verarbeitung ben\u00f6tigt werden.", "Ein einziger Endpunkt f\u00fcr alle Operationen.", "Obligatorische Verwendung von SSL/TLS."], ru: ["Бинарная сериализация.", "Без состояния (stateless) — каждый запрос должен содержать всю информацию, необходимую для его обработки.", "Единая точка входа для всех операций.", "Обязательное использование SSL/TLS."], uk: ["Бінарна серіалізація.", "Без стану (stateless) — кожен запит повинен містити всю інформацію, необхідну для його обробки.", "Єдина точка входу для всіх операцій.", "Обов'язкове використання SSL/TLS."] }, correctIndex: 1, explanation: { en: "REST requires statelessness: no client session stored on the server between requests. This enables horizontal scaling and caching. RPC has no such architectural constraint.", de: "REST erfordert Zustandslosigkeit: keine Client-Sitzung wird zwischen Anfragen auf dem Server gespeichert. Dies erm\u00f6glicht horizontale Skalierung und Caching. RPC hat keine solche architektonische Einschr\u00e4nkung.", ru: "REST требует безсостояниности: сервер не хранит сессию клиента между запросами. Это обеспечивает горизонтальное масштабирование и кэширование. RPC не имеет такого архитектурного ограничения.", uk: "REST вимагає безстановості: сервер не зберігає сесію клієнта між запитами. Це забезпечує горизонтальне масштабування та кешування. RPC не має такого архітектурного обмеження." } },
// ===== POST vs GET =====
{ category: "HTTP Methods", question: { en: "What is the key semantic difference between GET and POST?", de: "Was ist der wesentliche semantische Unterschied zwischen GET und POST?", ru: "В чём ключевое семантическое различие между GET и POST?", uk: "У чому ключова семантична різниця між GET та POST?" }, options: { en: ["GET is faster than POST.", "GET is safe and idempotent (read-only), POST causes side effects (creates/modifies data).", "GET can send a body, POST cannot.", "POST is always encrypted, GET is not."], de: ["GET ist schneller als POST.", "GET ist sicher und idempotent (nur lesen), POST verursacht Seiteneffekte (erstellt/\u00e4ndert Daten).", "GET kann einen Body senden, POST nicht.", "POST ist immer verschl\u00fcsselt, GET nicht."], ru: ["GET быстрее, чем POST.", "GET безопасен и идемпотентен (только чтение), POST вызывает побочные эффекты (создаёт/изменяет данные).", "GET может отправлять тело, POST — нет.", "POST всегда зашифрован, GET — нет."], uk: ["GET швидший за POST.", "GET безпечний та ідемпотентний (тільки читання), POST викликає побічні ефекти (створює/змінює дані).", "GET може надсилати тіло, POST — ні.", "POST завжди зашифрований, GET — ні."] }, correctIndex: 1, explanation: { en: "GET is defined as a safe, idempotent method for retrieving data. POST is for operations with side effects: creating resources, submitting forms, triggering actions.", de: "GET ist als sichere, idempotente Methode zum Abrufen von Daten definiert. POST ist f\u00fcr Operationen mit Seiteneffekten: Erstellen von Ressourcen, Absenden von Formularen, Ausl\u00f6sen von Aktionen.", ru: "GET определён как безопасный идемпотентный метод для получения данных. POST — для операций с побочными эффектами: создание ресурсов, отправка форм, запуск действий.", uk: "GET визначений як безпечний ідемпотентний метод для отримання даних. POST — для операцій з побічними ефектами: створення ресурсів, надсилання форм, запуск дій." } },
{ category: "HTTP Methods", question: { en: "Why are GET requests cacheable but POST requests are not (by default)?", de: "Warum sind GET-Anfragen cachebar, POST-Anfragen aber nicht (standardm\u00e4\u00dfig)?", ru: "Почему GET-запросы кэшируемы, а POST — нет (по умолчанию)?", uk: "Чому GET-запити кешовані, а POST — ні (за замовчуванням)?" }, options: { en: ["Because GET responses are smaller.", "Because GET is idempotent — the same URL always returns the same result, so caching is safe.", "Because POST uses encryption that prevents caching.", "Because browsers only cache HTML, not API calls."], de: ["Weil GET-Antworten kleiner sind.", "Weil GET idempotent ist — dieselbe URL liefert immer dasselbe Ergebnis, daher ist Caching sicher.", "Weil POST Verschl\u00fcsselung verwendet, die Caching verhindert.", "Weil Browser nur HTML cachen, keine API-Aufrufe."], ru: ["Потому что ответы GET меньше.", "Потому что GET идемпотентен — один и тот же URL всегда возвращает один и тот же результат, поэтому кэширование безопасно.", "Потому что POST использует шифрование, которое предотвращает кэширование.", "Потому что браузеры кэшируют только HTML, а не API-вызовы."], uk: ["Тому що відповіді GET менші.", "Тому що GET ідемпотентний — один і той самий URL завжди повертає один і той самий результат, тому кешування безпечне.", "Тому що POST використовує шифрування, яке запобігає кешуванню.", "Тому що браузери кешують тільки HTML, а не API-виклики."] }, correctIndex: 1, explanation: { en: "Since GET requests don't change state, the same URL can return a cached response. POST modifies state, so caching could lead to skipped side effects.", de: "Da GET-Anfragen den Zustand nicht \u00e4ndern, kann dieselbe URL eine gecachte Antwort liefern. POST ver\u00e4ndert den Zustand, daher k\u00f6nnte Caching zu \u00fcbersprungenen Seiteneffekten f\u00fchren.", ru: "Поскольку GET-запросы не изменяют состояние, один и тот же URL может вернуть кэшированный ответ. POST изменяет состояние, поэтому кэширование может привести к пропуску побочных эффектов.", uk: "Оскільки GET-запити не змінюють стан, один і той самий URL може повернути кешовану відповідь. POST змінює стан, тому кешування може призвести до пропуску побічних ефектів." } },
{ category: "HTTP Methods", question: { en: "What is the difference between PUT and PATCH?", de: "Was ist der Unterschied zwischen PUT und PATCH?", ru: "В чём разница между PUT и PATCH?", uk: "У чому різниця між PUT та PATCH?" }, options: { en: ["PUT is for creating, PATCH is for deleting.", "PUT replaces the entire resource, PATCH applies a partial update.", "They are identical but PATCH is newer.", "PUT is idempotent, PATCH is not defined in HTTP."], de: ["PUT ist zum Erstellen, PATCH ist zum L\u00f6schen.", "PUT ersetzt die gesamte Ressource, PATCH wendet eine teilweise Aktualisierung an.", "Sie sind identisch, aber PATCH ist neuer.", "PUT ist idempotent, PATCH ist nicht in HTTP definiert."], ru: ["PUT для создания, PATCH для удаления.", "PUT заменяет ресурс целиком, PATCH применяет частичное обновление.", "Они идентичны, но PATCH новее.", "PUT идемпотентен, PATCH не определён в HTTP."], uk: ["PUT для створення, PATCH для видалення.", "PUT замінює ресурс цілком, PATCH застосовує часткове оновлення.", "Вони ідентичні, але PATCH новіший.", "PUT ідемпотентний, PATCH не визначений у HTTP."] }, correctIndex: 1, explanation: { en: "PUT sends the complete new representation of the resource. PATCH sends only the fields that need to change. Both are used for updates, but PUT is idempotent while PATCH may not be.", de: "PUT sendet die vollst\u00e4ndige neue Darstellung der Ressource. PATCH sendet nur die Felder, die ge\u00e4ndert werden m\u00fcssen. Beide werden f\u00fcr Updates verwendet, aber PUT ist idempotent, w\u00e4hrend PATCH es m\u00f6glicherweise nicht ist.", ru: "PUT отправляет полное новое представление ресурса. PATCH отправляет только поля, которые нужно изменить. Оба используются для обновления, но PUT идемпотентен, а PATCH — не обязательно.", uk: "PUT надсилає повне нове представлення ресурсу. PATCH надсилає тільки поля, які потрібно змінити. Обидва використовуються для оновлення, але PUT ідемпотентний, а PATCH — не обов'язково." } },
{ category: "HTTP Methods", question: { en: "What HTTP status code should a successful POST that creates a resource return?", de: "Welchen HTTP-Statuscode sollte ein erfolgreicher POST zur\u00fcckgeben, der eine Ressource erstellt?", ru: "Какой HTTP-код должен вернуть успешный POST, создающий ресурс?", uk: "Який HTTP-код повинен повернути успішний POST, що створює ресурс?" }, options: { en: ["200 OK", "201 Created (with a Location header pointing to the new resource)", "204 No Content", "301 Moved Permanently"], de: ["200 OK", "201 Created (mit einem Location-Header, der auf die neue Ressource zeigt)", "204 No Content", "301 Moved Permanently"], ru: ["200 OK", "201 Created (с заголовком Location, указывающим на новый ресурс)", "204 No Content", "301 Moved Permanently"], uk: ["200 OK", "201 Created (із заголовком Location, що вказує на новий ресурс)", "204 No Content", "301 Moved Permanently"] }, correctIndex: 1, explanation: { en: "201 Created signals a new resource was successfully created. The Location header should contain the URI of the newly created resource (e.g., /api/users/42).", de: "201 Created signalisiert, dass eine neue Ressource erfolgreich erstellt wurde. Der Location-Header sollte die URI der neu erstellten Ressource enthalten (z.B. /api/users/42).", ru: "201 Created сообщает, что новый ресурс был успешно создан. Заголовок Location должен содержать URI нового ресурса (например, /api/users/42).", uk: "201 Created повідомляє, що новий ресурс був успішно створений. Заголовок Location повинен містити URI нового ресурсу (наприклад, /api/users/42)." } },
// ===== THROW vs THROW EX =====
{ category: "Exception Handling", question: { en: "What happens when you use 'throw;' (rethrow) inside a catch block?", de: "Was passiert, wenn man 'throw;' (Rethrow) innerhalb eines Catch-Blocks verwendet?", ru: "Что происходит при использовании 'throw;' (rethrow) внутри блока catch?", uk: "Що відбувається при використанні 'throw;' (rethrow) всередині блоку catch?" }, options: { en: ["It creates a new exception with a fresh stack trace.", "It re-throws the caught exception preserving the original stack trace.", "It silently swallows the exception.", "It wraps the exception in an AggregateException."], de: ["Es erstellt eine neue Ausnahme mit einem neuen Stack-Trace.", "Es wirft die gefangene Ausnahme erneut und beh\u00e4lt den urspr\u00fcnglichen Stack-Trace bei.", "Es verschluckt die Ausnahme stillschweigend.", "Es h\u00fcllt die Ausnahme in eine AggregateException ein."], ru: ["Создаёт новое исключение с новым стектрейсом.", "Пробрасывает перехваченное исключение, сохраняя оригинальный стектрейс.", "Тихо подавляет исключение.", "Оборачивает исключение в AggregateException."], uk: ["Створює новий виняток з новим стектрейсом.", "Прокидає перехоплений виняток, зберігаючи оригінальний стектрейс.", "Тихо придушує виняток.", "Обгортає виняток у AggregateException."] }, correctIndex: 1, explanation: { en: "'throw;' (without the exception variable) preserves the original stack trace, which is critical for debugging — you can see exactly where the error originated.", de: "'throw;' (ohne die Ausnahme-Variable) bewahrt den originalen Stack-Trace, was f\u00fcr das Debugging entscheidend ist — man kann genau sehen, wo der Fehler entstanden ist.", ru: "'throw;' (без переменной исключения) сохраняет оригинальный стектрейс, что критически важно для отладки — вы видите, где именно возникла ошибка.", uk: "'throw;' (без змінної винятку) зберігає оригінальний стектрейс, що критично важливо для відладки — ви бачите, де саме виникла помилка." } },
{ category: "Exception Handling", question: { en: "What is wrong with 'throw ex;' in a catch block?", de: "Was ist falsch an 'throw ex;' in einem Catch-Block?", ru: "Что плохого в 'throw ex;' внутри блока catch?", uk: "Що поганого у 'throw ex;' всередині блоку catch?" }, options: { en: ["It doesn't compile.", "It resets the stack trace to the current line, losing the original error location.", "It throws a different exception type.", "It causes a memory leak."], de: ["Es kompiliert nicht.", "Es setzt den Stack-Trace auf die aktuelle Zeile zur\u00fcck und verliert den urspr\u00fcnglichen Fehlerort.", "Es wirft einen anderen Ausnahmetyp.", "Es verursacht ein Speicherleck."], ru: ["Не компилируется.", "Сбрасывает стектрейс на текущую строку, теряя исходное место ошибки.", "Бросает другой тип исключения.", "Вызывает утечку памяти."], uk: ["Не компілюється.", "Скидає стектрейс на поточний рядок, втрачаючи вихідне місце помилки.", "Кидає інший тип винятку.", "Спричиняє витік пам'яті."] }, correctIndex: 1, explanation: { en: "'throw ex;' replaces the stack trace with one starting at the catch block. You lose the information about where the exception was originally thrown, making debugging much harder.", de: "'throw ex;' ersetzt den Stack-Trace durch einen, der beim Catch-Block beginnt. Man verliert die Information, wo die Ausnahme urspr\u00fcnglich geworfen wurde, was das Debugging erheblich erschwert.", ru: "'throw ex;' заменяет стектрейс на тот, что начинается с блока catch. Вы теряете информацию о том, где исключение было изначально выброшено, что значительно усложняет отладку.", uk: "'throw ex;' замінює стектрейс на той, що починається з блоку catch. Ви втрачаєте інформацію про те, де виняток був спочатку кинутий, що значно ускладнює відладку." } },
{ category: "Exception Handling", question: { en: "How do you properly wrap an exception with additional context?", de: "Wie h\u00fcllt man eine Ausnahme korrekt mit zus\u00e4tzlichem Kontext ein?", ru: "Как правильно обернуть исключение дополнительным контекстом?", uk: "Як правильно обгорнути виняток додатковим контекстом?" }, options: { en: ["throw ex; with a modified Message property.", "throw new ApplicationException(\"context\", ex); — passing the original as InnerException.", "catch and log, then return null.", "Use goto to skip the error."], de: ["throw ex; mit einer ge\u00e4nderten Message-Eigenschaft.", "throw new ApplicationException(\"context\", ex); — das Original als InnerException \u00fcbergeben.", "Fangen und loggen, dann null zur\u00fcckgeben.", "goto verwenden, um den Fehler zu \u00fcberspringen."], ru: ["throw ex; с изменённым свойством Message.", "throw new ApplicationException(\"context\", ex); — передать оригинал как InnerException.", "Перехватить и залогировать, затем вернуть null.", "Использовать goto для пропуска ошибки."], uk: ["throw ex; зі зміненою властивістю Message.", "throw new ApplicationException(\"context\", ex); — передати оригінал як InnerException.", "Перехопити і залогувати, потім повернути null.", "Використати goto для пропуску помилки."] }, correctIndex: 1, explanation: { en: "Passing the original exception as the second parameter (innerException) preserves the full chain. Callers can inspect InnerException to see the root cause.", de: "Das \u00dcbergeben der urspr\u00fcnglichen Ausnahme als zweiten Parameter (innerException) bewahrt die vollst\u00e4ndige Kette. Aufrufer k\u00f6nnen InnerException untersuchen, um die Grundursache zu sehen.", ru: "Передача оригинального исключения вторым параметром (innerException) сохраняет всю цепочку. Вызывающий код может просмотреть InnerException, чтобы увидеть корневую причину.", uk: "Передача оригінального винятку другим параметром (innerException) зберігає весь ланцюг. Викликаючий код може переглянути InnerException, щоб побачити кореневу причину." } },
{ category: "Exception Handling", question: { en: "What are exception filters in C# and when are they useful?", de: "Was sind Ausnahmefilter in C# und wann sind sie n\u00fctzlich?", ru: "Что такое фильтры исключений в C# и когда они полезны?", uk: "Що таке фільтри винятків у C# та коли вони корисні?" }, options: { en: ["A way to convert exceptions to different types.", "The 'when' keyword in catch blocks: catch (Exception ex) when (ex.Message.Contains(\"timeout\")).", "A NuGet package for filtering exceptions.", "Attributes applied to methods to suppress exceptions."], de: ["Eine M\u00f6glichkeit, Ausnahmen in andere Typen umzuwandeln.", "Das 'when'-Schl\u00fcsselwort in Catch-Bl\u00f6cken: catch (Exception ex) when (ex.Message.Contains(\"timeout\")).", "Ein NuGet-Paket zum Filtern von Ausnahmen.", "Attribute, die auf Methoden angewendet werden, um Ausnahmen zu unterdr\u00fccken."], ru: ["Способ конвертировать исключения в другие типы.", "Ключевое слово 'when' в блоках catch: catch (Exception ex) when (ex.Message.Contains(\"timeout\")).", "NuGet-пакет для фильтрации исключений.", "Атрибуты, применяемые к методам для подавления исключений."], uk: ["Спосіб конвертувати винятки в інші типи.", "Ключове слово 'when' у блоках catch: catch (Exception ex) when (ex.Message.Contains(\"timeout\")).", "NuGet-пакет для фільтрації винятків.", "Атрибути, що застосовуються до методів для придушення винятків."] }, correctIndex: 1, explanation: { en: "Exception filters (when clause) let you conditionally catch exceptions without entering the catch block. The stack trace is preserved because the exception is never actually caught and rethrown.", de: "Ausnahmefilter (when-Klausel) erm\u00f6glichen es, Ausnahmen bedingt zu fangen, ohne den Catch-Block zu betreten. Der Stack-Trace bleibt erhalten, weil die Ausnahme nie tats\u00e4chlich gefangen und erneut geworfen wird.", ru: "Фильтры исключений (when-клаузула) позволяют условно перехватывать исключения, не входя в блок catch. Стектрейс сохраняется, потому что исключение на самом деле не перехватывается и не пробрасывается.", uk: "Фільтри винятків (when-клаузула) дозволяють умовно перехоплювати винятки, не входячи у блок catch. Стектрейс зберігається, тому що виняток насправді не перехоплюється і не прокидається." } },
{ category: "Exception Handling", question: { en: "Why should you avoid catching System.Exception in most cases?", de: "Warum sollte man in den meisten F\u00e4llen das Fangen von System.Exception vermeiden?", ru: "Почему в большинстве случаев следует избегать перехвата System.Exception?", uk: "Чому у більшості випадків слід уникати перехоплення System.Exception?" }, options: { en: ["Because it doesn't catch all exceptions.", "Because it catches everything including OutOfMemoryException and StackOverflowException, hiding bugs and masking critical failures.", "Because it has poor performance.", "Because it's deprecated in .NET 8."], de: ["Weil es nicht alle Ausnahmen f\u00e4ngt.", "Weil es alles f\u00e4ngt, einschliesslich OutOfMemoryException und StackOverflowException, was Bugs verbirgt und kritische Fehler maskiert.", "Weil es schlechte Performance hat.", "Weil es in .NET 8 veraltet ist."], ru: ["Потому что оно не перехватывает все исключения.", "Потому что оно перехватывает всё, включая OutOfMemoryException и StackOverflowException, скрывая баги и маскируя критические сбои.", "Потому что у него плохая производительность.", "Потому что оно устарело в .NET 8."], uk: ["Тому що воно не перехоплює всі винятки.", "Тому що воно перехоплює все, включаючи OutOfMemoryException і StackOverflowException, приховуючи баги і маскуючи критичні збої.", "Тому що у нього погана продуктивність.", "Тому що воно застаріло у .NET 8."] }, correctIndex: 1, explanation: { en: "Catching the base Exception type swallows everything, including fatal errors that should crash the process. Always catch the most specific exception type you can handle.", de: "Das Fangen des Basis-Exception-Typs verschluckt alles, einschliesslich fataler Fehler, die den Prozess zum Absturz bringen sollten. Fange immer den spezifischsten Ausnahmetyp, den du behandeln kannst.", ru: "Перехват базового типа Exception поглощает всё, включая фатальные ошибки, которые должны завершить процесс. Всегда перехватывайте наиболее конкретный тип исключения, который вы можете обработать.", uk: "Перехоплення базового типу Exception поглинає все, включаючи фатальні помилки, які повинні завершити процес. Завжди перехоплюйте найбільш конкретний тип винятку, який ви можете обробити." } },
// ===== EVENT SOURCING =====
{ category: "Event Sourcing", question: { en: "What is event sourcing?", de: "Was ist Event Sourcing?", ru: "Что такое event sourcing?", uk: "Що таке event sourcing?" }, options: { en: ["A logging framework for tracking application errors.", "A pattern where state changes are stored as a sequence of immutable events, rather than storing current state.", "A way to subscribe to DOM events in JavaScript.", "A database replication technique."], de: ["Ein Logging-Framework zur Verfolgung von Anwendungsfehlern.", "Ein Pattern, bei dem Zustands\u00e4nderungen als Sequenz unver\u00e4nderlicher Events gespeichert werden, anstatt den aktuellen Zustand zu speichern.", "Eine M\u00f6glichkeit, DOM-Events in JavaScript zu abonnieren.", "Eine Datenbank-Replikationstechnik."], ru: ["Фреймворк логирования для отслеживания ошибок приложения.", "Паттерн, при котором изменения состояния сохраняются как последовательность неизменяемых событий, а не текущее состояние.", "Способ подписки на DOM-события в JavaScript.", "Техника репликации базы данных."], uk: ["Фреймворк логування для відстеження помилок застосунку.", "Патерн, при якому зміни стану зберігаються як послідовність незмінних подій, а не поточний стан.", "Спосіб підписки на DOM-події у JavaScript.", "Техніка реплікації бази даних."] }, correctIndex: 1, explanation: { en: "Instead of saving current state (Balance: 150), you save the events that led to it (Deposited 200, Withdrawn 50). Current state is rebuilt by replaying the event log.", de: "Anstatt den aktuellen Zustand zu speichern (Balance: 150), speichert man die Events, die dazu gef\u00fchrt haben (Deposited 200, Withdrawn 50). Der aktuelle Zustand wird durch Abspielen des Event-Logs rekonstruiert.", ru: "Вместо сохранения текущего состояния (Balance: 150) сохраняются события, которые к нему привели (Deposited 200, Withdrawn 50). Текущее состояние восстанавливается воспроизведением лога событий.", uk: "Замість збереження поточного стану (Balance: 150) зберігаються події, що до нього привели (Deposited 200, Withdrawn 50). Поточний стан відновлюється відтворенням логу подій." } },
{ category: "Event Sourcing", question: { en: "What problem do snapshots solve in event sourcing?", de: "Welches Problem l\u00f6sen Snapshots beim Event Sourcing?", ru: "Какую проблему решают снапшоты в event sourcing?", uk: "Яку проблему вирішують снапшоти в event sourcing?" }, options: { en: ["They encrypt events for security.", "They save the current state at a point in time so you don't have to replay all events from the beginning.", "They convert events to a different format.", "They prevent duplicate events."], de: ["Sie verschl\u00fcsseln Events f\u00fcr Sicherheit.", "Sie speichern den aktuellen Zustand zu einem Zeitpunkt, damit man nicht alle Events von Anfang an abspielen muss.", "Sie konvertieren Events in ein anderes Format.", "Sie verhindern doppelte Events."], ru: ["Они шифруют события для безопасности.", "Они сохраняют текущее состояние на определённый момент, чтобы не нужно было воспроизводить все события с начала.", "Они конвертируют события в другой формат.", "Они предотвращают дублирование событий."], uk: ["Вони шифрують події для безпеки.", "Вони зберігають поточний стан на певний момент, щоб не потрібно було відтворювати всі події з початку.", "Вони конвертують події в інший формат.", "Вони запобігають дублюванню подій."] }, correctIndex: 1, explanation: { en: "As the event log grows, replaying thousands of events becomes slow. A snapshot captures the aggregate state at event N, so you only replay events after N.", de: "Wenn das Event-Log w\u00e4chst, wird das Abspielen tausender Events langsam. Ein Snapshot erfasst den Aggregat-Zustand bei Event N, sodass man nur Events nach N abspielen muss.", ru: "По мере роста лога событий воспроизведение тысяч событий становится медленным. Снапшот фиксирует состояние агрегата на событии N, и вам нужно воспроизвести только события после N.", uk: "По мірі зростання логу подій відтворення тисяч подій стає повільним. Снапшот фіксує стан агрегату на події N, і вам потрібно відтворити тільки події після N." } },
{ category: "Event Sourcing", question: { en: "How does event sourcing relate to CQRS?", de: "Wie h\u00e4ngt Event Sourcing mit CQRS zusammen?", ru: "Как event sourcing связан с CQRS?", uk: "Як event sourcing пов'язаний з CQRS?" }, options: { en: ["They are the same thing.", "CQRS separates read and write models; event sourcing provides the write model as an event log, while read models are built from projections.", "CQRS replaces event sourcing.", "They cannot be used together."], de: ["Sie sind dasselbe.", "CQRS trennt Lese- und Schreibmodelle; Event Sourcing liefert das Schreibmodell als Event-Log, w\u00e4hrend Lesemodelle aus Projektionen erstellt werden.", "CQRS ersetzt Event Sourcing.", "Sie k\u00f6nnen nicht zusammen verwendet werden."], ru: ["Это одно и то же.", "CQRS разделяет модели чтения и записи; event sourcing обеспечивает модель записи в виде лога событий, а модели чтения строятся из проекций.", "CQRS заменяет event sourcing.", "Их нельзя использовать вместе."], uk: ["Це одне й те саме.", "CQRS розділяє моделі читання та запису; event sourcing забезпечує модель запису у вигляді логу подій, а моделі читання будуються з проєкцій.", "CQRS замінює event sourcing.", "Їх не можна використовувати разом."] }, correctIndex: 1, explanation: { en: "CQRS (Command Query Responsibility Segregation) naturally pairs with event sourcing: commands append events to the store, and projections build optimized read models from those events.", de: "CQRS (Command Query Responsibility Segregation) passt nat\u00fcrlich zu Event Sourcing: Befehle f\u00fcgen Events zum Store hinzu, und Projektionen erstellen optimierte Lesemodelle aus diesen Events.", ru: "CQRS (Command Query Responsibility Segregation) естественно сочетается с event sourcing: команды добавляют события в хранилище, а проекции строят оптимизированные модели чтения из этих событий.", uk: "CQRS (Command Query Responsibility Segregation) природно поєднується з event sourcing: команди додають події до сховища, а проєкції будують оптимізовані моделі читання з цих подій." } },
{ category: "Event Sourcing", question: { en: "What is a key advantage of event sourcing over traditional CRUD?", de: "Was ist ein wesentlicher Vorteil von Event Sourcing gegen\u00fcber traditionellem CRUD?", ru: "Каково ключевое преимущество event sourcing перед традиционным CRUD?", uk: "Яка ключова перевага event sourcing перед традиційним CRUD?" }, options: { en: ["Simpler implementation and lower storage costs.", "Complete audit trail — you can reconstruct the state at any point in time and understand exactly what happened.", "Faster read queries without indexes.", "No need for a database."], de: ["Einfachere Implementierung und niedrigere Speicherkosten.", "Vollst\u00e4ndiger Audit-Trail — man kann den Zustand zu jedem Zeitpunkt rekonstruieren und genau verstehen, was passiert ist.", "Schnellere Leseabfragen ohne Indizes.", "Keine Datenbank erforderlich."], ru: ["Более простая реализация и меньшие затраты на хранение.", "Полный аудит — можно восстановить состояние на любой момент времени и точно понять, что произошло.", "Более быстрые запросы на чтение без индексов.", "Не нужна база данных."], uk: ["Простіша реалізація та менші витрати на зберігання.", "Повний аудит — можна відновити стан на будь-який момент часу та точно зрозуміти, що сталося.", "Швидші запити на читання без індексів.", "Не потрібна база даних."] }, correctIndex: 1, explanation: { en: "Event sourcing gives you a complete, immutable history. You can time-travel to any state, replay events for debugging, and build new read models retroactively.", de: "Event Sourcing gibt Ihnen eine vollst\u00e4ndige, unver\u00e4nderliche Historie. Man kann zu jedem Zustand zeitreisen, Events f\u00fcr Debugging abspielen und neue Lesemodelle r\u00fcckwirkend erstellen.", ru: "Event sourcing даёт полную неизменяемую историю. Можно «путешествовать во времени» к любому состоянию, воспроизводить события для отладки и строить новые модели чтения ретроактивно.", uk: "Event sourcing дає повну незмінну історію. Можна «подорожувати у часі» до будь-якого стану, відтворювати події для відладки та будувати нові моделі читання ретроактивно." } },
{ category: "Event Sourcing", question: { en: "What is eventual consistency and why is it relevant to event sourcing?", de: "Was ist Eventual Consistency und warum ist es f\u00fcr Event Sourcing relevant?", ru: "Что такое eventual consistency и почему это актуально для event sourcing?", uk: "Що таке eventual consistency і чому це актуально для event sourcing?" }, options: { en: ["It means the system is always consistent.", "Read models may be slightly behind the write model — they will eventually catch up as events are projected.", "It guarantees all nodes have the same data at the same time.", "It's a database locking mechanism."], de: ["Es bedeutet, dass das System immer konsistent ist.", "Lesemodelle k\u00f6nnen leicht hinter dem Schreibmodell zur\u00fcckliegen — sie holen schliesslich auf, wenn Events projiziert werden.", "Es garantiert, dass alle Knoten gleichzeitig dieselben Daten haben.", "Es ist ein Datenbank-Sperrmechanismus."], ru: ["Это значит, что система всегда консистентна.", "Модели чтения могут немного отставать от модели записи — они в конечном итоге догонят по мере проецирования событий.", "Гарантирует, что все узлы имеют одинаковые данные одновременно.", "Это механизм блокировки базы данных."], uk: ["Це означає, що система завжди консистентна.", "Моделі читання можуть трохи відставати від моделі запису — вони врешті-решт наздоженуть по мірі проєктування подій.", "Гарантує, що всі вузли мають однакові дані одночасно.", "Це механізм блокування бази даних."] }, correctIndex: 1, explanation: { en: "In event-sourced systems with CQRS, the read model is updated asynchronously via projections. There's a small delay between writing an event and the read model reflecting it.", de: "In event-sourced Systemen mit CQRS wird das Lesemodell asynchron \u00fcber Projektionen aktualisiert. Es gibt eine kleine Verz\u00f6gerung zwischen dem Schreiben eines Events und dessen Widerspiegelung im Lesemodell.", ru: "В event-sourced системах с CQRS модель чтения обновляется асинхронно через проекции. Есть небольшая задержка между записью события и отражением его в модели чтения.", uk: "У event-sourced системах з CQRS модель читання оновлюється асинхронно через проєкції. Є невелика затримка між записом події та її відображенням у моделі читання." } },
// ===== MESSAGE BUS =====
{ category: "Message Bus", question: { en: "What is a message bus?", de: "Was ist ein Message Bus?", ru: "Что такое message bus?", uk: "Що таке message bus?" }, options: { en: ["A hardware component for connecting servers.", "An infrastructure component for asynchronous message exchange between services, decoupling producers from consumers.", "A type of database for storing messages.", "A network protocol like HTTP."], de: ["Eine Hardwarekomponente zur Verbindung von Servern.", "Eine Infrastrukturkomponente f\u00fcr den asynchronen Nachrichtenaustausch zwischen Services, die Produzenten von Konsumenten entkoppelt.", "Ein Datenbanktyp zum Speichern von Nachrichten.", "Ein Netzwerkprotokoll wie HTTP."], ru: ["Аппаратный компонент для соединения серверов.", "Инфраструктурный компонент для асинхронного обмена сообщениями между сервисами, развязывающий производителей и потребителей.", "Тип базы данных для хранения сообщений.", "Сетевой протокол вроде HTTP."], uk: ["Апаратний компонент для з'єднання серверів.", "Інфраструктурний компонент для асинхронного обміну повідомленнями між сервісами, що розв'язує виробників і споживачів.", "Тип бази даних для зберігання повідомлень.", "Мережевий протокол на кшталт HTTP."] }, correctIndex: 1, explanation: { en: "A message bus (RabbitMQ, Azure Service Bus, Kafka) allows services to communicate asynchronously. The sender doesn't need to know who receives the message or when.", de: "Ein Message Bus (RabbitMQ, Azure Service Bus, Kafka) erm\u00f6glicht Services, asynchron zu kommunizieren. Der Sender muss nicht wissen, wer die Nachricht empf\u00e4ngt oder wann.", ru: "Message bus (RabbitMQ, Azure Service Bus, Kafka) позволяет сервисам общаться асинхронно. Отправителю не нужно знать, кто получит сообщение и когда.", uk: "Message bus (RabbitMQ, Azure Service Bus, Kafka) дозволяє сервісам спілкуватися асинхронно. Відправнику не потрібно знати, хто отримає повідомлення і коли." } },
{ category: "Message Bus", question: { en: "What is the difference between a Queue and a Topic (pub/sub)?", de: "Was ist der Unterschied zwischen einer Queue und einem Topic (Pub/Sub)?", ru: "В чём разница между Queue и Topic (pub/sub)?", uk: "У чому різниця між Queue та Topic (pub/sub)?" }, options: { en: ["Queues are faster than topics.", "In a queue, each message is consumed by one consumer. In pub/sub, each message is delivered to all subscribers.", "Topics can only send text messages.", "Queues require HTTP, topics require WebSockets."], de: ["Queues sind schneller als Topics.", "In einer Queue wird jede Nachricht von einem Consumer verarbeitet. Bei Pub/Sub wird jede Nachricht an alle Subscriber geliefert.", "Topics k\u00f6nnen nur Textnachrichten senden.", "Queues erfordern HTTP, Topics erfordern WebSockets."], ru: ["Очереди быстрее топиков.", "В очереди каждое сообщение обрабатывается одним потребителем. В pub/sub каждое сообщение доставляется всем подписчикам.", "Топики могут отправлять только текстовые сообщения.", "Очереди требуют HTTP, топики — WebSockets."], uk: ["Черги швидші за топіки.", "У черзі кожне повідомлення обробляється одним споживачем. У pub/sub кожне повідомлення доставляється всім підписникам.", "Топіки можуть надсилати тільки текстові повідомлення.", "Черги вимагають HTTP, топіки — WebSockets."] }, correctIndex: 1, explanation: { en: "Queue = competing consumers (load balancing). Topic/pub-sub = fan-out (one event triggers multiple independent handlers). Choose based on whether you need one or many processors.", de: "Queue = konkurrierende Consumer (Lastverteilung). Topic/Pub-Sub = Fan-out (ein Event l\u00f6st mehrere unabh\u00e4ngige Handler aus). W\u00e4hle basierend darauf, ob du einen oder viele Verarbeiter brauchst.", ru: "Queue = конкурирующие потребители (балансировка нагрузки). Topic/pub-sub = fan-out (одно событие запускает несколько независимых обработчиков). Выбирайте в зависимости от того, нужен ли вам один или много обработчиков.", uk: "Queue = конкуруючі споживачі (балансування навантаження). Topic/pub-sub = fan-out (одна подія запускає кілька незалежних обробників). Обирайте залежно від того, чи потрібен вам один або багато обробників." } },
{ category: "Message Bus", question: { en: "What is the Outbox Pattern and why is it needed with message buses?", de: "Was ist das Outbox-Pattern und warum wird es mit Message Buses ben\u00f6tigt?", ru: "Что такое паттерн Outbox и зачем он нужен при работе с message bus?", uk: "Що таке патерн Outbox і навіщо він потрібний при роботі з message bus?" }, options: { en: ["It stores messages in the sender's outbox folder like email.", "It ensures atomicity: the database change and the message are saved in the same transaction, then a background process publishes messages.", "It compresses messages before sending.", "It's a retry mechanism for failed messages."], de: ["Es speichert Nachrichten im Ausgangsordner des Senders wie bei E-Mail.", "Es stellt Atomarit\u00e4t sicher: Die Datenbank\u00e4nderung und die Nachricht werden in derselben Transaktion gespeichert, dann ver\u00f6ffentlicht ein Hintergrundprozess die Nachrichten.", "Es komprimiert Nachrichten vor dem Senden.", "Es ist ein Retry-Mechanismus f\u00fcr fehlgeschlagene Nachrichten."], ru: ["Хранит сообщения в папке исходящих отправителя, как email.", "Обеспечивает атомарность: изменение БД и сообщение сохраняются в одной транзакции, затем фоновый процесс публикует сообщения.", "Сжимает сообщения перед отправкой.", "Это механизм повторных попыток для неудачных сообщений."], uk: ["Зберігає повідомлення у папці вихідних відправника, як email.", "Забезпечує атомарність: зміна БД і повідомлення зберігаються в одній транзакції, потім фоновий процес публікує повідомлення.", "Стискає повідомлення перед надсиланням.", "Це механізм повторних спроб для невдалих повідомлень."] }, correctIndex: 1, explanation: { en: "Without the Outbox Pattern, you risk saving to DB but failing to publish the message (or vice versa). The outbox table stores events in the same DB transaction, guaranteeing consistency.", de: "Ohne das Outbox-Pattern riskiert man, in die DB zu speichern, aber die Nachricht nicht zu ver\u00f6ffentlichen (oder umgekehrt). Die Outbox-Tabelle speichert Events in derselben DB-Transaktion und garantiert Konsistenz.", ru: "Без паттерна Outbox есть риск сохранить в БД, но не опубликовать сообщение (или наоборот). Outbox-таблица хранит события в той же транзакции БД, гарантируя согласованность.", uk: "Без патерну Outbox є ризик зберегти у БД, але не опублікувати повідомлення (або навпаки). Outbox-таблиця зберігає події у тій самій транзакції БД, гарантуючи узгодженість." } },
{ category: "Message Bus", question: { en: "What is a Dead Letter Queue (DLQ)?", de: "Was ist eine Dead Letter Queue (DLQ)?", ru: "Что такое Dead Letter Queue (DLQ)?", uk: "Що таке Dead Letter Queue (DLQ)?" }, options: { en: ["A queue for deleted messages.", "A special queue where messages that cannot be processed (after max retries) are moved for later inspection.", "A queue that automatically deletes old messages.", "A queue used exclusively for logging."], de: ["Eine Queue f\u00fcr gel\u00f6schte Nachrichten.", "Eine spezielle Queue, in die Nachrichten verschoben werden, die nicht verarbeitet werden k\u00f6nnen (nach max. Retries), zur sp\u00e4teren Untersuchung.", "Eine Queue, die alte Nachrichten automatisch l\u00f6scht.", "Eine Queue, die ausschliesslich f\u00fcr Logging verwendet wird."], ru: ["Очередь для удалённых сообщений.", "Специальная очередь, куда перемещаются сообщения, которые не удалось обработать (после максимума повторов), для дальнейшего анализа.", "Очередь, автоматически удаляющая старые сообщения.", "Очередь, используемая исключительно для логирования."], uk: ["Черга для видалених повідомлень.", "Спеціальна черга, куди переміщуються повідомлення, які не вдалося обробити (після максимуму повторів), для подальшого аналізу.", "Черга, що автоматично видаляє старі повідомлення.", "Черга, що використовується виключно для логування."] }, correctIndex: 1, explanation: { en: "When a message repeatedly fails processing (e.g., 5 retries), it moves to the DLQ instead of being lost. Engineers can inspect DLQ messages, fix the issue, and replay them.", de: "Wenn eine Nachricht wiederholt bei der Verarbeitung fehlschl\u00e4gt (z.B. 5 Retries), wird sie in die DLQ verschoben, anstatt verloren zu gehen. Ingenieure k\u00f6nnen DLQ-Nachrichten inspizieren, das Problem beheben und sie erneut abspielen.", ru: "Когда сообщение многократно не удаётся обработать (например, 5 повторов), оно перемещается в DLQ, а не теряется. Инженеры могут проверить сообщения в DLQ, исправить проблему и воспроизвести их.", uk: "Коли повідомлення багаторазово не вдається обробити (наприклад, 5 повторів), воно переміщується у DLQ, а не втрачається. Інженери можуть перевірити повідомлення у DLQ, виправити проблему та відтворити їх." } },
{ category: "Message Bus", question: { en: "When should you consider using a message bus in your architecture?", de: "Wann sollte man die Verwendung eines Message Bus in der Architektur in Betracht ziehen?", ru: "Когда стоит рассмотреть использование message bus в архитектуре?", uk: "Коли варто розглянути використання message bus в архітектурі?" }, options: { en: ["For every API call between services.", "When you need to decouple services, handle async workflows, smooth out load spikes, or implement event-driven patterns.", "Only when using microservices with Kubernetes.", "When your database is too slow."], de: ["F\u00fcr jeden API-Aufruf zwischen Services.", "Wenn man Services entkoppeln, asynchrone Workflows verarbeiten, Lastspitzen gl\u00e4tten oder eventgesteuerte Patterns implementieren muss.", "Nur bei Verwendung von Microservices mit Kubernetes.", "Wenn die Datenbank zu langsam ist."], ru: ["Для каждого API-вызова между сервисами.", "Когда нужно развязать сервисы, обрабатывать асинхронные рабочие процессы, сглаживать пики нагрузки или реализовать event-driven паттерны.", "Только при использовании микросервисов с Kubernetes.", "Когда база данных слишком медленная."], uk: ["Для кожного API-виклику між сервісами.", "Коли потрібно розв'язати сервіси, обробляти асинхронні робочі процеси, згладжувати піки навантаження або реалізувати event-driven патерни.", "Тільки при використанні мікросервісів з Kubernetes.", "Коли база даних занадто повільна."] }, correctIndex: 1, explanation: { en: "Message buses shine for: service decoupling, async processing (emails, reports), event-driven architecture (OrderCreated -> update inventory + send notification), and load leveling (absorb spikes via queue).", de: "Message Buses gl\u00e4nzen bei: Service-Entkopplung, asynchroner Verarbeitung (E-Mails, Berichte), eventgesteuerter Architektur (OrderCreated -> Lager aktualisieren + Benachrichtigung senden) und Lastausgleich (Spitzen \u00fcber Queue absorbieren).", ru: "Message bus отлично подходят для: развязки сервисов, асинхронной обработки (email, отчёты), event-driven архитектуры (OrderCreated -> обновить склад + отправить уведомление) и сглаживания нагрузки (абсорбировать пики через очередь).", uk: "Message bus чудово підходять для: розв'язки сервісів, асинхронної обробки (email, звіти), event-driven архітектури (OrderCreated -> оновити склад + надіслати сповіщення) та згладжування навантаження (абсорбувати піки через чергу)." } },

{ category: "Idempotency", question: { en: "What does it mean for an HTTP method to be idempotent?", de: "Was bedeutet es, wenn eine HTTP-Methode idempotent ist?", ru: "Что значит идемпотентность HTTP-метода?", uk: "Що означає ідемпотентність HTTP-методу?" }, options: { en: ["It executes only once.", "Making the same request multiple times produces the same result as making it once.", "It requires authentication.", "It doesn't return a response body."], de: ["Es wird nur einmal ausgef\u00fchrt.", "Mehrmaliges Senden derselben Anfrage erzeugt dasselbe Ergebnis wie einmaliges Senden.", "Es erfordert Authentifizierung.", "Es gibt keinen Antwortk\u00f6rper zur\u00fcck."], ru: ["Выполняется только один раз.", "Повторное выполнение одного и того же запроса даёт тот же результат, что и однократное.", "Требует аутентификации.", "Не возвращает тело ответа."], uk: ["Виконується тільки один раз.", "Повторне виконання одного й того самого запиту дає той самий результат, що й одноразове.", "Вимагає автентифікації.", "Не повертає тіло відповіді."] }, correctIndex: 1, explanation: { en: "GET, PUT, DELETE are idempotent: repeating them has no additional effect. POST is not idempotent: sending the same POST twice may create two resources.", de: "GET, PUT, DELETE sind idempotent: Wiederholung hat keinen zus\u00e4tzlichen Effekt. POST ist nicht idempotent: dasselbe POST zweimal senden kann zwei Ressourcen erstellen.", ru: "GET, PUT, DELETE идемпотентны: повторение не имеет дополнительного эффекта. POST не идемпотентен: отправка одного и того же POST дважды может создать два ресурса.", uk: "GET, PUT, DELETE ідемпотентні: повторення не має додаткового ефекту. POST не ідемпотентний: надсилання одного й того самого POST двічі може створити два ресурси." } },
{ category: "Serialization", question: { en: "What is the difference between JSON and Protocol Buffers?", de: "Was ist der Unterschied zwischen JSON und Protocol Buffers?", ru: "В чём разница между JSON и Protocol Buffers?", uk: "У чому різниця між JSON та Protocol Buffers?" }, options: { en: ["JSON is binary, protobuf is text.", "JSON is human-readable text; protobuf is a compact binary format with strict schema, typically 3-10x smaller and faster to parse.", "They have the same performance.", "Protobuf only works with Java."], de: ["JSON ist bin\u00e4r, protobuf ist Text.", "JSON ist menschenlesbarer Text; protobuf ist ein kompaktes bin\u00e4res Format mit striktem Schema, typischerweise 3-10x kleiner und schneller zu parsen.", "Sie haben die gleiche Performance.", "Protobuf funktioniert nur mit Java."], ru: ["JSON бинарный, protobuf текстовый.", "JSON — читаемый текст; protobuf — компактный бинарный формат со строгой схемой, обычно в 3-10 раз меньше и быстрее для парсинга.", "У них одинаковая производительность.", "Protobuf работает только с Java."], uk: ["JSON бінарний, protobuf текстовий.", "JSON — читабельний текст; protobuf — компактний бінарний формат зі строгою схемою, зазвичай у 3-10 разів менший та швидший для парсингу.", "У них однакова продуктивність.", "Protobuf працює тільки з Java."] }, correctIndex: 1, explanation: { en: "JSON is universal and easy to debug. Protocol Buffers are smaller and faster but require a .proto schema definition and code generation. Use JSON for public APIs, protobuf for internal gRPC.", de: "JSON ist universell und leicht zu debuggen. Protocol Buffers sind kleiner und schneller, erfordern aber eine .proto-Schema-Definition und Code-Generierung. JSON f\u00fcr \u00f6ffentliche APIs, protobuf f\u00fcr internes gRPC.", ru: "JSON универсален и удобен для отладки. Protocol Buffers меньше и быстрее, но требуют определения .proto-схемы и генерации кода. JSON для публичных API, protobuf для внутреннего gRPC.", uk: "JSON універсальний та зручний для відладки. Protocol Buffers менші та швидші, але вимагають визначення .proto-схеми та генерації коду. JSON для публічних API, protobuf для внутрішнього gRPC." } },
{ category: "Saga Pattern", question: { en: "What is the Saga pattern in distributed systems?", de: "Was ist das Saga-Pattern in verteilten Systemen?", ru: "Что такое паттерн Saga в распределённых системах?", uk: "Що таке патерн Saga у розподілених системах?" }, options: { en: ["A database migration strategy.", "A sequence of local transactions where each step publishes an event to trigger the next, with compensating actions for rollback.", "A logging pattern for tracking sagas of user interactions.", "A caching strategy for saga-length operations."], de: ["Eine Datenbank-Migrationsstrategie.", "Eine Sequenz lokaler Transaktionen, bei der jeder Schritt ein Event ver\u00f6ffentlicht, um den n\u00e4chsten auszul\u00f6sen, mit kompensierenden Aktionen f\u00fcr Rollback.", "Ein Logging-Pattern zur Verfolgung von Sagas der Benutzerinteraktionen.", "Eine Caching-Strategie f\u00fcr Operationen in Saga-L\u00e4nge."], ru: ["Стратегия миграции базы данных.", "Последовательность локальных транзакций, где каждый шаг публикует событие для запуска следующего, с компенсирующими действиями для отката.", "Паттерн логирования для отслеживания саг пользовательских взаимодействий.", "Стратегия кэширования для длительных операций."], uk: ["Стратегія міграції бази даних.", "Послідовність локальних транзакцій, де кожен крок публікує подію для запуску наступного, з компенсуючими діями для відкату.", "Патерн логування для відстеження саг користувацьких взаємодій.", "Стратегія кешування для тривалих операцій."] }, correctIndex: 1, explanation: { en: "Sagas replace distributed transactions (2PC) in microservices. Each step has a compensating action: if step 3 fails, compensating actions for steps 2 and 1 are executed to undo the work.", de: "Sagas ersetzen verteilte Transaktionen (2PC) in Microservices. Jeder Schritt hat eine kompensierende Aktion: Wenn Schritt 3 fehlschl\u00e4gt, werden kompensierende Aktionen f\u00fcr Schritte 2 und 1 ausgef\u00fchrt.", ru: "Саги заменяют распределённые транзакции (2PC) в микросервисах. Каждый шаг имеет компенсирующее действие: если шаг 3 не удался, выполняются компенсирующие действия для шагов 2 и 1.", uk: "Саги замінюють розподілені транзакції (2PC) у мікросервісах. Кожен крок має компенсуючу дію: якщо крок 3 не вдався, виконуються компенсуючі дії для кроків 2 та 1." } },
