{ category: "Options Pattern", question: { en: "What is the Options pattern in ASP.NET Core?", de: "Was ist das Options Pattern in ASP.NET Core?", ru: "Что такое паттерн Options в ASP.NET Core?", uk: "Що таке патерн Options в ASP.NET Core?" }, options: { en: ["A dropdown UI component pattern.", "A pattern for binding configuration sections to strongly-typed C# classes using IOptions<T>, IOptionsMonitor<T>, or IOptionsSnapshot<T>.", "A pattern for optional method parameters.", "A pattern for nullable types."], de: ["Ein Dropdown-UI-Komponenten-Pattern.", "Ein Pattern zum Binden von Konfigurationsabschnitten an stark typisierte C#-Klassen mit IOptions<T>, IOptionsMonitor<T> oder IOptionsSnapshot<T>.", "Ein Pattern für optionale Methodenparameter.", "Ein Pattern für Nullable-Typen."], ru: ["Паттерн выпадающего UI-компонента.", "Паттерн для привязки разделов конфигурации к строго типизированным классам C# с помощью IOptions<T>, IOptionsMonitor<T> или IOptionsSnapshot<T>.", "Паттерн для необязательных параметров методов.", "Паттерн для nullable-типов."], uk: ["Патерн випадного UI-компонента.", "Патерн для прив'язки розділів конфігурації до строго типізованих класів C# за допомогою IOptions<T>, IOptionsMonitor<T> або IOptionsSnapshot<T>.", "Патерн для необов'язкових параметрів методів.", "Патерн для nullable-типів."] }, correctIndex: 1, explanation: { en: "services.Configure<SmtpSettings>(config.GetSection('Smtp')). Inject IOptions<SmtpSettings> — strongly typed, validated, and reloadable configuration.", de: "services.Configure<SmtpSettings>(config.GetSection('Smtp')). IOptions<SmtpSettings> injizieren — stark typisierte, validierte und nachladbare Konfiguration.", ru: "services.Configure<SmtpSettings>(config.GetSection('Smtp')). Инъекция IOptions<SmtpSettings> — строго типизированная, валидируемая и перезагружаемая конфигурация.", uk: "services.Configure<SmtpSettings>(config.GetSection('Smtp')). Ін'єкція IOptions<SmtpSettings> — строго типізована, валідована та перезавантажувана конфігурація." } },
{ category: "Outbox Pattern", question: { en: "What problem does the Outbox pattern solve?", de: "Welches Problem löst das Outbox Pattern?", ru: "Какую проблему решает паттерн Outbox?", uk: "Яку проблему вирішує патерн Outbox?" }, options: { en: ["Email outbox management.", "Ensuring atomicity between database writes and event publishing — if DB succeeds but message broker fails, events are still eventually dispatched.", "Organizing output files.", "Managing background jobs."], de: ["E-Mail-Ausgangskorb-Verwaltung.", "Sicherstellung der Atomarität zwischen Datenbankschreibvorgängen und Event-Publishing — wenn die DB erfolgreich ist, aber der Message Broker fehlschlägt, werden Events trotzdem irgendwann versendet.", "Organisation von Ausgabedateien.", "Verwaltung von Hintergrundjobs."], ru: ["Управление исходящей почтой.", "Обеспечение атомарности между записью в базу данных и публикацией событий — если БД успешна, а брокер сообщений нет, события всё равно будут доставлены.", "Организация выходных файлов.", "Управление фоновыми задачами."], uk: ["Керування вихідною поштою.", "Забезпечення атомарності між записом у базу даних і публікацією подій — якщо БД успішна, а брокер повідомлень ні, події все одно будуть доставлені.", "Організація вихідних файлів.", "Керування фоновими завданнями."] }, correctIndex: 1, explanation: { en: "Save entity + save event to OutboxMessages table in ONE transaction. A background job reads OutboxMessages and publishes them. No event is ever lost.", de: "Entität und Event in der OutboxMessages-Tabelle in EINER Transaktion speichern. Ein Hintergrundjob liest OutboxMessages und publiziert sie. Kein Event geht verloren.", ru: "Сохраните сущность + событие в таблицу OutboxMessages в ОДНОЙ транзакции. Фоновая задача читает OutboxMessages и публикует их. Ни одно событие не теряется.", uk: "Збережіть сутність + подію в таблицю OutboxMessages в ОДНІЙ транзакції. Фонове завдання читає OutboxMessages і публікує їх. Жодна подія не втрачається." } },
{ category: "Circuit Breaker", question: { en: "What does the Circuit Breaker pattern prevent?", de: "Was verhindert das Circuit Breaker Pattern?", ru: "Что предотвращает паттерн Circuit Breaker?", uk: "Що запобігає патерн Circuit Breaker?" }, options: { en: ["Electrical overloads.", "Cascading failures: if a downstream service is failing, stop calling it immediately instead of waiting for timeouts that exhaust your threads.", "SQL injection attacks.", "Memory leaks."], de: ["Elektrische Überlastungen.", "Kaskadierende Ausfälle: Wenn ein nachgelagerter Dienst ausfällt, wird er sofort nicht mehr aufgerufen, statt auf Timeouts zu warten, die Threads erschöpfen.", "SQL-Injection-Angriffe.", "Speicherlecks."], ru: ["Электрические перегрузки.", "Каскадные сбои: если нижестоящий сервис отказывает, прекратить вызовы немедленно, вместо ожидания таймаутов, истощающих потоки.", "Атаки SQL-инъекций.", "Утечки памяти."], uk: ["Електричні перевантаження.", "Каскадні збої: якщо нижчестоящий сервіс відмовляє, припинити виклики негайно, замість очікування таймаутів, що виснажують потоки.", "Атаки SQL-ін'єкцій.", "Витоки пам'яті."] }, correctIndex: 1, explanation: { en: "States: Closed (normal) -> Open (failing, reject immediately) -> Half-Open (test with one request). Polly implements this in .NET with AddPolicyHandler().", de: "Zustände: Closed (normal) -> Open (fehlerhaft, sofort ablehnen) -> Half-Open (Test mit einer Anfrage). Polly implementiert dies in .NET mit AddPolicyHandler().", ru: "Состояния: Closed (нормальное) -> Open (сбой, отклонять сразу) -> Half-Open (проверка одним запросом). Polly реализует это в .NET через AddPolicyHandler().", uk: "Стани: Closed (нормальний) -> Open (збій, відхиляти одразу) -> Half-Open (перевірка одним запитом). Polly реалізує це в .NET через AddPolicyHandler()." } },
{ category: "Circuit Breaker", question: { en: "How do you implement Circuit Breaker in .NET?", de: "Wie implementiert man Circuit Breaker in .NET?", ru: "Как реализовать Circuit Breaker в .NET?", uk: "Як реалізувати Circuit Breaker у .NET?" }, options: { en: ["Manual try-catch with counters.", "Using Polly: Policy.Handle<HttpRequestException>().CircuitBreaker(3, TimeSpan.FromSeconds(30)) — opens after 3 failures, stays open 30 seconds.", "Using Thread.Sleep between retries.", "Only available in Spring Boot, not .NET."], de: ["Manuelles try-catch mit Zählern.", "Mit Polly: Policy.Handle<HttpRequestException>().CircuitBreaker(3, TimeSpan.FromSeconds(30)) — öffnet nach 3 Fehlern, bleibt 30 Sekunden offen.", "Mit Thread.Sleep zwischen Wiederholungen.", "Nur in Spring Boot verfügbar, nicht in .NET."], ru: ["Ручной try-catch со счётчиками.", "Через Polly: Policy.Handle<HttpRequestException>().CircuitBreaker(3, TimeSpan.FromSeconds(30)) — открывается после 3 сбоев, остаётся открытым 30 секунд.", "Через Thread.Sleep между повторами.", "Доступно только в Spring Boot, не в .NET."], uk: ["Ручний try-catch з лічильниками.", "Через Polly: Policy.Handle<HttpRequestException>().CircuitBreaker(3, TimeSpan.FromSeconds(30)) — відкривається після 3 збоїв, залишається відкритим 30 секунд.", "Через Thread.Sleep між повторами.", "Доступно тільки в Spring Boot, не в .NET."] }, correctIndex: 1, explanation: { en: "Polly integrates with IHttpClientFactory. The circuit breaker wraps HTTP calls transparently. When open, it fails fast without making the network call.", de: "Polly integriert sich mit IHttpClientFactory. Der Circuit Breaker umhüllt HTTP-Aufrufe transparent. Wenn offen, schlägt er schnell fehl, ohne den Netzwerkaufruf zu machen.", ru: "Polly интегрируется с IHttpClientFactory. Circuit Breaker прозрачно оборачивает HTTP-вызовы. Когда открыт, он быстро завершается неудачей без сетевого вызова.", uk: "Polly інтегрується з IHttpClientFactory. Circuit Breaker прозоро обгортає HTTP-виклики. Коли відкритий, він швидко завершується невдачею без мережевого виклику." } },
{ category: "CQRS Pattern", question: { en: "How do you decide between Vertical Slice and Clean Architecture layering?", de: "Wie entscheidet man zwischen Vertical Slice und Clean Architecture?", ru: "Как выбрать между Vertical Slice и Clean Architecture?", uk: "Як обрати між Vertical Slice і Clean Architecture?" }, options: { en: ["Always use Clean Architecture.", "Vertical Slice organizes by feature (each slice has its own handler, model, validation). Clean Architecture organizes by technical layer. Choose based on team size and domain complexity.", "Vertical Slice is always better.", "They can't be combined."], de: ["Immer Clean Architecture verwenden.", "Vertical Slice organisiert nach Feature (jede Schicht hat eigenen Handler, Modell, Validierung). Clean Architecture organisiert nach technischer Schicht. Wahl basiert auf Teamgrösse und Domänenkomplexität.", "Vertical Slice ist immer besser.", "Sie können nicht kombiniert werden."], ru: ["Всегда использовать Clean Architecture.", "Vertical Slice организует по фичам (каждый срез имеет свой обработчик, модель, валидацию). Clean Architecture организует по техническим слоям. Выбор зависит от размера команды и сложности домена.", "Vertical Slice всегда лучше.", "Их нельзя комбинировать."], uk: ["Завжди використовувати Clean Architecture.", "Vertical Slice організує за фічами (кожен зріз має свій обробник, модель, валідацію). Clean Architecture організує за технічними шарами. Вибір залежить від розміру команди та складності домену.", "Vertical Slice завжди кращий.", "Їх не можна комбінувати."] }, correctIndex: 1, explanation: { en: "Small teams with many independent features benefit from Vertical Slice. Complex shared domain logic benefits from Clean Architecture layers. Some combine both.", de: "Kleine Teams mit vielen unabhängigen Features profitieren von Vertical Slice. Komplexe gemeinsame Domänenlogik profitiert von Clean Architecture. Manche kombinieren beides.", ru: "Маленькие команды с множеством независимых фич выигрывают от Vertical Slice. Сложная общая доменная логика выигрывает от слоёв Clean Architecture. Некоторые комбинируют оба подхода.", uk: "Маленькі команди з багатьма незалежними фічами виграють від Vertical Slice. Складна спільна доменна логіка виграє від шарів Clean Architecture. Деякі комбінують обидва підходи." } },
{ category: "Strangler Fig", question: { en: "What is the Strangler Fig pattern?", de: "Was ist das Strangler Fig Pattern?", ru: "Что такое паттерн Strangler Fig?", uk: "Що таке патерн Strangler Fig?" }, options: { en: ["A gardening technique.", "Incrementally replacing a legacy system by routing requests through a facade that gradually shifts traffic from old to new implementations.", "A compression algorithm.", "A database migration strategy."], de: ["Eine Gartenbautechnik.", "Schrittweises Ersetzen eines Legacy-Systems durch Routing von Anfragen über eine Facade, die den Verkehr allmählich von alter zu neuer Implementierung verlagert.", "Ein Kompressionsalgorithmus.", "Eine Datenbankmigrationsstrategie."], ru: ["Техника садоводства.", "Постепенная замена устаревшей системы путём маршрутизации запросов через фасад, который постепенно перенаправляет трафик со старой на новую реализацию.", "Алгоритм сжатия.", "Стратегия миграции базы данных."], uk: ["Техніка садівництва.", "Поступова заміна застарілої системи шляхом маршрутизації запитів через фасад, який поступово перенаправляє трафік зі старої на нову реалізацію.", "Алгоритм стиснення.", "Стратегія міграції бази даних."] }, correctIndex: 1, explanation: { en: "Put a proxy in front of the monolith. Rewrite features one by one as new services. Route their URLs to the new service. The monolith slowly 'strangled' away.", de: "Einen Proxy vor den Monolithen setzen. Features einzeln als neue Services umschreiben. Deren URLs zum neuen Service routen. Der Monolith wird langsam 'erdrosselt'.", ru: "Поставьте прокси перед монолитом. Переписывайте функции одну за другой как новые сервисы. Направляйте их URL на новый сервис. Монолит постепенно «удушается».", uk: "Поставте проксі перед монолітом. Переписуйте функції одну за одною як нові сервіси. Направляйте їх URL на новий сервіс. Моноліт поступово «душиться»." } },
{ category: "Saga Pattern", question: { en: "What does the Saga pattern manage?", de: "Was verwaltet das Saga Pattern?", ru: "Чем управляет паттерн Saga?", uk: "Чим керує патерн Saga?" }, options: { en: ["Norse mythology stories.", "Distributed transactions across microservices using a sequence of local transactions with compensating actions for failures.", "Database saga logging.", "Long-running UI wizards."], de: ["Nordische Mythologiegeschichten.", "Verteilte Transaktionen über Microservices mittels einer Abfolge lokaler Transaktionen mit kompensierenden Aktionen bei Fehlern.", "Datenbank-Saga-Logging.", "Lang laufende UI-Wizards."], ru: ["Скандинавские мифы.", "Распределённые транзакции между микросервисами через последовательность локальных транзакций с компенсирующими действиями при сбоях.", "Логирование саг базы данных.", "Длительные UI-мастера."], uk: ["Скандинавські міфи.", "Розподілені транзакції між мікросервісами через послідовність локальних транзакцій з компенсуючими діями при збоях.", "Логування саг бази даних.", "Тривалі UI-майстри."] }, correctIndex: 1, explanation: { en: "Step 1: Reserve inventory. Step 2: Charge payment. If Step 2 fails, compensate Step 1 (release inventory). No distributed locks needed.", de: "Schritt 1: Bestand reservieren. Schritt 2: Zahlung belasten. Wenn Schritt 2 fehlschlägt, kompensiere Schritt 1 (Bestand freigeben). Keine verteilten Sperren nötig.", ru: "Шаг 1: зарезервировать инвентарь. Шаг 2: списать оплату. Если шаг 2 не удался, компенсировать шаг 1 (освободить инвентарь). Распределённые блокировки не нужны.", uk: "Крок 1: зарезервувати інвентар. Крок 2: списати оплату. Якщо крок 2 не вдався, компенсувати крок 1 (звільнити інвентар). Розподілені блокування не потрібні." } },
{ category: "Saga Pattern", question: { en: "What are the two Saga coordination approaches?", de: "Was sind die zwei Saga-Koordinationsansätze?", ru: "Каковы два подхода координации Saga?", uk: "Які два підходи координації Saga?" }, options: { en: ["Sync and async.", "Choreography (each service reacts to events) and Orchestration (a central coordinator directs the flow).", "Push and pull.", "Master and slave."], de: ["Synchron und asynchron.", "Choreography (jeder Service reagiert auf Events) und Orchestration (ein zentraler Koordinator steuert den Ablauf).", "Push und Pull.", "Master und Slave."], ru: ["Синхронный и асинхронный.", "Choreography (каждый сервис реагирует на события) и Orchestration (центральный координатор управляет потоком).", "Push и Pull.", "Master и Slave."], uk: ["Синхронний і асинхронний.", "Choreography (кожен сервіс реагує на події) та Orchestration (центральний координатор керує потоком).", "Push і Pull.", "Master і Slave."] }, correctIndex: 1, explanation: { en: "Choreography: OrderService emits OrderCreated, PaymentService reacts. Orchestration: SagaOrchestrator explicitly calls each step. Orchestration is easier to debug.", de: "Choreography: OrderService sendet OrderCreated, PaymentService reagiert. Orchestration: SagaOrchestrator ruft jeden Schritt explizit auf. Orchestration ist einfacher zu debuggen.", ru: "Choreography: OrderService отправляет OrderCreated, PaymentService реагирует. Orchestration: SagaOrchestrator явно вызывает каждый шаг. Orchestration проще отлаживать.", uk: "Choreography: OrderService надсилає OrderCreated, PaymentService реагує. Orchestration: SagaOrchestrator явно викликає кожен крок. Orchestration простіше дебажити." } },
{ category: "Event Sourcing", question: { en: "What is Event Sourcing?", de: "Was ist Event Sourcing?", ru: "Что такое Event Sourcing?", uk: "Що таке Event Sourcing?" }, options: { en: ["Sourcing events from a message queue.", "Instead of storing current state, storing an append-only log of events (OrderCreated, ItemAdded, PaymentReceived). Current state is derived by replaying events.", "A frontend state management pattern.", "A logging framework."], de: ["Events aus einer Message Queue beziehen.", "Statt den aktuellen Zustand zu speichern, wird ein Append-only-Log von Events gespeichert (OrderCreated, ItemAdded, PaymentReceived). Der aktuelle Zustand wird durch Replay der Events abgeleitet.", "Ein Frontend-State-Management-Pattern.", "Ein Logging-Framework."], ru: ["Получение событий из очереди сообщений.", "Вместо хранения текущего состояния хранится журнал событий только для добавления (OrderCreated, ItemAdded, PaymentReceived). Текущее состояние получается воспроизведением событий.", "Паттерн управления состоянием фронтенда.", "Фреймворк логирования."], uk: ["Отримання подій з черги повідомлень.", "Замість зберігання поточного стану зберігається журнал подій тільки для додавання (OrderCreated, ItemAdded, PaymentReceived). Поточний стан отримується відтворенням подій.", "Патерн керування станом фронтенду.", "Фреймворк логування."] }, correctIndex: 1, explanation: { en: "The event log IS the source of truth. You can rebuild any past state by replaying events up to that point. Perfect audit trail. Used with CQRS for read projections.", de: "Das Event-Log IST die Wahrheitsquelle. Man kann jeden vergangenen Zustand durch Replay der Events bis zu diesem Punkt rekonstruieren. Perfekter Audit-Trail. Wird mit CQRS für Lese-Projektionen verwendet.", ru: "Журнал событий — это и ЕСТЬ источник истины. Можно восстановить любое прошлое состояние, воспроизведя события до нужной точки. Идеальный аудит. Используется с CQRS для проекций чтения.", uk: "Журнал подій — це і Є джерело істини. Можна відновити будь-який минулий стан, відтворивши події до потрібної точки. Ідеальний аудит. Використовується з CQRS для проєкцій читання." } },
{ category: "Anti-Corruption Layer", question: { en: "When should you use an Anti-Corruption Layer?", de: "Wann sollte man eine Anti-Corruption Layer verwenden?", ru: "Когда следует использовать Anti-Corruption Layer?", uk: "Коли слід використовувати Anti-Corruption Layer?" }, options: { en: ["When integrating with any external API.", "When integrating with a legacy system or external service whose model would corrupt your clean domain if used directly.", "Only in monolithic applications.", "Only when using microservices."], de: ["Bei jeder Integration mit einer externen API.", "Bei Integration mit einem Legacy-System oder externen Dienst, dessen Modell die saubere Domäne beschädigen würde, wenn es direkt verwendet wird.", "Nur in monolithischen Anwendungen.", "Nur bei Microservices."], ru: ["При интеграции с любым внешним API.", "При интеграции с устаревшей системой или внешним сервисом, чья модель исказит вашу чистую доменную модель при прямом использовании.", "Только в монолитных приложениях.", "Только при использовании микросервисов."], uk: ["При інтеграції з будь-яким зовнішнім API.", "При інтеграції з застарілою системою або зовнішнім сервісом, чия модель спотворить вашу чисту доменну модель при прямому використанні.", "Тільки в монолітних застосунках.", "Тільки при використанні мікросервісів."] }, correctIndex: 1, explanation: { en: "The legacy system returns { usr_nm: 'John', bal_amt: 100 }. Your ACL translates this to your domain: new User('John', new Money(100)). Your domain stays clean.", de: "Das Legacy-System gibt { usr_nm: 'John', bal_amt: 100 } zurück. Dein ACL übersetzt dies in deine Domäne: new User('John', new Money(100)). Deine Domäne bleibt sauber.", ru: "Устаревшая система возвращает { usr_nm: 'John', bal_amt: 100 }. Ваш ACL переводит это в вашу доменную модель: new User('John', new Money(100)). Домен остаётся чистым.", uk: "Застаріла система повертає { usr_nm: 'John', bal_amt: 100 }. Ваш ACL переводить це у вашу доменну модель: new User('John', new Money(100)). Домен залишається чистим." } },
{ category: "Retry Pattern", question: { en: "What is the difference between simple retry and retry with exponential backoff?", de: "Was ist der Unterschied zwischen einfachem Retry und Retry mit exponentiellem Backoff?", ru: "В чём разница между простым повтором и повтором с экспоненциальной задержкой?", uk: "В чому різниця між простим повтором і повтором з експоненційною затримкою?" }, options: { en: ["There is no difference.", "Simple retry repeats immediately. Exponential backoff waits progressively longer (1s, 2s, 4s, 8s) to give the failing service time to recover.", "Exponential backoff only works with databases.", "Simple retry is always better."], de: ["Es gibt keinen Unterschied.", "Einfacher Retry wiederholt sofort. Exponentieller Backoff wartet progressiv länger (1s, 2s, 4s, 8s), um dem fehlerhaften Dienst Zeit zur Erholung zu geben.", "Exponentieller Backoff funktioniert nur mit Datenbanken.", "Einfacher Retry ist immer besser."], ru: ["Разницы нет.", "Простой повтор повторяет немедленно. Экспоненциальная задержка ждёт прогрессивно дольше (1с, 2с, 4с, 8с), давая сбоящему сервису время на восстановление.", "Экспоненциальная задержка работает только с базами данных.", "Простой повтор всегда лучше."], uk: ["Різниці немає.", "Простий повтор повторює негайно. Експоненційна затримка чекає прогресивно довше (1с, 2с, 4с, 8с), даючи сервісу, що збоїть, час на відновлення.", "Експоненційна затримка працює тільки з базами даних.", "Простий повтор завжди кращий."] }, correctIndex: 1, explanation: { en: "Immediate retries can overwhelm a struggling service. Exponential backoff with jitter spreads out retry attempts, reducing thundering herd problems.", de: "Sofortige Wiederholungen können einen kämpfenden Dienst überlasten. Exponentieller Backoff mit Jitter verteilt Wiederholungsversuche und reduziert Thundering-Herd-Probleme.", ru: "Немедленные повторы могут перегрузить борющийся сервис. Экспоненциальная задержка с jitter распределяет попытки повтора, уменьшая проблему «стада».", uk: "Негайні повтори можуть перевантажити сервіс, що бореться. Експоненційна затримка з jitter розподіляє спроби повтору, зменшуючи проблему «стада»." } },
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20, currentShuffledIdx = [];
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); if (quizArea.style.display === 'block') { retranslateQuestion(); updateScoreboard(); } }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function retranslateQuestion() {
    const q = selectedQuestions[currentQuestionIndex]; if (!q) return;
    const lang = currentLang, t = ui[lang];
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const card = quizContainer.querySelector('.card'); if (!card) return;
    card.querySelector('.question-text').innerHTML = qText.replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const btns = card.querySelectorAll('.option-btn');
    currentShuffledIdx.forEach((origI, btnI) => { if (btns[btnI]) btns[btnI].innerHTML = (opts[origI] || '').replace(/</g,"&lt;").replace(/>/g,"&gt;"); });
    const explEl = document.getElementById(`expl-${currentQuestionIndex}`);
    if (explEl) explEl.innerHTML = `<strong>${t.explanation}</strong> ${expl}`;
    const nextBtn = document.getElementById(`next-${currentQuestionIndex}`);
    if (nextBtn) nextBtn.textContent = t.next;
}

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    currentShuffledIdx = idx;
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
    <script src="layout.js"></script>
</body>
</html>
