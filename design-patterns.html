    de: { title: "Design Patterns", subtitle: "GoF Creational, Structural und Behavioral Patterns mit praxisnahen C#/.NET-Beispielen", heading: "50 Fragen zu Design Patterns", desc: "Creational (Factory, Builder, Singleton), Structural (Adapter, Decorator, Proxy, Facade), Behavioral (Strategy, Observer, Chain of Responsibility, Mediator) und moderne .NET-Patterns.", sprint: "Zufällige 20-Fragen-Runde", marathon: "Marathon: Alle 50 Fragen", allQuizzes: "\u2190 Alle Quizze", restart: "\u21BB Neustart", question: "Frage", of: "von", score: "Punkte", explanation: "Erklärung:", next: "Weiter", complete: "Bewertung abgeschlossen!", allBtn: "Alle Quizze", restartBtn: "Quiz neustarten", feedbackHigh: "Hervorragend! Du hast tiefes Wissen über Design Patterns und kannst sie sicher in realer Architektur anwenden.", feedbackMid: "Solide Basis! Konzentriere dich auf die Unterscheidung ähnlicher Patterns (Strategy vs Template Method, Adapter vs Facade) und deren Einsatz in .NET.", feedbackLow: "Weiter lernen! Beginne mit den gängigsten Patterns: Strategy, Observer, Decorator, Factory und Builder. Verstehe die Probleme, die sie lösen." },

    uk: { title: "Design Patterns", subtitle: "Патерни GoF — породжувальні, структурні та поведінкові — з прикладами з C#/.NET", heading: "50 питань з Design Patterns", desc: "Породжувальні (Factory, Builder, Singleton), структурні (Adapter, Decorator, Proxy, Facade), поведінкові (Strategy, Observer, Chain of Responsibility, Mediator) та сучасні патерни .NET.", sprint: "Випадкові 20 питань", marathon: "Марафон: усі 50 питань", allQuizzes: "\u2190 Усі квізи", restart: "\u21BB Заново", question: "Питання", of: "з", score: "Рахунок", explanation: "Пояснення:", next: "Далі", complete: "Тест завершено!", allBtn: "Усі квізи", restartBtn: "Почати заново", feedbackHigh: "Чудово! Ви глибоко знаєте патерни проєктування і впевнено застосовуєте їх у реальній архітектурі.", feedbackMid: "Міцна основа! Зосередьтеся на відмінностях схожих патернів (Strategy vs Template Method, Adapter vs Facade) та їхньому використанні в .NET.", feedbackLow: "Продовжуйте вчитися! Почніть з найпоширеніших: Strategy, Observer, Decorator, Factory та Builder. Важливо розуміти, які проблеми вони вирішують." }

const allQuestions = [
// ===== CREATIONAL PATTERNS =====
{ category: "Factory Method", question: { en: "What problem does the Factory Method pattern solve?", de: "Welches Problem löst das Factory Method Pattern?", ru: "Какую проблему решает паттерн Factory Method?", uk: "Яку проблему вирішує патерн Factory Method?" }, options: { en: ["Reducing the number of classes.", "It delegates object creation to subclasses, decoupling the client from concrete types and allowing new types without modifying existing code.", "It makes objects immutable.", "It provides thread safety for constructors."], de: ["Reduzierung der Klassenanzahl.", "Es delegiert die Objekterstellung an Unterklassen, entkoppelt den Client von konkreten Typen und erlaubt neue Typen ohne Änderung bestehenden Codes.", "Es macht Objekte unveränderlich.", "Es bietet Thread-Sicherheit für Konstruktoren."], ru: ["Сокращение количества классов.", "Он делегирует создание объектов подклассам, отвязывая клиента от конкретных типов и позволяя добавлять новые типы без изменения существующего кода.", "Он делает объекты неизменяемыми.", "Он обеспечивает потокобезопасность конструкторов."], uk: ["Зменшення кількості класів.", "Він делегує створення об'єктів підкласам, відв'язуючи клієнта від конкретних типів і дозволяючи додавати нові типи без зміни існуючого коду.", "Він робить об'єкти незмінними.", "Він забезпечує потокобезпечність конструкторів."] }, correctIndex: 1, explanation: { en: "Instead of `new ConcreteProduct()`, the client calls factory.Create(). The factory decides which concrete class to instantiate. Adding a new product = new factory, no client changes.", de: "Statt `new ConcreteProduct()` ruft der Client factory.Create() auf. Die Factory entscheidet, welche konkrete Klasse instanziiert wird. Neues Produkt = neue Factory, keine Änderungen am Client.", ru: "Вместо `new ConcreteProduct()` клиент вызывает factory.Create(). Фабрика решает, какой конкретный класс создать. Новый продукт = новая фабрика, клиент не меняется.", uk: "Замість `new ConcreteProduct()` клієнт викликає factory.Create(). Фабрика вирішує, який конкретний клас створити. Новий продукт = нова фабрика, клієнт не змінюється." } },
{ category: "Factory Method", question: { en: "How does Factory Method differ from Abstract Factory?", de: "Wie unterscheidet sich Factory Method von Abstract Factory?", ru: "Чем Factory Method отличается от Abstract Factory?", uk: "Чим Factory Method відрізняється від Abstract Factory?" }, options: { en: ["They're the same pattern.", "Factory Method creates one product via inheritance/overriding. Abstract Factory creates families of related products via composition.", "Factory Method is for structs, Abstract Factory for classes.", "Abstract Factory is deprecated."], de: ["Es ist dasselbe Pattern.", "Factory Method erstellt ein Produkt über Vererbung/Überschreibung. Abstract Factory erstellt Familien verwandter Produkte über Komposition.", "Factory Method ist für Structs, Abstract Factory für Klassen.", "Abstract Factory ist veraltet."], ru: ["Это один и тот же паттерн.", "Factory Method создаёт один продукт через наследование/переопределение. Abstract Factory создаёт семейства связанных продуктов через композицию.", "Factory Method — для структур, Abstract Factory — для классов.", "Abstract Factory устарел."], uk: ["Це один і той самий патерн.", "Factory Method створює один продукт через успадкування/перевизначення. Abstract Factory створює сімейства пов'язаних продуктів через композицію.", "Factory Method — для структур, Abstract Factory — для класів.", "Abstract Factory застарів."] }, correctIndex: 1, explanation: { en: "Factory Method: one method, one product. Abstract Factory: a factory interface with methods for creating an entire family (e.g., CreateButton, CreateTextbox for a UI toolkit).", de: "Factory Method: eine Methode, ein Produkt. Abstract Factory: ein Factory-Interface mit Methoden für eine ganze Produktfamilie (z.B. CreateButton, CreateTextbox für ein UI-Toolkit).", ru: "Factory Method: один метод, один продукт. Abstract Factory: интерфейс фабрики с методами для создания целого семейства (например, CreateButton, CreateTextbox для UI-тулкита).", uk: "Factory Method: один метод, один продукт. Abstract Factory: інтерфейс фабрики з методами для створення цілого сімейства (наприклад, CreateButton, CreateTextbox для UI-тулкіту)." } },
{ category: "Abstract Factory", question: { en: "When should you use the Abstract Factory pattern?", de: "Wann sollte man das Abstract Factory Pattern verwenden?", ru: "Когда следует использовать паттерн Abstract Factory?", uk: "Коли слід використовувати патерн Abstract Factory?" }, options: { en: ["When you only need one type of object.", "When a system must be independent of how its products are created, and you need families of related objects that work together.", "When you want to avoid interfaces.", "When performance is critical."], de: ["Wenn man nur einen Objekttyp braucht.", "Wenn ein System unabhängig von der Erstellung seiner Produkte sein muss und Familien verwandter Objekte benötigt, die zusammenarbeiten.", "Wenn man Interfaces vermeiden möchte.", "Wenn Performance entscheidend ist."], ru: ["Когда нужен только один тип объекта.", "Когда система должна быть независима от того, как создаются её продукты, и нужны семейства связанных объектов, работающих вместе.", "Когда хочется избежать интерфейсов.", "Когда критична производительность."], uk: ["Коли потрібен лише один тип об'єкта.", "Коли система має бути незалежною від того, як створюються її продукти, і потрібні сімейства пов'язаних об'єктів, що працюють разом.", "Коли хочеться уникнути інтерфейсів.", "Коли критична продуктивність."] }, correctIndex: 1, explanation: { en: "E.g., IUIFactory with CreateButton() and CreateCheckbox(). WindowsFactory returns Windows controls, MacFactory returns Mac controls. The client code works with either.", de: "Z.B. IUIFactory mit CreateButton() und CreateCheckbox(). WindowsFactory liefert Windows-Steuerelemente, MacFactory liefert Mac-Steuerelemente. Der Client-Code funktioniert mit beiden.", ru: "Например, IUIFactory с CreateButton() и CreateCheckbox(). WindowsFactory возвращает Windows-контролы, MacFactory — Mac-контролы. Клиентский код работает с любой из них.", uk: "Наприклад, IUIFactory з CreateButton() і CreateCheckbox(). WindowsFactory повертає Windows-контроли, MacFactory — Mac-контроли. Клієнтський код працює з будь-якою." } },
{ category: "Abstract Factory", question: { en: "In ASP.NET Core, which built-in feature resembles the Abstract Factory pattern?", de: "Welche eingebaute Funktion von ASP.NET Core ähnelt dem Abstract Factory Pattern?", ru: "Какая встроенная функция ASP.NET Core напоминает паттерн Abstract Factory?", uk: "Яка вбудована функція ASP.NET Core нагадує патерн Abstract Factory?" }, options: { en: ["Razor Pages", "IHttpClientFactory — it creates configured HttpClient instances without the client knowing the setup details.", "Entity Framework migrations", "Endpoint routing"], de: ["Razor Pages", "IHttpClientFactory — sie erstellt konfigurierte HttpClient-Instanzen, ohne dass der Client die Einrichtungsdetails kennen muss.", "Entity Framework Migrationen", "Endpoint Routing"], ru: ["Razor Pages", "IHttpClientFactory — создаёт настроенные экземпляры HttpClient, при этом клиент не знает деталей настройки.", "Миграции Entity Framework", "Маршрутизация Endpoint"], uk: ["Razor Pages", "IHttpClientFactory — створює налаштовані екземпляри HttpClient, при цьому клієнт не знає деталей налаштування.", "Міграції Entity Framework", "Маршрутизація Endpoint"] }, correctIndex: 1, explanation: { en: "IHttpClientFactory creates HttpClient instances with pre-configured handlers, base addresses, and policies. The consuming code just asks for a client by name.", de: "IHttpClientFactory erstellt HttpClient-Instanzen mit vorkonfigurierten Handlern, Basisadressen und Richtlinien. Der verbrauchende Code fragt einfach einen Client per Name an.", ru: "IHttpClientFactory создаёт экземпляры HttpClient с предварительно настроенными обработчиками, базовыми адресами и политиками. Потребляющий код просто запрашивает клиента по имени.", uk: "IHttpClientFactory створює екземпляри HttpClient з попередньо налаштованими обробниками, базовими адресами та політиками. Код-споживач просто запитує клієнта за іменем." } },
{ category: "Builder", question: { en: "What is the main benefit of the Builder pattern?", de: "Was ist der Hauptvorteil des Builder Patterns?", ru: "В чём главное преимущество паттерна Builder?", uk: "В чому головна перевага патерну Builder?" }, options: { en: ["It makes classes abstract.", "It constructs complex objects step-by-step, separating construction from representation and avoiding constructors with many parameters.", "It replaces the need for properties.", "It's faster than using constructors."], de: ["Es macht Klassen abstrakt.", "Es konstruiert komplexe Objekte schrittweise, trennt Konstruktion von Darstellung und vermeidet Konstruktoren mit vielen Parametern.", "Es ersetzt die Notwendigkeit von Properties.", "Es ist schneller als Konstruktoren."], ru: ["Он делает классы абстрактными.", "Он создаёт сложные объекты пошагово, отделяя конструирование от представления и избегая конструкторов с множеством параметров.", "Он заменяет необходимость в свойствах.", "Он быстрее, чем использование конструкторов."], uk: ["Він робить класи абстрактними.", "Він створює складні об'єкти покроково, відділяючи конструювання від представлення та уникаючи конструкторів з багатьма параметрами.", "Він замінює потребу у властивостях.", "Він швидший за використання конструкторів."] }, correctIndex: 1, explanation: { en: "Instead of new Pizza(size, cheese, pepperoni, mushrooms, olives...), use: pizzaBuilder.SetSize(L).AddCheese().AddPepperoni().Build(). Clear, readable, flexible.", de: "Statt new Pizza(size, cheese, pepperoni, mushrooms, olives...) nutze: pizzaBuilder.SetSize(L).AddCheese().AddPepperoni().Build(). Klar, lesbar, flexibel.", ru: "Вместо new Pizza(size, cheese, pepperoni, mushrooms, olives...) используйте: pizzaBuilder.SetSize(L).AddCheese().AddPepperoni().Build(). Понятно, читаемо, гибко.", uk: "Замість new Pizza(size, cheese, pepperoni, mushrooms, olives...) використовуйте: pizzaBuilder.SetSize(L).AddCheese().AddPepperoni().Build(). Зрозуміло, читабельно, гнучко." } },
{ category: "Builder", question: { en: "How does the Fluent Builder pattern work in C#?", de: "Wie funktioniert das Fluent Builder Pattern in C#?", ru: "Как работает паттерн Fluent Builder в C#?", uk: "Як працює патерн Fluent Builder у C#?" }, options: { en: ["By using static methods.", "Each builder method returns 'this', enabling method chaining: builder.WithName('x').WithAge(30).Build().", "By using extension methods only.", "It requires a separate Director class."], de: ["Durch die Verwendung statischer Methoden.", "Jede Builder-Methode gibt 'this' zurück und ermöglicht Method Chaining: builder.WithName('x').WithAge(30).Build().", "Nur durch Extension Methods.", "Es erfordert eine separate Director-Klasse."], ru: ["С помощью статических методов.", "Каждый метод Builder возвращает 'this', обеспечивая цепочку вызовов: builder.WithName('x').WithAge(30).Build().", "Только через методы расширения.", "Требуется отдельный класс Director."], uk: ["За допомогою статичних методів.", "Кожен метод Builder повертає 'this', забезпечуючи ланцюжок викликів: builder.WithName('x').WithAge(30).Build().", "Тільки через методи розширення.", "Потрібен окремий клас Director."] }, correctIndex: 1, explanation: { en: "Returning 'this' from each method enables the fluent API. Common in .NET: HostBuilder, IServiceCollection, EF Core ModelBuilder all use this pattern.", de: "Die Rückgabe von 'this' aus jeder Methode ermöglicht die Fluent API. Verbreitet in .NET: HostBuilder, IServiceCollection, EF Core ModelBuilder nutzen dieses Pattern.", ru: "Возврат 'this' из каждого метода обеспечивает fluent API. Распространено в .NET: HostBuilder, IServiceCollection, EF Core ModelBuilder — все используют этот паттерн.", uk: "Повернення 'this' з кожного методу забезпечує fluent API. Поширено у .NET: HostBuilder, IServiceCollection, EF Core ModelBuilder — усі використовують цей патерн." } },
{ category: "Singleton", question: { en: "Why are traditional static Singletons considered problematic in modern C#?", de: "Warum gelten traditionelle statische Singletons als problematisch in modernem C#?", ru: "Почему традиционные статические Singleton считаются проблемными в современном C#?", uk: "Чому традиційні статичні Singleton вважаються проблемними в сучасному C#?" }, options: { en: ["They use too much memory.", "They hide dependencies, make unit testing extremely difficult (can't mock them), and create hidden global state.", "Singletons are thread-unsafe by definition.", "C# doesn't support static classes."], de: ["Sie verbrauchen zu viel Speicher.", "Sie verbergen Abhängigkeiten, machen Unit-Tests extrem schwierig (können nicht gemockt werden) und erzeugen versteckten globalen Zustand.", "Singletons sind per Definition nicht thread-sicher.", "C# unterstützt keine statischen Klassen."], ru: ["Они используют слишком много памяти.", "Они скрывают зависимости, делают модульное тестирование крайне сложным (нельзя подменить) и создают скрытое глобальное состояние.", "Singleton по определению не потокобезопасны.", "C# не поддерживает статические классы."], uk: ["Вони використовують забагато пам'яті.", "Вони приховують залежності, роблять модульне тестування вкрай складним (не можна замінити моком) і створюють прихований глобальний стан.", "Singleton за визначенням не потокобезпечні.", "C# не підтримує статичні класи."] }, correctIndex: 1, explanation: { en: "If a service depends on a static Singleton, you can't substitute it with a mock in tests. DI containers (AddSingleton<T>) solve this by making the singleton injectable and mockable.", de: "Wenn ein Service von einem statischen Singleton abhängt, kann man ihn in Tests nicht durch einen Mock ersetzen. DI-Container (AddSingleton<T>) lösen dies, indem der Singleton injizierbar und mockbar wird.", ru: "Если сервис зависит от статического Singleton, его нельзя заменить моком в тестах. DI-контейнеры (AddSingleton<T>) решают это, делая Singleton инъектируемым и подменяемым.", uk: "Якщо сервіс залежить від статичного Singleton, його не можна замінити моком у тестах. DI-контейнери (AddSingleton<T>) вирішують це, роблячи Singleton ін'єктованим і підмінюваним." } },
{ category: "Singleton", question: { en: "How does AddSingleton<T>() in ASP.NET Core DI solve the Singleton anti-pattern?", de: "Wie löst AddSingleton<T>() in ASP.NET Core DI das Singleton-Anti-Pattern?", ru: "Как AddSingleton<T>() в ASP.NET Core DI решает анти-паттерн Singleton?", uk: "Як AddSingleton<T>() в ASP.NET Core DI вирішує анти-патерн Singleton?" }, options: { en: ["It doesn't use a singleton at all.", "It provides a single instance but through an interface, preserving testability — you can register a mock in tests.", "It creates a new instance per request.", "It uses the static keyword internally."], de: ["Es verwendet überhaupt keinen Singleton.", "Es stellt eine einzelne Instanz über ein Interface bereit und bewahrt die Testbarkeit — man kann einen Mock in Tests registrieren.", "Es erstellt eine neue Instanz pro Anfrage.", "Es verwendet intern das static-Schlüsselwort."], ru: ["Он вообще не использует Singleton.", "Он предоставляет единственный экземпляр, но через интерфейс, сохраняя тестируемость — в тестах можно зарегистрировать мок.", "Он создаёт новый экземпляр на каждый запрос.", "Внутри используется ключевое слово static."], uk: ["Він взагалі не використовує Singleton.", "Він надає єдиний екземпляр, але через інтерфейс, зберігаючи тестованість — у тестах можна зареєструвати мок.", "Він створює новий екземпляр на кожен запит.", "Всередині використовується ключове слово static."] }, correctIndex: 1, explanation: { en: "services.AddSingleton<ICache, RedisCache>() gives you singleton lifetime without the static coupling. Tests can register a different ICache implementation.", de: "services.AddSingleton<ICache, RedisCache>() bietet Singleton-Lebensdauer ohne statische Kopplung. Tests können eine andere ICache-Implementierung registrieren.", ru: "services.AddSingleton<ICache, RedisCache>() даёт время жизни Singleton без статической связанности. Тесты могут зарегистрировать другую реализацию ICache.", uk: "services.AddSingleton<ICache, RedisCache>() дає час життя Singleton без статичної зв'язаності. Тести можуть зареєструвати іншу реалізацію ICache." } },
{ category: "Prototype", question: { en: "What does the Prototype pattern do?", de: "Was macht das Prototype Pattern?", ru: "Что делает паттерн Prototype?", uk: "Що робить патерн Prototype?" }, options: { en: ["It creates classes from UML diagrams.", "It creates new objects by cloning an existing instance, avoiding the cost of constructing from scratch.", "It defines interface prototypes.", "It generates code at compile time."], de: ["Es erstellt Klassen aus UML-Diagrammen.", "Es erstellt neue Objekte durch Klonen einer bestehenden Instanz und vermeidet die Kosten der Erstellung von Grund auf.", "Es definiert Interface-Prototypen.", "Es generiert Code zur Kompilierzeit."], ru: ["Он создаёт классы из UML-диаграмм.", "Он создаёт новые объекты путём клонирования существующего экземпляра, избегая затрат на создание с нуля.", "Он определяет прототипы интерфейсов.", "Он генерирует код во время компиляции."], uk: ["Він створює класи з UML-діаграм.", "Він створює нові об'єкти шляхом клонування існуючого екземпляра, уникаючи витрат на створення з нуля.", "Він визначає прототипи інтерфейсів.", "Він генерує код під час компіляції."] }, correctIndex: 1, explanation: { en: "When creating an object is expensive (DB query, file parsing), clone an existing one and modify. C#: implement ICloneable or a custom DeepCopy method.", de: "Wenn die Erstellung eines Objekts teuer ist (DB-Abfrage, Datei-Parsing), klone ein bestehendes und passe es an. C#: ICloneable oder eine eigene DeepCopy-Methode implementieren.", ru: "Когда создание объекта затратно (запрос к БД, парсинг файла), клонируйте существующий и модифицируйте. C#: реализуйте ICloneable или собственный метод DeepCopy.", uk: "Коли створення об'єкта затратне (запит до БД, парсинг файлу), клонуйте існуючий і модифікуйте. C#: реалізуйте ICloneable або власний метод DeepCopy." } },
{ category: "Prototype", question: { en: "What is the difference between shallow copy and deep copy in the context of the Prototype pattern?", de: "Was ist der Unterschied zwischen Shallow Copy und Deep Copy im Kontext des Prototype Patterns?", ru: "В чём разница между поверхностной и глубокой копией в контексте паттерна Prototype?", uk: "В чому різниця між поверхневою та глибокою копією в контексті патерну Prototype?" }, options: { en: ["There is no difference.", "Shallow copy duplicates the object but shares references to nested objects. Deep copy recursively duplicates everything, including nested objects.", "Shallow copy is for value types, deep copy for reference types.", "Deep copy is always slower and should be avoided."], de: ["Es gibt keinen Unterschied.", "Shallow Copy dupliziert das Objekt, teilt aber Referenzen auf verschachtelte Objekte. Deep Copy dupliziert rekursiv alles, einschliesslich verschachtelter Objekte.", "Shallow Copy ist für Werttypen, Deep Copy für Referenztypen.", "Deep Copy ist immer langsamer und sollte vermieden werden."], ru: ["Разницы нет.", "Поверхностная копия дублирует объект, но разделяет ссылки на вложенные объекты. Глубокая копия рекурсивно дублирует всё, включая вложенные объекты.", "Поверхностная копия — для типов значений, глубокая — для ссылочных типов.", "Глубокая копия всегда медленнее, и её следует избегать."], uk: ["Різниці немає.", "Поверхнева копія дублює об'єкт, але розділяє посилання на вкладені об'єкти. Глибока копія рекурсивно дублює все, включаючи вкладені об'єкти.", "Поверхнева копія — для типів значень, глибока — для посилальних типів.", "Глибока копія завжди повільніша, і її слід уникати."] }, correctIndex: 1, explanation: { en: "MemberwiseClone() in C# does shallow copy. If the cloned object modifies a shared nested list, the original is affected too. Deep copy prevents this.", de: "MemberwiseClone() in C# macht eine Shallow Copy. Wenn das geklonte Objekt eine geteilte verschachtelte Liste ändert, ist das Original ebenfalls betroffen. Deep Copy verhindert das.", ru: "MemberwiseClone() в C# делает поверхностную копию. Если клонированный объект изменит общий вложенный список, оригинал тоже изменится. Глубокая копия это предотвращает.", uk: "MemberwiseClone() у C# робить поверхневу копію. Якщо клонований об'єкт змінить спільний вкладений список, оригінал теж зміниться. Глибока копія це запобігає." } },
// ===== STRUCTURAL PATTERNS =====
{ category: "Adapter", question: { en: "What problem does the Adapter pattern solve?", de: "Welches Problem löst das Adapter Pattern?", ru: "Какую проблему решает паттерн Adapter?", uk: "Яку проблему вирішує патерн Adapter?" }, options: { en: ["Making classes smaller.", "It allows incompatible interfaces to work together by wrapping one interface with another that the client expects.", "It removes dependencies between classes.", "It speeds up method calls."], de: ["Klassen kleiner machen.", "Es ermöglicht inkompatiblen Interfaces die Zusammenarbeit, indem ein Interface mit einem anderen umhüllt wird, das der Client erwartet.", "Es entfernt Abhängigkeiten zwischen Klassen.", "Es beschleunigt Methodenaufrufe."], ru: ["Уменьшение размера классов.", "Он позволяет несовместимым интерфейсам работать вместе, оборачивая один интерфейс другим, который ожидает клиент.", "Он устраняет зависимости между классами.", "Он ускоряет вызовы методов."], uk: ["Зменшення розміру класів.", "Він дозволяє несумісним інтерфейсам працювати разом, обгортаючи один інтерфейс іншим, який очікує клієнт.", "Він усуває залежності між класами.", "Він прискорює виклики методів."] }, correctIndex: 1, explanation: { en: "Your code expects ILogger. A third-party library uses SerilogLogger with different method signatures. An adapter wraps Serilog behind your ILogger interface.", de: "Dein Code erwartet ILogger. Eine Drittanbieter-Bibliothek nutzt SerilogLogger mit anderen Methodensignaturen. Ein Adapter umhüllt Serilog hinter deinem ILogger-Interface.", ru: "Ваш код ожидает ILogger. Сторонняя библиотека использует SerilogLogger с другими сигнатурами методов. Адаптер оборачивает Serilog за вашим интерфейсом ILogger.", uk: "Ваш код очікує ILogger. Стороння бібліотека використовує SerilogLogger з іншими сигнатурами методів. Адаптер обгортає Serilog за вашим інтерфейсом ILogger." } },
{ category: "Adapter", question: { en: "In Clean Architecture, where is the Adapter pattern commonly used?", de: "Wo wird das Adapter Pattern in Clean Architecture häufig eingesetzt?", ru: "Где в Clean Architecture обычно используется паттерн Adapter?", uk: "Де в Clean Architecture зазвичай використовується патерн Adapter?" }, options: { en: ["In the Domain layer.", "In the Infrastructure layer — adapting external services (APIs, SDKs, legacy systems) to interfaces defined by the Application layer.", "In the Presentation layer only.", "Adapter isn't used in Clean Architecture."], de: ["In der Domain-Schicht.", "In der Infrastruktur-Schicht — externe Dienste (APIs, SDKs, Legacy-Systeme) werden an Interfaces der Anwendungsschicht angepasst.", "Nur in der Präsentationsschicht.", "Adapter wird in Clean Architecture nicht verwendet."], ru: ["В слое Domain.", "В слое Infrastructure — адаптирует внешние сервисы (API, SDK, устаревшие системы) к интерфейсам, определённым в слое Application.", "Только в слое Presentation.", "Adapter не используется в Clean Architecture."], uk: ["В шарі Domain.", "В шарі Infrastructure — адаптує зовнішні сервіси (API, SDK, застарілі системи) до інтерфейсів, визначених у шарі Application.", "Тільки в шарі Presentation.", "Adapter не використовується в Clean Architecture."] }, correctIndex: 1, explanation: { en: "Application defines IEmailSender. Infrastructure creates SendGridAdapter implementing IEmailSender by wrapping SendGrid's SDK. The application never sees SendGrid.", de: "Application definiert IEmailSender. Infrastructure erstellt SendGridAdapter, der IEmailSender implementiert, indem SendGrids SDK umhüllt wird. Die Anwendung sieht SendGrid nie.", ru: "Application определяет IEmailSender. Infrastructure создаёт SendGridAdapter, реализующий IEmailSender путём обёртки SDK SendGrid. Приложение никогда не видит SendGrid.", uk: "Application визначає IEmailSender. Infrastructure створює SendGridAdapter, що реалізує IEmailSender шляхом обгортки SDK SendGrid. Застосунок ніколи не бачить SendGrid." } },
{ category: "Decorator", question: { en: "What is the Decorator pattern?", de: "Was ist das Decorator Pattern?", ru: "Что такое паттерн Decorator?", uk: "Що таке патерн Decorator?" }, options: { en: ["Adding CSS styling to HTML elements.", "Wrapping an object with another object of the same interface to add behavior dynamically, without modifying the original class.", "Inheriting from multiple base classes.", "A C# attribute like [Authorize]."], de: ["CSS-Styling zu HTML-Elementen hinzufügen.", "Ein Objekt mit einem anderen Objekt desselben Interfaces umhüllen, um dynamisch Verhalten hinzuzufügen, ohne die ursprüngliche Klasse zu ändern.", "Von mehreren Basisklassen erben.", "Ein C#-Attribut wie [Authorize]."], ru: ["Добавление CSS-стилей к HTML-элементам.", "Обёртывание объекта другим объектом с тем же интерфейсом для динамического добавления поведения без изменения исходного класса.", "Наследование от нескольких базовых классов.", "Атрибут C# вроде [Authorize]."], uk: ["Додавання CSS-стилів до HTML-елементів.", "Обгортання об'єкта іншим об'єктом з тим самим інтерфейсом для динамічного додавання поведінки без зміни вихідного класу.", "Успадкування від кількох базових класів.", "Атрибут C# на кшталт [Authorize]."] }, correctIndex: 1, explanation: { en: "An IRepository wrapped by CachingRepository (adds caching) wrapped by LoggingRepository (adds logging). Each layer adds one behavior. Russian nesting dolls.", de: "Ein IRepository, umhüllt von CachingRepository (fügt Caching hinzu), umhüllt von LoggingRepository (fügt Logging hinzu). Jede Schicht fügt ein Verhalten hinzu. Wie Matrjoschka-Puppen.", ru: "IRepository обёрнут CachingRepository (добавляет кеширование), который обёрнут LoggingRepository (добавляет логирование). Каждый слой добавляет одно поведение. Как матрёшка.", uk: "IRepository обгорнутий CachingRepository (додає кешування), який обгорнутий LoggingRepository (додає логування). Кожен шар додає одну поведінку. Як матрьошка." } },
{ category: "Decorator", question: { en: "How is the Decorator pattern used with ASP.NET Core DI?", de: "Wie wird das Decorator Pattern mit ASP.NET Core DI verwendet?", ru: "Как паттерн Decorator используется с ASP.NET Core DI?", uk: "Як патерн Decorator використовується з ASP.NET Core DI?" }, options: { en: ["It's not possible with DI.", "Using Scrutor's .Decorate<TInterface, TDecorator>() or manual registration: resolve inner, wrap with outer, register outer.", "By using middleware instead.", "By creating abstract base classes."], de: ["Mit DI ist das nicht möglich.", "Mit Scrutors .Decorate<TInterface, TDecorator>() oder manueller Registrierung: innere Instanz auflösen, mit äusserer umhüllen, äussere registrieren.", "Durch die Verwendung von Middleware.", "Durch Erstellung abstrakter Basisklassen."], ru: ["С DI это невозможно.", "Через .Decorate<TInterface, TDecorator>() из Scrutor или ручную регистрацию: разрешить внутренний, обернуть внешним, зарегистрировать внешний.", "Через использование middleware.", "Через создание абстрактных базовых классов."], uk: ["З DI це неможливо.", "Через .Decorate<TInterface, TDecorator>() із Scrutor або ручну реєстрацію: розв'язати внутрішній, обгорнути зовнішнім, зареєструвати зовнішній.", "Через використання middleware.", "Через створення абстрактних базових класів."] }, correctIndex: 1, explanation: { en: "services.AddScoped<IRepo, EfRepo>(); then Scrutor: services.Decorate<IRepo, CachingRepo>(); CachingRepo takes IRepo in its constructor and wraps it.", de: "services.AddScoped<IRepo, EfRepo>(); dann Scrutor: services.Decorate<IRepo, CachingRepo>(); CachingRepo nimmt IRepo im Konstruktor und umhüllt es.", ru: "services.AddScoped<IRepo, EfRepo>(); затем Scrutor: services.Decorate<IRepo, CachingRepo>(); CachingRepo принимает IRepo в конструкторе и оборачивает его.", uk: "services.AddScoped<IRepo, EfRepo>(); потім Scrutor: services.Decorate<IRepo, CachingRepo>(); CachingRepo приймає IRepo в конструкторі та обгортає його." } },
{ category: "Decorator", question: { en: "How does the Decorator pattern differ from inheritance?", de: "Wie unterscheidet sich das Decorator Pattern von Vererbung?", ru: "Чем паттерн Decorator отличается от наследования?", uk: "Чим патерн Decorator відрізняється від успадкування?" }, options: { en: ["They're identical approaches.", "Decorator adds behavior at runtime via composition, while inheritance adds it at compile time. Decorators can be stacked dynamically.", "Inheritance is more flexible.", "Decorator can only be used once per class."], de: ["Es sind identische Ansätze.", "Decorator fügt Verhalten zur Laufzeit über Komposition hinzu, während Vererbung dies zur Kompilierzeit tut. Decorators können dynamisch gestapelt werden.", "Vererbung ist flexibler.", "Decorator kann nur einmal pro Klasse verwendet werden."], ru: ["Это одинаковые подходы.", "Decorator добавляет поведение во время выполнения через композицию, а наследование — во время компиляции. Декораторы можно динамически наслаивать.", "Наследование более гибкое.", "Decorator можно использовать только один раз на класс."], uk: ["Це однакові підходи.", "Decorator додає поведінку під час виконання через композицію, а успадкування — під час компіляції. Декоратори можна динамічно нашаровувати.", "Успадкування гнучкіше.", "Decorator можна використовувати лише раз на клас."] }, correctIndex: 1, explanation: { en: "With inheritance, you'd need CachingLoggingRepo, LoggingCachingRepo, etc. — combinatorial explosion. Decorators compose freely: wrap any combination at runtime.", de: "Mit Vererbung bräuchte man CachingLoggingRepo, LoggingCachingRepo usw. — kombinatorische Explosion. Decorators kombinieren sich frei: beliebige Kombination zur Laufzeit.", ru: "С наследованием понадобились бы CachingLoggingRepo, LoggingCachingRepo и т.д. — комбинаторный взрыв. Декораторы свободно комбинируются: любая комбинация во время выполнения.", uk: "З успадкуванням потрібні були б CachingLoggingRepo, LoggingCachingRepo тощо — комбінаторний вибух. Декоратори вільно комбінуються: будь-яка комбінація під час виконання." } },
{ category: "Proxy", question: { en: "What is the Proxy pattern?", de: "Was ist das Proxy Pattern?", ru: "Что такое паттерн Proxy?", uk: "Що таке патерн Proxy?" }, options: { en: ["A web proxy server.", "A surrogate object that controls access to another object — adding lazy loading, access control, logging, or caching transparently.", "A design pattern for REST APIs.", "A .NET delegate."], de: ["Ein Web-Proxy-Server.", "Ein Stellvertreterobjekt, das den Zugriff auf ein anderes Objekt steuert — transparent Lazy Loading, Zugriffskontrolle, Logging oder Caching hinzufügend.", "Ein Entwurfsmuster für REST APIs.", "Ein .NET-Delegate."], ru: ["Веб-прокси-сервер.", "Объект-заместитель, который контролирует доступ к другому объекту — прозрачно добавляя ленивую загрузку, контроль доступа, логирование или кеширование.", "Паттерн проектирования для REST API.", "Делегат .NET."], uk: ["Веб-проксі-сервер.", "Об'єкт-замісник, який контролює доступ до іншого об'єкта — прозоро додаючи ліниве завантаження, контроль доступу, логування або кешування.", "Патерн проєктування для REST API.", "Делегат .NET."] }, correctIndex: 1, explanation: { en: "A LazyLoadingProxy for an image: it implements IImage but only loads the real image from disk when Display() is first called. The client doesn't know it's a proxy.", de: "Ein LazyLoadingProxy für ein Bild: Es implementiert IImage, lädt aber das echte Bild erst von der Festplatte, wenn Display() zum ersten Mal aufgerufen wird. Der Client weiss nicht, dass es ein Proxy ist.", ru: "LazyLoadingProxy для изображения: он реализует IImage, но загружает реальное изображение с диска только при первом вызове Display(). Клиент не знает, что это прокси.", uk: "LazyLoadingProxy для зображення: він реалізує IImage, але завантажує реальне зображення з диска лише при першому виклику Display(). Клієнт не знає, що це проксі." } },
{ category: "Proxy", question: { en: "What are the common types of Proxy?", de: "Was sind die gängigen Proxy-Typen?", ru: "Какие существуют распространённые типы Proxy?", uk: "Які існують поширені типи Proxy?" }, options: { en: ["Static and dynamic.", "Virtual (lazy loading), Protection (access control), Remote (network transparency), and Caching proxy.", "Read proxy and write proxy.", "Sync proxy and async proxy."], de: ["Statisch und dynamisch.", "Virtual (Lazy Loading), Protection (Zugriffskontrolle), Remote (Netzwerktransparenz) und Caching Proxy.", "Lese-Proxy und Schreib-Proxy.", "Sync-Proxy und Async-Proxy."], ru: ["Статический и динамический.", "Virtual (ленивая загрузка), Protection (контроль доступа), Remote (сетевая прозрачность) и Caching Proxy.", "Прокси чтения и прокси записи.", "Синхронный и асинхронный прокси."], uk: ["Статичний і динамічний.", "Virtual (ліниве завантаження), Protection (контроль доступу), Remote (мережева прозорість) і Caching Proxy.", "Проксі читання і проксі запису.", "Синхронний і асинхронний проксі."] }, correctIndex: 1, explanation: { en: "Virtual: delay expensive init. Protection: check permissions before calling real object. Remote: hide network calls (like gRPC client). Caching: store results.", de: "Virtual: teure Initialisierung verzögern. Protection: Berechtigungen prüfen vor Aufruf des echten Objekts. Remote: Netzwerkaufrufe verbergen (wie gRPC-Client). Caching: Ergebnisse speichern.", ru: "Virtual: отложить дорогую инициализацию. Protection: проверить разрешения перед вызовом реального объекта. Remote: скрыть сетевые вызовы (как gRPC-клиент). Caching: хранить результаты.", uk: "Virtual: відкласти дорогу ініціалізацію. Protection: перевірити дозволи перед викликом реального об'єкта. Remote: приховати мережеві виклики (як gRPC-клієнт). Caching: зберігати результати." } },
{ category: "Facade", question: { en: "What does the Facade pattern provide?", de: "Was bietet das Facade Pattern?", ru: "Что предоставляет паттерн Facade?", uk: "Що надає патерн Facade?" }, options: { en: ["A new database connection.", "A simplified, unified interface to a complex subsystem, hiding internal complexity from the client.", "A way to create objects.", "An event-driven architecture."], de: ["Eine neue Datenbankverbindung.", "Ein vereinfachtes, einheitliches Interface für ein komplexes Subsystem, das die interne Komplexität vor dem Client verbirgt.", "Eine Möglichkeit, Objekte zu erstellen.", "Eine ereignisgesteuerte Architektur."], ru: ["Новое соединение с базой данных.", "Упрощённый, единый интерфейс к сложной подсистеме, скрывающий внутреннюю сложность от клиента.", "Способ создания объектов.", "Событийно-ориентированную архитектуру."], uk: ["Нове з'єднання з базою даних.", "Спрощений, єдиний інтерфейс до складної підсистеми, що приховує внутрішню складність від клієнта.", "Спосіб створення об'єктів.", "Подієво-орієнтовану архітектуру."] }, correctIndex: 1, explanation: { en: "Instead of calling OrderValidator, InventoryChecker, PaymentProcessor, and ShippingService separately, OrderFacade.PlaceOrder() orchestrates all of them behind one method.", de: "Statt OrderValidator, InventoryChecker, PaymentProcessor und ShippingService einzeln aufzurufen, orchestriert OrderFacade.PlaceOrder() alles hinter einer Methode.", ru: "Вместо вызова OrderValidator, InventoryChecker, PaymentProcessor и ShippingService по отдельности, OrderFacade.PlaceOrder() оркестрирует всё за одним методом.", uk: "Замість виклику OrderValidator, InventoryChecker, PaymentProcessor і ShippingService окремо, OrderFacade.PlaceOrder() оркеструє все за одним методом." } },
{ category: "Facade", question: { en: "How does Facade differ from Adapter?", de: "Wie unterscheidet sich Facade von Adapter?", ru: "Чем Facade отличается от Adapter?", uk: "Чим Facade відрізняється від Adapter?" }, options: { en: ["They're the same pattern.", "Adapter makes an incompatible interface compatible. Facade simplifies a complex system into one easy-to-use interface.", "Facade is for UI, Adapter is for backend.", "Adapter wraps one class, Facade wraps many."], de: ["Es ist dasselbe Pattern.", "Adapter macht ein inkompatibles Interface kompatibel. Facade vereinfacht ein komplexes System zu einem einfach nutzbaren Interface.", "Facade ist für UI, Adapter für Backend.", "Adapter umhüllt eine Klasse, Facade umhüllt viele."], ru: ["Это один и тот же паттерн.", "Adapter делает несовместимый интерфейс совместимым. Facade упрощает сложную систему в один удобный интерфейс.", "Facade — для UI, Adapter — для бэкенда.", "Adapter оборачивает один класс, Facade — много."], uk: ["Це один і той самий патерн.", "Adapter робить несумісний інтерфейс сумісним. Facade спрощує складну систему в один зручний інтерфейс.", "Facade — для UI, Adapter — для бекенду.", "Adapter обгортає один клас, Facade — багато."] }, correctIndex: 1, explanation: { en: "Adapter: translate interface A to interface B. Facade: simplify interfaces A + B + C + D into one clean interface F.", de: "Adapter: Interface A in Interface B übersetzen. Facade: Interfaces A + B + C + D in ein sauberes Interface F vereinfachen.", ru: "Adapter: перевести интерфейс A в интерфейс B. Facade: упростить интерфейсы A + B + C + D в один чистый интерфейс F.", uk: "Adapter: перекласти інтерфейс A в інтерфейс B. Facade: спростити інтерфейси A + B + C + D в один чистий інтерфейс F." } },
{ category: "Composite", question: { en: "What does the Composite pattern model?", de: "Was modelliert das Composite Pattern?", ru: "Что моделирует паттерн Composite?", uk: "Що моделює патерн Composite?" }, options: { en: ["Database composite keys.", "Tree structures where individual objects and compositions of objects are treated uniformly through a common interface.", "Multiple inheritance.", "Composite design documents."], de: ["Zusammengesetzte Datenbankschlüssel.", "Baumstrukturen, in denen einzelne Objekte und Kompositionen von Objekten einheitlich über ein gemeinsames Interface behandelt werden.", "Mehrfachvererbung.", "Zusammengesetzte Designdokumente."], ru: ["Составные ключи базы данных.", "Древовидные структуры, где отдельные объекты и композиции объектов обрабатываются единообразно через общий интерфейс.", "Множественное наследование.", "Составные проектные документы."], uk: ["Складені ключі бази даних.", "Деревоподібні структури, де окремі об'єкти та композиції об'єктів обробляються однаково через спільний інтерфейс.", "Множинне успадкування.", "Складені проєктні документи."] }, correctIndex: 1, explanation: { en: "A FileSystemItem interface implemented by File (leaf) and Directory (composite containing children). directory.GetSize() recursively sums all children's sizes.", de: "Ein FileSystemItem-Interface, implementiert von File (Blatt) und Directory (Komposit mit Kindern). directory.GetSize() summiert rekursiv die Grössen aller Kinder.", ru: "Интерфейс FileSystemItem, реализованный File (лист) и Directory (композит с дочерними элементами). directory.GetSize() рекурсивно суммирует размеры всех дочерних.", uk: "Інтерфейс FileSystemItem, реалізований File (лист) і Directory (композит з дочірніми). directory.GetSize() рекурсивно підсумовує розміри всіх дочірніх." } },
{ category: "Bridge", question: { en: "What does the Bridge pattern do?", de: "Was macht das Bridge Pattern?", ru: "Что делает паттерн Bridge?", uk: "Що робить патерн Bridge?" }, options: { en: ["Connects two databases.", "It separates an abstraction from its implementation so both can vary independently, preventing a combinatorial explosion of subclasses.", "It bridges frontend and backend.", "It creates network connections."], de: ["Verbindet zwei Datenbanken.", "Es trennt eine Abstraktion von ihrer Implementierung, damit beide unabhängig variieren können — verhindert eine kombinatorische Explosion von Unterklassen.", "Es verbindet Frontend und Backend.", "Es erstellt Netzwerkverbindungen."], ru: ["Соединяет две базы данных.", "Он разделяет абстракцию и реализацию, позволяя им изменяться независимо — предотвращает комбинаторный взрыв подклассов.", "Он соединяет фронтенд и бэкенд.", "Он создаёт сетевые соединения."], uk: ["З'єднує дві бази даних.", "Він розділяє абстракцію та реалізацію, дозволяючи їм змінюватися незалежно — запобігає комбінаторному вибуху підкласів.", "Він з'єднує фронтенд і бекенд.", "Він створює мережеві з'єднання."] }, correctIndex: 1, explanation: { en: "Without Bridge: WindowsCircle, LinuxCircle, WindowsSquare, LinuxSquare... With Bridge: Shape has a reference to IRenderer. Any shape works with any renderer. Abstraction and implementation evolve independently.", de: "Ohne Bridge: WindowsCircle, LinuxCircle, WindowsSquare, LinuxSquare... Mit Bridge: Shape hat eine Referenz auf IRenderer. Jede Form funktioniert mit jedem Renderer. Abstraktion und Implementierung entwickeln sich unabhängig.", ru: "Без Bridge: WindowsCircle, LinuxCircle, WindowsSquare, LinuxSquare... С Bridge: Shape имеет ссылку на IRenderer. Любая фигура работает с любым рендерером. Абстракция и реализация развиваются независимо.", uk: "Без Bridge: WindowsCircle, LinuxCircle, WindowsSquare, LinuxSquare... З Bridge: Shape має посилання на IRenderer. Будь-яка фігура працює з будь-яким рендерером. Абстракція та реалізація розвиваються незалежно." } },
{ category: "Flyweight", question: { en: "What does the Flyweight pattern optimize?", de: "Was optimiert das Flyweight Pattern?", ru: "Что оптимизирует паттерн Flyweight?", uk: "Що оптимізує патерн Flyweight?" }, options: { en: ["CPU performance.", "Memory usage — by sharing common state (intrinsic) across many objects instead of duplicating it, while keeping unique state (extrinsic) separate.", "Network bandwidth.", "Disk I/O speed."], de: ["CPU-Leistung.", "Speicherverbrauch — durch Teilen des gemeinsamen Zustands (intrinsisch) über viele Objekte hinweg statt ihn zu duplizieren, während der einzigartige Zustand (extrinsisch) separat bleibt.", "Netzwerkbandbreite.", "Festplatten-I/O-Geschwindigkeit."], ru: ["Производительность процессора.", "Использование памяти — через совместное использование общего состояния (внутреннего) между многими объектами вместо дублирования, а уникальное состояние (внешнее) хранится отдельно.", "Пропускную способность сети.", "Скорость дискового ввода-вывода."], uk: ["Продуктивність процесора.", "Використання пам'яті — через спільне використання загального стану (внутрішнього) між багатьма об'єктами замість дублювання, а унікальний стан (зовнішній) зберігається окремо.", "Пропускну здатність мережі.", "Швидкість дискового вводу-виводу."] }, correctIndex: 1, explanation: { en: "In a text editor, each character object could share font/style data (intrinsic) via a Flyweight pool. Only position (extrinsic) is unique. String.Intern() in .NET is a Flyweight for strings.", de: "In einem Texteditor könnte jedes Zeichen-Objekt Schrift-/Stildaten (intrinsisch) über einen Flyweight-Pool teilen. Nur die Position (extrinsisch) ist einzigartig. String.Intern() in .NET ist ein Flyweight für Strings.", ru: "В текстовом редакторе каждый объект символа мог бы разделять данные шрифта/стиля (внутренние) через пул Flyweight. Только позиция (внешняя) уникальна. String.Intern() в .NET — это Flyweight для строк.", uk: "У текстовому редакторі кожен об'єкт символу міг би розділяти дані шрифту/стилю (внутрішні) через пул Flyweight. Тільки позиція (зовнішня) унікальна. String.Intern() у .NET — це Flyweight для рядків." } },
// ===== BEHAVIORAL PATTERNS =====
{ category: "Strategy", question: { en: "What does the Strategy pattern do?", de: "Was macht das Strategy Pattern?", ru: "Что делает паттерн Strategy?", uk: "Що робить патерн Strategy?" }, options: { en: ["Defines a military strategy.", "Defines a family of interchangeable algorithms behind a common interface, letting the client switch algorithms at runtime.", "Creates a step-by-step execution plan.", "Optimizes sorting algorithms."], de: ["Definiert eine Militärstrategie.", "Definiert eine Familie austauschbarer Algorithmen hinter einem gemeinsamen Interface, sodass der Client Algorithmen zur Laufzeit wechseln kann.", "Erstellt einen schrittweisen Ausführungsplan.", "Optimiert Sortieralgorithmen."], ru: ["Определяет военную стратегию.", "Определяет семейство взаимозаменяемых алгоритмов за общим интерфейсом, позволяя клиенту переключать алгоритмы во время выполнения.", "Создаёт пошаговый план выполнения.", "Оптимизирует алгоритмы сортировки."], uk: ["Визначає військову стратегію.", "Визначає сімейство взаємозамінних алгоритмів за спільним інтерфейсом, дозволяючи клієнту перемикати алгоритми під час виконання.", "Створює покроковий план виконання.", "Оптимізує алгоритми сортування."] }, correctIndex: 1, explanation: { en: "IDiscountStrategy with StudentDiscount, VIPDiscount, SeasonalDiscount. The checkout service uses whichever strategy is injected — no if/else chains.", de: "IDiscountStrategy mit StudentDiscount, VIPDiscount, SeasonalDiscount. Der Checkout-Service verwendet die injizierte Strategy — keine if/else-Ketten.", ru: "IDiscountStrategy с StudentDiscount, VIPDiscount, SeasonalDiscount. Сервис оформления заказа использует ту стратегию, которая инъектирована — никаких цепочек if/else.", uk: "IDiscountStrategy з StudentDiscount, VIPDiscount, SeasonalDiscount. Сервіс оформлення замовлення використовує ту стратегію, яку ін'єктовано — жодних ланцюжків if/else." } },
{ category: "Strategy", question: { en: "How is the Strategy pattern typically implemented with ASP.NET Core DI?", de: "Wie wird das Strategy Pattern typischerweise mit ASP.NET Core DI implementiert?", ru: "Как паттерн Strategy обычно реализуется с ASP.NET Core DI?", uk: "Як патерн Strategy зазвичай реалізується з ASP.NET Core DI?" }, options: { en: ["Using static methods.", "Register multiple implementations and use a factory or keyed services to resolve the correct strategy at runtime.", "Hard-code the strategy selection in Program.cs.", "Use reflection to find strategies."], de: ["Mit statischen Methoden.", "Mehrere Implementierungen registrieren und eine Factory oder Keyed Services nutzen, um die richtige Strategy zur Laufzeit aufzulösen.", "Die Strategy-Auswahl fest in Program.cs codieren.", "Reflection nutzen, um Strategies zu finden."], ru: ["С помощью статических методов.", "Зарегистрировать несколько реализаций и использовать фабрику или keyed services для разрешения нужной стратегии во время выполнения.", "Жёстко закодировать выбор стратегии в Program.cs.", "Использовать рефлексию для поиска стратегий."], uk: ["За допомогою статичних методів.", "Зареєструвати кілька реалізацій і використовувати фабрику або keyed services для розв'язання потрібної стратегії під час виконання.", "Жорстко закодувати вибір стратегії в Program.cs.", "Використовувати рефлексію для пошуку стратегій."] }, correctIndex: 1, explanation: { en: ".NET 8 keyed services: services.AddKeyedScoped<IStrategy, StrategyA>('a'). Or inject IEnumerable<IStrategy> and select by type. Clean runtime selection.", de: ".NET 8 Keyed Services: services.AddKeyedScoped<IStrategy, StrategyA>('a'). Oder IEnumerable<IStrategy> injizieren und nach Typ auswählen. Saubere Laufzeitauswahl.", ru: ".NET 8 keyed services: services.AddKeyedScoped<IStrategy, StrategyA>('a'). Или инъектировать IEnumerable<IStrategy> и выбирать по типу. Чистый выбор во время выполнения.", uk: ".NET 8 keyed services: services.AddKeyedScoped<IStrategy, StrategyA>('a'). Або ін'єктувати IEnumerable<IStrategy> і вибирати за типом. Чистий вибір під час виконання." } },
{ category: "Observer", question: { en: "What does the Observer pattern define?", de: "Was definiert das Observer Pattern?", ru: "Что определяет паттерн Observer?", uk: "Що визначає патерн Observer?" }, options: { en: ["A surveillance system.", "A one-to-many dependency: when one object (Subject) changes state, all its dependents (Observers) are notified automatically.", "A logging framework.", "A database trigger."], de: ["Ein Überwachungssystem.", "Eine Eins-zu-Viele-Abhängigkeit: Wenn ein Objekt (Subject) seinen Zustand ändert, werden alle Abhängigen (Observer) automatisch benachrichtigt.", "Ein Logging-Framework.", "Einen Datenbank-Trigger."], ru: ["Систему наблюдения.", "Зависимость «один ко многим»: когда объект (Subject) меняет состояние, все его зависимые (Observer) уведомляются автоматически.", "Фреймворк логирования.", "Триггер базы данных."], uk: ["Систему спостереження.", "Залежність «один до багатьох»: коли об'єкт (Subject) змінює стан, усі його залежні (Observer) сповіщаються автоматично.", "Фреймворк логування.", "Тригер бази даних."] }, correctIndex: 1, explanation: { en: "When an Order changes status, all subscribers (EmailService, InventoryService, AnalyticsService) are notified. Publisher doesn't know about subscribers.", de: "Wenn sich der Bestellstatus ändert, werden alle Abonnenten (EmailService, InventoryService, AnalyticsService) benachrichtigt. Der Publisher kennt die Abonnenten nicht.", ru: "Когда заказ меняет статус, все подписчики (EmailService, InventoryService, AnalyticsService) уведомляются. Издатель не знает о подписчиках.", uk: "Коли замовлення змінює статус, усі підписники (EmailService, InventoryService, AnalyticsService) сповіщаються. Видавець не знає про підписників." } },
{ category: "Observer", question: { en: "How does the Observer pattern manifest in C#?", de: "Wie manifestiert sich das Observer Pattern in C#?", ru: "Как паттерн Observer проявляется в C#?", uk: "Як патерн Observer проявляється в C#?" }, options: { en: ["Only through third-party libraries.", "C# events and delegates are a built-in implementation of Observer. Also: IObservable<T>/IObserver<T> and domain events via MediatR.", "Through abstract classes only.", "C# doesn't support Observer."], de: ["Nur über Drittanbieter-Bibliotheken.", "C# Events und Delegates sind eine eingebaute Implementierung von Observer. Auch: IObservable<T>/IObserver<T> und Domain Events über MediatR.", "Nur über abstrakte Klassen.", "C# unterstützt Observer nicht."], ru: ["Только через сторонние библиотеки.", "События и делегаты C# — встроенная реализация Observer. Также: IObservable<T>/IObserver<T> и доменные события через MediatR.", "Только через абстрактные классы.", "C# не поддерживает Observer."], uk: ["Тільки через сторонні бібліотеки.", "Події та делегати C# — вбудована реалізація Observer. Також: IObservable<T>/IObserver<T> і доменні події через MediatR.", "Тільки через абстрактні класи.", "C# не підтримує Observer."] }, correctIndex: 1, explanation: { en: "event EventHandler<OrderPlacedArgs> OrderPlaced; is Observer pattern. publisher.OrderPlaced += subscriber.HandleOrder; subscribers are notified automatically.", de: "event EventHandler<OrderPlacedArgs> OrderPlaced; ist das Observer Pattern. publisher.OrderPlaced += subscriber.HandleOrder; Abonnenten werden automatisch benachrichtigt.", ru: "event EventHandler<OrderPlacedArgs> OrderPlaced; — это паттерн Observer. publisher.OrderPlaced += subscriber.HandleOrder; подписчики уведомляются автоматически.", uk: "event EventHandler<OrderPlacedArgs> OrderPlaced; — це патерн Observer. publisher.OrderPlaced += subscriber.HandleOrder; підписники сповіщаються автоматично." } },
{ category: "Chain of Responsibility", question: { en: "What does the Chain of Responsibility pattern do?", de: "Was macht das Chain of Responsibility Pattern?", ru: "Что делает паттерн Chain of Responsibility?", uk: "Що робить патерн Chain of Responsibility?" }, options: { en: ["Creates a blockchain.", "Passes a request along a chain of handlers; each handler either processes the request or passes it to the next handler.", "Defines a linked list data structure.", "Manages responsibility assignment in a team."], de: ["Erstellt eine Blockchain.", "Leitet eine Anfrage entlang einer Kette von Handlern weiter; jeder Handler verarbeitet die Anfrage oder reicht sie an den nächsten weiter.", "Definiert eine verkettete Listendatenstruktur.", "Verwaltet die Verantwortungszuweisung in einem Team."], ru: ["Создаёт блокчейн.", "Передаёт запрос по цепочке обработчиков; каждый обработчик либо обрабатывает запрос, либо передаёт следующему.", "Определяет структуру данных связного списка.", "Управляет распределением ответственности в команде."], uk: ["Створює блокчейн.", "Передає запит по ланцюжку обробників; кожен обробник або обробляє запит, або передає наступному.", "Визначає структуру даних зв'язного списку.", "Керує розподілом відповідальності в команді."] }, correctIndex: 1, explanation: { en: "ASP.NET Core middleware IS Chain of Responsibility. Each middleware either handles the request (e.g., returns 401) or calls next() to pass it along.", de: "ASP.NET Core Middleware IST Chain of Responsibility. Jede Middleware behandelt die Anfrage (z.B. gibt 401 zurück) oder ruft next() auf, um sie weiterzuleiten.", ru: "Middleware ASP.NET Core — это и есть Chain of Responsibility. Каждый middleware либо обрабатывает запрос (например, возвращает 401), либо вызывает next() для передачи дальше.", uk: "Middleware ASP.NET Core — це і є Chain of Responsibility. Кожен middleware або обробляє запит (наприклад, повертає 401), або викликає next() для передачі далі." } },
{ category: "Chain of Responsibility", question: { en: "Which ASP.NET Core feature is a direct implementation of Chain of Responsibility?", de: "Welche ASP.NET Core-Funktion ist eine direkte Implementierung von Chain of Responsibility?", ru: "Какая функция ASP.NET Core является прямой реализацией Chain of Responsibility?", uk: "Яка функція ASP.NET Core є прямою реалізацією Chain of Responsibility?" }, options: { en: ["Entity Framework", "The middleware pipeline — each middleware calls next(context) or short-circuits the chain.", "Razor Pages", "Model binding"], de: ["Entity Framework", "Die Middleware-Pipeline — jede Middleware ruft next(context) auf oder unterbricht die Kette.", "Razor Pages", "Model Binding"], ru: ["Entity Framework", "Конвейер middleware — каждый middleware вызывает next(context) или прерывает цепочку.", "Razor Pages", "Привязка модели"], uk: ["Entity Framework", "Конвеєр middleware — кожен middleware викликає next(context) або перериває ланцюжок.", "Razor Pages", "Прив'язка моделі"] }, correctIndex: 1, explanation: { en: "app.UseAuthentication() -> app.UseAuthorization() -> app.UseEndpoints(). Each middleware decides to continue or stop. Classic Chain of Responsibility.", de: "app.UseAuthentication() -> app.UseAuthorization() -> app.UseEndpoints(). Jede Middleware entscheidet, ob sie fortfährt oder stoppt. Klassische Chain of Responsibility.", ru: "app.UseAuthentication() -> app.UseAuthorization() -> app.UseEndpoints(). Каждый middleware решает, продолжить или остановиться. Классическая Chain of Responsibility.", uk: "app.UseAuthentication() -> app.UseAuthorization() -> app.UseEndpoints(). Кожен middleware вирішує, продовжити чи зупинитися. Класична Chain of Responsibility." } },
{ category: "Mediator", question: { en: "What does the Mediator pattern do?", de: "Was macht das Mediator Pattern?", ru: "Что делает паттерн Mediator?", uk: "Що робить патерн Mediator?" }, options: { en: ["Mediates legal disputes.", "Reduces direct dependencies between objects by having them communicate through a central mediator object.", "Creates middleware pipelines.", "Manages database connections."], de: ["Vermittelt bei rechtlichen Streitigkeiten.", "Reduziert direkte Abhängigkeiten zwischen Objekten, indem sie über ein zentrales Mediator-Objekt kommunizieren.", "Erstellt Middleware-Pipelines.", "Verwaltet Datenbankverbindungen."], ru: ["Посредничает в юридических спорах.", "Уменьшает прямые зависимости между объектами, заставляя их общаться через центральный объект-посредник.", "Создаёт конвейеры middleware.", "Управляет соединениями с базой данных."], uk: ["Посередничає в юридичних спорах.", "Зменшує прямі залежності між об'єктами, змушуючи їх спілкуватися через центральний об'єкт-посередник.", "Створює конвеєри middleware.", "Керує з'єднаннями з базою даних."] }, correctIndex: 1, explanation: { en: "Instead of components talking directly to each other (N*N dependencies), they all talk through the Mediator (N dependencies). MediatR in .NET is named after this pattern.", de: "Statt dass Komponenten direkt miteinander kommunizieren (N*N Abhängigkeiten), kommunizieren alle über den Mediator (N Abhängigkeiten). MediatR in .NET ist nach diesem Pattern benannt.", ru: "Вместо прямого общения компонентов друг с другом (N*N зависимостей) все общаются через Mediator (N зависимостей). MediatR в .NET назван в честь этого паттерна.", uk: "Замість прямого спілкування компонентів один з одним (N*N залежностей) усі спілкуються через Mediator (N залежностей). MediatR у .NET названий на честь цього патерну." } },
{ category: "Mediator", question: { en: "How does MediatR implement the Mediator pattern?", de: "Wie implementiert MediatR das Mediator Pattern?", ru: "Как MediatR реализует паттерн Mediator?", uk: "Як MediatR реалізує патерн Mediator?" }, options: { en: ["It creates REST APIs.", "Controllers send requests (Commands/Queries) to MediatR. MediatR routes them to the correct handler. Neither knows about the other.", "It mediates between databases.", "It's a message queue."], de: ["Es erstellt REST APIs.", "Controller senden Requests (Commands/Queries) an MediatR. MediatR leitet sie an den richtigen Handler. Keiner kennt den anderen.", "Es vermittelt zwischen Datenbanken.", "Es ist eine Message Queue."], ru: ["Он создаёт REST API.", "Контроллеры отправляют запросы (Commands/Queries) в MediatR. MediatR направляет их нужному обработчику. Ни один не знает о другом.", "Он посредничает между базами данных.", "Это очередь сообщений."], uk: ["Він створює REST API.", "Контролери надсилають запити (Commands/Queries) до MediatR. MediatR спрямовує їх до потрібного обробника. Жоден не знає про іншого.", "Він посередничає між базами даних.", "Це черга повідомлень."] }, correctIndex: 1, explanation: { en: "Controller sends CreateOrderCommand to mediator.Send(). MediatR finds CreateOrderCommandHandler and invokes it. The controller has zero reference to the handler.", de: "Der Controller sendet CreateOrderCommand an mediator.Send(). MediatR findet den CreateOrderCommandHandler und ruft ihn auf. Der Controller hat keine Referenz auf den Handler.", ru: "Контроллер отправляет CreateOrderCommand в mediator.Send(). MediatR находит CreateOrderCommandHandler и вызывает его. Контроллер не имеет никакой ссылки на обработчик.", uk: "Контролер надсилає CreateOrderCommand до mediator.Send(). MediatR знаходить CreateOrderCommandHandler і викликає його. Контролер не має жодного посилання на обробник." } },
{ category: "Command Pattern", question: { en: "What does the Command pattern do?", de: "Was macht das Command Pattern?", ru: "Что делает паттерн Command?", uk: "Що робить патерн Command?" }, options: { en: ["Executes shell commands.", "Encapsulates a request as an object, allowing parameterization, queuing, logging, and undo/redo of operations.", "Creates command-line interfaces.", "Defines database commands."], de: ["Führt Shell-Befehle aus.", "Kapselt eine Anfrage als Objekt, ermöglicht Parametrisierung, Warteschlangen, Logging und Undo/Redo von Operationen.", "Erstellt Kommandozeilen-Interfaces.", "Definiert Datenbankbefehle."], ru: ["Выполняет команды командной строки.", "Инкапсулирует запрос как объект, позволяя параметризацию, очередь, логирование и отмену/повтор операций.", "Создаёт интерфейсы командной строки.", "Определяет команды базы данных."], uk: ["Виконує команди командного рядка.", "Інкапсулює запит як об'єкт, дозволяючи параметризацію, черги, логування та скасування/повтор операцій.", "Створює інтерфейси командного рядка.", "Визначає команди бази даних."] }, correctIndex: 1, explanation: { en: "Each action becomes an object: MoveCommand, DeleteCommand, ResizeCommand. They can be stored in a history stack for undo, serialized for replay, or queued for later.", de: "Jede Aktion wird ein Objekt: MoveCommand, DeleteCommand, ResizeCommand. Sie können in einem History-Stack für Undo gespeichert, für Replay serialisiert oder in eine Warteschlange gestellt werden.", ru: "Каждое действие становится объектом: MoveCommand, DeleteCommand, ResizeCommand. Их можно хранить в стеке истории для отмены, сериализовать для воспроизведения или ставить в очередь.", uk: "Кожна дія стає об'єктом: MoveCommand, DeleteCommand, ResizeCommand. Їх можна зберігати в стеку історії для скасування, серіалізувати для відтворення або ставити в чергу." } },
{ category: "Command Pattern", question: { en: "How does CQRS relate to the Command pattern?", de: "Wie hängt CQRS mit dem Command Pattern zusammen?", ru: "Как CQRS связан с паттерном Command?", uk: "Як CQRS пов'язаний з патерном Command?" }, options: { en: ["They're unrelated.", "CQRS Commands (CreateOrderCommand) are a direct application of the Command pattern — requests encapsulated as objects, processed by handlers.", "CQRS replaces the Command pattern.", "The Command pattern is only for UI."], de: ["Sie haben nichts miteinander zu tun.", "CQRS Commands (CreateOrderCommand) sind eine direkte Anwendung des Command Patterns — Anfragen als Objekte gekapselt, von Handlern verarbeitet.", "CQRS ersetzt das Command Pattern.", "Das Command Pattern ist nur für UI."], ru: ["Они не связаны.", "Команды CQRS (CreateOrderCommand) — прямое применение паттерна Command: запросы, инкапсулированные как объекты и обрабатываемые обработчиками.", "CQRS заменяет паттерн Command.", "Паттерн Command только для UI."], uk: ["Вони не пов'язані.", "Команди CQRS (CreateOrderCommand) — пряме застосування патерну Command: запити, інкапсульовані як об'єкти та оброблювані обробниками.", "CQRS замінює патерн Command.", "Патерн Command тільки для UI."] }, correctIndex: 1, explanation: { en: "CreateOrderCommand carries all data needed. CreateOrderCommandHandler executes it. The command object can be logged, validated, retried — all Command pattern benefits.", de: "CreateOrderCommand enthält alle benötigten Daten. CreateOrderCommandHandler führt es aus. Das Command-Objekt kann geloggt, validiert, wiederholt werden — alle Vorteile des Command Patterns.", ru: "CreateOrderCommand содержит все необходимые данные. CreateOrderCommandHandler выполняет его. Объект команды можно логировать, валидировать, повторять — все преимущества паттерна Command.", uk: "CreateOrderCommand містить усі необхідні дані. CreateOrderCommandHandler виконує його. Об'єкт команди можна логувати, валідувати, повторювати — усі переваги патерну Command." } },
{ category: "Template Method", question: { en: "What does the Template Method pattern define?", de: "Was definiert das Template Method Pattern?", ru: "Что определяет паттерн Template Method?", uk: "Що визначає патерн Template Method?" }, options: { en: ["A document template.", "A skeleton algorithm in a base class, deferring specific steps to subclasses via abstract/virtual methods.", "A generic type parameter.", "A method that returns a template string."], de: ["Eine Dokumentvorlage.", "Ein Algorithmus-Skelett in einer Basisklasse, das bestimmte Schritte an Unterklassen über abstrakte/virtuelle Methoden delegiert.", "Einen generischen Typparameter.", "Eine Methode, die einen Template-String zurückgibt."], ru: ["Шаблон документа.", "Скелет алгоритма в базовом классе, делегирующий конкретные шаги подклассам через абстрактные/виртуальные методы.", "Параметр обобщённого типа.", "Метод, возвращающий шаблонную строку."], uk: ["Шаблон документа.", "Скелет алгоритму в базовому класі, що делегує конкретні кроки підкласам через абстрактні/віртуальні методи.", "Параметр узагальненого типу.", "Метод, що повертає шаблонний рядок."] }, correctIndex: 1, explanation: { en: "Base class: Process() calls Validate() -> Transform() -> Save(). Subclasses override Transform() with specific logic. The overall flow is fixed; details vary.", de: "Basisklasse: Process() ruft Validate() -> Transform() -> Save() auf. Unterklassen überschreiben Transform() mit spezifischer Logik. Der Gesamtablauf ist fest; Details variieren.", ru: "Базовый класс: Process() вызывает Validate() -> Transform() -> Save(). Подклассы переопределяют Transform() конкретной логикой. Общий поток фиксирован; детали варьируются.", uk: "Базовий клас: Process() викликає Validate() -> Transform() -> Save(). Підкласи перевизначають Transform() конкретною логікою. Загальний потік фіксований; деталі варіюються." } },
{ category: "Template Method", question: { en: "How does Template Method differ from Strategy?", de: "Wie unterscheidet sich Template Method von Strategy?", ru: "Чем Template Method отличается от Strategy?", uk: "Чим Template Method відрізняється від Strategy?" }, options: { en: ["They're identical.", "Template Method uses inheritance (subclass overrides steps). Strategy uses composition (inject different algorithm objects).", "Strategy is for creational, Template Method for structural.", "Template Method is always faster."], de: ["Sie sind identisch.", "Template Method nutzt Vererbung (Unterklasse überschreibt Schritte). Strategy nutzt Komposition (verschiedene Algorithmus-Objekte injizieren).", "Strategy ist für Creational, Template Method für Structural.", "Template Method ist immer schneller."], ru: ["Они идентичны.", "Template Method использует наследование (подкласс переопределяет шаги). Strategy использует композицию (инъекция различных объектов-алгоритмов).", "Strategy — для порождающих, Template Method — для структурных.", "Template Method всегда быстрее."], uk: ["Вони ідентичні.", "Template Method використовує успадкування (підклас перевизначає кроки). Strategy використовує композицію (ін'єкція різних об'єктів-алгоритмів).", "Strategy — для породжувальних, Template Method — для структурних.", "Template Method завжди швидший."] }, correctIndex: 1, explanation: { en: "Template Method: 'Override my steps.' Strategy: 'Give me an object that does this step.' Strategy is more flexible; Template Method is simpler for fixed flows.", de: "Template Method: 'Überschreibe meine Schritte.' Strategy: 'Gib mir ein Objekt, das diesen Schritt ausführt.' Strategy ist flexibler; Template Method ist einfacher für feste Abläufe.", ru: "Template Method: «Переопредели мои шаги.» Strategy: «Дай мне объект, который выполнит этот шаг.» Strategy гибче; Template Method проще для фиксированных потоков.", uk: "Template Method: «Перевизнач мої кроки.» Strategy: «Дай мені об'єкт, який виконає цей крок.» Strategy гнучкіший; Template Method простіший для фіксованих потоків." } },
{ category: "State", question: { en: "What does the State pattern do?", de: "Was macht das State Pattern?", ru: "Что делает паттерн State?", uk: "Що робить патерн State?" }, options: { en: ["Manages Redux state.", "Allows an object to alter its behavior when its internal state changes, appearing to change its class.", "Persists data to a database.", "Creates state machines for UI."], de: ["Verwaltet Redux-Zustand.", "Ermöglicht einem Objekt, sein Verhalten zu ändern, wenn sich sein interner Zustand ändert — es scheint seine Klasse zu wechseln.", "Persistiert Daten in einer Datenbank.", "Erstellt Zustandsmaschinen für UI."], ru: ["Управляет состоянием Redux.", "Позволяет объекту менять поведение при изменении внутреннего состояния — объект как будто меняет свой класс.", "Сохраняет данные в базу данных.", "Создаёт конечные автоматы для UI."], uk: ["Керує станом Redux.", "Дозволяє об'єкту змінювати поведінку при зміні внутрішнього стану — об'єкт ніби змінює свій клас.", "Зберігає дані в базу даних.", "Створює скінченні автомати для UI."] }, correctIndex: 1, explanation: { en: "An Order with states: Draft -> Submitted -> Paid -> Shipped. Each state is a class implementing IOrderState. Calling order.Process() delegates to the current state object.", de: "Eine Bestellung mit Zuständen: Draft -> Submitted -> Paid -> Shipped. Jeder Zustand ist eine Klasse, die IOrderState implementiert. order.Process() delegiert an das aktuelle Zustandsobjekt.", ru: "Заказ с состояниями: Draft -> Submitted -> Paid -> Shipped. Каждое состояние — класс, реализующий IOrderState. Вызов order.Process() делегирует текущему объекту состояния.", uk: "Замовлення зі станами: Draft -> Submitted -> Paid -> Shipped. Кожен стан — клас, що реалізує IOrderState. Виклик order.Process() делегує поточному об'єкту стану." } },
{ category: "State", question: { en: "How does the State pattern eliminate complex if/else chains?", de: "Wie eliminiert das State Pattern komplexe if/else-Ketten?", ru: "Как паттерн State устраняет сложные цепочки if/else?", uk: "Як патерн State усуває складні ланцюжки if/else?" }, options: { en: ["It uses switch expressions instead.", "Each state is a separate class with its own behavior. Transitions are explicit. No giant if(state == 'draft') else if(state == 'paid')... blocks.", "It uses enums instead of strings.", "It doesn't — it adds more complexity."], de: ["Es verwendet stattdessen Switch-Expressions.", "Jeder Zustand ist eine separate Klasse mit eigenem Verhalten. Übergänge sind explizit. Keine riesigen if(state == 'draft') else if(state == 'paid')...-Blöcke.", "Es verwendet Enums statt Strings.", "Das tut es nicht — es fügt mehr Komplexität hinzu."], ru: ["Он использует switch-выражения.", "Каждое состояние — отдельный класс со своим поведением. Переходы явные. Никаких гигантских блоков if(state == 'draft') else if(state == 'paid')...", "Он использует перечисления вместо строк.", "Не устраняет — добавляет ещё больше сложности."], uk: ["Він використовує switch-вирази.", "Кожен стан — окремий клас зі своєю поведінкою. Переходи явні. Жодних гігантських блоків if(state == 'draft') else if(state == 'paid')...", "Він використовує перерахування замість рядків.", "Не усуває — додає ще більше складності."] }, correctIndex: 1, explanation: { en: "Adding a new state (e.g., 'OnHold') means creating a new class implementing IOrderState. No existing code is modified — it's also OCP compliant.", de: "Einen neuen Zustand hinzufügen (z.B. 'OnHold') bedeutet, eine neue Klasse zu erstellen, die IOrderState implementiert. Kein bestehender Code wird geändert — das ist auch OCP-konform.", ru: "Добавление нового состояния (например, 'OnHold') означает создание нового класса, реализующего IOrderState. Существующий код не изменяется — это также соответствует OCP.", uk: "Додавання нового стану (наприклад, 'OnHold') означає створення нового класу, що реалізує IOrderState. Існуючий код не змінюється — це також відповідає OCP." } },
// ===== MODERN / .NET-SPECIFIC PATTERNS =====
{ category: "Repository", question: { en: "Is the Repository pattern still valuable with Entity Framework Core?", de: "Ist das Repository Pattern mit Entity Framework Core noch wertvoll?", ru: "Имеет ли ещё ценность паттерн Repository при использовании Entity Framework Core?", uk: "Чи має ще цінність патерн Repository при використанні Entity Framework Core?" }, options: { en: ["Always — repositories are mandatory.", "It depends. EF Core's DbSet is already a repository. A generic repo over it is often an anti-pattern, but specific repos with domain-oriented methods add value.", "Never — EF Core replaces repositories entirely.", "Only for testing."], de: ["Immer — Repositories sind Pflicht.", "Es kommt darauf an. EF Cores DbSet ist bereits ein Repository. Ein generisches Repo darüber ist oft ein Anti-Pattern, aber spezifische Repos mit domänenorientierten Methoden bieten Mehrwert.", "Nie — EF Core ersetzt Repositories vollständig.", "Nur für Tests."], ru: ["Всегда — репозитории обязательны.", "Зависит от ситуации. DbSet в EF Core уже является репозиторием. Обобщённый репозиторий поверх него — часто анти-паттерн, но специфичные репозитории с доменно-ориентированными методами приносят пользу.", "Никогда — EF Core полностью заменяет репозитории.", "Только для тестирования."], uk: ["Завжди — репозиторії обов'язкові.", "Залежить від ситуації. DbSet в EF Core вже є репозиторієм. Узагальнений репозиторій поверх нього — часто анти-патерн, але специфічні репозиторії з доменно-орієнтованими методами приносять користь.", "Ніколи — EF Core повністю замінює репозиторії.", "Тільки для тестування."] }, correctIndex: 1, explanation: { en: "A generic Repository<T> hiding DbSet adds no value. But IOrderRepository.GetPendingOrdersForShipping() encapsulates a meaningful domain query — that's valuable.", de: "Ein generisches Repository<T>, das DbSet verbirgt, bietet keinen Mehrwert. Aber IOrderRepository.GetPendingOrdersForShipping() kapselt eine sinnvolle Domänenabfrage — das ist wertvoll.", ru: "Обобщённый Repository<T>, скрывающий DbSet, не добавляет ценности. Но IOrderRepository.GetPendingOrdersForShipping() инкапсулирует осмысленный доменный запрос — это ценно.", uk: "Узагальнений Repository<T>, що приховує DbSet, не додає цінності. Але IOrderRepository.GetPendingOrdersForShipping() інкапсулює осмислений доменний запит — це цінно." } },
{ category: "Unit of Work", question: { en: "What is the Unit of Work pattern?", de: "Was ist das Unit of Work Pattern?", ru: "Что такое паттерн Unit of Work?", uk: "Що таке патерн Unit of Work?" }, options: { en: ["A pattern for measuring developer productivity.", "It tracks all changes made during a business transaction and commits them atomically. In EF Core, DbContext IS a Unit of Work.", "A pattern for parallel processing.", "A logging pattern."], de: ["Ein Pattern zur Messung der Entwicklerproduktivität.", "Es verfolgt alle Änderungen während einer Geschäftstransaktion und committet sie atomar. In EF Core IST DbContext eine Unit of Work.", "Ein Pattern für Parallelverarbeitung.", "Ein Logging-Pattern."], ru: ["Паттерн для измерения продуктивности разработчиков.", "Он отслеживает все изменения в рамках бизнес-транзакции и фиксирует их атомарно. В EF Core DbContext — это и есть Unit of Work.", "Паттерн для параллельной обработки.", "Паттерн логирования."], uk: ["Патерн для вимірювання продуктивності розробників.", "Він відстежує всі зміни в рамках бізнес-транзакції та фіксує їх атомарно. В EF Core DbContext — це і є Unit of Work.", "Патерн для паралельної обробки.", "Патерн логування."] }, correctIndex: 1, explanation: { en: "DbContext tracks added/modified/deleted entities. SaveChanges() commits everything in one database transaction. This IS Unit of Work — no need to create another one.", de: "DbContext verfolgt hinzugefügte/geänderte/gelöschte Entitäten. SaveChanges() committet alles in einer Datenbanktransaktion. Das IST Unit of Work — kein Bedarf für eine weitere.", ru: "DbContext отслеживает добавленные/изменённые/удалённые сущности. SaveChanges() фиксирует всё в одной транзакции базы данных. Это и ЕСТЬ Unit of Work — не нужно создавать ещё один.", uk: "DbContext відстежує додані/змінені/видалені сутності. SaveChanges() фіксує все в одній транзакції бази даних. Це і Є Unit of Work — не потрібно створювати ще один." } },
{ category: "Specification", question: { en: "What does the Specification pattern encapsulate?", de: "Was kapselt das Specification Pattern?", ru: "Что инкапсулирует паттерн Specification?", uk: "Що інкапсулює патерн Specification?" }, options: { en: ["API specifications like OpenAPI.", "Business query criteria as reusable, composable objects that can be combined with AND/OR logic.", "Hardware specifications.", "Test specifications."], de: ["API-Spezifikationen wie OpenAPI.", "Geschäftsabfragekriterien als wiederverwendbare, kombinierbare Objekte, die mit AND/OR-Logik verknüpft werden können.", "Hardware-Spezifikationen.", "Testspezifikationen."], ru: ["Спецификации API вроде OpenAPI.", "Критерии бизнес-запросов как повторно используемые, комбинируемые объекты, которые можно объединять логикой AND/OR.", "Спецификации оборудования.", "Спецификации тестов."], uk: ["Специфікації API на кшталт OpenAPI.", "Критерії бізнес-запитів як повторно використовувані, комбіновані об'єкти, які можна об'єднувати логікою AND/OR.", "Специфікації обладнання.", "Специфікації тестів."] }, correctIndex: 1, explanation: { en: "new ActiveOrdersSpec().And(new OrdersForCustomerSpec(id)) creates a composable filter. The repository evaluates it without knowing the business rules.", de: "new ActiveOrdersSpec().And(new OrdersForCustomerSpec(id)) erstellt einen kombinierbaren Filter. Das Repository wertet ihn aus, ohne die Geschäftsregeln zu kennen.", ru: "new ActiveOrdersSpec().And(new OrdersForCustomerSpec(id)) создаёт комбинируемый фильтр. Репозиторий вычисляет его, не зная бизнес-правил.", uk: "new ActiveOrdersSpec().And(new OrdersForCustomerSpec(id)) створює комбінований фільтр. Репозиторій обчислює його, не знаючи бізнес-правил." } },
