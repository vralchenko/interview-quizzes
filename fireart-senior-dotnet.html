{ category: "EF Core", question: { en: "How do you optimize very slow bulk inserts (100,000+ rows) in .NET to PostgreSQL?", de: "Wie optimiert man sehr langsame Massen-Inserts (100.000+ Zeilen) in .NET nach PostgreSQL?", ru: "Как оптимизировать очень медленные массовые вставки (100 000+ строк) в .NET в PostgreSQL?", uk: "Як оптимізувати дуже повільні масові вставки (100 000+ рядків) у .NET до PostgreSQL?" }, options: { en: ["Use DbContext.AddRange() inside a tight For loop.", "Bypass EF Core and use the native COPY command (via Npgsql BeginBinaryImport) or SqlBulkCopy.", "Use multiple Threads to call SaveChanges().", "Serialize the array to JSON and store it in one row."], de: ["DbContext.AddRange() innerhalb einer engen For-Schleife verwenden.", "EF Core umgehen und den nativen COPY-Befehl (via Npgsql BeginBinaryImport) oder SqlBulkCopy verwenden.", "Mehrere Threads verwenden, um SaveChanges() aufzurufen.", "Das Array zu JSON serialisieren und in einer Zeile speichern."], ru: ["Использовать DbContext.AddRange() внутри плотного цикла For.", "Обойти EF Core и использовать нативную команду COPY (через Npgsql BeginBinaryImport) или SqlBulkCopy.", "Использовать несколько потоков для вызова SaveChanges().", "Сериализовать массив в JSON и сохранить в одной строке."], uk: ["Використовувати DbContext.AddRange() всередині щільного циклу For.", "Обійти EF Core і використати нативну команду COPY (через Npgsql BeginBinaryImport) або SqlBulkCopy.", "Використовувати кілька потоків для виклику SaveChanges().", "Серіалізувати масив у JSON та зберегти в одному рядку."] }, correctIndex: 1, explanation: { en: "EF Core generates an individual INSERT statement for every entity, which crushes network latency. Bulk utilities open a binary streaming tunnel, pushing hundreds of thousands of rows per second.", de: "EF Core generiert ein individuelles INSERT-Statement für jede Entität, was die Netzwerklatenz zerstört. Bulk-Utilities öffnen einen binären Streaming-Tunnel und schieben Hunderttausende Zeilen pro Sekunde.", ru: "EF Core генерирует отдельный INSERT для каждой сущности, что критически увеличивает сетевую задержку. Bulk-утилиты открывают бинарный потоковый туннель, отправляя сотни тысяч строк в секунду.", uk: "EF Core генерує окремий INSERT для кожної сутності, що критично збільшує мережеву затримку. Bulk-утиліти відкривають бінарний потоковий тунель, відправляючи сотні тисяч рядків на секунду." } },
{ category: "Databases", question: { en: "What happens during a C# Database Connection Pooling process?", de: "Was passiert beim C#-Datenbank-Connection-Pooling-Prozess?", ru: "Что происходит в процессе Connection Pooling базы данных в C#?", uk: "Що відбувається у процесі Connection Pooling бази даних у C#?" }, options: { en: ["It merges multiple SQL tables.", "Instead of opening/closing raw TCP/IP sockets per API request (which is incredibly slow), it reuses a cache of already-open valid database connections.", "It load-balances connections across multiple databases.", "It limits users to 1 query per second."], de: ["Es vereinigt mehrere SQL-Tabellen.", "Anstatt rohe TCP/IP-Sockets pro API-Request zu öffnen/schliessen (was extrem langsam ist), wird ein Cache bereits geöffneter gültiger Datenbankverbindungen wiederverwendet.", "Es verteilt Verbindungen über mehrere Datenbanken hinweg.", "Es beschränkt Benutzer auf 1 Abfrage pro Sekunde."], ru: ["Объединяет несколько SQL-таблиц.", "Вместо открытия/закрытия сырых TCP/IP-сокетов на каждый API-запрос (что крайне медленно), повторно использует кэш уже открытых валидных соединений с базой данных.", "Балансирует нагрузку соединений между несколькими базами данных.", "Ограничивает пользователей 1 запросом в секунду."], uk: ["Об'єднує кілька SQL-таблиць.", "Замість відкриття/закриття сирих TCP/IP-сокетів на кожен API-запит (що вкрай повільно), повторно використовує кеш вже відкритих валідних з'єднань з базою даних.", "Балансує навантаження з'єднань між кількома базами даних.", "Обмежує користувачів 1 запитом на секунду."] }, correctIndex: 1, explanation: { en: "Connection Pooling is handled by .NET ADO.NET under the hood. It ensures when you 'Dispose' a connection, it goes back to the active pool instead of physically dropping the socket.", de: "Connection Pooling wird von .NET ADO.NET unter der Haube gehandhabt. Es stellt sicher, dass beim 'Dispose' einer Verbindung diese in den aktiven Pool zurückkehrt, anstatt den Socket physisch zu schliessen.", ru: "Connection Pooling обрабатывается .NET ADO.NET под капотом. Он гарантирует, что при 'Dispose' соединения оно возвращается в активный пул, а не физически закрывает сокет.", uk: "Connection Pooling обробляється .NET ADO.NET під капотом. Він гарантує, що при 'Dispose' з'єднання воно повертається в активний пул, а не фізично закриває сокет." } },
{ category: "DevOps / EF Core", question: { en: "Why avoid DbContext.Database.Migrate() at application startup?", de: "Warum sollte man DbContext.Database.Migrate() beim Anwendungsstart vermeiden?", ru: "Почему следует избегать DbContext.Database.Migrate() при запуске приложения?", uk: "Чому слід уникати DbContext.Database.Migrate() при запуску застосунку?" }, options: { en: ["It compiles schemas incorrectly.", "If multiple Docker pods start simultaneously, they will race to apply the same SQL script, causing DB locks or corruption.", "It consumes too much RAM.", "It drops the Identity column."], de: ["Es kompiliert Schemas falsch.", "Wenn mehrere Docker-Pods gleichzeitig starten, rennen sie um die Anwendung desselben SQL-Skripts, was zu DB-Locks oder Korruption führt.", "Es verbraucht zu viel RAM.", "Es entfernt die Identity-Spalte."], ru: ["Неправильно компилирует схемы.", "Если несколько Docker pod запускаются одновременно, они будут конкурировать за применение одного SQL-скрипта, вызывая блокировки или повреждение БД.", "Потребляет слишком много RAM.", "Удаляет Identity-столбец."], uk: ["Неправильно компілює схеми.", "Якщо кілька Docker pod запускаються одночасно, вони конкуруватимуть за застосування одного SQL-скрипта, спричиняючи блокування або пошкодження БД.", "Споживає занадто багато RAM.", "Видаляє Identity-стовпець."] }, correctIndex: 1, explanation: { en: "Migrations should be generated to raw SQL scripts and applied during the CI/CD Pipeline deployment phase (e.g. Flyway) when no traffic is hitting the DB.", de: "Migrationen sollten als rohe SQL-Skripte generiert und während der CI/CD-Pipeline-Deployment-Phase (z.B. Flyway) angewendet werden, wenn kein Traffic die DB trifft.", ru: "Миграции должны генерироваться в виде SQL-скриптов и применяться на этапе развёртывания CI/CD-пайплайна (например, Flyway), когда трафик не попадает на БД.", uk: "Міграції мають генеруватися у вигляді SQL-скриптів та застосовуватися на етапі розгортання CI/CD-пайплайну (наприклад, Flyway), коли трафік не потрапляє на БД." } },
{ category: "EF Core", question: { en: "What is Optimistic Concurrency in EF Core?", de: "Was ist Optimistic Concurrency in EF Core?", ru: "Что такое Optimistic Concurrency в EF Core?", uk: "Що таке Optimistic Concurrency в EF Core?" }, options: { en: ["Locking the SQL row physically so nobody else can read/write until finished.", "Allowing parallel edits but checking a [ConcurrencyCheck] or RowVersion token at SaveChanges; throwing an exception if the row was altered by another thread.", "Assuming the query will succeed and not using Try/Catch.", "Speeding up inserts."], de: ["Die SQL-Zeile physisch sperren, damit niemand anderes lesen/schreiben kann, bis der Vorgang abgeschlossen ist.", "Parallele Bearbeitungen zulassen, aber ein [ConcurrencyCheck]- oder RowVersion-Token bei SaveChanges prüfen; eine Exception werfen, wenn die Zeile von einem anderen Thread geändert wurde.", "Annehmen, dass die Abfrage erfolgreich sein wird, und kein Try/Catch verwenden.", "Inserts beschleunigen."], ru: ["Физическая блокировка SQL-строки, чтобы никто другой не мог читать/писать до завершения.", "Разрешение параллельных изменений, но проверка токена [ConcurrencyCheck] или RowVersion при SaveChanges; выброс исключения, если строка была изменена другим потоком.", "Предположение, что запрос будет успешным, без использования Try/Catch.", "Ускорение вставок."], uk: ["Фізичне блокування SQL-рядка, щоб ніхто інший не міг читати/писати до завершення.", "Дозвіл паралельних змін, але перевірка токена [ConcurrencyCheck] або RowVersion при SaveChanges; викидання винятку, якщо рядок був змінений іншим потоком.", "Припущення, що запит буде успішним, без використання Try/Catch.", "Прискорення вставок."] }, correctIndex: 1, explanation: { en: "Optimistic concurrency doesn't lock rows in the DB. It checks if the row's 'Version' string changed between the moment you queried it and the moment you execute the Update statement.", de: "Optimistic Concurrency sperrt keine Zeilen in der DB. Es prüft, ob sich der 'Version'-String der Zeile zwischen dem Abfragezeitpunkt und dem Ausführungszeitpunkt des Update-Statements geändert hat.", ru: "Optimistic Concurrency не блокирует строки в БД. Проверяется, изменилась ли строка 'Version' между моментом запроса и моментом выполнения Update.", uk: "Optimistic Concurrency не блокує рядки у БД. Перевіряється, чи змінився рядок 'Version' між моментом запиту та моментом виконання Update." } },
// ===== DOCKER, CI/CD, CLOUD =====
{ category: "Docker", question: { en: "What is the primary architectural benefit of a Docker Multi-Stage Build?", de: "Was ist der primäre architektonische Vorteil eines Docker Multi-Stage Build?", ru: "Каково основное архитектурное преимущество Docker Multi-Stage Build?", uk: "Яка основна архітектурна перевага Docker Multi-Stage Build?" }, options: { en: ["It allows Node.js and C# to run on the same thread.", "It uses a heavy image to build code, but copies only the compiled binaries to a tiny Alpine runtime image, making the final image extremely small and secure.", "It prevents DLL injections.", "It auto-generates Swagger docs."], de: ["Es ermöglicht die Ausführung von Node.js und C# auf demselben Thread.", "Es verwendet ein schweres Image zum Erstellen des Codes, kopiert aber nur die kompilierten Binärdateien in ein winziges Alpine-Runtime-Image, wodurch das endgültige Image extrem klein und sicher wird.", "Es verhindert DLL-Injections.", "Es generiert automatisch Swagger-Docs."], ru: ["Позволяет Node.js и C# работать в одном потоке.", "Использует тяжёлый образ для сборки кода, но копирует только скомпилированные бинарники в крошечный Alpine-образ для выполнения, делая финальный образ крайне маленьким и безопасным.", "Предотвращает DLL-инъекции.", "Автоматически генерирует Swagger-документацию."], uk: ["Дозволяє Node.js та C# працювати в одному потоці.", "Використовує важкий образ для збірки коду, але копіює тільки скомпільовані бінарники у крихітний Alpine-образ для виконання, роблячи фінальний образ вкрай маленьким та безпечним.", "Запобігає DLL-ін'єкціям.", "Автоматично генерує Swagger-документацію."] }, correctIndex: 1, explanation: { en: "Stage 1 (AS build) has the full 800MB .NET SDK. Stage 2 (AS final) has a 100MB ASP.NET Runtime. By copying only /app/publish from build to final, hackers cannot access source code or build tools.", de: "Stage 1 (AS build) hat das volle 800MB .NET SDK. Stage 2 (AS final) hat eine 100MB ASP.NET Runtime. Durch das Kopieren nur von /app/publish von build zu final können Hacker nicht auf Quellcode oder Build-Tools zugreifen.", ru: "Stage 1 (AS build) содержит полный .NET SDK на 800MB. Stage 2 (AS final) содержит ASP.NET Runtime на 100MB. Копируя только /app/publish из build в final, хакеры не могут получить доступ к исходному коду или средствам сборки.", uk: "Stage 1 (AS build) містить повний .NET SDK на 800MB. Stage 2 (AS final) містить ASP.NET Runtime на 100MB. Копіюючи тільки /app/publish з build у final, хакери не можуть отримати доступ до вихідного коду або засобів збірки." } },
{ category: "Docker", question: { en: "How are Docker Volumes used with Postgres containers?", de: "Wie werden Docker Volumes mit Postgres-Containern verwendet?", ru: "Как используются Docker Volumes с контейнерами Postgres?", uk: "Як використовуються Docker Volumes з контейнерами Postgres?" }, options: { en: ["To amplify sound.", "To map a persistent folder on the Host OS to the internal container directory, ensuring database records survive if the container crashes or is deleted.", "To increase RAM volume.", "To share CPU cache."], de: ["Um den Klang zu verstärken.", "Um einen persistenten Ordner auf dem Host-OS auf das interne Container-Verzeichnis abzubilden, damit Datenbankeinträge überleben, wenn der Container abstürzt oder gelöscht wird.", "Um das RAM-Volumen zu erhöhen.", "Um den CPU-Cache zu teilen."], ru: ["Для усиления звука.", "Для маппинга постоянной папки на Host OS во внутреннюю директорию контейнера, обеспечивая сохранность записей базы данных при сбое или удалении контейнера.", "Для увеличения объёма RAM.", "Для разделения CPU-кэша."], uk: ["Для підсилення звуку.", "Для маппінгу постійної папки на Host OS у внутрішню директорію контейнера, забезпечуючи збереження записів бази даних при збої або видаленні контейнера.", "Для збільшення об'єму RAM.", "Для розділення CPU-кешу."] }, correctIndex: 1, explanation: { en: "Containers are ephemeral (volatile). If you don't map a Volume for Postgres `/var/lib/postgresql/data`, all your database records vanish the second the container stops.", de: "Container sind kurzlebig (flüchtig). Wenn Sie kein Volume für Postgres `/var/lib/postgresql/data` mappen, verschwinden alle Datenbankeinträge, sobald der Container stoppt.", ru: "Контейнеры эфемерны (волатильны). Если не замапить Volume для Postgres `/var/lib/postgresql/data`, все записи базы данных исчезнут в момент остановки контейнера.", uk: "Контейнери ефемерні (волатильні). Якщо не замапити Volume для Postgres `/var/lib/postgresql/data`, всі записи бази даних зникнуть у момент зупинки контейнера." } },
{ category: "CI/CD", question: { en: "Walk through a standard CI/CD Pipeline phase for a .NET backend.", de: "Beschreiben Sie eine Standard-CI/CD-Pipeline-Phase für ein .NET-Backend.", ru: "Опишите стандартные фазы CI/CD-пайплайна для .NET-бэкенда.", uk: "Опишіть стандартні фази CI/CD-пайплайну для .NET-бекенду." }, options: { en: ["Deploy -> Code Push -> Unit Test", "Code Push -> dotnet build -> dotnet test -> docker build -> docker push (Registry) -> kubectl apply (Deploy)", "Run Migrations -> Write Code -> Publish", "Upload FTP -> Download IIS -> Restart Machine"], de: ["Deploy -> Code Push -> Unit Test", "Code Push -> dotnet build -> dotnet test -> docker build -> docker push (Registry) -> kubectl apply (Deploy)", "Migrationen ausführen -> Code schreiben -> Veröffentlichen", "FTP hochladen -> IIS herunterladen -> Maschine neustarten"], ru: ["Deploy -> Code Push -> Unit Test", "Code Push -> dotnet build -> dotnet test -> docker build -> docker push (Registry) -> kubectl apply (Deploy)", "Выполнить миграции -> Написать код -> Опубликовать", "Загрузить по FTP -> Скачать IIS -> Перезагрузить машину"], uk: ["Deploy -> Code Push -> Unit Test", "Code Push -> dotnet build -> dotnet test -> docker build -> docker push (Registry) -> kubectl apply (Deploy)", "Виконати міграції -> Написати код -> Опублікувати", "Завантажити по FTP -> Завантажити IIS -> Перезавантажити машину"] }, correctIndex: 1, explanation: { en: "A CI pipeline compiles, tests, and builds the container image. The CD pipeline takes that image registry URL and tells the Cloud Orchestrator to swap out to the new version.", de: "Eine CI-Pipeline kompiliert, testet und erstellt das Container-Image. Die CD-Pipeline nimmt die Image-Registry-URL und weist den Cloud-Orchestrator an, auf die neue Version umzuschalten.", ru: "CI-пайплайн компилирует, тестирует и собирает образ контейнера. CD-пайплайн берёт URL реестра образов и указывает Cloud Orchestrator переключиться на новую версию.", uk: "CI-пайплайн компілює, тестує та збирає образ контейнера. CD-пайплайн бере URL реєстру образів та вказує Cloud Orchestrator переключитися на нову версію." } },
{ category: "Deployment", question: { en: "What is a Blue-Green Deployment?", de: "Was ist ein Blue-Green Deployment?", ru: "Что такое Blue-Green Deployment?", uk: "Що таке Blue-Green Deployment?" }, options: { en: ["Deploying UI and Backend simultaneously.", "Maintaining two identical production environments (Blue and Green). Code is placed on idle Green, tested, and a Load Balancer instantly switches live traffic over. Zero downtime.", "Deploying to 5% of users first (Canary).", "Using Blue colored consoles in AWS."], de: ["UI und Backend gleichzeitig deployen.", "Zwei identische Produktionsumgebungen (Blue und Green) pflegen. Code wird auf das inaktive Green platziert, getestet, und ein Load Balancer schaltet den Live-Traffic sofort um. Keine Ausfallzeit.", "Zuerst an 5% der Benutzer deployen (Canary).", "Blaue Konsolen in AWS verwenden."], ru: ["Развёртывание UI и Backend одновременно.", "Поддержание двух идентичных production-сред (Blue и Green). Код размещается на неактивном Green, тестируется, и Load Balancer мгновенно переключает live-трафик. Нулевой простой.", "Развёртывание сначала для 5% пользователей (Canary).", "Использование синих консолей в AWS."], uk: ["Розгортання UI та Backend одночасно.", "Підтримка двох ідентичних production-середовищ (Blue та Green). Код розміщується на неактивному Green, тестується, і Load Balancer миттєво переключає live-трафік. Нульовий простій.", "Розгортання спочатку для 5% користувачів (Canary).", "Використання синіх консолей в AWS."] }, correctIndex: 1, explanation: { en: "If an error occurs exactly after the switch, you just flip the Load Balancer back to Blue instantly to rollback. Very safe deployment strategy.", de: "Wenn ein Fehler direkt nach dem Wechsel auftritt, schaltet man den Load Balancer sofort zurück zu Blue für einen Rollback. Sehr sichere Deployment-Strategie.", ru: "Если ошибка возникает сразу после переключения, вы просто переключаете Load Balancer обратно на Blue для отката. Очень безопасная стратегия развёртывания.", uk: "Якщо помилка виникає одразу після переключення, ви просто переключаєте Load Balancer назад на Blue для відкату. Дуже безпечна стратегія розгортання." } },
{ category: "Cloud Security", question: { en: "How do you manage API Secrets in a Cloud architecture?", de: "Wie verwaltet man API-Secrets in einer Cloud-Architektur?", ru: "Как управлять секретами API в облачной архитектуре?", uk: "Як керувати секретами API у хмарній архітектурі?" }, options: { en: ["Commit them to GitHub inside appsettings.json.", "Store them in a public Docker container variable.", "Use services like AWS Secrets Manager or Azure KeyVault, referencing the paths dynamically in CI/CD pipeline environment variables.", "Bake them via Dockerfile ENV variables."], de: ["Sie in GitHub in appsettings.json committen.", "Sie in einer öffentlichen Docker-Container-Variablen speichern.", "Dienste wie AWS Secrets Manager oder Azure KeyVault verwenden und die Pfade dynamisch in CI/CD-Pipeline-Umgebungsvariablen referenzieren.", "Sie über Dockerfile-ENV-Variablen einbinden."], ru: ["Закоммитить их в GitHub внутри appsettings.json.", "Хранить их в публичной переменной Docker-контейнера.", "Использовать сервисы вроде AWS Secrets Manager или Azure KeyVault, динамически ссылаясь на пути в переменных окружения CI/CD-пайплайна.", "Вшить их через Dockerfile ENV-переменные."], uk: ["Закомітити їх у GitHub всередині appsettings.json.", "Зберігати їх у публічній змінній Docker-контейнера.", "Використовувати сервіси на кшталт AWS Secrets Manager або Azure KeyVault, динамічно посилаючись на шляхи у змінних оточення CI/CD-пайплайну.", "Вшити їх через Dockerfile ENV-змінні."] }, correctIndex: 2, explanation: { en: "Never check connection strings into Git. Environment variables injected at pod-creation runtime is the industry standard (12-Factor App methodology).", de: "Niemals Verbindungsstrings in Git einchecken. Umgebungsvariablen, die zur Pod-Erstellungszeit injiziert werden, sind der Industriestandard (12-Factor-App-Methodik).", ru: "Никогда не коммитьте строки подключения в Git. Переменные окружения, внедряемые при создании pod — отраслевой стандарт (методология 12-Factor App).", uk: "Ніколи не комітьте рядки підключення у Git. Змінні оточення, що впроваджуються при створенні pod — галузевий стандарт (методологія 12-Factor App)." } },
{ category: "Cloud Concepts", question: { en: "What is Infrastructure as Code (IaC)?", de: "Was ist Infrastructure as Code (IaC)?", ru: "Что такое Infrastructure as Code (IaC)?", uk: "Що таке Infrastructure as Code (IaC)?" }, options: { en: ["Writing machine code in Assembly.", "Managing cloud infrastructure (e.g. EC2, RDS, VPCs) through version-controlled files (Terraform, CloudFormation) instead of manual GUI clicks.", "Using C# to write bash scripts.", "Creating dynamic SQL triggers."], de: ["Maschinencode in Assembly schreiben.", "Cloud-Infrastruktur (z.B. EC2, RDS, VPCs) über versionskontrollierte Dateien (Terraform, CloudFormation) verwalten statt manueller GUI-Klicks.", "C# verwenden, um Bash-Skripte zu schreiben.", "Dynamische SQL-Trigger erstellen."], ru: ["Написание машинного кода на Assembly.", "Управление облачной инфраструктурой (например, EC2, RDS, VPCs) через версионируемые файлы (Terraform, CloudFormation) вместо ручных GUI-кликов.", "Использование C# для написания bash-скриптов.", "Создание динамических SQL-триггеров."], uk: ["Написання машинного коду на Assembly.", "Керування хмарною інфраструктурою (наприклад, EC2, RDS, VPCs) через версіоновані файли (Terraform, CloudFormation) замість ручних GUI-кліків.", "Використання C# для написання bash-скриптів.", "Створення динамічних SQL-тригерів."] }, correctIndex: 1, explanation: { en: "IaC allows you to spin up an exact replica of your entire Production enterprise network on Amazon AWS in 5 minutes by running a Terraform script.", de: "IaC ermöglicht es, eine exakte Replik Ihres gesamten Produktionsnetzwerks auf Amazon AWS in 5 Minuten durch Ausführen eines Terraform-Skripts hochzufahren.", ru: "IaC позволяет развернуть точную копию всей вашей Production-сети на Amazon AWS за 5 минут, запустив скрипт Terraform.", uk: "IaC дозволяє розгорнути точну копію всієї вашої Production-мережі на Amazon AWS за 5 хвилин, запустивши скрипт Terraform." } },
{ category: "Architecture Design", question: { en: "Explain horizontal vs vertical scaling.", de: "Erklären Sie horizontale vs. vertikale Skalierung.", ru: "Объясните горизонтальное и вертикальное масштабирование.", uk: "Поясніть горизонтальне та вертикальне масштабування." }, options: { en: ["Horizontal: Adding more CPU/RAM (Scaling UP). Vertical: Adding more instances behind a load balancer (Scaling OUT).", "Horizontal: Adding more instances. Vertical: Upgrading the server's CPU/RAM.", "Vertical applies to UI, Horizontal to DB.", "They are cloud-specific terms for Load Balancing."], de: ["Horizontal: Mehr CPU/RAM hinzufügen (Scaling UP). Vertikal: Mehr Instanzen hinter einem Load Balancer hinzufügen (Scaling OUT).", "Horizontal: Mehr Instanzen hinzufügen. Vertikal: CPU/RAM des Servers upgraden.", "Vertikal gilt für UI, Horizontal für DB.", "Sie sind cloud-spezifische Begriffe für Load Balancing."], ru: ["Горизонтальное: добавление CPU/RAM (Scaling UP). Вертикальное: добавление инстансов за балансировщиком (Scaling OUT).", "Горизонтальное: добавление инстансов. Вертикальное: увеличение CPU/RAM сервера.", "Вертикальное применяется к UI, горизонтальное к БД.", "Это облачные термины для балансировки нагрузки."], uk: ["Горизонтальне: додавання CPU/RAM (Scaling UP). Вертикальне: додавання інстансів за балансувальником (Scaling OUT).", "Горизонтальне: додавання інстансів. Вертикальне: збільшення CPU/RAM сервера.", "Вертикальне застосовується до UI, горизонтальне до БД.", "Це хмарні терміни для балансування навантаження."] }, correctIndex: 1, explanation: { en: "Vertical (Up) has a physical hardware ceiling. Horizontal (Out) relies on stateless microservices and can theoretically scale infinitely by adding more cheap nodes.", de: "Vertikal (Up) hat eine physische Hardware-Grenze. Horizontal (Out) basiert auf zustandslosen Microservices und kann theoretisch unendlich skalieren, indem günstige Knoten hinzugefügt werden.", ru: "Вертикальное (Up) имеет физический потолок оборудования. Горизонтальное (Out) опирается на stateless-микросервисы и теоретически может масштабироваться бесконечно, добавляя дешёвые узлы.", uk: "Вертикальне (Up) має фізичну межу обладнання. Горизонтальне (Out) спирається на stateless-мікросервіси і теоретично може масштабуватися нескінченно, додаючи дешеві вузли." } },
{ category: "Kubernetes", question: { en: "What is Kubernetes (K8s) in simple terms?", de: "Was ist Kubernetes (K8s) einfach erklärt?", ru: "Что такое Kubernetes (K8s) простыми словами?", uk: "Що таке Kubernetes (K8s) простими словами?" }, options: { en: ["A C# web framework.", "An open-source container orchestration platform. It automates deployment, health-checks, scaling, and load balancing of Docker containers.", "A NoSQL database.", "A continuous integration server."], de: ["Ein C#-Web-Framework.", "Eine Open-Source-Container-Orchestrierungsplattform. Sie automatisiert Deployment, Health-Checks, Skalierung und Load Balancing von Docker-Containern.", "Eine NoSQL-Datenbank.", "Ein Continuous-Integration-Server."], ru: ["Веб-фреймворк на C#.", "Платформа оркестрации контейнеров с открытым исходным кодом. Автоматизирует развёртывание, проверки работоспособности, масштабирование и балансировку нагрузки Docker-контейнеров.", "NoSQL-база данных.", "Сервер непрерывной интеграции."], uk: ["Веб-фреймворк на C#.", "Платформа оркестрації контейнерів з відкритим вихідним кодом. Автоматизує розгортання, перевірки працездатності, масштабування та балансування навантаження Docker-контейнерів.", "NoSQL-база даних.", "Сервер безперервної інтеграції."] }, correctIndex: 1, explanation: { en: "If you want 10 copies of your API running worldwide, Kubernetes handles load balancing them, restarting them if they crash, and rolling out new versions.", de: "Wenn Sie 10 Kopien Ihrer API weltweit laufen lassen möchten, kümmert sich Kubernetes um Load Balancing, Neustart bei Abstürzen und das Ausrollen neuer Versionen.", ru: "Если вам нужно 10 копий вашего API по всему миру, Kubernetes обеспечивает их балансировку, перезапуск при сбоях и раскатку новых версий.", uk: "Якщо вам потрібно 10 копій вашого API по всьому світу, Kubernetes забезпечує їх балансування, перезапуск при збоях та розкатку нових версій." } },
// ===== NODE.JS, PATTERNS & PRACTICAL =====
{ category: "Node.js Architecture", question: { en: "How does Node.js differ fundamentally from ASP.NET Core in thread execution?", de: "Wie unterscheidet sich Node.js grundlegend von ASP.NET Core bei der Thread-Ausführung?", ru: "Чем Node.js принципиально отличается от ASP.NET Core в исполнении потоков?", uk: "Чим Node.js принципово відрізняється від ASP.NET Core у виконанні потоків?" }, options: { en: ["Node uses multi-threading natively.", ".NET Core uses a Thread Pool. Node.js operates on a single-threaded Event Loop, delegating non-blocking I/O tasks to the OS kernel.", "They are functionally identical in execution paths.", "Node requires compiled byte-code."], de: ["Node verwendet nativ Multi-Threading.", ".NET Core verwendet einen Thread Pool. Node.js arbeitet auf einer einzigen Event-Loop und delegiert nicht-blockierende I/O-Aufgaben an den OS-Kernel.", "Sie sind funktional identisch in ihren Ausführungspfaden.", "Node benötigt kompilierten Bytecode."], ru: ["Node нативно использует многопоточность.", ".NET Core использует Thread Pool. Node.js работает на однопоточном Event Loop, делегируя неблокирующие I/O-задачи ядру ОС.", "Они функционально идентичны в путях выполнения.", "Node требует скомпилированный байт-код."], uk: ["Node нативно використовує багатопотоковість.", ".NET Core використовує Thread Pool. Node.js працює на однопотоковому Event Loop, делегуючи неблокуючі I/O-задачі ядру ОС.", "Вони функціонально ідентичні у шляхах виконання.", "Node вимагає скомпільований байт-код."] }, correctIndex: 1, explanation: { en: "Because Node is single-threaded, if you execute a heavy CPU calculation (like `while(true) calculatePrimes()`), the entire web server freezes for all users. .NET would just span it on a background ThreadPool thread.", de: "Da Node single-threaded ist, friert bei einer schweren CPU-Berechnung (wie `while(true) calculatePrimes()`) der gesamte Webserver für alle Benutzer ein. .NET würde es einfach auf einem Hintergrund-ThreadPool-Thread ausführen.", ru: "Поскольку Node однопоточный, при выполнении тяжёлых CPU-вычислений (вроде `while(true) calculatePrimes()`) весь веб-сервер зависает для всех пользователей. .NET просто запустил бы это на фоновом потоке ThreadPool.", uk: "Оскільки Node однопотоковий, при виконанні важких CPU-обчислень (на кшталт `while(true) calculatePrimes()`) весь веб-сервер зависає для всіх користувачів. .NET просто запустив би це на фоновому потоці ThreadPool." } },
{ category: "Architecture Patterns", question: { en: "What is the Circuit Breaker pattern (via Polly)?", de: "Was ist das Circuit-Breaker-Pattern (über Polly)?", ru: "Что такое паттерн Circuit Breaker (через Polly)?", uk: "Що таке патерн Circuit Breaker (через Polly)?" }, options: { en: ["It shuts down the server if CPU hits 100%.", "If a downstream API fails repeatedly, it 'opens' the circuit, instantly failing fast for future calls instead of waiting for TCP timeouts, allowing the downstream API time to recover.", "It prevents recursive database queries.", "It blocks malicious IP addresses."], de: ["Es fährt den Server herunter, wenn die CPU 100% erreicht.", "Wenn eine nachgelagerte API wiederholt ausfällt, 'öffnet' es den Schaltkreis und lässt zukünftige Aufrufe sofort fehlschlagen, anstatt auf TCP-Timeouts zu warten, und gibt der nachgelagerten API Zeit zur Erholung.", "Es verhindert rekursive Datenbankabfragen.", "Es blockiert bösartige IP-Adressen."], ru: ["Выключает сервер, если CPU достигает 100%.", "Если нижестоящий API многократно падает, 'размыкает' цепь, мгновенно отказывая будущим вызовам вместо ожидания TCP-таймаутов, давая нижестоящему API время на восстановление.", "Предотвращает рекурсивные запросы к базе данных.", "Блокирует вредоносные IP-адреса."], uk: ["Вимикає сервер, якщо CPU досягає 100%.", "Якщо нижчестоящий API багаторазово падає, 'розмикає' коло, миттєво відмовляючи майбутнім викликам замість очікування TCP-таймаутів, даючи нижчестоящому API час на відновлення.", "Запобігає рекурсивним запитам до бази даних.", "Блокує шкідливі IP-адреси."] }, correctIndex: 1, explanation: { en: "If Service A depends on Service B, and Service B is dead, Service A threads will hang waiting for a timeout. A Circuit Breaker stops making the call entirely, saving Service A from crashing.", de: "Wenn Service A von Service B abhängt und Service B tot ist, hängen die Threads von Service A wartend auf einen Timeout. Ein Circuit Breaker stoppt den Aufruf komplett und bewahrt Service A vor dem Absturz.", ru: "Если Service A зависит от Service B, а Service B мёртв, потоки Service A будут висеть в ожидании таймаута. Circuit Breaker полностью прекращает вызовы, спасая Service A от краха.", uk: "Якщо Service A залежить від Service B, а Service B мертвий, потоки Service A будуть висіти в очікуванні таймауту. Circuit Breaker повністю припиняє виклики, рятуючи Service A від краху." } },
{ category: "Logging", question: { en: "What is the importance of a 'Correlation ID' in Microservices?", de: "Was ist die Bedeutung einer 'Correlation ID' in Microservices?", ru: "Какова важность 'Correlation ID' в Microservices?", uk: "Яка важливість 'Correlation ID' у Microservices?" }, options: { en: ["It maps relational data to NoSQL.", "It's a GUID passed in HTTP headers across all service hops. It allows Log Aggregators (ELK) to filter searching and track a specific user's entire journey across 15 different apps.", "It authorizes Identity claims via JWT.", "It is used for database unique identities."], de: ["Es bildet relationale Daten auf NoSQL ab.", "Es ist eine GUID, die in HTTP-Headern über alle Service-Hops weitergereicht wird. Sie ermöglicht Log-Aggregatoren (ELK), die Suche zu filtern und die gesamte Reise eines Benutzers über 15 verschiedene Apps zu verfolgen.", "Es autorisiert Identity-Claims über JWT.", "Es wird für eindeutige Datenbankidentitäten verwendet."], ru: ["Маппит реляционные данные в NoSQL.", "Это GUID, передаваемый в HTTP-заголовках через все хопы сервисов. Позволяет агрегаторам логов (ELK) фильтровать поиск и отслеживать весь путь конкретного пользователя через 15 разных приложений.", "Авторизует Identity-claims через JWT.", "Используется для уникальных идентификаторов базы данных."], uk: ["Маппить реляційні дані у NoSQL.", "Це GUID, що передається у HTTP-заголовках через всі хопи сервісів. Дозволяє агрегаторам логів (ELK) фільтрувати пошук та відстежувати весь шлях конкретного користувача через 15 різних застосунків.", "Авторизує Identity-claims через JWT.", "Використовується для унікальних ідентифікаторів бази даних."] }, correctIndex: 1, explanation: { en: "If microservice B throws an error, without a Correlation ID passed from Microservice A, you have no idea WHICH original client request caused the error.", de: "Wenn Microservice B einen Fehler wirft, haben Sie ohne eine Correlation ID von Microservice A keine Ahnung, WELCHER ursprüngliche Client-Request den Fehler verursacht hat.", ru: "Если микросервис B выбрасывает ошибку, без Correlation ID от микросервиса A невозможно узнать, КАКОЙ именно клиентский запрос вызвал ошибку.", uk: "Якщо мікросервіс B викидає помилку, без Correlation ID від мікросервісу A неможливо дізнатися, ЯКИЙ саме клієнтський запит спричинив помилку." } },
{ category: "Node.js / Express", question: { en: "In Express.js, what is 'middleware' conceptually similar to in .NET?", de: "Was ist 'Middleware' in Express.js konzeptionell ähnlich in .NET?", ru: "Чему концептуально аналогична 'middleware' в Express.js в .NET?", uk: "Чому концептуально аналогічна 'middleware' в Express.js у .NET?" }, options: { en: ["View Components", "Entity Framework DbContext", "It is conceptually identical to the ASP.NET Core Middleware pipeline (filters/delegates handling request and response chains via next()).", "Razor Pages"], de: ["View Components", "Entity Framework DbContext", "Es ist konzeptionell identisch mit der ASP.NET Core Middleware-Pipeline (Filter/Delegates, die Request- und Response-Ketten via next() verarbeiten).", "Razor Pages"], ru: ["View Components", "Entity Framework DbContext", "Концептуально идентична Middleware-пайплайну ASP.NET Core (фильтры/делегаты, обрабатывающие цепочки запросов и ответов через next()).", "Razor Pages"], uk: ["View Components", "Entity Framework DbContext", "Концептуально ідентична Middleware-пайплайну ASP.NET Core (фільтри/делегати, що обробляють ланцюжки запитів та відповідей через next()).", "Razor Pages"] }, correctIndex: 2, explanation: { en: "In Node `app.use((req,res,next)=>{})` is identical in philosophy to `.Use(async (context,next)=>{})` in C#.", de: "In Node ist `app.use((req,res,next)=>{})` philosophisch identisch mit `.Use(async (context,next)=>{})` in C#.", ru: "В Node `app.use((req,res,next)=>{})` философски идентичен `.Use(async (context,next)=>{})` в C#.", uk: "У Node `app.use((req,res,next)=>{})` філософськи ідентичний `.Use(async (context,next)=>{})` у C#." } },
{ category: "C# Internals", question: { en: "What does the 'yield return' statement actually do in C#?", de: "Was macht die 'yield return'-Anweisung tatsächlich in C#?", ru: "Что на самом деле делает оператор 'yield return' в C#?", uk: "Що насправді робить оператор 'yield return' у C#?" }, options: { en: ["Yields CPU time to another thread natively.", "Generates an IEnumerable state machine lazily, returning one element at a time on iteration without loading the entire collection into memory.", "It abruptly terminates a function.", "Returns a ValueTask."], de: ["Gibt nativ CPU-Zeit an einen anderen Thread ab.", "Generiert lazily eine IEnumerable-Zustandsmaschine, die bei der Iteration ein Element nach dem anderen zurückgibt, ohne die gesamte Sammlung in den Speicher zu laden.", "Beendet eine Funktion abrupt.", "Gibt einen ValueTask zurück."], ru: ["Нативно уступает процессорное время другому потоку.", "Лениво генерирует конечный автомат IEnumerable, возвращая по одному элементу при итерации без загрузки всей коллекции в память.", "Резко завершает функцию.", "Возвращает ValueTask."], uk: ["Нативно поступається процесорним часом іншому потоку.", "Ліниво генерує скінченний автомат IEnumerable, повертаючи по одному елементу при ітерації без завантаження всієї колекції у пам'ять.", "Різко завершує функцію.", "Повертає ValueTask."] }, correctIndex: 1, explanation: { en: "Lazy evaluation. If you query 1,000,000 records but only iterate the first 5 inside a `foreach` loop, `yield return` ensures the system only actually evaluates those 5.", de: "Lazy Evaluation. Wenn Sie 1.000.000 Datensätze abfragen, aber nur die ersten 5 in einer `foreach`-Schleife iterieren, stellt `yield return` sicher, dass das System tatsächlich nur diese 5 auswertet.", ru: "Ленивые вычисления. Если запросить 1 000 000 записей, но итерировать только первые 5 в цикле `foreach`, `yield return` гарантирует, что система фактически вычислит только эти 5.", uk: "Ліниві обчислення. Якщо запросити 1 000 000 записів, але ітерувати тільки перші 5 у циклі `foreach`, `yield return` гарантує, що система фактично обчислить тільки ці 5." } },
{ category: "Security", question: { en: "What is CSRF (Cross-Site Request Forgery) and how is it usually mitigated in APIs?", de: "Was ist CSRF (Cross-Site Request Forgery) und wie wird es üblicherweise in APIs abgeschwächt?", ru: "Что такое CSRF (Cross-Site Request Forgery) и как его обычно предотвращают в API?", uk: "Що таке CSRF (Cross-Site Request Forgery) і як його зазвичай запобігають в API?" }, options: { en: ["Hacking SSL certificates.", "Exploiting stateless JWTs directly via URL params.", "Tricking a victim's browser into submitting a request to a site where they are authenticated via Cookies. Mitigated by Anti-forgery Tokens (if using Cookies) or simply using strict stateless JWT headers.", "Injecting SQL via forms."], de: ["SSL-Zertifikate hacken.", "Zustandslose JWTs direkt über URL-Parameter ausnutzen.", "Den Browser des Opfers dazu bringen, eine Anfrage an eine Website zu senden, auf der es über Cookies authentifiziert ist. Abgeschwächt durch Anti-Forgery-Tokens (bei Cookies) oder einfach strikte zustandslose JWT-Header.", "SQL über Formulare injizieren."], ru: ["Взлом SSL-сертификатов.", "Эксплуатация stateless JWT напрямую через URL-параметры.", "Принуждение браузера жертвы отправить запрос на сайт, где она аутентифицирована через Cookies. Предотвращается Anti-forgery Tokens (при использовании Cookies) или просто строгими stateless JWT-заголовками.", "Внедрение SQL через формы."], uk: ["Зламування SSL-сертифікатів.", "Експлуатація stateless JWT напряму через URL-параметри.", "Примушування браузера жертви надіслати запит на сайт, де вона автентифікована через Cookies. Запобігається Anti-forgery Tokens (при використанні Cookies) або просто суворими stateless JWT-заголовками.", "Впровадження SQL через форми."] }, correctIndex: 2, explanation: { en: "With standard JWTs sent as an `Authorization: Bearer` header (not an auto-sent Cookie), CSRF is naturally mitigated because a malicious third-party site cannot read the victim's LocalStorage to attach the header.", de: "Bei Standard-JWTs, die als `Authorization: Bearer`-Header gesendet werden (kein automatisch gesendeter Cookie), wird CSRF natürlich abgeschwächt, da eine bösartige Drittanbieter-Website den LocalStorage des Opfers nicht lesen kann, um den Header anzuhängen.", ru: "При стандартных JWT, отправляемых как заголовок `Authorization: Bearer` (а не автоматически отправляемый Cookie), CSRF естественно предотвращается, потому что вредоносный сайт не может прочитать LocalStorage жертвы для прикрепления заголовка.", uk: "При стандартних JWT, що надсилаються як заголовок `Authorization: Bearer` (а не автоматично надісланий Cookie), CSRF природно запобігається, тому що шкідливий сайт не може прочитати LocalStorage жертви для прикріплення заголовка." } }
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
</body>
</html>
