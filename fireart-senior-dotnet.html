{ category: ".NET Internals", question: { en: "When should you use ValueTask<T> instead of Task<T>?", de: "Wann sollte man ValueTask<T> anstelle von Task<T> verwenden?", ru: "Когда следует использовать ValueTask<T> вместо Task<T>?", uk: "Коли слід використовувати ValueTask<T> замість Task<T>?" }, options: { en: ["Always, because it is essentially a struct version of Task.", "Only when the method frequently returns synchronously (e.g., cached results) to avoid heap allocations.", "When you need to await the result from multiple threads simultaneously.", "When running CPU-bound operations via Task.Run."], de: ["Immer, weil es im Grunde eine Struct-Version von Task ist.", "Nur wenn die Methode häufig synchron zurückkehrt (z.B. zwischengespeicherte Ergebnisse), um Heap-Allokationen zu vermeiden.", "Wenn man das Ergebnis von mehreren Threads gleichzeitig erwarten muss.", "Beim Ausführen von CPU-gebundenen Operationen über Task.Run."], ru: ["Всегда, потому что это просто struct-версия Task.", "Только когда метод часто возвращает результат синхронно (например, кэшированные данные), чтобы избежать выделений в куче.", "Когда нужно ожидать результат из нескольких потоков одновременно.", "При выполнении CPU-интенсивных операций через Task.Run."], uk: ["Завжди, бо це просто struct-версія Task.", "Тільки коли метод часто повертає результат синхронно (наприклад, кешовані дані), щоб уникнути алокацій у купі.", "Коли потрібно очікувати результат з кількох потоків одночасно.", "При виконанні CPU-інтенсивних операцій через Task.Run."] }, correctIndex: 1, explanation: { en: "ValueTask<T> is a struct. If an async method completes synchronously, ValueTask avoids allocating a Task object on the heap, saving GC pressure.", de: "ValueTask<T> ist ein Struct. Wenn eine async-Methode synchron abschliesst, vermeidet ValueTask die Allokation eines Task-Objekts auf dem Heap und reduziert den GC-Druck.", ru: "ValueTask<T> — это struct. Если асинхронный метод завершается синхронно, ValueTask позволяет избежать выделения объекта Task в куче, снижая нагрузку на сборщик мусора.", uk: "ValueTask<T> — це struct. Якщо асинхронний метод завершується синхронно, ValueTask дозволяє уникнути алокації об'єкта Task у купі, зменшуючи навантаження на збирач сміття." } },
{ category: ".NET Internals", question: { en: "What is the primary purpose of ConfigureAwait(false)?", de: "Was ist der Hauptzweck von ConfigureAwait(false)?", ru: "Каково основное назначение ConfigureAwait(false)?", uk: "Яке основне призначення ConfigureAwait(false)?" }, options: { en: ["It forces the task to run on a brand new background thread.", "It disables exceptions from being thrown back to the caller.", "It prevents the continuation from capturing the SynchronizationContext, avoiding deadlocks in UI/legacy apps.", "It tells the GC to immediately dispose of the Task when finished."], de: ["Es zwingt den Task, auf einem neuen Hintergrund-Thread zu laufen.", "Es deaktiviert Exceptions, die an den Aufrufer zurückgeworfen werden.", "Es verhindert, dass die Fortsetzung den SynchronizationContext erfasst, und vermeidet Deadlocks in UI-/Legacy-Anwendungen.", "Es weist den GC an, den Task sofort nach Abschluss freizugeben."], ru: ["Заставляет задачу выполняться в новом фоновом потоке.", "Отключает выбрасывание исключений обратно вызывающему коду.", "Предотвращает захват SynchronizationContext продолжением, избегая deadlock в UI-/legacy-приложениях.", "Указывает GC немедленно освободить Task после завершения."], uk: ["Змушує задачу виконуватися у новому фоновому потоці.", "Вимикає викидання винятків назад до викликаючого коду.", "Запобігає захопленню SynchronizationContext продовженням, уникаючи deadlock у UI-/legacy-застосунках.", "Вказує GC негайно звільнити Task після завершення."] }, correctIndex: 2, explanation: { en: "ConfigureAwait(false) allows the continuation of the async method to run on any ThreadPool thread, preventing deadlocks when the calling thread is blocked.", de: "ConfigureAwait(false) erlaubt es der Fortsetzung der async-Methode, auf einem beliebigen ThreadPool-Thread zu laufen, und verhindert Deadlocks, wenn der aufrufende Thread blockiert ist.", ru: "ConfigureAwait(false) позволяет продолжению асинхронного метода выполняться на любом потоке ThreadPool, предотвращая deadlock, когда вызывающий поток заблокирован.", uk: "ConfigureAwait(false) дозволяє продовженню асинхронного методу виконуватися на будь-якому потоці ThreadPool, запобігаючи deadlock, коли викликаючий потік заблокований." } },
{ category: ".NET Framework vs Core", question: { en: "Which is a major difference between .NET Framework and .NET Core?", de: "Was ist ein wesentlicher Unterschied zwischen .NET Framework und .NET Core?", ru: "В чём основное различие между .NET Framework и .NET Core?", uk: "У чому основна різниця між .NET Framework та .NET Core?" }, options: { en: [".NET Core uses WCF servers natively.", ".NET Core relies heavily on the Windows Registry.", ".NET Core is modular, cross-platform, and utilizes Kestrel instead of systemic IIS bindings.", ".NET Core does not have a Garbage Collector."], de: [".NET Core verwendet nativ WCF-Server.", ".NET Core ist stark von der Windows-Registry abhängig.", ".NET Core ist modular, plattformübergreifend und nutzt Kestrel anstelle von systemischen IIS-Bindungen.", ".NET Core hat keinen Garbage Collector."], ru: [".NET Core нативно использует WCF-серверы.", ".NET Core сильно зависит от реестра Windows.", ".NET Core модульный, кроссплатформенный и использует Kestrel вместо системных привязок IIS.", ".NET Core не имеет сборщика мусора."], uk: [".NET Core нативно використовує WCF-сервери.", ".NET Core сильно залежить від реєстру Windows.", ".NET Core модульний, кросплатформний та використовує Kestrel замість системних прив'язок IIS.", ".NET Core не має збирача сміття."] }, correctIndex: 2, explanation: { en: ".NET Core was completely rewritten to be cross-platform (Windows, Linux, macOS) and modular. It lacks legacy dependencies like WebForms.", de: ".NET Core wurde komplett neu geschrieben, um plattformübergreifend (Windows, Linux, macOS) und modular zu sein. Es fehlen Legacy-Abhängigkeiten wie WebForms.", ru: ".NET Core был полностью переписан для кроссплатформенности (Windows, Linux, macOS) и модульности. В нём нет устаревших зависимостей вроде WebForms.", uk: ".NET Core був повністю переписаний для кросплатформності (Windows, Linux, macOS) та модульності. У ньому немає застарілих залежностей на кшталт WebForms." } },
{ category: "Garbage Collection", question: { en: "What happens when an object hits the Large Object Heap (LOH)?", de: "Was passiert, wenn ein Objekt auf dem Large Object Heap (LOH) landet?", ru: "Что происходит, когда объект попадает в Large Object Heap (LOH)?", uk: "Що відбувається, коли об'єкт потрапляє до Large Object Heap (LOH)?" }, options: { en: ["It is collected in Gen 0.", "It triggers a full Gen 2 sweep because LOH collections are extremely expensive.", "It never gets garbage collected.", "It is automatically compressed mathematically."], de: ["Es wird in Gen 0 gesammelt.", "Es löst einen vollständigen Gen-2-Sweep aus, weil LOH-Sammlungen extrem teuer sind.", "Es wird nie vom Garbage Collector erfasst.", "Es wird automatisch mathematisch komprimiert."], ru: ["Собирается в Gen 0.", "Вызывает полную сборку Gen 2, потому что сборки LOH крайне затратны.", "Никогда не подвергается сборке мусора.", "Автоматически сжимается математически."], uk: ["Збирається у Gen 0.", "Викликає повне збирання Gen 2, тому що збирання LOH вкрай затратне.", "Ніколи не піддається збиранню сміття.", "Автоматично стискається математично."] }, correctIndex: 1, explanation: { en: "Objects over 85,000 bytes go to the LOH. Collecting the LOH also forces a full Gen 2 collection, which stops all threads (STW).", de: "Objekte über 85.000 Bytes landen im LOH. Die LOH-Sammlung erzwingt auch eine vollständige Gen-2-Sammlung, die alle Threads stoppt (STW).", ru: "Объекты более 85 000 байт попадают в LOH. Сборка LOH также вызывает полную сборку Gen 2, которая останавливает все потоки (STW).", uk: "Об'єкти понад 85 000 байт потрапляють до LOH. Збирання LOH також спричиняє повне збирання Gen 2, яке зупиняє всі потоки (STW)." } },
{ category: "Memory Management", question: { en: "Which statement about Span<T> is true?", de: "Welche Aussage über Span<T> ist richtig?", ru: "Какое утверждение о Span<T> верно?", uk: "Яке твердження про Span<T> правильне?" }, options: { en: ["Span<T> can be stored as a field in a class.", "Span<T> is a ref struct, meaning it can only live on the stack, guaranteeing memory safety without heap allocations.", "Span<T> is primarily used to interact with async/await state machines.", "Span<T> implements IEnumerable to allow LINQ queries."], de: ["Span<T> kann als Feld in einer Klasse gespeichert werden.", "Span<T> ist ein ref struct, das heisst, es kann nur auf dem Stack existieren und garantiert Speichersicherheit ohne Heap-Allokationen.", "Span<T> wird hauptsächlich zur Interaktion mit async/await-Zustandsmaschinen verwendet.", "Span<T> implementiert IEnumerable, um LINQ-Abfragen zu ermöglichen."], ru: ["Span<T> можно хранить как поле в классе.", "Span<T> — это ref struct, то есть он может существовать только на стеке, гарантируя безопасность памяти без выделений в куче.", "Span<T> в основном используется для взаимодействия с конечными автоматами async/await.", "Span<T> реализует IEnumerable для поддержки LINQ-запросов."], uk: ["Span<T> можна зберігати як поле у класі.", "Span<T> — це ref struct, тобто він може існувати тільки на стеку, гарантуючи безпеку пам'яті без алокацій у купі.", "Span<T> в основному використовується для взаємодії зі скінченними автоматами async/await.", "Span<T> реалізує IEnumerable для підтримки LINQ-запитів."] }, correctIndex: 1, explanation: { en: "Span<T> is a ref struct. It cannot be boxed or stored in the heap. It provides a highly optimized, zero-allocation window into contiguous memory.", de: "Span<T> ist ein ref struct. Es kann nicht geboxt oder auf dem Heap gespeichert werden. Es bietet ein hochoptimiertes, allokationsfreies Fenster in zusammenhängenden Speicher.", ru: "Span<T> — это ref struct. Его нельзя упаковать или сохранить в куче. Он обеспечивает высокооптимизированное окно в непрерывную память без аллокаций.", uk: "Span<T> — це ref struct. Його не можна запакувати або зберегти у купі. Він забезпечує високооптимізоване вікно у безперервну пам'ять без алокацій." } },
{ category: "Entity Framework", question: { en: "What is a major pitfall of using IEnumerable<T> instead of IQueryable<T> when accessing EF Core?", de: "Was ist eine grosse Falle bei der Verwendung von IEnumerable<T> anstelle von IQueryable<T> beim Zugriff auf EF Core?", ru: "Какова главная ловушка при использовании IEnumerable<T> вместо IQueryable<T> при работе с EF Core?", uk: "Яка головна пастка при використанні IEnumerable<T> замість IQueryable<T> при роботі з EF Core?" }, options: { en: ["IEnumerable queries cannot be joined with other tables.", "Applying a .Where() to an IEnumerable pulls the entire table into memory first.", "IEnumerable causes a database deadlock if accessed across threads.", "IEnumerable does not support async traversal."], de: ["IEnumerable-Abfragen können nicht mit anderen Tabellen verknüpft werden.", "Das Anwenden eines .Where() auf ein IEnumerable lädt zuerst die gesamte Tabelle in den Speicher.", "IEnumerable verursacht einen Datenbank-Deadlock bei threadübergreifendem Zugriff.", "IEnumerable unterstützt keine asynchrone Traversierung."], ru: ["Запросы IEnumerable не могут быть объединены с другими таблицами.", "Применение .Where() к IEnumerable сначала загружает всю таблицу в память.", "IEnumerable вызывает deadlock базы данных при доступе из нескольких потоков.", "IEnumerable не поддерживает асинхронный обход."], uk: ["Запити IEnumerable не можуть бути об'єднані з іншими таблицями.", "Застосування .Where() до IEnumerable спочатку завантажує всю таблицю у пам'ять.", "IEnumerable спричиняє deadlock бази даних при доступі з кількох потоків.", "IEnumerable не підтримує асинхронний обхід."] }, correctIndex: 1, explanation: { en: "IQueryable builds a SQL expression tree executed by the DB. IEnumerable immediately materializes the query, downloading all rows to RAM before filtering.", de: "IQueryable erstellt einen SQL-Ausdrucksbaum, der von der DB ausgeführt wird. IEnumerable materialisiert die Abfrage sofort und lädt alle Zeilen in den RAM, bevor gefiltert wird.", ru: "IQueryable строит дерево выражений SQL, выполняемое базой данных. IEnumerable немедленно материализует запрос, загружая все строки в RAM перед фильтрацией.", uk: "IQueryable будує дерево виразів SQL, що виконується базою даних. IEnumerable негайно матеріалізує запит, завантажуючи всі рядки у RAM перед фільтрацією." } },
{ category: "Async Programming", question: { en: "How do you mitigate deadlocks in asynchronous C# code?", de: "Wie vermeidet man Deadlocks in asynchronem C#-Code?", ru: "Как предотвратить deadlock в асинхронном C#-коде?", uk: "Як запобігти deadlock в асинхронному C#-коді?" }, options: { en: ["By using Thread.Sleep().", "By using .Result or .Wait() instead of await.", "Never block async code using .Result or .Wait(). Use 'await' all the way down the stack.", "By disabling the Garbage Collector during execution."], de: ["Durch die Verwendung von Thread.Sleep().", "Durch die Verwendung von .Result oder .Wait() anstelle von await.", "Niemals async-Code mit .Result oder .Wait() blockieren. Durchgehend 'await' im gesamten Stack verwenden.", "Durch Deaktivierung des Garbage Collectors während der Ausführung."], ru: ["Используя Thread.Sleep().", "Используя .Result или .Wait() вместо await.", "Никогда не блокировать async-код с помощью .Result или .Wait(). Использовать 'await' по всему стеку вызовов.", "Отключив сборщик мусора во время выполнения."], uk: ["Використовуючи Thread.Sleep().", "Використовуючи .Result або .Wait() замість await.", "Ніколи не блокувати async-код за допомогою .Result або .Wait(). Використовувати 'await' по всьому стеку викликів.", "Вимкнувши збирач сміття під час виконання."] }, correctIndex: 2, explanation: { en: "Using .Result blocks the current thread until the task finishes. If the task requires that same thread to finish its continuation, it deadlocks.", de: "Die Verwendung von .Result blockiert den aktuellen Thread, bis der Task abgeschlossen ist. Wenn der Task denselben Thread für seine Fortsetzung benötigt, entsteht ein Deadlock.", ru: "Использование .Result блокирует текущий поток до завершения задачи. Если задаче нужен тот же поток для продолжения, возникает deadlock.", uk: "Використання .Result блокує поточний потік до завершення задачі. Якщо задачі потрібен той самий потік для продовження, виникає deadlock." } },
{ category: "Task vs Thread", question: { en: "What is the difference between Task.Run and Task.Factory.StartNew?", de: "Was ist der Unterschied zwischen Task.Run und Task.Factory.StartNew?", ru: "В чём разница между Task.Run и Task.Factory.StartNew?", uk: "У чому різниця між Task.Run та Task.Factory.StartNew?" }, options: { en: ["Task.Run is strictly for UI threads.", "Task.Run is the safe, modern wrapper defaults for CPU-bound work and automatically unwraps child tasks.", "Task.Factory.StartNew is exclusively for asynchronous I/O.", "They are functionally identical in .NET 8."], de: ["Task.Run ist ausschliesslich für UI-Threads.", "Task.Run ist der sichere, moderne Standardwrapper für CPU-gebundene Arbeit und entpackt Child-Tasks automatisch.", "Task.Factory.StartNew ist ausschliesslich für asynchrone I/O.", "Sie sind funktional identisch in .NET 8."], ru: ["Task.Run предназначен только для UI-потоков.", "Task.Run — безопасная современная обёртка по умолчанию для CPU-интенсивной работы, автоматически разворачивающая вложенные задачи.", "Task.Factory.StartNew предназначен исключительно для асинхронного I/O.", "Они функционально идентичны в .NET 8."], uk: ["Task.Run призначений тільки для UI-потоків.", "Task.Run — безпечна сучасна обгортка за замовчуванням для CPU-інтенсивної роботи, що автоматично розгортає вкладені задачі.", "Task.Factory.StartNew призначений виключно для асинхронного I/O.", "Вони функціонально ідентичні у .NET 8."] }, correctIndex: 1, explanation: { en: "Task.Run uses the ThreadPool and automatically unwraps nested tasks. StartNew is low-level and does not unwrap nested tasks automatically.", de: "Task.Run verwendet den ThreadPool und entpackt verschachtelte Tasks automatisch. StartNew ist Low-Level und entpackt verschachtelte Tasks nicht automatisch.", ru: "Task.Run использует ThreadPool и автоматически разворачивает вложенные задачи. StartNew — низкоуровневый и не разворачивает вложенные задачи автоматически.", uk: "Task.Run використовує ThreadPool та автоматично розгортає вкладені задачі. StartNew — низькорівневий і не розгортає вкладені задачі автоматично." } },
{ category: "Dependency Injection", question: { en: "What happens if you inject a Scoped service into a Singleton service in ASP.NET Core?", de: "Was passiert, wenn man einen Scoped-Service in einen Singleton-Service in ASP.NET Core injiziert?", ru: "Что произойдёт, если внедрить Scoped-сервис в Singleton-сервис в ASP.NET Core?", uk: "Що станеться, якщо впровадити Scoped-сервіс у Singleton-сервіс у ASP.NET Core?" }, options: { en: ["It works normally.", "It throws a Captive Dependency Exception because it creates a memory leak by keeping the Scoped service alive indefinitely.", "The Singleton automatically changes to Scoped.", "The Scoped service is ignored."], de: ["Es funktioniert normal.", "Es wirft eine Captive-Dependency-Ausnahme, weil ein Speicherleck entsteht, da der Scoped-Service unbegrenzt am Leben gehalten wird.", "Der Singleton ändert sich automatisch zu Scoped.", "Der Scoped-Service wird ignoriert."], ru: ["Работает нормально.", "Выбрасывает исключение Captive Dependency, потому что создаёт утечку памяти, удерживая Scoped-сервис бесконечно.", "Singleton автоматически меняется на Scoped.", "Scoped-сервис игнорируется."], uk: ["Працює нормально.", "Кидає виняток Captive Dependency, тому що створює витік пам'яті, утримуючи Scoped-сервіс нескінченно.", "Singleton автоматично змінюється на Scoped.", "Scoped-сервіс ігнорується."] }, correctIndex: 1, explanation: { en: "This creates a 'Captive Dependency'. The Singleton holds a reference to the Scoped service, preventing it from being garbage collected.", de: "Dies erzeugt eine 'Captive Dependency'. Der Singleton hält eine Referenz auf den Scoped-Service und verhindert dessen Garbage Collection.", ru: "Это создаёт 'Captive Dependency'. Singleton удерживает ссылку на Scoped-сервис, предотвращая его сборку мусора.", uk: "Це створює 'Captive Dependency'. Singleton утримує посилання на Scoped-сервіс, запобігаючи його збиранню сміття." } },
{ category: "ASP.NET Core", question: { en: "In ASP.NET Core, the Middleware pipeline executes in what order?", de: "In welcher Reihenfolge wird die Middleware-Pipeline in ASP.NET Core ausgeführt?", ru: "В каком порядке выполняется Middleware-пайплайн в ASP.NET Core?", uk: "У якому порядку виконується Middleware-пайплайн у ASP.NET Core?" }, options: { en: ["Randomly based on DI.", "In the exact order they are added in Program.cs (top-down in, bottom-up out).", "Reverse order of registration.", "Routing middleware always executes last."], de: ["Zufällig basierend auf DI.", "In der exakten Reihenfolge, in der sie in Program.cs hinzugefügt werden (von oben nach unten rein, von unten nach oben raus).", "In umgekehrter Registrierungsreihenfolge.", "Routing-Middleware wird immer zuletzt ausgeführt."], ru: ["Случайно на основе DI.", "В точном порядке добавления в Program.cs (сверху вниз на входе, снизу вверх на выходе).", "В обратном порядке регистрации.", "Routing middleware всегда выполняется последним."], uk: ["Випадково на основі DI.", "У точному порядку додавання у Program.cs (зверху вниз на вході, знизу вгору на виході).", "У зворотному порядку реєстрації.", "Routing middleware завжди виконується останнім."] }, correctIndex: 1, explanation: { en: "Middleware follows the Chain of Responsibility pattern. The request flows through middlewares in the order they are added via 'app.Use...()'.", de: "Middleware folgt dem Chain-of-Responsibility-Pattern. Die Anfrage fliesst durch Middlewares in der Reihenfolge, in der sie über 'app.Use...()' hinzugefügt wurden.", ru: "Middleware следует паттерну Chain of Responsibility. Запрос проходит через middleware в порядке их добавления через 'app.Use...()'.", uk: "Middleware слідує патерну Chain of Responsibility. Запит проходить через middleware у порядку їх додавання через 'app.Use...()'." } },
{ category: "Performance Optimization", question: { en: "What is the primary difference between AddHttpClient and new HttpClient()?", de: "Was ist der Hauptunterschied zwischen AddHttpClient und new HttpClient()?", ru: "В чём основное различие между AddHttpClient и new HttpClient()?", uk: "У чому основна різниця між AddHttpClient та new HttpClient()?" }, options: { en: ["AddHttpClient encrypts traffic automatically.", "new HttpClient() leaves TCP sockets in a TIME_WAIT state after disposal, causing socket exhaustion under heavy load.", "new HttpClient() is faster.", "AddHttpClient cannot use standard HTTP verbs."], de: ["AddHttpClient verschlüsselt den Datenverkehr automatisch.", "new HttpClient() hinterlässt TCP-Sockets im TIME_WAIT-Zustand nach der Freigabe, was bei hoher Last zu Socket-Erschöpfung führt.", "new HttpClient() ist schneller.", "AddHttpClient kann keine Standard-HTTP-Verben verwenden."], ru: ["AddHttpClient автоматически шифрует трафик.", "new HttpClient() оставляет TCP-сокеты в состоянии TIME_WAIT после освобождения, вызывая исчерпание сокетов при высокой нагрузке.", "new HttpClient() быстрее.", "AddHttpClient не может использовать стандартные HTTP-глаголы."], uk: ["AddHttpClient автоматично шифрує трафік.", "new HttpClient() залишає TCP-сокети у стані TIME_WAIT після звільнення, спричиняючи вичерпання сокетів при високому навантаженні.", "new HttpClient() швидший.", "AddHttpClient не може використовувати стандартні HTTP-дієслова."] }, correctIndex: 1, explanation: { en: "Instantiating HttpClient manually creates a new socket connection. Releasing it leaves it in TIME_WAIT. AddHttpClient utilizes IHttpClientFactory to pool socket connections safely.", de: "Das manuelle Instanziieren von HttpClient erstellt eine neue Socket-Verbindung. Die Freigabe hinterlässt sie im TIME_WAIT-Zustand. AddHttpClient nutzt IHttpClientFactory, um Socket-Verbindungen sicher zu poolen.", ru: "Ручное создание HttpClient открывает новое сокет-соединение. При освобождении оно остаётся в TIME_WAIT. AddHttpClient использует IHttpClientFactory для безопасного пулинга сокет-соединений.", uk: "Ручне створення HttpClient відкриває нове сокет-з'єднання. При звільненні воно залишається у TIME_WAIT. AddHttpClient використовує IHttpClientFactory для безпечного пулінгу сокет-з'єднань." } },
{ category: "C# Features", question: { en: "What is the main benefit of C# Records?", de: "Was ist der Hauptvorteil von C# Records?", ru: "В чём основное преимущество C# Records?", uk: "У чому основна перевага C# Records?" }, options: { en: ["They compile directly to raw machine code without MSIL.", "They provide built-in, value-based equality semantics for reference types, making them perfect for immutable DTOs.", "They allow multiple inheritance.", "They automatically serialize to XML."], de: ["Sie kompilieren direkt zu Maschinencode ohne MSIL.", "Sie bieten eingebaute, wertbasierte Gleichheitssemantik für Referenztypen, ideal für unveränderliche DTOs.", "Sie ermöglichen Mehrfachvererbung.", "Sie serialisieren automatisch zu XML."], ru: ["Они компилируются напрямую в машинный код без MSIL.", "Они предоставляют встроенную семантику равенства по значению для ссылочных типов, что идеально для неизменяемых DTO.", "Они допускают множественное наследование.", "Они автоматически сериализуются в XML."], uk: ["Вони компілюються напряму у машинний код без MSIL.", "Вони надають вбудовану семантику рівності за значенням для посилкових типів, що ідеально для незмінних DTO.", "Вони дозволяють множинне успадкування.", "Вони автоматично серіалізуються у XML."] }, correctIndex: 1, explanation: { en: "Records are reference types but compare their values properties automatically, instead of comparing memory references like classic classes. Great for DDD and CQRS.", de: "Records sind Referenztypen, vergleichen aber automatisch ihre Werteigenschaften, anstatt Speicherreferenzen wie klassische Klassen zu vergleichen. Ideal für DDD und CQRS.", ru: "Records — ссылочные типы, но автоматически сравнивают свойства по значению, а не ссылки в памяти как классические классы. Отлично подходят для DDD и CQRS.", uk: "Records — посилкові типи, але автоматично порівнюють властивості за значенням, а не посилання у пам'яті як класичні класи. Чудово підходять для DDD та CQRS." } },
{ category: "Resilience Patterns", question: { en: "How do you implement resilience in .NET HTTP calls using Polly?", de: "Wie implementiert man Resilienz in .NET-HTTP-Aufrufen mit Polly?", ru: "Как реализовать отказоустойчивость в HTTP-вызовах .NET с помощью Polly?", uk: "Як реалізувати відмовостійкість у HTTP-викликах .NET за допомогою Polly?" }, options: { en: ["By wrapping calls in nested try-catch blocks.", "By defining policies like Retries with Exponential Backoff and Circuit Breakers on the IHttpClientBuilder.", "By increasing timeout limits to 300 seconds.", "By restarting the server node dynamically."], de: ["Durch Einschliessen von Aufrufen in verschachtelte Try-Catch-Blöcke.", "Durch Definition von Policies wie Retries mit exponentiellem Backoff und Circuit Breaker auf dem IHttpClientBuilder.", "Durch Erhöhung der Timeout-Limits auf 300 Sekunden.", "Durch dynamisches Neustarten des Server-Knotens."], ru: ["Оборачивая вызовы во вложенные try-catch блоки.", "Определяя политики, такие как Retry с экспоненциальным Backoff и Circuit Breaker на IHttpClientBuilder.", "Увеличивая лимиты таймаута до 300 секунд.", "Динамически перезапуская серверный узел."], uk: ["Обгортаючи виклики у вкладені try-catch блоки.", "Визначаючи політики, такі як Retry з експоненційним Backoff та Circuit Breaker на IHttpClientBuilder.", "Збільшуючи ліміти таймауту до 300 секунд.", "Динамічно перезапускаючи серверний вузол."] }, correctIndex: 1, explanation: { en: "Polly allows you to configure rules: e.g. 'If network fails, wait 2 seconds, try again. If fails 3 times, open a Circuit Breaker'.", de: "Polly ermöglicht die Konfiguration von Regeln: z.B. 'Bei Netzwerkfehler 2 Sekunden warten, erneut versuchen. Nach 3 Fehlschlägen den Circuit Breaker öffnen'.", ru: "Polly позволяет настраивать правила: например, 'При сбое сети подождать 2 секунды, повторить. После 3 неудач открыть Circuit Breaker'.", uk: "Polly дозволяє налаштовувати правила: наприклад, 'При збої мережі зачекати 2 секунди, повторити. Після 3 невдач відкрити Circuit Breaker'." } },
{ category: "Generics", question: { en: "What does Covariance ('out' keyword) allow in C# generics?", de: "Was ermöglicht Kovarianz ('out'-Schlüsselwort) in C#-Generics?", ru: "Что позволяет ковариантность (ключевое слово 'out') в C#-дженериках?", uk: "Що дозволяє коваріантність (ключове слово 'out') у C#-дженериках?" }, options: { en: ["Using a more derived type than specified (e.g. assigning IEnumerable<Dog> to IEnumerable<Animal>).", "Using a less derived type than specified.", "Allowing generics to accept structural integers.", "Bypassing type safety arrays."], de: ["Die Verwendung eines stärker abgeleiteten Typs als angegeben (z.B. Zuweisen von IEnumerable<Dog> zu IEnumerable<Animal>).", "Die Verwendung eines weniger abgeleiteten Typs als angegeben.", "Ermöglicht Generics, strukturelle Ganzzahlen zu akzeptieren.", "Umgehung der Typsicherheit von Arrays."], ru: ["Использование более производного типа, чем указано (например, присвоение IEnumerable<Dog> к IEnumerable<Animal>).", "Использование менее производного типа, чем указано.", "Разрешение дженерикам принимать структурные целые числа.", "Обход типобезопасности массивов."], uk: ["Використання більш похідного типу, ніж вказано (наприклад, присвоєння IEnumerable<Dog> до IEnumerable<Animal>).", "Використання менш похідного типу, ніж вказано.", "Дозвіл дженерикам приймати структурні цілі числа.", "Обхід типобезпеки масивів."] }, correctIndex: 0, explanation: { en: "Covariance means you can treat a collection of derived objects (Dogs) as a collection of base objects (Animals), because you are only reading them 'out'.", de: "Kovarianz bedeutet, dass man eine Sammlung abgeleiteter Objekte (Dogs) als Sammlung von Basisobjekten (Animals) behandeln kann, weil man sie nur 'herausliest'.", ru: "Ковариантность означает, что коллекцию производных объектов (Dogs) можно рассматривать как коллекцию базовых объектов (Animals), потому что вы только читаете их 'наружу'.", uk: "Коваріантність означає, що колекцію похідних об'єктів (Dogs) можна розглядати як колекцію базових об'єктів (Animals), тому що ви тільки читаєте їх 'назовні'." } },
{ category: "Async Cancellation", question: { en: "Why is CancellationTokenSource critical in ASP.NET Core API design?", de: "Warum ist CancellationTokenSource entscheidend im ASP.NET Core API-Design?", ru: "Почему CancellationTokenSource критически важен в дизайне API на ASP.NET Core?", uk: "Чому CancellationTokenSource критично важливий у дизайні API на ASP.NET Core?" }, options: { en: ["It generates secure JWT tokens.", "It allows cooperative cancellation; if the user closes their browser, the token is triggered, stopping downstream SQL queries instantly.", "It deletes expired cookies.", "It overrides the GC timeout limit."], de: ["Es generiert sichere JWT-Tokens.", "Es ermöglicht kooperative Abbruchsteuerung; wenn der Benutzer den Browser schliesst, wird das Token ausgelöst und stoppt nachgelagerte SQL-Abfragen sofort.", "Es löscht abgelaufene Cookies.", "Es überschreibt das GC-Timeout-Limit."], ru: ["Генерирует безопасные JWT-токены.", "Обеспечивает кооперативную отмену; если пользователь закрывает браузер, токен срабатывает, мгновенно останавливая нижестоящие SQL-запросы.", "Удаляет просроченные cookies.", "Переопределяет лимит таймаута GC."], uk: ["Генерує безпечні JWT-токени.", "Забезпечує кооперативне скасування; якщо користувач закриває браузер, токен спрацьовує, миттєво зупиняючи нижчестоящі SQL-запити.", "Видаляє прострочені cookies.", "Перевизначає ліміт таймауту GC."] }, correctIndex: 1, explanation: { en: "Passing CancellationToken through your entire stack ensures that if an HTTP request is aborted, the system doesn't waste database/CPU cycles computing a response nobody will receive.", de: "Das Durchreichen von CancellationToken durch den gesamten Stack stellt sicher, dass bei einem abgebrochenen HTTP-Request das System keine Datenbank-/CPU-Zyklen verschwendet.", ru: "Передача CancellationToken по всему стеку гарантирует, что при прерванном HTTP-запросе система не тратит ресурсы базы данных/CPU на вычисление ответа, который никто не получит.", uk: "Передача CancellationToken по всьому стеку гарантує, що при перерваному HTTP-запиті система не витрачає ресурси бази даних/CPU на обчислення відповіді, яку ніхто не отримає." } },
// ===== ARCHITECTURE & DESIGN PATTERNS =====
{ category: "Clean Architecture", question: { en: "In Clean Architecture, which layer should contain the Core Entities and business logic exceptions?", de: "In Clean Architecture, welche Schicht sollte die Core Entities und Business-Logik-Ausnahmen enthalten?", ru: "В Clean Architecture, какой слой должен содержать Core Entities и исключения бизнес-логики?", uk: "У Clean Architecture, який шар має містити Core Entities та винятки бізнес-логіки?" }, options: { en: ["Infrastructure", "Application", "Domain", "Presentation"], de: ["Infrastructure", "Application", "Domain", "Presentation"], ru: ["Infrastructure", "Application", "Domain", "Presentation"], uk: ["Infrastructure", "Application", "Domain", "Presentation"] }, correctIndex: 2, explanation: { en: "The Domain Layer sits at the center. It has zero dependencies on any other project or outer frameworks, containing pure business logic.", de: "Die Domain-Schicht steht im Zentrum. Sie hat keinerlei Abhängigkeiten zu anderen Projekten oder äusseren Frameworks und enthält reine Business-Logik.", ru: "Слой Domain находится в центре. У него нет зависимостей от других проектов или внешних фреймворков — только чистая бизнес-логика.", uk: "Шар Domain знаходиться у центрі. У нього немає залежностей від інших проєктів або зовнішніх фреймворків — тільки чиста бізнес-логіка." } },
{ category: "Clean Architecture", question: { en: "According to the dependency rule in Clean Architecture, how should layers interact?", de: "Gemäss der Abhängigkeitsregel in Clean Architecture, wie sollten Schichten interagieren?", ru: "Согласно правилу зависимостей в Clean Architecture, как должны взаимодействовать слои?", uk: "Згідно з правилом залежностей у Clean Architecture, як мають взаємодіяти шари?" }, options: { en: ["Outer layers depend on inner layers.", "Inner layers depend on outer layers.", "All layers depend on UI.", "Database depends on Application."], de: ["Äussere Schichten hängen von inneren Schichten ab.", "Innere Schichten hängen von äusseren Schichten ab.", "Alle Schichten hängen von der UI ab.", "Die Datenbank hängt von Application ab."], ru: ["Внешние слои зависят от внутренних.", "Внутренние слои зависят от внешних.", "Все слои зависят от UI.", "База данных зависит от Application."], uk: ["Зовнішні шари залежать від внутрішніх.", "Внутрішні шари залежать від зовнішніх.", "Всі шари залежать від UI.", "База даних залежить від Application."] }, correctIndex: 0, explanation: { en: "Dependencies must only point inward. Domain knows nothing about Application. Application knows nothing about Infrastructure.", de: "Abhängigkeiten dürfen nur nach innen zeigen. Domain weiss nichts über Application. Application weiss nichts über Infrastructure.", ru: "Зависимости должны указывать только внутрь. Domain ничего не знает об Application. Application ничего не знает об Infrastructure.", uk: "Залежності мають вказувати тільки всередину. Domain нічого не знає про Application. Application нічого не знає про Infrastructure." } },
{ category: "CQRS", question: { en: "When should you implement CQRS?", de: "Wann sollte man CQRS implementieren?", ru: "Когда следует внедрять CQRS?", uk: "Коли слід впроваджувати CQRS?" }, options: { en: ["For simple CRUD applications.", "When read and write workloads have drastically different performance, scaling, or database model requirements.", "When migrating to NoSQL.", "Always, it is mandatory in .NET 8."], de: ["Für einfache CRUD-Anwendungen.", "Wenn Lese- und Schreiblasten drastisch unterschiedliche Anforderungen an Performance, Skalierung oder Datenbankmodelle haben.", "Bei der Migration zu NoSQL.", "Immer, es ist obligatorisch in .NET 8."], ru: ["Для простых CRUD-приложений.", "Когда нагрузки на чтение и запись имеют радикально разные требования к производительности, масштабированию или модели базы данных.", "При миграции на NoSQL.", "Всегда, это обязательно в .NET 8."], uk: ["Для простих CRUD-застосунків.", "Коли навантаження на читання та запис мають радикально різні вимоги до продуктивності, масштабування або моделі бази даних.", "При міграції на NoSQL.", "Завжди, це обов'язково у .NET 8."] }, correctIndex: 1, explanation: { en: "CQRS separates Commands (writes) from Queries (reads). It adds overhead but is critical when you need to scale database reads 100x more than database writes.", de: "CQRS trennt Commands (Schreibvorgänge) von Queries (Lesevorgänge). Es erzeugt Overhead, ist aber entscheidend, wenn Datenbanklesevorgänge 100x mehr skaliert werden müssen als Schreibvorgänge.", ru: "CQRS разделяет Commands (запись) и Queries (чтение). Это добавляет сложность, но критически важно, когда нужно масштабировать чтение из БД в 100 раз больше, чем запись.", uk: "CQRS розділяє Commands (запис) та Queries (читання). Це додає складність, але критично важливо, коли потрібно масштабувати читання з БД у 100 разів більше, ніж запис." } },
{ category: "DDD", question: { en: "What is an Aggregate Root in Domain-Driven Design?", de: "Was ist ein Aggregate Root in Domain-Driven Design?", ru: "Что такое Aggregate Root в Domain-Driven Design?", uk: "Що таке Aggregate Root у Domain-Driven Design?" }, options: { en: ["A materialized view.", "A DB migration script.", "A single entity that guards the consistency boundaries for a cluster of associated child entities.", "A global exception handler."], de: ["Eine materialisierte View.", "Ein DB-Migrationsskript.", "Eine einzelne Entität, die die Konsistenzgrenzen für eine Gruppe zugehöriger Kind-Entitäten schützt.", "Ein globaler Exception-Handler."], ru: ["Материализованное представление.", "Скрипт миграции БД.", "Единственная сущность, которая охраняет границы согласованности для группы связанных дочерних сущностей.", "Глобальный обработчик исключений."], uk: ["Матеріалізоване представлення.", "Скрипт міграції БД.", "Єдина сутність, яка охороняє межі узгодженості для групи пов'язаних дочірніх сутностей.", "Глобальний обробник винятків."] }, correctIndex: 2, explanation: { en: "An Aggregate Root is the ONLY entry point to a group of related objects. e.g. You cannot modify an 'OrderLine' without going through the 'Order' aggregate root to update totals.", de: "Ein Aggregate Root ist der EINZIGE Einstiegspunkt zu einer Gruppe verwandter Objekte. Z.B. kann man eine 'OrderLine' nicht ändern, ohne über das 'Order'-Aggregate-Root die Summen zu aktualisieren.", ru: "Aggregate Root — ЕДИНСТВЕННАЯ точка входа к группе связанных объектов. Например, нельзя изменить 'OrderLine', не обратившись через Aggregate Root 'Order' для обновления итогов.", uk: "Aggregate Root — ЄДИНА точка входу до групи пов'язаних об'єктів. Наприклад, не можна змінити 'OrderLine', не звернувшись через Aggregate Root 'Order' для оновлення підсумків." } },
{ category: "Design Patterns", question: { en: "What is a major limitation of the standard generic Repository pattern over Entity Framework Core?", de: "Was ist eine wesentliche Einschränkung des generischen Repository-Patterns gegenüber Entity Framework Core?", ru: "Каков основной недостаток стандартного обобщённого паттерна Repository поверх Entity Framework Core?", uk: "Який основний недолік стандартного узагальненого патерну Repository поверх Entity Framework Core?" }, options: { en: ["EF Core DbSets are already Repositories, so creating a generic wrap over them is often considered a redundant anti-pattern.", "It stops LINQ usage.", "It causes database deadlocks natively.", "It blocks dependency injection."], de: ["EF Core DbSets sind bereits Repositories, daher wird ein generischer Wrapper darüber oft als redundantes Anti-Pattern betrachtet.", "Es verhindert die LINQ-Nutzung.", "Es verursacht nativ Datenbank-Deadlocks.", "Es blockiert Dependency Injection."], ru: ["EF Core DbSet уже являются репозиториями, поэтому создание обобщённой обёртки над ними часто считается избыточным анти-паттерном.", "Блокирует использование LINQ.", "Нативно вызывает deadlock базы данных.", "Блокирует внедрение зависимостей."], uk: ["EF Core DbSet вже є репозиторіями, тому створення узагальненої обгортки над ними часто вважається надлишковим анти-патерном.", "Блокує використання LINQ.", "Нативно спричиняє deadlock бази даних.", "Блокує впровадження залежностей."] }, correctIndex: 0, explanation: { en: "DbContext is already a Unit of Work, and DbSet is already a Repository. Wrapping a generic repository over EF hides EF's powerful features like IQueryable translation.", de: "DbContext ist bereits eine Unit of Work und DbSet ist bereits ein Repository. Ein generisches Repository über EF zu legen, verbirgt EFs mächtige Funktionen wie IQueryable-Translation.", ru: "DbContext — уже Unit of Work, а DbSet — уже Repository. Обёртывание обобщённым репозиторием скрывает мощные возможности EF, такие как трансляция IQueryable.", uk: "DbContext — вже Unit of Work, а DbSet — вже Repository. Обгортання узагальненим репозиторієм приховує потужні можливості EF, такі як трансляція IQueryable." } },
{ category: "Microservices", question: { en: "How do you handle distributed transactions across Microservices?", de: "Wie handhabt man verteilte Transaktionen über Microservices hinweg?", ru: "Как обрабатывать распределённые транзакции между Microservices?", uk: "Як обробляти розподілені транзакції між Microservices?" }, options: { en: ["Traditional 2PC (Two-Phase Commit).", "Using the Saga Pattern, issuing compensating transactions if a downstream step fails.", "Sharing the same physical database across all microservices.", "Foreign key constraints."], de: ["Traditionelles 2PC (Two-Phase Commit).", "Mit dem Saga-Pattern, das kompensierende Transaktionen ausgibt, wenn ein nachgelagerter Schritt fehlschlägt.", "Gemeinsame physische Datenbank für alle Microservices.", "Fremdschlüssel-Constraints."], ru: ["Традиционный 2PC (Two-Phase Commit).", "С помощью паттерна Saga, выполняя компенсирующие транзакции, если нижестоящий шаг не удаётся.", "Использование одной физической базы данных для всех микросервисов.", "Ограничения внешних ключей."], uk: ["Традиційний 2PC (Two-Phase Commit).", "За допомогою патерну Saga, виконуючи компенсуючі транзакції, якщо нижчестоящий крок не вдається.", "Використання однієї фізичної бази даних для всіх мікросервісів.", "Обмеження зовнішніх ключів."] }, correctIndex: 1, explanation: { en: "2PC is blocking and heavily kills scale. In Sagas, if Service A completes and Service B fails, Service B emits a 'Failed' event, and Service A undoes its local commit.", de: "2PC ist blockierend und beeinträchtigt die Skalierung stark. Bei Sagas: Wenn Service A abschliesst und Service B fehlschlägt, sendet Service B ein 'Failed'-Event, und Service A macht seinen lokalen Commit rückgängig.", ru: "2PC блокирующий и сильно снижает масштабируемость. В Sagas, если Service A завершился, а Service B провалился, Service B отправляет событие 'Failed', и Service A отменяет свой локальный коммит.", uk: "2PC блокуючий і сильно знижує масштабованість. У Sagas, якщо Service A завершився, а Service B провалився, Service B відправляє подію 'Failed', і Service A скасовує свій локальний коміт." } },
{ category: "API Gateway", question: { en: "What is the primary role of the API Gateway pattern?", de: "Was ist die primäre Rolle des API-Gateway-Patterns?", ru: "Какова основная роль паттерна API Gateway?", uk: "Яка основна роль патерну API Gateway?" }, options: { en: ["To format hard drives on the cloud.", "To sit between clients and microservices, handling cross-cutting concerns like auth, rate limiting, and request routing (e.g., Ocelot/YARP).", "To execute Python scripts inside .NET.", "To compile C# code."], de: ["Festplatten in der Cloud zu formatieren.", "Zwischen Clients und Microservices zu sitzen und übergreifende Belange wie Auth, Rate Limiting und Request-Routing zu handhaben (z.B. Ocelot/YARP).", "Python-Skripte in .NET auszuführen.", "C#-Code zu kompilieren."], ru: ["Форматировать жёсткие диски в облаке.", "Располагаться между клиентами и микросервисами, обрабатывая сквозные задачи, такие как авторизация, ограничение запросов и маршрутизация (например, Ocelot/YARP).", "Выполнять Python-скрипты внутри .NET.", "Компилировать C#-код."], uk: ["Форматувати жорсткі диски у хмарі.", "Розташовуватися між клієнтами та мікросервісами, обробляючи наскрізні задачі, такі як авторизація, обмеження запитів та маршрутизація (наприклад, Ocelot/YARP).", "Виконувати Python-скрипти всередині .NET.", "Компілювати C#-код."] }, correctIndex: 1, explanation: { en: "Gateways act as a reverse proxy. The frontend client makes 1 call to the Gateway, and the Gateway routes it to the correct hidden internal Microservice.", de: "Gateways fungieren als Reverse Proxy. Der Frontend-Client macht einen Aufruf zum Gateway, und das Gateway leitet ihn an den korrekten internen Microservice weiter.", ru: "Gateway работает как обратный прокси. Фронтенд-клиент делает 1 вызов к Gateway, а Gateway маршрутизирует его к нужному скрытому внутреннему микросервису.", uk: "Gateway працює як зворотний проксі. Фронтенд-клієнт робить 1 виклик до Gateway, а Gateway маршрутизує його до потрібного прихованого внутрішнього мікросервісу." } },
{ category: "Legacy Refactoring", question: { en: "How do you refactor heavily coupled legacy code without breaking production?", de: "Wie refaktoriert man stark gekoppelten Legacy-Code, ohne die Produktion zu unterbrechen?", ru: "Как рефакторить сильно связанный legacy-код без нарушения работы продакшена?", uk: "Як рефакторити сильно зв'язаний legacy-код без порушення роботи продакшену?" }, options: { en: ["Stop production and rewrite it (Big Bang).", "Using the Strangler Fig Pattern: putting a proxy in front, slowly rewriting features as new microservices, and routing traffic to the new ones.", "Using NoSQL databases.", "Bypassing the proxy entirely."], de: ["Produktion stoppen und alles neu schreiben (Big Bang).", "Mit dem Strangler-Fig-Pattern: einen Proxy davor setzen, Features langsam als neue Microservices umschreiben und den Verkehr dorthin leiten.", "NoSQL-Datenbanken verwenden.", "Den Proxy komplett umgehen."], ru: ["Остановить продакшен и переписать всё (Big Bang).", "С помощью паттерна Strangler Fig: поставить прокси перед системой, постепенно переписывать функции как новые микросервисы и перенаправлять трафик на них.", "Использовать NoSQL-базы данных.", "Полностью обойти прокси."], uk: ["Зупинити продакшен і переписати все (Big Bang).", "За допомогою патерну Strangler Fig: поставити проксі перед системою, поступово переписувати функції як нові мікросервіси та перенаправляти трафік на них.", "Використовувати NoSQL-бази даних.", "Повністю обійти проксі."] }, correctIndex: 1, explanation: { en: "The Strangler Fig wraps the legacy monolith. As you build a new API, you tell the proxy 'Route /api/users to the new microservice, route everything else to legacy'. Zero downtime.", de: "Der Strangler Fig umhüllt den Legacy-Monolithen. Beim Aufbau einer neuen API sagt man dem Proxy: 'Route /api/users zum neuen Microservice, alles andere zum Legacy-System'. Keine Ausfallzeit.", ru: "Strangler Fig оборачивает legacy-монолит. При создании нового API вы говорите прокси: 'Направляй /api/users на новый микросервис, всё остальное — на legacy'. Без простоев.", uk: "Strangler Fig обгортає legacy-моноліт. При створенні нового API ви кажете проксі: 'Направляй /api/users на новий мікросервіс, все інше — на legacy'. Без простоїв." } },
{ category: "Design Patterns", question: { en: "Why are traditional static Singletons considered anti-patterns in modern C#?", de: "Warum gelten traditionelle statische Singletons als Anti-Patterns in modernem C#?", ru: "Почему традиционные статические Singleton считаются анти-паттернами в современном C#?", uk: "Чому традиційні статичні Singleton вважаються анти-патернами у сучасному C#?" }, options: { en: ["They are deprecated by Microsoft.", "They hide dependencies globally, make unit testing extremely difficult, and cause hidden thread-safety issues.", "They are too fast for modern CPUs.", "They allocate too much memory."], de: ["Sie sind von Microsoft als veraltet erklärt.", "Sie verbergen Abhängigkeiten global, machen Unit-Tests extrem schwierig und verursachen versteckte Thread-Sicherheitsprobleme.", "Sie sind zu schnell für moderne CPUs.", "Sie allokieren zu viel Speicher."], ru: ["Они объявлены устаревшими Microsoft.", "Они глобально скрывают зависимости, делают модульное тестирование крайне сложным и вызывают скрытые проблемы потокобезопасности.", "Они слишком быстры для современных CPU.", "Они выделяют слишком много памяти."], uk: ["Вони оголошені застарілими Microsoft.", "Вони глобально приховують залежності, роблять модульне тестування вкрай складним та спричиняють приховані проблеми потокобезпеки.", "Вони занадто швидкі для сучасних CPU.", "Вони виділяють занадто багато пам'яті."] }, correctIndex: 1, explanation: { en: "Static global state makes it impossible to mock dependencies in Unit Tests. Modern C# uses Dependency Injection (AddSingleton) which solves these lifetime and testing issues cleanly.", de: "Statischer globaler Zustand macht es unmöglich, Abhängigkeiten in Unit-Tests zu mocken. Modernes C# nutzt Dependency Injection (AddSingleton), was diese Lebensdauer- und Testprobleme sauber löst.", ru: "Статическое глобальное состояние делает невозможным мокирование зависимостей в Unit-тестах. Современный C# использует Dependency Injection (AddSingleton), что решает проблемы жизненного цикла и тестирования.", uk: "Статичний глобальний стан робить неможливим мокування залежностей у Unit-тестах. Сучасний C# використовує Dependency Injection (AddSingleton), що вирішує проблеми життєвого циклу та тестування." } },
{ category: "Design Patterns", question: { en: "Which pattern injects different algorithmic behaviors at runtime via a common interface?", de: "Welches Pattern injiziert zur Laufzeit verschiedene algorithmische Verhaltensweisen über ein gemeinsames Interface?", ru: "Какой паттерн внедряет различные алгоритмические поведения во время выполнения через общий интерфейс?", uk: "Який патерн впроваджує різні алгоритмічні поведінки під час виконання через спільний інтерфейс?" }, options: { en: ["Factory Method", "Decorator", "Strategy Pattern", "Adapter"], de: ["Factory Method", "Decorator", "Strategy Pattern", "Adapter"], ru: ["Factory Method", "Decorator", "Strategy Pattern", "Adapter"], uk: ["Factory Method", "Decorator", "Strategy Pattern", "Adapter"] }, correctIndex: 2, explanation: { en: "The Strategy Pattern. e.g. An IPaymentStrategy interface that could be instantiated as StripePayment or PayPalPayment at runtime without changing the consuming class.", de: "Das Strategy Pattern. Z.B. ein IPaymentStrategy-Interface, das zur Laufzeit als StripePayment oder PayPalPayment instanziiert werden kann, ohne die konsumierende Klasse zu ändern.", ru: "Strategy Pattern. Например, интерфейс IPaymentStrategy, который может быть реализован как StripePayment или PayPalPayment во время выполнения без изменения потребляющего класса.", uk: "Strategy Pattern. Наприклад, інтерфейс IPaymentStrategy, який може бути реалізований як StripePayment або PayPalPayment під час виконання без зміни споживаючого класу." } },
{ category: "DDD / Eventing", question: { en: "What is Event Sourcing?", de: "Was ist Event Sourcing?", ru: "Что такое Event Sourcing?", uk: "Що таке Event Sourcing?" }, options: { en: ["Sending emails based on triggers.", "Instead of storing current state, storing a sequence of immutable, append-only events (e.g. OrderCreated, ItemAdded). Current state is derived by replaying them.", "Using WebHooks for third-party tracking.", "Sourcing data from NoSQL."], de: ["E-Mails basierend auf Triggern senden.", "Anstatt den aktuellen Zustand zu speichern, eine Sequenz unveränderlicher, nur anhängbarer Events speichern (z.B. OrderCreated, ItemAdded). Der aktuelle Zustand wird durch Wiedergabe abgeleitet.", "WebHooks für Drittanbieter-Tracking verwenden.", "Daten aus NoSQL beziehen."], ru: ["Отправка электронных писем по триггерам.", "Вместо хранения текущего состояния — хранение последовательности неизменяемых событий (например, OrderCreated, ItemAdded). Текущее состояние вычисляется путём их воспроизведения.", "Использование WebHooks для отслеживания третьей стороной.", "Получение данных из NoSQL."], uk: ["Надсилання електронних листів за тригерами.", "Замість зберігання поточного стану — зберігання послідовності незмінних подій (наприклад, OrderCreated, ItemAdded). Поточний стан обчислюється шляхом їх відтворення.", "Використання WebHooks для відстеження третьою стороною.", "Отримання даних з NoSQL."] }, correctIndex: 1, explanation: { en: "Event Sourcing provides a perfect audit log. The source of truth is the absolute history of changes.", de: "Event Sourcing bietet ein perfektes Audit-Log. Die Quelle der Wahrheit ist die vollständige Geschichte der Änderungen.", ru: "Event Sourcing обеспечивает идеальный журнал аудита. Источник истины — полная история изменений.", uk: "Event Sourcing забезпечує ідеальний журнал аудиту. Джерело істини — повна історія змін." } },
{ category: "API Design", question: { en: "How do you implement Idempotency in a REST API?", de: "Wie implementiert man Idempotenz in einer REST API?", ru: "Как реализовать идемпотентность в REST API?", uk: "Як реалізувати ідемпотентність у REST API?" }, options: { en: ["By using the GET HTTP verb for everything.", "By requiring the client to send a unique Idempotency-Key header, and caching that key on the server (via Redis) to ignore duplicates.", "By encrypting the payload.", "By removing CORS."], de: ["Durch Verwendung des GET-HTTP-Verbs für alles.", "Durch die Anforderung, dass der Client einen eindeutigen Idempotency-Key-Header sendet, und diesen Schlüssel auf dem Server (via Redis) zwischenspeichert, um Duplikate zu ignorieren.", "Durch Verschlüsselung der Nutzdaten.", "Durch Entfernung von CORS."], ru: ["Используя HTTP-глагол GET для всего.", "Требуя от клиента отправки уникального заголовка Idempotency-Key и кэшируя этот ключ на сервере (через Redis) для игнорирования дубликатов.", "Шифруя полезную нагрузку.", "Удалив CORS."], uk: ["Використовуючи HTTP-дієслово GET для всього.", "Вимагаючи від клієнта надсилання унікального заголовка Idempotency-Key та кешуючи цей ключ на сервері (через Redis) для ігнорування дублікатів.", "Шифруючи корисне навантаження.", "Видаливши CORS."] }, correctIndex: 1, explanation: { en: "Crucial for Payments (e.g. Stripe). If a user's network drops and their app retries the POST request, the server sees the cached Idempotency-Key and returns the original result without charging twice.", de: "Entscheidend für Zahlungen (z.B. Stripe). Wenn das Netzwerk des Benutzers abbricht und die App den POST-Request erneut sendet, erkennt der Server den zwischengespeicherten Idempotency-Key und gibt das ursprüngliche Ergebnis zurück, ohne doppelt zu belasten.", ru: "Критически важно для платежей (например, Stripe). Если сеть пользователя обрывается и приложение повторяет POST-запрос, сервер видит кэшированный Idempotency-Key и возвращает исходный результат без повторного списания.", uk: "Критично важливо для платежів (наприклад, Stripe). Якщо мережа користувача обривається і застосунок повторює POST-запит, сервер бачить кешований Idempotency-Key і повертає початковий результат без повторного списання." } },
{ category: "Security", question: { en: "What is the difference between OAuth2 and OpenID Connect (OIDC)?", de: "Was ist der Unterschied zwischen OAuth2 und OpenID Connect (OIDC)?", ru: "В чём разница между OAuth2 и OpenID Connect (OIDC)?", uk: "У чому різниця між OAuth2 та OpenID Connect (OIDC)?" }, options: { en: ["They are identical competing standards.", "OAuth2 is an authorization protocol (granting access). OIDC is an authentication layer on top of it (verifying WHO the user is via ID Tokens).", "OAuth2 uses XML, OIDC uses JSON.", "OIDC is a Microsoft exclusive protocol."], de: ["Sie sind identische konkurrierende Standards.", "OAuth2 ist ein Autorisierungsprotokoll (Zugriff gewähren). OIDC ist eine Authentifizierungsschicht darüber (Überprüfung, WER der Benutzer ist, via ID Tokens).", "OAuth2 verwendet XML, OIDC verwendet JSON.", "OIDC ist ein Microsoft-exklusives Protokoll."], ru: ["Это идентичные конкурирующие стандарты.", "OAuth2 — протокол авторизации (предоставление доступа). OIDC — слой аутентификации поверх него (проверка, КТО пользователь, через ID Tokens).", "OAuth2 использует XML, OIDC использует JSON.", "OIDC — эксклюзивный протокол Microsoft."], uk: ["Це ідентичні конкуруючі стандарти.", "OAuth2 — протокол авторизації (надання доступу). OIDC — шар автентифікації поверх нього (перевірка, ХТО користувач, через ID Tokens).", "OAuth2 використовує XML, OIDC використовує JSON.", "OIDC — ексклюзивний протокол Microsoft."] }, correctIndex: 1, explanation: { en: "OAuth2 gives you an Access Token (permissions to DO something). OIDC gives you an ID Token (JWT with claims about WHO you are).", de: "OAuth2 gibt Ihnen ein Access Token (Berechtigungen, etwas zu TUN). OIDC gibt Ihnen ein ID Token (JWT mit Claims darüber, WER Sie sind).", ru: "OAuth2 даёт Access Token (разрешения ЧТО-ТО делать). OIDC даёт ID Token (JWT с утверждениями о том, КТО вы).", uk: "OAuth2 дає Access Token (дозволи ЩОСЬ робити). OIDC дає ID Token (JWT з твердженнями про те, ХТО ви)." } },
{ category: "Security", question: { en: "How do you prevent Mass Assignment vulnerabilities in an ASP.NET Core API?", de: "Wie verhindert man Mass-Assignment-Schwachstellen in einer ASP.NET Core API?", ru: "Как предотвратить уязвимость Mass Assignment в API на ASP.NET Core?", uk: "Як запобігти вразливості Mass Assignment в API на ASP.NET Core?" }, options: { en: ["Disable EF Core Tracking.", "Never accept raw EF Core database entities as API bodies; always map inputs through strict DTOs (Data Transfer Objects).", "Encrypt the database password.", "Use CORS."], de: ["EF Core Tracking deaktivieren.", "Niemals rohe EF-Core-Datenbankentitäten als API-Bodies akzeptieren; Eingaben immer über strikte DTOs (Data Transfer Objects) mappen.", "Das Datenbank-Passwort verschlüsseln.", "CORS verwenden."], ru: ["Отключить EF Core Tracking.", "Никогда не принимать сырые EF Core сущности базы данных в теле API; всегда маппить входные данные через строгие DTO (Data Transfer Objects).", "Зашифровать пароль базы данных.", "Использовать CORS."], uk: ["Вимкнути EF Core Tracking.", "Ніколи не приймати сирі EF Core сутності бази даних у тілі API; завжди маппити вхідні дані через суворі DTO (Data Transfer Objects).", "Зашифрувати пароль бази даних.", "Використовувати CORS."] }, correctIndex: 1, explanation: { en: "If you accept a 'User' EF entity on a POST endpoint and apply it, a hacker could send `{\"IsAdmin\": true}` in the JSON and accidentally gain admin privileges. DTOs restrict incoming fields.", de: "Wenn Sie eine 'User'-EF-Entität an einem POST-Endpunkt akzeptieren und anwenden, könnte ein Hacker `{\"IsAdmin\": true}` im JSON senden und versehentlich Admin-Rechte erlangen. DTOs beschränken eingehende Felder.", ru: "Если принять сущность 'User' EF на POST-эндпоинте и применить её, хакер может отправить `{\"IsAdmin\": true}` в JSON и случайно получить права администратора. DTO ограничивают входящие поля.", uk: "Якщо прийняти сутність 'User' EF на POST-ендпоінті та застосувати її, хакер може надіслати `{\"IsAdmin\": true}` у JSON і випадково отримати права адміністратора. DTO обмежують вхідні поля." } },
// ===== DATABASES (Postgres, EF Core, Redis) =====
{ category: "PostgreSQL", question: { en: "What does the EXPLAIN ANALYZE command do in PostgreSQL?", de: "Was macht der Befehl EXPLAIN ANALYZE in PostgreSQL?", ru: "Что делает команда EXPLAIN ANALYZE в PostgreSQL?", uk: "Що робить команда EXPLAIN ANALYZE у PostgreSQL?" }, options: { en: ["Checks syntax.", "Actually executes the query and returns the real execution time, row counts, and the exact steps taken (Seq Scan, Index Scan).", "Reindexes the table automatically.", "Generates an ER diagram."], de: ["Überprüft die Syntax.", "Führt die Abfrage tatsächlich aus und gibt die reale Ausführungszeit, Zeilenanzahl und die exakten Schritte zurück (Seq Scan, Index Scan).", "Reindexiert die Tabelle automatisch.", "Generiert ein ER-Diagramm."], ru: ["Проверяет синтаксис.", "Реально выполняет запрос и возвращает фактическое время выполнения, количество строк и точные шаги (Seq Scan, Index Scan).", "Автоматически переиндексирует таблицу.", "Генерирует ER-диаграмму."], uk: ["Перевіряє синтаксис.", "Реально виконує запит і повертає фактичний час виконання, кількість рядків та точні кроки (Seq Scan, Index Scan).", "Автоматично переіндексує таблицю.", "Генерує ER-діаграму."] }, correctIndex: 1, explanation: { en: "Standard EXPLAIN just estimates. EXPLAIN ANALYZE forces the query to physically run, making it the ultimate tool for debugging exactly why a query is slow.", de: "Standard-EXPLAIN schätzt nur. EXPLAIN ANALYZE erzwingt die physische Ausführung der Abfrage und ist das ultimative Tool zum Debuggen, warum eine Abfrage langsam ist.", ru: "Стандартный EXPLAIN только оценивает. EXPLAIN ANALYZE физически выполняет запрос, что делает его главным инструментом для отладки причин медленных запросов.", uk: "Стандартний EXPLAIN тільки оцінює. EXPLAIN ANALYZE фізично виконує запит, що робить його головним інструментом для налагодження причин повільних запитів." } },
{ category: "Databases", question: { en: "Explain the difference between Clustered and Non-Clustered Indexes.", de: "Erklären Sie den Unterschied zwischen Clustered und Non-Clustered Indexes.", ru: "Объясните разницу между Clustered и Non-Clustered индексами.", uk: "Поясніть різницю між Clustered та Non-Clustered індексами." }, options: { en: ["They are the same.", "Clustered indexes define the physical sorting of the data on the disk (max 1 per table). Non-Clustered are separate data structures holding pointers to the physical rows.", "Clustered indexes are placed in RAM, Non-Clustered on SSD.", "Non-Clustered indexes are automatically generated by Foreign Keys."], de: ["Sie sind identisch.", "Clustered Indexes definieren die physische Sortierung der Daten auf der Festplatte (max. 1 pro Tabelle). Non-Clustered sind separate Datenstrukturen mit Zeigern auf die physischen Zeilen.", "Clustered Indexes befinden sich im RAM, Non-Clustered auf SSD.", "Non-Clustered Indexes werden automatisch durch Fremdschlüssel generiert."], ru: ["Они одинаковые.", "Clustered индексы определяют физическую сортировку данных на диске (максимум 1 на таблицу). Non-Clustered — отдельные структуры данных с указателями на физические строки.", "Clustered индексы размещаются в RAM, Non-Clustered на SSD.", "Non-Clustered индексы автоматически создаются внешними ключами."], uk: ["Вони однакові.", "Clustered індекси визначають фізичне сортування даних на диску (максимум 1 на таблицю). Non-Clustered — окремі структури даних з вказівниками на фізичні рядки.", "Clustered індекси розміщуються у RAM, Non-Clustered на SSD.", "Non-Clustered індекси автоматично створюються зовнішніми ключами."] }, correctIndex: 1, explanation: { en: "Because a Clustered Index dictates the physical sort order of the rows, you can only have ONE per table (usually the Primary Key).", de: "Da ein Clustered Index die physische Sortierreihenfolge der Zeilen bestimmt, kann man nur EINEN pro Tabelle haben (üblicherweise der Primärschlüssel).", ru: "Поскольку Clustered индекс определяет физический порядок сортировки строк, на таблицу может быть только ОДИН (обычно Primary Key).", uk: "Оскільки Clustered індекс визначає фізичний порядок сортування рядків, на таблицю може бути тільки ОДИН (зазвичай Primary Key)." } },
{ category: "Databases", question: { en: "What does Isolation mean in ACID properties?", de: "Was bedeutet Isolation in den ACID-Eigenschaften?", ru: "Что означает Isolation в свойствах ACID?", uk: "Що означає Isolation у властивостях ACID?" }, options: { en: ["The database sits on an isolated virtual network.", "Concurrent transactions don't interfere with each other, dictated by transaction isolation levels.", "Data cannot be joined with external tables.", "Backups are kept isolated."], de: ["Die Datenbank befindet sich in einem isolierten virtuellen Netzwerk.", "Gleichzeitige Transaktionen beeinflussen sich nicht gegenseitig, gesteuert durch Transaktionsisolationsebenen.", "Daten können nicht mit externen Tabellen verknüpft werden.", "Backups werden isoliert aufbewahrt."], ru: ["База данных находится в изолированной виртуальной сети.", "Параллельные транзакции не мешают друг другу, что регулируется уровнями изоляции транзакций.", "Данные не могут быть объединены с внешними таблицами.", "Резервные копии хранятся изолированно."], uk: ["База даних знаходиться в ізольованій віртуальній мережі.", "Паралельні транзакції не заважають одна одній, що регулюється рівнями ізоляції транзакцій.", "Дані не можуть бути об'єднані із зовнішніми таблицями.", "Резервні копії зберігаються ізольовано."] }, correctIndex: 1, explanation: { en: "Isolation prevents dirty reads, phantom reads, and non-repeatable reads during parallel database mutations.", de: "Isolation verhindert Dirty Reads, Phantom Reads und Non-Repeatable Reads bei parallelen Datenbankänderungen.", ru: "Isolation предотвращает грязное чтение, фантомное чтение и неповторяемое чтение при параллельных изменениях в базе данных.", uk: "Isolation запобігає брудному читанню, фантомному читанню та неповторюваному читанню при паралельних змінах у базі даних." } },
{ category: "EF Core", question: { en: "How do you fix the N+1 Query Problem in Entity Framework?", de: "Wie behebt man das N+1-Abfrageproblem in Entity Framework?", ru: "Как исправить проблему N+1 запросов в Entity Framework?", uk: "Як виправити проблему N+1 запитів в Entity Framework?" }, options: { en: ["By adding multi-threading.", "By using .Include() (Eager Loading) or Projection via .Select() to pull related data in a single SQL query.", "By using .AsNoTracking().", "By opening multiple SQL connections."], de: ["Durch Hinzufügen von Multi-Threading.", "Durch Verwendung von .Include() (Eager Loading) oder Projektion via .Select(), um verwandte Daten in einer einzigen SQL-Abfrage zu laden.", "Durch Verwendung von .AsNoTracking().", "Durch Öffnen mehrerer SQL-Verbindungen."], ru: ["Добавив многопоточность.", "Используя .Include() (Eager Loading) или проекцию через .Select() для получения связанных данных одним SQL-запросом.", "Используя .AsNoTracking().", "Открывая несколько SQL-соединений."], uk: ["Додавши багатопотоковість.", "Використовуючи .Include() (Eager Loading) або проєкцію через .Select() для отримання пов'язаних даних одним SQL-запитом.", "Використовуючи .AsNoTracking().", "Відкриваючи кілька SQL-з'єднань."] }, correctIndex: 1, explanation: { en: "Without .Include, accessing a child property inside a 'foreach' loop triggers a brand new SQL SELECT query per iteration, instantly killing database scale.", de: "Ohne .Include löst der Zugriff auf eine Child-Property innerhalb einer 'foreach'-Schleife pro Iteration eine neue SQL-SELECT-Abfrage aus, was die Datenbank-Skalierung sofort zerstört.", ru: "Без .Include обращение к дочернему свойству внутри цикла 'foreach' вызывает новый SQL SELECT запрос на каждой итерации, мгновенно убивая масштабируемость базы данных.", uk: "Без .Include звернення до дочірньої властивості всередині циклу 'foreach' викликає новий SQL SELECT запит на кожній ітерації, миттєво вбиваючи масштабованість бази даних." } },
{ category: "Redis", question: { en: "How does Redis fundamentally differ from PostgreSQL?", de: "Wie unterscheidet sich Redis grundlegend von PostgreSQL?", ru: "Чем Redis принципиально отличается от PostgreSQL?", uk: "Чим Redis принципово відрізняється від PostgreSQL?" }, options: { en: ["It uses XML.", "Redis is an in-memory, key-value NoSQL data store operating in RAM, giving sub-millisecond speeds suitable for volatile caching.", "Redis forces strict ACID schemas natively.", "Redis is read-only."], de: ["Es verwendet XML.", "Redis ist ein In-Memory-Key-Value-NoSQL-Datenspeicher im RAM, der Geschwindigkeiten unter einer Millisekunde für flüchtiges Caching bietet.", "Redis erzwingt nativ strikte ACID-Schemas.", "Redis ist nur lesbar."], ru: ["Использует XML.", "Redis — это хранилище данных NoSQL типа ключ-значение, работающее в оперативной памяти, обеспечивающее скорость менее миллисекунды для волатильного кэширования.", "Redis нативно обеспечивает строгие ACID-схемы.", "Redis работает только на чтение."], uk: ["Використовує XML.", "Redis — це сховище даних NoSQL типу ключ-значення, що працює в оперативній пам'яті, забезпечуючи швидкість менше мілісекунди для волатильного кешування.", "Redis нативно забезпечує суворі ACID-схеми.", "Redis працює тільки на читання."] }, correctIndex: 1, explanation: { en: "Redis is not a relational DB. It is a dictionary living in RAM. Ideal for caching API responses, rate limit counters, and SignalR backplanes.", de: "Redis ist keine relationale DB. Es ist ein Dictionary im RAM. Ideal für das Caching von API-Antworten, Rate-Limit-Zähler und SignalR-Backplanes.", ru: "Redis — не реляционная БД. Это словарь, живущий в RAM. Идеален для кэширования ответов API, счётчиков rate limit и SignalR backplane.", uk: "Redis — не реляційна БД. Це словник, що живе у RAM. Ідеальний для кешування відповідей API, лічильників rate limit та SignalR backplane." } },
{ category: "Databases", question: { en: "What is a 'Dirty Read'?", de: "Was ist ein 'Dirty Read'?", ru: "Что такое 'Dirty Read'?", uk: "Що таке 'Dirty Read'?" }, options: { en: ["Reading data from an unencrypted connection.", "Transaction A reading data that Transaction B has modified but NOT YET COMMITTED.", "Reading data from a corrupted sector.", "Reading without an Index."], de: ["Daten von einer unverschlüsselten Verbindung lesen.", "Transaktion A liest Daten, die Transaktion B geändert, aber NOCH NICHT COMMITTED hat.", "Daten von einem beschädigten Sektor lesen.", "Lesen ohne einen Index."], ru: ["Чтение данных из незашифрованного соединения.", "Транзакция A читает данные, которые транзакция B изменила, но ЕЩЁ НЕ ЗАФИКСИРОВАЛА.", "Чтение данных с повреждённого сектора.", "Чтение без индекса."], uk: ["Читання даних з незашифрованого з'єднання.", "Транзакція A читає дані, які транзакція B змінила, але ЩЕ НЕ ЗАФІКСУВАЛА.", "Читання даних з пошкодженого сектора.", "Читання без індексу."] }, correctIndex: 1, explanation: { en: "If Transaction B rolls back, Transaction A is now operating on 'fake' data that never officially existed. 'Read Committed' isolation prevents this.", de: "Wenn Transaktion B ein Rollback macht, arbeitet Transaktion A mit 'falschen' Daten, die offiziell nie existierten. 'Read Committed'-Isolation verhindert dies.", ru: "Если транзакция B откатывается, транзакция A работает с 'фиктивными' данными, которые официально никогда не существовали. Изоляция 'Read Committed' предотвращает это.", uk: "Якщо транзакція B відкочується, транзакція A працює з 'фіктивними' даними, які офіційно ніколи не існували. Ізоляція 'Read Committed' запобігає цьому." } },
{ category: "PostgreSQL", question: { en: "What is the specific role of the VACUUM command in PostgreSQL?", de: "Was ist die spezifische Rolle des VACUUM-Befehls in PostgreSQL?", ru: "Какова конкретная роль команды VACUUM в PostgreSQL?", uk: "Яка конкретна роль команди VACUUM у PostgreSQL?" }, options: { en: ["It deletes tables that haven't been queried in 30 days.", "It cleans up 'dead tuples' (old versions of rows created by MVCC updates/deletes), recovering disk space and index performance.", "It clears the transaction log.", "It backs up the server schema."], de: ["Es löscht Tabellen, die 30 Tage nicht abgefragt wurden.", "Es bereinigt 'Dead Tuples' (alte Versionen von Zeilen, die durch MVCC-Updates/Deletes entstanden sind) und stellt Speicherplatz und Index-Performance wieder her.", "Es leert das Transaktionslog.", "Es sichert das Server-Schema."], ru: ["Удаляет таблицы, к которым не обращались 30 дней.", "Очищает 'мёртвые кортежи' (старые версии строк, созданные MVCC при обновлениях/удалениях), восстанавливая дисковое пространство и производительность индексов.", "Очищает журнал транзакций.", "Создаёт резервную копию схемы сервера."], uk: ["Видаляє таблиці, до яких не зверталися 30 днів.", "Очищає 'мертві кортежі' (старі версії рядків, створені MVCC при оновленнях/видаленнях), відновлюючи дисковий простір та продуктивність індексів.", "Очищає журнал транзакцій.", "Створює резервну копію схеми сервера."] }, correctIndex: 1, explanation: { en: "Postgres uses Multi-Version Concurrency Control. Updates don't overwrite rows, they hide the old one and write a new one. VACUUM is required to physically delete the hidden dead rows.", de: "Postgres verwendet Multi-Version Concurrency Control. Updates überschreiben keine Zeilen, sondern verstecken die alte und schreiben eine neue. VACUUM ist erforderlich, um die versteckten toten Zeilen physisch zu löschen.", ru: "Postgres использует Multi-Version Concurrency Control. Обновления не перезаписывают строки, а скрывают старую и записывают новую. VACUUM необходим для физического удаления скрытых мёртвых строк.", uk: "Postgres використовує Multi-Version Concurrency Control. Оновлення не перезаписують рядки, а приховують старий та записують новий. VACUUM необхідний для фізичного видалення прихованих мертвих рядків." } },
{ category: "Performance Optimization", question: { en: "What is the Cache-Aside pattern?", de: "Was ist das Cache-Aside-Pattern?", ru: "Что такое паттерн Cache-Aside?", uk: "Що таке патерн Cache-Aside?" }, options: { en: ["Storing cache in the browser LocalStorage.", "App checks Redis -> Returns if hit. If miss -> Queries Database -> App writes to Redis -> Returns to user.", "Redis syncs directly to the Database skipping the application layer.", "Caching the UI layout only."], de: ["Cache im Browser-LocalStorage speichern.", "App prüft Redis -> Gibt zurück bei Treffer. Bei Miss -> Datenbank abfragen -> App schreibt in Redis -> Gibt an Benutzer zurück.", "Redis synchronisiert direkt mit der Datenbank unter Umgehung der Anwendungsschicht.", "Nur das UI-Layout cachen."], ru: ["Хранение кэша в LocalStorage браузера.", "Приложение проверяет Redis -> Возвращает при попадании. При промахе -> Запрашивает базу данных -> Приложение записывает в Redis -> Возвращает пользователю.", "Redis синхронизируется напрямую с базой данных, минуя прикладной слой.", "Кэширование только макета UI."], uk: ["Зберігання кешу у LocalStorage браузера.", "Застосунок перевіряє Redis -> Повертає при влучанні. При промаху -> Запитує базу даних -> Застосунок записує у Redis -> Повертає користувачу.", "Redis синхронізується напряму з базою даних, оминаючи прикладний шар.", "Кешування тільки макета UI."] }, correctIndex: 1, explanation: { en: "The application code is responsible for checking the cache, and populating it if a miss occurs.", de: "Der Anwendungscode ist verantwortlich für die Cache-Prüfung und das Befüllen bei einem Miss.", ru: "Код приложения отвечает за проверку кэша и его заполнение при промахе.", uk: "Код застосунку відповідає за перевірку кешу та його заповнення при промаху." } },
{ category: "Redis Integration", question: { en: "How do you avoid a 'Race Condition' overwriting a key in Redis?", de: "Wie vermeidet man eine 'Race Condition' beim Überschreiben eines Keys in Redis?", ru: "Как избежать 'Race Condition' при перезаписи ключа в Redis?", uk: "Як уникнути 'Race Condition' при перезаписі ключа у Redis?" }, options: { en: ["Use Redis Transactions (MULTI/EXEC), Lua scripting, or a Distributed Lock (Redlock).", "Redis single-threading prevents all race conditions natively.", "Add Thread.Sleep().", "Store a boolean flag in Postgres first."], de: ["Redis Transactions (MULTI/EXEC), Lua-Scripting oder einen Distributed Lock (Redlock) verwenden.", "Redis-Single-Threading verhindert alle Race Conditions nativ.", "Thread.Sleep() hinzufügen.", "Zuerst ein Boolean-Flag in Postgres speichern."], ru: ["Использовать Redis Transactions (MULTI/EXEC), Lua-скрипты или распределённую блокировку (Redlock).", "Однопоточность Redis нативно предотвращает все Race Conditions.", "Добавить Thread.Sleep().", "Сначала сохранить булев флаг в Postgres."], uk: ["Використовувати Redis Transactions (MULTI/EXEC), Lua-скрипти або розподілене блокування (Redlock).", "Однопотоковість Redis нативно запобігає всім Race Conditions.", "Додати Thread.Sleep().", "Спочатку зберегти булевий прапорець у Postgres."] }, correctIndex: 0, explanation: { en: "Because the App-to-Redis bridge involves network latency, reading a value and writing it back allows a second pod to read the old value in between. Lua scripts execute atomically entirely inside Redis.", de: "Da die App-zu-Redis-Brücke Netzwerklatenz beinhaltet, ermöglicht das Lesen und Zurückschreiben eines Werts, dass ein zweiter Pod dazwischen den alten Wert liest. Lua-Skripte werden atomar vollständig innerhalb von Redis ausgeführt.", ru: "Поскольку мост App-Redis включает сетевую задержку, чтение значения и запись обратно позволяет второму pod прочитать старое значение между операциями. Lua-скрипты выполняются атомарно полностью внутри Redis.", uk: "Оскільки міст App-Redis включає мережеву затримку, читання значення та запис назад дозволяє другому pod прочитати старе значення між операціями. Lua-скрипти виконуються атомарно повністю всередині Redis." } },
{ category: "EF Core", question: { en: "What is the massive benefit of IQueryable.AsNoTracking()?", de: "Was ist der grosse Vorteil von IQueryable.AsNoTracking()?", ru: "В чём огромное преимущество IQueryable.AsNoTracking()?", uk: "У чому величезна перевага IQueryable.AsNoTracking()?" }, options: { en: ["It disables SQL injection protection.", "It bypasses the EF Core Change Tracker, massively reducing memory overhead and execution time for read-only queries.", "It allows reading uncommitted DB transactions.", "It drops the index during query."], de: ["Es deaktiviert den SQL-Injection-Schutz.", "Es umgeht den EF Core Change Tracker und reduziert massiv den Speicher-Overhead und die Ausführungszeit für Nur-Lese-Abfragen.", "Es ermöglicht das Lesen nicht committeter DB-Transaktionen.", "Es entfernt den Index während der Abfrage."], ru: ["Отключает защиту от SQL-инъекций.", "Обходит EF Core Change Tracker, значительно сокращая потребление памяти и время выполнения для запросов только на чтение.", "Позволяет читать незафиксированные транзакции БД.", "Удаляет индекс во время запроса."], uk: ["Вимикає захист від SQL-ін'єкцій.", "Обходить EF Core Change Tracker, значно зменшуючи споживання пам'яті та час виконання для запитів тільки на читання.", "Дозволяє читати незафіксовані транзакції БД.", "Видаляє індекс під час запиту."] }, correctIndex: 1, explanation: { en: "If you only need to output data to a user via an API and don't plan to call SaveChanges(), AsNoTracking prevents EF from building internal memory snapshots.", de: "Wenn Sie Daten nur über eine API an einen Benutzer ausgeben und nicht planen, SaveChanges() aufzurufen, verhindert AsNoTracking, dass EF interne Speicher-Snapshots erstellt.", ru: "Если вам нужно только вывести данные пользователю через API и вы не планируете вызывать SaveChanges(), AsNoTracking предотвращает создание внутренних снимков памяти EF.", uk: "Якщо вам потрібно лише вивести дані користувачу через API і ви не плануєте викликати SaveChanges(), AsNoTracking запобігає створенню внутрішніх знімків пам'яті EF." } },
