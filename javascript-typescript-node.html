{ category: "JS Core", question: { en: "What is the difference between var, let, and const?", de: "Was ist der Unterschied zwischen var, let und const?", ru: "В чём разница между var, let и const?", uk: "В чому різниця між var, let та const?" }, options: { en: ["They are interchangeable.", "var is function-scoped and hoisted. let and const are block-scoped. const prevents reassignment (but not mutation of objects).", "const makes objects immutable.", "let is deprecated in ES2024."], de: ["Sie sind austauschbar.", "var ist funktionsbezogen und wird gehoisted. let und const sind blockbezogen. const verhindert Neuzuweisung (aber nicht die Mutation von Objekten).", "const macht Objekte unveränderlich.", "let ist seit ES2024 veraltet."], ru: ["Они взаимозаменяемы.", "var имеет функциональную область видимости и всплывает (hoisting). let и const имеют блочную область видимости. const предотвращает переназначение (но не мутацию объектов).", "const делает объекты неизменяемыми.", "let устарел в ES2024."], uk: ["Вони взаємозамінні.", "var має функціональну область видимості та спливає (hoisting). let і const мають блочну область видимості. const запобігає перепризначенню (але не мутації об'єктів).", "const робить об'єкти незмінними.", "let застарів у ES2024."] }, correctIndex: 1, explanation: { en: "var leaks out of blocks (if/for). let/const respect block scope. const x = {a:1}; x.a = 2 is valid — const prevents x = newValue, not property mutation.", de: "var verlässt Blöcke (if/for). let/const respektieren den Blockscope. const x = {a:1}; x.a = 2 ist gültig — const verhindert x = neuerWert, nicht die Mutation von Eigenschaften.", ru: "var выходит за пределы блоков (if/for). let/const уважают блочную область видимости. const x = {a:1}; x.a = 2 допустимо — const предотвращает x = новоеЗначение, а не мутацию свойств.", uk: "var виходить за межі блоків (if/for). let/const поважають блочну область видимості. const x = {a:1}; x.a = 2 допустимо — const запобігає x = новеЗначення, а не мутації властивостей." } },
{ category: "JS Core", question: { en: "What is a Closure in JavaScript?", de: "Was ist ein Closure in JavaScript?", ru: "Что такое Closure в JavaScript?", uk: "Що таке Closure в JavaScript?" }, options: { en: ["A way to close a browser tab programmatically.", "A function that retains access to its outer scope's variables even after the outer function has returned.", "A method to seal an object.", "A pattern for closing database connections."], de: ["Eine Möglichkeit, einen Browser-Tab programmatisch zu schliessen.", "Eine Funktion, die Zugriff auf die Variablen ihres äusseren Scopes behält, auch nachdem die äussere Funktion zurückgekehrt ist.", "Eine Methode, um ein Objekt zu versiegeln.", "Ein Muster zum Schliessen von Datenbankverbindungen."], ru: ["Способ программно закрыть вкладку браузера.", "Функция, которая сохраняет доступ к переменным внешней области видимости даже после завершения внешней функции.", "Метод для запечатывания объекта.", "Паттерн для закрытия соединений с базой данных."], uk: ["Спосіб програмно закрити вкладку браузера.", "Функція, яка зберігає доступ до змінних зовнішньої області видимості навіть після завершення зовнішньої функції.", "Метод для запечатування об'єкта.", "Патерн для закриття з'єднань з базою даних."] }, correctIndex: 1, explanation: { en: "function outer() { let x = 10; return function inner() { return x; } } — inner() still accesses x after outer() finished. The inner function 'closes over' x.", de: "function outer() { let x = 10; return function inner() { return x; } } — inner() greift noch auf x zu, nachdem outer() beendet ist. Die innere Funktion 'schliesst über' x.", ru: "function outer() { let x = 10; return function inner() { return x; } } — inner() всё ещё имеет доступ к x после завершения outer(). Внутренняя функция «замыкается» на x.", uk: "function outer() { let x = 10; return function inner() { return x; } } — inner() досі має доступ до x після завершення outer(). Внутрішня функція «замикається» на x." } },
{ category: "JS Core", question: { en: "What does the Event Loop do in JavaScript?", de: "Was macht der Event Loop in JavaScript?", ru: "Что делает Event Loop в JavaScript?", uk: "Що робить Event Loop у JavaScript?" }, options: { en: ["It loops through DOM events.", "It continuously checks the call stack: if empty, it picks the next callback from the microtask queue (promises), then the macrotask queue (setTimeout, I/O).", "It manages for/while loops.", "It synchronizes multi-threaded execution."], de: ["Er durchläuft DOM-Events.", "Er prüft kontinuierlich den Call Stack: wenn leer, nimmt er den nächsten Callback aus der Microtask-Queue (Promises), dann aus der Macrotask-Queue (setTimeout, I/O).", "Er verwaltet for/while-Schleifen.", "Er synchronisiert Multithread-Ausführung."], ru: ["Он перебирает события DOM.", "Он непрерывно проверяет стек вызовов: если пуст, берёт следующий callback из очереди микрозадач (promises), затем из очереди макрозадач (setTimeout, I/O).", "Он управляет циклами for/while.", "Он синхронизирует многопоточное выполнение."], uk: ["Він перебирає події DOM.", "Він безперервно перевіряє стек викликів: якщо порожній, бере наступний callback з черги мікрозадач (promises), потім з черги макрозадач (setTimeout, I/O).", "Він керує циклами for/while.", "Він синхронізує багатопотокове виконання."] }, correctIndex: 1, explanation: { en: "JS is single-threaded. The event loop enables async: run code → when stack empty → drain microtask queue (Promise.then) → pick one macrotask (setTimeout) → repeat.", de: "JS ist single-threaded. Der Event Loop ermöglicht Async: Code ausführen → wenn Stack leer → Microtask-Queue leeren (Promise.then) → einen Macrotask nehmen (setTimeout) → wiederholen.", ru: "JS однопоточный. Event Loop обеспечивает асинхронность: выполнить код → когда стек пуст → опустошить очередь микрозадач (Promise.then) → взять одну макрозадачу (setTimeout) → повторить.", uk: "JS однопотоковий. Event Loop забезпечує асинхронність: виконати код → коли стек порожній → спустошити чергу мікрозадач (Promise.then) → взяти одну макрозадачу (setTimeout) → повторити." } },
{ category: "JS Core", question: { en: "What is the difference between == and ===?", de: "Was ist der Unterschied zwischen == und ===?", ru: "В чём разница между == и ===?", uk: "В чому різниця між == та ===?" }, options: { en: ["=== is for strings only.", "== performs type coercion before comparing (e.g., '5' == 5 is true). === compares value AND type with no coercion (e.g., '5' === 5 is false).", "== is faster.", "They're identical in strict mode."], de: ["=== ist nur für Strings.", "== führt Typumwandlung vor dem Vergleich durch (z.B. '5' == 5 ist true). === vergleicht Wert UND Typ ohne Umwandlung (z.B. '5' === 5 ist false).", "== ist schneller.", "Sie sind im Strict Mode identisch."], ru: ["=== только для строк.", "== выполняет приведение типов перед сравнением (например, '5' == 5 — true). === сравнивает значение И тип без приведения (например, '5' === 5 — false).", "== работает быстрее.", "Они идентичны в строгом режиме."], uk: ["=== лише для рядків.", "== виконує приведення типів перед порівнянням (наприклад, '5' == 5 — true). === порівнює значення ТА тип без приведення (наприклад, '5' === 5 — false).", "== працює швидше.", "Вони ідентичні у строгому режимі."] }, correctIndex: 1, explanation: { en: "== follows complex coercion rules: '' == 0 is true, null == undefined is true, but null == 0 is false. Always use === to avoid these gotchas.", de: "== folgt komplexen Umwandlungsregeln: '' == 0 ist true, null == undefined ist true, aber null == 0 ist false. Immer === verwenden, um diese Fallen zu vermeiden.", ru: "== следует сложным правилам приведения: '' == 0 — true, null == undefined — true, но null == 0 — false. Всегда используйте ===, чтобы избежать этих ловушек.", uk: "== слідує складним правилам приведення: '' == 0 — true, null == undefined — true, але null == 0 — false. Завжди використовуйте ===, щоб уникнути цих пасток." } },
{ category: "JS Core", question: { en: "What is Prototypal Inheritance?", de: "Was ist prototypische Vererbung?", ru: "Что такое прототипное наследование?", uk: "Що таке прототипне наслідування?" }, options: { en: ["It's identical to class-based inheritance in Java.", "Objects inherit directly from other objects via the prototype chain. When a property isn't found on an object, JS looks up the __proto__ chain.", "It only works with the class keyword.", "Prototypal inheritance was removed in ES6."], de: ["Es ist identisch mit klassenbasierter Vererbung in Java.", "Objekte erben direkt von anderen Objekten über die Prototypen-Kette. Wenn eine Eigenschaft nicht auf einem Objekt gefunden wird, sucht JS die __proto__-Kette hoch.", "Es funktioniert nur mit dem class-Schlüsselwort.", "Prototypische Vererbung wurde in ES6 entfernt."], ru: ["Оно идентично классовому наследованию в Java.", "Объекты наследуют напрямую от других объектов через цепочку прототипов. Когда свойство не найдено на объекте, JS ищет вверх по цепочке __proto__.", "Оно работает только с ключевым словом class.", "Прототипное наследование было удалено в ES6."], uk: ["Воно ідентичне класовому наслідуванню в Java.", "Об'єкти наслідують безпосередньо від інших об'єктів через ланцюжок прототипів. Коли властивість не знайдено на об'єкті, JS шукає вгору по ланцюжку __proto__.", "Воно працює лише з ключовим словом class.", "Прототипне наслідування було видалено в ES6."] }, correctIndex: 1, explanation: { en: "Every JS object has an internal [[Prototype]]. obj.method() → not on obj → check obj.__proto__ → not there → check obj.__proto__.__proto__ → … until null. Classes are syntactic sugar over this.", de: "Jedes JS-Objekt hat ein internes [[Prototype]]. obj.method() → nicht auf obj → obj.__proto__ prüfen → nicht da → obj.__proto__.__proto__ prüfen → … bis null. Klassen sind syntaktischer Zucker darüber.", ru: "Каждый объект JS имеет внутренний [[Prototype]]. obj.method() → нет на obj → проверить obj.__proto__ → нет там → проверить obj.__proto__.__proto__ → … до null. Классы — синтаксический сахар поверх этого.", uk: "Кожен об'єкт JS має внутрішній [[Prototype]]. obj.method() → немає на obj → перевірити obj.__proto__ → немає там → перевірити obj.__proto__.__proto__ → … до null. Класи — синтаксичний цукор поверх цього." } },
{ category: "JS Core", question: { en: "What is the difference between null and undefined?", de: "Was ist der Unterschied zwischen null und undefined?", ru: "В чём разница между null и undefined?", uk: "В чому різниця між null та undefined?" }, options: { en: ["They're the same.", "undefined means a variable was declared but not assigned. null is an intentional assignment meaning 'no value'. typeof null is 'object' (historic bug).", "null is for numbers, undefined for strings.", "undefined doesn't exist in strict mode."], de: ["Sie sind dasselbe.", "undefined bedeutet, eine Variable wurde deklariert, aber nicht zugewiesen. null ist eine bewusste Zuweisung mit der Bedeutung 'kein Wert'. typeof null ist 'object' (historischer Bug).", "null ist für Zahlen, undefined für Strings.", "undefined existiert im Strict Mode nicht."], ru: ["Они одинаковы.", "undefined означает, что переменная объявлена, но не присвоена. null — намеренное присвоение, означающее «нет значения». typeof null — 'object' (исторический баг).", "null для чисел, undefined для строк.", "undefined не существует в строгом режиме."], uk: ["Вони однакові.", "undefined означає, що змінна оголошена, але не присвоєна. null — навмисне присвоєння, що означає «немає значення». typeof null — 'object' (історичний баг).", "null для чисел, undefined для рядків.", "undefined не існує у строгому режимі."] }, correctIndex: 1, explanation: { en: "let x; → x is undefined. let x = null; → explicitly 'no value'. Both are falsy. null == undefined is true, but null === undefined is false.", de: "let x; → x ist undefined. let x = null; → explizit 'kein Wert'. Beide sind falsy. null == undefined ist true, aber null === undefined ist false.", ru: "let x; → x — undefined. let x = null; → явно «нет значения». Оба falsy. null == undefined — true, но null === undefined — false.", uk: "let x; → x — undefined. let x = null; → явно «немає значення». Обидва falsy. null == undefined — true, але null === undefined — false." } },
{ category: "JS Core", question: { en: "What does 'this' refer to in JavaScript?", de: "Worauf bezieht sich 'this' in JavaScript?", ru: "На что ссылается 'this' в JavaScript?", uk: "На що посилається 'this' у JavaScript?" }, options: { en: ["Always the global object.", "It depends on HOW a function is called: method call → the object; standalone → global/undefined(strict); arrow function → lexically inherited from enclosing scope.", "Always the function itself.", "The DOM element that triggered the event."], de: ["Immer das globale Objekt.", "Es hängt davon ab, WIE eine Funktion aufgerufen wird: Methodenaufruf → das Objekt; alleinstehend → global/undefined(strict); Arrow Function → lexikalisch vom umgebenden Scope geerbt.", "Immer die Funktion selbst.", "Das DOM-Element, das das Event ausgelöst hat."], ru: ["Всегда глобальный объект.", "Зависит от ТОГО, КАК вызвана функция: вызов метода → объект; отдельный вызов → global/undefined(strict); стрелочная функция → лексически наследуется от окружающей области видимости.", "Всегда сама функция.", "DOM-элемент, вызвавший событие."], uk: ["Завжди глобальний об'єкт.", "Залежить від ТОГО, ЯК викликана функція: виклик методу → об'єкт; окремий виклик → global/undefined(strict); стрілочна функція → лексично наслідується від оточуючої області видимості.", "Завжди сама функція.", "DOM-елемент, що викликав подію."] }, correctIndex: 1, explanation: { en: "obj.method() → this is obj. method() → this is window/undefined. Arrow functions don't have their own 'this' — they capture it from the surrounding scope at creation time.", de: "obj.method() → this ist obj. method() → this ist window/undefined. Arrow Functions haben kein eigenes 'this' — sie erfassen es vom umgebenden Scope bei der Erstellung.", ru: "obj.method() → this — obj. method() → this — window/undefined. Стрелочные функции не имеют собственного 'this' — они захватывают его из окружающей области видимости при создании.", uk: "obj.method() → this — obj. method() → this — window/undefined. Стрілочні функції не мають власного 'this' — вони захоплюють його з оточуючої області видимості при створенні." } },
{ category: "JS Core", question: { en: "What are WeakMap and WeakSet used for?", de: "Wofür werden WeakMap und WeakSet verwendet?", ru: "Для чего используются WeakMap и WeakSet?", uk: "Для чого використовуються WeakMap та WeakSet?" }, options: { en: ["For storing weak passwords.", "They hold 'weak' references to keys/values, allowing garbage collection if there's no other reference. Perfect for caching metadata about objects without preventing GC.", "They're slower versions of Map and Set.", "They store only primitive values."], de: ["Zum Speichern schwacher Passwörter.", "Sie halten 'schwache' Referenzen auf Schlüssel/Werte, was Garbage Collection erlaubt, wenn keine andere Referenz existiert. Perfekt zum Cachen von Metadaten über Objekte ohne GC zu verhindern.", "Sie sind langsamere Versionen von Map und Set.", "Sie speichern nur primitive Werte."], ru: ["Для хранения слабых паролей.", "Они хранят «слабые» ссылки на ключи/значения, позволяя сборку мусора, если нет других ссылок. Идеально для кеширования метаданных об объектах без блокировки GC.", "Они более медленные версии Map и Set.", "Они хранят только примитивные значения."], uk: ["Для зберігання слабких паролів.", "Вони зберігають «слабкі» посилання на ключі/значення, дозволяючи збирання сміття, якщо немає інших посилань. Ідеально для кешування метаданих про об'єкти без блокування GC.", "Вони повільніші версії Map та Set.", "Вони зберігають лише примітивні значення."] }, correctIndex: 1, explanation: { en: "WeakMap: keys must be objects, and if the key object is GC'd, the entry disappears. Use case: storing private data or DOM metadata without memory leaks.", de: "WeakMap: Schlüssel müssen Objekte sein, und wenn das Schlüsselobjekt vom GC entfernt wird, verschwindet der Eintrag. Anwendungsfall: Speicherung privater Daten oder DOM-Metadaten ohne Memory Leaks.", ru: "WeakMap: ключами должны быть объекты, и если объект-ключ собран GC, запись исчезает. Применение: хранение приватных данных или метаданных DOM без утечек памяти.", uk: "WeakMap: ключами мають бути об'єкти, і якщо об'єкт-ключ зібраний GC, запис зникає. Застосування: зберігання приватних даних або метаданих DOM без витоків пам'яті." } },
{ category: "JS Core", question: { en: "What is the Temporal Dead Zone (TDZ)?", de: "Was ist die Temporal Dead Zone (TDZ)?", ru: "Что такое Temporal Dead Zone (TDZ)?", uk: "Що таке Temporal Dead Zone (TDZ)?" }, options: { en: ["A timezone handling feature.", "The period between entering a scope and the let/const declaration being reached — accessing the variable in this zone throws ReferenceError.", "A zone where setTimeout doesn't work.", "A deprecated feature."], de: ["Eine Zeitzonen-Funktion.", "Der Zeitraum zwischen dem Betreten eines Scopes und dem Erreichen der let/const-Deklaration — der Zugriff auf die Variable in dieser Zone wirft einen ReferenceError.", "Eine Zone, in der setTimeout nicht funktioniert.", "Eine veraltete Funktion."], ru: ["Функция обработки часовых поясов.", "Период между входом в область видимости и достижением объявления let/const — обращение к переменной в этой зоне выбрасывает ReferenceError.", "Зона, где setTimeout не работает.", "Устаревшая функция."], uk: ["Функція обробки часових поясів.", "Період між входом в область видимості та досягненням оголошення let/const — звернення до змінної в цій зоні викидає ReferenceError.", "Зона, де setTimeout не працює.", "Застаріла функція."] }, correctIndex: 1, explanation: { en: "{ console.log(x); let x = 5; } throws ReferenceError. With var, it would log 'undefined' (hoisted). TDZ enforces declaration-before-use, catching bugs early.", de: "{ console.log(x); let x = 5; } wirft ReferenceError. Mit var würde 'undefined' ausgegeben (gehoisted). TDZ erzwingt Deklaration-vor-Nutzung und fängt Bugs früh ab.", ru: "{ console.log(x); let x = 5; } выбрасывает ReferenceError. С var вывело бы 'undefined' (hoisting). TDZ обеспечивает объявление-перед-использованием, выявляя баги раньше.", uk: "{ console.log(x); let x = 5; } викидає ReferenceError. З var вивело б 'undefined' (hoisting). TDZ забезпечує оголошення-перед-використанням, виявляючи баги раніше." } },
{ category: "JS Core", question: { en: "What does Object.freeze() do vs Object.seal()?", de: "Was macht Object.freeze() im Vergleich zu Object.seal()?", ru: "Что делает Object.freeze() в сравнении с Object.seal()?", uk: "Що робить Object.freeze() у порівнянні з Object.seal()?" }, options: { en: ["They're identical.", "freeze: no add, delete, or modify properties (deep immutability needs recursive freeze). seal: no add/delete but existing properties CAN be modified.", "freeze is for arrays, seal for objects.", "Both only work in strict mode."], de: ["Sie sind identisch.", "freeze: kein Hinzufügen, Löschen oder Ändern von Eigenschaften (tiefe Unveränderlichkeit erfordert rekursives freeze). seal: kein Hinzufügen/Löschen, aber bestehende Eigenschaften KÖNNEN geändert werden.", "freeze ist für Arrays, seal für Objekte.", "Beide funktionieren nur im Strict Mode."], ru: ["Они идентичны.", "freeze: нельзя добавлять, удалять или изменять свойства (глубокая неизменяемость требует рекурсивного freeze). seal: нельзя добавлять/удалять, но существующие свойства МОЖНО изменять.", "freeze для массивов, seal для объектов.", "Оба работают только в строгом режиме."], uk: ["Вони ідентичні.", "freeze: не можна додавати, видаляти або змінювати властивості (глибока незмінність потребує рекурсивного freeze). seal: не можна додавати/видаляти, але існуючі властивості МОЖНА змінювати.", "freeze для масивів, seal для об'єктів.", "Обидва працюють лише у строгому режимі."] }, correctIndex: 1, explanation: { en: "Object.freeze({a:1}) → can't change a. Object.seal({a:1}) → can change a to 2, but can't add b. Neither is deep — nested objects remain mutable unless recursively frozen.", de: "Object.freeze({a:1}) → a kann nicht geändert werden. Object.seal({a:1}) → a kann auf 2 geändert werden, aber b kann nicht hinzugefügt werden. Keines ist tief — verschachtelte Objekte bleiben veränderbar, wenn nicht rekursiv eingefroren.", ru: "Object.freeze({a:1}) → нельзя изменить a. Object.seal({a:1}) → можно изменить a на 2, но нельзя добавить b. Ни одно не глубокое — вложенные объекты остаются изменяемыми без рекурсивной заморозки.", uk: "Object.freeze({a:1}) → не можна змінити a. Object.seal({a:1}) → можна змінити a на 2, але не можна додати b. Жодне не глибоке — вкладені об'єкти залишаються змінними без рекурсивної заморозки." } },
// ===== ASYNC JAVASCRIPT =====
{ category: "Async JS", question: { en: "What is the difference between Microtasks and Macrotasks?", de: "Was ist der Unterschied zwischen Microtasks und Macrotasks?", ru: "В чём разница между микрозадачами и макрозадачами?", uk: "В чому різниця між мікрозадачами та макрозадачами?" }, options: { en: ["They execute in the same queue.", "Microtasks (Promise.then, queueMicrotask) run BEFORE the next macrotask (setTimeout, setInterval, I/O). All microtasks drain before one macrotask runs.", "Macrotasks always have higher priority.", "Microtasks are for UI, macrotasks for network."], de: ["Sie werden in derselben Queue ausgeführt.", "Microtasks (Promise.then, queueMicrotask) laufen VOR dem nächsten Macrotask (setTimeout, setInterval, I/O). Alle Microtasks werden abgearbeitet, bevor ein Macrotask läuft.", "Macrotasks haben immer höhere Priorität.", "Microtasks sind für UI, Macrotasks für Netzwerk."], ru: ["Они выполняются в одной очереди.", "Микрозадачи (Promise.then, queueMicrotask) выполняются ДО следующей макрозадачи (setTimeout, setInterval, I/O). Все микрозадачи опустошаются до выполнения одной макрозадачи.", "Макрозадачи всегда имеют более высокий приоритет.", "Микрозадачи для UI, макрозадачи для сети."], uk: ["Вони виконуються в одній черзі.", "Мікрозадачі (Promise.then, queueMicrotask) виконуються ДО наступної макрозадачі (setTimeout, setInterval, I/O). Усі мікрозадачі спустошуються до виконання однієї макрозадачі.", "Макрозадачі завжди мають вищий пріоритет.", "Мікрозадачі для UI, макрозадачі для мережі."] }, correctIndex: 1, explanation: { en: "Promise.resolve().then(() => 'micro'); setTimeout(() => 'macro', 0); Output: micro then macro. Microtask queue fully drains before the event loop picks the next macrotask.", de: "Promise.resolve().then(() => 'micro'); setTimeout(() => 'macro', 0); Ausgabe: micro dann macro. Die Microtask-Queue wird vollständig geleert, bevor der Event Loop den nächsten Macrotask nimmt.", ru: "Promise.resolve().then(() => 'micro'); setTimeout(() => 'macro', 0); Вывод: micro, затем macro. Очередь микрозадач полностью опустошается до того, как Event Loop возьмёт следующую макрозадачу.", uk: "Promise.resolve().then(() => 'micro'); setTimeout(() => 'macro', 0); Вивід: micro, потім macro. Черга мікрозадач повністю спустошується до того, як Event Loop візьме наступну макрозадачу." } },
{ category: "Async JS", question: { en: "What does Promise.allSettled() do differently from Promise.all()?", de: "Was macht Promise.allSettled() anders als Promise.all()?", ru: "Чем Promise.allSettled() отличается от Promise.all()?", uk: "Чим Promise.allSettled() відрізняється від Promise.all()?" }, options: { en: ["They're identical.", "Promise.all() rejects immediately if ANY promise rejects. Promise.allSettled() waits for ALL promises to complete, returning each result as {status, value/reason}.", "allSettled is slower because it runs sequentially.", "all() ignores rejections."], de: ["Sie sind identisch.", "Promise.all() wird sofort abgelehnt, wenn IRGENDEIN Promise abgelehnt wird. Promise.allSettled() wartet auf ALLE Promises und gibt jedes Ergebnis als {status, value/reason} zurück.", "allSettled ist langsamer, weil es sequenziell läuft.", "all() ignoriert Ablehnungen."], ru: ["Они идентичны.", "Promise.all() отклоняется немедленно, если ЛЮБОЙ промис отклоняется. Promise.allSettled() ждёт завершения ВСЕХ промисов, возвращая каждый результат как {status, value/reason}.", "allSettled медленнее, потому что выполняется последовательно.", "all() игнорирует отклонения."], uk: ["Вони ідентичні.", "Promise.all() відхиляється негайно, якщо БУДЬ-ЯКИЙ проміс відхиляється. Promise.allSettled() чекає завершення УСІХ промісів, повертаючи кожен результат як {status, value/reason}.", "allSettled повільніший, бо виконується послідовно.", "all() ігнорує відхилення."] }, correctIndex: 1, explanation: { en: "Use all() when you need everything to succeed (parallel API calls that all must work). Use allSettled() when you want results regardless of individual failures.", de: "Verwende all(), wenn alles erfolgreich sein muss (parallele API-Aufrufe, die alle funktionieren müssen). Verwende allSettled(), wenn du Ergebnisse unabhängig von einzelnen Fehlern willst.", ru: "Используйте all(), когда всё должно завершиться успешно (параллельные API-вызовы, которые все должны работать). Используйте allSettled(), когда нужны результаты независимо от отдельных ошибок.", uk: "Використовуйте all(), коли все має завершитися успішно (паралельні API-виклики, які всі повинні працювати). Використовуйте allSettled(), коли потрібні результати незалежно від окремих помилок." } },
{ category: "Async JS", question: { en: "What problem does async/await solve over raw Promises?", de: "Welches Problem löst async/await gegenüber reinen Promises?", ru: "Какую проблему решает async/await по сравнению с обычными Promise?", uk: "Яку проблему вирішує async/await порівняно зі звичайними Promise?" }, options: { en: ["It makes code run faster.", "It provides synchronous-looking syntax for async code, eliminating deeply nested .then() chains (callback hell) and making error handling with try/catch natural.", "It replaces the event loop.", "It enables multi-threading."], de: ["Es macht den Code schneller.", "Es bietet synchron aussehende Syntax für asynchronen Code, eliminiert tief verschachtelte .then()-Ketten (Callback Hell) und macht Fehlerbehandlung mit try/catch natürlich.", "Es ersetzt den Event Loop.", "Es ermöglicht Multithreading."], ru: ["Он делает код быстрее.", "Он предоставляет синтаксис, выглядящий синхронным, для асинхронного кода, устраняя глубоко вложенные цепочки .then() (callback hell) и делая обработку ошибок через try/catch естественной.", "Он заменяет Event Loop.", "Он включает многопоточность."], uk: ["Він робить код швидшим.", "Він надає синтаксис, що виглядає синхронним, для асинхронного коду, усуваючи глибоко вкладені ланцюжки .then() (callback hell) та роблячи обробку помилок через try/catch природною.", "Він замінює Event Loop.", "Він вмикає багатопотоковість."] }, correctIndex: 1, explanation: { en: "try { const user = await getUser(); const orders = await getOrders(user.id); } catch(e) { ... } — reads top-to-bottom like sync code, but is fully non-blocking.", de: "try { const user = await getUser(); const orders = await getOrders(user.id); } catch(e) { ... } — liest sich von oben nach unten wie synchroner Code, ist aber vollständig non-blocking.", ru: "try { const user = await getUser(); const orders = await getOrders(user.id); } catch(e) { ... } — читается сверху вниз как синхронный код, но полностью неблокирующий.", uk: "try { const user = await getUser(); const orders = await getOrders(user.id); } catch(e) { ... } — читається зверху вниз як синхронний код, але повністю неблокуючий." } },
{ category: "Async JS", question: { en: "What is an unhandled Promise rejection and why is it dangerous?", de: "Was ist eine unbehandelte Promise-Ablehnung und warum ist sie gefährlich?", ru: "Что такое необработанное отклонение Promise и почему это опасно?", uk: "Що таке необроблене відхилення Promise і чому це небезпечно?" }, options: { en: ["It automatically retries the operation.", "A Promise that rejects with no .catch() handler — in Node.js this can crash the process (UnhandledPromiseRejection), and errors silently disappear in browsers.", "It pauses the event loop.", "It only affects rejected fetch() calls."], de: ["Es wiederholt die Operation automatisch.", "Ein Promise, das ohne .catch()-Handler abgelehnt wird — in Node.js kann dies den Prozess zum Absturz bringen (UnhandledPromiseRejection), und in Browsern verschwinden Fehler lautlos.", "Es pausiert den Event Loop.", "Es betrifft nur abgelehnte fetch()-Aufrufe."], ru: ["Он автоматически повторяет операцию.", "Promise, который отклоняется без обработчика .catch() — в Node.js это может привести к падению процесса (UnhandledPromiseRejection), а в браузерах ошибки молча исчезают.", "Он приостанавливает Event Loop.", "Он затрагивает только отклонённые вызовы fetch()."], uk: ["Він автоматично повторює операцію.", "Promise, який відхиляється без обробника .catch() — у Node.js це може призвести до падіння процесу (UnhandledPromiseRejection), а в браузерах помилки мовчки зникають.", "Він призупиняє Event Loop.", "Він стосується лише відхилених викликів fetch()."] }, correctIndex: 1, explanation: { en: "Node.js 15+ terminates on unhandled rejections by default. Always handle: try/catch with await, .catch() on promises, or process.on('unhandledRejection') as a safety net.", de: "Node.js 15+ beendet bei unbehandelten Ablehnungen standardmässig den Prozess. Immer behandeln: try/catch mit await, .catch() auf Promises oder process.on('unhandledRejection') als Sicherheitsnetz.", ru: "Node.js 15+ по умолчанию завершает процесс при необработанных отклонениях. Всегда обрабатывайте: try/catch с await, .catch() на промисах или process.on('unhandledRejection') как страховочную сеть.", uk: "Node.js 15+ за замовчуванням завершує процес при необроблених відхиленнях. Завжди обробляйте: try/catch з await, .catch() на промісах або process.on('unhandledRejection') як страхувальну сітку." } },
{ category: "Async JS", question: { en: "How do you run async operations in parallel vs sequentially?", de: "Wie führt man asynchrone Operationen parallel vs. sequenziell aus?", ru: "Как запускать асинхронные операции параллельно и последовательно?", uk: "Як запускати асинхронні операції паралельно та послідовно?" }, options: { en: ["await always runs in parallel.", "Parallel: const [a, b] = await Promise.all([fetchA(), fetchB()]). Sequential: const a = await fetchA(); const b = await fetchB();", "Use Promise.race() for parallel.", "JavaScript can't run things in parallel."], de: ["await läuft immer parallel.", "Parallel: const [a, b] = await Promise.all([fetchA(), fetchB()]). Sequenziell: const a = await fetchA(); const b = await fetchB();", "Verwende Promise.race() für parallel.", "JavaScript kann nichts parallel ausführen."], ru: ["await всегда выполняется параллельно.", "Параллельно: const [a, b] = await Promise.all([fetchA(), fetchB()]). Последовательно: const a = await fetchA(); const b = await fetchB();", "Используйте Promise.race() для параллельного выполнения.", "JavaScript не может выполнять ничего параллельно."], uk: ["await завжди виконується паралельно.", "Паралельно: const [a, b] = await Promise.all([fetchA(), fetchB()]). Послідовно: const a = await fetchA(); const b = await fetchB();", "Використовуйте Promise.race() для паралельного виконання.", "JavaScript не може виконувати нічого паралельно."] }, correctIndex: 1, explanation: { en: "Sequential awaits wait for each to finish before starting the next. Promise.all starts all at once and waits for all to complete — much faster for independent operations.", de: "Sequenzielle awaits warten auf den Abschluss jedes einzelnen, bevor der nächste startet. Promise.all startet alle gleichzeitig und wartet auf den Abschluss aller — viel schneller für unabhängige Operationen.", ru: "Последовательные await ждут завершения каждого перед запуском следующего. Promise.all запускает все сразу и ждёт завершения всех — намного быстрее для независимых операций.", uk: "Послідовні await чекають завершення кожного перед запуском наступного. Promise.all запускає всі одразу та чекає завершення усіх — набагато швидше для незалежних операцій." } },
// ===== TYPESCRIPT =====
{ category: "TypeScript", question: { en: "What is the difference between 'interface' and 'type' in TypeScript?", de: "Was ist der Unterschied zwischen 'interface' und 'type' in TypeScript?", ru: "В чём разница между 'interface' и 'type' в TypeScript?", uk: "В чому різниця між 'interface' та 'type' у TypeScript?" }, options: { en: ["They're completely interchangeable.", "Both define shapes, but interfaces support declaration merging and extends. Types support unions, intersections, and mapped types. Interfaces are preferred for object shapes.", "Interfaces are only for classes.", "Types are deprecated."], de: ["Sie sind vollständig austauschbar.", "Beide definieren Formen, aber Interfaces unterstützen Declaration Merging und extends. Types unterstützen Unions, Intersections und Mapped Types. Interfaces werden für Objektformen bevorzugt.", "Interfaces sind nur für Klassen.", "Types sind veraltet."], ru: ["Они полностью взаимозаменяемы.", "Оба определяют формы, но interfaces поддерживают declaration merging и extends. Types поддерживают unions, intersections и mapped types. Interfaces предпочтительны для форм объектов.", "Interfaces только для классов.", "Types устарели."], uk: ["Вони повністю взаємозамінні.", "Обидва визначають форми, але interfaces підтримують declaration merging та extends. Types підтримують unions, intersections та mapped types. Interfaces переважні для форм об'єктів.", "Interfaces лише для класів.", "Types застаріли."] }, correctIndex: 1, explanation: { en: "interface User { name: string } — can be extended and merged. type Result = Success | Failure — unions only work with type. Use interface for objects, type for unions/complex types.", de: "interface User { name: string } — kann erweitert und gemergt werden. type Result = Success | Failure — Unions funktionieren nur mit type. Verwende interface für Objekte, type für Unions/komplexe Typen.", ru: "interface User { name: string } — можно расширять и объединять. type Result = Success | Failure — unions работают только с type. Используйте interface для объектов, type для unions/сложных типов.", uk: "interface User { name: string } — можна розширювати та об'єднувати. type Result = Success | Failure — unions працюють лише з type. Використовуйте interface для об'єктів, type для unions/складних типів." } },
{ category: "TypeScript", question: { en: "What are Generics in TypeScript?", de: "Was sind Generics in TypeScript?", ru: "Что такое Generics в TypeScript?", uk: "Що таке Generics у TypeScript?" }, options: { en: ["A way to make all types 'any'.", "Parameterized types that let you write reusable code working with multiple types while preserving type safety: function identity<T>(arg: T): T { return arg; }", "Generic types are always objects.", "Generics are only for arrays."], de: ["Eine Möglichkeit, alle Typen zu 'any' zu machen.", "Parametrisierte Typen, die wiederverwendbaren Code ermöglichen, der mit mehreren Typen arbeitet und dabei Typsicherheit bewahrt: function identity<T>(arg: T): T { return arg; }", "Generische Typen sind immer Objekte.", "Generics sind nur für Arrays."], ru: ["Способ сделать все типы 'any'.", "Параметризованные типы, позволяющие писать переиспользуемый код, работающий с разными типами при сохранении типобезопасности: function identity<T>(arg: T): T { return arg; }", "Обобщённые типы всегда являются объектами.", "Generics только для массивов."], uk: ["Спосіб зробити всі типи 'any'.", "Параметризовані типи, що дозволяють писати перевикористовуваний код, який працює з різними типами, зберігаючи типобезпеку: function identity<T>(arg: T): T { return arg; }", "Узагальнені типи завжди є об'єктами.", "Generics лише для масивів."] }, correctIndex: 1, explanation: { en: "identity<string>('hello') returns string. identity<number>(42) returns number. The compiler tracks the type through the function — no 'any' needed, full autocomplete preserved.", de: "identity<string>('hello') gibt string zurück. identity<number>(42) gibt number zurück. Der Compiler verfolgt den Typ durch die Funktion — kein 'any' nötig, vollständige Autovervollständigung erhalten.", ru: "identity<string>('hello') возвращает string. identity<number>(42) возвращает number. Компилятор отслеживает тип через функцию — 'any' не нужен, полное автодополнение сохраняется.", uk: "identity<string>('hello') повертає string. identity<number>(42) повертає number. Компілятор відстежує тип через функцію — 'any' не потрібен, повне автодоповнення зберігається." } },
{ category: "TypeScript", question: { en: "What is a Type Guard in TypeScript?", de: "Was ist ein Type Guard in TypeScript?", ru: "Что такое Type Guard в TypeScript?", uk: "Що таке Type Guard у TypeScript?" }, options: { en: ["A security feature preventing XSS.", "A runtime check that narrows a type within a conditional block: typeof, instanceof, 'in' operator, or custom functions with 'is' return type.", "A compile-time-only annotation.", "A way to prevent null values."], de: ["Eine Sicherheitsfunktion zur Verhinderung von XSS.", "Eine Laufzeitprüfung, die einen Typ innerhalb eines bedingten Blocks einschränkt: typeof, instanceof, 'in'-Operator oder benutzerdefinierte Funktionen mit 'is'-Rückgabetyp.", "Eine reine Kompilierzeit-Annotation.", "Eine Möglichkeit, null-Werte zu verhindern."], ru: ["Функция безопасности для предотвращения XSS.", "Проверка во время выполнения, которая сужает тип внутри условного блока: typeof, instanceof, оператор 'in' или пользовательские функции с возвращаемым типом 'is'.", "Аннотация только для времени компиляции.", "Способ предотвращения значений null."], uk: ["Функція безпеки для запобігання XSS.", "Перевірка під час виконання, яка звужує тип всередині умовного блоку: typeof, instanceof, оператор 'in' або користувацькі функції з типом повернення 'is'.", "Анотація лише для часу компіляції.", "Спосіб запобігання значенням null."] }, correctIndex: 1, explanation: { en: "function isUser(x: unknown): x is User { return 'name' in x; } — after if(isUser(x)), TypeScript knows x is User and provides full autocomplete inside the block.", de: "function isUser(x: unknown): x is User { return 'name' in x; } — nach if(isUser(x)) weiss TypeScript, dass x User ist, und bietet vollständige Autovervollständigung im Block.", ru: "function isUser(x: unknown): x is User { return 'name' in x; } — после if(isUser(x)) TypeScript знает, что x — User, и предоставляет полное автодополнение внутри блока.", uk: "function isUser(x: unknown): x is User { return 'name' in x; } — після if(isUser(x)) TypeScript знає, що x — User, і надає повне автодоповнення всередині блоку." } },
{ category: "TypeScript", question: { en: "What is the 'unknown' type and how does it differ from 'any'?", de: "Was ist der 'unknown'-Typ und wie unterscheidet er sich von 'any'?", ru: "Что такое тип 'unknown' и чем он отличается от 'any'?", uk: "Що таке тип 'unknown' і чим він відрізняється від 'any'?" }, options: { en: ["They're identical.", "'any' disables type checking entirely. 'unknown' is type-safe: you must narrow it (typeof, instanceof, type guard) before using it — it's the safe version of 'any'.", "unknown is for API responses only.", "any is stricter than unknown."], de: ["Sie sind identisch.", "'any' deaktiviert die Typprüfung vollständig. 'unknown' ist typsicher: man muss ihn einschränken (typeof, instanceof, Type Guard) bevor man ihn verwendet — es ist die sichere Version von 'any'.", "unknown ist nur für API-Antworten.", "any ist strenger als unknown."], ru: ["Они идентичны.", "'any' полностью отключает проверку типов. 'unknown' типобезопасен: его нужно сузить (typeof, instanceof, type guard) перед использованием — это безопасная версия 'any'.", "unknown только для ответов API.", "any строже, чем unknown."], uk: ["Вони ідентичні.", "'any' повністю вимикає перевірку типів. 'unknown' типобезпечний: його потрібно звузити (typeof, instanceof, type guard) перед використанням — це безпечна версія 'any'.", "unknown лише для відповідей API.", "any суворіший за unknown."] }, correctIndex: 1, explanation: { en: "let x: any = getValue(); x.foo() — no error, crashes at runtime. let x: unknown = getValue(); x.foo() — compile error! Must check first. Always prefer unknown over any.", de: "let x: any = getValue(); x.foo() — kein Fehler, Absturz zur Laufzeit. let x: unknown = getValue(); x.foo() — Kompilierfehler! Zuerst prüfen. Immer unknown gegenüber any bevorzugen.", ru: "let x: any = getValue(); x.foo() — нет ошибки, падение в рантайме. let x: unknown = getValue(); x.foo() — ошибка компиляции! Сначала проверьте. Всегда предпочитайте unknown вместо any.", uk: "let x: any = getValue(); x.foo() — немає помилки, падіння в рантаймі. let x: unknown = getValue(); x.foo() — помилка компіляції! Спершу перевірте. Завжди надавайте перевагу unknown замість any." } },
{ category: "TypeScript", question: { en: "What are Utility Types like Partial<T>, Pick<T>, and Omit<T>?", de: "Was sind Utility Types wie Partial<T>, Pick<T> und Omit<T>?", ru: "Что такое Utility Types: Partial<T>, Pick<T> и Omit<T>?", uk: "Що таке Utility Types: Partial<T>, Pick<T> та Omit<T>?" }, options: { en: ["They're third-party library types.", "Built-in type transformers: Partial<T> makes all properties optional, Pick<T, Keys> selects specific properties, Omit<T, Keys> removes specific properties.", "They only work with interfaces.", "They're deprecated in TS 5+."], de: ["Sie sind Typen aus Drittanbieter-Bibliotheken.", "Eingebaute Typ-Transformatoren: Partial<T> macht alle Eigenschaften optional, Pick<T, Keys> wählt bestimmte Eigenschaften aus, Omit<T, Keys> entfernt bestimmte Eigenschaften.", "Sie funktionieren nur mit Interfaces.", "Sie sind in TS 5+ veraltet."], ru: ["Это типы из сторонних библиотек.", "Встроенные трансформаторы типов: Partial<T> делает все свойства необязательными, Pick<T, Keys> выбирает определённые свойства, Omit<T, Keys> удаляет определённые свойства.", "Они работают только с interfaces.", "Они устарели в TS 5+."], uk: ["Це типи зі сторонніх бібліотек.", "Вбудовані трансформатори типів: Partial<T> робить усі властивості необов'язковими, Pick<T, Keys> обирає певні властивості, Omit<T, Keys> видаляє певні властивості.", "Вони працюють лише з interfaces.", "Вони застаріли в TS 5+."] }, correctIndex: 1, explanation: { en: "Partial<User> → { name?: string; email?: string }. Pick<User, 'name'> → { name: string }. Omit<User, 'password'> → User without password. Extremely useful for DTOs.", de: "Partial<User> → { name?: string; email?: string }. Pick<User, 'name'> → { name: string }. Omit<User, 'password'> → User ohne password. Extrem nützlich für DTOs.", ru: "Partial<User> → { name?: string; email?: string }. Pick<User, 'name'> → { name: string }. Omit<User, 'password'> → User без password. Чрезвычайно полезно для DTO.", uk: "Partial<User> → { name?: string; email?: string }. Pick<User, 'name'> → { name: string }. Omit<User, 'password'> → User без password. Надзвичайно корисно для DTO." } },
{ category: "TypeScript", question: { en: "What is a Discriminated Union in TypeScript?", de: "Was ist eine Discriminated Union in TypeScript?", ru: "Что такое Discriminated Union в TypeScript?", uk: "Що таке Discriminated Union у TypeScript?" }, options: { en: ["A union of string literals.", "A union of types that share a common literal property (discriminant) enabling exhaustive type narrowing in switch/if statements.", "A union that excludes certain types.", "Unions with more than 3 members."], de: ["Eine Union von String-Literalen.", "Eine Union von Typen, die eine gemeinsame Literal-Eigenschaft (Diskriminante) teilen, was vollständige Typeinschränkung in switch/if-Anweisungen ermöglicht.", "Eine Union, die bestimmte Typen ausschliesst.", "Unions mit mehr als 3 Mitgliedern."], ru: ["Union строковых литералов.", "Union типов, которые имеют общее литеральное свойство (дискриминант), позволяющее исчерпывающее сужение типов в switch/if.", "Union, исключающий определённые типы.", "Unions с более чем 3 членами."], uk: ["Union рядкових літералів.", "Union типів, які мають спільну літеральну властивість (дискримінант), що дозволяє вичерпне звуження типів у switch/if.", "Union, що виключає певні типи.", "Unions з більш ніж 3 членами."] }, correctIndex: 1, explanation: { en: "type Shape = { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number }. switch(shape.kind) { case 'circle': shape.r... } — TS knows the exact type in each branch.", de: "type Shape = { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number }. switch(shape.kind) { case 'circle': shape.r... } — TS kennt den exakten Typ in jedem Branch.", ru: "type Shape = { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number }. switch(shape.kind) { case 'circle': shape.r... } — TS знает точный тип в каждой ветке.", uk: "type Shape = { kind: 'circle'; r: number } | { kind: 'rect'; w: number; h: number }. switch(shape.kind) { case 'circle': shape.r... } — TS знає точний тип у кожній гілці." } },
{ category: "TypeScript", question: { en: "What does 'as const' do?", de: "Was macht 'as const'?", ru: "Что делает 'as const'?", uk: "Що робить 'as const'?" }, options: { en: ["Converts a variable to a constant.", "It narrows types to their literal values and makes objects/arrays deeply readonly: const x = [1, 2] as const → type is readonly [1, 2], not number[].", "It's the same as Object.freeze().", "It prevents any reassignment."], de: ["Konvertiert eine Variable in eine Konstante.", "Es schränkt Typen auf ihre Literalwerte ein und macht Objekte/Arrays tief readonly: const x = [1, 2] as const → Typ ist readonly [1, 2], nicht number[].", "Es ist dasselbe wie Object.freeze().", "Es verhindert jede Neuzuweisung."], ru: ["Преобразует переменную в константу.", "Он сужает типы до их литеральных значений и делает объекты/массивы глубоко readonly: const x = [1, 2] as const → тип readonly [1, 2], а не number[].", "Это то же, что Object.freeze().", "Он предотвращает любое переназначение."], uk: ["Перетворює змінну в константу.", "Він звужує типи до їхніх літеральних значень і робить об'єкти/масиви глибоко readonly: const x = [1, 2] as const → тип readonly [1, 2], а не number[].", "Це те саме, що Object.freeze().", "Він запобігає будь-якому перепризначенню."] }, correctIndex: 1, explanation: { en: "Without as const: const colors = ['red', 'blue'] → string[]. With as const: const colors = ['red', 'blue'] as const → readonly ['red', 'blue']. Enables literal type inference.", de: "Ohne as const: const colors = ['red', 'blue'] → string[]. Mit as const: const colors = ['red', 'blue'] as const → readonly ['red', 'blue']. Ermöglicht literale Typinferenz.", ru: "Без as const: const colors = ['red', 'blue'] → string[]. С as const: const colors = ['red', 'blue'] as const → readonly ['red', 'blue']. Включает вывод литеральных типов.", uk: "Без as const: const colors = ['red', 'blue'] → string[]. З as const: const colors = ['red', 'blue'] as const → readonly ['red', 'blue']. Вмикає виведення літеральних типів." } },
{ category: "TypeScript", question: { en: "What is the 'never' type used for?", de: "Wofür wird der 'never'-Typ verwendet?", ru: "Для чего используется тип 'never'?", uk: "Для чого використовується тип 'never'?" }, options: { en: ["For variables that are never used.", "It represents values that never occur: functions that always throw, exhaustive switch checks, and impossible states in conditional types.", "It's a placeholder for future types.", "It makes properties optional."], de: ["Für Variablen, die nie verwendet werden.", "Er repräsentiert Werte, die nie auftreten: Funktionen, die immer werfen, vollständige switch-Prüfungen und unmögliche Zustände in bedingten Typen.", "Er ist ein Platzhalter für zukünftige Typen.", "Er macht Eigenschaften optional."], ru: ["Для переменных, которые никогда не используются.", "Он представляет значения, которые никогда не возникают: функции, которые всегда бросают исключения, исчерпывающие проверки switch и невозможные состояния в условных типах.", "Это заглушка для будущих типов.", "Он делает свойства необязательными."], uk: ["Для змінних, які ніколи не використовуються.", "Він представляє значення, які ніколи не виникають: функції, що завжди кидають виключення, вичерпні перевірки switch та неможливі стани в умовних типах.", "Це заглушка для майбутніх типів.", "Він робить властивості необов'язковими."] }, correctIndex: 1, explanation: { en: "function fail(msg: string): never { throw new Error(msg); } — never returns. In exhaustive checks: default: const _: never = x; — if a new union member is added, this becomes a compile error.", de: "function fail(msg: string): never { throw new Error(msg); } — kehrt nie zurück. In vollständigen Prüfungen: default: const _: never = x; — wenn ein neues Union-Mitglied hinzugefügt wird, wird dies ein Kompilierfehler.", ru: "function fail(msg: string): never { throw new Error(msg); } — никогда не возвращается. В исчерпывающих проверках: default: const _: never = x; — если добавлен новый член union, это становится ошибкой компиляции.", uk: "function fail(msg: string): never { throw new Error(msg); } — ніколи не повертається. У вичерпних перевірках: default: const _: never = x; — якщо додано новий член union, це стає помилкою компіляції." } },
{ category: "TypeScript", question: { en: "What are Mapped Types in TypeScript?", de: "Was sind Mapped Types in TypeScript?", ru: "Что такое Mapped Types в TypeScript?", uk: "Що таке Mapped Types у TypeScript?" }, options: { en: ["Types that map to database tables.", "Types that iterate over keys of another type to create new types: type Readonly<T> = { readonly [K in keyof T]: T[K] }", "Types defined with Map<K,V>.", "Types that only work with arrays."], de: ["Typen, die auf Datenbanktabellen abbilden.", "Typen, die über Schlüssel eines anderen Typs iterieren, um neue Typen zu erstellen: type Readonly<T> = { readonly [K in keyof T]: T[K] }", "Typen, die mit Map<K,V> definiert werden.", "Typen, die nur mit Arrays funktionieren."], ru: ["Типы, которые отображаются на таблицы базы данных.", "Типы, которые итерируют по ключам другого типа для создания новых типов: type Readonly<T> = { readonly [K in keyof T]: T[K] }", "Типы, определённые с Map<K,V>.", "Типы, которые работают только с массивами."], uk: ["Типи, що відображаються на таблиці бази даних.", "Типи, що ітерують по ключах іншого типу для створення нових типів: type Readonly<T> = { readonly [K in keyof T]: T[K] }", "Типи, визначені з Map<K,V>.", "Типи, що працюють лише з масивами."] }, correctIndex: 1, explanation: { en: "Mapped types transform existing types property by property. Built-in examples: Required<T>, Partial<T>, Readonly<T>. Custom: type Nullable<T> = { [K in keyof T]: T[K] | null }.", de: "Mapped Types transformieren bestehende Typen Eigenschaft für Eigenschaft. Eingebaute Beispiele: Required<T>, Partial<T>, Readonly<T>. Benutzerdefiniert: type Nullable<T> = { [K in keyof T]: T[K] | null }.", ru: "Mapped types трансформируют существующие типы свойство за свойством. Встроенные примеры: Required<T>, Partial<T>, Readonly<T>. Пользовательский: type Nullable<T> = { [K in keyof T]: T[K] | null }.", uk: "Mapped types трансформують існуючі типи властивість за властивістю. Вбудовані приклади: Required<T>, Partial<T>, Readonly<T>. Користувацький: type Nullable<T> = { [K in keyof T]: T[K] | null }." } },
{ category: "TypeScript", question: { en: "What is Module Augmentation?", de: "Was ist Module Augmentation?", ru: "Что такое Module Augmentation?", uk: "Що таке Module Augmentation?" }, options: { en: ["Making modules bigger.", "Extending existing module declarations (e.g., adding properties to Express's Request type) by declaring a module with the same name and merging interfaces.", "Importing multiple modules at once.", "A bundler optimization."], de: ["Module grösser machen.", "Erweitern bestehender Modul-Deklarationen (z.B. Hinzufügen von Eigenschaften zum Request-Typ von Express) durch Deklaration eines Moduls mit demselben Namen und Zusammenführen von Interfaces.", "Mehrere Module gleichzeitig importieren.", "Eine Bundler-Optimierung."], ru: ["Увеличение модулей.", "Расширение существующих объявлений модулей (например, добавление свойств к типу Request в Express) путём объявления модуля с тем же именем и слияния интерфейсов.", "Импорт нескольких модулей одновременно.", "Оптимизация сборщика."], uk: ["Збільшення модулів.", "Розширення існуючих оголошень модулів (наприклад, додавання властивостей до типу Request в Express) шляхом оголошення модуля з тим самим ім'ям та злиття інтерфейсів.", "Імпорт кількох модулів одночасно.", "Оптимізація збирача."] }, correctIndex: 1, explanation: { en: "declare module 'express' { interface Request { userId?: string } } — now req.userId is typed across your app. Essential for extending third-party library types.", de: "declare module 'express' { interface Request { userId?: string } } — jetzt ist req.userId in der gesamten App typisiert. Unverzichtbar für die Erweiterung von Drittanbieter-Bibliothekstypen.", ru: "declare module 'express' { interface Request { userId?: string } } — теперь req.userId типизирован по всему приложению. Необходимо для расширения типов сторонних библиотек.", uk: "declare module 'express' { interface Request { userId?: string } } — тепер req.userId типізований по всьому додатку. Необхідно для розширення типів сторонніх бібліотек." } },
// ===== NODE.JS =====
{ category: "Node.js", question: { en: "How does Node.js handle concurrency if it's single-threaded?", de: "Wie behandelt Node.js Nebenläufigkeit, wenn es single-threaded ist?", ru: "Как Node.js обрабатывает конкурентность, если он однопоточный?", uk: "Як Node.js обробляє конкурентність, якщо він однопотоковий?" }, options: { en: ["It can't handle concurrency.", "The single thread runs JS code. I/O operations (file, network, DB) are delegated to libuv's thread pool and OS async APIs. Callbacks run on the main thread when I/O completes.", "It creates a new thread per request like Java.", "It uses Web Workers for everything."], de: ["Es kann keine Nebenläufigkeit verarbeiten.", "Der einzelne Thread führt JS-Code aus. I/O-Operationen (Datei, Netzwerk, DB) werden an libuvs Thread-Pool und asynchrone OS-APIs delegiert. Callbacks laufen auf dem Hauptthread, wenn I/O abgeschlossen ist.", "Es erstellt einen neuen Thread pro Anfrage wie Java.", "Es verwendet Web Workers für alles."], ru: ["Он не может обрабатывать конкурентность.", "Единственный поток выполняет JS-код. I/O-операции (файлы, сеть, БД) делегируются пулу потоков libuv и асинхронным API ОС. Callback-и выполняются в основном потоке, когда I/O завершается.", "Он создаёт новый поток на каждый запрос, как Java.", "Он использует Web Workers для всего."], uk: ["Він не може обробляти конкурентність.", "Єдиний потік виконує JS-код. I/O-операції (файли, мережа, БД) делегуються пулу потоків libuv та асинхронним API ОС. Callback-и виконуються в основному потоці, коли I/O завершується.", "Він створює новий потік на кожен запит, як Java.", "Він використовує Web Workers для всього."] }, correctIndex: 1, explanation: { en: "Node's main thread never blocks on I/O. fs.readFile() hands off to libuv, main thread serves other requests. When file is ready, callback goes to the event queue. Efficient for I/O-heavy servers.", de: "Nodes Hauptthread blockiert nie bei I/O. fs.readFile() übergibt an libuv, der Hauptthread bedient andere Anfragen. Wenn die Datei bereit ist, kommt der Callback in die Event-Queue. Effizient für I/O-intensive Server.", ru: "Основной поток Node никогда не блокируется на I/O. fs.readFile() передаёт работу libuv, основной поток обслуживает другие запросы. Когда файл готов, callback попадает в очередь событий. Эффективно для I/O-нагруженных серверов.", uk: "Основний потік Node ніколи не блокується на I/O. fs.readFile() передає роботу libuv, основний потік обслуговує інші запити. Коли файл готовий, callback потрапляє в чергу подій. Ефективно для I/O-навантажених серверів." } },
{ category: "Node.js", question: { en: "What happens if you block the Node.js event loop?", de: "Was passiert, wenn man den Node.js Event Loop blockiert?", ru: "Что происходит, если заблокировать Event Loop в Node.js?", uk: "Що відбувається, якщо заблокувати Event Loop у Node.js?" }, options: { en: ["Nothing — Node handles it automatically.", "ALL incoming requests freeze because the single thread is stuck executing CPU-heavy synchronous code. No requests can be processed until it finishes.", "Only the current request is affected.", "Node automatically offloads it to a worker thread."], de: ["Nichts — Node handhabt es automatisch.", "ALLE eingehenden Anfragen frieren ein, weil der einzelne Thread mit CPU-intensivem synchronem Code feststeckt. Keine Anfragen können verarbeitet werden, bis er fertig ist.", "Nur die aktuelle Anfrage ist betroffen.", "Node lagert es automatisch an einen Worker Thread aus."], ru: ["Ничего — Node обработает это автоматически.", "ВСЕ входящие запросы зависают, потому что единственный поток застрял на выполнении CPU-тяжёлого синхронного кода. Ни один запрос не может быть обработан, пока он не завершится.", "Затронут только текущий запрос.", "Node автоматически переносит его в worker thread."], uk: ["Нічого — Node обробить це автоматично.", "УСІ вхідні запити зависають, бо єдиний потік застряг на виконанні CPU-важкого синхронного коду. Жоден запит не може бути оброблений, поки він не завершиться.", "Зачеплений лише поточний запит.", "Node автоматично переносить його у worker thread."] }, correctIndex: 1, explanation: { en: "while(true) { computePrimes(); } — the entire server is dead. No timeouts fire, no I/O callbacks run, no new connections accepted. Never run CPU-intensive code on the main thread.", de: "while(true) { computePrimes(); } — der gesamte Server ist tot. Keine Timeouts feuern, keine I/O-Callbacks laufen, keine neuen Verbindungen akzeptiert. Nie CPU-intensiven Code auf dem Hauptthread ausführen.", ru: "while(true) { computePrimes(); } — весь сервер мёртв. Таймауты не срабатывают, I/O-callback-и не выполняются, новые соединения не принимаются. Никогда не запускайте CPU-интенсивный код в основном потоке.", uk: "while(true) { computePrimes(); } — весь сервер мертвий. Таймаути не спрацьовують, I/O-callback-и не виконуються, нові з'єднання не приймаються. Ніколи не запускайте CPU-інтенсивний код в основному потоці." } },
{ category: "Node.js", question: { en: "What are Node.js Streams and why are they important?", de: "Was sind Node.js Streams und warum sind sie wichtig?", ru: "Что такое Node.js Streams и почему они важны?", uk: "Що таке Node.js Streams і чому вони важливі?" }, options: { en: ["They're for video streaming only.", "Streams process data in chunks instead of loading everything into memory at once — essential for handling large files, HTTP bodies, and piping data between sources.", "They're an alternative to promises.", "Streams are deprecated in favor of fetch()."], de: ["Sie sind nur für Video-Streaming.", "Streams verarbeiten Daten in Chunks, anstatt alles auf einmal in den Speicher zu laden — unverzichtbar für die Verarbeitung grosser Dateien, HTTP-Bodies und das Piping von Daten zwischen Quellen.", "Sie sind eine Alternative zu Promises.", "Streams sind zugunsten von fetch() veraltet."], ru: ["Они только для видеостриминга.", "Streams обрабатывают данные порциями, вместо загрузки всего в память сразу — необходимы для обработки больших файлов, HTTP-тел и передачи данных между источниками.", "Они альтернатива промисам.", "Streams устарели в пользу fetch()."], uk: ["Вони лише для відеостримінгу.", "Streams обробляють дані порціями, замість завантаження всього в пам'ять одразу — необхідні для обробки великих файлів, HTTP-тіл та передачі даних між джерелами.", "Вони альтернатива промісам.", "Streams застаріли на користь fetch()."] }, correctIndex: 1, explanation: { en: "fs.createReadStream() reads a 10GB file in small chunks. Without streams, you'd need 10GB of RAM. With streams: constant ~64KB memory. Pipe: readStream.pipe(writeStream).", de: "fs.createReadStream() liest eine 10GB-Datei in kleinen Chunks. Ohne Streams bräuchte man 10GB RAM. Mit Streams: konstant ~64KB Speicher. Pipe: readStream.pipe(writeStream).", ru: "fs.createReadStream() читает файл 10GB маленькими порциями. Без streams нужно 10GB RAM. С streams: постоянные ~64KB памяти. Pipe: readStream.pipe(writeStream).", uk: "fs.createReadStream() читає файл 10GB маленькими порціями. Без streams потрібно 10GB RAM. З streams: постійні ~64KB пам'яті. Pipe: readStream.pipe(writeStream)." } },
{ category: "Node.js", question: { en: "What is the difference between process.nextTick() and setImmediate()?", de: "Was ist der Unterschied zwischen process.nextTick() und setImmediate()?", ru: "В чём разница между process.nextTick() и setImmediate()?", uk: "В чому різниця між process.nextTick() та setImmediate()?" }, options: { en: ["They're identical.", "process.nextTick() fires before I/O callbacks and before setImmediate(). setImmediate() fires after the current I/O poll phase. nextTick can starve I/O if overused.", "setImmediate is faster.", "nextTick is deprecated."], de: ["Sie sind identisch.", "process.nextTick() feuert vor I/O-Callbacks und vor setImmediate(). setImmediate() feuert nach der aktuellen I/O-Poll-Phase. nextTick kann I/O aushungern, wenn übermässig verwendet.", "setImmediate ist schneller.", "nextTick ist veraltet."], ru: ["Они идентичны.", "process.nextTick() срабатывает до I/O-callback-ов и до setImmediate(). setImmediate() срабатывает после текущей фазы I/O polling. nextTick может голодить I/O при чрезмерном использовании.", "setImmediate быстрее.", "nextTick устарел."], uk: ["Вони ідентичні.", "process.nextTick() спрацьовує до I/O-callback-ів та до setImmediate(). setImmediate() спрацьовує після поточної фази I/O polling. nextTick може голодити I/O при надмірному використанні.", "setImmediate швидший.", "nextTick застарів."] }, correctIndex: 1, explanation: { en: "nextTick inserts at the front of the microtask queue — even before Promise.then. setImmediate runs in the 'check' phase after I/O polling. Recursive nextTick() blocks I/O.", de: "nextTick fügt an den Anfang der Microtask-Queue ein — sogar vor Promise.then. setImmediate läuft in der 'check'-Phase nach I/O-Polling. Rekursives nextTick() blockiert I/O.", ru: "nextTick вставляет в начало очереди микрозадач — даже перед Promise.then. setImmediate выполняется в фазе 'check' после I/O polling. Рекурсивный nextTick() блокирует I/O.", uk: "nextTick вставляє на початок черги мікрозадач — навіть перед Promise.then. setImmediate виконується у фазі 'check' після I/O polling. Рекурсивний nextTick() блокує I/O." } },
{ category: "Node.js", question: { en: "What is the purpose of the cluster module?", de: "Was ist der Zweck des cluster-Moduls?", ru: "Каково назначение модуля cluster?", uk: "Яке призначення модуля cluster?" }, options: { en: ["For cloud clustering.", "It forks multiple worker processes that share the same server port, utilizing all CPU cores. The master process distributes connections to workers.", "It clusters database connections.", "It's for Docker Swarm integration."], de: ["Für Cloud-Clustering.", "Es forkt mehrere Worker-Prozesse, die denselben Server-Port teilen und alle CPU-Kerne nutzen. Der Master-Prozess verteilt Verbindungen an Worker.", "Es clustert Datenbankverbindungen.", "Es ist für Docker-Swarm-Integration."], ru: ["Для облачной кластеризации.", "Он форкает несколько воркер-процессов, разделяющих один серверный порт, используя все ядра CPU. Мастер-процесс распределяет соединения по воркерам.", "Он кластеризирует соединения с базой данных.", "Он для интеграции с Docker Swarm."], uk: ["Для хмарної кластеризації.", "Він форкає кілька воркер-процесів, що розділяють один серверний порт, використовуючи всі ядра CPU. Майстер-процес розподіляє з'єднання по воркерах.", "Він кластеризує з'єднання з базою даних.", "Він для інтеграції з Docker Swarm."] }, correctIndex: 1, explanation: { en: "Node is single-threaded, so a 16-core server wastes 15 cores. cluster.fork() creates 16 workers sharing port 3000. OS load-balances incoming connections. PM2 does this automatically.", de: "Node ist single-threaded, also verschwendet ein 16-Kern-Server 15 Kerne. cluster.fork() erstellt 16 Worker, die Port 3000 teilen. Das OS verteilt eingehende Verbindungen. PM2 macht das automatisch.", ru: "Node однопоточный, поэтому 16-ядерный сервер тратит 15 ядер впустую. cluster.fork() создаёт 16 воркеров, разделяющих порт 3000. ОС балансирует входящие соединения. PM2 делает это автоматически.", uk: "Node однопотоковий, тому 16-ядерний сервер витрачає 15 ядер даремно. cluster.fork() створює 16 воркерів, що розділяють порт 3000. ОС балансує вхідні з'єднання. PM2 робить це автоматично." } },
{ category: "Node.js", question: { en: "What is the difference between CommonJS (require) and ES Modules (import)?", de: "Was ist der Unterschied zwischen CommonJS (require) und ES Modules (import)?", ru: "В чём разница между CommonJS (require) и ES Modules (import)?", uk: "В чому різниця між CommonJS (require) та ES Modules (import)?" }, options: { en: ["They're interchangeable.", "CommonJS: synchronous, dynamic (require can be conditional), exports object. ESM: async-capable, static (analyzed at parse time, enables tree-shaking), uses import/export.", "ES Modules are slower.", "CommonJS doesn't work in Node.js anymore."], de: ["Sie sind austauschbar.", "CommonJS: synchron, dynamisch (require kann bedingt sein), exportiert Objekte. ESM: async-fähig, statisch (wird zur Parse-Zeit analysiert, ermöglicht Tree-Shaking), verwendet import/export.", "ES Modules sind langsamer.", "CommonJS funktioniert in Node.js nicht mehr."], ru: ["Они взаимозаменяемы.", "CommonJS: синхронный, динамический (require может быть условным), экспортирует объекты. ESM: поддерживает async, статический (анализируется при парсинге, позволяет tree-shaking), использует import/export.", "ES Modules медленнее.", "CommonJS больше не работает в Node.js."], uk: ["Вони взаємозамінні.", "CommonJS: синхронний, динамічний (require може бути умовним), експортує об'єкти. ESM: підтримує async, статичний (аналізується при парсингу, дозволяє tree-shaking), використовує import/export.", "ES Modules повільніші.", "CommonJS більше не працює в Node.js."] }, correctIndex: 1, explanation: { en: "ESM enables bundler tree-shaking (removing unused exports) because imports are analyzed statically. CJS require() is a runtime function — the bundler can't know what's used.", de: "ESM ermöglicht Bundler-Tree-Shaking (Entfernen ungenutzter Exporte), weil Imports statisch analysiert werden. CJS require() ist eine Laufzeitfunktion — der Bundler kann nicht wissen, was verwendet wird.", ru: "ESM позволяет tree-shaking сборщика (удаление неиспользуемых экспортов), потому что импорты анализируются статически. CJS require() — функция времени выполнения — сборщик не может знать, что используется.", uk: "ESM дозволяє tree-shaking збирача (видалення невикористаних експортів), бо імпорти аналізуються статично. CJS require() — функція часу виконання — збирач не може знати, що використовується." } },
{ category: "Node.js", question: { en: "How do Worker Threads differ from the cluster module?", de: "Wie unterscheiden sich Worker Threads vom cluster-Modul?", ru: "Чем Worker Threads отличаются от модуля cluster?", uk: "Чим Worker Threads відрізняються від модуля cluster?" }, options: { en: ["They're the same.", "Workers share the same process memory (can share ArrayBuffer via SharedArrayBuffer). Cluster forks separate processes with separate memory. Workers are for CPU tasks within one process.", "Worker Threads are for I/O, cluster for CPU.", "Worker Threads don't exist in Node.js."], de: ["Sie sind dasselbe.", "Workers teilen sich denselben Prozessspeicher (können ArrayBuffer über SharedArrayBuffer teilen). Cluster forkt separate Prozesse mit separatem Speicher. Workers sind für CPU-Aufgaben innerhalb eines Prozesses.", "Worker Threads sind für I/O, cluster für CPU.", "Worker Threads existieren in Node.js nicht."], ru: ["Они одинаковы.", "Workers разделяют одну процессную память (могут делить ArrayBuffer через SharedArrayBuffer). Cluster форкает отдельные процессы с отдельной памятью. Workers для CPU-задач внутри одного процесса.", "Worker Threads для I/O, cluster для CPU.", "Worker Threads не существуют в Node.js."], uk: ["Вони однакові.", "Workers розділяють одну процесну пам'ять (можуть ділити ArrayBuffer через SharedArrayBuffer). Cluster форкає окремі процеси з окремою пам'яттю. Workers для CPU-задач всередині одного процесу.", "Worker Threads для I/O, cluster для CPU.", "Worker Threads не існують у Node.js."] }, correctIndex: 1, explanation: { en: "Use cluster for scaling HTTP servers across cores. Use Worker Threads for offloading CPU-heavy tasks (image processing, parsing) without blocking the main event loop.", de: "Verwende cluster zum Skalieren von HTTP-Servern über Kerne. Verwende Worker Threads zum Auslagern CPU-intensiver Aufgaben (Bildverarbeitung, Parsing) ohne den Haupt-Event-Loop zu blockieren.", ru: "Используйте cluster для масштабирования HTTP-серверов по ядрам. Используйте Worker Threads для разгрузки CPU-тяжёлых задач (обработка изображений, парсинг) без блокировки основного Event Loop.", uk: "Використовуйте cluster для масштабування HTTP-серверів по ядрах. Використовуйте Worker Threads для розвантаження CPU-важких задач (обробка зображень, парсинг) без блокування основного Event Loop." } },
{ category: "Node.js", question: { en: "What is the 'middleware' pattern in Express.js?", de: "Was ist das 'Middleware'-Muster in Express.js?", ru: "Что такое паттерн 'middleware' в Express.js?", uk: "Що таке патерн 'middleware' в Express.js?" }, options: { en: ["A design pattern for databases.", "Functions with (req, res, next) signature that form a chain of responsibility pipeline — each can modify req/res, respond, or call next() to pass to the next middleware.", "A pattern for WebSocket connections.", "Express-specific routing tables."], de: ["Ein Entwurfsmuster für Datenbanken.", "Funktionen mit der Signatur (req, res, next), die eine Chain-of-Responsibility-Pipeline bilden — jede kann req/res modifizieren, antworten oder next() aufrufen, um an die nächste Middleware weiterzugeben.", "Ein Muster für WebSocket-Verbindungen.", "Express-spezifische Routing-Tabellen."], ru: ["Паттерн проектирования для баз данных.", "Функции с сигнатурой (req, res, next), формирующие конвейер цепочки ответственности — каждая может модифицировать req/res, ответить или вызвать next() для передачи следующей middleware.", "Паттерн для WebSocket-соединений.", "Таблицы маршрутизации, специфичные для Express."], uk: ["Патерн проєктування для баз даних.", "Функції з сигнатурою (req, res, next), що формують конвеєр ланцюжка відповідальності — кожна може модифікувати req/res, відповісти або викликати next() для передачі наступній middleware.", "Патерн для WebSocket-з'єднань.", "Таблиці маршрутизації, специфічні для Express."] }, correctIndex: 1, explanation: { en: "app.use(logger) → app.use(auth) → app.use(cors) → routes. Each middleware processes the request or calls next(). If auth fails, it responds 401 without calling next(). Same concept as ASP.NET Core middleware.", de: "app.use(logger) → app.use(auth) → app.use(cors) → routes. Jede Middleware verarbeitet die Anfrage oder ruft next() auf. Wenn auth fehlschlägt, antwortet sie mit 401 ohne next() aufzurufen. Gleiches Konzept wie ASP.NET Core Middleware.", ru: "app.use(logger) → app.use(auth) → app.use(cors) → routes. Каждая middleware обрабатывает запрос или вызывает next(). Если auth не пройдена, отвечает 401 без вызова next(). Та же концепция, что и ASP.NET Core middleware.", uk: "app.use(logger) → app.use(auth) → app.use(cors) → routes. Кожна middleware обробляє запит або викликає next(). Якщо auth не пройдена, відповідає 401 без виклику next(). Та сама концепція, що й ASP.NET Core middleware." } },
{ category: "Node.js", question: { en: "What is the purpose of package-lock.json?", de: "Was ist der Zweck von package-lock.json?", ru: "Каково назначение package-lock.json?", uk: "Яке призначення package-lock.json?" }, options: { en: ["It locks packages from being installed.", "It records the exact dependency tree with specific versions, ensuring every developer and CI environment installs identical dependencies (reproducible builds).", "It's an alternative to package.json.", "It prevents npm audit vulnerabilities."], de: ["Es sperrt die Installation von Paketen.", "Es zeichnet den exakten Abhängigkeitsbaum mit spezifischen Versionen auf und stellt sicher, dass jeder Entwickler und jede CI-Umgebung identische Abhängigkeiten installiert (reproduzierbare Builds).", "Es ist eine Alternative zu package.json.", "Es verhindert npm-audit-Schwachstellen."], ru: ["Он блокирует установку пакетов.", "Он записывает точное дерево зависимостей с конкретными версиями, гарантируя, что каждый разработчик и CI-среда устанавливают идентичные зависимости (воспроизводимые сборки).", "Это альтернатива package.json.", "Он предотвращает уязвимости npm audit."], uk: ["Він блокує встановлення пакетів.", "Він записує точне дерево залежностей з конкретними версіями, гарантуючи, що кожен розробник та CI-середовище встановлюють ідентичні залежності (відтворювані збірки).", "Це альтернатива package.json.", "Він запобігає вразливостям npm audit."] }, correctIndex: 1, explanation: { en: "package.json: ^1.2.3 means >=1.2.3 <2.0.0. Without lock: different machines may get different minor/patch versions. package-lock.json pins every package to exact versions.", de: "package.json: ^1.2.3 bedeutet >=1.2.3 <2.0.0. Ohne Lock: verschiedene Maschinen können unterschiedliche Minor/Patch-Versionen bekommen. package-lock.json pinnt jedes Paket auf exakte Versionen.", ru: "package.json: ^1.2.3 означает >=1.2.3 <2.0.0. Без lock: разные машины могут получить разные minor/patch-версии. package-lock.json фиксирует каждый пакет на точных версиях.", uk: "package.json: ^1.2.3 означає >=1.2.3 <2.0.0. Без lock: різні машини можуть отримати різні minor/patch-версії. package-lock.json фіксує кожен пакет на точних версіях." } },
// ===== ADVANCED JS PATTERNS =====
{ category: "JS Patterns", question: { en: "What is Event Delegation?", de: "Was ist Event Delegation?", ru: "Что такое Event Delegation?", uk: "Що таке Event Delegation?" }, options: { en: ["Delegating events to a Web Worker.", "Attaching a single event listener to a parent element instead of individual listeners to each child, using event bubbling to handle events from children.", "Forwarding events between iframes.", "Using addEventListener with 'delegate' option."], de: ["Delegierung von Events an einen Web Worker.", "Anhängen eines einzelnen Event-Listeners an ein Elternelement anstatt einzelner Listener an jedes Kind, unter Nutzung von Event Bubbling zur Behandlung von Events der Kinder.", "Weiterleitung von Events zwischen iframes.", "Verwendung von addEventListener mit der 'delegate'-Option."], ru: ["Делегирование событий в Web Worker.", "Присоединение одного обработчика событий к родительскому элементу вместо отдельных обработчиков к каждому потомку, используя всплытие событий для обработки событий от потомков.", "Пересылка событий между iframe.", "Использование addEventListener с опцией 'delegate'."], uk: ["Делегування подій у Web Worker.", "Приєднання одного обробника подій до батьківського елемента замість окремих обробників до кожного нащадка, використовуючи спливання подій для обробки подій від нащадків.", "Пересилання подій між iframe.", "Використання addEventListener з опцією 'delegate'."] }, correctIndex: 1, explanation: { en: "ul.addEventListener('click', (e) => { if(e.target.tagName === 'LI') handleClick(e.target) }). One listener handles all <li> clicks, even dynamically added ones. Memory efficient.", de: "ul.addEventListener('click', (e) => { if(e.target.tagName === 'LI') handleClick(e.target) }). Ein Listener behandelt alle <li>-Klicks, auch dynamisch hinzugefügte. Speichereffizient.", ru: "ul.addEventListener('click', (e) => { if(e.target.tagName === 'LI') handleClick(e.target) }). Один обработчик обрабатывает все клики по <li>, даже динамически добавленным. Эффективно по памяти.", uk: "ul.addEventListener('click', (e) => { if(e.target.tagName === 'LI') handleClick(e.target) }). Один обробник обробляє всі кліки по <li>, навіть динамічно доданим. Ефективно за пам'яттю." } },
{ category: "JS Patterns", question: { en: "What is Debouncing vs Throttling?", de: "Was ist Debouncing vs. Throttling?", ru: "Чем отличается Debouncing от Throttling?", uk: "Чим відрізняється Debouncing від Throttling?" }, options: { en: ["They're the same technique.", "Debounce: wait until user STOPS doing something for N ms, then fire once (search input). Throttle: fire at most once every N ms regardless (scroll handler).", "Debounce is for clicks, throttle for typing.", "Both are deprecated with Intersection Observer."], de: ["Sie sind dieselbe Technik.", "Debounce: warten, bis der Benutzer N ms lang AUFHÖRT etwas zu tun, dann einmal auslösen (Sucheingabe). Throttle: höchstens einmal alle N ms auslösen, unabhängig davon (Scroll-Handler).", "Debounce ist für Klicks, Throttle für Tippen.", "Beide sind mit Intersection Observer veraltet."], ru: ["Это одна и та же техника.", "Debounce: ждать, пока пользователь ПЕРЕСТАНЕТ делать что-то на N мс, затем выполнить один раз (поле поиска). Throttle: выполнять максимум раз в N мс независимо от чего (обработчик скролла).", "Debounce для кликов, throttle для ввода.", "Оба устарели с появлением Intersection Observer."], uk: ["Це одна і та сама техніка.", "Debounce: чекати, поки користувач ПЕРЕСТАНЕ робити щось на N мс, потім виконати один раз (поле пошуку). Throttle: виконувати максимум раз на N мс незалежно від чого (обробник скролу).", "Debounce для кліків, throttle для введення.", "Обидва застаріли з появою Intersection Observer."] }, correctIndex: 1, explanation: { en: "Debounce search: user types 'react' → only fires after 300ms pause. Throttle scroll: user scrolls rapidly → handler fires max once every 100ms, not on every pixel.", de: "Debounce-Suche: Benutzer tippt 'react' → löst erst nach 300ms Pause aus. Throttle-Scroll: Benutzer scrollt schnell → Handler löst max einmal alle 100ms aus, nicht bei jedem Pixel.", ru: "Debounce поиска: пользователь набирает 'react' → срабатывает только после паузы в 300мс. Throttle скролла: пользователь быстро скроллит → обработчик срабатывает максимум раз в 100мс, не на каждый пиксель.", uk: "Debounce пошуку: користувач набирає 'react' → спрацьовує лише після паузи в 300мс. Throttle скролу: користувач швидко скролить → обробник спрацьовує максимум раз на 100мс, не на кожен піксель." } },
