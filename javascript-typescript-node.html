{ category: "JS Patterns", question: { en: "What is the Module Pattern?", de: "Was ist das Module Pattern?", ru: "Что такое Module Pattern?", uk: "Що таке Module Pattern?" }, options: { en: ["Using npm modules.", "Using closures or IIFE to create private scope, exposing only a public API — encapsulation before ES6 modules existed.", "Importing CSS modules.", "A Node.js-specific pattern."], de: ["npm-Module verwenden.", "Verwendung von Closures oder IIFE zum Erstellen eines privaten Scopes, wobei nur eine öffentliche API exponiert wird — Kapselung vor der Existenz von ES6-Modulen.", "CSS-Module importieren.", "Ein Node.js-spezifisches Muster."], ru: ["Использование npm-модулей.", "Использование closures или IIFE для создания приватной области видимости, предоставляя только публичный API — инкапсуляция до появления ES6-модулей.", "Импорт CSS-модулей.", "Паттерн, специфичный для Node.js."], uk: ["Використання npm-модулів.", "Використання closures або IIFE для створення приватної області видимості, надаючи лише публічний API — інкапсуляція до появи ES6-модулів.", "Імпорт CSS-модулів.", "Патерн, специфічний для Node.js."] }, correctIndex: 1, explanation: { en: "const counter = (() => { let count = 0; return { inc() { count++; }, get() { return count; } }; })(); — count is truly private, only accessible via inc/get.", de: "const counter = (() => { let count = 0; return { inc() { count++; }, get() { return count; } }; })(); — count ist wirklich privat, nur über inc/get zugänglich.", ru: "const counter = (() => { let count = 0; return { inc() { count++; }, get() { return count; } }; })(); — count действительно приватен, доступен только через inc/get.", uk: "const counter = (() => { let count = 0; return { inc() { count++; }, get() { return count; } }; })(); — count дійсно приватний, доступний лише через inc/get." } },
{ category: "JS Patterns", question: { en: "What does structuredClone() do and why is it important?", de: "Was macht structuredClone() und warum ist es wichtig?", ru: "Что делает structuredClone() и почему это важно?", uk: "Що робить structuredClone() і чому це важливо?" }, options: { en: ["It clones DOM structure.", "It creates a deep copy of a value, handling nested objects, arrays, Maps, Sets, Dates, and circular references — unlike JSON.parse(JSON.stringify()) which breaks on those.", "It clones class instances with methods.", "It's only for Web Workers."], de: ["Es klont die DOM-Struktur.", "Es erstellt eine tiefe Kopie eines Werts und verarbeitet verschachtelte Objekte, Arrays, Maps, Sets, Dates und zirkuläre Referenzen — im Gegensatz zu JSON.parse(JSON.stringify()), das bei diesen versagt.", "Es klont Klasseninstanzen mit Methoden.", "Es ist nur für Web Workers."], ru: ["Он клонирует структуру DOM.", "Он создаёт глубокую копию значения, обрабатывая вложенные объекты, массивы, Map, Set, Date и циклические ссылки — в отличие от JSON.parse(JSON.stringify()), который ломается на них.", "Он клонирует экземпляры классов с методами.", "Он только для Web Workers."], uk: ["Він клонує структуру DOM.", "Він створює глибоку копію значення, обробляючи вкладені об'єкти, масиви, Map, Set, Date та циклічні посилання — на відміну від JSON.parse(JSON.stringify()), який ламається на них.", "Він клонує екземпляри класів з методами.", "Він лише для Web Workers."] }, correctIndex: 1, explanation: { en: "JSON method fails on: Date (becomes string), Map/Set (becomes {}), undefined (dropped), circular refs (throws). structuredClone handles all of these correctly.", de: "JSON-Methode versagt bei: Date (wird String), Map/Set (wird {}), undefined (entfällt), zirkuläre Referenzen (wirft Fehler). structuredClone verarbeitet all diese korrekt.", ru: "JSON-метод ломается на: Date (становится строкой), Map/Set (становится {}), undefined (теряется), циклические ссылки (выбрасывает ошибку). structuredClone обрабатывает всё это корректно.", uk: "JSON-метод ламається на: Date (стає рядком), Map/Set (стає {}), undefined (втрачається), циклічні посилання (викидає помилку). structuredClone обробляє все це коректно." } },
{ category: "JS Patterns", question: { en: "What are Symbols used for?", de: "Wofür werden Symbols verwendet?", ru: "Для чего используются Symbols?", uk: "Для чого використовуються Symbols?" }, options: { en: ["Emoji support in strings.", "Creating unique, non-enumerable property keys that can't collide — used for metaprogramming (Symbol.iterator, Symbol.toPrimitive) and truly private-ish properties.", "Defining mathematical symbols.", "They replace string keys in objects."], de: ["Emoji-Unterstützung in Strings.", "Erstellen einzigartiger, nicht-aufzählbarer Property-Schlüssel, die nicht kollidieren können — verwendet für Metaprogrammierung (Symbol.iterator, Symbol.toPrimitive) und quasi-private Properties.", "Definition mathematischer Symbole.", "Sie ersetzen String-Schlüssel in Objekten."], ru: ["Поддержка эмодзи в строках.", "Создание уникальных, неперечислимых ключей свойств, которые не могут конфликтовать — используются для метапрограммирования (Symbol.iterator, Symbol.toPrimitive) и по-настоящему приватных свойств.", "Определение математических символов.", "Они заменяют строковые ключи в объектах."], uk: ["Підтримка емодзі в рядках.", "Створення унікальних, неперелічуваних ключів властивостей, які не можуть конфліктувати — використовуються для метапрограмування (Symbol.iterator, Symbol.toPrimitive) та по-справжньому приватних властивостей.", "Визначення математичних символів.", "Вони замінюють рядкові ключі в об'єктах."] }, correctIndex: 1, explanation: { en: "const id = Symbol('id'); obj[id] = 42; — this property won't show in Object.keys(), JSON.stringify(), or for...in. Symbols are guaranteed unique, preventing key collisions.", de: "const id = Symbol('id'); obj[id] = 42; — diese Eigenschaft erscheint nicht in Object.keys(), JSON.stringify() oder for...in. Symbols sind garantiert einzigartig und verhindern Schlüsselkollisionen.", ru: "const id = Symbol('id'); obj[id] = 42; — это свойство не появится в Object.keys(), JSON.stringify() или for...in. Symbols гарантированно уникальны, предотвращая коллизии ключей.", uk: "const id = Symbol('id'); obj[id] = 42; — ця властивість не з'явиться в Object.keys(), JSON.stringify() або for...in. Symbols гарантовано унікальні, запобігаючи колізіям ключів." } },
{ category: "JS Patterns", question: { en: "What is the Proxy object in JavaScript?", de: "Was ist das Proxy-Objekt in JavaScript?", ru: "Что такое объект Proxy в JavaScript?", uk: "Що таке об'єкт Proxy у JavaScript?" }, options: { en: ["A network proxy configuration.", "A wrapper that intercepts and customizes fundamental operations (property access, assignment, function calls) on a target object via handler traps.", "A pattern for lazy loading.", "A deprecated feature."], de: ["Eine Netzwerk-Proxy-Konfiguration.", "Ein Wrapper, der grundlegende Operationen (Property-Zugriff, Zuweisung, Funktionsaufrufe) auf einem Zielobjekt über Handler-Traps abfängt und anpasst.", "Ein Muster für Lazy Loading.", "Eine veraltete Funktion."], ru: ["Конфигурация сетевого прокси.", "Обёртка, которая перехватывает и настраивает фундаментальные операции (доступ к свойствам, присвоение, вызовы функций) на целевом объекте через handler traps.", "Паттерн для ленивой загрузки.", "Устаревшая функция."], uk: ["Конфігурація мережевого проксі.", "Обгортка, яка перехоплює та налаштовує фундаментальні операції (доступ до властивостей, присвоєння, виклики функцій) на цільовому об'єкті через handler traps.", "Патерн для лінивого завантаження.", "Застаріла функція."] }, correctIndex: 1, explanation: { en: "new Proxy(target, { get(obj, prop) { console.log(`accessed ${prop}`); return obj[prop]; } }). Use cases: validation, logging, reactive systems (Vue 3's reactivity), default values.", de: "new Proxy(target, { get(obj, prop) { console.log(`accessed ${prop}`); return obj[prop]; } }). Anwendungsfälle: Validierung, Logging, reaktive Systeme (Vue 3 Reaktivität), Standardwerte.", ru: "new Proxy(target, { get(obj, prop) { console.log(`accessed ${prop}`); return obj[prop]; } }). Применения: валидация, логирование, реактивные системы (реактивность Vue 3), значения по умолчанию.", uk: "new Proxy(target, { get(obj, prop) { console.log(`accessed ${prop}`); return obj[prop]; } }). Застосування: валідація, логування, реактивні системи (реактивність Vue 3), значення за замовчуванням." } },
// ===== SECURITY & ERROR HANDLING =====
{ category: "Security", question: { en: "What is XSS (Cross-Site Scripting) and how do you prevent it?", de: "Was ist XSS (Cross-Site Scripting) und wie verhindert man es?", ru: "Что такое XSS (Cross-Site Scripting) и как его предотвратить?", uk: "Що таке XSS (Cross-Site Scripting) і як його запобігти?" }, options: { en: ["A CSS framework vulnerability.", "Injecting malicious scripts into web pages viewed by others. Prevent by escaping/sanitizing user input, using Content-Security-Policy headers, and frameworks' built-in escaping.", "A server-side file access exploit.", "Only affects PHP applications."], de: ["Eine CSS-Framework-Schwachstelle.", "Einschleusen bösartiger Skripte in Webseiten, die von anderen betrachtet werden. Verhindern durch Escaping/Bereinigen von Benutzereingaben, Content-Security-Policy-Header und integriertes Escaping der Frameworks.", "Ein serverseitiger Dateizugriffs-Exploit.", "Betrifft nur PHP-Anwendungen."], ru: ["Уязвимость CSS-фреймворка.", "Внедрение вредоносных скриптов в веб-страницы, просматриваемые другими пользователями. Предотвращается экранированием/санитизацией пользовательского ввода, использованием заголовков Content-Security-Policy и встроенным экранированием фреймворков.", "Серверный эксплойт доступа к файлам.", "Затрагивает только PHP-приложения."], uk: ["Вразливість CSS-фреймворку.", "Впровадження шкідливих скриптів у веб-сторінки, що переглядаються іншими користувачами. Запобігається екрануванням/санітизацією користувацького вводу, використанням заголовків Content-Security-Policy та вбудованим екрануванням фреймворків.", "Серверний експлойт доступу до файлів.", "Стосується лише PHP-додатків."] }, correctIndex: 1, explanation: { en: "User submits <script>stealCookies()<\/script> in a comment. If rendered without escaping, every visitor executes it. React auto-escapes JSX. Never use dangerouslySetInnerHTML with user data.", de: "Benutzer sendet <script>stealCookies()<\/script> in einem Kommentar. Wenn ohne Escaping gerendert, führt jeder Besucher es aus. React escaped JSX automatisch. Nie dangerouslySetInnerHTML mit Benutzerdaten verwenden.", ru: "Пользователь отправляет <script>stealCookies()<\/script> в комментарии. Если отрендерено без экранирования, каждый посетитель выполнит его. React автоматически экранирует JSX. Никогда не используйте dangerouslySetInnerHTML с пользовательскими данными.", uk: "Користувач надсилає <script>stealCookies()<\/script> у коментарі. Якщо відрендерено без екранування, кожен відвідувач виконає його. React автоматично екранує JSX. Ніколи не використовуйте dangerouslySetInnerHTML з користувацькими даними." } },
{ category: "Security", question: { en: "What is prototype pollution?", de: "Was ist Prototype Pollution?", ru: "Что такое prototype pollution?", uk: "Що таке prototype pollution?" }, options: { en: ["Memory leak from too many prototypes.", "An attack where an attacker modifies Object.prototype via user input (e.g., __proto__), adding properties that appear on ALL objects in the application.", "A CSS specificity issue.", "A TypeScript compiler bug."], de: ["Memory Leak durch zu viele Prototypen.", "Ein Angriff, bei dem ein Angreifer Object.prototype über Benutzereingaben (z.B. __proto__) modifiziert und Eigenschaften hinzufügt, die auf ALLEN Objekten in der Anwendung erscheinen.", "Ein CSS-Spezifitätsproblem.", "Ein TypeScript-Compiler-Bug."], ru: ["Утечка памяти из-за слишком большого числа прототипов.", "Атака, при которой злоумышленник модифицирует Object.prototype через пользовательский ввод (например, __proto__), добавляя свойства, которые появляются на ВСЕХ объектах в приложении.", "Проблема специфичности CSS.", "Баг компилятора TypeScript."], uk: ["Витік пам'яті через забагато прототипів.", "Атака, при якій зловмисник модифікує Object.prototype через користувацький ввід (наприклад, __proto__), додаючи властивості, які з'являються на УСІХ об'єктах у додатку.", "Проблема специфічності CSS.", "Баг компілятора TypeScript."] }, correctIndex: 1, explanation: { en: "merge({}, JSON.parse('{\"__proto__\":{\"isAdmin\":true}}')) → now ({}).isAdmin === true for every object! Fix: validate input keys, use Object.create(null), or libraries that reject __proto__.", de: "merge({}, JSON.parse('{\"__proto__\":{\"isAdmin\":true}}')) → jetzt ist ({}).isAdmin === true für jedes Objekt! Lösung: Eingabeschlüssel validieren, Object.create(null) verwenden oder Bibliotheken, die __proto__ ablehnen.", ru: "merge({}, JSON.parse('{\"__proto__\":{\"isAdmin\":true}}')) → теперь ({}).isAdmin === true для каждого объекта! Исправление: валидировать ключи ввода, использовать Object.create(null) или библиотеки, отклоняющие __proto__.", uk: "merge({}, JSON.parse('{\"__proto__\":{\"isAdmin\":true}}')) → тепер ({}).isAdmin === true для кожного об'єкта! Виправлення: валідувати ключі вводу, використовувати Object.create(null) або бібліотеки, що відхиляють __proto__." } },
{ category: "Error Handling", question: { en: "What is the difference between throw and reject in async code?", de: "Was ist der Unterschied zwischen throw und reject in asynchronem Code?", ru: "В чём разница между throw и reject в асинхронном коде?", uk: "В чому різниця між throw та reject в асинхронному коді?" }, options: { en: ["They're identical.", "Inside async functions, throw and return Promise.reject() behave the same — both reject the returned promise. But throw in a non-async callback won't be caught by the promise chain.", "throw crashes the process, reject doesn't.", "reject is deprecated."], de: ["Sie sind identisch.", "Innerhalb von async-Funktionen verhalten sich throw und return Promise.reject() gleich — beide lehnen das zurückgegebene Promise ab. Aber throw in einem nicht-async Callback wird nicht von der Promise-Kette gefangen.", "throw lässt den Prozess abstürzen, reject nicht.", "reject ist veraltet."], ru: ["Они идентичны.", "Внутри async-функций throw и return Promise.reject() ведут себя одинаково — оба отклоняют возвращаемый промис. Но throw в не-async callback не будет перехвачен цепочкой промисов.", "throw роняет процесс, reject нет.", "reject устарел."], uk: ["Вони ідентичні.", "Всередині async-функцій throw та return Promise.reject() поводяться однаково — обидва відхиляють повернутий проміс. Але throw у не-async callback не буде перехоплений ланцюжком промісів.", "throw валить процес, reject ні.", "reject застарів."] }, correctIndex: 1, explanation: { en: "async function: throw new Error() = return Promise.reject(). But: new Promise((_, reject) => { setTimeout(() => { throw e; }, 0) }) — that throw is uncaught! Must use reject(e) in callbacks.", de: "async function: throw new Error() = return Promise.reject(). Aber: new Promise((_, reject) => { setTimeout(() => { throw e; }, 0) }) — dieses throw ist ungefangen! Man muss reject(e) in Callbacks verwenden.", ru: "async function: throw new Error() = return Promise.reject(). Но: new Promise((_, reject) => { setTimeout(() => { throw e; }, 0) }) — этот throw не перехвачен! Нужно использовать reject(e) в callback-ах.", uk: "async function: throw new Error() = return Promise.reject(). Але: new Promise((_, reject) => { setTimeout(() => { throw e; }, 0) }) — цей throw не перехоплений! Потрібно використовувати reject(e) в callback-ах." } },
{ category: "Error Handling", question: { en: "How should you handle errors in Express.js?", de: "Wie sollte man Fehler in Express.js behandeln?", ru: "Как правильно обрабатывать ошибки в Express.js?", uk: "Як правильно обробляти помилки в Express.js?" }, options: { en: ["Wrap every route in try/catch.", "Use a centralized error-handling middleware: app.use((err, req, res, next) => {...}) with 4 parameters. Route handlers pass errors via next(err).", "Use process.exit() on errors.", "Let errors crash the server and let PM2 restart."], de: ["Jede Route in try/catch einwickeln.", "Eine zentrale Fehlerbehandlungs-Middleware verwenden: app.use((err, req, res, next) => {...}) mit 4 Parametern. Route-Handler übergeben Fehler über next(err).", "process.exit() bei Fehlern verwenden.", "Fehler den Server zum Absturz bringen lassen und PM2 neustarten lassen."], ru: ["Оборачивать каждый маршрут в try/catch.", "Использовать централизованную middleware обработки ошибок: app.use((err, req, res, next) => {...}) с 4 параметрами. Обработчики маршрутов передают ошибки через next(err).", "Использовать process.exit() при ошибках.", "Позволить ошибкам ронять сервер и дать PM2 перезапускать."], uk: ["Обгортати кожен маршрут у try/catch.", "Використовувати централізовану middleware обробки помилок: app.use((err, req, res, next) => {...}) з 4 параметрами. Обробники маршрутів передають помилки через next(err).", "Використовувати process.exit() при помилках.", "Дозволити помилкам валити сервер і дати PM2 перезапускати."] }, correctIndex: 1, explanation: { en: "Centralized handler catches all errors in one place. For async routes: use express-async-errors or wrap handlers. Log the error, send appropriate status code, hide internal details from client.", de: "Zentraler Handler fängt alle Fehler an einer Stelle. Für async Routes: express-async-errors verwenden oder Handler wrappen. Fehler loggen, passenden Statuscode senden, interne Details vor dem Client verbergen.", ru: "Централизованный обработчик перехватывает все ошибки в одном месте. Для async-маршрутов: используйте express-async-errors или оборачивайте обработчики. Логируйте ошибку, отправляйте подходящий код статуса, скрывайте внутренние детали от клиента.", uk: "Централізований обробник перехоплює всі помилки в одному місці. Для async-маршрутів: використовуйте express-async-errors або обгортайте обробники. Логуйте помилку, надсилайте відповідний код статусу, приховуйте внутрішні деталі від клієнта." } },
// ===== TESTING =====
{ category: "Testing", question: { en: "What is the difference between a Mock, a Stub, and a Spy?", de: "Was ist der Unterschied zwischen einem Mock, einem Stub und einem Spy?", ru: "В чём разница между Mock, Stub и Spy?", uk: "В чому різниця між Mock, Stub та Spy?" }, options: { en: ["They're different names for the same thing.", "Stub: returns predefined data. Mock: verifies that expected calls were made. Spy: wraps the real implementation and records calls without changing behavior.", "Mock is for unit tests, stub for integration.", "Spy is for browser testing only."], de: ["Sie sind verschiedene Namen für dasselbe.", "Stub: gibt vordefinierte Daten zurück. Mock: verifiziert, dass erwartete Aufrufe gemacht wurden. Spy: umhüllt die echte Implementierung und zeichnet Aufrufe auf, ohne das Verhalten zu ändern.", "Mock ist für Unit-Tests, Stub für Integration.", "Spy ist nur für Browser-Testing."], ru: ["Это разные названия для одного и того же.", "Stub: возвращает предопределённые данные. Mock: проверяет, что ожидаемые вызовы были сделаны. Spy: оборачивает реальную реализацию и записывает вызовы, не меняя поведение.", "Mock для юнит-тестов, stub для интеграционных.", "Spy только для тестирования в браузере."], uk: ["Це різні назви для одного і того самого.", "Stub: повертає попередньо визначені дані. Mock: перевіряє, що очікувані виклики були зроблені. Spy: обгортає реальну реалізацію та записує виклики, не змінюючи поведінку.", "Mock для юніт-тестів, stub для інтеграційних.", "Spy лише для тестування у браузері."] }, correctIndex: 1, explanation: { en: "Stub: fetchUser always returns {name:'Test'}. Mock: verify that sendEmail was called once with correct args. Spy: let the real function run but record how many times it was called.", de: "Stub: fetchUser gibt immer {name:'Test'} zurück. Mock: verifizieren, dass sendEmail einmal mit korrekten Args aufgerufen wurde. Spy: die echte Funktion laufen lassen, aber aufzeichnen, wie oft sie aufgerufen wurde.", ru: "Stub: fetchUser всегда возвращает {name:'Test'}. Mock: проверить, что sendEmail был вызван один раз с правильными аргументами. Spy: позволить реальной функции работать, но записать, сколько раз она была вызвана.", uk: "Stub: fetchUser завжди повертає {name:'Test'}. Mock: перевірити, що sendEmail був викликаний один раз з правильними аргументами. Spy: дозволити реальній функції працювати, але записати, скільки разів вона була викликана." } },
{ category: "Testing", question: { en: "What is the purpose of describe(), it(), and expect() in Jest?", de: "Was ist der Zweck von describe(), it() und expect() in Jest?", ru: "Каково назначение describe(), it() и expect() в Jest?", uk: "Яке призначення describe(), it() та expect() у Jest?" }, options: { en: ["They're Express.js middleware.", "describe groups related tests. it (or test) defines a single test case. expect makes assertions about values. Together they form readable, structured test suites.", "They're TypeScript decorators.", "They're only for integration tests."], de: ["Sie sind Express.js-Middleware.", "describe gruppiert zusammengehörige Tests. it (oder test) definiert einen einzelnen Testfall. expect macht Aussagen über Werte. Zusammen bilden sie lesbare, strukturierte Testsuiten.", "Sie sind TypeScript-Dekoratoren.", "Sie sind nur für Integrationstests."], ru: ["Это middleware Express.js.", "describe группирует связанные тесты. it (или test) определяет один тестовый случай. expect делает утверждения о значениях. Вместе они формируют читаемые, структурированные тест-сьюты.", "Это декораторы TypeScript.", "Они только для интеграционных тестов."], uk: ["Це middleware Express.js.", "describe групує пов'язані тести. it (або test) визначає один тестовий випадок. expect робить твердження про значення. Разом вони формують читабельні, структуровані тест-сьюти.", "Це декоратори TypeScript.", "Вони лише для інтеграційних тестів."] }, correctIndex: 1, explanation: { en: "describe('UserService', () => { it('should return user by id', () => { expect(result.name).toBe('John'); }); }); — reads like documentation: 'UserService should return user by id'.", de: "describe('UserService', () => { it('should return user by id', () => { expect(result.name).toBe('John'); }); }); — liest sich wie Dokumentation: 'UserService should return user by id'.", ru: "describe('UserService', () => { it('should return user by id', () => { expect(result.name).toBe('John'); }); }); — читается как документация: 'UserService should return user by id'.", uk: "describe('UserService', () => { it('should return user by id', () => { expect(result.name).toBe('John'); }); }); — читається як документація: 'UserService should return user by id'." } }
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
