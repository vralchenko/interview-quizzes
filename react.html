{ category: "Hooks", question: { en: "Why does useEffect with an empty dependency array [] run only once?", de: "Warum wird useEffect mit einem leeren Dependency-Array [] nur einmal ausgeführt?", ru: "Почему useEffect с пустым массивом зависимостей [] выполняется только один раз?", uk: "Чому useEffect з порожнім масивом залежностей [] виконується лише один раз?" }, options: { en: ["It's a bug that will be fixed.", "React runs effects after render. An empty deps array means 'no dependencies changed' on subsequent renders, so React skips re-running the effect — equivalent to componentDidMount.", "It runs twice in development.", "Empty array means 'run on every render'."], de: ["Es ist ein Bug, der behoben wird.", "React führt Effects nach dem Render aus. Ein leeres Deps-Array bedeutet 'keine Abhängigkeiten geändert' bei nachfolgenden Renders, daher überspringt React die erneute Ausführung — entspricht componentDidMount.", "Es wird in der Entwicklung zweimal ausgeführt.", "Leeres Array bedeutet 'bei jedem Render ausführen'."], ru: ["Это баг, который исправят.", "React запускает эффекты после рендера. Пустой массив зависимостей означает «зависимости не изменились» при последующих рендерах, поэтому React пропускает повторный запуск — эквивалент componentDidMount.", "Он запускается дважды в режиме разработки.", "Пустой массив означает «запускать при каждом рендере»."], uk: ["Це баг, який виправлять.", "React запускає ефекти після рендеру. Порожній масив залежностей означає «залежності не змінилися» при наступних рендерах, тому React пропускає повторний запуск — еквівалент componentDidMount.", "Він запускається двічі в режимі розробки.", "Порожній масив означає «запускати при кожному рендері»."] }, correctIndex: 1, explanation: { en: "[] tells React this effect depends on nothing external. Since nothing changes, it only runs after the initial render. Note: in StrictMode dev, it intentionally runs twice to catch bugs.", de: "[] sagt React, dass dieser Effect von nichts Externem abhängt. Da sich nichts ändert, wird er nur nach dem initialen Render ausgeführt. Hinweis: Im StrictMode-Dev wird er absichtlich zweimal ausgeführt, um Bugs zu finden.", ru: "[] сообщает React, что этот эффект не зависит от внешних факторов. Поскольку ничего не меняется, он запускается только после начального рендера. Примечание: в StrictMode dev он намеренно запускается дважды для обнаружения багов.", uk: "[] повідомляє React, що цей ефект не залежить від зовнішніх факторів. Оскільки нічого не змінюється, він запускається лише після початкового рендеру. Примітка: у StrictMode dev він навмисно запускається двічі для виявлення багів." } },
{ category: "Hooks", question: { en: "What is useRef used for besides DOM access?", de: "Wofür wird useRef ausser für DOM-Zugriff verwendet?", ru: "Для чего используется useRef помимо доступа к DOM?", uk: "Для чого використовується useRef окрім доступу до DOM?" }, options: { en: ["Only for DOM refs.", "It stores a mutable value that persists across renders WITHOUT causing re-renders when changed — perfect for previous values, timers, flags, and instance variables.", "It creates a reference to another component.", "It's only for class components."], de: ["Nur für DOM-Refs.", "Es speichert einen veränderlichen Wert, der über Rendervorgänge hinweg bestehen bleibt, OHNE bei Änderung Re-Renders auszulösen — perfekt für vorherige Werte, Timer, Flags und Instanzvariablen.", "Es erstellt eine Referenz zu einer anderen Komponente.", "Es ist nur für Klassenkomponenten."], ru: ["Только для DOM-ссылок.", "Хранит мутабельное значение, которое сохраняется между рендерами БЕЗ вызова ре-рендеров при изменении — идеально для предыдущих значений, таймеров, флагов и переменных экземпляра.", "Создаёт ссылку на другой компонент.", "Только для классовых компонентов."], uk: ["Лише для DOM-посилань.", "Зберігає мутабельне значення, яке зберігається між рендерами БЕЗ виклику ре-рендерів при зміні — ідеально для попередніх значень, таймерів, прапорців та змінних екземпляра.", "Створює посилання на інший компонент.", "Лише для класових компонентів."] }, correctIndex: 1, explanation: { en: "const renderCount = useRef(0); renderCount.current++ — counts renders without causing infinite re-render loop. Unlike state, changing .current doesn't trigger a re-render.", de: "const renderCount = useRef(0); renderCount.current++ — zählt Renders ohne endlose Re-Render-Schleife. Anders als State löst eine Änderung von .current keinen Re-Render aus.", ru: "const renderCount = useRef(0); renderCount.current++ — считает рендеры без бесконечного цикла ре-рендеров. В отличие от state, изменение .current не вызывает ре-рендер.", uk: "const renderCount = useRef(0); renderCount.current++ — рахує рендери без нескінченного циклу ре-рендерів. На відміну від state, зміна .current не викликає ре-рендер." } },
{ category: "Hooks", question: { en: "What is useCallback and when should you use it?", de: "Was ist useCallback und wann sollte man es verwenden?", ru: "Что такое useCallback и когда его следует использовать?", uk: "Що таке useCallback і коли його слід використовувати?" }, options: { en: ["It calls a function back after a delay.", "It memoizes a function reference so it doesn't change between renders — useful when passing callbacks to memoized child components (React.memo) to prevent unnecessary re-renders.", "It should wrap every function.", "It makes functions run asynchronously."], de: ["Es ruft eine Funktion nach einer Verzögerung zurück.", "Es memoisiert eine Funktionsreferenz, damit sie sich zwischen Renders nicht ändert — nützlich beim Übergeben von Callbacks an memoisierte Kindkomponenten (React.memo), um unnötige Re-Renders zu vermeiden.", "Es sollte jede Funktion umschliessen.", "Es macht Funktionen asynchron."], ru: ["Вызывает функцию обратно после задержки.", "Мемоизирует ссылку на функцию, чтобы она не менялась между рендерами — полезно при передаче callback-ов мемоизированным дочерним компонентам (React.memo) для предотвращения ненужных ре-рендеров.", "Должен оборачивать каждую функцию.", "Делает функции асинхронными."], uk: ["Викликає функцію назад після затримки.", "Мемоізує посилання на функцію, щоб воно не змінювалося між рендерами — корисно при передачі callback-ів мемоізованим дочірнім компонентам (React.memo) для запобігання непотрібним ре-рендерам.", "Має обгортати кожну функцію.", "Робить функції асинхронними."] }, correctIndex: 1, explanation: { en: "Without useCallback, a new function is created every render. If passed to React.memo(Child), Child still re-renders because the prop (function reference) changed. useCallback stabilizes it.", de: "Ohne useCallback wird bei jedem Render eine neue Funktion erstellt. Wenn an React.memo(Child) übergeben, rendert Child trotzdem neu, weil sich die Prop (Funktionsreferenz) geändert hat. useCallback stabilisiert sie.", ru: "Без useCallback при каждом рендере создаётся новая функция. При передаче в React.memo(Child) Child всё равно ре-рендерится, потому что prop (ссылка на функцию) изменился. useCallback стабилизирует её.", uk: "Без useCallback при кожному рендері створюється нова функція. При передачі в React.memo(Child) Child все одно ре-рендериться, бо prop (посилання на функцію) змінився. useCallback стабілізує її." } },
{ category: "Hooks", question: { en: "What is the difference between useMemo and useCallback?", de: "Was ist der Unterschied zwischen useMemo und useCallback?", ru: "В чём разница между useMemo и useCallback?", uk: "В чому різниця між useMemo та useCallback?" }, options: { en: ["They're identical.", "useMemo memoizes a computed VALUE: useMemo(() => expensiveCalc(), [deps]). useCallback memoizes a FUNCTION reference: useCallback(fn, [deps]). useCallback(fn, deps) === useMemo(() => fn, deps).", "useMemo is for objects, useCallback for functions.", "useCallback is deprecated in favor of useMemo."], de: ["Sie sind identisch.", "useMemo memoisiert einen berechneten WERT: useMemo(() => expensiveCalc(), [deps]). useCallback memoisiert eine FUNKTIONS-Referenz: useCallback(fn, [deps]). useCallback(fn, deps) === useMemo(() => fn, deps).", "useMemo ist für Objekte, useCallback für Funktionen.", "useCallback ist zugunsten von useMemo veraltet."], ru: ["Они идентичны.", "useMemo мемоизирует вычисленное ЗНАЧЕНИЕ: useMemo(() => expensiveCalc(), [deps]). useCallback мемоизирует ССЫЛКУ на функцию: useCallback(fn, [deps]). useCallback(fn, deps) === useMemo(() => fn, deps).", "useMemo для объектов, useCallback для функций.", "useCallback устарел в пользу useMemo."], uk: ["Вони ідентичні.", "useMemo мемоізує обчислене ЗНАЧЕННЯ: useMemo(() => expensiveCalc(), [deps]). useCallback мемоізує ПОСИЛАННЯ на функцію: useCallback(fn, [deps]). useCallback(fn, deps) === useMemo(() => fn, deps).", "useMemo для об'єктів, useCallback для функцій.", "useCallback застарілий на користь useMemo."] }, correctIndex: 1, explanation: { en: "useMemo: cache the RESULT of calling the function. useCallback: cache the function ITSELF. const list = useMemo(() => sort(items), [items]) vs const handler = useCallback(() => onClick(id), [id]).", de: "useMemo: das ERGEBNIS des Funktionsaufrufs cachen. useCallback: die Funktion SELBST cachen. const list = useMemo(() => sort(items), [items]) vs const handler = useCallback(() => onClick(id), [id]).", ru: "useMemo: кешировать РЕЗУЛЬТАТ вызова функции. useCallback: кешировать саму ФУНКЦИЮ. const list = useMemo(() => sort(items), [items]) vs const handler = useCallback(() => onClick(id), [id]).", uk: "useMemo: кешувати РЕЗУЛЬТАТ виклику функції. useCallback: кешувати саму ФУНКЦІЮ. const list = useMemo(() => sort(items), [items]) vs const handler = useCallback(() => onClick(id), [id])." } },
{ category: "Hooks", question: { en: "What is a Custom Hook?", de: "Was ist ein Custom Hook?", ru: "Что такое Custom Hook?", uk: "Що таке Custom Hook?" }, options: { en: ["A hook from a third-party library.", "A function starting with 'use' that encapsulates reusable stateful logic using built-in hooks — extracts common patterns into shareable functions.", "A class method that uses hooks.", "A hook that overrides built-in hooks."], de: ["Ein Hook aus einer Drittanbieter-Bibliothek.", "Eine Funktion, die mit 'use' beginnt und wiederverwendbare zustandsbehaftete Logik mit eingebauten Hooks kapselt — extrahiert gängige Muster in teilbare Funktionen.", "Eine Klassenmethode, die Hooks verwendet.", "Ein Hook, der eingebaute Hooks überschreibt."], ru: ["Hook из сторонней библиотеки.", "Функция, начинающаяся с 'use', которая инкапсулирует переиспользуемую логику с состоянием, используя встроенные hooks — извлекает общие паттерны в общие функции.", "Метод класса, использующий hooks.", "Hook, который переопределяет встроенные hooks."], uk: ["Hook зі сторонньої бібліотеки.", "Функція, що починається з 'use', яка інкапсулює перевикористовувану логіку зі станом, використовуючи вбудовані hooks — витягує загальні патерни у спільні функції.", "Метод класу, що використовує hooks.", "Hook, який перевизначає вбудовані hooks."] }, correctIndex: 1, explanation: { en: "function useLocalStorage(key, init) { const [val, setVal] = useState(localStorage.getItem(key) ?? init); useEffect(() => localStorage.setItem(key, val), [key, val]); return [val, setVal]; }", de: "function useLocalStorage(key, init) { const [val, setVal] = useState(localStorage.getItem(key) ?? init); useEffect(() => localStorage.setItem(key, val), [key, val]); return [val, setVal]; }", ru: "function useLocalStorage(key, init) { const [val, setVal] = useState(localStorage.getItem(key) ?? init); useEffect(() => localStorage.setItem(key, val), [key, val]); return [val, setVal]; }", uk: "function useLocalStorage(key, init) { const [val, setVal] = useState(localStorage.getItem(key) ?? init); useEffect(() => localStorage.setItem(key, val), [key, val]); return [val, setVal]; }" } },
{ category: "Hooks", question: { en: "What does useLayoutEffect do differently from useEffect?", de: "Was macht useLayoutEffect anders als useEffect?", ru: "Чем useLayoutEffect отличается от useEffect?", uk: "Чим useLayoutEffect відрізняється від useEffect?" }, options: { en: ["It only works with CSS layouts.", "useLayoutEffect fires synchronously AFTER DOM mutations but BEFORE the browser paints — used for measuring DOM elements or preventing visual flicker.", "It's faster than useEffect.", "It runs before the component renders."], de: ["Es funktioniert nur mit CSS-Layouts.", "useLayoutEffect wird synchron NACH DOM-Mutationen, aber VOR dem Browser-Paint ausgeführt — zum Messen von DOM-Elementen oder zur Vermeidung von visuellem Flackern.", "Es ist schneller als useEffect.", "Es wird vor dem Rendern der Komponente ausgeführt."], ru: ["Работает только с CSS-макетами.", "useLayoutEffect запускается синхронно ПОСЛЕ мутаций DOM, но ДО отрисовки браузером — используется для измерения DOM-элементов или предотвращения визуального мерцания.", "Он быстрее useEffect.", "Он запускается до рендера компонента."], uk: ["Працює лише з CSS-макетами.", "useLayoutEffect запускається синхронно ПІСЛЯ мутацій DOM, але ДО відмалювання браузером — використовується для вимірювання DOM-елементів або запобігання візуальному мерехтінню.", "Він швидший за useEffect.", "Він запускається до рендеру компонента."] }, correctIndex: 1, explanation: { en: "useEffect: render → paint → effect (user might see a flash). useLayoutEffect: render → effect → paint (blocks paint until done). Use for DOM measurements, scroll restoration, or tooltip positioning.", de: "useEffect: Render → Paint → Effect (Benutzer sieht möglicherweise ein Flackern). useLayoutEffect: Render → Effect → Paint (blockiert Paint bis fertig). Für DOM-Messungen, Scroll-Wiederherstellung oder Tooltip-Positionierung.", ru: "useEffect: рендер → отрисовка → эффект (пользователь может увидеть мерцание). useLayoutEffect: рендер → эффект → отрисовка (блокирует отрисовку до завершения). Для измерений DOM, восстановления скролла или позиционирования tooltip.", uk: "useEffect: рендер → відмалювання → ефект (користувач може побачити мерехтіння). useLayoutEffect: рендер → ефект → відмалювання (блокує відмалювання до завершення). Для вимірювань DOM, відновлення скролу або позиціонування tooltip." } },
{ category: "Hooks", question: { en: "What is useTransition in React 18+?", de: "Was ist useTransition in React 18+?", ru: "Что такое useTransition в React 18+?", uk: "Що таке useTransition у React 18+?" }, options: { en: ["For CSS transitions.", "It marks state updates as non-urgent (transitions), allowing React to keep the UI responsive by interrupting the transition render if higher-priority updates come in.", "It transitions between pages.", "It manages animation states."], de: ["Für CSS-Übergänge.", "Es markiert State-Updates als nicht dringend (Transitions), sodass React die UI reaktionsfähig hält, indem es den Transition-Render unterbricht, wenn höher priorisierte Updates eingehen.", "Es wechselt zwischen Seiten.", "Es verwaltet Animationszustände."], ru: ["Для CSS-переходов.", "Помечает обновления состояния как неприоритетные (transitions), позволяя React сохранять отзывчивость UI, прерывая рендер transition при поступлении более приоритетных обновлений.", "Переключает между страницами.", "Управляет состояниями анимации."], uk: ["Для CSS-переходів.", "Позначає оновлення стану як непріоритетні (transitions), дозволяючи React зберігати чутливість UI, перериваючи рендер transition при надходженні більш пріоритетних оновлень.", "Переключає між сторінками.", "Керує станами анімації."] }, correctIndex: 1, explanation: { en: "const [isPending, startTransition] = useTransition(); startTransition(() => setSearchResults(filter(hugeList))). The input stays responsive while the heavy filter runs in the background.", de: "const [isPending, startTransition] = useTransition(); startTransition(() => setSearchResults(filter(hugeList))). Das Eingabefeld bleibt reaktionsfähig, während der aufwändige Filter im Hintergrund läuft.", ru: "const [isPending, startTransition] = useTransition(); startTransition(() => setSearchResults(filter(hugeList))). Поле ввода остаётся отзывчивым, пока тяжёлый фильтр работает в фоне.", uk: "const [isPending, startTransition] = useTransition(); startTransition(() => setSearchResults(filter(hugeList))). Поле вводу залишається чутливим, поки важкий фільтр працює у фоні." } },
// ===== RENDERING & VIRTUAL DOM =====
{ category: "Rendering", question: { en: "What is the Virtual DOM and why does React use it?", de: "Was ist das Virtual DOM und warum verwendet React es?", ru: "Что такое Virtual DOM и зачем React его использует?", uk: "Що таке Virtual DOM і навіщо React його використовує?" }, options: { en: ["A hidden DOM inside an iframe.", "A lightweight in-memory JavaScript representation of the real DOM. React diffs the new VDOM with the previous one and applies only the minimal real DOM changes (reconciliation).", "A DOM that only exists on the server.", "An alternative to the Shadow DOM."], de: ["Ein verstecktes DOM in einem iframe.", "Eine leichtgewichtige In-Memory-JavaScript-Darstellung des echten DOM. React vergleicht das neue VDOM mit dem vorherigen und wendet nur die minimalen echten DOM-Änderungen an (Reconciliation).", "Ein DOM, das nur auf dem Server existiert.", "Eine Alternative zum Shadow DOM."], ru: ["Скрытый DOM внутри iframe.", "Легковесное JavaScript-представление реального DOM в памяти. React сравнивает новый VDOM с предыдущим и применяет только минимальные изменения реального DOM (reconciliation).", "DOM, существующий только на сервере.", "Альтернатива Shadow DOM."], uk: ["Прихований DOM всередині iframe.", "Легковагове JavaScript-представлення реального DOM у пам'яті. React порівнює новий VDOM з попереднім і застосовує лише мінімальні зміни реального DOM (reconciliation).", "DOM, що існує лише на сервері.", "Альтернатива Shadow DOM."] }, correctIndex: 1, explanation: { en: "Direct DOM manipulation is slow. React batches changes: render new VDOM → diff against old VDOM → compute minimal set of real DOM mutations → apply in one batch. Much more efficient.", de: "Direkte DOM-Manipulation ist langsam. React bündelt Änderungen: neues VDOM rendern → gegen altes VDOM vergleichen → minimale Menge realer DOM-Mutationen berechnen → in einem Batch anwenden. Viel effizienter.", ru: "Прямая манипуляция DOM медленная. React группирует изменения: рендер нового VDOM → сравнение со старым VDOM → вычисление минимального набора мутаций реального DOM → применение одним пакетом. Гораздо эффективнее.", uk: "Пряма маніпуляція DOM повільна. React групує зміни: рендер нового VDOM → порівняння зі старим VDOM → обчислення мінімального набору мутацій реального DOM → застосування одним пакетом. Набагато ефективніше." } },
{ category: "Rendering", question: { en: "What triggers a React component to re-render?", de: "Was löst einen Re-Render einer React-Komponente aus?", ru: "Что вызывает ре-рендер компонента React?", uk: "Що викликає ре-рендер компонента React?" }, options: { en: ["Only when props change.", "1) setState/useState setter called. 2) Parent re-renders (even if props haven't changed). 3) Context value changes. 4) forceUpdate() in class components.", "Only when state changes.", "Re-renders happen on a fixed timer."], de: ["Nur wenn sich Props ändern.", "1) setState/useState-Setter aufgerufen. 2) Elternkomponente rendert neu (auch wenn Props unverändert). 3) Context-Wert ändert sich. 4) forceUpdate() in Klassenkomponenten.", "Nur wenn sich der State ändert.", "Re-Renders erfolgen in festen Zeitintervallen."], ru: ["Только при изменении props.", "1) Вызван setState/useState setter. 2) Родитель ре-рендерится (даже если props не изменились). 3) Значение Context изменилось. 4) forceUpdate() в классовых компонентах.", "Только при изменении state.", "Ре-рендеры происходят по таймеру."], uk: ["Лише при зміні props.", "1) Викликаний setState/useState setter. 2) Батьківський компонент ре-рендериться (навіть якщо props не змінилися). 3) Значення Context змінилося. 4) forceUpdate() у класових компонентах.", "Лише при зміні state.", "Ре-рендери відбуваються за таймером."] }, correctIndex: 1, explanation: { en: "Key insight: a parent re-rendering causes ALL children to re-render by default, even if their props are identical. This is why React.memo exists — to skip unnecessary child re-renders.", de: "Wichtige Erkenntnis: Ein Re-Render der Elternkomponente verursacht standardmässig einen Re-Render ALLER Kinder, auch wenn deren Props identisch sind. Deshalb gibt es React.memo — um unnötige Kind-Re-Renders zu überspringen.", ru: "Ключевой момент: ре-рендер родителя по умолчанию вызывает ре-рендер ВСЕХ дочерних компонентов, даже если их props идентичны. Именно поэтому существует React.memo — чтобы пропускать ненужные ре-рендеры дочерних.", uk: "Ключовий момент: ре-рендер батьківського компонента за замовчуванням викликає ре-рендер УСІХ дочірніх, навіть якщо їхні props ідентичні. Саме тому існує React.memo — щоб пропускати непотрібні ре-рендери дочірніх." } },
{ category: "Rendering", question: { en: "What is Reconciliation in React?", de: "Was ist Reconciliation in React?", ru: "Что такое Reconciliation в React?", uk: "Що таке Reconciliation у React?" }, options: { en: ["Merging two components.", "React's algorithm for comparing the old and new Virtual DOM trees to determine the minimum number of DOM operations needed to update the UI.", "Resolving merge conflicts in state.", "Synchronizing state between components."], de: ["Zwei Komponenten zusammenführen.", "Reacts Algorithmus zum Vergleich der alten und neuen Virtual-DOM-Bäume, um die minimale Anzahl von DOM-Operationen zur UI-Aktualisierung zu bestimmen.", "Merge-Konflikte im State lösen.", "State zwischen Komponenten synchronisieren."], ru: ["Объединение двух компонентов.", "Алгоритм React для сравнения старого и нового деревьев Virtual DOM с целью определения минимального количества DOM-операций для обновления UI.", "Разрешение конфликтов слияния в state.", "Синхронизация state между компонентами."], uk: ["Об'єднання двох компонентів.", "Алгоритм React для порівняння старого та нового дерев Virtual DOM з метою визначення мінімальної кількості DOM-операцій для оновлення UI.", "Вирішення конфліктів злиття у state.", "Синхронізація state між компонентами."] }, correctIndex: 1, explanation: { en: "React uses heuristics: different element types → destroy and rebuild subtree. Same type → update props. Lists use 'key' prop to match elements. O(n) instead of O(n³) tree diff.", de: "React nutzt Heuristiken: unterschiedliche Elementtypen → Unterbaum zerstören und neu aufbauen. Gleicher Typ → Props aktualisieren. Listen verwenden die 'key'-Prop zum Abgleich. O(n) statt O(n³) Baumvergleich.", ru: "React использует эвристики: разные типы элементов → уничтожить и пересоздать поддерево. Одинаковый тип → обновить props. Списки используют prop 'key' для сопоставления. O(n) вместо O(n³) сравнения деревьев.", uk: "React використовує евристики: різні типи елементів → знищити і пересоздати піддерево. Однаковий тип → оновити props. Списки використовують prop 'key' для зіставлення. O(n) замість O(n³) порівняння дерев." } },
{ category: "Rendering", question: { en: "Why is the 'key' prop important in lists?", de: "Warum ist die 'key'-Prop in Listen wichtig?", ru: "Почему prop 'key' важен в списках?", uk: "Чому prop 'key' важливий у списках?" }, options: { en: ["It's an accessibility feature.", "Keys help React identify which items changed, were added, or removed during reconciliation — without stable keys, React can't efficiently reuse and reorder DOM nodes.", "It encrypts list data.", "It's only needed for animations."], de: ["Es ist eine Barrierefreiheitsfunktion.", "Keys helfen React zu erkennen, welche Elemente sich geändert haben, hinzugefügt oder entfernt wurden — ohne stabile Keys kann React DOM-Knoten nicht effizient wiederverwenden und neu anordnen.", "Es verschlüsselt Listendaten.", "Es wird nur für Animationen benötigt."], ru: ["Это функция доступности.", "Keys помогают React определить, какие элементы изменились, были добавлены или удалены при reconciliation — без стабильных keys React не может эффективно переиспользовать и переупорядочивать DOM-узлы.", "Он шифрует данные списка.", "Он нужен только для анимаций."], uk: ["Це функція доступності.", "Keys допомагають React визначити, які елементи змінилися, були додані або видалені при reconciliation — без стабільних keys React не може ефективно перевикористовувати та переупорядковувати DOM-вузли.", "Він шифрує дані списку.", "Він потрібен лише для анімацій."] }, correctIndex: 1, explanation: { en: "Without keys (or with index as key), React can't tell if items were reordered — it re-renders everything. With unique keys: React moves DOM nodes instead of destroying/recreating them.", de: "Ohne Keys (oder mit Index als Key) kann React nicht erkennen, ob Elemente neu angeordnet wurden — alles wird neu gerendert. Mit eindeutigen Keys: React verschiebt DOM-Knoten, statt sie zu zerstören/neu zu erstellen.", ru: "Без keys (или с index как key) React не может определить, были ли элементы переупорядочены — он ре-рендерит всё. С уникальными keys: React перемещает DOM-узлы вместо уничтожения/пересоздания.", uk: "Без keys (або з index як key) React не може визначити, чи були елементи переупорядковані — він ре-рендерить все. З унікальними keys: React переміщує DOM-вузли замість знищення/пересоздання." } },
{ category: "Rendering", question: { en: "Why should you avoid using array index as a key?", de: "Warum sollte man den Array-Index nicht als Key verwenden?", ru: "Почему не следует использовать индекс массива как key?", uk: "Чому не слід використовувати індекс масиву як key?" }, options: { en: ["Indexes are too slow to compute.", "If items are reordered, inserted, or deleted, indexes shift — React thinks existing items are different items, causing incorrect state associations and unnecessary DOM recreation.", "Indexes cause memory leaks.", "It's fine for static lists that never change."], de: ["Indizes sind zu langsam zu berechnen.", "Wenn Elemente neu angeordnet, eingefügt oder gelöscht werden, verschieben sich Indizes — React hält bestehende Elemente für andere, was zu falschen State-Zuordnungen und unnötiger DOM-Neuerstellung führt.", "Indizes verursachen Memory Leaks.", "Für statische Listen, die sich nie ändern, ist es in Ordnung."], ru: ["Индексы слишком медленно вычисляются.", "При переупорядочивании, вставке или удалении элементов индексы сдвигаются — React считает существующие элементы другими, вызывая неправильные ассоциации состояния и ненужное пересоздание DOM.", "Индексы вызывают утечки памяти.", "Для статических списков, которые никогда не меняются, это допустимо."], uk: ["Індекси надто повільно обчислюються.", "При переупорядкуванні, вставці або видаленні елементів індекси зсуваються — React вважає існуючі елементи іншими, викликаючи неправильні асоціації стану та непотрібне пересоздання DOM.", "Індекси спричиняють витоки пам'яті.", "Для статичних списків, що ніколи не змінюються, це допустимо."] }, correctIndex: 3, explanation: { en: "Index as key is ONLY safe for static, never-reordered lists. For dynamic lists: an item at index 2 might become index 1 after deletion. React keeps the old state for index 1, mixing up data.", de: "Index als Key ist NUR sicher für statische, nie neu angeordnete Listen. Bei dynamischen Listen: ein Element auf Index 2 könnte nach Löschung Index 1 werden. React behält den alten State für Index 1 bei und vermischt Daten.", ru: "Index как key БЕЗОПАСЕН ТОЛЬКО для статических, никогда не переупорядочиваемых списков. Для динамических: элемент с индексом 2 может стать индексом 1 после удаления. React сохраняет старое состояние для индекса 1, путая данные.", uk: "Index як key БЕЗПЕЧНИЙ ЛИШЕ для статичних списків, що ніколи не переупорядковуються. Для динамічних: елемент з індексом 2 може стати індексом 1 після видалення. React зберігає старий стан для індексу 1, плутаючи дані." } },
{ category: "Rendering", question: { en: "What is React.StrictMode and what does it do?", de: "Was ist React.StrictMode und was macht es?", ru: "Что такое React.StrictMode и что он делает?", uk: "Що таке React.StrictMode і що він робить?" }, options: { en: ["It enforces TypeScript strict mode.", "A development-only wrapper that intentionally double-renders components, runs effects twice, and warns about deprecated patterns to help find bugs early.", "It makes React run faster.", "It prevents any console warnings."], de: ["Es erzwingt den TypeScript-Strict-Mode.", "Ein reiner Entwicklungs-Wrapper, der absichtlich Komponenten doppelt rendert, Effects zweimal ausführt und vor veralteten Mustern warnt, um Bugs früh zu finden.", "Es lässt React schneller laufen.", "Es verhindert alle Konsolen-Warnungen."], ru: ["Включает строгий режим TypeScript.", "Обёртка только для разработки, которая намеренно дважды рендерит компоненты, дважды запускает эффекты и предупреждает об устаревших паттернах для раннего обнаружения багов.", "Ускоряет работу React.", "Предотвращает все предупреждения в консоли."], uk: ["Вмикає строгий режим TypeScript.", "Обгортка лише для розробки, яка навмисно двічі рендерить компоненти, двічі запускає ефекти та попереджає про застарілі патерни для раннього виявлення багів.", "Прискорює роботу React.", "Запобігає всім попередженням у консолі."] }, correctIndex: 1, explanation: { en: "StrictMode double-invokes renders and effects in dev to surface impure renders and missing cleanup. If your component breaks under StrictMode, it has a bug (e.g., missing effect cleanup).", de: "StrictMode führt Renders und Effects doppelt aus, um unreine Renders und fehlende Cleanups aufzudecken. Wenn eine Komponente unter StrictMode bricht, hat sie einen Bug (z.B. fehlendes Effect-Cleanup).", ru: "StrictMode дважды вызывает рендеры и эффекты в dev для выявления нечистых рендеров и отсутствующей очистки. Если компонент ломается в StrictMode — у него баг (напр., отсутствует очистка эффекта).", uk: "StrictMode двічі викликає рендери та ефекти в dev для виявлення нечистих рендерів та відсутнього очищення. Якщо компонент ламається у StrictMode — у нього баг (напр., відсутнє очищення ефекту)." } },
// ===== STATE MANAGEMENT =====
{ category: "State Management", question: { en: "When should you use Context vs a state management library?", de: "Wann sollte man Context vs eine State-Management-Bibliothek verwenden?", ru: "Когда следует использовать Context, а когда библиотеку управления состоянием?", uk: "Коли слід використовувати Context, а коли бібліотеку управління станом?" }, options: { en: ["Always use Redux.", "Context is for low-frequency updates (theme, auth, locale). For high-frequency state (forms, lists, real-time data), use Zustand/Redux/Jotai to avoid Context's re-render problem.", "Context replaces all state management.", "Libraries are always overkill."], de: ["Immer Redux verwenden.", "Context ist für seltene Updates (Theme, Auth, Locale). Für häufige State-Änderungen (Formulare, Listen, Echtzeitdaten) Zustand/Redux/Jotai verwenden, um Contexts Re-Render-Problem zu vermeiden.", "Context ersetzt jedes State Management.", "Bibliotheken sind immer übertrieben."], ru: ["Всегда использовать Redux.", "Context — для редких обновлений (тема, авторизация, локаль). Для частых обновлений состояния (формы, списки, данные реального времени) используйте Zustand/Redux/Jotai, чтобы избежать проблемы ре-рендера Context.", "Context заменяет любое управление состоянием.", "Библиотеки — всегда избыточны."], uk: ["Завжди використовувати Redux.", "Context — для рідких оновлень (тема, авторизація, локаль). Для частих оновлень стану (форми, списки, дані реального часу) використовуйте Zustand/Redux/Jotai, щоб уникнути проблеми ре-рендеру Context.", "Context замінює будь-яке управління станом.", "Бібліотеки — завжди надмірні."] }, correctIndex: 1, explanation: { en: "Context re-renders ALL consumers when the value changes, even if they only use a small part. State libraries provide selective subscriptions — components only re-render when their specific slice changes.", de: "Context rendert ALLE Consumer neu, wenn sich der Wert ändert, auch wenn sie nur einen kleinen Teil verwenden. State-Bibliotheken bieten selektive Subscriptions — Komponenten rendern nur neu, wenn sich ihr spezifischer Slice ändert.", ru: "Context ре-рендерит ВСЕХ потребителей при изменении значения, даже если они используют лишь малую часть. Библиотеки состояния обеспечивают селективные подписки — компоненты ре-рендерятся только при изменении их конкретного среза.", uk: "Context ре-рендерить УСІХ споживачів при зміні значення, навіть якщо вони використовують лише малу частину. Бібліотеки стану забезпечують селективні підписки — компоненти ре-рендеряться лише при зміні їхнього конкретного зрізу." } },
{ category: "State Management", question: { en: "What is 'prop drilling' and how do you solve it?", de: "Was ist 'Prop Drilling' und wie löst man es?", ru: "Что такое 'prop drilling' и как его решить?", uk: "Що таке 'prop drilling' і як його вирішити?" }, options: { en: ["Drilling holes in props for performance.", "Passing props through many intermediate components that don't use them. Solutions: Context API, component composition (children prop), or state management libraries.", "A technique for optimizing renders.", "It only happens in class components."], de: ["Löcher in Props bohren für Performance.", "Props durch viele Zwischenkomponenten weiterreichen, die sie nicht verwenden. Lösungen: Context API, Komponentenkomposition (children-Prop) oder State-Management-Bibliotheken.", "Eine Technik zur Render-Optimierung.", "Es tritt nur in Klassenkomponenten auf."], ru: ["Сверление отверстий в props для производительности.", "Передача props через множество промежуточных компонентов, которые их не используют. Решения: Context API, композиция компонентов (prop children) или библиотеки управления состоянием.", "Техника оптимизации рендеров.", "Это происходит только в классовых компонентах."], uk: ["Свердління отворів у props для продуктивності.", "Передача props через безліч проміжних компонентів, які їх не використовують. Рішення: Context API, композиція компонентів (prop children) або бібліотеки управління станом.", "Техніка оптимізації рендерів.", "Це відбувається лише у класових компонентах."] }, correctIndex: 1, explanation: { en: "App → Layout → Sidebar → UserMenu → UserAvatar needs 'user' prop drilled through Layout and Sidebar which don't use it. Context or composition eliminates the intermediaries.", de: "App → Layout → Sidebar → UserMenu → UserAvatar braucht die 'user'-Prop durch Layout und Sidebar, die sie nicht verwenden. Context oder Komposition eliminiert die Zwischenstationen.", ru: "App → Layout → Sidebar → UserMenu → UserAvatar требует prop 'user', пробрасываемый через Layout и Sidebar, которые его не используют. Context или композиция устраняют посредников.", uk: "App → Layout → Sidebar → UserMenu → UserAvatar потребує prop 'user', що прокидається через Layout та Sidebar, які його не використовують. Context або композиція усувають посередників." } },
{ category: "State Management", question: { en: "What is the difference between controlled and uncontrolled components?", de: "Was ist der Unterschied zwischen kontrollierten und unkontrollierten Komponenten?", ru: "В чём разница между контролируемыми и неконтролируемыми компонентами?", uk: "В чому різниця між контрольованими та неконтрольованими компонентами?" }, options: { en: ["Controlled components are in TypeScript, uncontrolled in JavaScript.", "Controlled: React state drives the input value (value + onChange). Uncontrolled: the DOM itself holds the state, accessed via useRef. Controlled gives you full control over input behavior.", "Uncontrolled is always better for performance.", "Controlled components can't be submitted."], de: ["Kontrollierte Komponenten sind in TypeScript, unkontrollierte in JavaScript.", "Kontrolliert: React-State steuert den Input-Wert (value + onChange). Unkontrolliert: das DOM selbst hält den State, Zugriff via useRef. Kontrolliert gibt volle Kontrolle über das Input-Verhalten.", "Unkontrolliert ist immer besser für Performance.", "Kontrollierte Komponenten können nicht gesendet werden."], ru: ["Контролируемые компоненты на TypeScript, неконтролируемые на JavaScript.", "Контролируемые: React state управляет значением input (value + onChange). Неконтролируемые: сам DOM хранит состояние, доступ через useRef. Контролируемые дают полный контроль над поведением input.", "Неконтролируемые всегда лучше для производительности.", "Контролируемые компоненты нельзя отправить."], uk: ["Контрольовані компоненти на TypeScript, неконтрольовані на JavaScript.", "Контрольовані: React state керує значенням input (value + onChange). Неконтрольовані: сам DOM зберігає стан, доступ через useRef. Контрольовані дають повний контроль над поведінкою input.", "Неконтрольовані завжди кращі для продуктивності.", "Контрольовані компоненти не можна відправити."] }, correctIndex: 1, explanation: { en: "Controlled: <input value={name} onChange={e => setName(e.target.value)} />. Uncontrolled: <input ref={inputRef} />. Controlled enables validation, formatting, and conditional disabling on every keystroke.", de: "Kontrolliert: <input value={name} onChange={e => setName(e.target.value)} />. Unkontrolliert: <input ref={inputRef} />. Kontrolliert ermöglicht Validierung, Formatierung und bedingtes Deaktivieren bei jedem Tastendruck.", ru: "Контролируемый: <input value={name} onChange={e => setName(e.target.value)} />. Неконтролируемый: <input ref={inputRef} />. Контролируемый позволяет валидацию, форматирование и условное отключение при каждом нажатии клавиши.", uk: "Контрольований: <input value={name} onChange={e => setName(e.target.value)} />. Неконтрольований: <input ref={inputRef} />. Контрольований дозволяє валідацію, форматування та умовне вимкнення при кожному натисканні клавіші." } },
{ category: "State Management", question: { en: "What is state colocation?", de: "Was ist State Colocation?", ru: "Что такое колокация состояния?", uk: "Що таке колокація стану?" }, options: { en: ["Storing state in a database.", "Keeping state as close as possible to where it's used — in the component that needs it, not lifted to a global store. Reduces unnecessary re-renders and complexity.", "Moving all state to the root component.", "A Redux pattern."], de: ["State in einer Datenbank speichern.", "State so nah wie möglich dort halten, wo er verwendet wird — in der Komponente, die ihn braucht, nicht in einen globalen Store gehoben. Reduziert unnötige Re-Renders und Komplexität.", "Allen State in die Root-Komponente verschieben.", "Ein Redux-Pattern."], ru: ["Хранение состояния в базе данных.", "Хранение состояния как можно ближе к месту использования — в компоненте, который его использует, а не в глобальном store. Уменьшает ненужные ре-рендеры и сложность.", "Перенос всего состояния в корневой компонент.", "Паттерн Redux."], uk: ["Зберігання стану в базі даних.", "Зберігання стану якомога ближче до місця використання — в компоненті, який його використовує, а не в глобальному store. Зменшує непотрібні ре-рендери та складність.", "Перенесення всього стану в кореневий компонент.", "Патерн Redux."] }, correctIndex: 1, explanation: { en: "If only a modal needs isOpen state, keep it in the modal — not in a global store. Lifting state too high causes unrelated components to re-render. Colocate first, lift only when needed.", de: "Wenn nur ein Modal den isOpen-State braucht, behalte ihn im Modal — nicht im globalen Store. State zu hoch heben verursacht Re-Renders nicht verwandter Komponenten. Zuerst kolocieren, nur bei Bedarf hochheben.", ru: "Если только модальному окну нужно состояние isOpen, держите его в модальном окне — не в глобальном store. Поднятие состояния слишком высоко вызывает ре-рендер несвязанных компонентов. Сначала колокация, поднятие только при необходимости.", uk: "Якщо лише модальному вікну потрібен стан isOpen, тримайте його в модальному вікні — не в глобальному store. Піднімання стану надто високо викликає ре-рендер непов'язаних компонентів. Спочатку колокація, піднімання лише за потреби." } },
{ category: "State Management", question: { en: "What is the useContext re-render problem?", de: "Was ist das useContext-Re-Render-Problem?", ru: "В чём проблема ре-рендера useContext?", uk: "В чому проблема ре-рендеру useContext?" }, options: { en: ["useContext doesn't cause re-renders.", "When a Context value changes, ALL components consuming that context re-render — even if they only use a portion of the value. There's no built-in selector mechanism.", "useContext only re-renders the provider.", "It's fixed in React 19."], de: ["useContext verursacht keine Re-Renders.", "Wenn sich ein Context-Wert ändert, rendern ALLE Komponenten, die diesen Context konsumieren, neu — auch wenn sie nur einen Teil des Werts verwenden. Es gibt keinen eingebauten Selektor-Mechanismus.", "useContext rendert nur den Provider neu.", "Es ist in React 19 behoben."], ru: ["useContext не вызывает ре-рендеров.", "При изменении значения Context ВСЕ компоненты, потребляющие этот контекст, ре-рендерятся — даже если используют лишь часть значения. Встроенного механизма селекторов нет.", "useContext ре-рендерит только Provider.", "Это исправлено в React 19."], uk: ["useContext не викликає ре-рендерів.", "При зміні значення Context ВСІ компоненти, що споживають цей контекст, ре-рендеряться — навіть якщо використовують лише частину значення. Вбудованого механізму селекторів немає.", "useContext ре-рендерить лише Provider.", "Це виправлено в React 19."] }, correctIndex: 1, explanation: { en: "If context = {user, theme} and you update theme, components that only use user also re-render. Fix: split into UserContext and ThemeContext, or use useSyncExternalStore/Zustand.", de: "Wenn context = {user, theme} und man theme aktualisiert, rendern auch Komponenten neu, die nur user verwenden. Lösung: in UserContext und ThemeContext aufteilen, oder useSyncExternalStore/Zustand verwenden.", ru: "Если context = {user, theme} и вы обновляете theme, компоненты, использующие только user, тоже ре-рендерятся. Решение: разделить на UserContext и ThemeContext, или использовать useSyncExternalStore/Zustand.", uk: "Якщо context = {user, theme} і ви оновлюєте theme, компоненти, що використовують лише user, теж ре-рендеряться. Рішення: розділити на UserContext та ThemeContext, або використовувати useSyncExternalStore/Zustand." } },
// ===== PERFORMANCE =====
{ category: "Performance", question: { en: "What does React.memo() do?", de: "Was macht React.memo()?", ru: "Что делает React.memo()?", uk: "Що робить React.memo()?" }, options: { en: ["It adds comments to components.", "It wraps a component to skip re-rendering if its props haven't changed (shallow comparison). The component only re-renders when props actually differ.", "It memoizes state values.", "It's the same as useMemo."], de: ["Es fügt Komponenten Kommentare hinzu.", "Es umschliesst eine Komponente, um Re-Rendering zu überspringen, wenn sich die Props nicht geändert haben (flacher Vergleich). Die Komponente rendert nur neu, wenn sich Props tatsächlich unterscheiden.", "Es memoisiert State-Werte.", "Es ist dasselbe wie useMemo."], ru: ["Добавляет комментарии к компонентам.", "Оборачивает компонент для пропуска ре-рендеринга, если props не изменились (поверхностное сравнение). Компонент ре-рендерится только при реальном изменении props.", "Мемоизирует значения state.", "Это то же самое, что useMemo."], uk: ["Додає коментарі до компонентів.", "Обгортає компонент для пропуску ре-рендерингу, якщо props не змінилися (поверхневе порівняння). Компонент ре-рендериться лише при реальній зміні props.", "Мемоізує значення state.", "Це те саме, що useMemo."] }, correctIndex: 1, explanation: { en: "const MemoChild = React.memo(Child). If parent re-renders but passes the same props to MemoChild, MemoChild skips rendering. Combine with useCallback for function props.", de: "const MemoChild = React.memo(Child). Wenn die Elternkomponente neu rendert, aber dieselben Props an MemoChild übergibt, überspringt MemoChild das Rendering. Mit useCallback für Funktions-Props kombinieren.", ru: "const MemoChild = React.memo(Child). Если родитель ре-рендерится, но передаёт те же props в MemoChild, MemoChild пропускает рендеринг. Комбинируйте с useCallback для функциональных props.", uk: "const MemoChild = React.memo(Child). Якщо батьківський компонент ре-рендериться, але передає ті самі props в MemoChild, MemoChild пропускає рендеринг. Комбінуйте з useCallback для функціональних props." } },
{ category: "Performance", question: { en: "What is code splitting and React.lazy()?", de: "Was ist Code Splitting und React.lazy()?", ru: "Что такое code splitting и React.lazy()?", uk: "Що таке code splitting та React.lazy()?" }, options: { en: ["Splitting code into multiple files.", "Dynamically importing components so they're loaded only when needed, reducing the initial bundle size: const Modal = React.lazy(() => import('./Modal'))", "Splitting components into smaller ones.", "A server-side optimization."], de: ["Code in mehrere Dateien aufteilen.", "Dynamisches Importieren von Komponenten, damit sie nur bei Bedarf geladen werden, wodurch die initiale Bundle-Grösse reduziert wird: const Modal = React.lazy(() => import('./Modal'))", "Komponenten in kleinere aufteilen.", "Eine serverseitige Optimierung."], ru: ["Разделение кода на несколько файлов.", "Динамический импорт компонентов для загрузки только по необходимости, уменьшая размер начального бандла: const Modal = React.lazy(() => import('./Modal'))", "Разделение компонентов на более мелкие.", "Серверная оптимизация."], uk: ["Розділення коду на кілька файлів.", "Динамічний імпорт компонентів для завантаження лише за потреби, зменшуючи розмір початкового бандлу: const Modal = React.lazy(() => import('./Modal'))", "Розділення компонентів на менші.", "Серверна оптимізація."] }, correctIndex: 1, explanation: { en: "Without lazy: entire app JS loads upfront (500KB). With lazy: main bundle = 100KB, Modal loaded only when user opens it. Wrap with <Suspense fallback={<Spinner/>}> for loading state.", de: "Ohne lazy: gesamtes App-JS wird vorab geladen (500KB). Mit lazy: Haupt-Bundle = 100KB, Modal wird nur geladen, wenn der Benutzer es öffnet. Mit <Suspense fallback={<Spinner/>}> für Ladezustand umschliessen.", ru: "Без lazy: весь JS приложения загружается сразу (500KB). С lazy: основной бандл = 100KB, Modal загружается только когда пользователь открывает его. Обернуть в <Suspense fallback={<Spinner/>}> для состояния загрузки.", uk: "Без lazy: весь JS додатку завантажується одразу (500KB). З lazy: основний бандл = 100KB, Modal завантажується лише коли користувач відкриває його. Обгорнути в <Suspense fallback={<Spinner/>}> для стану завантаження." } },
{ category: "Performance", question: { en: "What is the purpose of React.Suspense?", de: "Was ist der Zweck von React.Suspense?", ru: "Какова цель React.Suspense?", uk: "Яка мета React.Suspense?" }, options: { en: ["It suspends component rendering permanently.", "It provides a declarative loading state for async operations like lazy-loaded components and (in React 18+) data fetching — shows a fallback UI while content loads.", "It pauses animations.", "It's only for error handling."], de: ["Es unterbricht das Komponenten-Rendering dauerhaft.", "Es bietet einen deklarativen Ladezustand für asynchrone Operationen wie lazy-geladene Komponenten und (in React 18+) Datenabruf — zeigt eine Fallback-UI während des Ladens.", "Es pausiert Animationen.", "Es ist nur für Fehlerbehandlung."], ru: ["Навсегда приостанавливает рендеринг компонента.", "Предоставляет декларативное состояние загрузки для асинхронных операций, таких как lazy-загруженные компоненты и (в React 18+) получение данных — показывает fallback UI во время загрузки.", "Ставит анимации на паузу.", "Только для обработки ошибок."], uk: ["Назавжди призупиняє рендеринг компонента.", "Надає декларативний стан завантаження для асинхронних операцій, таких як lazy-завантажені компоненти та (у React 18+) отримання даних — показує fallback UI під час завантаження.", "Ставить анімації на паузу.", "Лише для обробки помилок."] }, correctIndex: 1, explanation: { en: "<Suspense fallback={<Skeleton/>}><LazyComponent/></Suspense>. While LazyComponent's JS bundle loads, Skeleton is shown. In React 18+, it also works with data fetching libraries.", de: "<Suspense fallback={<Skeleton/>}><LazyComponent/></Suspense>. Während das JS-Bundle von LazyComponent lädt, wird Skeleton angezeigt. In React 18+ funktioniert es auch mit Datenabruf-Bibliotheken.", ru: "<Suspense fallback={<Skeleton/>}><LazyComponent/></Suspense>. Пока JS-бандл LazyComponent загружается, показывается Skeleton. В React 18+ также работает с библиотеками получения данных.", uk: "<Suspense fallback={<Skeleton/>}><LazyComponent/></Suspense>. Поки JS-бандл LazyComponent завантажується, показується Skeleton. У React 18+ також працює з бібліотеками отримання даних." } },
{ category: "Performance", question: { en: "What is windowing/virtualization for long lists?", de: "Was ist Windowing/Virtualisierung für lange Listen?", ru: "Что такое windowing/виртуализация для длинных списков?", uk: "Що таке windowing/віртуалізація для довгих списків?" }, options: { en: ["Putting lists inside a window component.", "Only rendering the visible portion of a long list (e.g., 20 items on screen out of 10,000), dramatically reducing DOM nodes. Libraries: react-window, react-virtuoso.", "Splitting lists across multiple pages.", "Using CSS overflow: hidden."], de: ["Listen in eine Window-Komponente packen.", "Nur den sichtbaren Teil einer langen Liste rendern (z.B. 20 Elemente auf dem Bildschirm von 10.000), wodurch DOM-Knoten drastisch reduziert werden. Bibliotheken: react-window, react-virtuoso.", "Listen auf mehrere Seiten aufteilen.", "CSS overflow: hidden verwenden."], ru: ["Помещение списков в компонент окна.", "Рендеринг только видимой части длинного списка (напр., 20 элементов на экране из 10 000), резко сокращая количество DOM-узлов. Библиотеки: react-window, react-virtuoso.", "Разделение списков на несколько страниц.", "Использование CSS overflow: hidden."], uk: ["Поміщення списків у компонент вікна.", "Рендеринг лише видимої частини довгого списку (напр., 20 елементів на екрані з 10 000), різко зменшуючи кількість DOM-вузлів. Бібліотеки: react-window, react-virtuoso.", "Розділення списків на кілька сторінок.", "Використання CSS overflow: hidden."] }, correctIndex: 1, explanation: { en: "10,000 DOM nodes = sluggish scrolling, high memory. Virtualization: only ~20 visible rows exist in the DOM at any time. As you scroll, rows are recycled with new data. Buttery smooth.", de: "10.000 DOM-Knoten = träges Scrollen, hoher Speicherverbrauch. Virtualisierung: nur ~20 sichtbare Zeilen existieren jederzeit im DOM. Beim Scrollen werden Zeilen mit neuen Daten recycelt. Butterweich.", ru: "10 000 DOM-узлов = медленная прокрутка, высокое потребление памяти. Виртуализация: в DOM в любой момент существует только ~20 видимых строк. При прокрутке строки переиспользуются с новыми данными. Плавно как масло.", uk: "10 000 DOM-вузлів = повільна прокрутка, високе споживання пам'яті. Віртуалізація: у DOM у будь-який момент існує лише ~20 видимих рядків. При прокрутці рядки перевикористовуються з новими даними. Плавно як масло." } },
{ category: "Performance", question: { en: "What are the React DevTools Profiler's key metrics?", de: "Was sind die wichtigsten Metriken des React DevTools Profilers?", ru: "Каковы ключевые метрики React DevTools Profiler?", uk: "Які ключові метрики React DevTools Profiler?" }, options: { en: ["Bundle size and load time.", "Render duration, number of re-renders, which components rendered and why (props changed, state changed, parent rendered), and commit timing.", "Memory usage and CPU load.", "Network request timing."], de: ["Bundle-Grösse und Ladezeit.", "Render-Dauer, Anzahl der Re-Renders, welche Komponenten gerendert wurden und warum (Props geändert, State geändert, Elternkomponente gerendert) und Commit-Timing.", "Speicherverbrauch und CPU-Last.", "Netzwerk-Request-Timing."], ru: ["Размер бандла и время загрузки.", "Длительность рендера, количество ре-рендеров, какие компоненты рендерились и почему (изменились props, state, родитель рендерился), и тайминг коммитов.", "Использование памяти и нагрузка CPU.", "Тайминг сетевых запросов."], uk: ["Розмір бандлу та час завантаження.", "Тривалість рендеру, кількість ре-рендерів, які компоненти рендерилися і чому (змінилися props, state, батьківський компонент рендерився), та таймінг комітів.", "Використання пам'яті та навантаження CPU.", "Таймінг мережевих запитів."] }, correctIndex: 1, explanation: { en: "The Profiler records each commit: which components rendered, how long each took, and WHY they rendered. Essential for finding unnecessary re-renders and slow components.", de: "Der Profiler zeichnet jeden Commit auf: welche Komponenten gerendert wurden, wie lange jede brauchte und WARUM sie gerendert wurden. Unverzichtbar zum Finden unnötiger Re-Renders und langsamer Komponenten.", ru: "Profiler записывает каждый коммит: какие компоненты рендерились, сколько времени заняло каждое, и ПОЧЕМУ они рендерились. Незаменим для обнаружения ненужных ре-рендеров и медленных компонентов.", uk: "Profiler записує кожний коміт: які компоненти рендерилися, скільки часу зайняв кожний, і ЧОМУ вони рендерилися. Незамінний для виявлення непотрібних ре-рендерів та повільних компонентів." } },
// ===== PATTERNS & ARCHITECTURE =====
{ category: "Patterns", question: { en: "What is the Compound Components pattern?", de: "Was ist das Compound-Components-Pattern?", ru: "Что такое паттерн Compound Components?", uk: "Що таке патерн Compound Components?" }, options: { en: ["Combining multiple npm packages.", "Components that work together sharing implicit state: <Select><Select.Option value='a'>A</Select.Option></Select> — parent manages state, children consume via Context.", "Components with compound CSS selectors.", "Using && for conditional rendering."], de: ["Mehrere npm-Pakete kombinieren.", "Komponenten, die zusammenarbeiten und impliziten State teilen: <Select><Select.Option value='a'>A</Select.Option></Select> — Elternkomponente verwaltet State, Kinder konsumieren via Context.", "Komponenten mit zusammengesetzten CSS-Selektoren.", "&& für bedingtes Rendering verwenden."], ru: ["Объединение нескольких npm-пакетов.", "Компоненты, работающие вместе с неявным общим состоянием: <Select><Select.Option value='a'>A</Select.Option></Select> — родитель управляет состоянием, дочерние потребляют через Context.", "Компоненты с составными CSS-селекторами.", "Использование && для условного рендеринга."], uk: ["Об'єднання кількох npm-пакетів.", "Компоненти, що працюють разом з неявним спільним станом: <Select><Select.Option value='a'>A</Select.Option></Select> — батьківський компонент керує станом, дочірні споживають через Context.", "Компоненти зі складеними CSS-селекторами.", "Використання && для умовного рендерингу."] }, correctIndex: 1, explanation: { en: "Like HTML <select>/<option>: the parent owns the open/selected state, children register themselves. Used by headless UI libraries (Radix, Headless UI). Clean, declarative API.", de: "Wie HTML <select>/<option>: die Elternkomponente besitzt den open/selected-State, Kinder registrieren sich selbst. Verwendet von Headless-UI-Bibliotheken (Radix, Headless UI). Saubere, deklarative API.", ru: "Как HTML <select>/<option>: родитель владеет состоянием open/selected, дочерние регистрируют себя. Используется headless UI библиотеками (Radix, Headless UI). Чистый, декларативный API.", uk: "Як HTML <select>/<option>: батьківський компонент володіє станом open/selected, дочірні реєструють себе. Використовується headless UI бібліотеками (Radix, Headless UI). Чистий, декларативний API." } },
{ category: "Patterns", question: { en: "What is the Render Props pattern?", de: "Was ist das Render-Props-Pattern?", ru: "Что такое паттерн Render Props?", uk: "Що таке патерн Render Props?" }, options: { en: ["Rendering props as HTML attributes.", "A component that takes a function as a prop (or children) and calls it with data, allowing the consumer to control what's rendered: <Mouse render={({x,y}) => <p>{x},{y}</p>} />", "Passing JSX as props.", "A pattern for rendering lists."], de: ["Props als HTML-Attribute rendern.", "Eine Komponente, die eine Funktion als Prop (oder children) nimmt und sie mit Daten aufruft, wodurch der Konsument steuern kann, was gerendert wird: <Mouse render={({x,y}) => <p>{x},{y}</p>} />", "JSX als Props übergeben.", "Ein Pattern zum Rendern von Listen."], ru: ["Рендеринг props как HTML-атрибутов.", "Компонент, принимающий функцию как prop (или children) и вызывающий её с данными, позволяя потребителю контролировать рендеринг: <Mouse render={({x,y}) => <p>{x},{y}</p>} />", "Передача JSX как props.", "Паттерн для рендеринга списков."], uk: ["Рендеринг props як HTML-атрибутів.", "Компонент, що приймає функцію як prop (або children) і викликає її з даними, дозволяючи споживачу контролювати рендеринг: <Mouse render={({x,y}) => <p>{x},{y}</p>} />", "Передача JSX як props.", "Патерн для рендерингу списків."] }, correctIndex: 1, explanation: { en: "The Mouse component tracks mouse position, the consumer decides how to display it. Largely replaced by custom hooks (useMousePosition()) but still used in libraries like React Router and Formik.", de: "Die Mouse-Komponente verfolgt die Mausposition, der Konsument entscheidet, wie sie angezeigt wird. Grösstenteils durch Custom Hooks (useMousePosition()) ersetzt, aber noch in Bibliotheken wie React Router und Formik verwendet.", ru: "Компонент Mouse отслеживает позицию мыши, потребитель решает, как её отображать. Во многом заменён custom hooks (useMousePosition()), но всё ещё используется в библиотеках вроде React Router и Formik.", uk: "Компонент Mouse відстежує позицію миші, споживач вирішує, як її відображати. Значною мірою замінений custom hooks (useMousePosition()), але все ще використовується в бібліотеках на кшталт React Router та Formik." } },
{ category: "Patterns", question: { en: "What is the Container/Presenter (Smart/Dumb) pattern?", de: "Was ist das Container/Presenter (Smart/Dumb)-Pattern?", ru: "Что такое паттерн Container/Presenter (Smart/Dumb)?", uk: "Що таке патерн Container/Presenter (Smart/Dumb)?" }, options: { en: ["Container for server, Presenter for client.", "Container handles logic/state/data fetching. Presenter is a pure component receiving data via props and rendering UI. Separates concerns for testability.", "It's mandatory in React.", "Container means Docker container."], de: ["Container für Server, Presenter für Client.", "Container handhabt Logik/State/Datenabruf. Presenter ist eine reine Komponente, die Daten via Props empfängt und UI rendert. Trennt Verantwortlichkeiten für Testbarkeit.", "Es ist Pflicht in React.", "Container bedeutet Docker-Container."], ru: ["Container для сервера, Presenter для клиента.", "Container обрабатывает логику/состояние/получение данных. Presenter — чистый компонент, получающий данные через props и рендерящий UI. Разделяет ответственности для тестируемости.", "Это обязательно в React.", "Container означает Docker-контейнер."], uk: ["Container для сервера, Presenter для клієнта.", "Container обробляє логіку/стан/отримання даних. Presenter — чистий компонент, що отримує дані через props і рендерить UI. Розділяє відповідальності для тестовності.", "Це обов'язково в React.", "Container означає Docker-контейнер."] }, correctIndex: 1, explanation: { en: "UserContainer: fetches data, manages state. UserPresenter: receives user prop, renders JSX. Presenter is easily testable (pure function of props). Hooks have made this less necessary but still useful.", de: "UserContainer: holt Daten, verwaltet State. UserPresenter: empfängt user-Prop, rendert JSX. Presenter ist leicht testbar (reine Funktion der Props). Hooks haben dies weniger notwendig gemacht, aber es ist weiterhin nützlich.", ru: "UserContainer: получает данные, управляет состоянием. UserPresenter: получает prop user, рендерит JSX. Presenter легко тестируем (чистая функция props). Hooks сделали это менее необходимым, но всё ещё полезным.", uk: "UserContainer: отримує дані, керує станом. UserPresenter: отримує prop user, рендерить JSX. Presenter легко тестується (чиста функція props). Hooks зробили це менш необхідним, але все ще корисним." } },
{ category: "Patterns", question: { en: "What is the Higher-Order Component (HOC) pattern?", de: "Was ist das Higher-Order Component (HOC)-Pattern?", ru: "Что такое паттерн Higher-Order Component (HOC)?", uk: "Що таке патерн Higher-Order Component (HOC)?" }, options: { en: ["A component higher in the DOM tree.", "A function that takes a component and returns a new component with additional props/behavior: const Enhanced = withAuth(Dashboard) — adds auth check without modifying Dashboard.", "A class component that extends React.PureComponent.", "A component with more than 5 props."], de: ["Eine Komponente höher im DOM-Baum.", "Eine Funktion, die eine Komponente nimmt und eine neue Komponente mit zusätzlichen Props/Verhalten zurückgibt: const Enhanced = withAuth(Dashboard) — fügt Auth-Prüfung hinzu, ohne Dashboard zu ändern.", "Eine Klassenkomponente, die React.PureComponent erweitert.", "Eine Komponente mit mehr als 5 Props."], ru: ["Компонент выше в дереве DOM.", "Функция, принимающая компонент и возвращающая новый компонент с дополнительными props/поведением: const Enhanced = withAuth(Dashboard) — добавляет проверку авторизации без изменения Dashboard.", "Классовый компонент, наследующий React.PureComponent.", "Компонент с более чем 5 props."], uk: ["Компонент вище у дереві DOM.", "Функція, що приймає компонент і повертає новий компонент з додатковими props/поведінкою: const Enhanced = withAuth(Dashboard) — додає перевірку авторизації без зміни Dashboard.", "Класовий компонент, що наслідує React.PureComponent.", "Компонент з більш ніж 5 props."] }, correctIndex: 1, explanation: { en: "HOCs wrap components: withAuth checks login, withLoading shows spinner, withTheme injects theme. Largely replaced by hooks, but still used: React.memo(), connect() from Redux, withRouter().", de: "HOCs umschliessen Komponenten: withAuth prüft Login, withLoading zeigt Spinner, withTheme injiziert Theme. Grösstenteils durch Hooks ersetzt, aber noch verwendet: React.memo(), connect() aus Redux, withRouter().", ru: "HOC оборачивают компоненты: withAuth проверяет авторизацию, withLoading показывает спиннер, withTheme внедряет тему. Во многом заменены hooks, но всё ещё используются: React.memo(), connect() из Redux, withRouter().", uk: "HOC обгортають компоненти: withAuth перевіряє авторизацію, withLoading показує спінер, withTheme впроваджує тему. Значною мірою замінені hooks, але все ще використовуються: React.memo(), connect() з Redux, withRouter()." } },
{ category: "Patterns", question: { en: "What is component composition and why prefer it over prop drilling?", de: "Was ist Komponentenkomposition und warum ist sie dem Prop Drilling vorzuziehen?", ru: "Что такое композиция компонентов и почему она предпочтительнее prop drilling?", uk: "Що таке композиція компонентів і чому вона краща за prop drilling?" }, options: { en: ["Using npm to compose packages.", "Passing components as children or props instead of passing data through layers: <Layout sidebar={<UserNav user={user} />} /> — Layout doesn't need to know about user.", "Composing CSS classes.", "It's the same as inheritance."], de: ["npm zum Zusammenstellen von Paketen verwenden.", "Komponenten als children oder Props übergeben, statt Daten durch Schichten zu reichen: <Layout sidebar={<UserNav user={user} />} /> — Layout muss nichts über user wissen.", "CSS-Klassen zusammensetzen.", "Es ist dasselbe wie Vererbung."], ru: ["Использование npm для объединения пакетов.", "Передача компонентов как children или props вместо передачи данных через слои: <Layout sidebar={<UserNav user={user} />} /> — Layout не нужно знать о user.", "Составление CSS-классов.", "Это то же самое, что наследование."], uk: ["Використання npm для об'єднання пакетів.", "Передача компонентів як children або props замість передачі даних через шари: <Layout sidebar={<UserNav user={user} />} /> — Layout не потрібно знати про user.", "Складання CSS-класів.", "Це те саме, що успадкування."] }, correctIndex: 1, explanation: { en: "Instead of Layout receiving user and passing it to Sidebar which passes it to UserNav — Layout receives the already-built <UserNav user={user}/> as a prop. No intermediate components touch user.", de: "Statt dass Layout user empfängt und an Sidebar weitergibt, die es an UserNav weitergibt — Layout empfängt das bereits erstellte <UserNav user={user}/> als Prop. Keine Zwischenkomponenten berühren user.", ru: "Вместо того чтобы Layout получал user и передавал в Sidebar, который передаёт в UserNav — Layout получает уже собранный <UserNav user={user}/> как prop. Промежуточные компоненты не касаются user.", uk: "Замість того щоб Layout отримував user і передавав у Sidebar, який передає в UserNav — Layout отримує вже зібраний <UserNav user={user}/> як prop. Проміжні компоненти не торкаються user." } },
// ===== NEXT.JS / SSR =====
{ category: "Next.js", question: { en: "What is the difference between SSR, SSG, and CSR?", de: "Was ist der Unterschied zwischen SSR, SSG und CSR?", ru: "В чём разница между SSR, SSG и CSR?", uk: "В чому різниця між SSR, SSG та CSR?" }, options: { en: ["They're different CSS frameworks.", "CSR: browser renders (SPA). SSR: server renders HTML per request. SSG: HTML generated at build time. SSR for dynamic content, SSG for static, CSR for interactive apps.", "SSR is always the best choice.", "SSG doesn't work with React."], de: ["Es sind verschiedene CSS-Frameworks.", "CSR: Browser rendert (SPA). SSR: Server rendert HTML pro Anfrage. SSG: HTML wird zur Build-Zeit generiert. SSR für dynamischen Inhalt, SSG für statischen, CSR für interaktive Apps.", "SSR ist immer die beste Wahl.", "SSG funktioniert nicht mit React."], ru: ["Это разные CSS-фреймворки.", "CSR: браузер рендерит (SPA). SSR: сервер рендерит HTML на каждый запрос. SSG: HTML генерируется во время сборки. SSR для динамического контента, SSG для статического, CSR для интерактивных приложений.", "SSR — всегда лучший выбор.", "SSG не работает с React."], uk: ["Це різні CSS-фреймворки.", "CSR: браузер рендерить (SPA). SSR: сервер рендерить HTML на кожен запит. SSG: HTML генерується під час збірки. SSR для динамічного контенту, SSG для статичного, CSR для інтерактивних додатків.", "SSR — завжди найкращий вибір.", "SSG не працює з React."] }, correctIndex: 1, explanation: { en: "Blog post (SSG): HTML built once at deploy. Dashboard (CSR): browser renders after JS loads. Product page (SSR): server renders fresh HTML with current price per request.", de: "Blogpost (SSG): HTML einmal beim Deploy erstellt. Dashboard (CSR): Browser rendert nach JS-Laden. Produktseite (SSR): Server rendert frisches HTML mit aktuellem Preis pro Anfrage.", ru: "Пост блога (SSG): HTML собирается один раз при деплое. Дашборд (CSR): браузер рендерит после загрузки JS. Страница товара (SSR): сервер рендерит свежий HTML с актуальной ценой на каждый запрос.", uk: "Пост блогу (SSG): HTML збирається один раз при деплої. Дашборд (CSR): браузер рендерить після завантаження JS. Сторінка товару (SSR): сервер рендерить свіжий HTML з актуальною ціною на кожен запит." } },
{ category: "Next.js", question: { en: "What are React Server Components (RSC)?", de: "Was sind React Server Components (RSC)?", ru: "Что такое React Server Components (RSC)?", uk: "Що таке React Server Components (RSC)?" }, options: { en: ["Components that only run during SSR.", "Components that execute ONLY on the server, have zero JavaScript sent to the browser, can directly access databases/files, and reduce client bundle size.", "Server-side Redux stores.", "Components rendered by Express.js."], de: ["Komponenten, die nur während SSR laufen.", "Komponenten, die AUSSCHLIESSLICH auf dem Server ausgeführt werden, kein JavaScript an den Browser senden, direkt auf Datenbanken/Dateien zugreifen können und die Client-Bundle-Grösse reduzieren.", "Serverseitige Redux-Stores.", "Komponenten, die von Express.js gerendert werden."], ru: ["Компоненты, работающие только во время SSR.", "Компоненты, выполняющиеся ТОЛЬКО на сервере, не отправляющие JavaScript в браузер, имеющие прямой доступ к базам данных/файлам и уменьшающие размер клиентского бандла.", "Серверные Redux-хранилища.", "Компоненты, рендерящиеся Express.js."], uk: ["Компоненти, що працюють лише під час SSR.", "Компоненти, що виконуються ЛИШЕ на сервері, не надсилають JavaScript у браузер, мають прямий доступ до баз даних/файлів і зменшують розмір клієнтського бандлу.", "Серверні Redux-сховища.", "Компоненти, що рендеряться Express.js."] }, correctIndex: 1, explanation: { en: "Server Components: no useState, no useEffect, no event handlers. They fetch data directly (await db.query()), render HTML, and send ZERO JS to client. Client Components handle interactivity.", de: "Server Components: kein useState, kein useEffect, keine Event-Handler. Sie holen Daten direkt (await db.query()), rendern HTML und senden NULL JS an den Client. Client Components handhaben Interaktivität.", ru: "Server Components: нет useState, нет useEffect, нет обработчиков событий. Они получают данные напрямую (await db.query()), рендерят HTML и отправляют НОЛЬ JS клиенту. Client Components обрабатывают интерактивность.", uk: "Server Components: немає useState, немає useEffect, немає обробників подій. Вони отримують дані напряму (await db.query()), рендерять HTML і надсилають НУЛЬ JS клієнту. Client Components обробляють інтерактивність." } },
{ category: "Next.js", question: { en: "What does 'use client' directive do in Next.js App Router?", de: "Was macht die 'use client'-Direktive im Next.js App Router?", ru: "Что делает директива 'use client' в Next.js App Router?", uk: "Що робить директива 'use client' у Next.js App Router?" }, options: { en: ["It forces server-side rendering.", "It marks a component as a Client Component — it will be included in the browser JS bundle and can use hooks, event handlers, and browser APIs.", "It enables client-side caching.", "It's an import statement."], de: ["Es erzwingt serverseitiges Rendering.", "Es markiert eine Komponente als Client Component — sie wird in das Browser-JS-Bundle aufgenommen und kann Hooks, Event-Handler und Browser-APIs verwenden.", "Es aktiviert clientseitiges Caching.", "Es ist eine Import-Anweisung."], ru: ["Принудительно включает серверный рендеринг.", "Помечает компонент как Client Component — он будет включён в JS-бандл браузера и может использовать hooks, обработчики событий и API браузера.", "Включает кеширование на стороне клиента.", "Это оператор импорта."], uk: ["Примусово вмикає серверний рендеринг.", "Позначає компонент як Client Component — він буде включений у JS-бандл браузера і може використовувати hooks, обробники подій та API браузера.", "Вмикає кешування на стороні клієнта.", "Це оператор імпорту."] }, correctIndex: 1, explanation: { en: "By default in App Router, components are Server Components. Adding 'use client' at the top opts into client rendering. Only use it when you need interactivity (onClick, useState, useEffect).", de: "Standardmässig im App Router sind Komponenten Server Components. 'use client' oben hinzufügen aktiviert Client-Rendering. Nur verwenden, wenn Interaktivität benötigt wird (onClick, useState, useEffect).", ru: "По умолчанию в App Router компоненты являются Server Components. Добавление 'use client' вверху переключает на клиентский рендеринг. Используйте только при необходимости интерактивности (onClick, useState, useEffect).", uk: "За замовчуванням в App Router компоненти є Server Components. Додавання 'use client' зверху перемикає на клієнтський рендеринг. Використовуйте лише при потребі інтерактивності (onClick, useState, useEffect)." } },
{ category: "Next.js", question: { en: "What is ISR (Incremental Static Regeneration)?", de: "Was ist ISR (Incremental Static Regeneration)?", ru: "Что такое ISR (Incremental Static Regeneration)?", uk: "Що таке ISR (Incremental Static Regeneration)?" }, options: { en: ["Incrementally loading images.", "A Next.js feature that regenerates static pages in the background after a specified time interval, combining SSG's speed with near-real-time data freshness.", "Server-side incremental rendering.", "A state management approach."], de: ["Inkrementelles Laden von Bildern.", "Eine Next.js-Funktion, die statische Seiten im Hintergrund nach einem bestimmten Zeitintervall regeneriert und SSG-Geschwindigkeit mit nahezu Echtzeit-Datenaktualität kombiniert.", "Serverseitiges inkrementelles Rendering.", "Ein State-Management-Ansatz."], ru: ["Инкрементальная загрузка изображений.", "Функция Next.js, которая регенерирует статические страницы в фоне через указанный интервал времени, сочетая скорость SSG с почти реальной актуальностью данных.", "Серверный инкрементальный рендеринг.", "Подход к управлению состоянием."], uk: ["Інкрементальне завантаження зображень.", "Функція Next.js, що регенерує статичні сторінки у фоні через вказаний інтервал часу, поєднуючи швидкість SSG з майже реальною актуальністю даних.", "Серверний інкрементальний рендеринг.", "Підхід до управління станом."] }, correctIndex: 1, explanation: { en: "export const revalidate = 60; — page is served statically but regenerated every 60 seconds. First visitor after 60s gets stale page, triggers background rebuild. Next visitor gets fresh page.", de: "export const revalidate = 60; — Seite wird statisch ausgeliefert, aber alle 60 Sekunden regeneriert. Erster Besucher nach 60s erhält veraltete Seite, löst Hintergrund-Rebuild aus. Nächster Besucher erhält frische Seite.", ru: "export const revalidate = 60; — страница отдаётся статически, но регенерируется каждые 60 секунд. Первый посетитель после 60 сек получает устаревшую страницу, запускает фоновую пересборку. Следующий посетитель получает свежую страницу.", uk: "export const revalidate = 60; — сторінка віддається статично, але регенерується кожні 60 секунд. Перший відвідувач після 60 сек отримує застарілу сторінку, запускає фонову перезбірку. Наступний відвідувач отримує свіжу сторінку." } },
{ category: "Next.js", question: { en: "What is the difference between Pages Router and App Router in Next.js?", de: "Was ist der Unterschied zwischen Pages Router und App Router in Next.js?", ru: "В чём разница между Pages Router и App Router в Next.js?", uk: "В чому різниця між Pages Router та App Router у Next.js?" }, options: { en: ["They're the same.", "Pages Router: file-based routing in /pages, getServerSideProps/getStaticProps for data. App Router: /app directory, Server Components by default, layouts, and streaming.", "App Router is for mobile apps.", "Pages Router is deprecated."], de: ["Sie sind identisch.", "Pages Router: dateibasiertes Routing in /pages, getServerSideProps/getStaticProps für Daten. App Router: /app-Verzeichnis, Server Components als Standard, Layouts und Streaming.", "App Router ist für Mobile Apps.", "Pages Router ist veraltet."], ru: ["Они одинаковые.", "Pages Router: файловая маршрутизация в /pages, getServerSideProps/getStaticProps для данных. App Router: директория /app, Server Components по умолчанию, layouts и streaming.", "App Router для мобильных приложений.", "Pages Router устарел."], uk: ["Вони однакові.", "Pages Router: файлова маршрутизація в /pages, getServerSideProps/getStaticProps для даних. App Router: директорія /app, Server Components за замовчуванням, layouts та streaming.", "App Router для мобільних додатків.", "Pages Router застарілий."] }, correctIndex: 1, explanation: { en: "App Router (Next.js 13+): Server Components, nested layouts, streaming, loading.tsx/error.tsx conventions. Pages Router: traditional React with explicit data fetching functions. Both coexist.", de: "App Router (Next.js 13+): Server Components, verschachtelte Layouts, Streaming, loading.tsx/error.tsx-Konventionen. Pages Router: traditionelles React mit expliziten Datenabruf-Funktionen. Beide koexistieren.", ru: "App Router (Next.js 13+): Server Components, вложенные layouts, streaming, конвенции loading.tsx/error.tsx. Pages Router: традиционный React с явными функциями получения данных. Оба сосуществуют.", uk: "App Router (Next.js 13+): Server Components, вкладені layouts, streaming, конвенції loading.tsx/error.tsx. Pages Router: традиційний React з явними функціями отримання даних. Обидва співіснують." } },
// ===== FORMS & DATA FETCHING =====
{ category: "Forms", question: { en: "Why use a form library like React Hook Form over manual state?", de: "Warum eine Formular-Bibliothek wie React Hook Form statt manuellem State verwenden?", ru: "Зачем использовать библиотеку форм вроде React Hook Form вместо ручного state?", uk: "Навіщо використовувати бібліотеку форм на кшталт React Hook Form замість ручного state?" }, options: { en: ["Manual state management is always better.", "React Hook Form uses uncontrolled inputs with refs, minimizing re-renders. It provides validation, error handling, and field-level optimization out of the box.", "Form libraries are only for large forms.", "Manual state is faster."], de: ["Manuelles State-Management ist immer besser.", "React Hook Form verwendet unkontrollierte Inputs mit Refs, minimiert Re-Renders. Es bietet Validierung, Fehlerbehandlung und feldweise Optimierung von Haus aus.", "Formular-Bibliotheken sind nur für grosse Formulare.", "Manueller State ist schneller."], ru: ["Ручное управление состоянием всегда лучше.", "React Hook Form использует неконтролируемые input с ref, минимизируя ре-рендеры. Предоставляет валидацию, обработку ошибок и оптимизацию на уровне полей из коробки.", "Библиотеки форм нужны только для больших форм.", "Ручной state быстрее."], uk: ["Ручне управління станом завжди краще.", "React Hook Form використовує неконтрольовані input з ref, мінімізуючи ре-рендери. Надає валідацію, обробку помилок та оптимізацію на рівні полів з коробки.", "Бібліотеки форм потрібні лише для великих форм.", "Ручний state швидший."] }, correctIndex: 1, explanation: { en: "With useState per field: every keystroke re-renders the entire form. React Hook Form: registers inputs via ref, only re-renders changed fields. Plus: Zod/Yup validation integration.", de: "Mit useState pro Feld: jeder Tastendruck rendert das gesamte Formular neu. React Hook Form: registriert Inputs via Ref, rendert nur geänderte Felder neu. Plus: Zod/Yup-Validierungsintegration.", ru: "С useState на каждое поле: каждое нажатие клавиши ре-рендерит всю форму. React Hook Form: регистрирует input через ref, ре-рендерит только изменённые поля. Плюс: интеграция валидации Zod/Yup.", uk: "З useState на кожне поле: кожне натискання клавіші ре-рендерить всю форму. React Hook Form: реєструє input через ref, ре-рендерить лише змінені поля. Плюс: інтеграція валідації Zod/Yup." } },
