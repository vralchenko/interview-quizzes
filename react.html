{ category: "Data Fetching", question: { en: "What problem does React Query (TanStack Query) solve?", de: "Welches Problem löst React Query (TanStack Query)?", ru: "Какую проблему решает React Query (TanStack Query)?", uk: "Яку проблему вирішує React Query (TanStack Query)?" }, options: { en: ["It replaces GraphQL.", "It manages server state: caching, background refetching, stale-while-revalidate, pagination, optimistic updates, and automatic retry — eliminating manual loading/error state management.", "It's a database query builder.", "It only works with REST APIs."], de: ["Es ersetzt GraphQL.", "Es verwaltet Server-State: Caching, Hintergrund-Refetching, Stale-While-Revalidate, Paginierung, optimistische Updates und automatische Retries — eliminiert manuelles Laden/Fehler-State-Management.", "Es ist ein Datenbank-Query-Builder.", "Es funktioniert nur mit REST-APIs."], ru: ["Он заменяет GraphQL.", "Управляет серверным состоянием: кеширование, фоновый refetching, stale-while-revalidate, пагинация, оптимистичные обновления и автоматические повторы — устраняя ручное управление состояниями загрузки/ошибки.", "Это конструктор запросов к базе данных.", "Работает только с REST API."], uk: ["Він замінює GraphQL.", "Керує серверним станом: кешування, фоновий refetching, stale-while-revalidate, пагінація, оптимістичні оновлення та автоматичні повтори — усуваючи ручне управління станами завантаження/помилки.", "Це конструктор запитів до бази даних.", "Працює лише з REST API."] }, correctIndex: 1, explanation: { en: "Without React Query: useState for data, loading, error. useEffect for fetching. Manual cache invalidation. With React Query: const { data, isLoading } = useQuery(['users'], fetchUsers). Done.", de: "Ohne React Query: useState für Daten, Laden, Fehler. useEffect für Fetching. Manuelle Cache-Invalidierung. Mit React Query: const { data, isLoading } = useQuery(['users'], fetchUsers). Fertig.", ru: "Без React Query: useState для данных, загрузки, ошибки. useEffect для запросов. Ручная инвалидация кеша. С React Query: const { data, isLoading } = useQuery(['users'], fetchUsers). Готово.", uk: "Без React Query: useState для даних, завантаження, помилки. useEffect для запитів. Ручна інвалідація кешу. З React Query: const { data, isLoading } = useQuery(['users'], fetchUsers). Готово." } },
{ category: "Data Fetching", question: { en: "What is the stale-while-revalidate pattern?", de: "Was ist das Stale-While-Revalidate-Muster?", ru: "Что такое паттерн stale-while-revalidate?", uk: "Що таке патерн stale-while-revalidate?" }, options: { en: ["Serving stale food while cooking fresh.", "Immediately return cached (potentially stale) data to the UI, then fetch fresh data in the background and update when ready — instant perceived speed with eventual freshness.", "A browser caching header.", "A database caching strategy."], de: ["Altes Essen servieren, während frisches gekocht wird.", "Sofort gecachte (möglicherweise veraltete) Daten an die UI liefern, dann frische Daten im Hintergrund abrufen und aktualisieren, wenn bereit — sofort wahrgenommene Geschwindigkeit mit letztendlicher Aktualität.", "Ein Browser-Caching-Header.", "Eine Datenbank-Caching-Strategie."], ru: ["Подавать несвежую еду, пока готовится свежая.", "Немедленно вернуть кешированные (возможно устаревшие) данные в UI, затем получить свежие данные в фоне и обновить при готовности — мгновенная воспринимаемая скорость с последующей актуальностью.", "Заголовок кеширования браузера.", "Стратегия кеширования базы данных."], uk: ["Подавати несвіжу їжу, поки готується свіжа.", "Негайно повернути кешовані (можливо застарілі) дані в UI, потім отримати свіжі дані у фоні та оновити при готовності — миттєва сприймана швидкість з подальшою актуальністю.", "Заголовок кешування браузера.", "Стратегія кешування бази даних."] }, correctIndex: 1, explanation: { en: "User navigates to /users → instant display from cache → background fetch → if data changed, UI seamlessly updates. SWR library and React Query both implement this pattern.", de: "Benutzer navigiert zu /users → sofortige Anzeige aus dem Cache → Hintergrund-Fetch → wenn sich Daten geändert haben, aktualisiert sich die UI nahtlos. SWR-Bibliothek und React Query implementieren dieses Muster.", ru: "Пользователь переходит на /users → мгновенное отображение из кеша → фоновый fetch → если данные изменились, UI обновляется бесшовно. Библиотека SWR и React Query оба реализуют этот паттерн.", uk: "Користувач переходить на /users → миттєве відображення з кешу → фоновий fetch → якщо дані змінилися, UI оновлюється безшовно. Бібліотека SWR та React Query обидва реалізують цей патерн." } },
// ===== TESTING =====
{ category: "Testing", question: { en: "What is the React Testing Library's core philosophy?", de: "Was ist die Kernphilosophie der React Testing Library?", ru: "Какова основная философия React Testing Library?", uk: "Яка основна філософія React Testing Library?" }, options: { en: ["Test implementation details like state and lifecycle.", "Test components the way users interact with them — find elements by role/label/text, not by class names or component internals. 'The more your tests resemble user behavior, the more confidence they give.'", "Always test with Enzyme.", "Only test with end-to-end tools."], de: ["Implementierungsdetails wie State und Lifecycle testen.", "Komponenten so testen, wie Benutzer mit ihnen interagieren — Elemente nach Rolle/Label/Text finden, nicht nach Klassennamen oder Komponenteninterna. 'Je mehr Ihre Tests dem Benutzerverhalten ähneln, desto mehr Vertrauen geben sie.'", "Immer mit Enzyme testen.", "Nur mit End-to-End-Tools testen."], ru: ["Тестировать детали реализации — состояние и жизненный цикл.", "Тестировать компоненты так, как пользователи взаимодействуют с ними — искать элементы по роли/лейблу/тексту, а не по именам классов или внутренностям компонента. «Чем больше тесты похожи на поведение пользователей, тем больше уверенности они дают».", "Всегда тестировать с Enzyme.", "Тестировать только end-to-end инструментами."], uk: ["Тестувати деталі реалізації — стан та життєвий цикл.", "Тестувати компоненти так, як користувачі взаємодіють з ними — шукати елементи за роллю/лейблом/текстом, а не за іменами класів чи внутрішностями компонента. «Чим більше тести схожі на поведінку користувачів, тим більше впевненості вони дають».", "Завжди тестувати з Enzyme.", "Тестувати лише end-to-end інструментами."] }, correctIndex: 1, explanation: { en: "screen.getByRole('button', {name: 'Submit'}) instead of wrapper.find('.btn-primary'). If you rename the CSS class, the RTL test still passes. If the button text changes, both break — correctly.", de: "screen.getByRole('button', {name: 'Submit'}) statt wrapper.find('.btn-primary'). Wenn die CSS-Klasse umbenannt wird, besteht der RTL-Test weiterhin. Wenn sich der Button-Text ändert, brechen beide — korrekt.", ru: "screen.getByRole('button', {name: 'Submit'}) вместо wrapper.find('.btn-primary'). Если переименовать CSS-класс, тест RTL всё равно проходит. Если текст кнопки изменится, оба ломаются — правильно.", uk: "screen.getByRole('button', {name: 'Submit'}) замість wrapper.find('.btn-primary'). Якщо перейменувати CSS-клас, тест RTL все одно проходить. Якщо текст кнопки зміниться, обидва ламаються — правильно." } },
{ category: "Testing", question: { en: "How do you test async behavior in React Testing Library?", de: "Wie testet man asynchrones Verhalten in der React Testing Library?", ru: "Как тестировать асинхронное поведение в React Testing Library?", uk: "Як тестувати асинхронну поведінку в React Testing Library?" }, options: { en: ["Use setTimeout in tests.", "Use waitFor() or findBy* queries that automatically wait for elements to appear after async operations (API calls, state updates) complete.", "Mock the event loop.", "Async testing isn't possible."], de: ["setTimeout in Tests verwenden.", "waitFor() oder findBy*-Abfragen verwenden, die automatisch auf das Erscheinen von Elementen nach Abschluss asynchroner Operationen (API-Aufrufe, State-Updates) warten.", "Die Event-Schleife mocken.", "Asynchrones Testen ist nicht möglich."], ru: ["Использовать setTimeout в тестах.", "Использовать waitFor() или запросы findBy*, которые автоматически ожидают появления элементов после завершения асинхронных операций (API-вызовы, обновления state).", "Мокать event loop.", "Асинхронное тестирование невозможно."], uk: ["Використовувати setTimeout у тестах.", "Використовувати waitFor() або запити findBy*, які автоматично очікують появи елементів після завершення асинхронних операцій (API-виклики, оновлення state).", "Мокати event loop.", "Асинхронне тестування неможливе."] }, correctIndex: 1, explanation: { en: "const button = await screen.findByText('Loaded'); or await waitFor(() => expect(screen.getByText('Loaded')).toBeInTheDocument()). RTL polls the DOM until the assertion passes or times out.", de: "const button = await screen.findByText('Loaded'); oder await waitFor(() => expect(screen.getByText('Loaded')).toBeInTheDocument()). RTL pollt das DOM, bis die Assertion besteht oder ein Timeout erreicht wird.", ru: "const button = await screen.findByText('Loaded'); или await waitFor(() => expect(screen.getByText('Loaded')).toBeInTheDocument()). RTL опрашивает DOM, пока assertion не пройдёт или не истечёт таймаут.", uk: "const button = await screen.findByText('Loaded'); або await waitFor(() => expect(screen.getByText('Loaded')).toBeInTheDocument()). RTL опитує DOM, поки assertion не пройде або не спливе таймаут." } },
// ===== ACCESSIBILITY & SECURITY =====
{ category: "Accessibility", question: { en: "How do you make React apps accessible?", de: "Wie macht man React-Apps barrierefrei?", ru: "Как сделать React-приложения доступными?", uk: "Як зробити React-додатки доступними?" }, options: { en: ["Add alt text to images only.", "Use semantic HTML, ARIA attributes, keyboard navigation, focus management, proper heading hierarchy, and test with screen readers. React supports aria-* props natively.", "Accessibility is handled by the browser.", "Just use a CSS framework."], de: ["Nur Alt-Text zu Bildern hinzufügen.", "Semantisches HTML, ARIA-Attribute, Tastaturnavigation, Fokus-Management, korrekte Überschriftenhierarchie verwenden und mit Screenreadern testen. React unterstützt aria-*-Props nativ.", "Barrierefreiheit wird vom Browser gehandhabt.", "Einfach ein CSS-Framework verwenden."], ru: ["Добавить alt-текст только к изображениям.", "Использовать семантический HTML, ARIA-атрибуты, навигацию с клавиатуры, управление фокусом, правильную иерархию заголовков и тестировать с программами чтения экрана. React поддерживает aria-* props нативно.", "Доступность обеспечивается браузером.", "Просто использовать CSS-фреймворк."], uk: ["Додати alt-текст лише до зображень.", "Використовувати семантичний HTML, ARIA-атрибути, навігацію з клавіатури, управління фокусом, правильну ієрархію заголовків та тестувати з програмами читання екрану. React підтримує aria-* props нативно.", "Доступність забезпечується браузером.", "Просто використовувати CSS-фреймворк."] }, correctIndex: 1, explanation: { en: "<button> not <div onClick>. aria-label for icon buttons. tabIndex for focus order. useRef + focus() for modals. eslint-plugin-jsx-a11y catches common issues automatically.", de: "<button> statt <div onClick>. aria-label für Icon-Buttons. tabIndex für Fokus-Reihenfolge. useRef + focus() für Modals. eslint-plugin-jsx-a11y erkennt häufige Probleme automatisch.", ru: "<button>, а не <div onClick>. aria-label для кнопок-иконок. tabIndex для порядка фокуса. useRef + focus() для модальных окон. eslint-plugin-jsx-a11y автоматически обнаруживает распространённые проблемы.", uk: "<button>, а не <div onClick>. aria-label для кнопок-іконок. tabIndex для порядку фокуса. useRef + focus() для модальних вікон. eslint-plugin-jsx-a11y автоматично виявляє поширені проблеми." } },
{ category: "Security", question: { en: "How does React prevent XSS attacks?", de: "Wie verhindert React XSS-Angriffe?", ru: "Как React предотвращает XSS-атаки?", uk: "Як React запобігає XSS-атакам?" }, options: { en: ["It doesn't — you must sanitize manually.", "React auto-escapes all values embedded in JSX before rendering to the DOM. Only dangerouslySetInnerHTML bypasses this protection.", "React uses a Web Application Firewall.", "XSS is a server-side issue only."], de: ["Gar nicht — man muss manuell sanitisieren.", "React escaped automatisch alle in JSX eingebetteten Werte vor dem Rendern ins DOM. Nur dangerouslySetInnerHTML umgeht diesen Schutz.", "React verwendet eine Web Application Firewall.", "XSS ist nur ein serverseitiges Problem."], ru: ["Никак — нужно вручную санитизировать.", "React автоматически экранирует все значения, встроенные в JSX, перед рендерингом в DOM. Только dangerouslySetInnerHTML обходит эту защиту.", "React использует Web Application Firewall.", "XSS — только серверная проблема."], uk: ["Ніяк — потрібно вручну санітизувати.", "React автоматично екранує всі значення, вбудовані у JSX, перед рендерингом у DOM. Лише dangerouslySetInnerHTML обходить цей захист.", "React використовує Web Application Firewall.", "XSS — лише серверна проблема."] }, correctIndex: 1, explanation: { en: "const name = '<script>alert(1)<\\/script>'; <div>{name}<\\/div> renders the literal string, not a script tag. React escapes by default. NEVER use dangerouslySetInnerHTML with user input.", de: "const name = '<script>alert(1)<\\/script>'; <div>{name}<\\/div> rendert den literalen String, kein Script-Tag. React escaped standardmässig. NIEMALS dangerouslySetInnerHTML mit Benutzereingaben verwenden.", ru: "const name = '<script>alert(1)<\\/script>'; <div>{name}<\\/div> рендерит строку буквально, а не тег script. React экранирует по умолчанию. НИКОГДА не используйте dangerouslySetInnerHTML с пользовательским вводом.", uk: "const name = '<script>alert(1)<\\/script>'; <div>{name}<\\/div> рендерить рядок буквально, а не тег script. React екранує за замовчуванням. НІКОЛИ не використовуйте dangerouslySetInnerHTML з користувацьким введенням." } },
// ===== ADVANCED =====
{ category: "Advanced", question: { en: "What is a React Portal?", de: "Was ist ein React Portal?", ru: "Что такое React Portal?", uk: "Що таке React Portal?" }, options: { en: ["A navigation component.", "ReactDOM.createPortal(child, domNode) renders a component into a different DOM node outside the parent hierarchy — used for modals, tooltips, and toasts that need to escape overflow:hidden.", "A routing mechanism.", "A server-side rendering technique."], de: ["Eine Navigationskomponente.", "ReactDOM.createPortal(child, domNode) rendert eine Komponente in einen anderen DOM-Knoten ausserhalb der Elternhierarchie — verwendet für Modals, Tooltips und Toasts, die overflow:hidden entkommen müssen.", "Ein Routing-Mechanismus.", "Eine serverseitige Rendering-Technik."], ru: ["Навигационный компонент.", "ReactDOM.createPortal(child, domNode) рендерит компонент в другой DOM-узел вне родительской иерархии — используется для модальных окон, tooltip-ов и toast-ов, которым нужно выйти за overflow:hidden.", "Механизм маршрутизации.", "Техника серверного рендеринга."], uk: ["Навігаційний компонент.", "ReactDOM.createPortal(child, domNode) рендерить компонент в інший DOM-вузол поза батьківською ієрархією — використовується для модальних вікон, tooltip-ів та toast-ів, яким потрібно вийти за overflow:hidden.", "Механізм маршрутизації.", "Техніка серверного рендерингу."] }, correctIndex: 1, explanation: { en: "A modal inside a deeply nested component with overflow:hidden would be clipped. Portal renders it into document.body. React events still bubble through the React tree, not the DOM tree.", de: "Ein Modal in einer tief verschachtelten Komponente mit overflow:hidden würde abgeschnitten. Portal rendert es in document.body. React-Events bubblen weiterhin durch den React-Baum, nicht den DOM-Baum.", ru: "Модальное окно внутри глубоко вложенного компонента с overflow:hidden будет обрезано. Portal рендерит его в document.body. React-события по-прежнему всплывают по дереву React, а не DOM.", uk: "Модальне вікно всередині глибоко вкладеного компонента з overflow:hidden буде обрізане. Portal рендерить його в document.body. React-події все одно спливають по дереву React, а не DOM." } },
{ category: "Advanced", question: { en: "What is an Error Boundary?", de: "Was ist eine Error Boundary?", ru: "Что такое Error Boundary?", uk: "Що таке Error Boundary?" }, options: { en: ["A try/catch in JSX.", "A class component implementing componentDidCatch/getDerivedStateFromError that catches JavaScript errors in its child component tree and displays a fallback UI.", "A middleware for error handling.", "A hook for handling async errors."], de: ["Ein try/catch in JSX.", "Eine Klassenkomponente, die componentDidCatch/getDerivedStateFromError implementiert, JavaScript-Fehler im Kindkomponentenbaum fängt und eine Fallback-UI anzeigt.", "Eine Middleware für Fehlerbehandlung.", "Ein Hook für asynchrone Fehlerbehandlung."], ru: ["try/catch в JSX.", "Классовый компонент, реализующий componentDidCatch/getDerivedStateFromError, который перехватывает JavaScript-ошибки в дереве дочерних компонентов и отображает fallback UI.", "Middleware для обработки ошибок.", "Hook для обработки асинхронных ошибок."], uk: ["try/catch у JSX.", "Класовий компонент, що реалізує componentDidCatch/getDerivedStateFromError, який перехоплює JavaScript-помилки у дереві дочірніх компонентів і відображає fallback UI.", "Middleware для обробки помилок.", "Hook для обробки асинхронних помилок."] }, correctIndex: 1, explanation: { en: "Error Boundaries prevent one broken component from crashing the entire app. They catch render errors, lifecycle errors, and constructor errors. They do NOT catch event handler or async errors.", de: "Error Boundaries verhindern, dass eine defekte Komponente die gesamte App zum Absturz bringt. Sie fangen Render-Fehler, Lifecycle-Fehler und Konstruktor-Fehler. Sie fangen KEINE Event-Handler- oder Async-Fehler.", ru: "Error Boundaries предотвращают падение всего приложения из-за одного сломанного компонента. Они перехватывают ошибки рендера, жизненного цикла и конструктора. Они НЕ перехватывают ошибки обработчиков событий или асинхронные.", uk: "Error Boundaries запобігають падінню всього додатку через один зламаний компонент. Вони перехоплюють помилки рендеру, життєвого циклу та конструктора. Вони НЕ перехоплюють помилки обробників подій чи асинхронні." } },
{ category: "Advanced", question: { en: "What is Concurrent Rendering in React 18?", de: "Was ist Concurrent Rendering in React 18?", ru: "Что такое Concurrent Rendering в React 18?", uk: "Що таке Concurrent Rendering у React 18?" }, options: { en: ["Rendering multiple apps simultaneously.", "React can prepare multiple versions of the UI simultaneously, interrupt rendering to handle urgent updates (like typing), and resume low-priority work without blocking the main thread.", "Running React in Web Workers.", "Server-side parallel rendering."], de: ["Mehrere Apps gleichzeitig rendern.", "React kann mehrere Versionen der UI gleichzeitig vorbereiten, Rendering unterbrechen, um dringende Updates (wie Tippen) zu verarbeiten, und niedrig priorisierte Arbeit fortsetzen, ohne den Main Thread zu blockieren.", "React in Web Workers ausführen.", "Serverseitiges paralleles Rendering."], ru: ["Рендеринг нескольких приложений одновременно.", "React может подготавливать несколько версий UI одновременно, прерывать рендеринг для обработки срочных обновлений (вроде ввода текста) и возобновлять низкоприоритетную работу без блокировки основного потока.", "Запуск React в Web Workers.", "Серверный параллельный рендеринг."], uk: ["Рендеринг кількох додатків одночасно.", "React може підготовлювати кілька версій UI одночасно, переривати рендеринг для обробки термінових оновлень (на кшталт введення тексту) та відновлювати низькопріоритетну роботу без блокування основного потоку.", "Запуск React у Web Workers.", "Серверний паралельний рендеринг."] }, correctIndex: 1, explanation: { en: "Before React 18: rendering was synchronous and uninterruptible. Now: React can pause rendering a large list to immediately handle a keystroke, then resume. Enabled by useTransition and useDeferredValue.", de: "Vor React 18: Rendering war synchron und nicht unterbrechbar. Jetzt: React kann das Rendering einer grossen Liste pausieren, um sofort einen Tastendruck zu verarbeiten, dann fortsetzen. Aktiviert durch useTransition und useDeferredValue.", ru: "До React 18: рендеринг был синхронным и непрерываемым. Теперь: React может приостановить рендеринг большого списка для немедленной обработки нажатия клавиши, затем возобновить. Включается через useTransition и useDeferredValue.", uk: "До React 18: рендеринг був синхронним і неперериваним. Тепер: React може призупинити рендеринг великого списку для негайної обробки натискання клавіші, потім відновити. Вмикається через useTransition та useDeferredValue." } },
{ category: "Advanced", question: { en: "What is the difference between useId and Math.random() for generating IDs?", de: "Was ist der Unterschied zwischen useId und Math.random() zum Generieren von IDs?", ru: "В чём разница между useId и Math.random() для генерации ID?", uk: "В чому різниця між useId та Math.random() для генерації ID?" }, options: { en: ["They're interchangeable.", "useId generates stable, unique IDs that are consistent between server and client (SSR-safe). Math.random() produces different values on server vs client, causing hydration mismatches.", "Math.random is more unique.", "useId is only for testing."], de: ["Sie sind austauschbar.", "useId generiert stabile, eindeutige IDs, die zwischen Server und Client konsistent sind (SSR-sicher). Math.random() erzeugt unterschiedliche Werte auf Server vs Client, was zu Hydration-Mismatches führt.", "Math.random ist eindeutiger.", "useId ist nur zum Testen."], ru: ["Они взаимозаменяемы.", "useId генерирует стабильные, уникальные ID, согласованные между сервером и клиентом (безопасно для SSR). Math.random() производит разные значения на сервере и клиенте, вызывая несовпадения гидрации.", "Math.random более уникален.", "useId только для тестирования."], uk: ["Вони взаємозамінні.", "useId генерує стабільні, унікальні ID, узгоджені між сервером та клієнтом (безпечно для SSR). Math.random() виробляє різні значення на сервері та клієнті, спричиняючи невідповідності гідрації.", "Math.random більш унікальний.", "useId лише для тестування."] }, correctIndex: 1, explanation: { en: "SSR: server renders id='abc123', client hydrates expecting id='abc123'. Math.random() gives different values → hydration mismatch error. useId: deterministic, same on server and client.", de: "SSR: Server rendert id='abc123', Client hydratisiert mit Erwartung id='abc123'. Math.random() gibt unterschiedliche Werte → Hydration-Mismatch-Fehler. useId: deterministisch, gleich auf Server und Client.", ru: "SSR: сервер рендерит id='abc123', клиент гидратирует ожидая id='abc123'. Math.random() даёт разные значения → ошибка несовпадения гидрации. useId: детерминистичный, одинаковый на сервере и клиенте.", uk: "SSR: сервер рендерить id='abc123', клієнт гідратує очікуючи id='abc123'. Math.random() дає різні значення → помилка невідповідності гідрації. useId: детерміністичний, однаковий на сервері та клієнті." } },
{ category: "Advanced", question: { en: "What is hydration in the context of SSR?", de: "Was ist Hydration im Kontext von SSR?", ru: "Что такое гидрация в контексте SSR?", uk: "Що таке гідрація в контексті SSR?" }, options: { en: ["Adding water to components.", "The process where React attaches event listeners and makes server-rendered static HTML interactive on the client — it 'hydrates' the static markup with React behavior.", "Converting JSON to HTML.", "A database replication process."], de: ["Wasser zu Komponenten hinzufügen.", "Der Prozess, bei dem React Event-Listener anhängt und server-gerendertes statisches HTML auf dem Client interaktiv macht — es 'hydratisiert' das statische Markup mit React-Verhalten.", "JSON in HTML konvertieren.", "Ein Datenbankreplikationsprozess."], ru: ["Добавление воды к компонентам.", "Процесс, при котором React присоединяет обработчики событий и делает серверно-отрендеренный статический HTML интерактивным на клиенте — «гидратирует» статическую разметку поведением React.", "Конвертация JSON в HTML.", "Процесс репликации базы данных."], uk: ["Додавання води до компонентів.", "Процес, при якому React приєднує обробники подій та робить серверно-відрендерений статичний HTML інтерактивним на клієнті — «гідратує» статичну розмітку поведінкою React.", "Конвертація JSON у HTML.", "Процес реплікації бази даних."] }, correctIndex: 1, explanation: { en: "Server sends HTML (fast initial paint). React on the client doesn't re-render from scratch — it reuses the existing DOM, attaches event handlers, and resumes managing state. Must match exactly.", de: "Server sendet HTML (schneller erster Paint). React auf dem Client rendert nicht von Grund auf neu — es nutzt das vorhandene DOM wieder, hängt Event-Handler an und übernimmt die State-Verwaltung. Muss exakt übereinstimmen.", ru: "Сервер отправляет HTML (быстрая первоначальная отрисовка). React на клиенте не рендерит с нуля — он переиспользует существующий DOM, присоединяет обработчики событий и возобновляет управление состоянием. Должен точно совпадать.", uk: "Сервер надсилає HTML (швидка початкова відмальовка). React на клієнті не рендерить з нуля — він перевикористовує існуючий DOM, приєднує обробники подій та відновлює управління станом. Має точно збігатися." } },
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
</body>
</html>
