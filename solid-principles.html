{ category: "ISP", question: { en: "How do you identify ISP violations in a codebase?", de: "Wie erkennt man ISP-Verletzungen in einer Codebasis?", ru: "Как обнаружить нарушения ISP в кодовой базе?", uk: "Як виявити порушення ISP у кодовій базі?" }, options: { en: ["Count the number of interfaces.", "Look for classes that implement interfaces but throw NotImplementedException or leave methods empty.", "Check if interfaces have more than 5 methods.", "Look for classes with too many constructors."], de: ["Die Anzahl der Interfaces zählen.", "Nach Klassen suchen, die Interfaces implementieren, aber NotImplementedException werfen oder Methoden leer lassen.", "Prüfen, ob Interfaces mehr als 5 Methoden haben.", "Nach Klassen mit zu vielen Konstruktoren suchen."], ru: ["Подсчитать количество интерфейсов.", "Искать классы, которые реализуют интерфейсы, но бросают NotImplementedException или оставляют методы пустыми.", "Проверить, есть ли в интерфейсах более 5 методов.", "Искать классы с слишком большим количеством конструкторов."], uk: ["Підрахувати кількість інтерфейсів.", "Шукати класи, які реалізують інтерфейси, але кидають NotImplementedException або залишають методи порожніми.", "Перевірити, чи мають інтерфейси більше 5 методів.", "Шукати класи з занадто великою кількістю конструкторів."] }, correctIndex: 1, explanation: { en: "Empty implementations or NotImplementedException are red flags — the class doesn't need those methods, meaning the interface is too broad.", de: "Leere Implementierungen oder NotImplementedException sind Warnsignale — die Klasse braucht diese Methoden nicht, das Interface ist zu breit.", ru: "Пустые реализации или NotImplementedException — красные флаги: класс не нуждается в этих методах, а значит, интерфейс слишком широкий.", uk: "Порожні реалізації або NotImplementedException — червоні прапорці: клас не потребує цих методів, а отже, інтерфейс занадто широкий." } },
{ category: "ISP", question: { en: "A printing interface has Print(), Scan(), Fax(), and Staple(). A basic printer only prints. What's the ISP solution?", de: "Ein Druck-Interface hat Print(), Scan(), Fax() und Staple(). Ein einfacher Drucker druckt nur. Was ist die ISP-Lösung?", ru: "Интерфейс печати имеет Print(), Scan(), Fax() и Staple(). Простой принтер только печатает. Каково решение по ISP?", uk: "Інтерфейс друку має Print(), Scan(), Fax() та Staple(). Простий принтер лише друкує. Яке рішення за ISP?" }, options: { en: ["The basic printer should implement all methods anyway.", "Split into IPrinter, IScanner, IFax, IStapler. Basic printer implements only IPrinter.", "Make all methods optional with default implementations.", "Use one interface but mark unused methods as [Obsolete]."], de: ["Der einfache Drucker sollte trotzdem alle Methoden implementieren.", "Aufteilen in IPrinter, IScanner, IFax, IStapler. Einfacher Drucker implementiert nur IPrinter.", "Alle Methoden optional machen mit Default-Implementierungen.", "Ein Interface verwenden, aber ungenutzte Methoden als [Obsolete] markieren."], ru: ["Простой принтер должен реализовать все методы в любом случае.", "Разделить на IPrinter, IScanner, IFax, IStapler. Простой принтер реализует только IPrinter.", "Сделать все методы необязательными с реализациями по умолчанию.", "Использовать один интерфейс, но пометить неиспользуемые методы как [Obsolete]."], uk: ["Простий принтер повинен реалізувати всі методи в будь-якому випадку.", "Розділити на IPrinter, IScanner, IFax, IStapler. Простий принтер реалізує лише IPrinter.", "Зробити всі методи необов'язковими з реалізаціями за замовчуванням.", "Використати один інтерфейс, але позначити невикористовувані методи як [Obsolete]."] }, correctIndex: 1, explanation: { en: "Each capability becomes its own interface. Devices implement only what they support. A multifunction device implements all four.", de: "Jede Fähigkeit wird zu ihrem eigenen Interface. Geräte implementieren nur das, was sie unterstützen. Ein Multifunktionsgerät implementiert alle vier.", ru: "Каждая возможность становится отдельным интерфейсом. Устройства реализуют только то, что поддерживают. Многофункциональное устройство реализует все четыре.", uk: "Кожна можливість стає окремим інтерфейсом. Пристрої реалізують лише те, що підтримують. Багатофункціональний пристрій реалізує всі чотири." } },
{ category: "ISP", question: { en: "How do C# default interface methods (C# 8+) relate to ISP?", de: "Wie hängen C# Default Interface Methods (C# 8+) mit ISP zusammen?", ru: "Как default-методы интерфейсов в C# (C# 8+) связаны с ISP?", uk: "Як default-методи інтерфейсів у C# (C# 8+) пов'язані з ISP?" }, options: { en: ["They eliminate the need for ISP entirely.", "They can help evolve interfaces without breaking implementers, but don't solve the fundamental ISP issue of forcing unused dependencies.", "Default methods replace abstract classes.", "They violate ISP by definition."], de: ["Sie eliminieren die Notwendigkeit für ISP vollständig.", "Sie können helfen, Interfaces weiterzuentwickeln, ohne Implementierer zu brechen, lösen aber nicht das grundlegende ISP-Problem des Erzwingens ungenutzter Abhängigkeiten.", "Default Methods ersetzen abstrakte Klassen.", "Sie verletzen ISP per Definition."], ru: ["Они полностью устраняют необходимость в ISP.", "Они помогают развивать интерфейсы без нарушения реализаторов, но не решают фундаментальную проблему ISP — навязывание неиспользуемых зависимостей.", "Default-методы заменяют абстрактные классы.", "Они по определению нарушают ISP."], uk: ["Вони повністю усувають потребу в ISP.", "Вони допомагають розвивати інтерфейси без порушення реалізаторів, але не вирішують фундаментальну проблему ISP — нав'язування невикористовуваних залежностей.", "Default-методи замінюють абстрактні класи.", "Вони за визначенням порушують ISP."] }, correctIndex: 1, explanation: { en: "Default interface methods help backwards compatibility, but if a client depends on an interface with 20 methods and only uses 2, ISP is still violated.", de: "Default Interface Methods helfen bei Rückwärtskompatibilität, aber wenn ein Client von einem Interface mit 20 Methoden abhängt und nur 2 verwendet, ist ISP dennoch verletzt.", ru: "Default-методы помогают с обратной совместимостью, но если клиент зависит от интерфейса с 20 методами и использует только 2, ISP всё равно нарушен.", uk: "Default-методи допомагають із зворотною сумісністю, але якщо клієнт залежить від інтерфейсу з 20 методами і використовує лише 2, ISP все одно порушений." } },
{ category: "ISP", question: { en: "What is the connection between ISP and the Adapter pattern?", de: "Was ist der Zusammenhang zwischen ISP und dem Adapter-Pattern?", ru: "Какова связь между ISP и паттерном Adapter?", uk: "Який зв'язок між ISP та патерном Adapter?" }, options: { en: ["Adapter violates ISP.", "Adapter can bridge ISP-compliant narrow interfaces to legacy fat interfaces, shielding clients from unused methods.", "They're unrelated patterns.", "Adapter makes ISP unnecessary."], de: ["Adapter verletzt ISP.", "Adapter kann ISP-konforme schmale Interfaces mit Legacy-Fat-Interfaces verbinden und Clients vor ungenutzten Methoden schützen.", "Sie sind unverbundene Patterns.", "Adapter macht ISP unnötig."], ru: ["Adapter нарушает ISP.", "Adapter может соединить узкие ISP-совместимые интерфейсы с устаревшими толстыми интерфейсами, защищая клиентов от неиспользуемых методов.", "Это несвязанные паттерны.", "Adapter делает ISP ненужным."], uk: ["Adapter порушує ISP.", "Adapter може з'єднати вузькі ISP-сумісні інтерфейси зі застарілими товстими інтерфейсами, захищаючи клієнтів від невикористовуваних методів.", "Це непов'язані патерни.", "Adapter робить ISP непотрібним."] }, correctIndex: 1, explanation: { en: "If you can't change a fat third-party interface, an Adapter can expose only the methods your client needs, preserving ISP.", de: "Wenn man ein fettes Drittanbieter-Interface nicht ändern kann, kann ein Adapter nur die Methoden exponieren, die der Client braucht, und ISP bewahren.", ru: "Если нельзя изменить толстый интерфейс третьей стороны, Adapter может выставить только те методы, которые нужны клиенту, сохраняя ISP.", uk: "Якщо не можна змінити товстий інтерфейс третьої сторони, Adapter може виставити лише ті методи, які потрібні клієнту, зберігаючи ISP." } },
{ category: "ISP", question: { en: "A service depends on IConfiguration to read one setting. Is this an ISP concern?", de: "Ein Service hängt von IConfiguration ab, um eine Einstellung zu lesen. Ist das ein ISP-Anliegen?", ru: "Сервис зависит от IConfiguration для чтения одной настройки. Это проблема ISP?", uk: "Сервіс залежить від IConfiguration для читання одного налаштування. Це проблема ISP?" }, options: { en: ["No — IConfiguration is a standard .NET interface.", "Yes — the service depends on the entire configuration API when it only needs one value. Use IOptions<T> or inject the value directly.", "No — configuration is a cross-cutting concern.", "Yes — but only if the config file has more than 10 keys."], de: ["Nein — IConfiguration ist ein Standard-.NET-Interface.", "Ja — der Service hängt von der gesamten Konfigurations-API ab, obwohl er nur einen Wert braucht. IOptions<T> verwenden oder den Wert direkt injizieren.", "Nein — Konfiguration ist ein übergreifendes Anliegen.", "Ja — aber nur wenn die Config-Datei mehr als 10 Schlüssel hat."], ru: ["Нет — IConfiguration — стандартный интерфейс .NET.", "Да — сервис зависит от всего API конфигурации, когда ему нужно только одно значение. Используйте IOptions<T> или инжектируйте значение напрямую.", "Нет — конфигурация — это сквозная задача.", "Да — но только если конфигурационный файл содержит более 10 ключей."], uk: ["Ні — IConfiguration — стандартний інтерфейс .NET.", "Так — сервіс залежить від усього API конфігурації, коли йому потрібне лише одне значення. Використайте IOptions<T> або інжектуйте значення напряму.", "Ні — конфігурація — це наскрізна задача.", "Так — але лише якщо конфігураційний файл містить більше 10 ключів."] }, correctIndex: 1, explanation: { en: "IOptions<T> follows ISP by scoping configuration to a strongly-typed section. The service doesn't see database connection strings when it only needs an API key.", de: "IOptions<T> folgt ISP, indem Konfiguration auf einen stark typisierten Abschnitt begrenzt wird. Der Service sieht keine Datenbank-Connection-Strings, wenn er nur einen API-Key braucht.", ru: "IOptions<T> следует ISP, ограничивая конфигурацию строго типизированной секцией. Сервис не видит строки подключения к базе данных, когда ему нужен только API-ключ.", uk: "IOptions<T> дотримується ISP, обмежуючи конфігурацію строго типізованою секцією. Сервіс не бачить рядки підключення до бази даних, коли йому потрібен лише API-ключ." } },
// ===== DEPENDENCY INVERSION PRINCIPLE (DIP) =====
{ category: "DIP", question: { en: "What does the Dependency Inversion Principle state?", de: "Was besagt das Dependency Inversion Principle?", ru: "Что гласит принцип инверсии зависимостей (DIP)?", uk: "Що проголошує принцип інверсії залежностей (DIP)?" }, options: { en: ["Always use Dependency Injection containers.", "High-level modules should not depend on low-level modules. Both should depend on abstractions.", "Low-level modules should depend on high-level modules.", "Dependencies should be injected via constructors only."], de: ["Immer Dependency-Injection-Container verwenden.", "High-Level-Module sollten nicht von Low-Level-Modulen abhängen. Beide sollten von Abstraktionen abhängen.", "Low-Level-Module sollten von High-Level-Modulen abhängen.", "Abhängigkeiten sollten nur über Konstruktoren injiziert werden."], ru: ["Всегда используйте контейнеры Dependency Injection.", "Модули верхнего уровня не должны зависеть от модулей нижнего уровня. Оба должны зависеть от абстракций.", "Модули нижнего уровня должны зависеть от модулей верхнего уровня.", "Зависимости должны инжектироваться только через конструкторы."], uk: ["Завжди використовуйте контейнери Dependency Injection.", "Модулі верхнього рівня не повинні залежати від модулів нижнього рівня. Обидва повинні залежати від абстракцій.", "Модулі нижнього рівня повинні залежати від модулів верхнього рівня.", "Залежності повинні інжектуватися лише через конструктори."] }, correctIndex: 1, explanation: { en: "DIP inverts the traditional dependency direction. Instead of BusinessLogic depending on SqlDatabase, both depend on IDatabase.", de: "DIP invertiert die traditionelle Abhängigkeitsrichtung. Statt dass BusinessLogic von SqlDatabase abhängt, hängen beide von IDatabase ab.", ru: "DIP инвертирует традиционное направление зависимостей. Вместо того чтобы BusinessLogic зависел от SqlDatabase, оба зависят от IDatabase.", uk: "DIP інвертує традиційний напрямок залежностей. Замість того щоб BusinessLogic залежав від SqlDatabase, обидва залежать від IDatabase." } },
{ category: "DIP", question: { en: "What is the difference between Dependency Inversion and Dependency Injection?", de: "Was ist der Unterschied zwischen Dependency Inversion und Dependency Injection?", ru: "В чём разница между Dependency Inversion и Dependency Injection?", uk: "В чому різниця між Dependency Inversion та Dependency Injection?" }, options: { en: ["They are the same thing.", "Dependency Inversion is a principle (depend on abstractions). Dependency Injection is a technique (passing dependencies via constructors/parameters).", "Dependency Injection is the principle, Inversion is the technique.", "Dependency Injection only works in ASP.NET Core."], de: ["Sie sind dasselbe.", "Dependency Inversion ist ein Prinzip (von Abstraktionen abhängen). Dependency Injection ist eine Technik (Abhängigkeiten über Konstruktoren/Parameter übergeben).", "Dependency Injection ist das Prinzip, Inversion die Technik.", "Dependency Injection funktioniert nur in ASP.NET Core."], ru: ["Это одно и то же.", "Dependency Inversion — это принцип (зависеть от абстракций). Dependency Injection — это техника (передача зависимостей через конструкторы/параметры).", "Dependency Injection — это принцип, Inversion — техника.", "Dependency Injection работает только в ASP.NET Core."], uk: ["Це одне й те саме.", "Dependency Inversion — це принцип (залежати від абстракцій). Dependency Injection — це техніка (передача залежностей через конструктори/параметри).", "Dependency Injection — це принцип, Inversion — техніка.", "Dependency Injection працює лише в ASP.NET Core."] }, correctIndex: 1, explanation: { en: "DIP is the 'why' (abstractions, not concretions). DI is the 'how' (constructor injection, method injection). You can have DIP without a DI container.", de: "DIP ist das «Warum» (Abstraktionen, nicht Konkretionen). DI ist das «Wie» (Konstruktor-Injection, Method-Injection). Man kann DIP ohne DI-Container haben.", ru: "DIP — это «зачем» (абстракции, не конкретные реализации). DI — это «как» (инжекция через конструктор, метод). DIP возможен без DI-контейнера.", uk: "DIP — це «навіщо» (абстракції, не конкретні реалізації). DI — це «як» (інжекція через конструктор, метод). DIP можливий без DI-контейнера." } },
{ category: "DIP", question: { en: "A controller directly creates `new SqlUserRepository()` inside its methods. What's the DIP violation?", de: "Ein Controller erstellt direkt `new SqlUserRepository()` in seinen Methoden. Was ist die DIP-Verletzung?", ru: "Контроллер напрямую создаёт `new SqlUserRepository()` внутри своих методов. В чём нарушение DIP?", uk: "Контролер напряму створює `new SqlUserRepository()` всередині своїх методів. В чому порушення DIP?" }, options: { en: ["Controllers shouldn't access databases.", "The high-level controller directly depends on the low-level SQL implementation instead of an IUserRepository abstraction.", "SqlUserRepository should be static.", "There's no violation if it works correctly."], de: ["Controller sollten nicht auf Datenbanken zugreifen.", "Der High-Level-Controller hängt direkt von der Low-Level-SQL-Implementierung ab, statt von einer IUserRepository-Abstraktion.", "SqlUserRepository sollte statisch sein.", "Es gibt keine Verletzung, wenn es korrekt funktioniert."], ru: ["Контроллеры не должны обращаться к базам данных.", "Контроллер верхнего уровня напрямую зависит от реализации SQL нижнего уровня вместо абстракции IUserRepository.", "SqlUserRepository должен быть статическим.", "Нет нарушения, если всё работает корректно."], uk: ["Контролери не повинні звертатися до баз даних.", "Контролер верхнього рівня напряму залежить від реалізації SQL нижнього рівня замість абстракції IUserRepository.", "SqlUserRepository повинен бути статичним.", "Немає порушення, якщо все працює коректно."] }, correctIndex: 1, explanation: { en: "The controller is tightly coupled to SQL Server. If you switch to MongoDB, you must modify the controller. With IUserRepository, you just register a new implementation.", de: "Der Controller ist eng an SQL Server gekoppelt. Bei einem Wechsel zu MongoDB muss der Controller geändert werden. Mit IUserRepository registriert man einfach eine neue Implementierung.", ru: "Контроллер жёстко связан с SQL Server. При переходе на MongoDB придётся менять контроллер. С IUserRepository вы просто регистрируете новую реализацию.", uk: "Контролер жорстко зв'язаний з SQL Server. При переході на MongoDB доведеться змінювати контролер. З IUserRepository ви просто реєструєте нову реалізацію." } },
{ category: "DIP", question: { en: "In Clean Architecture, which layer 'owns' the interfaces?", de: "In Clean Architecture, welche Schicht «besitzt» die Interfaces?", ru: "В Clean Architecture какой слой «владеет» интерфейсами?", uk: "В Clean Architecture який шар «володіє» інтерфейсами?" }, options: { en: ["Infrastructure", "Presentation", "The Domain/Application layer — inner layers define interfaces that outer layers implement.", "The database layer."], de: ["Infrastructure", "Presentation", "Die Domain-/Application-Schicht — innere Schichten definieren Interfaces, die äussere Schichten implementieren.", "Die Datenbankschicht."], ru: ["Infrastructure", "Presentation", "Слой Domain/Application — внутренние слои определяют интерфейсы, которые реализуют внешние слои.", "Слой базы данных."], uk: ["Infrastructure", "Presentation", "Шар Domain/Application — внутрішні шари визначають інтерфейси, які реалізують зовнішні шари.", "Шар бази даних."] }, correctIndex: 2, explanation: { en: "This is DIP in action: the inner (high-level) layer defines what it needs via interfaces. The outer (low-level) Infrastructure layer provides concrete implementations.", de: "Das ist DIP in Aktion: Die innere (High-Level) Schicht definiert über Interfaces, was sie braucht. Die äussere (Low-Level) Infrastructure-Schicht liefert konkrete Implementierungen.", ru: "Это DIP в действии: внутренний (верхнего уровня) слой определяет через интерфейсы, что ему нужно. Внешний (нижнего уровня) слой Infrastructure предоставляет конкретные реализации.", uk: "Це DIP в дії: внутрішній (верхнього рівня) шар визначає через інтерфейси, що йому потрібно. Зовнішній (нижнього рівня) шар Infrastructure надає конкретні реалізації." } },
{ category: "DIP", question: { en: "How does DIP enable unit testing?", de: "Wie ermöglicht DIP Unit Testing?", ru: "Как DIP обеспечивает возможность unit-тестирования?", uk: "Як DIP забезпечує можливість unit-тестування?" }, options: { en: ["DIP has no effect on testing.", "By depending on abstractions, you can substitute real implementations with mocks/stubs in tests.", "DIP makes integration tests faster.", "DIP allows testing without any test framework."], de: ["DIP hat keinen Einfluss auf das Testen.", "Durch Abhängigkeit von Abstraktionen kann man reale Implementierungen in Tests durch Mocks/Stubs ersetzen.", "DIP macht Integrationstests schneller.", "DIP ermöglicht Testen ohne Test-Framework."], ru: ["DIP не влияет на тестирование.", "Зависимость от абстракций позволяет подменять реальные реализации моками/стабами в тестах.", "DIP ускоряет интеграционные тесты.", "DIP позволяет тестировать без тестового фреймворка."], uk: ["DIP не впливає на тестування.", "Залежність від абстракцій дозволяє підміняти реальні реалізації моками/стабами в тестах.", "DIP прискорює інтеграційні тести.", "DIP дозволяє тестувати без тестового фреймворку."] }, correctIndex: 1, explanation: { en: "If OrderService depends on IPaymentGateway (not StripePaymentGateway), you can inject a mock that simulates payments without hitting a real API.", de: "Wenn OrderService von IPaymentGateway abhängt (nicht StripePaymentGateway), kann man einen Mock injizieren, der Zahlungen simuliert, ohne eine echte API aufzurufen.", ru: "Если OrderService зависит от IPaymentGateway (а не StripePaymentGateway), можно инжектировать мок, симулирующий платежи без обращения к реальному API.", uk: "Якщо OrderService залежить від IPaymentGateway (а не StripePaymentGateway), можна інжектувати мок, що симулює платежі без звернення до реального API." } },
{ category: "DIP", question: { en: "What is the 'abstraction' in DIP — an interface or an abstract class?", de: "Was ist die «Abstraktion» in DIP — ein Interface oder eine abstrakte Klasse?", ru: "Что такое «абстракция» в DIP — интерфейс или абстрактный класс?", uk: "Що таке «абстракція» в DIP — інтерфейс чи абстрактний клас?" }, options: { en: ["Only interfaces.", "Only abstract classes.", "Either — DIP says depend on abstractions, which includes both interfaces and abstract classes.", "Neither — it refers to generic type parameters."], de: ["Nur Interfaces.", "Nur abstrakte Klassen.", "Beides — DIP besagt, von Abstraktionen abzuhängen, was sowohl Interfaces als auch abstrakte Klassen umfasst.", "Keines — es bezieht sich auf generische Typparameter."], ru: ["Только интерфейсы.", "Только абстрактные классы.", "И то, и другое — DIP говорит зависеть от абстракций, что включает и интерфейсы, и абстрактные классы.", "Ни то, ни другое — речь о параметрах обобщённых типов."], uk: ["Лише інтерфейси.", "Лише абстрактні класи.", "І те, і інше — DIP говорить залежати від абстракцій, що включає і інтерфейси, і абстрактні класи.", "Ні те, ні інше — мова про параметри узагальнених типів."] }, correctIndex: 2, explanation: { en: "DIP doesn't prescribe interfaces vs abstract classes. The key is that both high-level and low-level modules depend on the abstraction, not on concretions.", de: "DIP schreibt nicht Interfaces vs. abstrakte Klassen vor. Der Schlüssel ist, dass sowohl High-Level- als auch Low-Level-Module von der Abstraktion abhängen, nicht von Konkretionen.", ru: "DIP не предписывает интерфейсы или абстрактные классы. Ключевое — и модули верхнего, и модули нижнего уровня зависят от абстракции, а не от конкретных реализаций.", uk: "DIP не приписує інтерфейси чи абстрактні класи. Ключове — і модулі верхнього, і модулі нижнього рівня залежать від абстракції, а не від конкретних реалізацій." } },
{ category: "DIP", question: { en: "A business rule class directly calls `File.WriteAllText()`. How does this violate DIP?", de: "Eine Business-Rule-Klasse ruft direkt `File.WriteAllText()` auf. Wie verletzt das DIP?", ru: "Класс бизнес-правил напрямую вызывает `File.WriteAllText()`. Как это нарушает DIP?", uk: "Клас бізнес-правил напряму викликає `File.WriteAllText()`. Як це порушує DIP?" }, options: { en: ["File operations are always fine in business logic.", "The high-level business logic depends directly on the low-level file system API. It should depend on an IFileWriter abstraction.", "DIP only applies to database access.", "It only violates DIP if the file path is hardcoded."], de: ["Dateioperationen sind in der Geschäftslogik immer in Ordnung.", "Die High-Level-Geschäftslogik hängt direkt von der Low-Level-Dateisystem-API ab. Sie sollte von einer IFileWriter-Abstraktion abhängen.", "DIP gilt nur für Datenbankzugriff.", "Es verletzt DIP nur, wenn der Dateipfad hardcodiert ist."], ru: ["Файловые операции всегда допустимы в бизнес-логике.", "Бизнес-логика верхнего уровня напрямую зависит от API файловой системы нижнего уровня. Она должна зависеть от абстракции IFileWriter.", "DIP применим только к доступу к базе данных.", "Это нарушает DIP только если путь к файлу захардкожен."], uk: ["Файлові операції завжди допустимі в бізнес-логіці.", "Бізнес-логіка верхнього рівня напряму залежить від API файлової системи нижнього рівня. Вона повинна залежати від абстракції IFileWriter.", "DIP застосовний лише до доступу до бази даних.", "Це порушує DIP лише якщо шлях до файлу захардкоджений."] }, correctIndex: 1, explanation: { en: "Business logic shouldn't know about file systems. Inject an IFileWriter so you can swap to cloud storage, memory, or a mock without changing the business rule.", de: "Geschäftslogik sollte nichts über Dateisysteme wissen. Einen IFileWriter injizieren, sodass man zu Cloud-Speicher, Speicher oder einem Mock wechseln kann, ohne die Geschäftsregel zu ändern.", ru: "Бизнес-логика не должна знать о файловых системах. Инжектируйте IFileWriter, чтобы можно было переключиться на облачное хранилище, память или мок без изменения бизнес-правила.", uk: "Бізнес-логіка не повинна знати про файлові системи. Інжектуйте IFileWriter, щоб можна було переключитися на хмарне сховище, пам'ять або мок без зміни бізнес-правила." } },
{ category: "DIP", question: { en: "In ASP.NET Core DI, what does `services.AddScoped<IService, ConcreteService>()` achieve in terms of DIP?", de: "Was erreicht `services.AddScoped<IService, ConcreteService>()` in ASP.NET Core DI in Bezug auf DIP?", ru: "Что обеспечивает `services.AddScoped<IService, ConcreteService>()` в ASP.NET Core DI с точки зрения DIP?", uk: "Що забезпечує `services.AddScoped<IService, ConcreteService>()` в ASP.NET Core DI з точки зору DIP?" }, options: { en: ["It violates DIP by referencing ConcreteService.", "It wires DIP: controllers depend on the IService abstraction, and the container provides the concrete implementation at runtime.", "It makes ConcreteService a singleton.", "It has nothing to do with DIP."], de: ["Es verletzt DIP durch Referenzierung von ConcreteService.", "Es verdrahtet DIP: Controller hängen von der IService-Abstraktion ab, und der Container liefert die konkrete Implementierung zur Laufzeit.", "Es macht ConcreteService zum Singleton.", "Es hat nichts mit DIP zu tun."], ru: ["Это нарушает DIP из-за ссылки на ConcreteService.", "Это реализует DIP: контроллеры зависят от абстракции IService, а контейнер предоставляет конкретную реализацию во время выполнения.", "Это делает ConcreteService синглтоном.", "Это не имеет отношения к DIP."], uk: ["Це порушує DIP через посилання на ConcreteService.", "Це реалізує DIP: контролери залежать від абстракції IService, а контейнер надає конкретну реалізацію під час виконання.", "Це робить ConcreteService синглтоном.", "Це не має відношення до DIP."] }, correctIndex: 1, explanation: { en: "Registration is the composition root — the one place where you map abstractions to implementations. Consuming classes only see IService.", de: "Registrierung ist das Composition Root — der eine Ort, wo Abstraktionen auf Implementierungen abgebildet werden. Konsumierende Klassen sehen nur IService.", ru: "Регистрация — это composition root, единственное место, где абстракции сопоставляются с реализациями. Потребляющие классы видят только IService.", uk: "Реєстрація — це composition root, єдине місце, де абстракції зіставляються з реалізаціями. Класи, що споживають, бачать лише IService." } },
{ category: "DIP", question: { en: "What is the Composition Root pattern and how does it relate to DIP?", de: "Was ist das Composition-Root-Pattern und wie hängt es mit DIP zusammen?", ru: "Что такое паттерн Composition Root и как он связан с DIP?", uk: "Що таке патерн Composition Root і як він пов'язаний з DIP?" }, options: { en: ["It's where you write your Main() method.", "It's the single location (typically Program.cs/Startup.cs) where all dependency mappings are configured, keeping the rest of the app DIP-compliant.", "It's the root namespace of the project.", "It's the first class the garbage collector processes."], de: ["Es ist der Ort, wo man die Main()-Methode schreibt.", "Es ist der einzige Ort (typischerweise Program.cs/Startup.cs), wo alle Abhängigkeitszuordnungen konfiguriert werden, sodass der Rest der App DIP-konform bleibt.", "Es ist der Root-Namespace des Projekts.", "Es ist die erste Klasse, die der Garbage Collector verarbeitet."], ru: ["Это место, где пишется метод Main().", "Это единственное место (обычно Program.cs/Startup.cs), где настраиваются все маппинги зависимостей, сохраняя остальное приложение DIP-совместимым.", "Это корневое пространство имён проекта.", "Это первый класс, который обрабатывает сборщик мусора."], uk: ["Це місце, де пишеться метод Main().", "Це єдине місце (зазвичай Program.cs/Startup.cs), де налаштовуються всі маппінги залежностей, зберігаючи решту застосунку DIP-сумісним.", "Це кореневий простір імен проєкту.", "Це перший клас, який обробляє збирач сміття."] }, correctIndex: 1, explanation: { en: "The Composition Root is the ONLY place that knows about concrete types. The rest of the application only depends on abstractions.", de: "Das Composition Root ist der EINZIGE Ort, der konkrete Typen kennt. Der Rest der Anwendung hängt nur von Abstraktionen ab.", ru: "Composition Root — ЕДИНСТВЕННОЕ место, которое знает о конкретных типах. Остальная часть приложения зависит только от абстракций.", uk: "Composition Root — ЄДИНЕ місце, яке знає про конкретні типи. Решта застосунку залежить лише від абстракцій." } },
{ category: "DIP", question: { en: "How does the Plugin architecture pattern embody DIP?", de: "Wie verkörpert das Plugin-Architekturmuster DIP?", ru: "Как архитектурный паттерн Plugin воплощает DIP?", uk: "Як архітектурний патерн Plugin втілює DIP?" }, options: { en: ["Plugins depend on the host application.", "The host defines interfaces (abstractions) that plugins implement. The host never depends on specific plugin code.", "Plugins bypass DIP for performance.", "Plugin architecture violates DIP because it uses reflection."], de: ["Plugins hängen von der Host-Anwendung ab.", "Der Host definiert Interfaces (Abstraktionen), die Plugins implementieren. Der Host hängt nie von spezifischem Plugin-Code ab.", "Plugins umgehen DIP aus Performancegründen.", "Plugin-Architektur verletzt DIP, weil sie Reflection verwendet."], ru: ["Плагины зависят от хост-приложения.", "Хост определяет интерфейсы (абстракции), которые плагины реализуют. Хост никогда не зависит от конкретного кода плагинов.", "Плагины обходят DIP ради производительности.", "Архитектура плагинов нарушает DIP, потому что использует reflection."], uk: ["Плагіни залежать від хост-застосунку.", "Хост визначає інтерфейси (абстракції), які плагіни реалізують. Хост ніколи не залежить від конкретного коду плагінів.", "Плагіни обходять DIP заради продуктивності.", "Архітектура плагінів порушує DIP, тому що використовує reflection."] }, correctIndex: 1, explanation: { en: "The host (high-level) defines the contract. Plugins (low-level) implement it. Adding a new plugin doesn't change the host — pure DIP.", de: "Der Host (High-Level) definiert den Vertrag. Plugins (Low-Level) implementieren ihn. Ein neues Plugin hinzuzufügen ändert den Host nicht — reines DIP.", ru: "Хост (верхний уровень) определяет контракт. Плагины (нижний уровень) его реализуют. Добавление нового плагина не изменяет хост — чистый DIP.", uk: "Хост (верхній рівень) визначає контракт. Плагіни (нижній рівень) його реалізують. Додавання нового плагіна не змінює хост — чистий DIP." } },
// ===== CROSS-CUTTING / COMBINED PRINCIPLES =====
{ category: "SOLID Combined", question: { en: "A class violates OCP because adding features requires modifying it. What other principle is likely also violated?", de: "Eine Klasse verletzt OCP, weil das Hinzufügen von Features Modifikation erfordert. Welches andere Prinzip wird wahrscheinlich auch verletzt?", ru: "Класс нарушает OCP, потому что добавление функций требует его модификации. Какой ещё принцип, вероятно, также нарушен?", uk: "Клас порушує OCP, тому що додавання функцій вимагає його модифікації. Який ще принцип, ймовірно, також порушений?" }, options: { en: ["Only OCP is violated.", "SRP — if the class needs modification for many reasons, it probably has multiple responsibilities.", "LSP — because subclasses can't replace it.", "ISP — because its interface is too broad."], de: ["Nur OCP ist verletzt.", "SRP — wenn die Klasse aus vielen Gründen geändert werden muss, hat sie wahrscheinlich mehrere Verantwortlichkeiten.", "LSP — weil Unterklassen sie nicht ersetzen können.", "ISP — weil ihr Interface zu breit ist."], ru: ["Нарушен только OCP.", "SRP — если класс нужно менять по многим причинам, у него, вероятно, несколько ответственностей.", "LSP — потому что подклассы не могут его заменить.", "ISP — потому что его интерфейс слишком широкий."], uk: ["Порушено лише OCP.", "SRP — якщо клас потрібно змінювати з багатьох причин, у нього, ймовірно, кілька відповідальностей.", "LSP — тому що підкласи не можуть його замінити.", "ISP — тому що його інтерфейс занадто широкий."] }, correctIndex: 1, explanation: { en: "OCP and SRP violations often go hand-in-hand. A class with multiple responsibilities gets modified for multiple reasons, violating both.", de: "OCP- und SRP-Verletzungen gehen oft Hand in Hand. Eine Klasse mit mehreren Verantwortlichkeiten wird aus mehreren Gründen geändert und verletzt beide.", ru: "Нарушения OCP и SRP часто идут рука об руку. Класс с несколькими ответственностями модифицируется по нескольким причинам, нарушая оба принципа.", uk: "Порушення OCP та SRP часто йдуть пліч-о-пліч. Клас із кількома відповідальностями модифікується з кількох причин, порушуючи обидва принципи." } },
{ category: "SOLID Combined", question: { en: "How do SOLID principles relate to microservices?", de: "Wie hängen SOLID-Prinzipien mit Microservices zusammen?", ru: "Как принципы SOLID связаны с микросервисами?", uk: "Як принципи SOLID пов'язані з мікросервісами?" }, options: { en: ["SOLID doesn't apply to distributed systems.", "Each microservice ideally follows SRP (single domain), OCP (extensible via events), and DIP (depends on contracts/interfaces, not other services' internals).", "SOLID only applies to monoliths.", "Microservices replace the need for SOLID."], de: ["SOLID gilt nicht für verteilte Systeme.", "Jeder Microservice folgt idealerweise SRP (eine Domäne), OCP (erweiterbar über Events) und DIP (hängt von Verträgen/Interfaces ab, nicht von den Interna anderer Services).", "SOLID gilt nur für Monolithen.", "Microservices ersetzen die Notwendigkeit für SOLID."], ru: ["SOLID не применим к распределённым системам.", "Каждый микросервис в идеале следует SRP (один домен), OCP (расширяем через события) и DIP (зависит от контрактов/интерфейсов, а не от внутренностей других сервисов).", "SOLID применим только к монолитам.", "Микросервисы устраняют необходимость в SOLID."], uk: ["SOLID не застосовний до розподілених систем.", "Кожен мікросервіс в ідеалі дотримується SRP (один домен), OCP (розширюваний через події) та DIP (залежить від контрактів/інтерфейсів, а не від внутрішностей інших сервісів).", "SOLID застосовний лише до монолітів.", "Мікросервіси усувають потребу в SOLID."] }, correctIndex: 1, explanation: { en: "SOLID scales from classes to services. A microservice should have one bounded context (SRP), communicate via contracts (DIP), and be independently deployable (OCP).", de: "SOLID skaliert von Klassen zu Services. Ein Microservice sollte einen Bounded Context haben (SRP), über Verträge kommunizieren (DIP) und unabhängig deploybar sein (OCP).", ru: "SOLID масштабируется от классов до сервисов. Микросервис должен иметь один ограниченный контекст (SRP), общаться через контракты (DIP) и быть независимо развёртываемым (OCP).", uk: "SOLID масштабується від класів до сервісів. Мікросервіс повинен мати один обмежений контекст (SRP), спілкуватися через контракти (DIP) та бути незалежно розгортуваним (OCP)." } },
{ category: "SOLID Combined", question: { en: "What is the relationship between SOLID and Clean Code?", de: "Wie hängen SOLID und Clean Code zusammen?", ru: "Какова связь между SOLID и Clean Code?", uk: "Який зв'язок між SOLID та Clean Code?" }, options: { en: ["Clean Code replaces SOLID.", "SOLID provides architectural principles that naturally lead to clean, readable, testable, and maintainable code.", "SOLID is about performance, Clean Code is about readability.", "They often conflict with each other."], de: ["Clean Code ersetzt SOLID.", "SOLID bietet Architekturprinzipien, die natürlich zu sauberem, lesbarem, testbarem und wartbarem Code führen.", "SOLID handelt von Performance, Clean Code von Lesbarkeit.", "Sie stehen oft im Konflikt miteinander."], ru: ["Clean Code заменяет SOLID.", "SOLID предоставляет архитектурные принципы, которые естественно ведут к чистому, читаемому, тестируемому и поддерживаемому коду.", "SOLID — о производительности, Clean Code — о читаемости.", "Они часто конфликтуют друг с другом."], uk: ["Clean Code замінює SOLID.", "SOLID надає архітектурні принципи, які природно ведуть до чистого, читабельного, тестовного та підтримуваного коду.", "SOLID — про продуктивність, Clean Code — про читабельність.", "Вони часто конфліктують одне з одним."] }, correctIndex: 1, explanation: { en: "SOLID principles guide structure; Clean Code guides readability. Together, they produce code that's both well-organized and easy to understand.", de: "SOLID-Prinzipien leiten die Struktur; Clean Code leitet die Lesbarkeit. Zusammen produzieren sie Code, der sowohl gut organisiert als auch leicht verständlich ist.", ru: "Принципы SOLID направляют структуру; Clean Code направляет читаемость. Вместе они создают код, который и хорошо организован, и легко читаем.", uk: "Принципи SOLID спрямовують структуру; Clean Code спрямовує читабельність. Разом вони створюють код, який і добре організований, і легко читається." } },
{ category: "SOLID Combined", question: { en: "You inherit a legacy codebase with zero tests. Which SOLID principle should guide your first refactoring step?", de: "Du erbst eine Legacy-Codebasis ohne Tests. Welches SOLID-Prinzip sollte deinen ersten Refactoring-Schritt leiten?", ru: "Вы унаследовали legacy-кодовую базу без тестов. Какой принцип SOLID должен направлять ваш первый шаг рефакторинга?", uk: "Ви успадкували legacy-кодову базу без тестів. Який принцип SOLID повинен спрямовувати ваш перший крок рефакторингу?" }, options: { en: ["OCP — make everything extensible.", "ISP — split all interfaces.", "DIP — introduce interfaces for external dependencies so you can write tests with mocks.", "LSP — check all inheritance hierarchies."], de: ["OCP — alles erweiterbar machen.", "ISP — alle Interfaces aufteilen.", "DIP — Interfaces für externe Abhängigkeiten einführen, damit man Tests mit Mocks schreiben kann.", "LSP — alle Vererbungshierarchien prüfen."], ru: ["OCP — сделать всё расширяемым.", "ISP — разделить все интерфейсы.", "DIP — ввести интерфейсы для внешних зависимостей, чтобы можно было писать тесты с моками.", "LSP — проверить все иерархии наследования."], uk: ["OCP — зробити все розширюваним.", "ISP — розділити всі інтерфейси.", "DIP — ввести інтерфейси для зовнішніх залежностей, щоб можна було писати тести з моками.", "LSP — перевірити всі ієрархії наслідування."] }, correctIndex: 2, explanation: { en: "Without DIP, you can't isolate units for testing. Introducing interfaces for database/file/network access is the first step to making legacy code testable.", de: "Ohne DIP kann man Einheiten nicht zum Testen isolieren. Interfaces für Datenbank-/Datei-/Netzwerkzugriff einzuführen ist der erste Schritt, um Legacy-Code testbar zu machen.", ru: "Без DIP нельзя изолировать модули для тестирования. Введение интерфейсов для доступа к базе данных/файлам/сети — первый шаг к тестируемости legacy-кода.", uk: "Без DIP неможливо ізолювати модулі для тестування. Введення інтерфейсів для доступу до бази даних/файлів/мережі — перший крок до тестовності legacy-коду." } },
{ category: "SOLID Combined", question: { en: "Which SOLID principle is MOST directly enabled by the Strategy pattern?", de: "Welches SOLID-Prinzip wird durch das Strategy-Pattern am DIREKTESTEN ermöglicht?", ru: "Какой принцип SOLID НАИБОЛЕЕ непосредственно обеспечивается паттерном Strategy?", uk: "Який принцип SOLID НАЙБЕЗПОСЕРЕДНІШЕ забезпечується патерном Strategy?" }, options: { en: ["SRP", "OCP", "LSP", "ISP"], de: ["SRP", "OCP", "LSP", "ISP"], ru: ["SRP", "OCP", "LSP", "ISP"], uk: ["SRP", "OCP", "LSP", "ISP"] }, correctIndex: 1, explanation: { en: "Strategy lets you add new behaviors (strategies) without modifying the context class — the essence of Open/Closed.", de: "Strategy ermöglicht es, neue Verhaltensweisen (Strategien) hinzuzufügen, ohne die Kontextklasse zu ändern — das Wesen von Open/Closed.", ru: "Strategy позволяет добавлять новые поведения (стратегии) без модификации класса-контекста — суть Open/Closed.", uk: "Strategy дозволяє додавати нові поведінки (стратегії) без модифікації класу-контексту — суть Open/Closed." } },
{ category: "SOLID Combined", question: { en: "A team argues that SOLID leads to too many small classes. How do you respond?", de: "Ein Team argumentiert, dass SOLID zu zu vielen kleinen Klassen führt. Wie antwortest du?", ru: "Команда утверждает, что SOLID приводит к слишком большому количеству маленьких классов. Как вы ответите?", uk: "Команда стверджує, що SOLID призводить до занадто великої кількості маленьких класів. Як ви відповісте?" }, options: { en: ["They're right — SOLID creates unnecessary complexity.", "Many focused classes are easier to understand, test, and maintain than a few 'God classes'. The trade-off is navigability, which IDE tooling solves.", "Ignore SOLID for small projects.", "Combine all SOLID classes into service classes."], de: ["Sie haben recht — SOLID erzeugt unnötige Komplexität.", "Viele fokussierte Klassen sind einfacher zu verstehen, testen und warten als wenige «God Classes». Der Trade-off ist Navigierbarkeit, die IDE-Tools lösen.", "SOLID für kleine Projekte ignorieren.", "Alle SOLID-Klassen in Service-Klassen zusammenfassen."], ru: ["Они правы — SOLID создаёт ненужную сложность.", "Множество сфокусированных классов легче понять, тестировать и поддерживать, чем несколько «God-классов». Компромисс — навигация, которую решает инструментарий IDE.", "Игнорировать SOLID для маленьких проектов.", "Объединить все SOLID-классы в сервисные классы."], uk: ["Вони мають рацію — SOLID створює непотрібну складність.", "Багато сфокусованих класів легше зрозуміти, тестувати та підтримувати, ніж кілька «God-класів». Компроміс — навігація, яку вирішує інструментарій IDE.", "Ігнорувати SOLID для маленьких проєктів.", "Об'єднати всі SOLID-класи в сервісні класи."] }, correctIndex: 1, explanation: { en: "More files ≠ more complexity. Each small class has a clear purpose. Modern IDEs make navigation trivial. The alternative — God classes — is far worse.", de: "Mehr Dateien ≠ mehr Komplexität. Jede kleine Klasse hat einen klaren Zweck. Moderne IDEs machen Navigation trivial. Die Alternative — God Classes — ist weit schlimmer.", ru: "Больше файлов ≠ больше сложности. Каждый маленький класс имеет чёткую цель. Современные IDE делают навигацию тривиальной. Альтернатива — God-классы — намного хуже.", uk: "Більше файлів ≠ більше складності. Кожен маленький клас має чітку мету. Сучасні IDE роблять навігацію тривіальною. Альтернатива — God-класи — набагато гірша." } },
{ category: "SOLID Combined", question: { en: "How does the Decorator pattern help with both OCP and SRP?", de: "Wie hilft das Decorator-Pattern bei OCP und SRP gleichzeitig?", ru: "Как паттерн Decorator помогает одновременно с OCP и SRP?", uk: "Як патерн Decorator допомагає одночасно з OCP та SRP?" }, options: { en: ["It doesn't — decorators violate SOLID.", "Each decorator adds ONE new behavior (SRP) without modifying the original class (OCP).", "Decorators only help with ISP.", "Decorators only apply to the Singleton pattern."], de: ["Gar nicht — Decorators verletzen SOLID.", "Jeder Decorator fügt EIN neues Verhalten hinzu (SRP), ohne die Originalklasse zu ändern (OCP).", "Decorators helfen nur bei ISP.", "Decorators gelten nur für das Singleton-Pattern."], ru: ["Никак — декораторы нарушают SOLID.", "Каждый декоратор добавляет ОДНО новое поведение (SRP) без модификации оригинального класса (OCP).", "Декораторы помогают только с ISP.", "Декораторы применимы только к паттерну Singleton."], uk: ["Ніяк — декоратори порушують SOLID.", "Кожен декоратор додає ОДНУ нову поведінку (SRP) без модифікації оригінального класу (OCP).", "Декоратори допомагають лише з ISP.", "Декоратори застосовні лише до патерну Singleton."] }, correctIndex: 1, explanation: { en: "A LoggingDecorator adds logging (SRP) around an existing service without changing it (OCP). A CachingDecorator adds caching the same way.", de: "Ein LoggingDecorator fügt Logging (SRP) um einen bestehenden Service hinzu, ohne ihn zu ändern (OCP). Ein CachingDecorator fügt Caching auf die gleiche Weise hinzu.", ru: "LoggingDecorator добавляет логирование (SRP) вокруг существующего сервиса без его изменения (OCP). CachingDecorator добавляет кэширование таким же образом.", uk: "LoggingDecorator додає логування (SRP) навколо існуючого сервісу без його зміни (OCP). CachingDecorator додає кешування таким же чином." } },
{ category: "SOLID Combined", question: { en: "In event-driven architecture, how does publishing domain events support OCP?", de: "Wie unterstützt das Publizieren von Domain Events in einer Event-Driven Architecture OCP?", ru: "Как публикация доменных событий в событийно-ориентированной архитектуре поддерживает OCP?", uk: "Як публікація доменних подій у подієво-орієнтованій архітектурі підтримує OCP?" }, options: { en: ["Events violate OCP.", "New subscribers can react to events without modifying the publisher, extending system behavior through addition, not modification.", "Events only support DIP.", "Events make OCP irrelevant."], de: ["Events verletzen OCP.", "Neue Subscriber können auf Events reagieren, ohne den Publisher zu ändern — Systemverhalten wird durch Hinzufügen erweitert, nicht durch Modifikation.", "Events unterstützen nur DIP.", "Events machen OCP irrelevant."], ru: ["События нарушают OCP.", "Новые подписчики могут реагировать на события без изменения издателя, расширяя поведение системы через добавление, а не модификацию.", "События поддерживают только DIP.", "События делают OCP нерелевантным."], uk: ["Події порушують OCP.", "Нові підписники можуть реагувати на події без зміни видавця, розширюючи поведінку системи через додавання, а не модифікацію.", "Події підтримують лише DIP.", "Події роблять OCP нерелевантним."] }, correctIndex: 1, explanation: { en: "The publisher is closed for modification. Adding a new subscriber (e.g., sending an email when OrderPlaced fires) is pure extension.", de: "Der Publisher ist geschlossen für Modifikation. Einen neuen Subscriber hinzuzufügen (z.B. eine E-Mail senden, wenn OrderPlaced ausgelöst wird) ist reine Erweiterung.", ru: "Издатель закрыт для модификации. Добавление нового подписчика (например, отправка email при срабатывании OrderPlaced) — чистое расширение.", uk: "Видавець закритий для модифікації. Додавання нового підписника (наприклад, відправка email при спрацюванні OrderPlaced) — чисте розширення." } },
{ category: "SOLID Combined", question: { en: "Which principle is violated when a unit test requires 10+ mocks in the constructor?", de: "Welches Prinzip ist verletzt, wenn ein Unit Test 10+ Mocks im Konstruktor benötigt?", ru: "Какой принцип нарушен, когда unit-тест требует 10+ моков в конструкторе?", uk: "Який принцип порушений, коли unit-тест вимагає 10+ моків у конструкторі?" }, options: { en: ["Only DIP.", "SRP — the class likely has too many responsibilities, requiring too many dependencies.", "OCP — the class isn't extensible.", "ISP — the test interface is too broad."], de: ["Nur DIP.", "SRP — die Klasse hat wahrscheinlich zu viele Verantwortlichkeiten und benötigt zu viele Abhängigkeiten.", "OCP — die Klasse ist nicht erweiterbar.", "ISP — das Test-Interface ist zu breit."], ru: ["Только DIP.", "SRP — у класса, вероятно, слишком много ответственностей, что требует слишком многих зависимостей.", "OCP — класс не расширяем.", "ISP — тестовый интерфейс слишком широкий."], uk: ["Лише DIP.", "SRP — у класу, ймовірно, занадто багато відповідальностей, що вимагає занадто багатьох залежностей.", "OCP — клас не розширюваний.", "ISP — тестовий інтерфейс занадто широкий."] }, correctIndex: 1, explanation: { en: "Too many constructor parameters is a classic SRP smell. The class is doing too much. Split it into smaller, focused classes.", de: "Zu viele Konstruktorparameter sind ein klassischer SRP-Smell. Die Klasse tut zu viel. In kleinere, fokussierte Klassen aufteilen.", ru: "Слишком много параметров конструктора — классический запах нарушения SRP. Класс делает слишком много. Разделите на меньшие, сфокусированные классы.", uk: "Занадто багато параметрів конструктора — класичний запах порушення SRP. Клас робить занадто багато. Розділіть на менші, сфокусовані класи." } },
{ category: "SOLID Combined", question: { en: "How do SOLID principles apply to functional programming?", de: "Wie gelten SOLID-Prinzipien für funktionale Programmierung?", ru: "Как принципы SOLID применяются к функциональному программированию?", uk: "Як принципи SOLID застосовуються до функціонального програмування?" }, options: { en: ["SOLID is only for OOP and is irrelevant to FP.", "The spirit of SOLID translates: SRP = small pure functions, OCP = higher-order functions, DIP = pass functions as parameters (dependency injection of behavior).", "FP automatically satisfies all SOLID principles.", "Only ISP applies to FP."], de: ["SOLID ist nur für OOP und irrelevant für FP.", "Der Geist von SOLID überträgt sich: SRP = kleine reine Funktionen, OCP = Funktionen höherer Ordnung, DIP = Funktionen als Parameter übergeben (Dependency Injection von Verhalten).", "FP erfüllt automatisch alle SOLID-Prinzipien.", "Nur ISP gilt für FP."], ru: ["SOLID только для ООП и не относится к ФП.", "Дух SOLID переносится: SRP = маленькие чистые функции, OCP = функции высшего порядка, DIP = передача функций как параметров (инжекция зависимостей поведения).", "ФП автоматически соблюдает все принципы SOLID.", "Только ISP применим к ФП."], uk: ["SOLID лише для ООП і не стосується ФП.", "Дух SOLID переноситься: SRP = маленькі чисті функції, OCP = функції вищого порядку, DIP = передача функцій як параметрів (інжекція залежностей поведінки).", "ФП автоматично дотримується всіх принципів SOLID.", "Лише ISP застосовний до ФП."] }, correctIndex: 1, explanation: { en: "SOLID isn't syntax-specific. Pure functions have single responsibilities. Higher-order functions enable extension. Passing functions inverts dependencies.", de: "SOLID ist nicht syntaxspezifisch. Reine Funktionen haben einzelne Verantwortlichkeiten. Funktionen höherer Ordnung ermöglichen Erweiterung. Funktionen übergeben invertiert Abhängigkeiten.", ru: "SOLID не привязан к синтаксису. Чистые функции имеют единственную ответственность. Функции высшего порядка обеспечивают расширение. Передача функций инвертирует зависимости.", uk: "SOLID не прив'язаний до синтаксису. Чисті функції мають єдину відповідальність. Функції вищого порядку забезпечують розширення. Передача функцій інвертує залежності." } }
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20;
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
</body>
</html>
