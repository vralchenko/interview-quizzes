<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLID Principles — Interview Quiz</title>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; line-height: 1.6; }
        .container { max-width: 800px; width: 100%; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin-bottom: 5px; color: #fff; }
        .header p { color: var(--text-muted); font-size: 0.95rem; }
        .lang-selector { display: flex; justify-content: center; gap: 4px; margin-top: 12px; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-btn:hover { color: var(--text-main); border-color: var(--accent); }
        .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .progress-bar { width: 100%; height: 8px; background-color: var(--bg-card); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.3s ease; }
        .card { background-color: var(--bg-card); border-radius: 12px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; }
        .card.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .category-badge { display: inline-block; background-color: rgba(59,130,246,0.2); color: #60a5fa; padding: 4px 10px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .question-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); color: var(--text-main); padding: 15px 20px; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.4; }
        .option-btn:hover:not(:disabled) { background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .option-btn.correct { background-color: rgba(16,185,129,0.2); border-color: var(--success); }
        .option-btn.wrong { background-color: rgba(239,68,68,0.2); border-color: var(--danger); opacity: 0.7; }
        .option-btn:disabled { cursor: default; }
        .explanation { margin-top: 20px; padding: 15px; background-color: rgba(255,255,255,0.05); border-left: 4px solid var(--accent); border-radius: 4px; font-size: 0.95rem; display: none; }
        .explanation.show { display: block; animation: fadeIn 0.4s; }
        .controls { margin-top: 25px; display: flex; justify-content: flex-end; }
        .next-btn, .restart-btn { background-color: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; display: none; }
        .next-btn.show, .restart-btn.show { display: block; }
        .next-btn:hover, .restart-btn:hover { background-color: var(--accent-hover); }
        .score-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted); }
        #results-card { text-align: center; }
        .final-score { font-size: 4rem; font-weight: 700; color: var(--accent); margin: 20px 0; }
        #setup-card { text-align: center; }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .nav-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--text-muted); padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .nav-btn:hover { color: var(--text-main); border-color: var(--accent); background-color: rgba(59,130,246,0.1); }
        .batch-controls { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .batch-btn { background-color: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: var(--text-main); padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
        .batch-btn:hover { background-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="quiz-title"></h1>
            <p id="quiz-subtitle"></p>
            <div class="lang-selector">
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
                <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">UK</button>
            </div>
        </div>
        <div class="card active" id="setup-card">
            <h2 id="setup-heading"></h2>
            <p id="setup-desc"></p>
            <div class="batch-controls">
                <button class="batch-btn" onclick="startQuiz(20)" id="btn-sprint"></button>
                <button class="batch-btn" onclick="startQuiz(50)" id="btn-marathon"></button>
            </div>
        </div>
        <div id="quiz-area" style="display: none;">
            <div class="nav-bar">
                <a class="nav-btn" href="index.html" id="nav-all">&#8592; </a>
                <button class="nav-btn" onclick="location.reload()" id="nav-restart">&#8635; </button>
            </div>
            <div class="score-display">
                <span id="q-counter"></span>
                <span id="score-tracker"></span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div id="quiz-container"></div>
        </div>
        <div class="card" id="results-card">
            <h2 id="results-heading"></h2>
            <div class="final-score" id="final-score-text"></div>
            <p id="feedback-text" style="font-size: 1.1rem; margin-bottom: 30px;"></p>
            <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <a class="restart-btn show" href="index.html" style="text-decoration: none;" id="res-all"></a>
                <button class="restart-btn show" onclick="location.reload()" id="res-restart"></button>
            </div>
        </div>
    </div>

<script>
const ui = {
    en: { title: "SOLID Principles", subtitle: "Deep-dive quiz on the five fundamental OOP design principles", heading: "50 Questions on SOLID", desc: "Covers Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation, and Dependency Inversion with real-world C#/.NET scenarios.", sprint: "Random 20-Question Sprint", marathon: "Marathon: All 50 Questions", allQuizzes: "\u2190 All Quizzes", restart: "\u21BB Restart", question: "Question", of: "of", score: "Score", explanation: "Explanation:", next: "Continue", complete: "Assessment Complete!", allBtn: "All Quizzes", restartBtn: "Restart Quiz", feedbackHigh: "Outstanding! You have a deep understanding of SOLID principles and can apply them confidently in real-world architecture.", feedbackMid: "Solid foundation! Review the explanations on ISP and DIP — they're the trickiest in practice.", feedbackLow: "Keep studying! Focus on understanding WHY each principle exists and how violations look in real code." },
    de: { title: "SOLID-Prinzipien", subtitle: "Vertiefungsquiz zu den fünf grundlegenden OOP-Designprinzipien", heading: "50 Fragen zu SOLID", desc: "Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation und Dependency Inversion mit praxisnahen C#/.NET-Szenarien.", sprint: "Zufällige 20-Fragen-Runde", marathon: "Marathon: Alle 50 Fragen", allQuizzes: "\u2190 Alle Quizze", restart: "\u21BB Neustart", question: "Frage", of: "von", score: "Punkte", explanation: "Erklärung:", next: "Weiter", complete: "Bewertung abgeschlossen!", allBtn: "Alle Quizze", restartBtn: "Quiz neustarten", feedbackHigh: "Hervorragend! Du hast ein tiefes Verständnis der SOLID-Prinzipien und kannst sie sicher in realer Architektur anwenden.", feedbackMid: "Solide Grundlage! Wiederhole die Erklärungen zu ISP und DIP — sie sind in der Praxis am kniffligsten.", feedbackLow: "Weiter lernen! Konzentriere dich darauf zu verstehen, WARUM jedes Prinzip existiert und wie Verletzungen in echtem Code aussehen." },
    ru: { title: "Принципы SOLID", subtitle: "Углублённый квиз по пяти фундаментальным принципам ООП-дизайна", heading: "50 вопросов по SOLID", desc: "Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation и Dependency Inversion с практическими сценариями на C#/.NET.", sprint: "Случайные 20 вопросов", marathon: "Марафон: все 50 вопросов", allQuizzes: "\u2190 Все квизы", restart: "\u21BB Заново", question: "Вопрос", of: "из", score: "Счёт", explanation: "Пояснение:", next: "Далее", complete: "Тест завершён!", allBtn: "Все квизы", restartBtn: "Начать заново", feedbackHigh: "Отлично! Вы глубоко понимаете принципы SOLID и можете уверенно применять их в реальной архитектуре.", feedbackMid: "Хорошая база! Повторите пояснения по ISP и DIP — на практике они самые сложные.", feedbackLow: "Продолжайте учиться! Сосредоточьтесь на понимании того, ЗАЧЕМ существует каждый принцип и как выглядят нарушения в реальном коде." },
    uk: { title: "Принципи SOLID", subtitle: "Поглиблений квіз з п'яти фундаментальних принципів ООП-дизайну", heading: "50 питань з SOLID", desc: "Single Responsibility, Open/Closed, Liskov Substitution, Interface Segregation та Dependency Inversion з практичними сценаріями на C#/.NET.", sprint: "Випадкові 20 питань", marathon: "Марафон: усі 50 питань", allQuizzes: "\u2190 Усі квізи", restart: "\u21BB Заново", question: "Питання", of: "з", score: "Рахунок", explanation: "Пояснення:", next: "Далі", complete: "Тест завершено!", allBtn: "Усі квізи", restartBtn: "Почати заново", feedbackHigh: "Чудово! Ви глибоко розумієте принципи SOLID і можете впевнено застосовувати їх у реальній архітектурі.", feedbackMid: "Міцна основа! Повторіть пояснення щодо ISP та DIP — на практиці вони найскладніші.", feedbackLow: "Продовжуйте вчитися! Зосередьтеся на розумінні того, НАВІЩО існує кожен принцип і як виглядають порушення в реальному коді." }
};

const allQuestions = [
// ===== SINGLE RESPONSIBILITY PRINCIPLE (SRP) =====
{ category: "SRP", question: { en: "What does the Single Responsibility Principle state?", de: "Was besagt das Single Responsibility Principle?", ru: "Что гласит принцип единственной ответственности (SRP)?", uk: "Що проголошує принцип єдиної відповідальності (SRP)?" }, options: { en: ["A class should have only one method.", "A class should have only one reason to change.", "A class should only be instantiated once.", "A class should only depend on one interface."], de: ["Eine Klasse sollte nur eine Methode haben.", "Eine Klasse sollte nur einen Grund zur Änderung haben.", "Eine Klasse sollte nur einmal instanziiert werden.", "Eine Klasse sollte nur von einem Interface abhängen."], ru: ["Класс должен иметь только один метод.", "Класс должен иметь только одну причину для изменения.", "Класс должен создаваться только один раз.", "Класс должен зависеть только от одного интерфейса."], uk: ["Клас повинен мати лише один метод.", "Клас повинен мати лише одну причину для зміни.", "Клас повинен створюватися лише один раз.", "Клас повинен залежати лише від одного інтерфейсу."] }, correctIndex: 1, explanation: { en: "SRP says each class should have one, and only one, reason to change — meaning it encapsulates exactly one responsibility or concern.", de: "SRP besagt, dass jede Klasse nur einen einzigen Grund zur Änderung haben sollte — sie kapselt genau eine Verantwortlichkeit oder ein Anliegen.", ru: "SRP гласит, что у каждого класса должна быть одна и только одна причина для изменения — он инкапсулирует ровно одну ответственность.", uk: "SRP проголошує, що кожен клас повинен мати одну і лише одну причину для зміни — він інкапсулює рівно одну відповідальність." } },
{ category: "SRP", question: { en: "A class handles both user authentication AND sends email notifications. Which SOLID principle does this violate?", de: "Eine Klasse verwaltet sowohl die Benutzerauthentifizierung ALS AUCH den E-Mail-Versand. Welches SOLID-Prinzip wird verletzt?", ru: "Класс одновременно выполняет аутентификацию пользователей И отправляет email-уведомления. Какой принцип SOLID нарушен?", uk: "Клас одночасно виконує автентифікацію користувачів ТА надсилає email-сповіщення. Який принцип SOLID порушено?" }, options: { en: ["Open/Closed Principle", "Liskov Substitution Principle", "Single Responsibility Principle", "Dependency Inversion Principle"], de: ["Open/Closed Principle", "Liskov Substitution Principle", "Single Responsibility Principle", "Dependency Inversion Principle"], ru: ["Open/Closed Principle", "Liskov Substitution Principle", "Single Responsibility Principle", "Dependency Inversion Principle"], uk: ["Open/Closed Principle", "Liskov Substitution Principle", "Single Responsibility Principle", "Dependency Inversion Principle"] }, correctIndex: 2, explanation: { en: "This class has two reasons to change: auth logic changes or email logic changes. SRP says split them into separate classes.", de: "Diese Klasse hat zwei Gründe zur Änderung: Änderungen der Auth-Logik oder der E-Mail-Logik. SRP empfiehlt, sie in separate Klassen aufzuteilen.", ru: "У этого класса две причины для изменения: изменение логики аутентификации или логики email. SRP требует разделить их на отдельные классы.", uk: "Цей клас має дві причини для зміни: зміна логіки автентифікації або логіки email. SRP вимагає розділити їх на окремі класи." } },
{ category: "SRP", question: { en: "How do you refactor a 'GodController' in ASP.NET Core that handles users, orders, and payments?", de: "Wie refaktorisiert man einen «GodController» in ASP.NET Core, der Benutzer, Bestellungen und Zahlungen verwaltet?", ru: "Как рефакторить «GodController» в ASP.NET Core, который обрабатывает пользователей, заказы и платежи?", uk: "Як рефакторити «GodController» в ASP.NET Core, який обробляє користувачів, замовлення та платежі?" }, options: { en: ["Add more methods to keep everything centralized.", "Split it into UsersController, OrdersController, and PaymentsController.", "Make it abstract and inherit from it.", "Move all logic to a single service class."], de: ["Mehr Methoden hinzufügen, um alles zentral zu halten.", "In UsersController, OrdersController und PaymentsController aufteilen.", "Abstrakt machen und davon erben.", "Alle Logik in eine einzige Service-Klasse verschieben."], ru: ["Добавить больше методов, чтобы всё было централизовано.", "Разделить на UsersController, OrdersController и PaymentsController.", "Сделать абстрактным и наследоваться от него.", "Перенести всю логику в один сервисный класс."], uk: ["Додати більше методів, щоб все було централізовано.", "Розділити на UsersController, OrdersController та PaymentsController.", "Зробити абстрактним і наслідуватися від нього.", "Перенести всю логіку в один сервісний клас."] }, correctIndex: 1, explanation: { en: "Each controller should handle one resource/domain. A GodController violates SRP by mixing multiple responsibilities.", de: "Jeder Controller sollte eine Ressource/Domäne verwalten. Ein GodController verletzt SRP durch Vermischung mehrerer Verantwortlichkeiten.", ru: "Каждый контроллер должен обрабатывать один ресурс/домен. GodController нарушает SRP, смешивая несколько ответственностей.", uk: "Кожен контролер повинен обробляти один ресурс/домен. GodController порушує SRP, змішуючи кілька відповідальностей." } },
{ category: "SRP", question: { en: "In the context of SRP, what does 'reason to change' mean?", de: "Was bedeutet «Grund zur Änderung» im Kontext von SRP?", ru: "Что означает «причина для изменения» в контексте SRP?", uk: "Що означає «причина для зміни» в контексті SRP?" }, options: { en: ["A bug fix in the class.", "A change request from a single stakeholder or business requirement.", "A refactoring session.", "A performance optimization."], de: ["Ein Bugfix in der Klasse.", "Eine Änderungsanforderung von einem einzelnen Stakeholder oder Geschäftsanforderung.", "Eine Refactoring-Sitzung.", "Eine Performance-Optimierung."], ru: ["Исправление бага в классе.", "Запрос на изменение от одного стейкхолдера или бизнес-требования.", "Сессия рефакторинга.", "Оптимизация производительности."], uk: ["Виправлення бага в класі.", "Запит на зміну від одного стейкхолдера або бізнес-вимоги.", "Сесія рефакторингу.", "Оптимізація продуктивності."] }, correctIndex: 1, explanation: { en: "Robert C. Martin defines 'reason to change' as a change driven by a particular actor or stakeholder. Different stakeholders = different responsibilities.", de: "Robert C. Martin definiert «Grund zur Änderung» als eine von einem bestimmten Akteur oder Stakeholder getriebene Änderung. Verschiedene Stakeholder = verschiedene Verantwortlichkeiten.", ru: "Роберт Мартин определяет «причину для изменения» как изменение, вызванное конкретным актором или стейкхолдером. Разные стейкхолдеры = разные ответственности.", uk: "Роберт Мартін визначає «причину для зміни» як зміну, спричинену конкретним актором або стейкхолдером. Різні стейкхолдери = різні відповідальності." } },
{ category: "SRP", question: { en: "A Repository class in EF Core also contains caching logic and logging. How do you fix the SRP violation?", de: "Eine Repository-Klasse in EF Core enthält auch Caching-Logik und Logging. Wie behebt man die SRP-Verletzung?", ru: "Класс Repository в EF Core также содержит логику кэширования и логирования. Как исправить нарушение SRP?", uk: "Клас Repository в EF Core також містить логіку кешування та логування. Як виправити порушення SRP?" }, options: { en: ["It's fine — repositories should handle everything data-related.", "Extract caching into a CachingDecorator and logging into a LoggingDecorator or middleware.", "Move caching and logging into the controller.", "Create a base class with all three concerns."], de: ["Das ist in Ordnung — Repositories sollten alles Datenbezogene handhaben.", "Caching in einen CachingDecorator und Logging in einen LoggingDecorator oder Middleware extrahieren.", "Caching und Logging in den Controller verschieben.", "Eine Basisklasse mit allen drei Anliegen erstellen."], ru: ["Это нормально — репозитории должны обрабатывать всё, связанное с данными.", "Вынести кэширование в CachingDecorator, а логирование в LoggingDecorator или middleware.", "Перенести кэширование и логирование в контроллер.", "Создать базовый класс со всеми тремя задачами."], uk: ["Це нормально — репозиторії повинні обробляти все, пов'язане з даними.", "Винести кешування в CachingDecorator, а логування в LoggingDecorator або middleware.", "Перенести кешування та логування в контролер.", "Створити базовий клас з усіма трьома задачами."] }, correctIndex: 1, explanation: { en: "The Decorator pattern lets you wrap the repository with caching and logging layers, each in its own class with a single responsibility.", de: "Das Decorator-Pattern ermöglicht es, das Repository mit Caching- und Logging-Schichten zu umhüllen, jede in ihrer eigenen Klasse mit einer einzigen Verantwortlichkeit.", ru: "Паттерн Decorator позволяет обернуть репозиторий слоями кэширования и логирования, каждый в своём классе с единственной ответственностью.", uk: "Патерн Decorator дозволяє обгорнути репозиторій шарами кешування та логування, кожен у своєму класі з єдиною відповідальністю." } },
{ category: "SRP", question: { en: "Which of these class names most likely violates SRP?", de: "Welcher dieser Klassennamen verletzt am wahrscheinlichsten SRP?", ru: "Какое из этих имён классов скорее всего нарушает SRP?", uk: "Яке з цих імен класів найімовірніше порушує SRP?" }, options: { en: ["InvoiceRepository", "EmailService", "UserManagerAndNotifier", "PaymentGateway"], de: ["InvoiceRepository", "EmailService", "UserManagerAndNotifier", "PaymentGateway"], ru: ["InvoiceRepository", "EmailService", "UserManagerAndNotifier", "PaymentGateway"], uk: ["InvoiceRepository", "EmailService", "UserManagerAndNotifier", "PaymentGateway"] }, correctIndex: 2, explanation: { en: "'UserManagerAndNotifier' literally describes two responsibilities in its name. The 'And' is a code smell for SRP violations.", de: "«UserManagerAndNotifier» beschreibt buchstäblich zwei Verantwortlichkeiten im Namen. Das «And» ist ein Code Smell für SRP-Verletzungen.", ru: "«UserManagerAndNotifier» буквально описывает две ответственности в своём имени. «And» — это код-запах, указывающий на нарушение SRP.", uk: "«UserManagerAndNotifier» буквально описує дві відповідальності у своєму імені. «And» — це код-запах, що вказує на порушення SRP." } },
{ category: "SRP", question: { en: "A service class validates input, calls the database, maps DTOs, and sends events. How many responsibilities does it have?", de: "Eine Service-Klasse validiert Eingaben, ruft die Datenbank auf, mappt DTOs und sendet Events. Wie viele Verantwortlichkeiten hat sie?", ru: "Сервисный класс валидирует входные данные, обращается к базе данных, маппит DTO и отправляет события. Сколько у него ответственностей?", uk: "Сервісний клас валідує вхідні дані, звертається до бази даних, мапить DTO та відправляє події. Скільки у нього відповідальностей?" }, options: { en: ["One — it's a service, that's its job.", "Two — validation and persistence.", "Four — validation, data access, mapping, and eventing.", "Three — the mapping doesn't count."], de: ["Eine — es ist ein Service, das ist sein Job.", "Zwei — Validierung und Persistenz.", "Vier — Validierung, Datenzugriff, Mapping und Eventing.", "Drei — das Mapping zählt nicht."], ru: ["Одна — это сервис, это его работа.", "Две — валидация и персистентность.", "Четыре — валидация, доступ к данным, маппинг и отправка событий.", "Три — маппинг не считается."], uk: ["Одна — це сервіс, це його робота.", "Дві — валідація та персистентність.", "Чотири — валідація, доступ до даних, мапінг та відправка подій.", "Три — мапінг не рахується."] }, correctIndex: 2, explanation: { en: "Each of those concerns could change independently. SRP suggests extracting a Validator, a Repository, a Mapper, and an EventPublisher.", de: "Jedes dieser Anliegen könnte sich unabhängig ändern. SRP empfiehlt, einen Validator, ein Repository, einen Mapper und einen EventPublisher zu extrahieren.", ru: "Каждая из этих задач может изменяться независимо. SRP предлагает выделить Validator, Repository, Mapper и EventPublisher.", uk: "Кожна з цих задач може змінюватися незалежно. SRP пропонує виділити Validator, Repository, Mapper та EventPublisher." } },
{ category: "SRP", question: { en: "How does SRP relate to testability?", de: "Wie hängt SRP mit Testbarkeit zusammen?", ru: "Как SRP связан с тестируемостью?", uk: "Як SRP пов'язаний з тестовністю?" }, options: { en: ["SRP makes classes harder to test because they're smaller.", "SRP has no effect on testing.", "Classes with a single responsibility are easier to test because they have fewer dependencies and simpler behavior.", "SRP only helps integration tests, not unit tests."], de: ["SRP macht Klassen schwerer testbar, weil sie kleiner sind.", "SRP hat keinen Einfluss auf das Testen.", "Klassen mit einer einzigen Verantwortlichkeit sind einfacher zu testen, weil sie weniger Abhängigkeiten und einfacheres Verhalten haben.", "SRP hilft nur bei Integrationstests, nicht bei Unit Tests."], ru: ["SRP затрудняет тестирование классов, потому что они меньше.", "SRP не влияет на тестирование.", "Классы с единственной ответственностью легче тестировать, потому что у них меньше зависимостей и проще поведение.", "SRP помогает только интеграционным тестам, но не unit-тестам."], uk: ["SRP ускладнює тестування класів, бо вони менші.", "SRP не впливає на тестування.", "Класи з єдиною відповідальністю легше тестувати, бо у них менше залежностей і простіша поведінка.", "SRP допомагає лише інтеграційним тестам, але не unit-тестам."] }, correctIndex: 2, explanation: { en: "A class doing one thing is easier to set up in tests, requires fewer mocks, and has clearer expected behavior.", de: "Eine Klasse, die nur eine Sache tut, ist einfacher in Tests einzurichten, benötigt weniger Mocks und hat klareres erwartetes Verhalten.", ru: "Класс, делающий одну вещь, легче настроить в тестах, он требует меньше моков и имеет более понятное ожидаемое поведение.", uk: "Клас, що робить одну річ, легше налаштувати в тестах, він потребує менше моків і має зрозумілішу очікувану поведінку." } },
{ category: "SRP", question: { en: "A middleware in ASP.NET Core handles authentication, rate limiting, and request logging. Does this violate SRP?", de: "Eine Middleware in ASP.NET Core verwaltet Authentifizierung, Rate Limiting und Request-Logging. Verletzt das SRP?", ru: "Middleware в ASP.NET Core обрабатывает аутентификацию, rate limiting и логирование запросов. Нарушает ли это SRP?", uk: "Middleware в ASP.NET Core обробляє автентифікацію, rate limiting та логування запитів. Чи порушує це SRP?" }, options: { en: ["No — middleware is supposed to handle cross-cutting concerns.", "Yes — each concern should be a separate middleware in the pipeline.", "No — it's just one class.", "Yes — but only if it exceeds 100 lines of code."], de: ["Nein — Middleware soll übergreifende Anliegen verwalten.", "Ja — jedes Anliegen sollte eine separate Middleware in der Pipeline sein.", "Nein — es ist nur eine Klasse.", "Ja — aber nur wenn sie 100 Zeilen Code überschreitet."], ru: ["Нет — middleware предназначен для сквозных задач.", "Да — каждая задача должна быть отдельным middleware в пайплайне.", "Нет — это всего лишь один класс.", "Да — но только если превышает 100 строк кода."], uk: ["Ні — middleware призначений для наскрізних задач.", "Так — кожна задача повинна бути окремим middleware в пайплайні.", "Ні — це лише один клас.", "Так — але лише якщо перевищує 100 рядків коду."] }, correctIndex: 1, explanation: { en: "ASP.NET Core's middleware pipeline is specifically designed to compose single-responsibility middleware components in order.", de: "Die Middleware-Pipeline von ASP.NET Core ist speziell dafür konzipiert, Middleware-Komponenten mit einzelner Verantwortlichkeit in Reihenfolge zu kombinieren.", ru: "Пайплайн middleware в ASP.NET Core специально спроектирован для компоновки middleware-компонентов с единственной ответственностью по порядку.", uk: "Пайплайн middleware в ASP.NET Core спеціально спроектований для компонування middleware-компонентів з єдиною відповідальністю по порядку." } },
{ category: "SRP", question: { en: "What is the relationship between SRP and high cohesion?", de: "Wie hängen SRP und hohe Kohäsion zusammen?", ru: "Какова связь между SRP и высокой связностью (cohesion)?", uk: "Який зв'язок між SRP та високою зв'язністю (cohesion)?" }, options: { en: ["They are opposites.", "SRP leads to high cohesion — all members of a class relate to its single responsibility.", "High cohesion means putting everything in one class.", "They are unrelated concepts."], de: ["Sie sind Gegensätze.", "SRP führt zu hoher Kohäsion — alle Mitglieder einer Klasse beziehen sich auf ihre einzige Verantwortlichkeit.", "Hohe Kohäsion bedeutet, alles in eine Klasse zu packen.", "Sie sind unverbundene Konzepte."], ru: ["Они противоположны.", "SRP ведёт к высокой связности — все члены класса относятся к его единственной ответственности.", "Высокая связность означает помещение всего в один класс.", "Это несвязанные концепции."], uk: ["Вони протилежні.", "SRP веде до високої зв'язності — всі члени класу стосуються його єдиної відповідальності.", "Висока зв'язність означає розміщення всього в одному класі.", "Це непов'язані концепції."] }, correctIndex: 1, explanation: { en: "A class following SRP naturally has high cohesion: every method and field directly relates to the class's single purpose.", de: "Eine Klasse, die SRP folgt, hat natürlich hohe Kohäsion: jede Methode und jedes Feld bezieht sich direkt auf den einzigen Zweck der Klasse.", ru: "Класс, следующий SRP, естественно обладает высокой связностью: каждый метод и поле напрямую связаны с единственной целью класса.", uk: "Клас, що дотримується SRP, природно має високу зв'язність: кожен метод і поле безпосередньо стосуються єдиної мети класу." } },
// ===== OPEN/CLOSED PRINCIPLE (OCP) =====
{ category: "OCP", question: { en: "What does the Open/Closed Principle state?", de: "Was besagt das Open/Closed Principle?", ru: "Что гласит принцип открытости/закрытости (OCP)?", uk: "Що проголошує принцип відкритості/закритості (OCP)?" }, options: { en: ["Classes should be open for modification and closed for extension.", "Classes should be open for extension but closed for modification.", "Classes should never be modified after first deployment.", "Classes should be open to all developers on the team."], de: ["Klassen sollten offen für Modifikation und geschlossen für Erweiterung sein.", "Klassen sollten offen für Erweiterung, aber geschlossen für Modifikation sein.", "Klassen sollten nach dem ersten Deployment nie modifiziert werden.", "Klassen sollten für alle Entwickler im Team offen sein."], ru: ["Классы должны быть открыты для модификации и закрыты для расширения.", "Классы должны быть открыты для расширения, но закрыты для модификации.", "Классы никогда не должны модифицироваться после первого развёртывания.", "Классы должны быть открыты для всех разработчиков в команде."], uk: ["Класи повинні бути відкриті для модифікації та закриті для розширення.", "Класи повинні бути відкриті для розширення, але закриті для модифікації.", "Класи ніколи не повинні модифікуватися після першого розгортання.", "Класи повинні бути відкриті для всіх розробників у команді."] }, correctIndex: 1, explanation: { en: "OCP means you should be able to add new behavior (open for extension) without changing existing code (closed for modification).", de: "OCP bedeutet, dass man neues Verhalten hinzufügen können sollte (offen für Erweiterung), ohne bestehenden Code zu ändern (geschlossen für Modifikation).", ru: "OCP означает, что вы должны иметь возможность добавлять новое поведение (открытость для расширения) без изменения существующего кода (закрытость для модификации).", uk: "OCP означає, що ви повинні мати можливість додавати нову поведінку (відкритість для розширення) без зміни існуючого коду (закритість для модифікації)." } },
{ category: "OCP", question: { en: "A switch statement that handles different discount types (Student, Senior, VIP) needs a new type added. Which principle is being violated?", de: "Ein Switch-Statement, das verschiedene Rabatttypen (Student, Senior, VIP) behandelt, benötigt einen neuen Typ. Welches Prinzip wird verletzt?", ru: "Switch-оператор, обрабатывающий разные типы скидок (Student, Senior, VIP), требует добавления нового типа. Какой принцип нарушается?", uk: "Switch-оператор, що обробляє різні типи знижок (Student, Senior, VIP), потребує додавання нового типу. Який принцип порушується?" }, options: { en: ["SRP", "LSP", "OCP", "DIP"], de: ["SRP", "LSP", "OCP", "DIP"], ru: ["SRP", "LSP", "OCP", "DIP"], uk: ["SRP", "LSP", "OCP", "DIP"] }, correctIndex: 2, explanation: { en: "Every new discount type requires modifying the existing switch. OCP says new behavior should be added via new classes (e.g., IDiscountStrategy implementations).", de: "Jeder neue Rabatttyp erfordert eine Änderung des bestehenden Switch. OCP sagt, neues Verhalten sollte über neue Klassen hinzugefügt werden (z.B. IDiscountStrategy-Implementierungen).", ru: "Каждый новый тип скидки требует модификации существующего switch. OCP гласит, что новое поведение должно добавляться через новые классы (например, реализации IDiscountStrategy).", uk: "Кожен новий тип знижки вимагає модифікації існуючого switch. OCP проголошує, що нова поведінка повинна додаватися через нові класи (наприклад, реалізації IDiscountStrategy)." } },
{ category: "OCP", question: { en: "Which design pattern best helps achieve OCP?", de: "Welches Designmuster hilft am besten, OCP zu erreichen?", ru: "Какой паттерн проектирования лучше всего помогает достичь OCP?", uk: "Який патерн проектування найкраще допомагає досягти OCP?" }, options: { en: ["Singleton", "Strategy Pattern", "Facade", "Adapter"], de: ["Singleton", "Strategy Pattern", "Facade", "Adapter"], ru: ["Singleton", "Strategy Pattern", "Facade", "Adapter"], uk: ["Singleton", "Strategy Pattern", "Facade", "Adapter"] }, correctIndex: 1, explanation: { en: "Strategy lets you define a family of algorithms behind an interface. Adding a new algorithm means adding a new class, not modifying existing ones.", de: "Strategy ermöglicht es, eine Familie von Algorithmen hinter einem Interface zu definieren. Ein neuer Algorithmus bedeutet eine neue Klasse, keine Änderung bestehender.", ru: "Strategy позволяет определить семейство алгоритмов за интерфейсом. Добавление нового алгоритма означает добавление нового класса, а не изменение существующих.", uk: "Strategy дозволяє визначити сімейство алгоритмів за інтерфейсом. Додавання нового алгоритму означає додавання нового класу, а не зміну існуючих." } },
{ category: "OCP", question: { en: "How does polymorphism enable the Open/Closed Principle?", de: "Wie ermöglicht Polymorphismus das Open/Closed Principle?", ru: "Как полиморфизм обеспечивает соблюдение Open/Closed Principle?", uk: "Як поліморфізм забезпечує дотримання Open/Closed Principle?" }, options: { en: ["It doesn't — OCP is about encapsulation.", "New subclasses or interface implementations add behavior without touching the base class or consuming code.", "Polymorphism only works with abstract classes, not interfaces.", "Polymorphism violates OCP by allowing runtime changes."], de: ["Gar nicht — OCP handelt von Kapselung.", "Neue Unterklassen oder Interface-Implementierungen fügen Verhalten hinzu, ohne die Basisklasse oder den konsumierenden Code zu ändern.", "Polymorphismus funktioniert nur mit abstrakten Klassen, nicht mit Interfaces.", "Polymorphismus verletzt OCP, indem er Laufzeitänderungen erlaubt."], ru: ["Никак — OCP касается инкапсуляции.", "Новые подклассы или реализации интерфейсов добавляют поведение без изменения базового класса или потребляющего кода.", "Полиморфизм работает только с абстрактными классами, не с интерфейсами.", "Полиморфизм нарушает OCP, допуская изменения во время выполнения."], uk: ["Ніяк — OCP стосується інкапсуляції.", "Нові підкласи або реалізації інтерфейсів додають поведінку без зміни базового класу або коду, що його використовує.", "Поліморфізм працює лише з абстрактними класами, не з інтерфейсами.", "Поліморфізм порушує OCP, допускаючи зміни під час виконання."] }, correctIndex: 1, explanation: { en: "When code depends on an abstraction (interface/base class), you can introduce new implementations without modifying the existing consumer.", de: "Wenn Code von einer Abstraktion (Interface/Basisklasse) abhängt, kann man neue Implementierungen einführen, ohne den bestehenden Konsumenten zu ändern.", ru: "Когда код зависит от абстракции (интерфейса/базового класса), можно вводить новые реализации без изменения существующего потребителя.", uk: "Коли код залежить від абстракції (інтерфейсу/базового класу), можна вводити нові реалізації без зміни існуючого споживача." } },
{ category: "OCP", question: { en: "In ASP.NET Core, how does the middleware pipeline demonstrate OCP?", de: "Wie demonstriert die Middleware-Pipeline in ASP.NET Core das OCP?", ru: "Как пайплайн middleware в ASP.NET Core демонстрирует OCP?", uk: "Як пайплайн middleware в ASP.NET Core демонструє OCP?" }, options: { en: ["You modify the framework source to add middleware.", "You add new middleware classes to the pipeline without modifying existing ones.", "You override the built-in middleware with reflection.", "You fork the ASP.NET Core repository."], de: ["Man modifiziert den Framework-Quellcode, um Middleware hinzuzufügen.", "Man fügt neue Middleware-Klassen zur Pipeline hinzu, ohne bestehende zu ändern.", "Man überschreibt die eingebaute Middleware mit Reflection.", "Man forkt das ASP.NET Core Repository."], ru: ["Вы модифицируете исходный код фреймворка для добавления middleware.", "Вы добавляете новые middleware-классы в пайплайн без изменения существующих.", "Вы переопределяете встроенный middleware через reflection.", "Вы форкаете репозиторий ASP.NET Core."], uk: ["Ви модифікуєте вихідний код фреймворку для додавання middleware.", "Ви додаєте нові middleware-класи в пайплайн без зміни існуючих.", "Ви перевизначаєте вбудований middleware через reflection.", "Ви форкаєте репозиторій ASP.NET Core."] }, correctIndex: 1, explanation: { en: "Each middleware is a separate class. Adding new behavior (e.g., custom logging) means adding a new middleware, not changing existing ones.", de: "Jede Middleware ist eine separate Klasse. Neues Verhalten (z.B. benutzerdefiniertes Logging) bedeutet eine neue Middleware hinzuzufügen, nicht bestehende zu ändern.", ru: "Каждый middleware — это отдельный класс. Добавление нового поведения (например, пользовательского логирования) означает добавление нового middleware, а не изменение существующих.", uk: "Кожен middleware — це окремий клас. Додавання нової поведінки (наприклад, користувацького логування) означає додавання нового middleware, а не зміну існуючих." } },
{ category: "OCP", question: { en: "A PaymentProcessor has if/else blocks for Stripe, PayPal, and Square. How do you refactor for OCP?", de: "Ein PaymentProcessor hat if/else-Blöcke für Stripe, PayPal und Square. Wie refaktorisiert man für OCP?", ru: "PaymentProcessor содержит if/else блоки для Stripe, PayPal и Square. Как рефакторить для соблюдения OCP?", uk: "PaymentProcessor містить if/else блоки для Stripe, PayPal та Square. Як рефакторити для дотримання OCP?" }, options: { en: ["Add more else-if blocks as needed.", "Create an IPaymentProvider interface with Stripe, PayPal, Square implementations and inject the correct one.", "Make PaymentProcessor static.", "Use reflection to dynamically load payment methods."], de: ["Bei Bedarf weitere else-if-Blöcke hinzufügen.", "Ein IPaymentProvider-Interface mit Stripe-, PayPal-, Square-Implementierungen erstellen und die richtige injizieren.", "PaymentProcessor statisch machen.", "Reflection verwenden, um Zahlungsmethoden dynamisch zu laden."], ru: ["Добавлять новые else-if блоки по мере необходимости.", "Создать интерфейс IPaymentProvider с реализациями Stripe, PayPal, Square и инжектировать нужную.", "Сделать PaymentProcessor статическим.", "Использовать reflection для динамической загрузки платёжных методов."], uk: ["Додавати нові else-if блоки за потреби.", "Створити інтерфейс IPaymentProvider з реалізаціями Stripe, PayPal, Square та інжектувати потрібну.", "Зробити PaymentProcessor статичним.", "Використати reflection для динамічного завантаження платіжних методів."] }, correctIndex: 1, explanation: { en: "Each payment provider becomes a class implementing IPaymentProvider. Adding a new provider means creating a new class, not touching PaymentProcessor.", de: "Jeder Zahlungsanbieter wird zu einer Klasse, die IPaymentProvider implementiert. Ein neuer Anbieter bedeutet eine neue Klasse, ohne PaymentProcessor anzufassen.", ru: "Каждый платёжный провайдер становится классом, реализующим IPaymentProvider. Добавление нового провайдера означает создание нового класса, не затрагивая PaymentProcessor.", uk: "Кожен платіжний провайдер стає класом, що реалізує IPaymentProvider. Додавання нового провайдера означає створення нового класу, не торкаючись PaymentProcessor." } },
{ category: "OCP", question: { en: "How do C# extension methods relate to OCP?", de: "Wie hängen C# Extension Methods mit OCP zusammen?", ru: "Как extension-методы в C# связаны с OCP?", uk: "Як extension-методи в C# пов'язані з OCP?" }, options: { en: ["They violate OCP because they extend sealed classes.", "They support OCP by adding behavior to existing types without modifying their source code.", "Extension methods have nothing to do with SOLID.", "They violate SRP by adding methods externally."], de: ["Sie verletzen OCP, weil sie versiegelte Klassen erweitern.", "Sie unterstützen OCP, indem sie Verhalten zu bestehenden Typen hinzufügen, ohne deren Quellcode zu ändern.", "Extension Methods haben nichts mit SOLID zu tun.", "Sie verletzen SRP, indem sie Methoden extern hinzufügen."], ru: ["Они нарушают OCP, потому что расширяют sealed-классы.", "Они поддерживают OCP, добавляя поведение к существующим типам без модификации их исходного кода.", "Extension-методы не имеют отношения к SOLID.", "Они нарушают SRP, добавляя методы извне."], uk: ["Вони порушують OCP, бо розширюють sealed-класи.", "Вони підтримують OCP, додаючи поведінку до існуючих типів без модифікації їхнього вихідного коду.", "Extension-методи не мають відношення до SOLID.", "Вони порушують SRP, додаючи методи ззовні."] }, correctIndex: 1, explanation: { en: "Extension methods let you add functionality to existing types (even those you don't own) without modifying the original class — a form of OCP.", de: "Extension Methods ermöglichen es, Funktionalität zu bestehenden Typen hinzuzufügen (auch solchen, die man nicht besitzt), ohne die Originalklasse zu ändern — eine Form von OCP.", ru: "Extension-методы позволяют добавлять функциональность к существующим типам (даже тем, которыми вы не владеете) без изменения оригинального класса — форма OCP.", uk: "Extension-методи дозволяють додавати функціональність до існуючих типів (навіть тих, якими ви не володієте) без зміни оригінального класу — форма OCP." } },
{ category: "OCP", question: { en: "What is the role of abstract classes in achieving OCP?", de: "Welche Rolle spielen abstrakte Klassen bei der Umsetzung von OCP?", ru: "Какова роль абстрактных классов в достижении OCP?", uk: "Яка роль абстрактних класів у досягненні OCP?" }, options: { en: ["Abstract classes prevent any extension.", "They define a stable contract while allowing derived classes to provide new behavior via overrides.", "Abstract classes are only for code reuse, not OCP.", "They force all methods to be virtual."], de: ["Abstrakte Klassen verhindern jede Erweiterung.", "Sie definieren einen stabilen Vertrag, während abgeleitete Klassen neues Verhalten über Overrides bereitstellen können.", "Abstrakte Klassen dienen nur der Wiederverwendung von Code, nicht OCP.", "Sie erzwingen, dass alle Methoden virtuell sind."], ru: ["Абстрактные классы предотвращают любое расширение.", "Они определяют стабильный контракт, позволяя производным классам предоставлять новое поведение через переопределение.", "Абстрактные классы предназначены только для повторного использования кода, не для OCP.", "Они заставляют все методы быть виртуальными."], uk: ["Абстрактні класи запобігають будь-якому розширенню.", "Вони визначають стабільний контракт, дозволяючи похідним класам надавати нову поведінку через перевизначення.", "Абстрактні класи призначені лише для повторного використання коду, не для OCP.", "Вони змушують усі методи бути віртуальними."] }, correctIndex: 1, explanation: { en: "The abstract class is 'closed' (its contract is stable). Derived classes are 'open' (they extend behavior by overriding abstract/virtual methods).", de: "Die abstrakte Klasse ist «geschlossen» (ihr Vertrag ist stabil). Abgeleitete Klassen sind «offen» (sie erweitern Verhalten durch Überschreiben abstrakter/virtueller Methoden).", ru: "Абстрактный класс «закрыт» (его контракт стабилен). Производные классы «открыты» (они расширяют поведение переопределением абстрактных/виртуальных методов).", uk: "Абстрактний клас «закритий» (його контракт стабільний). Похідні класи «відкриті» (вони розширюють поведінку перевизначенням абстрактних/віртуальних методів)." } },
{ category: "OCP", question: { en: "A report generator outputs PDF. Now it needs CSV and Excel. What's the OCP-compliant approach?", de: "Ein Reportgenerator gibt PDF aus. Jetzt werden CSV und Excel benötigt. Was ist der OCP-konforme Ansatz?", ru: "Генератор отчётов выводит PDF. Теперь нужны CSV и Excel. Каков OCP-совместимый подход?", uk: "Генератор звітів виводить PDF. Тепер потрібні CSV та Excel. Який OCP-сумісний підхід?" }, options: { en: ["Add CSV and Excel logic to the existing PDF generator class.", "Create an IReportExporter interface with PdfExporter, CsvExporter, ExcelExporter implementations.", "Create a massive utility class with all formats.", "Use conditional compilation (#if) for each format."], de: ["CSV- und Excel-Logik zur bestehenden PDF-Generator-Klasse hinzufügen.", "Ein IReportExporter-Interface mit PdfExporter-, CsvExporter-, ExcelExporter-Implementierungen erstellen.", "Eine massive Utility-Klasse mit allen Formaten erstellen.", "Bedingte Kompilierung (#if) für jedes Format verwenden."], ru: ["Добавить логику CSV и Excel в существующий класс генератора PDF.", "Создать интерфейс IReportExporter с реализациями PdfExporter, CsvExporter, ExcelExporter.", "Создать массивный утилитный класс со всеми форматами.", "Использовать условную компиляцию (#if) для каждого формата."], uk: ["Додати логіку CSV та Excel до існуючого класу генератора PDF.", "Створити інтерфейс IReportExporter з реалізаціями PdfExporter, CsvExporter, ExcelExporter.", "Створити масивний утилітний клас з усіма форматами.", "Використати умовну компіляцію (#if) для кожного формату."] }, correctIndex: 1, explanation: { en: "Each export format is a separate class. The report generator depends on IReportExporter, making it closed for modification but open for new formats.", de: "Jedes Exportformat ist eine separate Klasse. Der Reportgenerator hängt von IReportExporter ab — geschlossen für Modifikation, aber offen für neue Formate.", ru: "Каждый формат экспорта — отдельный класс. Генератор отчётов зависит от IReportExporter, что делает его закрытым для модификации, но открытым для новых форматов.", uk: "Кожен формат експорту — окремий клас. Генератор звітів залежить від IReportExporter, що робить його закритим для модифікації, але відкритим для нових форматів." } },
{ category: "OCP", question: { en: "How does Dependency Injection in ASP.NET Core support OCP?", de: "Wie unterstützt Dependency Injection in ASP.NET Core das OCP?", ru: "Как Dependency Injection в ASP.NET Core поддерживает OCP?", uk: "Як Dependency Injection в ASP.NET Core підтримує OCP?" }, options: { en: ["It doesn't — DI is about lifetime management only.", "DI allows swapping implementations at registration time without changing consuming classes.", "DI makes all services singletons.", "DI requires modifying Program.cs for every new service."], de: ["Gar nicht — DI handelt nur von Lifetime-Management.", "DI ermöglicht das Austauschen von Implementierungen zur Registrierungszeit, ohne konsumierende Klassen zu ändern.", "DI macht alle Services zu Singletons.", "DI erfordert die Änderung von Program.cs für jeden neuen Service."], ru: ["Никак — DI касается только управления временем жизни.", "DI позволяет подменять реализации во время регистрации без изменения потребляющих классов.", "DI делает все сервисы синглтонами.", "DI требует модификации Program.cs для каждого нового сервиса."], uk: ["Ніяк — DI стосується лише управління часом життя.", "DI дозволяє підміняти реалізації під час реєстрації без зміни класів, що їх споживають.", "DI робить усі сервіси синглтонами.", "DI вимагає модифікації Program.cs для кожного нового сервісу."] }, correctIndex: 1, explanation: { en: "While you do register new services in Program.cs, the consuming classes never change — they depend on interfaces, not concrete types.", de: "Obwohl man neue Services in Program.cs registriert, ändern sich die konsumierenden Klassen nie — sie hängen von Interfaces ab, nicht von konkreten Typen.", ru: "Хотя вы и регистрируете новые сервисы в Program.cs, потребляющие классы никогда не меняются — они зависят от интерфейсов, а не от конкретных типов.", uk: "Хоча ви і реєструєте нові сервіси в Program.cs, класи, що їх споживають, ніколи не змінюються — вони залежать від інтерфейсів, а не від конкретних типів." } },
// ===== LISKOV SUBSTITUTION PRINCIPLE (LSP) =====
{ category: "LSP", question: { en: "What does the Liskov Substitution Principle state?", de: "Was besagt das Liskov Substitution Principle?", ru: "Что гласит принцип подстановки Лисков (LSP)?", uk: "Що проголошує принцип підстановки Лісков (LSP)?" }, options: { en: ["Subclasses should always override all base class methods.", "Objects of a superclass should be replaceable with objects of a subclass without breaking the application.", "A subclass should never be used in place of its parent.", "Liskov Substitution only applies to abstract classes."], de: ["Unterklassen sollten immer alle Methoden der Basisklasse überschreiben.", "Objekte einer Superklasse sollten durch Objekte einer Unterklasse ersetzbar sein, ohne die Anwendung zu zerstören.", "Eine Unterklasse sollte nie anstelle ihres Elternteils verwendet werden.", "Liskov Substitution gilt nur für abstrakte Klassen."], ru: ["Подклассы всегда должны переопределять все методы базового класса.", "Объекты суперкласса должны быть заменяемы объектами подкласса без нарушения работы приложения.", "Подкласс никогда не должен использоваться вместо родителя.", "Принцип подстановки Лисков применим только к абстрактным классам."], uk: ["Підкласи завжди повинні перевизначати всі методи базового класу.", "Об'єкти суперкласу повинні бути замінюваними об'єктами підкласу без порушення роботи застосунку.", "Підклас ніколи не повинен використовуватися замість батьківського класу.", "Принцип підстановки Лісков застосовний лише до абстрактних класів."] }, correctIndex: 1, explanation: { en: "LSP says if code works with a base type, it must also work correctly with any derived type — no surprises, no broken contracts.", de: "LSP besagt: Wenn Code mit einem Basistyp funktioniert, muss er auch mit jedem abgeleiteten Typ korrekt funktionieren — keine Überraschungen, keine gebrochenen Verträge.", ru: "LSP гласит: если код работает с базовым типом, он должен корректно работать и с любым производным типом — без сюрпризов и нарушенных контрактов.", uk: "LSP проголошує: якщо код працює з базовим типом, він повинен коректно працювати і з будь-яким похідним типом — без сюрпризів і порушених контрактів." } },
{ category: "LSP", question: { en: "A Square class inherits from Rectangle and overrides SetWidth to also set Height. Does this violate LSP?", de: "Eine Square-Klasse erbt von Rectangle und überschreibt SetWidth, sodass auch Height gesetzt wird. Verletzt das LSP?", ru: "Класс Square наследуется от Rectangle и переопределяет SetWidth, чтобы также задавать Height. Нарушает ли это LSP?", uk: "Клас Square наслідується від Rectangle та перевизначає SetWidth, щоб також задавати Height. Чи порушує це LSP?" }, options: { en: ["No — a square IS a rectangle mathematically.", "Yes — code expecting Rectangle behavior (independent width/height) will break when given a Square.", "No — as long as the tests pass.", "Yes — but only in strongly-typed languages."], de: ["Nein — ein Quadrat IST mathematisch ein Rechteck.", "Ja — Code, der Rectangle-Verhalten erwartet (unabhängige Breite/Höhe), wird bei einem Square fehlschlagen.", "Nein — solange die Tests bestehen.", "Ja — aber nur in stark typisierten Sprachen."], ru: ["Нет — квадрат математически ЯВЛЯЕТСЯ прямоугольником.", "Да — код, ожидающий поведения Rectangle (независимые ширина/высота), сломается при получении Square.", "Нет — пока тесты проходят.", "Да — но только в строго типизированных языках."], uk: ["Ні — квадрат математично Є прямокутником.", "Так — код, що очікує поведінки Rectangle (незалежні ширина/висота), зламається при отриманні Square.", "Ні — поки тести проходять.", "Так — але лише в строго типізованих мовах."] }, correctIndex: 1, explanation: { en: "The classic LSP violation. Code calling rect.SetWidth(5); rect.SetHeight(10) expects area=50, but Square produces area=100.", de: "Die klassische LSP-Verletzung. Code, der rect.SetWidth(5); rect.SetHeight(10) aufruft, erwartet area=50, aber Square liefert area=100.", ru: "Классическое нарушение LSP. Код, вызывающий rect.SetWidth(5); rect.SetHeight(10), ожидает area=50, но Square выдаёт area=100.", uk: "Класичне порушення LSP. Код, що викликає rect.SetWidth(5); rect.SetHeight(10), очікує area=50, але Square видає area=100." } },
{ category: "LSP", question: { en: "A derived class throws NotImplementedException for a base class method. Does this violate LSP?", de: "Eine abgeleitete Klasse wirft NotImplementedException für eine Basisklassenmethode. Verletzt das LSP?", ru: "Производный класс выбрасывает NotImplementedException для метода базового класса. Нарушает ли это LSP?", uk: "Похідний клас викидає NotImplementedException для методу базового класу. Чи порушує це LSP?" }, options: { en: ["No — it's a valid way to signal unsupported operations.", "Yes — callers of the base type expect the method to work, not throw unexpected exceptions.", "No — as long as the exception is documented.", "It depends on the method's return type."], de: ["Nein — es ist eine gültige Art, nicht unterstützte Operationen zu signalisieren.", "Ja — Aufrufer des Basistyps erwarten, dass die Methode funktioniert, nicht dass unerwartete Exceptions geworfen werden.", "Nein — solange die Exception dokumentiert ist.", "Es hängt vom Rückgabetyp der Methode ab."], ru: ["Нет — это допустимый способ сигнализировать о неподдерживаемых операциях.", "Да — вызывающий код базового типа ожидает, что метод работает, а не бросает неожиданные исключения.", "Нет — если исключение задокументировано.", "Зависит от возвращаемого типа метода."], uk: ["Ні — це допустимий спосіб сигналізувати про непідтримувані операції.", "Так — код, що викликає метод базового типу, очікує, що метод працює, а не кидає неочікувані винятки.", "Ні — якщо виняток задокументовано.", "Залежить від типу повернення методу."] }, correctIndex: 1, explanation: { en: "If calling code expects the method to succeed (per the base class contract), throwing NotImplementedException is a surprise — a clear LSP violation.", de: "Wenn der aufrufende Code erwartet, dass die Methode erfolgreich ist (gemäss dem Basisklassenvertrag), ist NotImplementedException eine Überraschung — eine klare LSP-Verletzung.", ru: "Если вызывающий код ожидает успешного выполнения метода (согласно контракту базового класса), NotImplementedException — это сюрприз и явное нарушение LSP.", uk: "Якщо код, що викликає метод, очікує його успішного виконання (згідно з контрактом базового класу), NotImplementedException — це сюрприз і явне порушення LSP." } },
{ category: "LSP", question: { en: "What is the 'contract' in the context of LSP?", de: "Was ist der «Vertrag» im Kontext von LSP?", ru: "Что такое «контракт» в контексте LSP?", uk: "Що таке «контракт» у контексті LSP?" }, options: { en: ["The interface keyword in C#.", "The set of preconditions, postconditions, and invariants that callers rely on.", "The class constructor parameters.", "The XML documentation comments."], de: ["Das Schlüsselwort interface in C#.", "Die Menge der Vorbedingungen, Nachbedingungen und Invarianten, auf die Aufrufer sich verlassen.", "Die Konstruktorparameter der Klasse.", "Die XML-Dokumentationskommentare."], ru: ["Ключевое слово interface в C#.", "Набор предусловий, постусловий и инвариантов, на которые полагается вызывающий код.", "Параметры конструктора класса.", "XML-комментарии документации."], uk: ["Ключове слово interface в C#.", "Набір передумов, постумов та інваріантів, на які покладається код, що викликає.", "Параметри конструктора класу.", "XML-коментарі документації."] }, correctIndex: 1, explanation: { en: "LSP is about behavioral contracts: what a method promises to accept (preconditions), what it promises to return (postconditions), and what always stays true (invariants).", de: "LSP handelt von Verhaltensverträgen: was eine Methode verspricht zu akzeptieren (Vorbedingungen), was sie verspricht zurückzugeben (Nachbedingungen) und was immer wahr bleibt (Invarianten).", ru: "LSP — это о поведенческих контрактах: что метод обещает принимать (предусловия), что обещает возвращать (постусловия) и что всегда остаётся истинным (инварианты).", uk: "LSP — це про поведінкові контракти: що метод обіцяє приймати (передумови), що обіцяє повертати (постумови) і що завжди залишається істинним (інваріанти)." } },
{ category: "LSP", question: { en: "A ReadOnlyCollection inherits from ICollection which has Add(). The Add() method throws NotSupportedException. Is this an LSP violation?", de: "Eine ReadOnlyCollection erbt von ICollection, das Add() hat. Die Add()-Methode wirft NotSupportedException. Ist das eine LSP-Verletzung?", ru: "ReadOnlyCollection наследуется от ICollection, у которого есть Add(). Метод Add() бросает NotSupportedException. Это нарушение LSP?", uk: "ReadOnlyCollection наслідується від ICollection, у якого є Add(). Метод Add() кидає NotSupportedException. Чи це порушення LSP?" }, options: { en: ["Yes — always.", "No — because ICollection documents that Add() may throw for read-only collections, so the contract accounts for it.", "Yes — because exceptions are always violations.", "No — because it's a .NET Framework class."], de: ["Ja — immer.", "Nein — weil ICollection dokumentiert, dass Add() bei schreibgeschützten Sammlungen werfen kann, also berücksichtigt der Vertrag das.", "Ja — weil Exceptions immer Verletzungen sind.", "Nein — weil es eine .NET-Framework-Klasse ist."], ru: ["Да — всегда.", "Нет — потому что ICollection документирует, что Add() может бросать исключение для коллекций только для чтения, то есть контракт это учитывает.", "Да — потому что исключения всегда являются нарушениями.", "Нет — потому что это класс .NET Framework."], uk: ["Так — завжди.", "Ні — тому що ICollection документує, що Add() може кидати виняток для колекцій лише для читання, тобто контракт це враховує.", "Так — тому що винятки завжди є порушеннями.", "Ні — тому що це клас .NET Framework."] }, correctIndex: 1, explanation: { en: "LSP allows exceptions if they're part of the documented contract. ICollection.IsReadOnly exists precisely to warn callers.", de: "LSP erlaubt Exceptions, wenn sie Teil des dokumentierten Vertrags sind. ICollection.IsReadOnly existiert genau dafür, um Aufrufer zu warnen.", ru: "LSP допускает исключения, если они являются частью документированного контракта. ICollection.IsReadOnly существует именно для предупреждения вызывающего кода.", uk: "LSP допускає винятки, якщо вони є частиною задокументованого контракту. ICollection.IsReadOnly існує саме для попередження коду, що викликає." } },
{ category: "LSP", question: { en: "How do you fix an LSP violation where a derived class can't fulfill all base class behaviors?", de: "Wie behebt man eine LSP-Verletzung, wenn eine abgeleitete Klasse nicht alle Verhaltensweisen der Basisklasse erfüllen kann?", ru: "Как исправить нарушение LSP, когда производный класс не может выполнить все поведения базового класса?", uk: "Як виправити порушення LSP, коли похідний клас не може виконати всі поведінки базового класу?" }, options: { en: ["Add try-catch blocks in all calling code.", "Redesign the hierarchy — either change the base class or don't inherit from it. Prefer composition over inheritance.", "Ignore it if tests pass.", "Make the base class sealed."], de: ["Try-catch-Blöcke in allen aufrufenden Code einfügen.", "Die Hierarchie neugestalten — entweder die Basisklasse ändern oder nicht davon erben. Komposition gegenüber Vererbung bevorzugen.", "Ignorieren, wenn Tests bestehen.", "Die Basisklasse versiegeln (sealed)."], ru: ["Добавить try-catch блоки во весь вызывающий код.", "Перепроектировать иерархию — либо изменить базовый класс, либо не наследоваться от него. Предпочитать композицию наследованию.", "Игнорировать, если тесты проходят.", "Сделать базовый класс sealed."], uk: ["Додати try-catch блоки у весь код, що викликає.", "Перепроектувати ієрархію — або змінити базовий клас, або не наслідуватися від нього. Надавати перевагу композиції над наслідуванням.", "Ігнорувати, якщо тести проходять.", "Зробити базовий клас sealed."] }, correctIndex: 1, explanation: { en: "If a subclass can't honor the full contract of its parent, the inheritance relationship is wrong. Extract a common interface or use composition.", de: "Wenn eine Unterklasse den vollständigen Vertrag ihres Elternteils nicht einhalten kann, ist die Vererbungsbeziehung falsch. Ein gemeinsames Interface extrahieren oder Komposition verwenden.", ru: "Если подкласс не может выполнить полный контракт родителя, связь наследования неверна. Выделите общий интерфейс или используйте композицию.", uk: "Якщо підклас не може виконати повний контракт батьківського класу, зв'язок наслідування хибний. Виділіть спільний інтерфейс або використайте композицію." } },
{ category: "LSP", question: { en: "An Ostrich class extends Bird. Bird has a Fly() method. What's the LSP-friendly solution?", de: "Eine Ostrich-Klasse erweitert Bird. Bird hat eine Fly()-Methode. Was ist die LSP-konforme Lösung?", ru: "Класс Ostrich наследуется от Bird. У Bird есть метод Fly(). Каково LSP-совместимое решение?", uk: "Клас Ostrich наслідується від Bird. Bird має метод Fly(). Яке LSP-сумісне рішення?" }, options: { en: ["Ostrich.Fly() throws NotImplementedException.", "Split Bird into FlyingBird and NonFlyingBird, and have Ostrich extend NonFlyingBird.", "Make Fly() return null for Ostrich.", "Override Fly() to do nothing (empty method body)."], de: ["Ostrich.Fly() wirft NotImplementedException.", "Bird in FlyingBird und NonFlyingBird aufteilen und Ostrich von NonFlyingBird erben lassen.", "Fly() für Ostrich null zurückgeben lassen.", "Fly() überschreiben mit leerem Methodenkörper."], ru: ["Ostrich.Fly() бросает NotImplementedException.", "Разделить Bird на FlyingBird и NonFlyingBird, и Ostrich наследуется от NonFlyingBird.", "Fly() возвращает null для Ostrich.", "Переопределить Fly() с пустым телом метода."], uk: ["Ostrich.Fly() кидає NotImplementedException.", "Розділити Bird на FlyingBird та NonFlyingBird, і Ostrich наслідується від NonFlyingBird.", "Fly() повертає null для Ostrich.", "Перевизначити Fly() з порожнім тілом методу."] }, correctIndex: 1, explanation: { en: "Not all birds fly. The hierarchy should reflect that. FlyingBird gets Fly(), NonFlyingBird doesn't. Ostrich never promises to fly.", de: "Nicht alle Vögel fliegen. Die Hierarchie sollte das widerspiegeln. FlyingBird bekommt Fly(), NonFlyingBird nicht. Ostrich verspricht nie zu fliegen.", ru: "Не все птицы летают. Иерархия должна это отражать. FlyingBird получает Fly(), NonFlyingBird — нет. Ostrich никогда не обещает летать.", uk: "Не всі птахи літають. Ієрархія повинна це відображати. FlyingBird отримує Fly(), NonFlyingBird — ні. Ostrich ніколи не обіцяє літати." } },
{ category: "LSP", question: { en: "How does LSP relate to polymorphism?", de: "Wie hängt LSP mit Polymorphismus zusammen?", ru: "Как LSP связан с полиморфизмом?", uk: "Як LSP пов'язаний з поліморфізмом?" }, options: { en: ["LSP prevents polymorphism.", "LSP ensures polymorphism works correctly — substituting a derived type won't surprise the caller.", "LSP and polymorphism are unrelated.", "LSP only applies to interfaces, polymorphism to classes."], de: ["LSP verhindert Polymorphismus.", "LSP stellt sicher, dass Polymorphismus korrekt funktioniert — das Ersetzen eines abgeleiteten Typs überrascht den Aufrufer nicht.", "LSP und Polymorphismus sind unverbunden.", "LSP gilt nur für Interfaces, Polymorphismus für Klassen."], ru: ["LSP предотвращает полиморфизм.", "LSP гарантирует, что полиморфизм работает корректно — подстановка производного типа не удивит вызывающий код.", "LSP и полиморфизм не связаны.", "LSP применим только к интерфейсам, полиморфизм — к классам."], uk: ["LSP запобігає поліморфізму.", "LSP гарантує, що поліморфізм працює коректно — підстановка похідного типу не здивує код, що викликає.", "LSP і поліморфізм не пов'язані.", "LSP застосовний лише до інтерфейсів, поліморфізм — до класів."] }, correctIndex: 1, explanation: { en: "Polymorphism lets you swap types. LSP is the rule that guarantees those swaps are safe and behavior-preserving.", de: "Polymorphismus ermöglicht den Austausch von Typen. LSP ist die Regel, die garantiert, dass dieser Austausch sicher und verhaltenserhaltend ist.", ru: "Полиморфизм позволяет подменять типы. LSP — это правило, гарантирующее безопасность и сохранение поведения при таких подменах.", uk: "Поліморфізм дозволяє підміняти типи. LSP — це правило, що гарантує безпеку та збереження поведінки при таких підмінах." } },
{ category: "LSP", question: { en: "A method returns IEnumerable<T> but a subclass implementation returns null instead of an empty collection. LSP violation?", de: "Eine Methode gibt IEnumerable<T> zurück, aber eine Unterklassen-Implementierung gibt null statt einer leeren Sammlung zurück. LSP-Verletzung?", ru: "Метод возвращает IEnumerable<T>, но реализация подкласса возвращает null вместо пустой коллекции. Нарушение LSP?", uk: "Метод повертає IEnumerable<T>, але реалізація підкласу повертає null замість порожньої колекції. Порушення LSP?" }, options: { en: ["No — null is a valid reference.", "Yes — callers expect an iterable result, not null. They will get NullReferenceException on foreach.", "No — the caller should always null-check.", "Only if the method is async."], de: ["Nein — null ist eine gültige Referenz.", "Ja — Aufrufer erwarten ein iterierbares Ergebnis, nicht null. Sie erhalten NullReferenceException bei foreach.", "Nein — der Aufrufer sollte immer null prüfen.", "Nur wenn die Methode async ist."], ru: ["Нет — null является допустимой ссылкой.", "Да — вызывающий код ожидает итерируемый результат, а не null. При foreach будет NullReferenceException.", "Нет — вызывающий код всегда должен проверять на null.", "Только если метод асинхронный."], uk: ["Ні — null є допустимим посиланням.", "Так — код, що викликає, очікує ітеровний результат, а не null. При foreach буде NullReferenceException.", "Ні — код, що викликає, завжди повинен перевіряти на null.", "Лише якщо метод асинхронний."] }, correctIndex: 1, explanation: { en: "The implicit contract of returning IEnumerable is that you can iterate it. Returning null breaks that expectation — return Enumerable.Empty<T>() instead.", de: "Der implizite Vertrag bei der Rückgabe von IEnumerable ist, dass man darüber iterieren kann. Null zurückzugeben bricht diese Erwartung — stattdessen Enumerable.Empty<T>() zurückgeben.", ru: "Неявный контракт возврата IEnumerable — возможность итерирования. Возврат null нарушает это ожидание — вместо этого возвращайте Enumerable.Empty<T>().", uk: "Неявний контракт повернення IEnumerable — можливість ітерування. Повернення null порушує це очікування — натомість повертайте Enumerable.Empty<T>()." } },
{ category: "LSP", question: { en: "What role does 'Design by Contract' play in LSP?", de: "Welche Rolle spielt «Design by Contract» in LSP?", ru: "Какую роль играет «Design by Contract» в LSP?", uk: "Яку роль відіграє «Design by Contract» в LSP?" }, options: { en: ["It's an unrelated formal method.", "It formalizes LSP: subclasses must accept the same or weaker preconditions and guarantee the same or stronger postconditions.", "It replaces LSP in modern C#.", "It only applies to Java."], de: ["Es ist eine unverbundene formale Methode.", "Es formalisiert LSP: Unterklassen müssen gleiche oder schwächere Vorbedingungen akzeptieren und gleiche oder stärkere Nachbedingungen garantieren.", "Es ersetzt LSP in modernem C#.", "Es gilt nur für Java."], ru: ["Это несвязанный формальный метод.", "Он формализует LSP: подклассы должны принимать такие же или более слабые предусловия и гарантировать такие же или более сильные постусловия.", "Он заменяет LSP в современном C#.", "Он применим только к Java."], uk: ["Це непов'язаний формальний метод.", "Він формалізує LSP: підкласи повинні приймати такі ж або слабші передумови та гарантувати такі ж або сильніші постумови.", "Він замінює LSP в сучасному C#.", "Він застосовний лише до Java."] }, correctIndex: 1, explanation: { en: "Bertrand Meyer's Design by Contract maps directly to LSP: don't demand more from callers (preconditions), don't deliver less (postconditions).", de: "Bertrand Meyers Design by Contract bildet sich direkt auf LSP ab: nicht mehr von Aufrufern verlangen (Vorbedingungen), nicht weniger liefern (Nachbedingungen).", ru: "Design by Contract Бертрана Мейера напрямую соответствует LSP: не требуйте больше от вызывающего кода (предусловия), не давайте меньше (постусловия).", uk: "Design by Contract Бертрана Мейєра безпосередньо відповідає LSP: не вимагайте більше від коду, що викликає (передумови), не давайте менше (постумови)." } },
// ===== INTERFACE SEGREGATION PRINCIPLE (ISP) =====
{ category: "ISP", question: { en: "What does the Interface Segregation Principle state?", de: "Was besagt das Interface Segregation Principle?", ru: "Что гласит принцип разделения интерфейсов (ISP)?", uk: "Що проголошує принцип розділення інтерфейсів (ISP)?" }, options: { en: ["All interfaces should have exactly one method.", "Clients should not be forced to depend on methods they don't use.", "Interfaces should be implemented by at most one class.", "You should never use interfaces, only abstract classes."], de: ["Alle Interfaces sollten genau eine Methode haben.", "Clients sollten nicht gezwungen sein, von Methoden abzuhängen, die sie nicht verwenden.", "Interfaces sollten von höchstens einer Klasse implementiert werden.", "Man sollte nie Interfaces verwenden, nur abstrakte Klassen."], ru: ["Все интерфейсы должны иметь ровно один метод.", "Клиенты не должны быть вынуждены зависеть от методов, которые они не используют.", "Интерфейсы должны реализовываться максимум одним классом.", "Следует использовать только абстрактные классы, не интерфейсы."], uk: ["Всі інтерфейси повинні мати рівно один метод.", "Клієнти не повинні бути змушені залежати від методів, які вони не використовують.", "Інтерфейси повинні реалізовуватися максимум одним класом.", "Слід використовувати лише абстрактні класи, не інтерфейси."] }, correctIndex: 1, explanation: { en: "ISP says keep interfaces focused. If a client only needs Read(), don't force it to implement Write() and Delete() too.", de: "ISP besagt, Interfaces fokussiert zu halten. Wenn ein Client nur Read() braucht, sollte er nicht gezwungen sein, auch Write() und Delete() zu implementieren.", ru: "ISP гласит: держите интерфейсы сфокусированными. Если клиенту нужен только Read(), не заставляйте его реализовывать Write() и Delete().", uk: "ISP проголошує: тримайте інтерфейси сфокусованими. Якщо клієнту потрібен лише Read(), не змушуйте його реалізовувати Write() та Delete()." } },
{ category: "ISP", question: { en: "An IRepository<T> interface has GetAll, GetById, Add, Update, Delete. A read-only consumer only needs GetAll and GetById. Which principle is violated?", de: "Ein IRepository<T>-Interface hat GetAll, GetById, Add, Update, Delete. Ein schreibgeschützter Konsument braucht nur GetAll und GetById. Welches Prinzip wird verletzt?", ru: "Интерфейс IRepository<T> имеет GetAll, GetById, Add, Update, Delete. Потребителю только для чтения нужны лишь GetAll и GetById. Какой принцип нарушен?", uk: "Інтерфейс IRepository<T> має GetAll, GetById, Add, Update, Delete. Споживачу лише для читання потрібні лише GetAll та GetById. Який принцип порушено?" }, options: { en: ["SRP", "OCP", "ISP", "DIP"], de: ["SRP", "OCP", "ISP", "DIP"], ru: ["SRP", "OCP", "ISP", "DIP"], uk: ["SRP", "OCP", "ISP", "DIP"] }, correctIndex: 2, explanation: { en: "The read-only consumer is forced to depend on Add/Update/Delete it never uses. Split into IReadRepository<T> and IWriteRepository<T>.", de: "Der schreibgeschützte Konsument wird gezwungen, von Add/Update/Delete abzuhängen, die er nie verwendet. Aufteilen in IReadRepository<T> und IWriteRepository<T>.", ru: "Потребитель только для чтения вынужден зависеть от Add/Update/Delete, которые он никогда не использует. Разделите на IReadRepository<T> и IWriteRepository<T>.", uk: "Споживач лише для читання змушений залежати від Add/Update/Delete, які він ніколи не використовує. Розділіть на IReadRepository<T> та IWriteRepository<T>." } },
{ category: "ISP", question: { en: "How does ISP differ from SRP?", de: "Wie unterscheidet sich ISP von SRP?", ru: "Чем ISP отличается от SRP?", uk: "Чим ISP відрізняється від SRP?" }, options: { en: ["They're the same principle.", "SRP is about class responsibilities. ISP is about interface design — not forcing consumers to depend on unused methods.", "ISP applies to abstract classes, SRP to interfaces.", "SRP is about behavior, ISP is about state."], de: ["Sie sind dasselbe Prinzip.", "SRP handelt von Klassenverantwortlichkeiten. ISP handelt von Interface-Design — Konsumenten nicht zwingen, von ungenutzten Methoden abzuhängen.", "ISP gilt für abstrakte Klassen, SRP für Interfaces.", "SRP handelt von Verhalten, ISP von Zustand."], ru: ["Это один и тот же принцип.", "SRP — об ответственностях классов. ISP — о проектировании интерфейсов: не заставлять потребителей зависеть от неиспользуемых методов.", "ISP применим к абстрактным классам, SRP к интерфейсам.", "SRP — о поведении, ISP — о состоянии."], uk: ["Це один і той самий принцип.", "SRP — про відповідальності класів. ISP — про проектування інтерфейсів: не змушувати споживачів залежати від невикористовуваних методів.", "ISP застосовний до абстрактних класів, SRP до інтерфейсів.", "SRP — про поведінку, ISP — про стан."] }, correctIndex: 1, explanation: { en: "SRP focuses on the implementer (one reason to change). ISP focuses on the consumer (don't force unused dependencies).", de: "SRP fokussiert sich auf den Implementierer (ein Grund zur Änderung). ISP fokussiert sich auf den Konsumenten (keine ungenutzten Abhängigkeiten erzwingen).", ru: "SRP фокусируется на реализаторе (одна причина для изменения). ISP фокусируется на потребителе (не навязывать неиспользуемые зависимости).", uk: "SRP фокусується на реалізаторі (одна причина для зміни). ISP фокусується на споживачі (не нав'язувати невикористовувані залежності)." } },
{ category: "ISP", question: { en: "A 'fat' IWorker interface has Work(), Eat(), and Sleep(). A Robot class implements IWorker. What's wrong?", de: "Ein «fettes» IWorker-Interface hat Work(), Eat() und Sleep(). Eine Robot-Klasse implementiert IWorker. Was ist falsch?", ru: "«Толстый» интерфейс IWorker имеет Work(), Eat() и Sleep(). Класс Robot реализует IWorker. Что не так?", uk: "«Товстий» інтерфейс IWorker має Work(), Eat() та Sleep(). Клас Robot реалізує IWorker. Що не так?" }, options: { en: ["Nothing — robots are workers.", "Robot must implement Eat() and Sleep() which don't apply, violating ISP.", "Robot should throw NotImplementedException for Eat/Sleep.", "IWorker should be abstract instead."], de: ["Nichts — Roboter sind Arbeiter.", "Robot muss Eat() und Sleep() implementieren, die nicht zutreffen, was ISP verletzt.", "Robot sollte NotImplementedException für Eat/Sleep werfen.", "IWorker sollte stattdessen abstrakt sein."], ru: ["Ничего — роботы являются работниками.", "Robot должен реализовать Eat() и Sleep(), которые к нему не применимы, что нарушает ISP.", "Robot должен бросать NotImplementedException для Eat/Sleep.", "IWorker должен быть абстрактным."], uk: ["Нічого — роботи є працівниками.", "Robot повинен реалізувати Eat() та Sleep(), які до нього не застосовні, що порушує ISP.", "Robot повинен кидати NotImplementedException для Eat/Sleep.", "IWorker повинен бути абстрактним."] }, correctIndex: 1, explanation: { en: "Split into IWorkable, IFeedable, ISleepable. Robot implements only IWorkable. Humans implement all three.", de: "Aufteilen in IWorkable, IFeedable, ISleepable. Robot implementiert nur IWorkable. Menschen implementieren alle drei.", ru: "Разделите на IWorkable, IFeedable, ISleepable. Robot реализует только IWorkable. Люди реализуют все три.", uk: "Розділіть на IWorkable, IFeedable, ISleepable. Robot реалізує лише IWorkable. Люди реалізують усі три." } },
{ category: "ISP", question: { en: "In ASP.NET Core, why does ILogger<T> exist alongside ILogger?", de: "Warum existiert in ASP.NET Core ILogger<T> neben ILogger?", ru: "Почему в ASP.NET Core существует ILogger<T> наряду с ILogger?", uk: "Чому в ASP.NET Core існує ILogger<T> поряд з ILogger?" }, options: { en: ["ILogger<T> is deprecated.", "ILogger<T> is a focused interface for category-specific logging, following ISP by not exposing irrelevant configuration methods.", "They're identical.", "ILogger<T> is only for unit tests."], de: ["ILogger<T> ist veraltet.", "ILogger<T> ist ein fokussiertes Interface für kategoriespezifisches Logging, das ISP folgt, indem es irrelevante Konfigurationsmethoden nicht exponiert.", "Sie sind identisch.", "ILogger<T> ist nur für Unit Tests."], ru: ["ILogger<T> устарел.", "ILogger<T> — это сфокусированный интерфейс для категорийного логирования, следующий ISP, не раскрывая нерелевантные методы конфигурации.", "Они идентичны.", "ILogger<T> только для unit-тестов."], uk: ["ILogger<T> застарів.", "ILogger<T> — це сфокусований інтерфейс для категорійного логування, що дотримується ISP, не розкриваючи нерелевантні методи конфігурації.", "Вони ідентичні.", "ILogger<T> лише для unit-тестів."] }, correctIndex: 1, explanation: { en: "ILogger<T> scopes the logging category to the type T. Consumers don't need to know about log configuration — that's handled separately.", de: "ILogger<T> begrenzt die Logging-Kategorie auf den Typ T. Konsumenten müssen nichts über Log-Konfiguration wissen — das wird separat gehandhabt.", ru: "ILogger<T> ограничивает категорию логирования типом T. Потребителям не нужно знать о конфигурации логирования — это обрабатывается отдельно.", uk: "ILogger<T> обмежує категорію логування типом T. Споживачам не потрібно знати про конфігурацію логування — це обробляється окремо." } },
