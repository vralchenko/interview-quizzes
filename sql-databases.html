{ category: "SQL Server", question: { en: "What is a Columnstore Index in SQL Server?", de: "Was ist ein Columnstore Index in SQL Server?", ru: "Что такое Columnstore Index в SQL Server?", uk: "Що таке Columnstore Index в SQL Server?" }, options: { en: ["An index on a single column.", "A columnar storage format that stores data column-by-column instead of row-by-row, enabling massive compression and fast analytical queries on large datasets.", "A regular index stored in a different file.", "An index that only works with varchar columns."], de: ["Ein Index auf einer einzelnen Spalte.", "Ein spaltenorientiertes Speicherformat, das Daten spaltenweise statt zeilenweise speichert und massive Komprimierung sowie schnelle analytische Queries auf grossen Datensätzen ermöglicht.", "Ein normaler Index in einer anderen Datei.", "Ein Index, der nur mit varchar-Spalten funktioniert."], ru: ["Индекс на одном столбце.", "Колоночный формат хранения, сохраняющий данные по столбцам вместо строк, обеспечивая массивное сжатие и быстрые аналитические запросы на больших наборах данных.", "Обычный индекс, хранящийся в другом файле.", "Индекс, работающий только со столбцами varchar."], uk: ["Індекс на одному стовпці.", "Колонковий формат зберігання, що зберігає дані по стовпцях замість рядків, забезпечуючи масивне стиснення та швидкі аналітичні запити на великих наборах даних.", "Звичайний індекс, збережений в іншому файлі.", "Індекс, що працює лише зі стовпцями varchar."] }, correctIndex: 1, explanation: { en: "Row-store: reads entire rows. Column-store: reads only needed columns. Aggregating SUM(Amount) over 100M rows reads only the Amount column — 10-100x faster for analytics.", de: "Row-store: liest ganze Zeilen. Column-store: liest nur benötigte Spalten. SUM(Amount) über 100M Zeilen liest nur die Amount-Spalte — 10-100x schneller für Analytik.", ru: "Row-store: читает целые строки. Column-store: читает только нужные столбцы. Агрегация SUM(Amount) по 100M строк читает только столбец Amount — в 10-100 раз быстрее для аналитики.", uk: "Row-store: читає цілі рядки. Column-store: читає лише потрібні стовпці. Агрегація SUM(Amount) по 100M рядків читає лише стовпець Amount — у 10-100 разів швидше для аналітики." } },
{ category: "SQL Server", question: { en: "What are Execution Plan operators you should watch out for?", de: "Auf welche Execution Plan Operatoren sollte man achten?", ru: "На какие операторы плана выполнения следует обращать внимание?", uk: "На які оператори плану виконання слід звертати увагу?" }, options: { en: ["All operators are equally performant.", "Table Scan (no index used), Key Lookup (missing covering index), Sort (missing index for ORDER BY), Hash Match (potentially large join with no index).", "Only Nested Loop indicates a problem.", "Execution plan operators don't affect performance."], de: ["Alle Operatoren sind gleich performant.", "Table Scan (kein Index verwendet), Key Lookup (fehlender Covering Index), Sort (fehlender Index für ORDER BY), Hash Match (potenziell grosser Join ohne Index).", "Nur Nested Loop zeigt ein Problem an.", "Execution Plan Operatoren beeinflussen die Performance nicht."], ru: ["Все операторы одинаково производительны.", "Table Scan (индекс не используется), Key Lookup (отсутствует Covering Index), Sort (отсутствует индекс для ORDER BY), Hash Match (потенциально большой JOIN без индекса).", "Только Nested Loop указывает на проблему.", "Операторы плана выполнения не влияют на производительность."], uk: ["Всі оператори однаково продуктивні.", "Table Scan (індекс не використовується), Key Lookup (відсутній Covering Index), Sort (відсутній індекс для ORDER BY), Hash Match (потенційно великий JOIN без індексу).", "Лише Nested Loop вказує на проблему.", "Оператори плану виконання не впливають на продуктивність."] }, correctIndex: 1, explanation: { en: "Table Scan = consider adding an index. Key Lookup = add INCLUDE columns. Sort with high cost = add index matching ORDER BY. These are the most common performance killers.", de: "Table Scan = Index hinzufügen erwägen. Key Lookup = INCLUDE-Spalten hinzufügen. Sort mit hohen Kosten = Index passend zu ORDER BY hinzufügen. Das sind die häufigsten Performance-Killer.", ru: "Table Scan = рассмотрите добавление индекса. Key Lookup = добавьте INCLUDE-столбцы. Sort с высокой стоимостью = добавьте индекс, соответствующий ORDER BY. Это самые частые убийцы производительности.", uk: "Table Scan = розгляньте додавання індексу. Key Lookup = додайте INCLUDE-стовпці. Sort з високою вартістю = додайте індекс, відповідний ORDER BY. Це найчастіші вбивці продуктивності." } },
{ category: "SQL Server", question: { en: "What is the difference between a Temp Table (#table) and a Table Variable (@table)?", de: "Was ist der Unterschied zwischen einer Temp Table (#table) und einer Table Variable (@table)?", ru: "В чём разница между Temp Table (#table) и Table Variable (@table)?", uk: "У чому різниця між Temp Table (#table) та Table Variable (@table)?" }, options: { en: ["They're identical.", "Temp tables have statistics and can be indexed. Table variables don't have distribution statistics and the optimizer always estimates 1 row, potentially causing bad plans.", "Table variables are always faster.", "Temp tables persist across sessions."], de: ["Sie sind identisch.", "Temp Tables haben Statistiken und können indexiert werden. Table Variables haben keine Verteilungsstatistiken und der Optimizer schätzt immer 1 Zeile, was zu schlechten Plänen führen kann.", "Table Variables sind immer schneller.", "Temp Tables persistieren über Sessions hinweg."], ru: ["Они идентичны.", "Temp Table имеют статистику и могут быть проиндексированы. Table Variable не имеют статистики распределения, и оптимизатор всегда оценивает 1 строку, что может привести к плохим планам.", "Table Variable всегда быстрее.", "Temp Table сохраняются между сессиями."], uk: ["Вони ідентичні.", "Temp Table мають статистику і можуть бути проіндексовані. Table Variable не мають статистики розподілу, і оптимізатор завжди оцінює 1 рядок, що може призвести до поганих планів.", "Table Variable завжди швидші.", "Temp Table зберігаються між сесіями."] }, correctIndex: 1, explanation: { en: "For small datasets (<100 rows), @table is fine. For larger sets, #table is better because SQL Server has accurate statistics and can choose proper join strategies.", de: "Für kleine Datensätze (<100 Zeilen) ist @table in Ordnung. Für grössere Mengen ist #table besser, weil SQL Server genaue Statistiken hat und richtige Join-Strategien wählen kann.", ru: "Для маленьких наборов (<100 строк) @table подходит. Для больших наборов #table лучше, потому что SQL Server имеет точную статистику и может выбрать правильные стратегии JOIN.", uk: "Для маленьких наборів (<100 рядків) @table підходить. Для більших наборів #table краще, тому що SQL Server має точну статистику і може обрати правильні стратегії JOIN." } },
{ category: "SQL Server", question: { en: "What is TempDB contention and how do you mitigate it?", de: "Was ist TempDB Contention und wie kann man sie beheben?", ru: "Что такое конкуренция TempDB и как её уменьшить?", uk: "Що таке конкуренція TempDB і як її зменшити?" }, options: { en: ["TempDB is never a bottleneck.", "Heavy concurrent use of temp tables, sorting, and hash joins causes latch contention on TempDB allocation pages. Mitigate with multiple TempDB files and trace flags.", "TempDB contention only happens on Linux.", "Simply increase TempDB file size."], de: ["TempDB ist nie ein Engpass.", "Intensive gleichzeitige Nutzung von Temp Tables, Sortierung und Hash Joins verursacht Latch Contention auf TempDB-Zuweisungsseiten. Beheben mit mehreren TempDB-Dateien und Trace Flags.", "TempDB Contention tritt nur unter Linux auf.", "Einfach die TempDB-Dateigrösse erhöhen."], ru: ["TempDB никогда не является узким местом.", "Интенсивное параллельное использование temp table, сортировки и hash join вызывает конкуренцию latch на страницах выделения TempDB. Решение: несколько файлов TempDB и trace flags.", "Конкуренция TempDB возникает только на Linux.", "Просто увеличьте размер файла TempDB."], uk: ["TempDB ніколи не є вузьким місцем.", "Інтенсивне паралельне використання temp table, сортування та hash join спричиняє конкуренцію latch на сторінках виділення TempDB. Рішення: кілька файлів TempDB та trace flags.", "Конкуренція TempDB виникає лише на Linux.", "Просто збільшіть розмір файлу TempDB."] }, correctIndex: 1, explanation: { en: "Best practice: create one TempDB data file per CPU core (up to 8), all equal size, with autogrowth. Trace flag 1118 (pre-SQL 2016) avoids mixed extent allocation contention.", de: "Best Practice: eine TempDB-Datendatei pro CPU-Kern (bis 8), alle gleich gross, mit Autogrowth. Trace Flag 1118 (vor SQL 2016) vermeidet Mixed Extent Allocation Contention.", ru: "Лучшая практика: один файл данных TempDB на ядро CPU (до 8), все одного размера, с автоувеличением. Trace flag 1118 (до SQL 2016) избегает конкуренции выделения mixed extent.", uk: "Найкраща практика: один файл даних TempDB на ядро CPU (до 8), всі однакового розміру, з автозбільшенням. Trace flag 1118 (до SQL 2016) уникає конкуренції виділення mixed extent." } },
// ===== EF CORE & ORM PITFALLS =====
{ category: "EF Core", question: { en: "What is the N+1 Query Problem?", de: "Was ist das N+1 Query Problem?", ru: "Что такое проблема N+1 запросов?", uk: "Що таке проблема N+1 запитів?" }, options: { en: ["Having more than N+1 tables in a database.", "Loading a list of N entities, then for each entity firing a separate query to load related data — resulting in 1 + N database round-trips instead of 1-2.", "A problem with NULL values in queries.", "Having N+1 indexes on a table."], de: ["Mehr als N+1 Tabellen in einer Datenbank haben.", "Eine Liste von N Entities laden und dann für jede Entity eine separate Query zum Laden verwandter Daten abfeuern — resultierend in 1 + N Datenbank-Roundtrips statt 1-2.", "Ein Problem mit NULL-Werten in Queries.", "N+1 Indexes auf einer Tabelle haben."], ru: ["Более N+1 таблиц в базе данных.", "Загрузка списка из N сущностей, затем для каждой сущности выполнение отдельного запроса для загрузки связанных данных — в результате 1 + N обращений к БД вместо 1-2.", "Проблема с NULL-значениями в запросах.", "N+1 индексов на таблице."], uk: ["Більше ніж N+1 таблиць у базі даних.", "Завантаження списку з N сутностей, потім для кожної сутності виконання окремого запиту для завантаження пов'язаних даних — в результаті 1 + N звернень до БД замість 1-2.", "Проблема з NULL-значеннями в запитах.", "N+1 індексів на таблиці."] }, correctIndex: 1, explanation: { en: "foreach(var order in orders) { var items = order.Items; } — if Items is lazy-loaded, each iteration fires a SELECT. Fix: use .Include(o => o.Items) for eager loading.", de: "foreach(var order in orders) { var items = order.Items; } — wenn Items lazy-loaded wird, feuert jede Iteration ein SELECT ab. Lösung: .Include(o => o.Items) für Eager Loading verwenden.", ru: "foreach(var order in orders) { var items = order.Items; } — если Items загружается лениво, каждая итерация выполняет SELECT. Решение: используйте .Include(o => o.Items) для жадной загрузки.", uk: "foreach(var order in orders) { var items = order.Items; } — якщо Items завантажується ліниво, кожна ітерація виконує SELECT. Рішення: використовуйте .Include(o => o.Items) для жадного завантаження." } },
{ category: "EF Core", question: { en: "What does AsNoTracking() do and when should you use it?", de: "Was macht AsNoTracking() und wann sollte man es verwenden?", ru: "Что делает AsNoTracking() и когда его использовать?", uk: "Що робить AsNoTracking() і коли його використовувати?" }, options: { en: ["It disables SQL logging.", "It tells EF Core not to track entities in the Change Tracker, reducing memory overhead significantly for read-only queries.", "It disables foreign key tracking.", "It prevents entities from being cached."], de: ["Es deaktiviert SQL-Logging.", "Es weist EF Core an, Entities nicht im Change Tracker zu verfolgen, was den Speicher-Overhead für schreibgeschützte Queries erheblich reduziert.", "Es deaktiviert Foreign-Key-Tracking.", "Es verhindert das Caching von Entities."], ru: ["Отключает логирование SQL.", "Указывает EF Core не отслеживать сущности в Change Tracker, значительно уменьшая накладные расходы памяти для запросов только на чтение.", "Отключает отслеживание Foreign Key.", "Предотвращает кэширование сущностей."], uk: ["Вимикає логування SQL.", "Вказує EF Core не відстежувати сутності в Change Tracker, значно зменшуючи накладні витрати пам'яті для запитів лише на читання.", "Вимикає відстеження Foreign Key.", "Запобігає кешуванню сутностей."] }, correctIndex: 1, explanation: { en: "Change Tracker creates a snapshot of every loaded entity for detecting changes. For read-only API responses, that's pure waste. AsNoTracking() skips it — 30-50% memory reduction.", de: "Change Tracker erstellt einen Snapshot jeder geladenen Entity zur Erkennung von Änderungen. Für schreibgeschützte API-Responses ist das reine Verschwendung. AsNoTracking() überspringt es — 30-50% Speicherreduktion.", ru: "Change Tracker создаёт снимок каждой загруженной сущности для обнаружения изменений. Для API-ответов только на чтение это чистая трата. AsNoTracking() пропускает это — снижение памяти на 30-50%.", uk: "Change Tracker створює знімок кожної завантаженої сутності для виявлення змін. Для API-відповідей лише на читання це чиста марнота. AsNoTracking() пропускає це — зниження пам'яті на 30-50%." } },
{ category: "EF Core", question: { en: "Why is IQueryable<T> preferred over IEnumerable<T> for database queries?", de: "Warum wird IQueryable<T> gegenüber IEnumerable<T> für Datenbankabfragen bevorzugt?", ru: "Почему IQueryable<T> предпочтительнее IEnumerable<T> для запросов к БД?", uk: "Чому IQueryable<T> краще за IEnumerable<T> для запитів до БД?" }, options: { en: ["IQueryable is always faster.", "IQueryable builds an expression tree translated to SQL — filtering happens in the database. IEnumerable pulls ALL rows to memory first, then filters in C#.", "IEnumerable doesn't support WHERE clauses.", "There is no practical difference."], de: ["IQueryable ist immer schneller.", "IQueryable baut einen Expression Tree auf, der in SQL übersetzt wird — Filterung geschieht in der Datenbank. IEnumerable zieht ALLE Zeilen in den Speicher und filtert dann in C#.", "IEnumerable unterstützt keine WHERE-Klauseln.", "Es gibt keinen praktischen Unterschied."], ru: ["IQueryable всегда быстрее.", "IQueryable строит дерево выражений, транслируемое в SQL — фильтрация происходит в базе данных. IEnumerable загружает ВСЕ строки в память, затем фильтрует в C#.", "IEnumerable не поддерживает WHERE.", "Практической разницы нет."], uk: ["IQueryable завжди швидший.", "IQueryable будує дерево виразів, що транслюється в SQL — фільтрація відбувається в базі даних. IEnumerable завантажує ВСІ рядки в пам'ять, потім фільтрує в C#.", "IEnumerable не підтримує WHERE.", "Практичної різниці немає."] }, correctIndex: 1, explanation: { en: "dbContext.Users.Where(u => u.Active) as IQueryable: generates WHERE Active = 1 in SQL. Cast to IEnumerable first: downloads ALL users, then filters in memory. Catastrophic for large tables.", de: "dbContext.Users.Where(u => u.Active) als IQueryable: generiert WHERE Active = 1 in SQL. Zuerst zu IEnumerable casten: lädt ALLE Benutzer herunter, filtert dann im Speicher. Katastrophal für grosse Tabellen.", ru: "dbContext.Users.Where(u => u.Active) как IQueryable: генерирует WHERE Active = 1 в SQL. Привести к IEnumerable сначала: загружает ВСЕХ пользователей, затем фильтрует в памяти. Катастрофа для больших таблиц.", uk: "dbContext.Users.Where(u => u.Active) як IQueryable: генерує WHERE Active = 1 в SQL. Привести до IEnumerable спочатку: завантажує ВСІХ користувачів, потім фільтрує в пам'яті. Катастрофа для великих таблиць." } },
{ category: "EF Core", question: { en: "How do you handle bulk inserts (100K+ rows) efficiently in .NET?", de: "Wie handhabt man Bulk Inserts (100K+ Zeilen) effizient in .NET?", ru: "Как эффективно обрабатывать массовые вставки (100K+ строк) в .NET?", uk: "Як ефективно обробляти масові вставки (100K+ рядків) у .NET?" }, options: { en: ["Use a foreach loop with SaveChanges() per entity.", "Bypass EF Core: use SqlBulkCopy (SQL Server) or Npgsql COPY (PostgreSQL) which stream binary data directly, inserting 100K+ rows per second.", "Use AddRange() — it's optimized for bulk.", "Insert into a JSON column and parse later."], de: ["Eine foreach-Schleife mit SaveChanges() pro Entity verwenden.", "EF Core umgehen: SqlBulkCopy (SQL Server) oder Npgsql COPY (PostgreSQL) verwenden, die Binärdaten direkt streamen und 100K+ Zeilen pro Sekunde einfügen.", "AddRange() verwenden — es ist für Bulk optimiert.", "In eine JSON-Spalte einfügen und später parsen."], ru: ["Использовать foreach с SaveChanges() на каждую сущность.", "Обойти EF Core: использовать SqlBulkCopy (SQL Server) или Npgsql COPY (PostgreSQL), которые стримят бинарные данные напрямую, вставляя 100K+ строк в секунду.", "Использовать AddRange() — он оптимизирован для массовых операций.", "Вставить в JSON-столбец и распарсить позже."], uk: ["Використовувати foreach з SaveChanges() на кожну сутність.", "Обійти EF Core: використовувати SqlBulkCopy (SQL Server) або Npgsql COPY (PostgreSQL), які стримлять бінарні дані напряму, вставляючи 100K+ рядків на секунду.", "Використовувати AddRange() — він оптимізований для масових операцій.", "Вставити в JSON-стовпець і розпарсити пізніше."] }, correctIndex: 1, explanation: { en: "EF Core generates individual INSERT statements — 100K rows = 100K separate SQL commands. Bulk utilities open a binary streaming channel, bypassing SQL parsing entirely.", de: "EF Core generiert einzelne INSERT-Statements — 100K Zeilen = 100K separate SQL-Befehle. Bulk-Utilities öffnen einen binären Streaming-Kanal und umgehen das SQL-Parsing vollständig.", ru: "EF Core генерирует отдельные INSERT-операторы — 100K строк = 100K отдельных SQL-команд. Bulk-утилиты открывают бинарный потоковый канал, полностью обходя парсинг SQL.", uk: "EF Core генерує окремі INSERT-оператори — 100K рядків = 100K окремих SQL-команд. Bulk-утиліти відкривають бінарний потоковий канал, повністю обходячи парсинг SQL." } },
{ category: "EF Core", question: { en: "What is the Cartesian Explosion problem with multiple Include()?", de: "Was ist das Cartesian Explosion Problem bei mehreren Include()?", ru: "Что такое проблема Cartesian Explosion при множественных Include()?", uk: "Що таке проблема Cartesian Explosion при множинних Include()?" }, options: { en: ["It only happens with circular references.", "When including multiple collection navigations, EF Core joins them in SQL — the result set becomes a Cartesian product, returning massively duplicated data.", "It's a bug fixed in EF Core 8.", "It only affects In-Memory databases."], de: ["Es passiert nur bei zirkulären Referenzen.", "Wenn mehrere Collection-Navigations eingeschlossen werden, verbindet EF Core sie in SQL — das Ergebnis wird ein kartesisches Produkt mit massiv duplizierte Daten.", "Es ist ein Fehler, der in EF Core 8 behoben wurde.", "Es betrifft nur In-Memory-Datenbanken."], ru: ["Возникает только с циклическими ссылками.", "При включении нескольких коллекционных навигаций EF Core соединяет их в SQL — результат становится декартовым произведением с массивным дублированием данных.", "Это баг, исправленный в EF Core 8.", "Затрагивает только In-Memory базы данных."], uk: ["Виникає лише з циклічними посиланнями.", "При включенні кількох колекційних навігацій EF Core з'єднує їх у SQL — результат стає декартовим добутком з масивним дублюванням даних.", "Це баг, виправлений в EF Core 8.", "Зачіпає лише In-Memory бази даних."] }, correctIndex: 1, explanation: { en: "Include(o => o.Items).Include(o => o.Payments): if an order has 10 items and 5 payments, SQL returns 50 rows per order. Fix: use AsSplitQuery() to send separate queries.", de: "Include(o => o.Items).Include(o => o.Payments): wenn eine Bestellung 10 Items und 5 Zahlungen hat, gibt SQL 50 Zeilen pro Bestellung zurück. Lösung: AsSplitQuery() verwenden, um separate Queries zu senden.", ru: "Include(o => o.Items).Include(o => o.Payments): если заказ имеет 10 позиций и 5 платежей, SQL возвращает 50 строк на заказ. Решение: используйте AsSplitQuery() для отправки отдельных запросов.", uk: "Include(o => o.Items).Include(o => o.Payments): якщо замовлення має 10 позицій і 5 платежів, SQL повертає 50 рядків на замовлення. Рішення: використовуйте AsSplitQuery() для відправки окремих запитів." } },
{ category: "EF Core", question: { en: "What does AsSplitQuery() do?", de: "Was macht AsSplitQuery()?", ru: "Что делает AsSplitQuery()?", uk: "Що робить AsSplitQuery()?" }, options: { en: ["It splits the database into shards.", "Instead of one massive JOIN query, it sends separate SQL queries for each Include() and stitches results in memory, avoiding Cartesian explosion.", "It splits transactions across multiple connections.", "It splits results into pages."], de: ["Es teilt die Datenbank in Shards.", "Statt einer massiven JOIN Query sendet es separate SQL Queries für jedes Include() und fügt die Ergebnisse im Speicher zusammen, um Cartesian Explosion zu vermeiden.", "Es teilt Transaktionen über mehrere Verbindungen auf.", "Es teilt Ergebnisse in Seiten auf."], ru: ["Разделяет базу данных на шарды.", "Вместо одного массивного JOIN-запроса отправляет отдельные SQL-запросы для каждого Include() и сшивает результаты в памяти, избегая Cartesian Explosion.", "Разделяет транзакции между несколькими соединениями.", "Разделяет результаты на страницы."], uk: ["Розділяє базу даних на шарди.", "Замість одного масивного JOIN-запиту відправляє окремі SQL-запити для кожного Include() та зшиває результати в пам'яті, уникаючи Cartesian Explosion.", "Розділяє транзакції між кількома з'єднаннями.", "Розділяє результати на сторінки."] }, correctIndex: 1, explanation: { en: "Query 1: SELECT Orders. Query 2: SELECT Items WHERE OrderId IN (...). Query 3: SELECT Payments WHERE OrderId IN (...). Multiple round-trips but much less data transferred.", de: "Query 1: SELECT Orders. Query 2: SELECT Items WHERE OrderId IN (...). Query 3: SELECT Payments WHERE OrderId IN (...). Mehrere Roundtrips aber viel weniger übertragene Daten.", ru: "Query 1: SELECT Orders. Query 2: SELECT Items WHERE OrderId IN (...). Query 3: SELECT Payments WHERE OrderId IN (...). Несколько обращений, но намного меньше переданных данных.", uk: "Query 1: SELECT Orders. Query 2: SELECT Items WHERE OrderId IN (...). Query 3: SELECT Payments WHERE OrderId IN (...). Кілька звернень, але набагато менше переданих даних." } },
{ category: "EF Core", question: { en: "What are Global Query Filters in EF Core?", de: "Was sind Global Query Filters in EF Core?", ru: "Что такое Global Query Filters в EF Core?", uk: "Що таке Global Query Filters в EF Core?" }, options: { en: ["Filters applied to all queries across all databases.", "Filters defined in OnModelCreating that are automatically applied to every query for an entity (e.g., soft delete: .HasQueryFilter(e => !e.IsDeleted)).", "CORS filters for API queries.", "Filters that prevent SQL injection."], de: ["Filter, die auf alle Queries über alle Datenbanken angewendet werden.", "Filter, die in OnModelCreating definiert werden und automatisch auf jede Query für eine Entity angewendet werden (z.B. Soft Delete: .HasQueryFilter(e => !e.IsDeleted)).", "CORS-Filter für API-Queries.", "Filter, die SQL Injection verhindern."], ru: ["Фильтры, применяемые ко всем запросам во всех базах данных.", "Фильтры, определённые в OnModelCreating, автоматически применяемые к каждому запросу для сущности (напр., мягкое удаление: .HasQueryFilter(e => !e.IsDeleted)).", "CORS-фильтры для API-запросов.", "Фильтры, предотвращающие SQL injection."], uk: ["Фільтри, що застосовуються до всіх запитів у всіх базах даних.", "Фільтри, визначені в OnModelCreating, що автоматично застосовуються до кожного запиту для сутності (напр., м'яке видалення: .HasQueryFilter(e => !e.IsDeleted)).", "CORS-фільтри для API-запитів.", "Фільтри, що запобігають SQL injection."] }, correctIndex: 1, explanation: { en: "Every query for that entity automatically includes the filter. No developer can accidentally load deleted records. Use .IgnoreQueryFilters() when you explicitly need all records.", de: "Jede Query für diese Entity schliesst den Filter automatisch ein. Kein Entwickler kann versehentlich gelöschte Datensätze laden. .IgnoreQueryFilters() verwenden, wenn man explizit alle Datensätze braucht.", ru: "Каждый запрос для этой сущности автоматически включает фильтр. Ни один разработчик не может случайно загрузить удалённые записи. Используйте .IgnoreQueryFilters(), когда явно нужны все записи.", uk: "Кожен запит для цієї сутності автоматично включає фільтр. Жоден розробник не може випадково завантажити видалені записи. Використовуйте .IgnoreQueryFilters(), коли явно потрібні всі записи." } },
{ category: "EF Core", question: { en: "Why avoid calling Database.Migrate() at application startup?", de: "Warum sollte man Database.Migrate() beim Anwendungsstart vermeiden?", ru: "Почему не стоит вызывать Database.Migrate() при запуске приложения?", uk: "Чому не варто викликати Database.Migrate() при запуску додатку?" }, options: { en: ["It's too slow.", "In multi-pod Kubernetes deployments, multiple instances race to apply the same migration, causing database locks, duplicate key errors, or corruption.", "Migrations should never be automated.", "It only works with SQL Server."], de: ["Es ist zu langsam.", "In Multi-Pod-Kubernetes-Deployments wetteifern mehrere Instanzen darum, dieselbe Migration anzuwenden, was Datenbanksperren, Duplicate-Key-Fehler oder Korruption verursacht.", "Migrations sollten nie automatisiert werden.", "Es funktioniert nur mit SQL Server."], ru: ["Это слишком медленно.", "В multi-pod Kubernetes-деплоях несколько экземпляров соревнуются за применение одной и той же миграции, вызывая блокировки БД, ошибки дублирования ключей или повреждение.", "Миграции никогда не должны быть автоматизированы.", "Работает только с SQL Server."], uk: ["Це занадто повільно.", "У multi-pod Kubernetes-деплоях кілька екземплярів змагаються за застосування однієї й тієї ж міграції, спричиняючи блокування БД, помилки дублювання ключів або пошкодження.", "Міграції ніколи не повинні бути автоматизовані.", "Працює лише з SQL Server."] }, correctIndex: 1, explanation: { en: "Apply migrations during CI/CD pipeline deployment (before pods start) using a dedicated migration job or tool like Flyway/DbUp. One executor, no race conditions.", de: "Migrations während des CI/CD-Pipeline-Deployments anwenden (bevor Pods starten) mit einem dedizierten Migration-Job oder Tool wie Flyway/DbUp. Ein Executor, keine Race Conditions.", ru: "Применяйте миграции во время деплоя CI/CD-пайплайна (до запуска подов) с помощью выделенного задания миграции или инструмента типа Flyway/DbUp. Один исполнитель, никаких гонок.", uk: "Застосовуйте міграції під час деплою CI/CD-пайплайну (до запуску подів) за допомогою виділеного завдання міграції або інструменту типу Flyway/DbUp. Один виконавець, жодних гонок." } },
// ===== NORMALIZATION & DESIGN =====
{ category: "Database Design", question: { en: "What is Third Normal Form (3NF)?", de: "Was ist die Dritte Normalform (3NF)?", ru: "Что такое третья нормальная форма (3NF)?", uk: "Що таке третя нормальна форма (3NF)?" }, options: { en: ["A table with at most three columns.", "Every non-key column depends on the key, the whole key, and nothing but the key — eliminating transitive dependencies.", "A table with three indexes.", "The third step in database creation."], de: ["Eine Tabelle mit höchstens drei Spalten.", "Jede Nicht-Key-Spalte hängt vom Key ab, vom gesamten Key und von nichts anderem als dem Key — Eliminierung transitiver Abhängigkeiten.", "Eine Tabelle mit drei Indexes.", "Der dritte Schritt bei der Datenbankerstellung."], ru: ["Таблица с максимум тремя столбцами.", "Каждый неключевой столбец зависит от ключа, от всего ключа и ни от чего, кроме ключа — устранение транзитивных зависимостей.", "Таблица с тремя индексами.", "Третий шаг создания базы данных."], uk: ["Таблиця з максимум трьома стовпцями.", "Кожен неключовий стовпець залежить від ключа, від усього ключа і ні від чого, крім ключа — усунення транзитивних залежностей.", "Таблиця з трьома індексами.", "Третій крок створення бази даних."] }, correctIndex: 1, explanation: { en: "1NF: atomic values. 2NF: no partial key dependencies. 3NF: no transitive dependencies (non-key columns must depend directly on the primary key, not on other non-key columns).", de: "1NF: atomare Werte. 2NF: keine partiellen Key-Abhängigkeiten. 3NF: keine transitiven Abhängigkeiten (Nicht-Key-Spalten müssen direkt vom Primärschlüssel abhängen, nicht von anderen Nicht-Key-Spalten).", ru: "1NF: атомарные значения. 2NF: нет частичных зависимостей от ключа. 3NF: нет транзитивных зависимостей (неключевые столбцы должны зависеть непосредственно от первичного ключа, а не от других неключевых столбцов).", uk: "1NF: атомарні значення. 2NF: немає часткових залежностей від ключа. 3NF: немає транзитивних залежностей (неключові стовпці повинні залежати безпосередньо від первинного ключа, а не від інших неключових стовпців)." } },
{ category: "Database Design", question: { en: "When is denormalization appropriate?", de: "Wann ist Denormalisierung angemessen?", ru: "Когда уместна денормализация?", uk: "Коли доречна денормалізація?" }, options: { en: ["Never — always normalize to 3NF.", "When read performance is critical and the cost of joins is too high — pre-compute and store redundant data to avoid expensive joins at query time.", "Only in NoSQL databases.", "When the database has fewer than 10 tables."], de: ["Nie — immer auf 3NF normalisieren.", "Wenn die Lese-Performance kritisch ist und die Kosten von Joins zu hoch sind — redundante Daten vorberechnen und speichern, um teure Joins zur Query-Zeit zu vermeiden.", "Nur in NoSQL-Datenbanken.", "Wenn die Datenbank weniger als 10 Tabellen hat."], ru: ["Никогда — всегда нормализуйте до 3NF.", "Когда производительность чтения критична и стоимость JOIN слишком высока — предвычислить и сохранить избыточные данные, чтобы избежать дорогих JOIN во время запроса.", "Только в NoSQL-базах данных.", "Когда в базе менее 10 таблиц."], uk: ["Ніколи — завжди нормалізуйте до 3NF.", "Коли продуктивність читання критична і вартість JOIN занадто висока — попередньо обчислити та зберегти надлишкові дані, щоб уникнути дорогих JOIN під час запиту.", "Лише в NoSQL-базах даних.", "Коли в базі менше 10 таблиць."] }, correctIndex: 1, explanation: { en: "Reporting tables, read models in CQRS, materialized views — all use denormalization. Trade-off: faster reads, but data redundancy and more complex writes.", de: "Reporting-Tabellen, Read Models in CQRS, Materialized Views — alle nutzen Denormalisierung. Abwägung: schnellere Lesevorgänge, aber Datenredundanz und komplexere Schreibvorgänge.", ru: "Отчётные таблицы, модели чтения в CQRS, материализованные представления — все используют денормализацию. Компромисс: быстрое чтение, но избыточность данных и более сложная запись.", uk: "Звітні таблиці, моделі читання в CQRS, матеріалізовані представлення — все використовують денормалізацію. Компроміс: швидше читання, але надлишковість даних та складніший запис." } },
{ category: "Database Design", question: { en: "What is a Materialized View?", de: "Was ist eine Materialized View?", ru: "Что такое Materialized View?", uk: "Що таке Materialized View?" }, options: { en: ["A regular view with a different name.", "A precomputed view stored as a physical table that is periodically refreshed, providing fast access to complex aggregation results.", "A view that shows only material/inventory data.", "A view that can be updated with INSERT."], de: ["Eine normale View mit einem anderen Namen.", "Eine vorberechnete View, die als physische Tabelle gespeichert und periodisch aktualisiert wird und schnellen Zugriff auf komplexe Aggregationsergebnisse bietet.", "Eine View, die nur Material-/Bestandsdaten zeigt.", "Eine View, die mit INSERT aktualisiert werden kann."], ru: ["Обычное представление с другим названием.", "Предвычисленное представление, хранимое как физическая таблица с периодическим обновлением, обеспечивающее быстрый доступ к результатам сложных агрегаций.", "Представление, показывающее только данные материалов/инвентаря.", "Представление, которое можно обновлять через INSERT."], uk: ["Звичайне представлення з іншою назвою.", "Попередньо обчислене представлення, збережене як фізична таблиця з періодичним оновленням, що забезпечує швидкий доступ до результатів складних агрегацій.", "Представлення, що показує лише дані матеріалів/інвентарю.", "Представлення, яке можна оновлювати через INSERT."] }, correctIndex: 1, explanation: { en: "A regular view re-executes its query every time. A Materialized View stores results physically — instant reads but stale until refreshed. PostgreSQL: REFRESH MATERIALIZED VIEW.", de: "Eine normale View führt ihre Query jedes Mal neu aus. Eine Materialized View speichert Ergebnisse physisch — sofortige Lesevorgänge, aber veraltet bis zur Aktualisierung. PostgreSQL: REFRESH MATERIALIZED VIEW.", ru: "Обычное представление перевыполняет запрос каждый раз. Materialized View хранит результаты физически — мгновенное чтение, но устаревшие данные до обновления. PostgreSQL: REFRESH MATERIALIZED VIEW.", uk: "Звичайне представлення перевиконує запит кожного разу. Materialized View зберігає результати фізично — миттєве читання, але застарілі дані до оновлення. PostgreSQL: REFRESH MATERIALIZED VIEW." } },
{ category: "Database Design", question: { en: "What is the difference between a Surrogate Key and a Natural Key?", de: "Was ist der Unterschied zwischen einem Surrogate Key und einem Natural Key?", ru: "В чём разница между Surrogate Key и Natural Key?", uk: "У чому різниця між Surrogate Key та Natural Key?" }, options: { en: ["They're different names for the same thing.", "Surrogate: system-generated (auto-increment, GUID) with no business meaning. Natural: derived from business data (email, SSN) with inherent meaning.", "Surrogate keys are only for NoSQL.", "Natural keys are always better."], de: ["Es sind verschiedene Namen für dasselbe.", "Surrogate: systemgeneriert (Auto-Increment, GUID) ohne geschäftliche Bedeutung. Natural: aus Geschäftsdaten abgeleitet (E-Mail, SSN) mit inhärenter Bedeutung.", "Surrogate Keys sind nur für NoSQL.", "Natural Keys sind immer besser."], ru: ["Это разные названия для одного и того же.", "Surrogate: системно-генерируемый (auto-increment, GUID) без бизнес-значения. Natural: полученный из бизнес-данных (email, SSN) с присущим значением.", "Surrogate Key только для NoSQL.", "Natural Key всегда лучше."], uk: ["Це різні назви для одного й того самого.", "Surrogate: системно-генерований (auto-increment, GUID) без бізнес-значення. Natural: отриманий з бізнес-даних (email, SSN) з притаманним значенням.", "Surrogate Key лише для NoSQL.", "Natural Key завжди кращий."] }, correctIndex: 1, explanation: { en: "Surrogate keys (INT/BIGINT identity) are stable, compact, and don't change. Natural keys (email) can change and may be large. Most designs use surrogates for PKs.", de: "Surrogate Keys (INT/BIGINT Identity) sind stabil, kompakt und ändern sich nicht. Natural Keys (E-Mail) können sich ändern und gross sein. Die meisten Designs verwenden Surrogates für PKs.", ru: "Surrogate Key (INT/BIGINT identity) стабильны, компактны и не меняются. Natural Key (email) могут измениться и быть большими. Большинство проектов используют суррогатные ключи для PK.", uk: "Surrogate Key (INT/BIGINT identity) стабільні, компактні і не змінюються. Natural Key (email) можуть змінитися і бути великими. Більшість проєктів використовують сурогатні ключі для PK." } },
// ===== ADVANCED PERFORMANCE =====
{ category: "Performance", question: { en: "What is Connection Pooling and why is it critical?", de: "Was ist Connection Pooling und warum ist es kritisch?", ru: "Что такое Connection Pooling и почему это критически важно?", uk: "Що таке Connection Pooling і чому це критично важливо?" }, options: { en: ["It pools multiple databases together.", "It maintains a cache of open database connections for reuse, avoiding the expensive overhead of opening/closing TCP connections for each request.", "It limits the number of users who can connect.", "It only matters for cloud databases."], de: ["Es fasst mehrere Datenbanken zusammen.", "Es hält einen Cache offener Datenbankverbindungen zur Wiederverwendung vor und vermeidet den teuren Overhead des Öffnens/Schliessens von TCP-Verbindungen für jede Anfrage.", "Es begrenzt die Anzahl der Benutzer, die sich verbinden können.", "Es ist nur für Cloud-Datenbanken relevant."], ru: ["Объединяет несколько баз данных.", "Поддерживает кэш открытых соединений с базой данных для повторного использования, избегая дорогостоящих накладных расходов на открытие/закрытие TCP-соединений для каждого запроса.", "Ограничивает количество пользователей, которые могут подключиться.", "Важно только для облачных баз данных."], uk: ["Об'єднує кілька баз даних.", "Підтримує кеш відкритих з'єднань з базою даних для повторного використання, уникаючи дорогих накладних витрат на відкриття/закриття TCP-з'єднань для кожного запиту.", "Обмежує кількість користувачів, які можуть підключитися.", "Важливо лише для хмарних баз даних."] }, correctIndex: 1, explanation: { en: "Opening a DB connection: DNS lookup + TCP handshake + TLS + authentication = ~50-100ms. Connection pool: grab an already-open connection in <1ms. ADO.NET handles this automatically.", de: "Öffnen einer DB-Verbindung: DNS-Lookup + TCP-Handshake + TLS + Authentifizierung = ~50-100ms. Connection Pool: eine bereits offene Verbindung in <1ms greifen. ADO.NET handhabt das automatisch.", ru: "Открытие соединения с БД: DNS-lookup + TCP-handshake + TLS + аутентификация = ~50-100мс. Connection pool: взять уже открытое соединение за <1мс. ADO.NET обрабатывает это автоматически.", uk: "Відкриття з'єднання з БД: DNS-lookup + TCP-handshake + TLS + автентифікація = ~50-100мс. Connection pool: взяти вже відкрите з'єднання за <1мс. ADO.NET обробляє це автоматично." } },
{ category: "Performance", question: { en: "What is Database Sharding?", de: "Was ist Database Sharding?", ru: "Что такое Database Sharding?", uk: "Що таке Database Sharding?" }, options: { en: ["Splitting a database backup into pieces.", "Horizontally partitioning data across multiple database instances, where each shard holds a subset of rows (e.g., users A-M on shard 1, N-Z on shard 2).", "Encrypting specific columns.", "Creating read replicas."], de: ["Ein Datenbank-Backup in Teile aufteilen.", "Horizontale Partitionierung von Daten über mehrere Datenbankinstanzen, wobei jeder Shard eine Teilmenge der Zeilen hält (z.B. Benutzer A-M auf Shard 1, N-Z auf Shard 2).", "Bestimmte Spalten verschlüsseln.", "Read Replicas erstellen."], ru: ["Разделение резервной копии базы данных на части.", "Горизонтальное разделение данных между несколькими экземплярами БД, где каждый шард содержит подмножество строк (напр., пользователи A-M на шарде 1, N-Z на шарде 2).", "Шифрование определённых столбцов.", "Создание реплик для чтения."], uk: ["Розділення резервної копії бази даних на частини.", "Горизонтальне розділення даних між кількома екземплярами БД, де кожен шард містить підмножину рядків (напр., користувачі A-M на шарді 1, N-Z на шарді 2).", "Шифрування певних стовпців.", "Створення реплік для читання."] }, correctIndex: 1, explanation: { en: "When a single database can't handle the load, sharding distributes data. Challenge: cross-shard queries, rebalancing, and choosing a good shard key.", de: "Wenn eine einzelne Datenbank die Last nicht bewältigen kann, verteilt Sharding die Daten. Herausforderung: Cross-Shard-Queries, Rebalancing und Wahl eines guten Shard Keys.", ru: "Когда одна база данных не справляется с нагрузкой, шардирование распределяет данные. Сложности: кросс-шардовые запросы, перебалансировка и выбор хорошего ключа шардирования.", uk: "Коли одна база даних не справляється з навантаженням, шардування розподіляє дані. Складності: крос-шардові запити, перебалансування та вибір хорошого ключа шардування." } },
{ category: "Performance", question: { en: "What is a Read Replica and when would you use it?", de: "Was ist eine Read Replica und wann würde man sie verwenden?", ru: "Что такое Read Replica и когда её использовать?", uk: "Що таке Read Replica і коли її використовувати?" }, options: { en: ["A backup database that's never read.", "A copy of the primary database that handles read queries, offloading the primary for writes. Data is replicated asynchronously (with small lag).", "A database that only allows SELECT statements.", "A replica that stores data in a read-optimized format."], de: ["Eine Backup-Datenbank, die nie gelesen wird.", "Eine Kopie der primären Datenbank, die Lese-Queries bearbeitet und die Primäre für Schreibvorgänge entlastet. Daten werden asynchron repliziert (mit kleiner Verzögerung).", "Eine Datenbank, die nur SELECT-Statements erlaubt.", "Eine Replik, die Daten in einem leseoptimiertem Format speichert."], ru: ["Резервная база данных, которая никогда не читается.", "Копия основной базы данных, обрабатывающая запросы на чтение, разгружая основную для записи. Данные реплицируются асинхронно (с небольшой задержкой).", "База данных, допускающая только SELECT.", "Реплика, хранящая данные в оптимизированном для чтения формате."], uk: ["Резервна база даних, яка ніколи не читається.", "Копія основної бази даних, що обробляє запити на читання, розвантажуючи основну для запису. Дані реплікуються асинхронно (з невеликою затримкою).", "База даних, що допускає лише SELECT.", "Репліка, що зберігає дані в оптимізованому для читання форматі."] }, correctIndex: 1, explanation: { en: "If 90% of your traffic is reads, send them to 3 read replicas. Only writes go to the primary. The replicas are slightly behind (eventual consistency) but drastically reduce primary load.", de: "Wenn 90% des Traffics Lesevorgänge sind, sende sie an 3 Read Replicas. Nur Schreibvorgänge gehen an die Primäre. Die Replicas liegen leicht zurück (Eventual Consistency), entlasten aber die Primäre drastisch.", ru: "Если 90% трафика — чтение, направьте его на 3 Read Replica. Только записи идут на основную. Реплики немного отстают (eventual consistency), но кардинально снижают нагрузку на основную.", uk: "Якщо 90% трафіку — читання, направте його на 3 Read Replica. Лише записи йдуть на основну. Репліки трохи відстають (eventual consistency), але кардинально знижують навантаження на основну." } },
{ category: "Performance", question: { en: "What is the Cache-Aside pattern for database optimization?", de: "Was ist das Cache-Aside Pattern für Datenbankoptimierung?", ru: "Что такое паттерн Cache-Aside для оптимизации базы данных?", uk: "Що таке патерн Cache-Aside для оптимізації бази даних?" }, options: { en: ["Storing the database in a cache.", "Check Redis first — return if hit. On miss — query database — store result in Redis — return. The application manages the cache explicitly.", "Redis automatically caches all queries.", "Cache-Aside only works with NoSQL databases."], de: ["Die Datenbank in einem Cache speichern.", "Zuerst Redis prüfen — bei Treffer zurückgeben. Bei Miss — Datenbank abfragen — Ergebnis in Redis speichern — zurückgeben. Die Anwendung verwaltet den Cache explizit.", "Redis cached automatisch alle Queries.", "Cache-Aside funktioniert nur mit NoSQL-Datenbanken."], ru: ["Хранение базы данных в кэше.", "Сначала проверить Redis — вернуть при попадании. При промахе — запросить БД — сохранить результат в Redis — вернуть. Приложение управляет кэшем явно.", "Redis автоматически кэширует все запросы.", "Cache-Aside работает только с NoSQL-базами данных."], uk: ["Зберігання бази даних у кеші.", "Спочатку перевірити Redis — повернути при влучанні. При промаху — запитати БД — зберегти результат у Redis — повернути. Додаток керує кешем явно.", "Redis автоматично кешує всі запити.", "Cache-Aside працює лише з NoSQL-базами даних."] }, correctIndex: 1, explanation: { en: "The application code is responsible for reading from cache, detecting misses, querying the DB, and populating the cache. Simple but effective. Set a TTL to prevent stale data.", de: "Der Anwendungscode ist verantwortlich für das Lesen aus dem Cache, Erkennen von Misses, Abfragen der DB und Befüllen des Caches. Einfach aber effektiv. TTL setzen, um veraltete Daten zu vermeiden.", ru: "Код приложения отвечает за чтение из кэша, обнаружение промахов, запросы к БД и заполнение кэша. Просто, но эффективно. Установите TTL для предотвращения устаревших данных.", uk: "Код додатку відповідає за читання з кешу, виявлення промахів, запити до БД та заповнення кешу. Просто, але ефективно. Встановіть TTL для запобігання застарілим даним." } },
{ category: "Performance", question: { en: "What is query plan caching and how can it backfire?", de: "Was ist Query Plan Caching und wie kann es nach hinten losgehen?", ru: "Что такое кэширование плана запроса и как оно может навредить?", uk: "Що таке кешування плану запиту і як воно може зашкодити?" }, options: { en: ["Query plans are never cached.", "The database caches compiled query plans for reuse. It backfires when a plan optimized for one set of parameter values is reused for very different values (Parameter Sniffing).", "Plan caching only helps stored procedures.", "Cached plans are always optimal."], de: ["Query-Pläne werden nie gecacht.", "Die Datenbank cacht kompilierte Query-Pläne zur Wiederverwendung. Es geht nach hinten los, wenn ein für bestimmte Parameterwerte optimierter Plan für sehr unterschiedliche Werte wiederverwendet wird (Parameter Sniffing).", "Plan-Caching hilft nur Stored Procedures.", "Gecachte Pläne sind immer optimal."], ru: ["Планы запросов никогда не кэшируются.", "База данных кэширует скомпилированные планы запросов для повторного использования. Это вредит, когда план, оптимизированный для одних значений параметров, повторно используется для совершенно других (Parameter Sniffing).", "Кэширование планов помогает только хранимым процедурам.", "Кэшированные планы всегда оптимальны."], uk: ["Плани запитів ніколи не кешуються.", "База даних кешує скомпільовані плани запитів для повторного використання. Це шкодить, коли план, оптимізований для одних значень параметрів, повторно використовується для зовсім інших (Parameter Sniffing).", "Кешування планів допомагає лише збереженим процедурам.", "Кешовані плани завжди оптимальні."] }, correctIndex: 1, explanation: { en: "Prepared statement with WHERE Status = @p: first call with @p='Rare' generates Index Seek plan. Reused for @p='Common' (99% of rows) — Index Seek does 99% random lookups instead of a Seq Scan.", de: "Prepared Statement mit WHERE Status = @p: erster Aufruf mit @p='Rare' generiert Index Seek Plan. Wiederverwendet für @p='Common' (99% der Zeilen) — Index Seek macht 99% Random Lookups statt eines Seq Scans.", ru: "Prepared statement с WHERE Status = @p: первый вызов с @p='Rare' генерирует план Index Seek. Повторно используется для @p='Common' (99% строк) — Index Seek делает 99% случайных обращений вместо Seq Scan.", uk: "Prepared statement з WHERE Status = @p: перший виклик з @p='Rare' генерує план Index Seek. Повторно використовується для @p='Common' (99% рядків) — Index Seek робить 99% випадкових звернень замість Seq Scan." } },
];

let currentLang = localStorage.getItem('quizLang') || 'en';
let currentQuestionIndex = 0, score = 0, selectedQuestions = [], currentTotalQuestions = 20, currentShuffledIdx = [];
const setupCard = document.getElementById('setup-card'), quizArea = document.getElementById('quiz-area'), quizContainer = document.getElementById('quiz-container'), qCounter = document.getElementById('q-counter'), scoreTracker = document.getElementById('score-tracker'), progressFill = document.getElementById('progress'), resultsCard = document.getElementById('results-card');

function setLang(lang) { currentLang = lang; localStorage.setItem('quizLang', lang); applyLang(); if (quizArea.style.display === 'block') { retranslateQuestion(); updateScoreboard(); } }
function applyLang() {
    const t = ui[currentLang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    document.getElementById('quiz-title').textContent = t.title;
    document.getElementById('quiz-subtitle').textContent = t.subtitle;
    document.getElementById('setup-heading').textContent = t.heading;
    document.getElementById('setup-desc').textContent = t.desc;
    document.getElementById('btn-sprint').textContent = t.sprint;
    document.getElementById('btn-marathon').textContent = t.marathon;
    document.getElementById('nav-all').innerHTML = t.allQuizzes;
    document.getElementById('nav-restart').innerHTML = t.restart;
    document.getElementById('results-heading').textContent = t.complete;
    document.getElementById('res-all').textContent = t.allBtn;
    document.getElementById('res-restart').textContent = t.restartBtn;
}
applyLang();

function shuffleArray(a) { let n = [...a]; for (let i = n.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [n[i],n[j]]=[n[j],n[i]]; } return n; }

window.startQuiz = function(num) { currentTotalQuestions = num; selectedQuestions = shuffleArray(allQuestions).slice(0, num); currentQuestionIndex = 0; score = 0; setupCard.classList.remove('active'); setupCard.style.display = 'none'; quizArea.style.display = 'block'; resultsCard.classList.remove('active'); updateScoreboard(); renderQuestion(); };

function updateScoreboard() { const t = ui[currentLang]; qCounter.innerText = `${t.question} ${currentQuestionIndex+1} ${t.of} ${currentTotalQuestions}`; scoreTracker.innerText = `${t.score}: ${score}`; progressFill.style.width = `${(currentQuestionIndex/currentTotalQuestions)*100}%`; }

function retranslateQuestion() {
    const q = selectedQuestions[currentQuestionIndex]; if (!q) return;
    const lang = currentLang, t = ui[lang];
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const card = quizContainer.querySelector('.card'); if (!card) return;
    card.querySelector('.question-text').innerHTML = qText.replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const btns = card.querySelectorAll('.option-btn');
    currentShuffledIdx.forEach((origI, btnI) => { if (btns[btnI]) btns[btnI].innerHTML = (opts[origI] || '').replace(/</g,"&lt;").replace(/>/g,"&gt;"); });
    const explEl = document.getElementById(`expl-${currentQuestionIndex}`);
    if (explEl) explEl.innerHTML = `<strong>${t.explanation}</strong> ${expl}`;
    const nextBtn = document.getElementById(`next-${currentQuestionIndex}`);
    if (nextBtn) nextBtn.textContent = t.next;
}

function renderQuestion() {
    quizContainer.innerHTML = '';
    const q = selectedQuestions[currentQuestionIndex];
    const lang = currentLang;
    const qText = q.question[lang] || q.question.en;
    const opts = q.options[lang] || q.options.en;
    const expl = q.explanation[lang] || q.explanation.en;
    const idx = opts.map((_,i)=>i); for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
    currentShuffledIdx = idx;
    const so = idx.map(i=>opts[i]), ci = idx.indexOf(q.correctIndex);
    const card = document.createElement('div'); card.className = 'card active';
    const t = ui[currentLang];
    card.innerHTML = `<div class="category-badge">${q.category}</div><div class="question-text">${qText.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="options">${so.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i},${ci},this)">${o.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</button>`).join('')}</div><div class="explanation" id="expl-${currentQuestionIndex}"><strong>${t.explanation}</strong> ${expl}</div><div class="controls"><button class="next-btn" id="next-${currentQuestionIndex}" onclick="nextQuestion()">${t.next}</button></div>`;
    quizContainer.appendChild(card); updateScoreboard();
}

window.checkAnswer = function(si, ci, btn) { const bs = btn.parentElement.querySelectorAll('.option-btn'); bs.forEach(b=>b.disabled=true); if(si===ci){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');bs[ci].classList.add('correct');} document.getElementById(`expl-${currentQuestionIndex}`).classList.add('show'); document.getElementById(`next-${currentQuestionIndex}`).classList.add('show'); scoreTracker.innerText=`${ui[currentLang].score}: ${score}`; progressFill.style.width=`${((currentQuestionIndex+1)/currentTotalQuestions)*100}%`; };
window.nextQuestion = function() { currentQuestionIndex++; if(currentQuestionIndex<currentTotalQuestions) renderQuestion(); else showResults(); };

function showResults() { quizArea.style.display='none'; document.getElementById('final-score-text').innerText=`${score} / ${currentTotalQuestions}`; const t = ui[currentLang]; let p=score/currentTotalQuestions; document.getElementById('feedback-text').innerText = p>=0.8?t.feedbackHigh:p>=0.6?t.feedbackMid:t.feedbackLow; resultsCard.classList.add('active'); }
</script>
    <script src="layout.js"></script>
</body>
