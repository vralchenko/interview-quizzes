    en: { title: "SQL & Databases", subtitle: "Indexes, query optimization, transactions, PostgreSQL, SQL Server, EF Core & performance", heading: "50 Questions on SQL & Databases", desc: "Covers indexing strategies, query execution plans, ACID, isolation levels, normalization, PostgreSQL internals, SQL Server, EF Core pitfalls, and performance optimization.", sprint: "Random 20-Question Sprint", marathon: "Marathon: All 50 Questions", allQuizzes: "\u2190 All Quizzes", restart: "\u21BB Restart", question: "Question", of: "of", score: "Score", explanation: "Explanation:", next: "Continue", complete: "Assessment Complete!", allBtn: "All Quizzes", restartBtn: "Restart Quiz", feedbackHigh: "Outstanding! You have deep knowledge of database internals, indexing strategies, and query optimization.", feedbackMid: "Solid foundation! Review index types (Covering, Filtered, Composite), execution plans, and isolation levels.", feedbackLow: "Keep studying! Focus on how indexes work (B-tree, Clustered vs Non-Clustered), EXPLAIN ANALYZE, and the N+1 problem." },
    de: { title: "SQL & Databases", subtitle: "Indexes, Query-Optimierung, Transaktionen, PostgreSQL, SQL Server, EF Core & Performance", heading: "50 Fragen zu SQL & Databases", desc: "Indexierungsstrategien, Query-Ausführungspläne, ACID, Isolationsstufen, Normalisierung, PostgreSQL-Interna, SQL Server, EF Core-Fallstricke und Performance-Optimierung.", sprint: "Zufällige 20-Fragen-Runde", marathon: "Marathon: Alle 50 Fragen", allQuizzes: "\u2190 Alle Quizze", restart: "\u21BB Neustart", question: "Frage", of: "von", score: "Punkte", explanation: "Erklärung:", next: "Weiter", complete: "Bewertung abgeschlossen!", allBtn: "Alle Quizze", restartBtn: "Quiz neustarten", feedbackHigh: "Hervorragend! Du hast tiefes Wissen über Datenbank-Interna, Indexierungsstrategien und Query-Optimierung.", feedbackMid: "Solide Grundlage! Wiederhole Index-Typen (Covering, Filtered, Composite), Ausführungspläne und Isolationsstufen.", feedbackLow: "Weiter lernen! Konzentriere dich auf Index-Funktionsweise (B-tree, Clustered vs Non-Clustered), EXPLAIN ANALYZE und das N+1-Problem." },
    ru: { title: "SQL & Databases", subtitle: "Индексы, оптимизация запросов, транзакции, PostgreSQL, SQL Server, EF Core и производительность", heading: "50 вопросов по SQL и базам данных", desc: "Стратегии индексирования, планы выполнения запросов, ACID, уровни изоляции, нормализация, внутреннее устройство PostgreSQL, SQL Server, подводные камни EF Core и оптимизация производительности.", sprint: "Случайные 20 вопросов", marathon: "Марафон: все 50 вопросов", allQuizzes: "\u2190 Все квизы", restart: "\u21BB Заново", question: "Вопрос", of: "из", score: "Счёт", explanation: "Пояснение:", next: "Далее", complete: "Тест завершён!", allBtn: "Все квизы", restartBtn: "Начать заново", feedbackHigh: "Отлично! Вы обладаете глубокими знаниями о внутреннем устройстве баз данных, стратегиях индексирования и оптимизации запросов.", feedbackMid: "Хорошая база! Повторите типы индексов (Covering, Filtered, Composite), планы выполнения и уровни изоляции.", feedbackLow: "Продолжайте учиться! Сосредоточьтесь на работе индексов (B-tree, Clustered vs Non-Clustered), EXPLAIN ANALYZE и проблеме N+1." },
    uk: { title: "SQL & Databases", subtitle: "Індекси, оптимізація запитів, транзакції, PostgreSQL, SQL Server, EF Core та продуктивність", heading: "50 питань з SQL та баз даних", desc: "Стратегії індексування, плани виконання запитів, ACID, рівні ізоляції, нормалізація, внутрішня будова PostgreSQL, SQL Server, підводні камені EF Core та оптимізація продуктивності.", sprint: "Випадкові 20 питань", marathon: "Марафон: усі 50 питань", allQuizzes: "\u2190 Усі квізи", restart: "\u21BB Заново", question: "Питання", of: "з", score: "Рахунок", explanation: "Пояснення:", next: "Далі", complete: "Тест завершено!", allBtn: "Усі квізи", restartBtn: "Почати заново", feedbackHigh: "Чудово! Ви маєте глибокі знання про внутрішню будову баз даних, стратегії індексування та оптимізацію запитів.", feedbackMid: "Міцна основа! Повторіть типи індексів (Covering, Filtered, Composite), плани виконання та рівні ізоляції.", feedbackLow: "Продовжуйте вчитися! Зосередьтеся на роботі індексів (B-tree, Clustered vs Non-Clustered), EXPLAIN ANALYZE та проблемі N+1." }
};

const allQuestions = [
// ===== INDEXES: FUNDAMENTALS =====
{ category: "Indexes", question: { en: "What is the difference between a Clustered and a Non-Clustered index?", de: "Was ist der Unterschied zwischen einem Clustered und einem Non-Clustered Index?", ru: "В чём разница между Clustered и Non-Clustered index?", uk: "У чому різниця між Clustered та Non-Clustered index?" }, options: { en: ["Clustered indexes are faster, Non-Clustered are slower.", "Clustered defines the physical row order on disk (max 1 per table). Non-Clustered is a separate structure with pointers to the physical rows.", "Clustered is for primary keys only, Non-Clustered for foreign keys only.", "There is no practical difference in modern databases."], de: ["Clustered Indexes sind schneller, Non-Clustered sind langsamer.", "Clustered definiert die physische Zeilenreihenfolge auf der Festplatte (max. 1 pro Tabelle). Non-Clustered ist eine separate Struktur mit Zeigern auf die physischen Zeilen.", "Clustered ist nur für Primary Keys, Non-Clustered nur für Foreign Keys.", "Es gibt keinen praktischen Unterschied in modernen Datenbanken."], ru: ["Clustered index быстрее, Non-Clustered медленнее.", "Clustered определяет физический порядок строк на диске (макс. 1 на таблицу). Non-Clustered — отдельная структура с указателями на физические строки.", "Clustered только для Primary Key, Non-Clustered только для Foreign Key.", "В современных базах данных практической разницы нет."], uk: ["Clustered index швидший, Non-Clustered повільніший.", "Clustered визначає фізичний порядок рядків на диску (макс. 1 на таблицю). Non-Clustered — окрема структура з вказівниками на фізичні рядки.", "Clustered лише для Primary Key, Non-Clustered лише для Foreign Key.", "У сучасних базах даних практичної різниці немає."] }, correctIndex: 1, explanation: { en: "A Clustered index IS the table data sorted by the index key. A Non-Clustered index is a separate B-tree that stores the key + a pointer (RID or clustering key) back to the actual row.", de: "Ein Clustered Index IST die nach dem Index-Key sortierte Tabelle. Ein Non-Clustered Index ist ein separater B-tree, der den Key + einen Zeiger (RID oder Clustering Key) auf die tatsächliche Zeile speichert.", ru: "Clustered index — ЭТО данные таблицы, отсортированные по ключу индекса. Non-Clustered index — отдельный B-tree, хранящий ключ + указатель (RID или clustering key) на фактическую строку.", uk: "Clustered index — ЦЕ дані таблиці, відсортовані за ключем індексу. Non-Clustered index — окремий B-tree, що зберігає ключ + вказівник (RID або clustering key) на фактичний рядок." } },
{ category: "Indexes", question: { en: "Why can a table have only ONE Clustered index?", de: "Warum kann eine Tabelle nur EINEN Clustered Index haben?", ru: "Почему таблица может иметь только ОДИН Clustered index?", uk: "Чому таблиця може мати лише ОДИН Clustered index?" }, options: { en: ["It's an arbitrary database limitation.", "Because the Clustered index determines the physical sort order of rows on disk — data can only be physically sorted one way.", "Because multiple Clustered indexes would use too much memory.", "Actually, modern databases allow multiple Clustered indexes."], de: ["Es ist eine willkürliche Datenbankbeschränkung.", "Weil der Clustered Index die physische Sortierreihenfolge der Zeilen auf der Festplatte bestimmt — Daten können nur auf eine Weise physisch sortiert sein.", "Weil mehrere Clustered Indexes zu viel Speicher verbrauchen würden.", "Tatsächlich erlauben moderne Datenbanken mehrere Clustered Indexes."], ru: ["Это произвольное ограничение базы данных.", "Потому что Clustered index определяет физический порядок сортировки строк на диске — данные могут быть физически отсортированы только одним способом.", "Потому что несколько Clustered index заняли бы слишком много памяти.", "На самом деле современные базы данных позволяют несколько Clustered index."], uk: ["Це довільне обмеження бази даних.", "Тому що Clustered index визначає фізичний порядок сортування рядків на диску — дані можуть бути фізично відсортовані лише одним способом.", "Тому що кілька Clustered index зайняли б забагато пам'яті.", "Насправді сучасні бази даних дозволяють кілька Clustered index."] }, correctIndex: 1, explanation: { en: "Rows on disk pages are arranged in the order of the Clustered index key. You can't physically sort the same data two different ways simultaneously.", de: "Zeilen auf Festplattenseiten sind in der Reihenfolge des Clustered-Index-Keys angeordnet. Man kann dieselben Daten nicht gleichzeitig auf zwei verschiedene Arten physisch sortieren.", ru: "Строки на дисковых страницах расположены в порядке ключа Clustered index. Невозможно физически отсортировать одни и те же данные двумя разными способами одновременно.", uk: "Рядки на дискових сторінках розташовані в порядку ключа Clustered index. Неможливо фізично відсортувати одні й ті самі дані двома різними способами одночасно." } },
{ category: "Indexes", question: { en: "What is a Covering Index?", de: "Was ist ein Covering Index?", ru: "Что такое Covering Index?", uk: "Що таке Covering Index?" }, options: { en: ["An index that covers all tables in the database.", "An index that includes all columns needed by a query, so the database engine never needs to look up the actual table row (avoids Key Lookup).", "An index on a computed column.", "An index that covers both Clustered and Non-Clustered data."], de: ["Ein Index, der alle Tabellen in der Datenbank abdeckt.", "Ein Index, der alle von einer Query benötigten Spalten enthält, sodass die Datenbank-Engine nie die tatsächliche Tabellenzeile nachschlagen muss (vermeidet Key Lookup).", "Ein Index auf einer berechneten Spalte.", "Ein Index, der sowohl Clustered- als auch Non-Clustered-Daten abdeckt."], ru: ["Индекс, покрывающий все таблицы в базе данных.", "Индекс, включающий все столбцы, необходимые запросу, поэтому движку БД никогда не нужно обращаться к фактической строке таблицы (избегает Key Lookup).", "Индекс на вычисляемом столбце.", "Индекс, покрывающий и Clustered, и Non-Clustered данные."], uk: ["Індекс, що покриває всі таблиці в базі даних.", "Індекс, що включає всі стовпці, необхідні запиту, тому движку БД ніколи не потрібно звертатися до фактичного рядка таблиці (уникає Key Lookup).", "Індекс на обчислюваному стовпці.", "Індекс, що покриває і Clustered, і Non-Clustered дані."] }, correctIndex: 1, explanation: { en: "If a query SELECT Name, Email FROM Users WHERE Email = 'x' hits an index on (Email) INCLUDE (Name), all data is in the index leaf. No bookmark lookup needed — huge speed gain.", de: "Wenn eine Query SELECT Name, Email FROM Users WHERE Email = 'x' einen Index auf (Email) INCLUDE (Name) trifft, sind alle Daten im Index-Blatt. Kein Bookmark Lookup nötig — enormer Geschwindigkeitsgewinn.", ru: "Если запрос SELECT Name, Email FROM Users WHERE Email = 'x' попадает в индекс на (Email) INCLUDE (Name), все данные находятся в листе индекса. Bookmark lookup не нужен — огромный выигрыш в скорости.", uk: "Якщо запит SELECT Name, Email FROM Users WHERE Email = 'x' потрапляє в індекс на (Email) INCLUDE (Name), усі дані знаходяться в листку індексу. Bookmark lookup не потрібен — величезний виграш у швидкості." } },
{ category: "Indexes", question: { en: "What is the INCLUDE clause in a Non-Clustered index?", de: "Was ist die INCLUDE-Klausel in einem Non-Clustered Index?", ru: "Что такое INCLUDE в Non-Clustered index?", uk: "Що таке INCLUDE в Non-Clustered index?" }, options: { en: ["It includes the index in query plans automatically.", "It adds non-key columns to the leaf level of the index, making it a Covering Index without bloating the B-tree intermediate pages.", "It includes NULL values in the index.", "It forces the query optimizer to use this index."], de: ["Es schliesst den Index automatisch in Query-Pläne ein.", "Es fügt Nicht-Key-Spalten auf Blattebene des Index hinzu, was ihn zu einem Covering Index macht, ohne die B-tree-Zwischenseiten aufzublähen.", "Es schliesst NULL-Werte in den Index ein.", "Es zwingt den Query Optimizer, diesen Index zu verwenden."], ru: ["Автоматически включает индекс в планы запросов.", "Добавляет неключевые столбцы на уровень листьев индекса, превращая его в Covering Index без раздувания промежуточных страниц B-tree.", "Включает значения NULL в индекс.", "Принуждает оптимизатор запросов использовать этот индекс."], uk: ["Автоматично включає індекс у плани запитів.", "Додає неключові стовпці на рівень листків індексу, перетворюючи його на Covering Index без роздування проміжних сторінок B-tree.", "Включає значення NULL в індекс.", "Примушує оптимізатор запитів використовувати цей індекс."] }, correctIndex: 1, explanation: { en: "INCLUDE columns live only at the leaf level — they don't affect sort order or tree depth. They prevent expensive Key Lookups for queries that need those extra columns.", de: "INCLUDE-Spalten existieren nur auf Blattebene — sie beeinflussen weder die Sortierreihenfolge noch die Baumtiefe. Sie verhindern teure Key Lookups für Queries, die diese zusätzlichen Spalten benötigen.", ru: "Столбцы INCLUDE находятся только на уровне листьев — они не влияют на порядок сортировки или глубину дерева. Они предотвращают дорогостоящие Key Lookup для запросов, которым нужны эти дополнительные столбцы.", uk: "Стовпці INCLUDE знаходяться лише на рівні листків — вони не впливають на порядок сортування чи глибину дерева. Вони запобігають дорогим Key Lookup для запитів, яким потрібні ці додаткові стовпці." } },
{ category: "Indexes", question: { en: "What is a Composite Index and when is column order important?", de: "Was ist ein Composite Index und wann ist die Spaltenreihenfolge wichtig?", ru: "Что такое Composite Index и когда важен порядок столбцов?", uk: "Що таке Composite Index і коли важливий порядок стовпців?" }, options: { en: ["A composite index spans multiple tables.", "An index on multiple columns. Order matters because the index is sorted left-to-right — queries must use the leftmost prefix to benefit.", "Column order doesn't matter in composite indexes.", "A composite index is the same as multiple single-column indexes."], de: ["Ein Composite Index erstreckt sich über mehrere Tabellen.", "Ein Index auf mehreren Spalten. Die Reihenfolge ist wichtig, weil der Index von links nach rechts sortiert ist — Queries müssen das linkeste Präfix verwenden, um zu profitieren.", "Die Spaltenreihenfolge spielt bei Composite Indexes keine Rolle.", "Ein Composite Index ist dasselbe wie mehrere Einzelspalten-Indexes."], ru: ["Composite index охватывает несколько таблиц.", "Индекс на нескольких столбцах. Порядок важен, потому что индекс отсортирован слева направо — запросы должны использовать крайний левый префикс, чтобы получить выгоду.", "Порядок столбцов в Composite Index не имеет значения.", "Composite Index — то же самое, что несколько одностолбцовых индексов."], uk: ["Composite index охоплює кілька таблиць.", "Індекс на кількох стовпцях. Порядок важливий, тому що індекс відсортований зліва направо — запити повинні використовувати крайній лівий префікс, щоб отримати вигоду.", "Порядок стовпців у Composite Index не має значення.", "Composite Index — те саме, що кілька одностовпцевих індексів."] }, correctIndex: 1, explanation: { en: "Index on (LastName, FirstName): WHERE LastName = 'Smith' uses it. WHERE FirstName = 'John' does NOT (can't skip the first column). This is the Left Prefix Rule.", de: "Index auf (LastName, FirstName): WHERE LastName = 'Smith' nutzt ihn. WHERE FirstName = 'John' NICHT (kann die erste Spalte nicht überspringen). Das ist die Left-Prefix-Regel.", ru: "Индекс на (LastName, FirstName): WHERE LastName = 'Smith' использует его. WHERE FirstName = 'John' НЕТ (нельзя пропустить первый столбец). Это правило левого префикса.", uk: "Індекс на (LastName, FirstName): WHERE LastName = 'Smith' використовує його. WHERE FirstName = 'John' НІ (не можна пропустити перший стовпець). Це правило лівого префіксу." } },
{ category: "Indexes", question: { en: "What is Index Fragmentation and how does it affect performance?", de: "Was ist Index Fragmentation und wie beeinflusst sie die Performance?", ru: "Что такое фрагментация индекса и как она влияет на производительность?", uk: "Що таке фрагментація індексу і як вона впливає на продуктивність?" }, options: { en: ["Fragmentation means the index has too many columns.", "Over time, inserts/updates/deletes cause index pages to become non-contiguous on disk, increasing I/O. REBUILD or REORGANIZE fixes it.", "Fragmentation only affects Non-Clustered indexes.", "Fragmentation improves query speed by spreading data."], de: ["Fragmentation bedeutet, dass der Index zu viele Spalten hat.", "Im Laufe der Zeit führen Inserts/Updates/Deletes dazu, dass Index-Seiten auf der Festplatte nicht mehr zusammenhängend sind, was die I/O erhöht. REBUILD oder REORGANIZE behebt das.", "Fragmentation betrifft nur Non-Clustered Indexes.", "Fragmentation verbessert die Query-Geschwindigkeit durch Datenverteilung."], ru: ["Фрагментация означает, что в индексе слишком много столбцов.", "Со временем вставки/обновления/удаления приводят к тому, что страницы индекса становятся несмежными на диске, увеличивая I/O. REBUILD или REORGANIZE исправляет это.", "Фрагментация затрагивает только Non-Clustered index.", "Фрагментация улучшает скорость запросов за счёт распределения данных."], uk: ["Фрагментація означає, що в індексі забагато стовпців.", "З часом вставки/оновлення/видалення призводять до того, що сторінки індексу стають несуміжними на диску, збільшуючи I/O. REBUILD або REORGANIZE виправляє це.", "Фрагментація зачіпає лише Non-Clustered index.", "Фрагментація покращує швидкість запитів за рахунок розподілу даних."] }, correctIndex: 1, explanation: { en: "Logical fragmentation means pages are out of order. The disk head jumps around instead of reading sequentially. REBUILD recreates the index; REORGANIZE defragments in-place.", de: "Logische Fragmentation bedeutet, dass Seiten nicht in Reihenfolge sind. Der Lesekopf springt umher statt sequenziell zu lesen. REBUILD erstellt den Index neu; REORGANIZE defragmentiert vor Ort.", ru: "Логическая фрагментация означает, что страницы расположены не по порядку. Головка диска прыгает вместо последовательного чтения. REBUILD пересоздаёт индекс; REORGANIZE дефрагментирует на месте.", uk: "Логічна фрагментація означає, що сторінки розташовані не по порядку. Головка диска стрибає замість послідовного читання. REBUILD перестворює індекс; REORGANIZE дефрагментує на місці." } },
{ category: "Indexes", question: { en: "What is a Filtered Index?", de: "Was ist ein Filtered Index?", ru: "Что такое Filtered Index?", uk: "Що таке Filtered Index?" }, options: { en: ["An index that filters out duplicate values.", "An index with a WHERE clause that only indexes rows matching a condition, reducing index size and improving performance for targeted queries.", "An index that filters queries at runtime.", "A temporary index created for a single query."], de: ["Ein Index, der doppelte Werte herausfiltert.", "Ein Index mit einer WHERE-Klausel, der nur Zeilen indexiert, die einer Bedingung entsprechen, was die Indexgrösse reduziert und die Performance für gezielte Queries verbessert.", "Ein Index, der Queries zur Laufzeit filtert.", "Ein temporärer Index, der für eine einzelne Query erstellt wird."], ru: ["Индекс, отфильтровывающий дублирующиеся значения.", "Индекс с WHERE-условием, который индексирует только строки, соответствующие условию, уменьшая размер индекса и улучшая производительность целевых запросов.", "Индекс, фильтрующий запросы во время выполнения.", "Временный индекс, созданный для одного запроса."], uk: ["Індекс, що фільтрує дублікати значень.", "Індекс з WHERE-умовою, який індексує лише рядки, що відповідають умові, зменшуючи розмір індексу та покращуючи продуктивність цільових запитів.", "Індекс, що фільтрує запити під час виконання.", "Тимчасовий індекс, створений для одного запиту."] }, correctIndex: 1, explanation: { en: "CREATE INDEX IX_Active ON Orders(OrderDate) WHERE Status = 'Active'. Only active orders are indexed — much smaller, faster, and less maintenance than indexing all rows.", de: "CREATE INDEX IX_Active ON Orders(OrderDate) WHERE Status = 'Active'. Nur aktive Bestellungen werden indexiert — viel kleiner, schneller und weniger Wartung als alle Zeilen zu indexieren.", ru: "CREATE INDEX IX_Active ON Orders(OrderDate) WHERE Status = 'Active'. Только активные заказы индексируются — гораздо меньше, быстрее и меньше обслуживания, чем индексирование всех строк.", uk: "CREATE INDEX IX_Active ON Orders(OrderDate) WHERE Status = 'Active'. Лише активні замовлення індексуються — набагато менший, швидший і менше обслуговування, ніж індексування всіх рядків." } },
{ category: "Indexes", question: { en: "When can adding an index actually HURT performance?", de: "Wann kann das Hinzufügen eines Index die Performance tatsächlich VERSCHLECHTERN?", ru: "Когда добавление индекса может УХУДШИТЬ производительность?", uk: "Коли додавання індексу може ПОГІРШИТИ продуктивність?" }, options: { en: ["Indexes never hurt performance.", "On tables with heavy INSERT/UPDATE/DELETE activity — every write must also update all indexes, adding overhead.", "Only when the index exceeds 1GB.", "Only on temporary tables."], de: ["Indexes beeinträchtigen nie die Performance.", "Bei Tabellen mit intensiver INSERT/UPDATE/DELETE-Aktivität — jeder Schreibvorgang muss auch alle Indexes aktualisieren, was Overhead verursacht.", "Nur wenn der Index 1 GB überschreitet.", "Nur bei temporären Tabellen."], ru: ["Индексы никогда не ухудшают производительность.", "На таблицах с интенсивной активностью INSERT/UPDATE/DELETE — каждая запись должна также обновить все индексы, создавая накладные расходы.", "Только когда индекс превышает 1 ГБ.", "Только на временных таблицах."], uk: ["Індекси ніколи не погіршують продуктивність.", "На таблицях з інтенсивною активністю INSERT/UPDATE/DELETE — кожен запис повинен також оновити всі індекси, створюючи накладні витрати.", "Лише коли індекс перевищує 1 ГБ.", "Лише на тимчасових таблицях."] }, correctIndex: 1, explanation: { en: "Each index is a separate data structure that must be maintained on every write. A table with 10 indexes means each INSERT updates 10 B-trees. Write-heavy tables need fewer, targeted indexes.", de: "Jeder Index ist eine separate Datenstruktur, die bei jedem Schreibvorgang gepflegt werden muss. Eine Tabelle mit 10 Indexes bedeutet, dass jeder INSERT 10 B-trees aktualisiert. Schreibintensive Tabellen brauchen weniger, gezielte Indexes.", ru: "Каждый индекс — отдельная структура данных, которую необходимо обновлять при каждой записи. Таблица с 10 индексами означает, что каждый INSERT обновляет 10 B-tree. Таблицы с интенсивной записью требуют меньше целевых индексов.", uk: "Кожен індекс — окрема структура даних, яку необхідно оновлювати при кожному записі. Таблиця з 10 індексами означає, що кожен INSERT оновлює 10 B-tree. Таблиці з інтенсивним записом потребують менше цільових індексів." } },
{ category: "Indexes", question: { en: "What is a Unique Index?", de: "Was ist ein Unique Index?", ru: "Что такое Unique Index?", uk: "Що таке Unique Index?" }, options: { en: ["An index that stores only one copy of each page.", "An index that enforces uniqueness on the indexed columns — any duplicate insert will be rejected by the database engine.", "An index created by a unique algorithm.", "A Non-Clustered index with no duplicates allowed in the INCLUDE columns."], de: ["Ein Index, der nur eine Kopie jeder Seite speichert.", "Ein Index, der Eindeutigkeit auf den indexierten Spalten erzwingt — jede doppelte Einfügung wird von der Datenbank-Engine abgelehnt.", "Ein Index, der durch einen einzigartigen Algorithmus erstellt wird.", "Ein Non-Clustered Index ohne Duplikate in den INCLUDE-Spalten."], ru: ["Индекс, хранящий только одну копию каждой страницы.", "Индекс, обеспечивающий уникальность индексированных столбцов — любая дублирующая вставка будет отклонена движком базы данных.", "Индекс, созданный уникальным алгоритмом.", "Non-Clustered index без дубликатов в столбцах INCLUDE."], uk: ["Індекс, що зберігає лише одну копію кожної сторінки.", "Індекс, що забезпечує унікальність індексованих стовпців — будь-яка дублююча вставка буде відхилена движком бази даних.", "Індекс, створений унікальним алгоритмом.", "Non-Clustered index без дублікатів у стовпцях INCLUDE."] }, correctIndex: 1, explanation: { en: "Unique indexes serve dual purpose: query performance AND data integrity. A UNIQUE constraint in SQL Server automatically creates a Unique Index behind the scenes.", de: "Unique Indexes dienen einem doppelten Zweck: Query-Performance UND Datenintegrität. Ein UNIQUE Constraint in SQL Server erstellt automatisch einen Unique Index im Hintergrund.", ru: "Unique index служит двойной цели: производительность запросов И целостность данных. Ограничение UNIQUE в SQL Server автоматически создаёт Unique Index за кулисами.", uk: "Unique index служить подвійній меті: продуктивність запитів ТА цілісність даних. Обмеження UNIQUE в SQL Server автоматично створює Unique Index за лаштунками." } },
{ category: "Indexes", question: { en: "What is the difference between a B-Tree index and a Hash index?", de: "Was ist der Unterschied zwischen einem B-Tree Index und einem Hash Index?", ru: "В чём разница между B-Tree index и Hash index?", uk: "У чому різниця між B-Tree index та Hash index?" }, options: { en: ["They're the same structure with different names.", "B-Tree supports range queries (>, <, BETWEEN) and sorting. Hash indexes only support exact equality lookups (=) but are O(1) for those.", "Hash indexes are always faster.", "B-Tree is for strings, Hash is for numbers."], de: ["Es sind dieselben Strukturen mit unterschiedlichen Namen.", "B-Tree unterstützt Range Queries (>, <, BETWEEN) und Sortierung. Hash Indexes unterstützen nur exakte Gleichheitssuchen (=), sind dafür aber O(1).", "Hash Indexes sind immer schneller.", "B-Tree ist für Strings, Hash für Zahlen."], ru: ["Это одинаковые структуры с разными названиями.", "B-Tree поддерживает диапазонные запросы (>, <, BETWEEN) и сортировку. Hash index поддерживает только точный поиск на равенство (=), но за O(1).", "Hash index всегда быстрее.", "B-Tree для строк, Hash для чисел."], uk: ["Це однакові структури з різними назвами.", "B-Tree підтримує діапазонні запити (>, <, BETWEEN) та сортування. Hash index підтримує лише точний пошук на рівність (=), але за O(1).", "Hash index завжди швидший.", "B-Tree для рядків, Hash для чисел."] }, correctIndex: 1, explanation: { en: "B-Tree is the default in SQL Server and PostgreSQL because it handles both equality and range queries. Hash indexes (e.g., in PostgreSQL) are only useful for pure equality checks.", de: "B-Tree ist der Standard in SQL Server und PostgreSQL, weil er sowohl Gleichheits- als auch Range Queries unterstützt. Hash Indexes (z.B. in PostgreSQL) sind nur für reine Gleichheitsprüfungen nützlich.", ru: "B-Tree — индекс по умолчанию в SQL Server и PostgreSQL, потому что он обрабатывает и равенство, и диапазонные запросы. Hash index (например, в PostgreSQL) полезен только для чистых проверок на равенство.", uk: "B-Tree — індекс за замовчуванням у SQL Server та PostgreSQL, тому що він обробляє і рівність, і діапазонні запити. Hash index (наприклад, у PostgreSQL) корисний лише для чистих перевірок на рівність." } },
// ===== QUERY OPTIMIZATION =====
{ category: "Query Optimization", question: { en: "What does EXPLAIN ANALYZE do in PostgreSQL?", de: "Was macht EXPLAIN ANALYZE in PostgreSQL?", ru: "Что делает EXPLAIN ANALYZE в PostgreSQL?", uk: "Що робить EXPLAIN ANALYZE в PostgreSQL?" }, options: { en: ["It explains the query syntax.", "It actually executes the query and shows the real execution plan with actual row counts, timing, and operations (Seq Scan, Index Scan, etc.).", "It analyzes the table statistics without running the query.", "It optimizes the query automatically."], de: ["Es erklärt die Query-Syntax.", "Es führt die Query tatsächlich aus und zeigt den realen Ausführungsplan mit tatsächlichen Zeilenzahlen, Timing und Operationen (Seq Scan, Index Scan usw.).", "Es analysiert die Tabellenstatistiken, ohne die Query auszuführen.", "Es optimiert die Query automatisch."], ru: ["Объясняет синтаксис запроса.", "Фактически выполняет запрос и показывает реальный план выполнения с фактическим количеством строк, временем и операциями (Seq Scan, Index Scan и т.д.).", "Анализирует статистику таблицы без выполнения запроса.", "Автоматически оптимизирует запрос."], uk: ["Пояснює синтаксис запиту.", "Фактично виконує запит і показує реальний план виконання з фактичною кількістю рядків, часом та операціями (Seq Scan, Index Scan тощо).", "Аналізує статистику таблиці без виконання запиту.", "Автоматично оптимізує запит."] }, correctIndex: 1, explanation: { en: "Plain EXPLAIN only estimates. EXPLAIN ANALYZE forces execution and shows actual vs. estimated rows, actual time per node — the ultimate tool for debugging slow queries.", de: "Einfaches EXPLAIN schätzt nur. EXPLAIN ANALYZE erzwingt die Ausführung und zeigt tatsächliche vs. geschätzte Zeilen, tatsächliche Zeit pro Knoten — das ultimative Tool zum Debuggen langsamer Queries.", ru: "Простой EXPLAIN только оценивает. EXPLAIN ANALYZE принудительно выполняет и показывает фактические vs. оценочные строки, фактическое время на узел — лучший инструмент для отладки медленных запросов.", uk: "Простий EXPLAIN лише оцінює. EXPLAIN ANALYZE примусово виконує і показує фактичні vs. оціночні рядки, фактичний час на вузол — найкращий інструмент для відлагодження повільних запитів." } },
{ category: "Query Optimization", question: { en: "What is the difference between a Seq Scan and an Index Scan?", de: "Was ist der Unterschied zwischen einem Seq Scan und einem Index Scan?", ru: "В чём разница между Seq Scan и Index Scan?", uk: "У чому різниця між Seq Scan та Index Scan?" }, options: { en: ["Seq Scan uses an index, Index Scan doesn't.", "Seq Scan reads every row in the table sequentially. Index Scan uses a B-tree to jump directly to matching rows.", "They perform identically on small tables.", "Index Scan always faster than Seq Scan."], de: ["Seq Scan nutzt einen Index, Index Scan nicht.", "Seq Scan liest jede Zeile in der Tabelle sequenziell. Index Scan nutzt einen B-tree, um direkt zu passenden Zeilen zu springen.", "Sie arbeiten bei kleinen Tabellen identisch.", "Index Scan ist immer schneller als Seq Scan."], ru: ["Seq Scan использует индекс, Index Scan нет.", "Seq Scan читает каждую строку таблицы последовательно. Index Scan использует B-tree для прямого перехода к соответствующим строкам.", "На маленьких таблицах они работают одинаково.", "Index Scan всегда быстрее Seq Scan."], uk: ["Seq Scan використовує індекс, Index Scan ні.", "Seq Scan читає кожен рядок таблиці послідовно. Index Scan використовує B-tree для прямого переходу до відповідних рядків.", "На маленьких таблицях вони працюють однаково.", "Index Scan завжди швидший за Seq Scan."] }, correctIndex: 1, explanation: { en: "Seq Scan reads the entire table — fine for small tables or queries returning most rows. Index Scan navigates the B-tree — much faster when selecting a small fraction of rows.", de: "Seq Scan liest die gesamte Tabelle — in Ordnung für kleine Tabellen oder Queries, die die meisten Zeilen zurückgeben. Index Scan navigiert den B-tree — viel schneller bei der Auswahl eines kleinen Anteils der Zeilen.", ru: "Seq Scan читает всю таблицу — подходит для маленьких таблиц или запросов, возвращающих большинство строк. Index Scan навигирует по B-tree — гораздо быстрее при выборе малой доли строк.", uk: "Seq Scan читає всю таблицю — підходить для маленьких таблиць або запитів, що повертають більшість рядків. Index Scan навігує по B-tree — набагато швидший при виборі малої частки рядків." } },
{ category: "Query Optimization", question: { en: "When might the query optimizer CHOOSE a Seq Scan over an Index Scan?", de: "Wann könnte der Query Optimizer einen Seq Scan einem Index Scan VORZIEHEN?", ru: "Когда оптимизатор запросов может ВЫБРАТЬ Seq Scan вместо Index Scan?", uk: "Коли оптимізатор запитів може ОБРАТИ Seq Scan замість Index Scan?" }, options: { en: ["Never — Index Scan is always preferred.", "When the query returns a large percentage of rows (e.g., >10-20%), the overhead of random I/O from index lookups exceeds the cost of a sequential full table scan.", "Only when the index is corrupted.", "Only on tables with fewer than 100 rows."], de: ["Nie — Index Scan wird immer bevorzugt.", "Wenn die Query einen grossen Prozentsatz der Zeilen zurückgibt (z.B. >10-20%), übersteigt der Overhead des Random I/O durch Index-Lookups die Kosten eines sequenziellen Full Table Scans.", "Nur wenn der Index beschädigt ist.", "Nur bei Tabellen mit weniger als 100 Zeilen."], ru: ["Никогда — Index Scan всегда предпочтительнее.", "Когда запрос возвращает большой процент строк (напр., >10-20%), накладные расходы Random I/O от Index Lookup превышают стоимость последовательного Full Table Scan.", "Только когда индекс повреждён.", "Только на таблицах с менее чем 100 строками."], uk: ["Ніколи — Index Scan завжди кращий.", "Коли запит повертає великий відсоток рядків (напр., >10-20%), накладні витрати Random I/O від Index Lookup перевищують вартість послідовного Full Table Scan.", "Лише коли індекс пошкоджений.", "Лише на таблицях з менш ніж 100 рядками."] }, correctIndex: 1, explanation: { en: "If you SELECT * FROM Orders WHERE Status IN ('Active','Pending','Processing') and that's 80% of rows, sequential I/O reading the whole table is cheaper than 80% random lookups via the index.", de: "Wenn SELECT * FROM Orders WHERE Status IN ('Active','Pending','Processing') 80% der Zeilen zurückgibt, ist sequenzielles I/O der ganzen Tabelle günstiger als 80% Random Lookups über den Index.", ru: "Если SELECT * FROM Orders WHERE Status IN ('Active','Pending','Processing') возвращает 80% строк, последовательное I/O всей таблицы дешевле, чем 80% случайных обращений через индекс.", uk: "Якщо SELECT * FROM Orders WHERE Status IN ('Active','Pending','Processing') повертає 80% рядків, послідовне I/O всієї таблиці дешевше, ніж 80% випадкових звернень через індекс." } },
{ category: "Query Optimization", question: { en: "What is a Key Lookup (Bookmark Lookup) and why is it expensive?", de: "Was ist ein Key Lookup (Bookmark Lookup) und warum ist er teuer?", ru: "Что такое Key Lookup (Bookmark Lookup) и почему он дорогой?", uk: "Що таке Key Lookup (Bookmark Lookup) і чому він дорогий?" }, options: { en: ["It's a lookup in the application's key vault.", "After finding a row via Non-Clustered index, the engine must go to the Clustered index to fetch additional columns not in the index — each lookup is random I/O.", "It's a lookup in the foreign key table.", "It only happens with composite keys."], de: ["Es ist ein Lookup im Key Vault der Anwendung.", "Nach dem Finden einer Zeile über den Non-Clustered Index muss die Engine zum Clustered Index gehen, um zusätzliche Spalten zu holen, die nicht im Index sind — jeder Lookup ist Random I/O.", "Es ist ein Lookup in der Foreign-Key-Tabelle.", "Es passiert nur bei Composite Keys."], ru: ["Это поиск в хранилище ключей приложения.", "После нахождения строки через Non-Clustered index движок должен обратиться к Clustered index за дополнительными столбцами, отсутствующими в индексе — каждый Lookup — это Random I/O.", "Это поиск в таблице Foreign Key.", "Это происходит только с Composite Key."], uk: ["Це пошук у сховищі ключів додатку.", "Після знаходження рядка через Non-Clustered index движок повинен звернутися до Clustered index за додатковими стовпцями, відсутніми в індексі — кожен Lookup — це Random I/O.", "Це пошук у таблиці Foreign Key.", "Це відбувається лише з Composite Key."] }, correctIndex: 1, explanation: { en: "If your Non-Clustered index has (Email) but the query also needs Name, the engine finds the row via Email index, then does a random seek into the Clustered index for Name. Fix: INCLUDE (Name).", de: "Wenn dein Non-Clustered Index (Email) hat, aber die Query auch Name braucht, findet die Engine die Zeile über den Email-Index und macht dann einen Random Seek in den Clustered Index für Name. Lösung: INCLUDE (Name).", ru: "Если ваш Non-Clustered index имеет (Email), но запросу также нужен Name, движок находит строку через Email index, затем делает Random Seek в Clustered index за Name. Решение: INCLUDE (Name).", uk: "Якщо ваш Non-Clustered index має (Email), але запиту також потрібен Name, движок знаходить рядок через Email index, потім робить Random Seek у Clustered index за Name. Рішення: INCLUDE (Name)." } },
{ category: "Query Optimization", question: { en: "What is Parameter Sniffing in SQL Server?", de: "Was ist Parameter Sniffing in SQL Server?", ru: "Что такое Parameter Sniffing в SQL Server?", uk: "Що таке Parameter Sniffing в SQL Server?" }, options: { en: ["A security vulnerability where parameters are exposed.", "SQL Server compiles a query plan based on the FIRST parameter values it sees, which may be terrible for subsequent calls with different values.", "A technique to optimize parameterized queries.", "A debugging feature in SSMS."], de: ["Eine Sicherheitslücke, bei der Parameter offengelegt werden.", "SQL Server kompiliert einen Query-Plan basierend auf den ERSTEN Parameterwerten, die er sieht, was für nachfolgende Aufrufe mit anderen Werten katastrophal sein kann.", "Eine Technik zur Optimierung parametrisierter Queries.", "Eine Debugging-Funktion in SSMS."], ru: ["Уязвимость безопасности, при которой параметры раскрываются.", "SQL Server компилирует план запроса на основе ПЕРВЫХ значений параметров, которые он видит, что может быть катастрофично для последующих вызовов с другими значениями.", "Техника оптимизации параметризованных запросов.", "Функция отладки в SSMS."], uk: ["Вразливість безпеки, при якій параметри розкриваються.", "SQL Server компілює план запиту на основі ПЕРШИХ значень параметрів, які він бачить, що може бути катастрофічно для наступних викликів з іншими значеннями.", "Техніка оптимізації параметризованих запитів.", "Функція відлагодження в SSMS."] }, correctIndex: 1, explanation: { en: "First call: @Status='Rare' — Index Scan plan. Cached plan reused for @Status='Active' (90% of rows) — catastrophic performance. Fix: OPTION(RECOMPILE), OPTIMIZE FOR, or plan guides.", de: "Erster Aufruf: @Status='Rare' — Index Scan Plan. Gecachter Plan wiederverwendet für @Status='Active' (90% der Zeilen) — katastrophale Performance. Lösung: OPTION(RECOMPILE), OPTIMIZE FOR oder Plan Guides.", ru: "Первый вызов: @Status='Rare' — план Index Scan. Кэшированный план повторно используется для @Status='Active' (90% строк) — катастрофическая производительность. Решение: OPTION(RECOMPILE), OPTIMIZE FOR или plan guides.", uk: "Перший виклик: @Status='Rare' — план Index Scan. Кешований план повторно використовується для @Status='Active' (90% рядків) — катастрофічна продуктивність. Рішення: OPTION(RECOMPILE), OPTIMIZE FOR або plan guides." } },
{ category: "Query Optimization", question: { en: "What does the SQL Server Execution Plan's 'Estimated Subtree Cost' tell you?", de: "Was sagt der 'Estimated Subtree Cost' im SQL Server Execution Plan aus?", ru: "Что говорит 'Estimated Subtree Cost' в плане выполнения SQL Server?", uk: "Що говорить 'Estimated Subtree Cost' у плані виконання SQL Server?" }, options: { en: ["The actual time in milliseconds.", "A relative cost unit the optimizer uses to compare plan alternatives — higher cost = more expensive estimated operations.", "The dollar cost of running the query on Azure.", "The number of rows returned."], de: ["Die tatsächliche Zeit in Millisekunden.", "Eine relative Kosteneinheit, die der Optimizer zum Vergleich von Planalternativen verwendet — höhere Kosten = teurere geschätzte Operationen.", "Die Dollarkosten für die Ausführung der Query auf Azure.", "Die Anzahl der zurückgegebenen Zeilen."], ru: ["Фактическое время в миллисекундах.", "Относительная единица стоимости, которую оптимизатор использует для сравнения альтернативных планов — выше стоимость = более дорогие оценочные операции.", "Стоимость выполнения запроса в Azure в долларах.", "Количество возвращённых строк."], uk: ["Фактичний час у мілісекундах.", "Відносна одиниця вартості, яку оптимізатор використовує для порівняння альтернативних планів — вища вартість = дорожчі оціночні операції.", "Вартість виконання запиту в Azure у доларах.", "Кількість повернених рядків."] }, correctIndex: 1, explanation: { en: "Cost is unitless and relative. A query with cost 10 is roughly 10x more expensive than cost 1. Compare costs between plan alternatives to understand optimizer choices.", de: "Die Kosten sind einheitslos und relativ. Eine Query mit Kosten 10 ist ungefähr 10x teurer als Kosten 1. Vergleiche Kosten zwischen Planalternativen, um Optimizer-Entscheidungen zu verstehen.", ru: "Стоимость безразмерна и относительна. Запрос со стоимостью 10 примерно в 10 раз дороже, чем со стоимостью 1. Сравнивайте стоимости альтернативных планов, чтобы понять выбор оптимизатора.", uk: "Вартість безрозмірна і відносна. Запит з вартістю 10 приблизно в 10 разів дорожчий за вартість 1. Порівнюйте вартості альтернативних планів, щоб зрозуміти вибір оптимізатора." } },
{ category: "Query Optimization", question: { en: "Why is SELECT * considered harmful for performance?", de: "Warum wird SELECT * als schädlich für die Performance angesehen?", ru: "Почему SELECT * считается вредным для производительности?", uk: "Чому SELECT * вважається шкідливим для продуктивності?" }, options: { en: ["It uses more CPU to parse the asterisk.", "It fetches all columns, preventing Covering Index optimization, increasing I/O, network transfer, and memory usage unnecessarily.", "It's only harmful in production, not development.", "Modern databases optimize SELECT * automatically."], de: ["Es benötigt mehr CPU zum Parsen des Sternchens.", "Es holt alle Spalten, verhindert Covering-Index-Optimierung, erhöht I/O, Netzwerkübertragung und Speicherverbrauch unnötig.", "Es ist nur in Produktion schädlich, nicht in der Entwicklung.", "Moderne Datenbanken optimieren SELECT * automatisch."], ru: ["Требуется больше CPU для разбора звёздочки.", "Извлекает все столбцы, предотвращая оптимизацию Covering Index, излишне увеличивая I/O, сетевой трафик и использование памяти.", "Вредно только в продакшене, не в разработке.", "Современные базы данных автоматически оптимизируют SELECT *."], uk: ["Потрібно більше CPU для розбору зірочки.", "Витягує всі стовпці, запобігаючи оптимізації Covering Index, зайво збільшуючи I/O, мережевий трафік та використання пам'яті.", "Шкідливо лише в продакшені, не в розробці.", "Сучасні бази даних автоматично оптимізують SELECT *."] }, correctIndex: 1, explanation: { en: "SELECT Name, Email can be served from a Covering Index (no table access). SELECT * forces a Key Lookup or Clustered Index Scan to fetch every column — much slower.", de: "SELECT Name, Email kann von einem Covering Index bedient werden (kein Tabellenzugriff). SELECT * erzwingt einen Key Lookup oder Clustered Index Scan, um jede Spalte zu holen — viel langsamer.", ru: "SELECT Name, Email может обслуживаться Covering Index (без обращения к таблице). SELECT * вынуждает Key Lookup или Clustered Index Scan для извлечения каждого столбца — намного медленнее.", uk: "SELECT Name, Email може обслуговуватися Covering Index (без звернення до таблиці). SELECT * вимушує Key Lookup або Clustered Index Scan для витягування кожного стовпця — набагато повільніше." } },
{ category: "Query Optimization", question: { en: "What is the difference between EXISTS and IN for subqueries?", de: "Was ist der Unterschied zwischen EXISTS und IN bei Subqueries?", ru: "В чём разница между EXISTS и IN для подзапросов?", uk: "У чому різниця між EXISTS та IN для підзапитів?" }, options: { en: ["They always produce the same execution plan.", "EXISTS short-circuits (stops at first match). IN materializes the entire subquery result. EXISTS is typically faster for correlated subqueries.", "IN is always faster because it uses indexes.", "EXISTS is deprecated in modern SQL."], de: ["Sie erzeugen immer denselben Ausführungsplan.", "EXISTS bricht ab (stoppt beim ersten Treffer). IN materialisiert das gesamte Subquery-Ergebnis. EXISTS ist typischerweise schneller für korrelierte Subqueries.", "IN ist immer schneller, weil es Indexes nutzt.", "EXISTS ist in modernem SQL veraltet."], ru: ["Они всегда создают одинаковый план выполнения.", "EXISTS прерывается (останавливается на первом совпадении). IN материализует весь результат подзапроса. EXISTS обычно быстрее для коррелированных подзапросов.", "IN всегда быстрее, потому что использует индексы.", "EXISTS устарел в современном SQL."], uk: ["Вони завжди створюють однаковий план виконання.", "EXISTS переривається (зупиняється на першому збігу). IN матеріалізує весь результат підзапиту. EXISTS зазвичай швидший для корельованих підзапитів.", "IN завжди швидший, тому що використовує індекси.", "EXISTS застарів у сучасному SQL."] }, correctIndex: 1, explanation: { en: "EXISTS: for each outer row, check if ANY inner row matches — stop immediately on first hit. IN: build the full list first, then check membership. With large subqueries, EXISTS often wins.", de: "EXISTS: für jede äussere Zeile prüfen, ob IRGENDEINE innere Zeile passt — sofort beim ersten Treffer stoppen. IN: zuerst die vollständige Liste erstellen, dann Zugehörigkeit prüfen. Bei grossen Subqueries gewinnt EXISTS oft.", ru: "EXISTS: для каждой внешней строки проверяет, совпадает ли ЛЮБАЯ внутренняя строка — останавливается сразу при первом попадании. IN: сначала строит полный список, затем проверяет принадлежность. При больших подзапросах EXISTS часто выигрывает.", uk: "EXISTS: для кожного зовнішнього рядка перевіряє, чи збігається БУДЬ-ЯКИЙ внутрішній рядок — зупиняється одразу при першому влучанні. IN: спочатку будує повний список, потім перевіряє належність. При великих підзапитах EXISTS часто виграє." } },
{ category: "Query Optimization", question: { en: "What is a Sargable query predicate?", de: "Was ist ein Sargable Query-Prädikat?", ru: "Что такое Sargable предикат запроса?", uk: "Що таке Sargable предикат запиту?" }, options: { en: ["A query that uses SARG (Search ARGument) keywords.", "A WHERE condition that allows the database to use an index seek — no functions wrapping the indexed column (e.g., WHERE Col = 5, not WHERE YEAR(Col) = 2024).", "Any query that returns less than 1000 rows.", "A predicate using LIKE with a leading wildcard."], de: ["Eine Query, die SARG (Search ARGument) Keywords verwendet.", "Eine WHERE-Bedingung, die der Datenbank einen Index Seek ermöglicht — keine Funktionen um die indexierte Spalte (z.B. WHERE Col = 5, nicht WHERE YEAR(Col) = 2024).", "Jede Query, die weniger als 1000 Zeilen zurückgibt.", "Ein Prädikat mit LIKE und führendem Wildcard."], ru: ["Запрос, использующий ключевые слова SARG (Search ARGument).", "WHERE-условие, позволяющее базе данных использовать Index Seek — без функций, оборачивающих индексированный столбец (напр., WHERE Col = 5, а не WHERE YEAR(Col) = 2024).", "Любой запрос, возвращающий менее 1000 строк.", "Предикат с LIKE и начальным wildcard."], uk: ["Запит, що використовує ключові слова SARG (Search ARGument).", "WHERE-умова, що дозволяє базі даних використовувати Index Seek — без функцій, що обгортають індексований стовпець (напр., WHERE Col = 5, а не WHERE YEAR(Col) = 2024).", "Будь-який запит, що повертає менше 1000 рядків.", "Предикат з LIKE та початковим wildcard."] }, correctIndex: 1, explanation: { en: "WHERE YEAR(DateCol) = 2024 is non-sargable — the function prevents index usage. Rewrite as WHERE DateCol >= '2024-01-01' AND DateCol < '2025-01-01' to enable Index Seek.", de: "WHERE YEAR(DateCol) = 2024 ist nicht sargable — die Funktion verhindert die Indexnutzung. Umschreiben als WHERE DateCol >= '2024-01-01' AND DateCol < '2025-01-01' für Index Seek.", ru: "WHERE YEAR(DateCol) = 2024 — non-sargable — функция предотвращает использование индекса. Перепишите как WHERE DateCol >= '2024-01-01' AND DateCol < '2025-01-01' для Index Seek.", uk: "WHERE YEAR(DateCol) = 2024 — non-sargable — функція запобігає використанню індексу. Перепишіть як WHERE DateCol >= '2024-01-01' AND DateCol < '2025-01-01' для Index Seek." } },
{ category: "Query Optimization", question: { en: "How does an Index Seek differ from an Index Scan?", de: "Wie unterscheidet sich ein Index Seek von einem Index Scan?", ru: "Чем Index Seek отличается от Index Scan?", uk: "Чим Index Seek відрізняється від Index Scan?" }, options: { en: ["They're the same operation.", "Seek navigates the B-tree to find specific rows (O(log n)). Scan reads every leaf page of the index sequentially (O(n)).", "Seek is for Clustered indexes, Scan for Non-Clustered.", "Scan is always faster for large tables."], de: ["Es ist dieselbe Operation.", "Seek navigiert den B-tree, um bestimmte Zeilen zu finden (O(log n)). Scan liest jede Blattseite des Index sequenziell (O(n)).", "Seek ist für Clustered Indexes, Scan für Non-Clustered.", "Scan ist bei grossen Tabellen immer schneller."], ru: ["Это одна и та же операция.", "Seek навигирует по B-tree для поиска конкретных строк (O(log n)). Scan читает каждую листовую страницу индекса последовательно (O(n)).", "Seek для Clustered index, Scan для Non-Clustered.", "Scan всегда быстрее для больших таблиц."], uk: ["Це одна і та сама операція.", "Seek навігує по B-tree для пошуку конкретних рядків (O(log n)). Scan читає кожну листкову сторінку індексу послідовно (O(n)).", "Seek для Clustered index, Scan для Non-Clustered.", "Scan завжди швидший для великих таблиць."] }, correctIndex: 1, explanation: { en: "Seek: jump to exactly the rows needed via the B-tree. Scan: read all index pages. A Seek on a million-row index touches maybe 3-4 pages. A Scan touches all of them.", de: "Seek: direkt zu den benötigten Zeilen über den B-tree springen. Scan: alle Index-Seiten lesen. Ein Seek auf einem Millionen-Zeilen-Index berührt vielleicht 3-4 Seiten. Ein Scan berührt alle.", ru: "Seek: переход точно к нужным строкам через B-tree. Scan: чтение всех страниц индекса. Seek на индексе с миллионом строк затрагивает, возможно, 3-4 страницы. Scan затрагивает все.", uk: "Seek: перехід точно до потрібних рядків через B-tree. Scan: читання всіх сторінок індексу. Seek на індексі з мільйоном рядків зачіпає, можливо, 3-4 сторінки. Scan зачіпає всі." } },
// ===== TRANSACTIONS & ACID =====
{ category: "Transactions", question: { en: "What does ACID stand for in database transactions?", de: "Wofür steht ACID bei Datenbanktransaktionen?", ru: "Что означает ACID в транзакциях баз данных?", uk: "Що означає ACID у транзакціях баз даних?" }, options: { en: ["Asynchronous, Concurrent, Isolated, Durable.", "Atomicity, Consistency, Isolation, Durability.", "Automated, Cached, Indexed, Distributed.", "Abstract, Controlled, Integrated, Dependent."], de: ["Asynchronous, Concurrent, Isolated, Durable.", "Atomicity, Consistency, Isolation, Durability.", "Automated, Cached, Indexed, Distributed.", "Abstract, Controlled, Integrated, Dependent."], ru: ["Asynchronous, Concurrent, Isolated, Durable.", "Atomicity, Consistency, Isolation, Durability.", "Automated, Cached, Indexed, Distributed.", "Abstract, Controlled, Integrated, Dependent."], uk: ["Asynchronous, Concurrent, Isolated, Durable.", "Atomicity, Consistency, Isolation, Durability.", "Automated, Cached, Indexed, Distributed.", "Abstract, Controlled, Integrated, Dependent."] }, correctIndex: 1, explanation: { en: "Atomicity: all or nothing. Consistency: valid state to valid state. Isolation: concurrent transactions don't interfere. Durability: committed data survives crashes.", de: "Atomicity: alles oder nichts. Consistency: von gültigem Zustand zu gültigem Zustand. Isolation: gleichzeitige Transaktionen stören sich nicht. Durability: committete Daten überleben Abstürze.", ru: "Atomicity: всё или ничего. Consistency: из валидного состояния в валидное. Isolation: параллельные транзакции не мешают друг другу. Durability: зафиксированные данные переживают сбои.", uk: "Atomicity: все або нічого. Consistency: з валідного стану у валідний. Isolation: паралельні транзакції не заважають одна одній. Durability: зафіксовані дані переживають збої." } },
{ category: "Transactions", question: { en: "What is a Dirty Read?", de: "Was ist ein Dirty Read?", ru: "Что такое Dirty Read?", uk: "Що таке Dirty Read?" }, options: { en: ["Reading data from an unencrypted connection.", "Transaction A reads data that Transaction B has modified but NOT YET COMMITTED — if B rolls back, A has read data that never officially existed.", "Reading data that contains NULL values.", "Reading from a table without indexes."], de: ["Daten von einer unverschlüsselten Verbindung lesen.", "Transaktion A liest Daten, die Transaktion B geändert, aber NOCH NICHT COMMITTED hat — wenn B zurückrollt, hat A Daten gelesen, die offiziell nie existierten.", "Daten lesen, die NULL-Werte enthalten.", "Von einer Tabelle ohne Indexes lesen."], ru: ["Чтение данных по незашифрованному соединению.", "Транзакция A читает данные, которые транзакция B изменила, но ЕЩЁ НЕ ЗАФИКСИРОВАЛА — если B откатится, A прочитала данные, которые официально никогда не существовали.", "Чтение данных, содержащих NULL.", "Чтение из таблицы без индексов."], uk: ["Читання даних по незашифрованому з'єднанню.", "Транзакція A читає дані, які транзакція B змінила, але ЩЕ НЕ ЗАФІКСУВАЛА — якщо B відкотиться, A прочитала дані, які офіційно ніколи не існували.", "Читання даних, що містять NULL.", "Читання з таблиці без індексів."] }, correctIndex: 1, explanation: { en: "Read Uncommitted isolation level allows dirty reads. Read Committed (the default in SQL Server and PostgreSQL) prevents them by only showing committed data.", de: "Die Isolationsstufe Read Uncommitted erlaubt Dirty Reads. Read Committed (Standard in SQL Server und PostgreSQL) verhindert sie, indem nur committete Daten angezeigt werden.", ru: "Уровень изоляции Read Uncommitted допускает Dirty Read. Read Committed (по умолчанию в SQL Server и PostgreSQL) предотвращает их, показывая только зафиксированные данные.", uk: "Рівень ізоляції Read Uncommitted допускає Dirty Read. Read Committed (за замовчуванням у SQL Server та PostgreSQL) запобігає їм, показуючи лише зафіксовані дані." } },
{ category: "Transactions", question: { en: "What is a Phantom Read?", de: "Was ist ein Phantom Read?", ru: "Что такое Phantom Read?", uk: "Що таке Phantom Read?" }, options: { en: ["A read that returns no results.", "Transaction A runs the same query twice, and the second time sees NEW rows that Transaction B inserted and committed between the two reads.", "A read from a deleted table.", "A read that takes longer than 30 seconds."], de: ["Ein Lesevorgang, der keine Ergebnisse zurückgibt.", "Transaktion A führt dieselbe Query zweimal aus, und beim zweiten Mal sieht sie NEUE Zeilen, die Transaktion B zwischen den beiden Lesevorgängen eingefügt und committed hat.", "Ein Lesevorgang von einer gelöschten Tabelle.", "Ein Lesevorgang, der länger als 30 Sekunden dauert."], ru: ["Чтение, не возвращающее результатов.", "Транзакция A выполняет один и тот же запрос дважды, и во второй раз видит НОВЫЕ строки, которые транзакция B вставила и зафиксировала между двумя чтениями.", "Чтение из удалённой таблицы.", "Чтение, занимающее более 30 секунд."], uk: ["Читання, що не повертає результатів.", "Транзакція A виконує один і той самий запит двічі, і вдруге бачить НОВІ рядки, які транзакція B вставила та зафіксувала між двома читаннями.", "Читання з видаленої таблиці.", "Читання, що займає більше 30 секунд."] }, correctIndex: 1, explanation: { en: "Repeatable Read prevents rows from changing but not new rows appearing. Only Serializable (or PostgreSQL's Repeatable Read with MVCC) prevents phantom reads.", de: "Repeatable Read verhindert Zeilenänderungen, aber nicht das Erscheinen neuer Zeilen. Nur Serializable (oder PostgreSQLs Repeatable Read mit MVCC) verhindert Phantom Reads.", ru: "Repeatable Read предотвращает изменение строк, но не появление новых. Только Serializable (или Repeatable Read PostgreSQL с MVCC) предотвращает Phantom Read.", uk: "Repeatable Read запобігає зміні рядків, але не появі нових. Лише Serializable (або Repeatable Read PostgreSQL з MVCC) запобігає Phantom Read." } },
{ category: "Transactions", question: { en: "What is the difference between Read Committed and Repeatable Read isolation levels?", de: "Was ist der Unterschied zwischen den Isolationsstufen Read Committed und Repeatable Read?", ru: "В чём разница между уровнями изоляции Read Committed и Repeatable Read?", uk: "У чому різниця між рівнями ізоляції Read Committed та Repeatable Read?" }, options: { en: ["No practical difference.", "Read Committed: see only committed data (but re-reading may show different results). Repeatable Read: guarantees the same rows return the same values if re-read within the transaction.", "Repeatable Read is slower in all cases.", "Read Committed allows dirty reads."], de: ["Kein praktischer Unterschied.", "Read Committed: nur committete Daten sehen (aber erneutes Lesen kann andere Ergebnisse zeigen). Repeatable Read: garantiert, dass dieselben Zeilen dieselben Werte liefern, wenn sie innerhalb der Transaktion erneut gelesen werden.", "Repeatable Read ist in allen Fällen langsamer.", "Read Committed erlaubt Dirty Reads."], ru: ["Практической разницы нет.", "Read Committed: видны только зафиксированные данные (но повторное чтение может показать другие результаты). Repeatable Read: гарантирует, что те же строки вернут те же значения при повторном чтении в транзакции.", "Repeatable Read медленнее во всех случаях.", "Read Committed допускает Dirty Read."], uk: ["Практичної різниці немає.", "Read Committed: видно лише зафіксовані дані (але повторне читання може показати інші результати). Repeatable Read: гарантує, що ті самі рядки повернуть ті самі значення при повторному читанні в транзакції.", "Repeatable Read повільніший у всіх випадках.", "Read Committed допускає Dirty Read."] }, correctIndex: 1, explanation: { en: "Read Committed takes short-lived locks. Repeatable Read holds read locks until transaction end, preventing other transactions from modifying those rows.", de: "Read Committed verwendet kurzlebige Sperren. Repeatable Read hält Lesesperren bis zum Transaktionsende und verhindert, dass andere Transaktionen diese Zeilen ändern.", ru: "Read Committed использует кратковременные блокировки. Repeatable Read удерживает блокировки чтения до конца транзакции, предотвращая изменение этих строк другими транзакциями.", uk: "Read Committed використовує короткочасні блокування. Repeatable Read утримує блокування читання до кінця транзакції, запобігаючи зміні цих рядків іншими транзакціями." } },
{ category: "Transactions", question: { en: "What is a Deadlock?", de: "Was ist ein Deadlock?", ru: "Что такое Deadlock?", uk: "Що таке Deadlock?" }, options: { en: ["A lock that never expires.", "Two transactions each hold a lock the other needs, creating a circular wait — neither can proceed. The database kills one (deadlock victim) to resolve it.", "A transaction that takes too long.", "A lock on a table that prevents all reads."], de: ["Eine Sperre, die nie abläuft.", "Zwei Transaktionen halten jeweils eine Sperre, die die andere benötigt, was ein zirkuläres Warten erzeugt — keine kann fortfahren. Die Datenbank beendet eine (Deadlock Victim) zur Auflösung.", "Eine Transaktion, die zu lange dauert.", "Eine Sperre auf einer Tabelle, die alle Lesevorgänge verhindert."], ru: ["Блокировка, которая никогда не истекает.", "Две транзакции удерживают блокировку, нужную другой, создавая циклическое ожидание — ни одна не может продолжить. БД убивает одну (жертву deadlock) для разрешения.", "Транзакция, которая выполняется слишком долго.", "Блокировка таблицы, предотвращающая все чтения."], uk: ["Блокування, що ніколи не закінчується.", "Дві транзакції утримують блокування, потрібне іншій, створюючи циклічне очікування — жодна не може продовжити. БД вбиває одну (жертву deadlock) для вирішення.", "Транзакція, що виконується занадто довго.", "Блокування таблиці, що запобігає всім читанням."] }, correctIndex: 1, explanation: { en: "Transaction A locks Row 1, needs Row 2. Transaction B locks Row 2, needs Row 1. Circular dependency. The DB detects it and rolls back the cheaper transaction.", de: "Transaktion A sperrt Zeile 1, braucht Zeile 2. Transaktion B sperrt Zeile 2, braucht Zeile 1. Zirkuläre Abhängigkeit. Die DB erkennt es und rollt die günstigere Transaktion zurück.", ru: "Транзакция A блокирует строку 1, нуждается в строке 2. Транзакция B блокирует строку 2, нуждается в строке 1. Циклическая зависимость. БД обнаруживает и откатывает более дешёвую транзакцию.", uk: "Транзакція A блокує рядок 1, потребує рядок 2. Транзакція B блокує рядок 2, потребує рядок 1. Циклічна залежність. БД виявляє і відкочує дешевшу транзакцію." } },
{ category: "Transactions", question: { en: "How does PostgreSQL's MVCC (Multi-Version Concurrency Control) work?", de: "Wie funktioniert PostgreSQLs MVCC (Multi-Version Concurrency Control)?", ru: "Как работает MVCC (Multi-Version Concurrency Control) в PostgreSQL?", uk: "Як працює MVCC (Multi-Version Concurrency Control) в PostgreSQL?" }, options: { en: ["It locks rows like SQL Server.", "Instead of locking, each transaction sees a snapshot of the data. Writers create new row versions; readers see the version valid at their transaction start time.", "MVCC prevents all concurrent access.", "MVCC only works with Serializable isolation."], de: ["Es sperrt Zeilen wie SQL Server.", "Statt zu sperren sieht jede Transaktion einen Snapshot der Daten. Schreiber erstellen neue Zeilenversionen; Leser sehen die Version, die zum Startzeitpunkt ihrer Transaktion gültig war.", "MVCC verhindert jeden gleichzeitigen Zugriff.", "MVCC funktioniert nur mit Serializable Isolation."], ru: ["Блокирует строки как SQL Server.", "Вместо блокировки каждая транзакция видит снимок данных. Писатели создают новые версии строк; читатели видят версию, актуальную на момент начала их транзакции.", "MVCC предотвращает любой параллельный доступ.", "MVCC работает только с Serializable isolation."], uk: ["Блокує рядки як SQL Server.", "Замість блокування кожна транзакція бачить знімок даних. Записувачі створюють нові версії рядків; читачі бачать версію, актуальну на момент початку їхньої транзакції.", "MVCC запобігає будь-якому паралельному доступу.", "MVCC працює лише з Serializable isolation."] }, correctIndex: 1, explanation: { en: "MVCC means readers never block writers and writers never block readers. Each row has xmin/xmax transaction IDs. Old versions are cleaned up by VACUUM.", de: "MVCC bedeutet, dass Leser nie Schreiber blockieren und Schreiber nie Leser blockieren. Jede Zeile hat xmin/xmax Transaction IDs. Alte Versionen werden von VACUUM aufgeräumt.", ru: "MVCC означает, что читатели никогда не блокируют писателей и писатели никогда не блокируют читателей. Каждая строка имеет xmin/xmax transaction ID. Старые версии очищаются VACUUM.", uk: "MVCC означає, що читачі ніколи не блокують записувачів і записувачі ніколи не блокують читачів. Кожен рядок має xmin/xmax transaction ID. Старі версії очищуються VACUUM." } },
{ category: "Transactions", question: { en: "What is the purpose of the WAL (Write-Ahead Log)?", de: "Was ist der Zweck des WAL (Write-Ahead Log)?", ru: "Какова цель WAL (Write-Ahead Log)?", uk: "Яка мета WAL (Write-Ahead Log)?" }, options: { en: ["To log application errors.", "To ensure durability: changes are written to the log BEFORE being applied to data files, so the database can recover from crashes by replaying the log.", "To track user activity for auditing.", "To optimize read queries."], de: ["Anwendungsfehler zu protokollieren.", "Durability sicherstellen: Änderungen werden ins Log geschrieben, BEVOR sie auf Datendateien angewendet werden, sodass die Datenbank nach Abstürzen durch Log-Replay wiederhergestellt werden kann.", "Benutzeraktivität für Auditing zu verfolgen.", "Lese-Queries zu optimieren."], ru: ["Для логирования ошибок приложения.", "Для обеспечения durability: изменения записываются в лог ДО применения к файлам данных, чтобы БД могла восстановиться после сбоя, воспроизведя лог.", "Для отслеживания активности пользователей для аудита.", "Для оптимизации запросов на чтение."], uk: ["Для логування помилок додатку.", "Для забезпечення durability: зміни записуються в лог ДО застосування до файлів даних, щоб БД могла відновитися після збою, відтворивши лог.", "Для відстеження активності користувачів для аудиту.", "Для оптимізації запитів на читання."] }, correctIndex: 1, explanation: { en: "WAL guarantees that even if the server crashes mid-write, no committed data is lost. On recovery, the DB replays WAL entries to bring data files up to date.", de: "WAL garantiert, dass selbst bei einem Server-Absturz mitten im Schreibvorgang keine committeten Daten verloren gehen. Bei der Wiederherstellung wiederholt die DB WAL-Einträge, um Datendateien zu aktualisieren.", ru: "WAL гарантирует, что даже при сбое сервера во время записи зафиксированные данные не будут потеряны. При восстановлении БД воспроизводит записи WAL для актуализации файлов данных.", uk: "WAL гарантує, що навіть при збої сервера під час запису зафіксовані дані не будуть втрачені. При відновленні БД відтворює записи WAL для актуалізації файлів даних." } },
// ===== POSTGRESQL SPECIFIC =====
{ category: "PostgreSQL", question: { en: "What is the VACUUM command in PostgreSQL?", de: "Was ist der VACUUM-Befehl in PostgreSQL?", ru: "Что такое команда VACUUM в PostgreSQL?", uk: "Що таке команда VACUUM в PostgreSQL?" }, options: { en: ["It removes all data from a table.", "It cleans up dead tuples (old row versions from MVCC updates/deletes), recovers disk space, and updates statistics for the query planner.", "It optimizes indexes.", "It creates a backup of the database."], de: ["Es entfernt alle Daten aus einer Tabelle.", "Es räumt tote Tupel auf (alte Zeilenversionen von MVCC-Updates/Deletes), stellt Speicherplatz wieder her und aktualisiert Statistiken für den Query Planner.", "Es optimiert Indexes.", "Es erstellt ein Backup der Datenbank."], ru: ["Удаляет все данные из таблицы.", "Очищает мёртвые кортежи (старые версии строк от MVCC-обновлений/удалений), восстанавливает дисковое пространство и обновляет статистику для планировщика запросов.", "Оптимизирует индексы.", "Создаёт резервную копию базы данных."], uk: ["Видаляє всі дані з таблиці.", "Очищує мертві кортежі (старі версії рядків від MVCC-оновлень/видалень), відновлює дисковий простір та оновлює статистику для планувальника запитів.", "Оптимізує індекси.", "Створює резервну копію бази даних."] }, correctIndex: 1, explanation: { en: "MVCC never overwrites rows in place — it creates new versions and marks old ones as dead. VACUUM physically removes dead tuples. autovacuum handles this automatically in most cases.", de: "MVCC überschreibt Zeilen nie vor Ort — es erstellt neue Versionen und markiert alte als tot. VACUUM entfernt tote Tupel physisch. autovacuum erledigt das in den meisten Fällen automatisch.", ru: "MVCC никогда не перезаписывает строки на месте — создаёт новые версии и помечает старые как мёртвые. VACUUM физически удаляет мёртвые кортежи. autovacuum обрабатывает это автоматически в большинстве случаев.", uk: "MVCC ніколи не перезаписує рядки на місці — створює нові версії та позначає старі як мертві. VACUUM фізично видаляє мертві кортежі. autovacuum обробляє це автоматично в більшості випадків." } },
{ category: "PostgreSQL", question: { en: "What is the difference between VACUUM and VACUUM FULL?", de: "Was ist der Unterschied zwischen VACUUM und VACUUM FULL?", ru: "В чём разница между VACUUM и VACUUM FULL?", uk: "У чому різниця між VACUUM та VACUUM FULL?" }, options: { en: ["VACUUM FULL is just a verbose version.", "VACUUM reclaims space within existing pages (doesn't return space to OS). VACUUM FULL rewrites the entire table, reclaiming all space but requires an exclusive lock.", "VACUUM FULL only works on large tables.", "There is no difference."], de: ["VACUUM FULL ist nur eine ausführliche Version.", "VACUUM gibt Platz innerhalb bestehender Seiten frei (gibt keinen Platz ans OS zurück). VACUUM FULL schreibt die gesamte Tabelle neu, gibt allen Platz frei, erfordert aber eine exklusive Sperre.", "VACUUM FULL funktioniert nur bei grossen Tabellen.", "Es gibt keinen Unterschied."], ru: ["VACUUM FULL — просто подробная версия.", "VACUUM освобождает пространство в существующих страницах (не возвращает ОС). VACUUM FULL перезаписывает всю таблицу, освобождая всё пространство, но требует эксклюзивную блокировку.", "VACUUM FULL работает только на больших таблицах.", "Разницы нет."], uk: ["VACUUM FULL — просто детальна версія.", "VACUUM звільняє простір у існуючих сторінках (не повертає ОС). VACUUM FULL перезаписує всю таблицю, звільняючи весь простір, але вимагає ексклюзивне блокування.", "VACUUM FULL працює лише на великих таблицях.", "Різниці немає."] }, correctIndex: 1, explanation: { en: "Regular VACUUM: fast, no lock, marks space as reusable within the table. VACUUM FULL: slow, locks table, physically compacts it and returns space to the OS. Use FULL only when desperate.", de: "Normales VACUUM: schnell, keine Sperre, markiert Platz als wiederverwendbar innerhalb der Tabelle. VACUUM FULL: langsam, sperrt Tabelle, komprimiert physisch und gibt Platz ans OS zurück. FULL nur im Notfall verwenden.", ru: "Обычный VACUUM: быстрый, без блокировки, помечает пространство как повторно используемое внутри таблицы. VACUUM FULL: медленный, блокирует таблицу, физически сжимает и возвращает пространство ОС. FULL только в крайнем случае.", uk: "Звичайний VACUUM: швидкий, без блокування, позначає простір як повторно використовуваний всередині таблиці. VACUUM FULL: повільний, блокує таблицю, фізично стискає та повертає простір ОС. FULL лише в крайньому випадку." } },
{ category: "PostgreSQL", question: { en: "What are PostgreSQL's table statistics and why do they matter?", de: "Was sind PostgreSQLs Tabellenstatistiken und warum sind sie wichtig?", ru: "Что такое статистика таблиц PostgreSQL и почему она важна?", uk: "Що таке статистика таблиць PostgreSQL і чому вона важлива?" }, options: { en: ["Statistics track user connections.", "pg_statistic stores data distribution info (most common values, histograms, null fractions) that the query planner uses to choose optimal execution plans.", "Statistics only matter for monitoring dashboards.", "Statistics are only updated during VACUUM FULL."], de: ["Statistiken verfolgen Benutzerverbindungen.", "pg_statistic speichert Datenverteilungsinformationen (häufigste Werte, Histogramme, Null-Anteile), die der Query Planner zur Wahl optimaler Ausführungspläne verwendet.", "Statistiken sind nur für Monitoring-Dashboards wichtig.", "Statistiken werden nur während VACUUM FULL aktualisiert."], ru: ["Статистика отслеживает подключения пользователей.", "pg_statistic хранит информацию о распределении данных (наиболее частые значения, гистограммы, доли NULL), которую планировщик запросов использует для выбора оптимальных планов выполнения.", "Статистика важна только для мониторинговых дашбордов.", "Статистика обновляется только во время VACUUM FULL."], uk: ["Статистика відстежує підключення користувачів.", "pg_statistic зберігає інформацію про розподіл даних (найчастіші значення, гістограми, частки NULL), яку планувальник запитів використовує для вибору оптимальних планів виконання.", "Статистика важлива лише для моніторингових дашбордів.", "Статистика оновлюється лише під час VACUUM FULL."] }, correctIndex: 1, explanation: { en: "ANALYZE updates statistics. Without accurate statistics, the planner might estimate 10 rows when there are 10 million, choosing a terrible plan. autovacuum runs ANALYZE automatically.", de: "ANALYZE aktualisiert Statistiken. Ohne genaue Statistiken könnte der Planner 10 Zeilen schätzen, wenn es 10 Millionen sind, und einen schrecklichen Plan wählen. autovacuum führt ANALYZE automatisch aus.", ru: "ANALYZE обновляет статистику. Без точной статистики планировщик может оценить 10 строк, когда их 10 миллионов, выбрав ужасный план. autovacuum запускает ANALYZE автоматически.", uk: "ANALYZE оновлює статистику. Без точної статистики планувальник може оцінити 10 рядків, коли їх 10 мільйонів, обравши жахливий план. autovacuum запускає ANALYZE автоматично." } },
{ category: "PostgreSQL", question: { en: "What is a Partial Index in PostgreSQL?", de: "Was ist ein Partial Index in PostgreSQL?", ru: "Что такое Partial Index в PostgreSQL?", uk: "Що таке Partial Index в PostgreSQL?" }, options: { en: ["An incomplete index that's still being built.", "An index with a WHERE clause that only includes rows matching a condition, saving space and improving write/read performance for targeted queries.", "An index on only some columns of a table.", "A temporary index."], de: ["Ein unvollständiger Index, der noch erstellt wird.", "Ein Index mit einer WHERE-Klausel, der nur Zeilen einschliesst, die einer Bedingung entsprechen, was Platz spart und die Schreib-/Lese-Performance für gezielte Queries verbessert.", "Ein Index auf nur einigen Spalten einer Tabelle.", "Ein temporärer Index."], ru: ["Незавершённый индекс, который ещё строится.", "Индекс с WHERE-условием, включающий только строки, соответствующие условию, экономя место и улучшая производительность чтения/записи для целевых запросов.", "Индекс только на некоторых столбцах таблицы.", "Временный индекс."], uk: ["Незавершений індекс, що ще будується.", "Індекс з WHERE-умовою, що включає лише рядки, які відповідають умові, заощаджуючи місце та покращуючи продуктивність читання/запису для цільових запитів.", "Індекс лише на деяких стовпцях таблиці.", "Тимчасовий індекс."] }, correctIndex: 1, explanation: { en: "CREATE INDEX idx_active ON orders(created_at) WHERE status = 'active'. If only 5% of orders are active, this index is 20x smaller than indexing all orders.", de: "CREATE INDEX idx_active ON orders(created_at) WHERE status = 'active'. Wenn nur 5% der Bestellungen aktiv sind, ist dieser Index 20x kleiner als die Indexierung aller Bestellungen.", ru: "CREATE INDEX idx_active ON orders(created_at) WHERE status = 'active'. Если только 5% заказов активны, этот индекс в 20 раз меньше, чем индексирование всех заказов.", uk: "CREATE INDEX idx_active ON orders(created_at) WHERE status = 'active'. Якщо лише 5% замовлень активні, цей індекс у 20 разів менший, ніж індексування всіх замовлень." } },
{ category: "PostgreSQL", question: { en: "What is a GIN index and when should you use it?", de: "Was ist ein GIN Index und wann sollte man ihn verwenden?", ru: "Что такое GIN index и когда его использовать?", uk: "Що таке GIN index і коли його використовувати?" }, options: { en: ["GIN is for geographic data only.", "GIN (Generalized Inverted Index) is optimized for values containing multiple elements — full-text search, JSONB queries, array containment.", "GIN replaces B-tree indexes entirely.", "GIN indexes only work with integer columns."], de: ["GIN ist nur für geografische Daten.", "GIN (Generalized Inverted Index) ist für Werte mit mehreren Elementen optimiert — Volltextsuche, JSONB-Queries, Array-Containment.", "GIN ersetzt B-tree Indexes vollständig.", "GIN Indexes funktionieren nur mit Integer-Spalten."], ru: ["GIN только для географических данных.", "GIN (Generalized Inverted Index) оптимизирован для значений, содержащих множество элементов — полнотекстовый поиск, запросы к JSONB, проверка вхождения массивов.", "GIN полностью заменяет B-tree index.", "GIN index работает только с целочисленными столбцами."], uk: ["GIN лише для географічних даних.", "GIN (Generalized Inverted Index) оптимізований для значень, що містять багато елементів — повнотекстовий пошук, запити до JSONB, перевірка входження масивів.", "GIN повністю замінює B-tree index.", "GIN index працює лише з цілочисельними стовпцями."] }, correctIndex: 1, explanation: { en: "GIN maps each element to the rows containing it. Perfect for: WHERE tags @> '{sql}' (array), WHERE document @@ 'search term' (tsvector), WHERE jsonb_col @> '{\"key\": \"val\"}'.", de: "GIN ordnet jedes Element den Zeilen zu, die es enthalten. Perfekt für: WHERE tags @> '{sql}' (Array), WHERE document @@ 'search term' (tsvector), WHERE jsonb_col @> '{\"key\": \"val\"}'.", ru: "GIN сопоставляет каждый элемент со строками, содержащими его. Идеален для: WHERE tags @> '{sql}' (массив), WHERE document @@ 'search term' (tsvector), WHERE jsonb_col @> '{\"key\": \"val\"}'.", uk: "GIN зіставляє кожен елемент з рядками, що його містять. Ідеальний для: WHERE tags @> '{sql}' (масив), WHERE document @@ 'search term' (tsvector), WHERE jsonb_col @> '{\"key\": \"val\"}'." } },
{ category: "PostgreSQL", question: { en: "What is the difference between JSONB and JSON types in PostgreSQL?", de: "Was ist der Unterschied zwischen JSONB und JSON Typen in PostgreSQL?", ru: "В чём разница между типами JSONB и JSON в PostgreSQL?", uk: "У чому різниця між типами JSONB та JSON в PostgreSQL?" }, options: { en: ["They're identical.", "JSON stores raw text (preserves formatting, slower queries). JSONB stores binary parsed format (loses whitespace, supports indexing, much faster queries).", "JSONB is deprecated in favor of JSON.", "JSON supports indexes, JSONB doesn't."], de: ["Sie sind identisch.", "JSON speichert Rohtext (behält Formatierung bei, langsamere Queries). JSONB speichert binär geparst (verliert Whitespace, unterstützt Indexierung, viel schnellere Queries).", "JSONB ist zugunsten von JSON veraltet.", "JSON unterstützt Indexes, JSONB nicht."], ru: ["Они идентичны.", "JSON хранит необработанный текст (сохраняет форматирование, медленные запросы). JSONB хранит бинарный разобранный формат (теряет пробелы, поддерживает индексирование, гораздо более быстрые запросы).", "JSONB устарел в пользу JSON.", "JSON поддерживает индексы, JSONB нет."], uk: ["Вони ідентичні.", "JSON зберігає необроблений текст (зберігає форматування, повільні запити). JSONB зберігає бінарний розібраний формат (втрачає пробіли, підтримує індексування, набагато швидші запити).", "JSONB застарів на користь JSON.", "JSON підтримує індекси, JSONB ні."] }, correctIndex: 1, explanation: { en: "Always use JSONB unless you need to preserve exact JSON formatting. JSONB supports GIN indexes, efficient @>, ?, and ?& operators. JSON must reparse on every access.", de: "Immer JSONB verwenden, es sei denn, die exakte JSON-Formatierung muss erhalten bleiben. JSONB unterstützt GIN Indexes, effiziente @>, ? und ?& Operatoren. JSON muss bei jedem Zugriff neu geparst werden.", ru: "Всегда используйте JSONB, если не нужно сохранять точное форматирование JSON. JSONB поддерживает GIN index, эффективные операторы @>, ? и ?&. JSON должен перепарсить при каждом доступе.", uk: "Завжди використовуйте JSONB, якщо не потрібно зберігати точне форматування JSON. JSONB підтримує GIN index, ефективні оператори @>, ? та ?&. JSON повинен перепарсити при кожному доступі." } },
// ===== SQL SERVER SPECIFIC =====
